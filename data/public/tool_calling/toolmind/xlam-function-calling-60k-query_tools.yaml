  parameters:
    type: object
    properties:
      offset:
        description: The starting point of records to return. Defaults to None.
      limit:
        description: The number of records to return. Defaults to None.
get_amazon_product_details:
  name: get_amazon_product_details
  description: Fetches the details of an Amazon product using the provided product
