    type: object
    properties:
      length:
        description: The length of the random sequence to generate.
        type: integer
      case:
        description: Specifies the case for the character sequence. Defaults to 'all'.
      extra:
        description: Specifies whether to include special characters in the sequence.
          Defaults to 'true'.
