  parameters:
    type: object
    properties:
      cook_time_in_minutes_tg:
        description: Minimum cooking time in minutes (greater than or equal to this
          value).
        type: integer
      cook_time_in_minutes_lt:
        description: Maximum cooking time in minutes (less than this value).
        type: integer
publications:
  name: publications
  description: Fetches the publications for the specified Instagram user using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      nextmaxid:
        description: The maximum ID for the next page of results. Defaults to None.
      username:
        description: The Instagram username to fetch publications for. Defaults to
          'kimkardashian'.
videogames_news_search:
  name: videogames_news_search
  description: Searches for current and historical news related to video games from
    top sources based on the given query and optional filters.
  parameters:
    type: object
    properties:
      query:
        description: The query text to search for in the news articles.
      page:
        description: The page number to retrieve, for paginating through results.
      to_date:
        description: The latest date for articles in ISO 8601 format (e.g., "2022-03-15").
      sort_by:
        description: The field by which to sort the results.
      from_date:
        description: The earliest date for articles in ISO 8601 format (e.g., "2022-03-15").
      per_page:
        description: The number of results to return per page.
tournamentmetadata:
  name: tournamentmetadata
  description: Fetches metadata for a specific tournament using the provided unique
    tournament ID.
  parameters:
    type: object
    properties:
      uniquetournamentid:
        description: The unique identifier for the tournament.
        type: integer
viewrecords:
  name: viewrecords
  description: Fetch records from a specified Zoho Creator view or report using the
    Zoho Creator API.
  parameters:
    type: object
    properties:
      scope:
        description: The scope of the request, indicating what data the request is
          allowed to access.
      authtoken:
        description: Authentication token for accessing the Zoho Creator API.
      applinkname:
        description: The unique link name of the Zoho Creator application.
      zc_ownername:
        description: The owner name of the Zoho Creator account.
      viewlinkname:
        description: The specific view or report from which to fetch records.
      raw:
        description: Whether to fetch raw data. Defaults to 'True'.
      criteria:
        description: Criteria to filter the records. Defaults to '(Country == "US")'.
      startindex:
        description: The starting index for fetching records. Defaults to '0'.
      limit:
        description: The maximum number of records to fetch. Defaults to '100'.
search_all_cars:
  name: search_all_cars
  description: Fetches a list of vehicles from an API based on the provided vehicle
    type.
  parameters:
    type: object
    properties:
      vehicle_type:
        description: Type of vehicle to fetch details for (e.g., 'car' or 'bike').
user_info_by_username:
  name: user_info_by_username
  description: Retrieve all information of an Instagram account by username.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to retrieve information.
get_address_transactions:
  name: get_address_transactions
  description: Fetches transactions for a given address from the specified network.
  parameters:
    type: object
    properties:
      network:
        description: The blockchain network to query (default is 'BSC_TESTNET').
      limit:
        description: The maximum number of transactions to return (default is '10').
      offset:
        description: The number of transactions to skip before starting to return
          results (default is '0').
      monitoraddressid:
        description: The ID of the address to monitor (default is '8485d9c3-7f52-4ba7-8ec2-41543effa6ae').
obtener_cp:
  name: obtener_cp
  description: Fetches the list of postal codes based on the provided postal code.
  parameters:
    type: object
    properties:
      cp:
        description: The postal code for which to fetch the corresponding list of
          postal codes.
        type: integer
get_news_from_a_specific_source:
  name: get_news_from_a_specific_source
  description: Fetch news on pollution in African countries from a specified news
    source.
  parameters:
    type: object
    properties:
      newspaperid:
        description: The identifier of the news source to fetch pollution news from.
qr_code_endpoint:
  name: qr_code_endpoint
  description: Generates a QR code for a given URL using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      url:
        description: The URL to be encoded in the QR code. Defaults to None.
leaguetopplayersregularseason:
  name: leaguetopplayersregularseason
  description: Retrieves the top players for a specific league's regular season during
    a given season.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The ID of the tournament for which the top players in the regular
          season are to be retrieved.
        type: integer
      seasonid:
        description: The ID of the season for which the top players in the regular
          season are to be retrieved.
        type: integer
disciplina_1:
  name: disciplina_1
  description: Retrieves discipline information for a student with ID 1 from the Colegio
    Santa Ana API.
  parameters:
    type: object
    properties:
      authorization:
        description: Authorization token required to access the API.
song_by_id:
  name: song_by_id
  description: Fetches a song's details by its unique identifier from the Halsey Lyrics
    Snippets API.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the song to be retrieved.
get_sun_rise_and_sun_set_time:
  name: get_sun_rise_and_sun_set_time
  description: Fetches the sunrise and sunset times for a given date and location,
    optionally considering a specific timezone.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to find sunrise and sunset times in 'YYYY-MM-DD'
          format.
      latitude:
        description: The latitude of the location.
        type: integer
      longitude:
        description: The longitude of the location.
        type: integer
      timezone:
        description: The timezone to consider for the sunrise and sunset times. Default
          is 'Asia/Calcutta'.
is_sabbath_day:
  name: is_sabbath_day
  description: Determines if the given date string or today's date is a Sabbath day
    using the Enoch Calendar API.
  parameters:
    type: object
    properties:
      datestring:
        description: The date string to check in the format 'YYYY-MM-DD'.
verify_pan_card:
  name: verify_pan_card
  description: Verifies the details of a PAN Card using a government database through
    an API.
  parameters:
    type: object
    properties:
      x_rapid_api:
        description: The X-RapidAPI host value required for the API query.
      pannumber:
        description: The PAN Card number to be verified.
get_team_transfers:
  name: get_team_transfers
  description: Retrieves all incoming and outgoing transfers for a specified team.
  parameters:
    type: object
    properties:
      teamid:
        description: The identifier of the team for which to retrieve transfer data.
get_raster_tile:
  name: get_raster_tile
  description: Retrieves a raster tile as a PNG image from a specified map style and
    coordinates. The tile can be used in mapping libraries like Leaflet.
  parameters:
    type: object
    properties:
      x:
        description: The tile's x-coordinate.
        type: integer
      y:
        description: The tile's y-coordinate.
        type: integer
      style_name:
        description: The name of the map style. Options include `kurviger-liberty`
          and `osm-bright`.
      z:
        description: The zoom level of the tile.
        type: integer
titles_x_titles_by_ids:
  name: titles_x_titles_by_ids
  description: Fetch movie or series titles by their IMDB IDs.
  parameters:
    type: object
    properties:
      idslist:
        description: Comma-separated list of IMDB IDs (e.g., 'tt0001702,tt0001856,tt0001856').
      list:
        description: Comma-separated list of IMDB IDs (e.g., 'tt0001702,tt0001856,tt0001856').
      info:
        description: Structure of the information to be retrieved (e.g., 'base_info',
          'mini_info', 'image'). Defaults to None.
get_nba_betting_odds:
  name: get_nba_betting_odds
  description: Fetch NBA betting lines and odds from various online sportsbooks such
    as Fanduel, BetRivers, BetMGM, Caesars, and PointsBet.
  parameters:
    type: object
    properties:
      gameid:
        description: The unique identifier for a specific game. Defaults to None.
      gamedate:
        description: The date for which to retrieve betting odds, in the format YYYYMMDD.
          Defaults to '20230304'.
novels:
  name: novels
  description: Fetches information about novels from the RapidAPI service.
  parameters:
    type: object
    properties:
      pagesize:
        description: The number of items to return per page. Defaults to '2'.
      page:
        description: The page number to retrieve. Defaults to '1'.
artists_get_latest_release:
  name: artists_get_latest_release
  description: Gets the latest release of an artist using the Shazam API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the artist. This is the value of the 'artist->adamid'
          field returned by various endpoints such as .../search, .../songs/v2/detect,
          or .../songs/get-details.
      l:
        description: The language code. Defaults to 'en-US'.
goal_analysis_scoring_first_in_between:
  name: goal_analysis_scoring_first_in_between
  description: Fetches the scoring first goal statistics for a match within specified
    minute intervals.
  parameters:
    type: object
    properties:
      matchid:
        description: The ID of the match for which to fetch the scoring first goal
          statistics.
        type: integer
hin_decoder_return_html:
  name: hin_decoder_return_html
  description: Decodes a Hull Identification Number (HIN) for a boat using the HIN
    decoder API and returns the result as either JSON or HTML.
  parameters:
    type: object
    properties:
      hin:
        description: The Hull Identification Number to be decoded.
      usertable:
        description: If set to '1', the function returns an HTML table instead of
          JSON. Defaults to '1'.
episode:
  name: episode
  description: Fetches data for a single episode from the VOD app API using the provided
    episode house number and API key.
  parameters:
    type: object
    properties:
      episodehousenumber:
        description: The unique identifier for the specific episode to be fetched.
current_snow_conditions:
  name: current_snow_conditions
  description: Fetches the current snow conditions for a specified ski resort.
  parameters:
    type: object
    properties:
      resort:
        description: The name of the ski resort to retrieve snow conditions for.
      units:
        description: The unit system to use for the conditions. Accepted values are
          'i' (imperial) and 'm' (metric). Defaults to 'i'.
get_coin_ohlc_data:
  name: get_coin_ohlc_data
  description: Fetches OHLC (Open, High, Low, Close) data for a specified coin over
    a given time interval.
  parameters:
    type: object
    properties:
      uuid:
        description: UUID of the cryptocurrency for which to fetch the OHLC data.
      referencecurrencyuuid:
        description: UUID of the reference currency in which prices are calculated.
          Defaults to 'yhjMzLPhuIDl' (US Dollar).
      limit:
        description: Number of time periods for which the OHLC data is retrieved.
          When `interval` is 'hour' and `limit` is 10, data will be returned for the
          last 10 hours. Defaults to None.
      interval:
        description: Time period over which each OHLC item is determined. Allowed
          values are 'minute', '5minutes', 'hour', '8hours', 'day', 'week', 'month'.
          Defaults to 'day'.
proxy_get:
  name: proxy_get
  description: Fetches a list of proxies based on specified parameters.
  parameters:
    type: object
    properties:
      country:
        description: A two-letter country code to filter proxies by country. For more
          information about country codes, refer to https://www.nationsonline.org/oneworld/country_code_list.htm.
          Default is 'US'.
      anonymity:
        description: The level of anonymity required. Possible values are 'high',
          'anonymous', 'transparent'. Default is 'high'.
kitten:
  name: kitten
  description: Fetches a kitten image of specified width and height using the Placekitten
    API.
  parameters:
    type: object
    properties:
      width:
        description: The width of the kitten image.
      height:
        description: The height of the kitten image.
search_jobs:
  name: search_jobs
  description: Search for remote jobs using various filters such as salary, company,
    job title, and location.
  parameters:
    type: object
    properties:
      salarymin:
        description: Minimum salary to filter jobs by. Defaults to '100'.
      company:
        description: Company name to filter jobs by. Defaults to 'SpaceX'.
      title:
        description: Job title or role to filter jobs by. Defaults to 'PHP'.
      location:
        description: Location to filter jobs by. Defaults to 'remote'.
      page:
        description: Page number for paginated results. Defaults to '1'.
      perpage:
        description: Number of jobs to show per page. Defaults to '5'.
getlearningresources_topic:
  name: getlearningresources_topic
  description: Fetch Power BI learning resources based on a specific topic and page
    number.
  parameters:
    type: object
    properties:
      topic:
        description: The topic for which to fetch learning resources.
      page:
        description: The page number of the results to retrieve.
        type: integer
get_username_higgs_domino:
  name: get_username_higgs_domino
  description: Fetches the username for a given Higgs Domino ID using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      is_id:
        description: The Higgs Domino ID for which the username is requested.
        type: integer
jsr_characters:
  name: jsr_characters
  description: Fetches a list of characters from the Jet Set Radio API with optional
    filtering, sorting, and ordering parameters.
  parameters:
    type: object
    properties:
      limit:
        description: Specifies the maximum number of items to be returned. Default
          is '5'.
      sortby:
        description: The field by which to sort the characters. Default is 'name'.
          Possible values include any field on the document, such as 'name' or 'stats'.
      orderby:
        description: The order in which to sort the characters. Default is 'asc'.
          Possible values are 'asc' for ascending and 'desc' for descending. Must
          be used in conjunction with 'sortby'.
getcode_relatedcontracts:
  name: getcode_relatedcontracts
  description: Fetches related contract information from the RapidAPI service.
  parameters:
    type: object
    properties:
      contract_address:
        description: The address of the contract.
      contract_name:
        description: The name of the contract.
get_stored_word_from_any_category:
  name: get_stored_word_from_any_category
  description: Retrieve a random phrase and associated taboo words from stored categories,
    optionally limiting the number of taboo words.
  parameters:
    type: object
    properties:
      forbiddenwordlimit:
        description: The maximum number of taboo words to be returned. Defaults to
          6, with a maximum of 10.
distance_between_airports:
  name: distance_between_airports
  description: Calculates the distance between two airports given their IATA codes
    using the Toolbench API.
  parameters:
    type: object
    properties:
      iata_airport_to:
        description: The IATA code of the destination airport.
      iata_airport_from:
        description: The IATA code of the departure airport.
aliexpress_store_item_search:
  name: aliexpress_store_item_search
  description: Searches for items in an AliExpress store.
  parameters:
    type: object
    properties:
      sellerid:
        description: The seller's ID on AliExpress.
      storeid:
        description: The store's ID on AliExpress.
      sort:
        description: The sorting order of the items. Default is None.
      page:
        description: The page number for pagination. Default is None.
      pagesize:
        description: The number of items to display per page. Default is None.
      region:
        description: The region to accurately get shipping costs and other deals.
          Default is None.
      locale:
        description: The locale to display the titles and content in the selected
          language. Default is None.
      currency:
        description: The currency to display the product price in. Default is None.
getnfts_metadata:
  name: getnfts_metadata
  description: Fetches the metadata, attributes, and enclosed media of a specific
    NFT.
  parameters:
    type: object
    properties:
      contractaddress:
        description: Address of the NFT contract (e.g., "0xb47e3cd837ddf8e4c57f05d70ab865de6e193bbb"
          for Bored Apes).
      tokenid:
        description: The ID of the NFT token.
        type: integer
address_postal_code:
  name: address_postal_code
  description: Fetch address information based on the given postal code and additional
    parameters.
  parameters:
    type: object
    properties:
      postal_code:
        description: 'Postal code string (minimum: 3 digits, maximum: 7 digits).'
      datum:
        description: 'Geodetic system of latitude and longitude (default: ''wgs84'').
          Possible values are ''wgs84'' for World Geodetic System and ''tokyo'' for
          Old Japan Geodetic System.'
      offset:
        description: 'Skips a given number of first data (minimum value: 0, maximum
          value: 2000, default: 0).'
      coord_unit:
        description: The unit of latitude and longitude in the output data. Possible
          values are 'degree' for decimal system of degrees (default) and 'millisec'
          for milliseconds.
      limit:
        description: 'Limits the number of response data (minimum value: 1, maximum
          value: 100, default: 10).'
text_qr_code:
  name: text_qr_code
  description: Generates a static QR code with specified text and custom design options,
    returning the generated QR code data.
  parameters:
    type: object
    properties:
      data:
        description: The text to be encoded in the QR code.
      size:
        description: The size of the QR code.
      data_gradient_end_color:
        description: The end color for the data gradient. Defaults to '#000000'.
      eye_pattern:
        description: The pattern of the eye modules of the QR code. Defaults to 'RECT_RECT'.
      data_pattern:
        description: The pattern of the data modules of the QR code. Defaults to 'RECT'.
      data_gradient_start_color:
        description: The start color for the data gradient. Defaults to '#000000'.
      error_correction:
        description: The error correction level. Defaults to 'M'.
      data_gradient_style:
        description: The style of the data gradient. Defaults to 'None'.
      eye_color_inner:
        description: The inner color of the eye modules. Defaults to '#000000'.
      eye_color_outer:
        description: The outer color of the eye modules. Defaults to '#000000'.
      background_color:
        description: The background color of the QR code. Defaults to '#FFFFFF'.
getfunctions_topic:
  name: getfunctions_topic
  description: Fetches Power BI DAX functions based on a specified topic and page
    number using the toolbench RapidAPI.
  parameters:
    type: object
    properties:
      topic:
        description: The topic for which the DAX functions are to be retrieved.
      page:
        description: The page number of the results to retrieve.
        type: integer
playercount_185_225_233_110_30015:
  name: playercount_185_225_233_110_30015
  description: Gets the player count from a server given its IP and port using the
