      page:
        description: An unsigned integer to see the next page of movies. For example,
          limit=15 and page=2 will show movies 15-30.
      query_term:
        description: A string used for movie search that matches on movie title, IMDb
          code, actor name, or director name.
      order_by:
        description: A string ('desc' or 'asc') to order the results by either descending
