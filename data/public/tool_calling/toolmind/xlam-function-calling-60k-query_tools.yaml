  parameters:
    type: object
    properties:
      order_id:
        type: integer
        description: ID of the order.
    required:
    - order_id
  output_parameters:
    type: object
    properties:
      id:
        type: integer
        description: ID of the order.
      order_type:
        type: string
        description: Type of the order.
      symbol:
        type: string
        description: Symbol of the stock in the order.
