list_all_platforms:
  name: list_all_platforms
  description: Fetches a list of platforms from the "Is This Coin A Scam" API based
    on various search criteria.
  parameters:
    type: object
    properties:
      symbol:
        description: Search all platform symbols. Wildcard searches can be performed
          using the * character (e.g., symbol=*TH). Multiple items can be searched
          at once by sending a comma-separated list (e.g., symbol=TOK,*TH). Default
          is 'ETH'.
      limit:
        description: Limit the number of records returned. Default is 10.
      name:
        description: Search all platform names. Wildcard searches can be performed
          using the * character (e.g., name=*platform). Multiple items can be searched
          at once by sending a comma-separated list (e.g., name=ethereum,*token).
          Default is 'ethereum'.
      page:
        description: The page number to start from. Default is 10.
      slug:
        description: Search all platform slugs. Wildcard searches can be performed
          using the * character (e.g., slug=*token). Multiple items can be searched
          at once by sending a comma-separated list (e.g., slug=ethereum,*token).
          Default is 'ethereum'.
free_games:
