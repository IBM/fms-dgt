    properties:
      date:
        description: The date for which to retrieve historical gas price data in the
          format 'YYYY-MM-DD'. If not provided, the current gas price data is fetched.
specs_v1_tier1:
  name: specs_v1_tier1
  description: Fetch vehicle data based on specified query parameters using the RapidAPI
    Datamo endpoint.
  parameters:
    type: object
    properties:
      make:
        description: The make of the vehicle. This parameter is required.
      sortby:
        description: The field to sort the results by.
      order:
        description: The sort order of the specified field.
      model:
        description: The model of the vehicle.
      page:
        description: The page number of the results, starting with index 1.
      per_page:
        description: The number of entries per page. Default is 10, with a maximum
          of 250.
      fields:
        description: Specific fields to return in the results. Leave blank to return
          all fields.
us_de:
  name: us_de
  description: Fetches current or historical gas price data for Delaware.
  parameters:
    type: object
    properties:
      date:
        description: A specific date for querying historical gas price data. If not
          provided, the current gas price data is returned.
get_extra_character_details:
  name: get_extra_character_details
  description: Fetch additional details about a character using the provided character
    ID and RapidAPI key.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the character for which details are
          being fetched.
text:
  name: text
  description: Converts the input text into a fancy text format using the Ajith Fancy
    Text API.
  parameters:
    type: object
    properties:
      text:
        description: The text to be converted into fancy text.
riddle_by_keyword:
  name: riddle_by_keyword
  description: Fetches one random riddle based on a given keyword using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      keyword:
        description: The subject or keyword to get a riddle for.
webcams_list_bbox_ne_lat_ne_lng_sw_lat_sw_lng:
  name: webcams_list_bbox_ne_lat_ne_lng_sw_lat_sw_lng
  description: Returns a list of webcams within the specified bounding box defined
    by the north-east and south-west coordinates.
  parameters:
    type: object
    properties:
      ne_lat:
        description: North-east WGS84 latitude of the bounding box.
        type: integer
      sw_lng:
        description: South-west WGS84 longitude of the bounding box.
        type: integer
      sw_lat:
        description: South-west WGS84 latitude of the bounding box.
        type: integer
      ne_lng:
        description: North-east WGS84 longitude of the bounding box.
        type: integer
      lang:
        description: Localizes the results to the specified language, if available.
          Default is 'en'.
      show:
        description: Specifies the content to be listed in the response. Default is
          'webcams:image,location'.
bus_trolley_schedules:
  name: bus_trolley_schedules
  description: Fetches bus or trolley schedules based on the provided parameters from
