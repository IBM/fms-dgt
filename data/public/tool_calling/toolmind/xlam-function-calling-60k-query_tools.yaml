  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the venue for which details are to be fetched.
      lang:
        description: The language code in which the venue details should be returned.
verify_an_email:
  name: verify_an_email
  description: Verifies a single email address using the Blaze Verify API. If a verification
    request takes longer than the specified timeout, retries are allowed for up to
    5 minutes. The verification result is returned once available.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be verified.
      accept_all:
        description: Whether to perform an accept-all check, which can increase response
          time. Default is False.
      smtp:
        description: Whether to include the SMTP step in the verification, which can
          also increase response time. Default is True.
      timeout:
        description: The timeout in seconds to wait for a response. Minimum is 2,
          and maximum is 30. Default is 5.
web_search:
  name: web_search
  description: Performs a web search using the specified query and parameters, and
    returns the search results.
  parameters:
    type: object
    properties:
      q:
        description: Search query string.
      num:
        description: Number of search results to return. Valid values are integers
          between 1 and 20, inclusive. Defaults to 10.
      start:
        description: The index of the first result to return. Defaults to '0'.
      gl:
        description: Two-letter country code to boost search results from that country.
          Defaults to 'us'.
      lr:
        description: Restricts the search to documents written in a particular language.
          Defaults to 'lang_en'.
getupdates:
  name: getupdates
  description: Fetch updates about newly received messages from the server, starting
    from a given message ID and optionally waiting for incoming messages for a specified
    time.
  parameters:
    type: object
    properties:
      start_id:
        description: The ID from which to start fetching updates. Set to zero for
          the first call to retrieve all updates.
        type: integer
      time_out:
        description: The time-out period (in seconds) for the server to wait for incoming
          messages before returning. Defaults to 0.
v4_sports:
  name: v4_sports
  description: Returns a list of available sports and tournaments using the RapidAPI
    Odds API.
  parameters:
    type: object
    properties:
      all:
        description: When True, includes all available sports. When excluded or False,
          only shows recently updated (in-season) sports. Default is None.
area_flag:
  name: area_flag
  description: Fetch the flag image URL for a given area ID using the Soccerway API.
  parameters:
    type: object
    properties:
      area_uid:
        description: The unique identifier for the area.
search_for_creators:
  name: search_for_creators
  description: Search for creators on Patreon using the given search query.
  parameters:
    type: object
    properties:
      search_query:
        description: The search term used to query creators on Patreon.
albums_get_related_artist:
  name: albums_get_related_artist
  description: Fetches related artist information for a given album using the Shazam
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The value of the 'albums->id', 'id', or 'albumadamid' field returned
          from various Shazam API endpoints.
      l:
        description: The language code to return results in. Defaults to 'en-US'.
get_half_staff_events_for_given_flag:
  name: get_half_staff_events_for_given_flag
  description: Fetches all half-staff events for a given flag code using the specified
