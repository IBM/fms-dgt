  parameters:
    type: object
    properties: {}
  output_parameters:
    type: object
    properties:
      status:
        type: boolean
        description: Login status.
imperial_si_conversion:
  name: imperial_si_conversion
  description: 'This tool belongs to the Math API, which provides various mathematical
    operations. Tool description: Convert a value between imperial and SI units.'
  parameters:
    type: object
    properties:
      value:
        type: number
        description: Value to be converted.
      unit_in:
        type: string
