  parameters:
    type: object
    properties:
      q:
        description: Search parameter to filter the protocols. Defaults to None.
      chain_id:
        description: 'Chain identifier to filter the protocols. Supported chains:
          "eth", "bsc", "matic", "avax", "okt", "hmy", "heco", "klay", "op", "arb",
          "ftm", "xdai", "cro", "mobm", "celo", "aurora", "fuse", "evmos", "cfx",
          "kava". Defaults to ''fuse''.'
get_ticker_for_specific_coin:
  name: get_ticker_for_specific_coin
  description: Retrieves the ticker information for a specific cryptocurrency coin
