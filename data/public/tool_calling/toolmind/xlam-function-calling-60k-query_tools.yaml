getmatchesbyteam:
  name: getmatchesbyteam
  description: Fetches all matches for a specified team using the RapidAPI IPL endpoint.
  parameters:
    type: object
    properties:
      team:
        description: The name of the team for which to retrieve matches.
channels_data:
  name: channels_data
  description: Fetches data from a specified TV channel for a given event using the
    provided RapidAPI key.
  parameters:
    type: object
    properties:
      channel_id:
        description: The unique identifier for the TV channel.
        type: integer
      event_id:
        description: The unique identifier for the event.
        type: integer
currency_exchange_rate:
  name: currency_exchange_rate
  description: Fetches exchange rates between two currencies or cryptocurrencies.
  parameters:
    type: object
    properties:
      from_symbol:
        description: A 3-letter currency code (ISO 4217) representing the currency
          to convert from (e.g., 'USD').
      to_symbol:
        description: A 3-letter currency code (ISO 4217) representing the currency
          to convert to (e.g., 'EUR').
      language:
        description: A 2-letter code (ISO 639-1) representing the language for the
          results. Default is 'en'.
get_quotes_by_anime_title:
  name: get_quotes_by_anime_title
  description: Fetches quotes from a specified anime title using the Anime Quotes
