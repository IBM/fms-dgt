  parameters:
    type: object
    properties:
      email_domain:
        description: The email domain to search within (e.g., wsgr.com, gmail.com).
      query:
        description: The search query to use, which can include names, job titles,
          locations, etc.
      limit:
        description: The maximum number of emails to return. Defaults to 100. Accepts
          values from 1 to 5000.
air_quality_forecasts:
  name: air_quality_forecasts
  description: Fetches hourly air quality forecast for a specified city.
  parameters:
    type: object
    properties:
      country:
        description: The country where the city is located.
      city:
        description: The city for which the air quality forecast is required.
      lat:
        description: Latitude of the city. Defaults to '52.377956'.
      lon:
        description: Longitude of the city. Defaults to '4.897070'.
event_details:
  name: event_details
  description: Fetch the details and history odds of a specified event using the Pinnacle
    Odds API.
  parameters:
    type: object
    properties:
      event_id:
        description: The unique identifier for the event.
        type: integer
get_postal_codes_by_id:
  name: get_postal_codes_by_id
  description: Fetches postal codes information by given ID from the Canada Postal
