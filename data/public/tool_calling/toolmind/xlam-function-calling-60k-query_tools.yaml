      x_units_distance:
        description: Unit of measurement for distance. One of 'miles' or 'kilometer'.
          Defaults to 'kilometer'.
      x_units_pressure:
        description: Unit of measurement for pressure. One of 'hg' or 'mbar'. Defaults
          to 'mbar'.
      x_aqi_index:
        description: Air Quality Index standard to use. One of 'us' or 'cn'. Defaults
          to 'us'.
      x_units_temperature:
        description: Unit of measurement for temperature. One of 'fahrenheit' or 'celsius'.
          Defaults to 'celsius'.
      x_user_timezone:
        description: Timezone to use for the user. Defaults to 'Asia/Singapore'.
      x_user_lang:
        description: Language for response. Defaults to 'en-US'.
sports_api:
