        type: integer
tokens_all:
  name: tokens_all
  description: Fetches data about tokens and optionally filters the results based
    on provided parameters.
  parameters:
    type: object
    properties:
      take:
        description: The number of fields to retrieve.
      walletid:
        description: Identifier for a specific wallet to filter tokens by.
      searchterms:
        description: Terms to search for within the token data.
      chains:
        description: Specific blockchains to filter tokens by.
      skip:
        description: The number of fields to skip before starting to take.
      stableonly:
        description: Whether to only include stablecoins.
      ids:
        description: Specific token IDs to retrieve data for.
tournamentnextmainevents:
  name: tournamentnextmainevents
  description: This function retrieves the next main events for a specified MMA tournament
    using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      page:
        description: Zero-based page number to retrieve.
