      content_type:
        description: Value for the Content-Type header.
      secret:
        description: Secret key for additional authentication.
      status:
        description: Status of the orders to filter.
      action:
        description: The action to be performed on the orders.
get_all_characters:
  name: get_all_characters
  description: Fetches and returns a list of characters from the Riordanverse API
