      year:
        description: The year for which to retrieve TOTD tracks.
        type: integer
retrieve_buy_sell_informations_by_id:
  name: retrieve_buy_sell_informations_by_id
  description: Retrieve the latest Buy/Sell orders placed on the Steam Store for a
    given item ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The item ID for which to retrieve the buy/sell orders.
commanderskills:
  name: commanderskills
  description: Fetches the details of a specific commander skill from the RapidAPI
