    required:
    - numbers
  output_parameters:
    type: object
    properties:
      result:
        type: number
        description: The sum of all numbers in the list.
subtract:
  name: subtract
  description: 'This tool belongs to the Math API, which provides various mathematical
    operations. Tool description: Subtract one number from another.'
  parameters:
    type: object
    properties:
      a:
        type: number
        description: Number to subtract from.
      b:
        type: number
        description: Number to subtract.
    required:
    - a
    - b
  output_parameters:
    type: object
    properties:
      result:
        type: number
        description: Difference between the two numbers.
make_transaction:
  name: make_transaction
  description: 'This tool belongs to the trading system, which allows users to trade
    stocks, manage their account, and view stock information. Tool description: Make
    a deposit or withdrawal based on specified amount.'
  parameters:
    type: object
    properties:
      account_id:
        type: integer
        description: ID of the account.
      xact_type:
        type: string
        description: Transaction type (deposit or withdrawal).
      amount:
        type: number
        description: Amount to deposit or withdraw.
    required:
    - account_id
    - xact_type
    - amount
  output_parameters:
    type: object
    properties:
      status:
        type: string
        description: Status of the transaction.
      new_balance:
        type: number
        description: Updated account balance after the transaction.
max_value:
  name: max_value
  description: 'This tool belongs to the Math API, which provides various mathematical
    operations. Tool description: Find the maximum value in a list of numbers.'
  parameters:
    type: object
    properties:
      numbers:
        type: array
        items:
          type: number
        description: List of numbers to find the maximum from.
    required:
    - numbers
  output_parameters:
    type: object
    properties:
      result:
        type: number
        description: The maximum value in the list.
get_available_stocks:
  name: get_available_stocks
  description: 'This tool belongs to the trading system, which allows users to trade
