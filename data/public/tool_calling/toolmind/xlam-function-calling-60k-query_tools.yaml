  parameters:
    type: object
    properties:
      translation:
        description: The translation/version of the Bible (e.g., 'NIV', 'KJV').
      verse_end:
        description: The ending verse number of the passage.
      chapter:
        description: The chapter number of the passage.
      verse_start:
        description: The starting verse number of the passage.
      book:
        description: The book of the Bible from which the passage is fetched (e.g.,
          'Genesis', 'John').
validate_username:
  name: validate_username
  description: Validates an Instagram username using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username to be validated.
get_current_status_for_given_flag:
  name: get_current_status_for_given_flag
  description: Fetches the current status for a given flag code using the Toolbench
