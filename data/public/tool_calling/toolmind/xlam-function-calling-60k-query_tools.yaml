  parameters:
    type: object
    properties:
      enddate:
        description: The end date for the data retrieval in the format 'YYYYMMDD'.
          Defaults to '20220901'.
      interval:
        description: The interval for the data points in minutes. Defaults to '30'.
      startdate:
        description: The start date for the data retrieval in the format 'YYYYMMDD'.
          Defaults to '20220101'.
retrieve_compensation:
  name: retrieve_compensation
  description: Fetches the full compensation details associated with a given ID using
