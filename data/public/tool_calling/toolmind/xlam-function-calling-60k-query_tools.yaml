find_zip_codes_by_city:
  name: find_zip_codes_by_city
  description: This function returns all zip codes associated with a given city. If
    multiple cities share the same name, zip codes for all those cities will be returned.
  parameters:
    type: object
    properties:
      accept:
        description: Requested content type.
      city:
        description: The name of the city for which to find zip codes.
      x_traceid:
        description: A trace ID that is copied to the API response header. Default
          is 'optional_abc123'.
points_point_forecast_hourly:
  name: points_point_forecast_hourly
  description: Fetches hourly weather forecast data for a given geographical point
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      point:
        description: A string specifying the geographical point in the format "latitude,longitude".
country_region_details:
  name: country_region_details
  description: Retrieve the details of a specific country region, including the number
    of cities.
  parameters:
    type: object
    properties:
      regioncode:
        description: An ISO-3166 or FIPS region code identifying the region.
      countryid:
        description: An ISO-3166 country code or WikiData ID identifying the country.
      asciimode:
        description: If set to True, display results using ASCII characters. Defaults
          to None.
      languagecode:
        description: The code of the language in which to display results. Defaults
          to None.
revise:
  name: revise
  description: Revise and correct the given text using a specified content type and
    API key.
  parameters:
    type: object
    properties:
      content_type:
        description: The content type of the text to be processed.
      text:
        description: The text to be revised and corrected.
properties_get_hotel_photos_deprecated:
  name: properties_get_hotel_photos_deprecated
  description: This function fetches all available photos for a given hotel property
    using the specified RapidAPI key.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the property for which to retrieve photos.
        type: integer
search_tweet:
  name: search_tweet
  description: Searches for tweets based on a given query string using the Twitter
    Pack API.
  parameters:
    type: object
    properties:
      q:
        description: The query string to search for in tweets.
      cursor:
        description: The cursor string to paginate through results. Defaults to 'scroll:thGAVUV0VFVBaegLaxgNKXty0WloC2kd7Tl7ctEnEVzId6FYCJehgEVVNFUjUBFQAVAAA='.
      count:
        description: The number of tweets to retrieve. Defaults to 10.
teams_standings_short:
  name: teams_standings_short
  description: Fetch the team standings based on the given team ID.
  parameters:
    type: object
    properties:
      timezone:
        description: Time offset from UTC.
        type: integer
      locale:
        description: The locale code to localize the response.
      team_id:
        description: The unique identifier for the team.
        type: integer
seasonal_advanced_team_statistics:
  name: seasonal_advanced_team_statistics
  description: Retrieves season-wide advanced team statistics for a basketball match,
    including home and away team filters.
  parameters:
    type: object
    properties:
      matchid:
        description: The ID of the basketball match for which to retrieve the statistics.
        type: integer
show_moves:
  name: show_moves
  description: Fetches and returns the moves of a specific character from the Marvel
    vs Capcom 2 API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the character whose moves are to be retrieved.
search_for_a_item:
  name: search_for_a_item
  description: Searches for an item in a League of Legends database based on given
    criteria.
  parameters:
    type: object
    properties:
      champsynergy:
        description: The champion synergy to filter items by.
      itemsynergy:
        description: The item synergy to filter items by.
      price:
        description: The price category to filter items by.
      name:
        description: The name of the item to search for. Defaults to 'sword'.
get_san_francisco_chronicle_news:
  name: get_san_francisco_chronicle_news
  description: Fetches news from the San Francisco Chronicle using the given keyword.
  parameters:
    type: object
    properties:
      sfchronicle:
        description: A keyword to filter news articles. If provided, only articles
          containing this keyword will be fetched. Defaults to None.
best_players:
  name: best_players
  description: Fetches the best players for a given event using the provided event
    ID.
  parameters:
    type: object
    properties:
      event_id:
        description: The ID of the event for which the best players are needed.
        type: integer
related_videos:
  name: related_videos
  description: Fetches videos related to a specified video using the YouTube V3 API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the video for which to fetch related videos.
      x_cachebypass:
        description: Cache bypass parameter; pass '1' to bypass the cache. Defaults
          to None.
      geo:
        description: ISO 3166-2 country code of the region (e.g., 'US', 'UK', 'CA').
          Defaults to 'US'.
      lang:
        description: Locale/language for the request (e.g., 'en', 'gb', 'hi'). Defaults
          to 'en'.
      token:
        description: Pagination token for fetching additional results. Defaults to
          None.
get_horoscope_multilingual:
  name: get_horoscope_multilingual
  description: Fetches horoscope information in the specified language for a given
    sign, period, and type.
  parameters:
    type: object
    properties:
      language:
        description: 'The language for the horoscope. Supported languages are:'
      period:
        description: The period for which the horoscope is requested (e.g., 'daily',
          'weekly').
      sign:
        description: The astrological sign for which the horoscope is requested (e.g.,
          'aries', 'taurus').
aliexpress_item_shipping_detail:
  name: aliexpress_item_shipping_detail
  description: Retrieve detailed shipping information for a specific Aliexpress item.
  parameters:
    type: object
    properties:
      itemid:
        description: The Aliexpress product ID.
        type: integer
      quantity:
        description: The quantity of the item to consider for shipping. Defaults to
          1.
      sellerid:
        description: The ID of the seller. Defaults to None.
      ext:
        description: Additional parameter obtained from one of the Item Detail Endpoints
          for more accurate shipping options. Defaults to a predefined value.
      locale:
        description: Locale parameter for displaying titles and other content in the
          selected language. Defaults to None.
      region:
        description: Region parameter to accurately get shipping costs and other promotions
          for a specific geographic location. Defaults to None.
      currency:
        description: Currency parameter for displaying the product price in the selected
          currency. Defaults to None.
get_a_specific_picture:
  name: get_a_specific_picture
  description: Fetches a specific motivational picture using the provided picture
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the motivational picture to fetch.
image_anime_diffusion:
  name: image_anime_diffusion
  description: Generates anime-style images based on the given parameters using the
    Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      steps:
        description: The number of diffusion steps, with a maximum of 50.
        type: integer
      image_num:
        description: The number of images to generate, with a maximum of 4.
        type: integer
      width:
        description: The width of the generated image(s), with a maximum of 1024 pixels.
        type: integer
      cfg:
        description: The configuration scale for image generation, with a maximum
          of 20.
        type: integer
      height:
        description: The height of the generated image(s), with a maximum of 1024
          pixels.
        type: integer
      prompt:
        description: A textual description of the desired image content.
      negative_prompt:
        description: A textual description of elements to avoid in the image. This
          parameter is not required in version 2.
get_city_by_filter:
  name: get_city_by_filter
  description: Fetches city data based on the given city ID through the RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The city ID used to filter and retrieve city data.
        type: integer
country_region_cities:
  name: country_region_cities
  description: Fetches a list of cities within a specified region of a given country
    from the GeoDB API.
  parameters:
    type: object
    properties:
      countryid:
        description: An ISO-3166 country code or WikiData ID.
      regioncode:
        description: An ISO-3166 or FIPS region code.
      limit:
        description: The maximum number of results to retrieve. Defaults to None.
      hateoasmode:
        description: Include HATEOAS-style links in results. Defaults to None.
      asciimode:
        description: Display results using ASCII characters. Defaults to None.
      nameprefixdefaultlangresults:
        description: Match on names in the default language if a non-default language
          is requested when prefix-matching. Defaults to None.
      timezoneids:
        description: Only include cities in these time zones. Comma-separated values.
          Defaults to None.
      nameprefix:
        description: Only include cities whose names start with this prefix. If languagecode
          is set, the prefix will be matched on the name as it appears in that language.
          Defaults to None.
      types:
        description: 'Only include cities of these types (comma-separated): CITY,
          ADM2. Defaults to None.'
      minpopulation:
        description: Only include cities with at least this population. Defaults to
          None.
      languagecode:
        description: Display results in this language. Defaults to None.
      offset:
        description: The zero-based offset into the results. Defaults to None.
      maxpopulation:
        description: Only include cities with no more than this population. Defaults
          to None.
      includedeleted:
        description: 'Whether to include any cities marked deleted. Options are: ALL,
          SINCE_YESTERDAY, SINCE_LAST_WEEK, NONE. Defaults to None.'
      sort:
        description: "How to sort the results. Format: \xB1SORT_FIELD,\xB1SORT_FIELD\
          \ where SORT_FIELD = elevation, name, population. Defaults to None."
shorts_sound_attribution:
  name: shorts_sound_attribution
  description: Fetches the Shorts original sound attribution listing from the YouTube
    API.
  parameters:
    type: object
    properties:
      x_cachebypass:
        description: Cache bypass value, must be set to '1' if used.
      lang:
        description: Language code for localized results, such as 'en', 'gb', 'hi',
          etc.
      geo:
        description: ISO 3166-2 country code of the region, such as 'US' (default),
          'UK', 'CA', 'IN', etc.
      params:
        description: Attribution parameter available in the Shorts info endpoint;
          defaults to a specific encoded string.
      token:
        description: Pagination token for retrieving additional results.
      is_id:
        description: Shorts video ID to be provided if the params value is not available.
get_token_forwarding_transactions:
  name: get_token_forwarding_transactions
  description: Fetch token forwarding transactions based on specified query parameters.
  parameters:
    type: object
    properties:
      updatedlt:
        description: 'A timestamp to fetch transactions last updated before this time.
          Format: ''YYYY-MM-DD HH:MM:SS''.'
      updatedgte:
        description: 'A timestamp to fetch transactions last updated after this time.
          Format: ''YYYY-MM-DD HH:MM:SS''.'
      is_id:
        description: An identifier to fetch specific transactions.
      offset:
        description: The number of items to skip before starting to collect the result
          set. Default is 0.
        type: integer
      limit:
        description: The maximum number of items to return. Default is 100.
        type: integer
nearby_arcgis:
  name: nearby_arcgis
  description: Returns nearby places of a specified type sorted by distance from the
    origin coordinates in ascending order using the ArcGIS API.
  parameters:
    type: object
    properties:
      lng:
        description: Longitude of the origin point.
        type: integer
      lat:
        description: Latitude of the origin point.
        type: integer
      radius:
        description: Search radius in meters. Defaults to 500. Maximum is 50,000.
leagueeventsbyroundandslug:
  name: leagueeventsbyroundandslug
  description: Fetches match details for a specified round and slug in a handball
    unique tournament season.
  parameters:
    type: object
    properties:
      slug:
        description: The round slug.
      tournamentid:
        description: The unique tournament ID for which to retrieve the league's events.
        type: integer
      round:
        description: The round number.
        type: integer
      seasonid:
        description: The season ID for which to retrieve the league's events.
        type: integer
get_calculate_investment:
  name: get_calculate_investment
  description: Calculates various investment returns based on given parameters using
    an external API.
  parameters:
    type: object
    properties:
      rate:
        description: The annual interest rate of the investment in percentage.
        type: integer
      principal:
        description: The initial amount of money invested.
        type: integer
      time:
        description: The duration of the investment in months.
        type: integer
      compounding:
        description: The frequency of compounding interest. Valid options are 'yearly',
          'semi-annually', 'quarterly', and 'monthly'. Default is 'yearly'.
      in_currency:
        description: The currency of the investment. Default is 'USD'.
      format:
        description: Whether to format the result. Valid options are 'yes' and 'no'.
          Default is 'yes'.
      to_currency:
        description: The currency to convert the result into. Default is 'USD'.
breweries:
  name: breweries
  description: Fetches a list of breweries from the Open Brewery DB API based on given
    search criteria.
  parameters:
    type: object
    properties:
      by_state:
        description: Search for breweries by state. Defaults to 'NY'.
      by_name:
        description: Search for breweries by name. Defaults to 'cooper'.
      by_type:
        description: 'Filter breweries by type. Must be one of: ''micro'', ''regional'',
          ''brewpub'', ''large'', ''planning'', ''bar'', ''contract'', ''proprietor''.
          Defaults to ''micro''.'
      sort:
        description: Sort the breweries. Use '+' for ascending order and '-' for descending
          order. Comma-separated values can be used to sort by multiple fields. Defaults
          to None.
      by_tag:
        description: 'Filter breweries by tag. Must be one of: ''dog-friendly'', ''patio'',
          ''food-service'', ''food-truck'', ''tours''. Defaults to ''patio''.'
mfs_family_list:
  name: mfs_family_list
  description: Fetch a list of mutual fund families from the Twelve Data API, optionally
    filtering by country and fund family.
  parameters:
    type: object
    properties:
      country:
        description: Filter results by country name or alpha code. Defaults to None.
      fund_family:
        description: Filter results by the investment company that manages the fund.
          Defaults to None.
verify_plate_number_location:
  name: verify_plate_number_location
  description: Fetches information about the state and LGA (Local Government Area)
    associated with a given Nigerian plate number code.
  parameters:
    type: object
    properties:
      platecodeloc:
        description: The first three characters of a Nigerian plate number.
get_manga:
  name: get_manga
  description: Retrieves manga details using the MangaVerse API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the manga to retrieve. Default is '647fed35c71c2c9122b318f8'.
stock_v2_key_stats_get_operating_efficiency:
  name: stock_v2_key_stats_get_operating_efficiency
  description: Fetch operating efficiency key stats from the provided performance
    ID using the Morningstar API.
  parameters:
    type: object
    properties:
      performanceid:
        description: The value of the performanceId field obtained from the /auto-complete,
          /get-summary, or /get-movers endpoints.
videos:
  name: videos
  description: Retrieves YouTube video details based on the provided parameters.
  parameters:
    type: object
    properties:
      part:
        description: The part parameter specifies a comma-separated list of one or
          more video resource properties that the API response will include.
      is_id:
        description: The ID of the YouTube video for which details are to be fetched.
      x_cachebypass:
        description: Set this parameter to '1' to bypass the cache. Default is None.
measure_distance_reverse:
  name: measure_distance_reverse
  description: Calculates the distance between two addresses in Cameroon using the
    specified unit of measurement.
  parameters:
    type: object
    properties:
      stop_address:
        description: The destination address for which the distance needs to be calculated.
      start_address:
        description: The starting address for which the distance needs to be calculated.
      unit:
        description: The unit of distance measurement. Valid options are 'km' (default),
          'mi', 'ft', and 'yd'.
organic_results:
  name: organic_results
  description: Fetches JSON data of organic search results from Google using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      query:
        description: Search query string.
      device:
        description: Device type for the search results, e.g. 'desktop', 'mobile'.
          Defaults to 'desktop'.
      hl:
        description: Language for the search results. Defaults to 'en'.
      html:
        description: HTML content toggle. Defaults to None.
      duration:
        description: Duration filter, e.g. 'd', 'w', 'm', 'y'. Defaults to None.
      lr:
        description: Language restrict parameter. Defaults to None.
      safe:
        description: Safe search filter. Defaults to None.
      uule:
        description: Encoded location parameter. Defaults to None.
      nfpr:
        description: No forced personalized results toggle. Defaults to '0'.
      num:
        description: Number of search results to return. Defaults to '10'.
      tbs:
        description: Search filter tools, e.g. 'qdr:h', 'li:1'. Defaults to None.
      gl:
        description: Geolocation for the search results. Defaults to 'us'.
      page:
        description: Page number of the search results. Defaults to '0'.
getphonesbybrandid:
  name: getphonesbybrandid
  description: Fetches all phone IDs for a specific brand using the given brand ID.
  parameters:
    type: object
    properties:
      brandid:
        description: The unique identifier for the brand whose phone IDs are to be
          retrieved.
        type: integer
suggested_videos:
  name: suggested_videos
  description: Fetches suggested videos related to a specified video from the YouTube
    API.
  parameters:
    type: object
    properties:
      part:
        description: The part parameter specifies a comma-separated list of one or
          more search resource properties that the API response will include.
      relatedtovideoid:
        description: The ID of the video for which the related videos are being fetched.
      maxresults:
        description: The maximum number of results to retrieve. Defaults to 50.
matches_v2_get_statistics:
  name: matches_v2_get_statistics
  description: Fetches the statistics for a match based on the provided category and
    event ID (eid).
  parameters:
    type: object
    properties:
      category:
        description: The sport category of the match. Accepted values are 'soccer',
          'cricket', 'basketball', 'tennis', or 'hockey'.
      eid:
        description: The event ID of the match. This is typically obtained from match
          listing or competition detail endpoints.
        type: integer
get_general_game_information:
  name: get_general_game_information
  description: Retrieves the most general information for a specified NBA game, including
    away team, home team, game date, and game start time. All times are in Eastern
    (ET) time zone.
  parameters:
    type: object
    properties:
      gameid:
        description: The unique identifier for the NBA game. This can be retrieved
          from calls like `getNBAGamesForDate` or `getNBATeamSchedule`.
player_heatmap:
  name: player_heatmap
  description: Fetches the heatmap data for a specific player in a given season and
    tournament.
  parameters:
    type: object
    properties:
      player_id:
        description: The unique identifier for the player.
        type: integer
      seasons_id:
        description: The identifier for the specific season.
        type: integer
      unique_tournament_id:
        description: The identifier for the specific tournament.
        type: integer
query_for_postal_code_boundary_by_location:
  name: query_for_postal_code_boundary_by_location
  description: Queries the boundary of a postal code based on the given geographic
    coordinates.
  parameters:
    type: object
    properties:
      longitude:
        description: The longitudinal coordinate of the location.
        type: integer
      latitude:
        description: The latitudinal coordinate of the location.
        type: integer
cake_ingredient:
  name: cake_ingredient
  description: Fetches a cake recipe containing a specified ingredient from the Recipe
    Finder API.
  parameters:
    type: object
    properties:
      ingredient:
        description: The specific ingredient to be included in the cake recipe.
getCurrentTime:
  name: getCurrentTime
  description: Returns the current local time in ISO 8601 format.
  parameters:
    type: object
    properties:
      timezone:
        type: string
        description: The timezone for which the current time is requested, in the
          format of 'Area/Location' (e.g., 'America/New_York'). If not provided, defaults
          to the server's local timezone.
      include_date:
        type: boolean
        description: Determines whether the date should be included in the time string.
          If set to true, the date is included. Defaults to false.
listallairports:
  name: listallairports
  description: Fetches a list of airports from the World Airports Directory API using
    the provided parameters.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of airports to return.
        type: integer
      page:
        description: The page number to retrieve.
        type: integer
      sortby:
        description: The field and order to sort the results by in the format `field:order`
          (e.g., `name:asc`, `name:desc`).
placessearchinboundingbox:
  name: placessearchinboundingbox
  description: Searches for places within a bounding box defined by the northeast
    and southwest coordinates in GeoJSON format.
  parameters:
    type: object
    properties:
      northeast:
        description: Coordinates of the north-east corner of the bounding box, provided
          as a string in the format 'latitude,longitude'.
      southwest:
        description: Coordinates of the south-west corner of the bounding box, provided
          as a string in the format 'latitude,longitude'.
      intersect:
        description: Whether to include areas that intersect with the bounding box.
          Defaults to None.
get_user_followings:
  name: get_user_followings
  description: Fetches the followings of a user from the Twitter API.
  parameters:
    type: object
    properties:
      count:
        description: The number of followings to fetch.
      user:
        description: The Twitter user identifier.
      cursor:
        description: The pagination cursor for fetching more data. Defaults to None.
download_property_types:
  name: download_property_types
  description: Downloads a list of property types from the Priceline API.
  parameters:
    type: object
    properties:
      limit:
        description: Limits the number of results from the response. Defaults to 100.
      resume_key:
        description: Resume results from the given ID. Defaults to None.
filter_protein:
  name: filter_protein
  description: Fetches keto recipes within a specified range of protein content.
  parameters:
    type: object
    properties:
      protein_in_grams_lt:
        description: Maximum protein content in grams.
        type: integer
      protein_in_grams_gt:
        description: Minimum protein content in grams.
        type: integer
horse_stats:
  name: horse_stats
  description: Fetches the racing statistics for a specified horse using the RapidAPI
    Horse Racing API.
  parameters:
    type: object
    properties:
      id_horse:
        description: The unique identifier of the horse.
get_elevation:
  name: get_elevation
  description: Gets the elevation for specified latitude and longitude using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude of the location for which the elevation is required.
        type: integer
      lng:
        description: Longitude of the location for which the elevation is required.
        type: integer
get_1_3_list_non_working_days:
  name: get_1_3_list_non_working_days
  description: Fetch the non-working days (weekend days, public holidays, and custom
    dates) between two specified dates for a given country.
  parameters:
    type: object
    properties:
      start_date:
        description: The start date in the format 'YYYY-MM-DD'.
      end_date:
        description: The end date in the format 'YYYY-MM-DD'.
      country_code:
        description: The ISO country code (2 letters). See available countries & configurations.
      configuration:
        description: The name of the preset configuration to be used. Defaults to
          'Federal holidays'.
      profile_id:
        description: Custom profile ID for the request. Defaults to None.
keyword_search_at_coordinates:
  name: keyword_search_at_coordinates
  description: Performs a keyword search at specific geographic coordinates for businesses
    using the Google Local Rank Tracker API.
  parameters:
    type: object
    properties:
      query:
        description: The Google Place ID of the business or the business name to match
          against in results.
      lng:
        description: Grid center coordinate point longitude value.
        type: integer
      lat:
        description: Grid center coordinate point latitude value.
        type: integer
      zoom:
        description: Google Maps zoom level to use for search on each grid point.
          Allowed values are 0-18. Default is 13.
getrecentanimes:
  name: getrecentanimes
  description: Fetches the recent animes from the GoGoAnime API for a given page number.
  parameters:
    type: object
    properties:
      pagenumber:
        description: The page number to fetch recent animes from.
        type: integer
leagueseasons:
  name: leagueseasons
  description: Fetches the seasons of a specific E-Sports league for a given tournament
    ID using the RapidAPI service.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The unique ID of the tournament for which the league's seasons
          are to be retrieved.
        type: integer
match_embed_link:
  name: match_embed_link
  description: Generates a live stream link for a given football match using the provided
    RapidAPI key.
  parameters:
    type: object
    properties:
      matchid:
        description: The unique identifier for the football match.
        type: integer
get_podcast_episodes:
  name: get_podcast_episodes
  description: Fetch podcast episodes including audio, image, and description using
    the username of the podcast.
  parameters:
    type: object
    properties:
      username:
        description: The username of the anchor podcast user. For example, for the
          URL https://anchor.fm/financialfreedomtribe, the username is "financialfreedomtribe".
placessearchinradius:
  name: placessearchinradius
  description: Get places within a specified radius from a given center point in GeoJSON
    format.
  parameters:
    type: object
    properties:
      latitude:
        description: Latitude of the center of the search radius.
        type: integer
      longitude:
        description: Longitude of the center of the search radius.
        type: integer
      radius:
        description: Radius of the search area in miles (min value is 1, max value
          is 50).
        type: integer
restaurants_v2_list:
  name: restaurants_v2_list
  description: Lists restaurants based on various query parameters and filters.
  parameters:
    type: object
    properties:
      queryplacevaluecityid:
        description: The ID of the city to search for restaurants.
        type: integer
      filterpricestart:
        description: Minimum price of the meal.
      queryplacevaluecoordinateslatitude:
        description: Latitude of the geographic location to search around.
      sort:
        description: Sorting criteria, allowed values are 'quality', 'promotion',
          'price', 'popularity', 'avg_rate', 'new_restaurant'.
      querypromotiononly:
        description: Filter to include only promotions (True or False).
      filterrestauranttagidlist:
        description: 'Filter by restaurant tags, separated by commas. Example: ''387,513''.'
      filtersaletypetagidlist:
        description: 'Filter by sale type tags, separated by commas. Example: ''1,3''.'
      filterratestart:
        description: Minimum rating of the restaurants.
      filtergroupedpromotion:
        description: Filter by grouped promotions, allowed values are '20', '25',
          '30', '40', '50', separated by commas.
      pagenumber:
        description: Page number for pagination (default is 1).
      queryplacevaluecoordinateslongitude:
        description: Longitude of the geographic location to search around.
      pagesize:
        description: Number of results per page (default is 10).
      filterpriceend:
        description: Maximum price of the meal.
estimate_ownership_cost:
  name: estimate_ownership_cost
  description: Estimates the ownership cost for a vehicle over the next 5 years based
    on the vehicle's VIN, annual mileage, and starting mileage.
  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number of the car to estimate ownership
          cost for.
      mileage_year:
        description: The estimated number of miles driven per year for the next 5
          years. Defaults to 15,000.
      mileage_start:
        description: The starting mileage of the car. Defaults to 50,000 if unspecified.
ip_to_location:
  name: ip_to_location
  description: Retrieves location details based on the provided IP address using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address for which to get location details. Defaults to
          '179.27.93.248'.
getzip:
  name: getzip
  description: Fetch town information based on a provided ZIP code (Postleitzahl)
    using the RapidAPI.
  parameters:
    type: object
    properties:
      zip:
        description: The ZIP code for which to fetch town information.
        type: integer
fish_api_group:
  name: fish_api_group
  description: Groups available fish data based on the provided metadata property,
    value, and attribute using the Fish API.
  parameters:
    type: object
    properties:
      meta_property:
        description: The metadata property to search for.
      property_value:
        description: The value of the metadata property that will be matched.
      meta_property_attribute:
        description: The attribute of the metadata property to be searched. Defaults
          to 'class'.
alerts_active_area_area:
  name: alerts_active_area_area
  description: Retrieves a list of active weather alerts for a specified area using
    the National Weather Service API. The data is returned in CAP-ATOM format.
  parameters:
    type: object
    properties:
      area:
        description: A valid area for which to retrieve active alerts. Refer to the
          counts endpoint for a list of valid areas.
teams_coaches_teamids:
  name: teams_coaches_teamids
  description: Query baseball team coaches by team IDs using the RapidAPI baseball
    API.
  parameters:
    type: object
    properties:
      teamids:
        description: A string representing one or more team IDs, separated by commas.
          Defaults to '145'.
between_checker:
  name: between_checker
  description: Checks if a given date is between two specified dates using the DateClock
    API.
  parameters:
    type: object
    properties:
      to:
        description: The end date in the format 'YYYY-MM-DD'.
      date:
        description: The date to check in the format 'YYYY-MM-DD'.
      is_from:
        description: The start date in the format 'YYYY-MM-DD'.
get_distance_in_km:
  name: get_distance_in_km
  description: Calculates the great-circle distance between two geographic coordinates
    in kilometers.
  parameters:
    type: object
    properties:
      latb:
        description: Latitude of the first coordinate.
        type: integer
      longb:
        description: Longitude of the first coordinate.
        type: integer
      longa:
        description: Longitude of the second coordinate.
        type: integer
      lata:
        description: Latitude of the second coordinate.
        type: integer
get_all_iata_airport_codes:
  name: get_all_iata_airport_codes
  description: Retrieves IATA airport codes from the RapidAPI service.
  parameters:
    type: object
    properties:
      code:
        description: An optional code to filter the airport codes. Defaults to 1.
v4_sports_sport_scores:
  name: v4_sports_sport_scores
  description: Returns a list of live and upcoming games for a given sport, including
    scores for live and recently completed games.
  parameters:
    type: object
    properties:
      sport:
        description: The sport for which to return games and scores.
      daysfrom:
        description: The number of days in the past from which to return completed
          games. Valid values are integers from 1 to 3. Defaults to 3.
list_playlist_videos:
  name: list_playlist_videos
  description: This function lists available videos of a given YouTube playlist. It
    supports pagination to retrieve multiple pages of results and ensures thumbnails
    are not blurred by age restrictions.
  parameters:
    type: object
    properties:
      nexttoken:
        description: A string token for fetching the next page of data. If not specified,
          the first page of data is returned.
      playlistid:
        description: The ID of the YouTube playlist. Defaults to 'PLeCdlPO-XhWFzEVynMsmosfdRsIZXhZi0'.
      lang:
        description: The language code (ISO-639) for localized results. Defaults to
          'en-US'. Unsupported codes will fallback to 'en-US'.
mapimage:
  name: mapimage
  description: Retrieves a map image with specified parameters such as coordinates,
    scale, size, and various display options.
  parameters:
    type: object
    properties:
      lonlat:
        description: The latitude and longitude in the format "longitude,latitude".
      scale:
        description: The map scale. Valid range is from 6 to 21.
        type: integer
      size:
        description: The image size in the format "width,height" in pixels.
      icon:
        description: Icon settings in the format "[icon_type,longitude,latitude]|...".
          Defaults to None.
      centericon:
        description: Whether to display the center icon (on/off). Defaults to None
          ("off").
      logo:
        description: Whether to display the brand logo (on/off). Defaults to None
          ("off").
      landmarkicon:
        description: Whether to display landmark icons (on/off). Defaults to None
          ("off").
      format:
        description: The output image format, either "image/png" or "image/jpeg".
          Defaults to "image/png".
      resolution:
        description: The image resolution. "1" for standard size, "2" for double size.
          Defaults to "1".
      rotationangle:
        description: The angle to rotate the map. Valid range is from 0 to 359 degrees.
          Defaults to 0.
      routeresultid:
        description: The route result ID to display the route on the map. Defaults
          to None.
      routeicon:
        description: Route icon settings, "0" for none, "1" for standard icons. Defaults
          to "1".
      scaler:
        description: Whether to display the scale (on/off). Defaults to "off".
      bldgname:
        description: Whether to display building names (on/off). Defaults to "off".
      contour:
        description: Whether to display contour lines (on/off). Defaults to "on".
      target:
        description: The map display content. "1" for background, "2" for notes, "3"
          for both. Defaults to "3".
      mapstyle:
        description: Map design parameter in the format "[design]_[note_size]". Defaults
          to "std_pc".
math_gcd:
  name: math_gcd
  description: Calculates the greatest common divisor (GCD) of two non-negative integers.
  parameters:
    type: object
    required:
    - a
    - b
    properties:
      a:
        type: integer
        description: The first non-negative integer for which the GCD is to be computed.
      b:
        type: integer
        description: The second non-negative integer for which the GCD is to be computed.
api_v1_fastings:
  name: api_v1_fastings
  description: Fetches a list of sunnah fastings based on provided filters.
  parameters:
    type: object
    properties:
      day:
        description: Day of the month to filter the fastings.
      year:
        description: Year to filter the fastings.
      month:
        description: Month to filter the fastings.
      category_id:
        description: Category ID to filter the fastings.
      type_id:
        description: Type ID to filter the fastings.
alldetails_185_225_233_110_30015:
  name: alldetails_185_225_233_110_30015
  description: Retrieves all details from a server given its IP address and port using
    the VRising Server Query API.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address of the server.
      port:
        description: The port number of the server.
post_search:
  name: post_search
  description: Searches Reddit posts using given search query parameters via the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      query:
        description: 'The search query string. Supports the following term types:'
      after:
        description: The previous result's sort key value for pagination.
CoronavirusNewsAPI:
  name: CoronavirusNewsAPI
  description: Retrieve the latest news related to the COVID-19 pandemic.
  parameters:
    type: object
    properties:
      lang:
        description: The language of the news articles (e.g., 'en' for English).
        type: string
    required:
    - lang
HealthNewsAPI:
  name: HealthNewsAPI
  description: This API retrieves health news from Google News based on the specified
    language region.
  parameters:
    type: object
    properties:
      lr:
        description: Language region, e.g., en-US
        type: string
    required:
    - lr
Newspapers:
  name: Newspapers
  description: Lists the newspapers currently supported by the news media platform
  parameters:
    type: object
    properties:
      language:
        description: The language to filter the newspapers by
        type: string
      region:
        description: The region to filter the newspapers by
        type: string
    required:
    - language
FilterKetoRecipesbyProtein:
  name: FilterKetoRecipesbyProtein
  description: Filters keto recipes based on the protein content within a specified
    range.
  parameters:
    type: object
    properties:
      protein_in_grams__lt:
        description: Less than protein value in grams
        type: number
      protein_in_grams__gt:
        description: Greater than protein value in grams
        type: number
    required:
    - protein_in_grams__lt
    - protein_in_grams__gt
GetAllConsumerGoodswithCategories:
  name: GetAllConsumerGoodswithCategories
  description: Retrieve a list of consumer goods along with their respective categories
    from the Commerce domain.
  parameters:
    type: object
    properties: {}
GetSportEvents:
  name: GetSportEvents
  description: Retrieve the number of sport events for a specific locale and timezone
  parameters:
    type: object
    properties:
      locale:
        description: The locale to retrieve data in (e.g., 'en_INT')
        type: string
      timezone:
        description: The timezone to adjust the event strings (e.g., -4 for Eastern
          Standard Time)
        type: number
    required:
    - locale
    - timezone
MediaWatch:
  name: MediaWatch
  description: Retrieve a video playlist of live sports scores for a given locale
    and timezone.
  parameters:
    type: object
    properties:
      locale:
        description: The locale to retrieve the video playlist for (e.g., EN, FR,
          ES, etc.).
        type: string
      timezone:
        description: The timezone offset from UTC to retrieve the video playlist for.
        type: number
    required:
    - locale
    - timezone
GetCoordinatedUniversalTime:
  name: GetCoordinatedUniversalTime
  description: Retrieves the current Coordinated Universal Time (UTC) and possibly
    other related information.
  parameters:
    type: object
    properties:
      location:
        description: The location for which to retrieve the UTC time.
        type: string
      format:
        description: The format of the returned UTC time.
        type: string
    required:
    - location
WorldTimeAPI:
  name: WorldTimeAPI
  description: Returns the current string and time by city/state/country, location
    coordinates (latitude/longitude), or timezone.
  parameters:
    type: object
    properties:
      timezone:
        description: Timezone of desired location (e.g. Europe/London).
        type: string
      lon:
        description: Longitude of desired location.
        type: string
      lat:
        description: Latitude of desired location.
        type: string
      state:
        description: US state name or 2-letter abbreviation (for United States cities
          only).
        type: string
      country:
        description: Country name or 2-letter country code.
        type: string
      city:
        description: City name.
        type: string
security.access_audit:
  name: security.access_audit
  description: Generates a report of access events within a specified time frame for
    auditing purposes in a data security context.
  parameters:
    type: object
    properties:
      time_frame:
        type: object
        properties:
          start_date:
            type: string
            format: date
            description: Start date of the auditing period in YYYY-MM-DD format.
          end_date:
            type: string
            format: date
            description: End date of the auditing period in YYYY-MM-DD format.
        required:
        - start_date
        - end_date
      access_types:
        type: array
        items:
          type: string
          enum:
          - read
          - write
          - delete
          description: Type of access events to include in the report.
        description: List of access event types to audit.
    required:
    - time_frame
GetHelp:
  name: GetHelp
  description: Retrieve help information about available resources in HTML format.
  parameters:
    type: object
    properties:
      resource:
        description: The name of the resource to get help for.
        type: string
    required:
    - resource
GetProtocols:
  name: GetProtocols
  description: Retrieves a list of protocols supported by the tool, allowing for filtering
    by chain ID or searching by query.
  parameters:
    type: object
    properties:
      q:
        description: Search parameter
        type: string
      chain_id:
        description: Supported chain ID
        type: string
get_specific_player:
  name: get_specific_player
  description: Retrieves information for a specific player from the NBA API using
    their player ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the player to retrieve.
        type: integer
properties_count:
  name: properties_count
  description: Count the total number of properties available based on the given search
    parameters and filters.
  parameters:
    type: object
    properties:
      zipcodes:
        description: Postal codes, separated by commas for multiple values (e.g.,
          '75,13'). Either `zipcodes` or `districtids` is required.
      bedrooms:
        description: Filter by number of bedrooms (1-5), separated by commas for multiple
          values (e.g., '2,3').
      maximumlivingarea:
        description: Filter by maximum living area.
      rooms:
        description: Filter by number of bedrooms (1-5), separated by commas for multiple
          values (e.g., '2,3').
      maximumgroundarea:
        description: Filter by maximum ground area.
      sortby:
        description: 'Sort by criterion. One of the following:'
      includenewconstructions:
        description: Whether to include new constructions in the listing.
      maximumprice:
        description: Filter by maximum price.
      transactiontype:
        description: 'Type of transaction. One of the following:'
      minimumgroundarea:
        description: Filter by minimum ground area.
      minimumfloor:
        description: Filter by minimum number of floors.
      districtids:
        description: District IDs, separated by commas for multiple values (e.g.,
          '133051,133137'). Either `districtids` or `zipcodes` is required.
      minimumlivingarea:
        description: Filter by minimum living area.
      maximumfloor:
        description: Filter by maximum number of floors.
      realtytypes:
        description: 'Type of realty. One of the following:'
convert_a_unit:
  name: convert_a_unit
  description: Converts a unit from one measurement to another using the Unit Measurement
    Conversion API.
  parameters:
    type: object
    properties:
      fromvalue:
        description: The value to be converted.
      tounit:
        description: The unit to which the value should be converted.
      fromunit:
        description: The original unit of the value.
convert_currency:
  name: convert_currency
  description: Converts a specified amount from one currency to another using the
    RapidAPI currency converter.
  parameters:
    type: object
    properties:
      amount:
        description: The amount of money to convert.
        type: integer
      is_from:
        description: The source currency code.
      to:
        description: The target currency code.
getinfo:
  name: getinfo
  description: Fetches information about a given mobile number using the Ajith Indian
    Mobile Info API.
  parameters:
    type: object
    properties:
      mobno:
        description: A 10-digit mobile number to fetch information for.
        type: integer
get_a_specific_movie_by_id:
  name: get_a_specific_movie_by_id
  description: Fetch detailed information of a specific movie by its IMDb ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The IMDb ID of the specific movie to fetch.
team_squad:
  name: team_squad
  description: Fetch the list of players in a specified basketball team. Optionally,
    provide a tournament ID for national teams.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the basketball team.
        type: integer
      tournamentid:
        description: The ID of the tournament. Required for national teams but optional
          for club teams.
retrieve_listings:
  name: retrieve_listings
  description: Fetches a list of listings from the Blur API based on provided parameters.
  parameters:
    type: object
    properties:
      pagesize:
        description: Number of listings to retrieve per page.
        type: integer
      pagenumber:
        description: Page number to retrieve. Defaults to 1.
      orderby:
        description: Order by which the listings should be sorted, either 'ASC' for
          ascending or 'DESC' for descending. Defaults to 'ASC'.
      contractaddress:
        description: Specific contract address to filter listings by. Defaults to
          None.
random_google:
  name: random_google
  description: Returns a random place of a specified type within a given radius around
    the provided latitude and longitude.
  parameters:
    type: object
    properties:
      lat:
        description: The latitude of the location around which to search for places.
        type: integer
      lng:
        description: The longitude of the location around which to search for places.
        type: integer
      radius:
        description: The search radius in meters. Default is 500.
retrieve_asset:
  name: retrieve_asset
  description: Retrieve information about a specific NFT from the Blur API.
  parameters:
    type: object
    properties:
      contractaddress:
        description: The contract address of the NFT.
      tokenid:
        description: The token ID of the NFT.
receive_the_credit_card_data:
  name: receive_the_credit_card_data
  description: Fetch credit card data from a simulated API based on the specified
    card type.
  parameters:
    type: object
    properties:
      visa_type:
        description: Type of visa card to generate. Defaults to 'visa'. Valid options
          include 'amex', 'diners', 'discover', 'jcb', 'jcb15', 'jcb16', 'maestro',
          'mastercard', 'visa', 'visa13', 'visa16', 'visa19'.
historical_weather:
  name: historical_weather
  description: Fetch historical weather data for a specific date and location within
    the past 8 years.
  parameters:
    type: object
    properties:
      date:
        description: The UTC day of the data in the past in `YYYY-MM-DD` format.
      lat:
        description: 'Latitude in the following format: `12N`, `12.3N`, `12.3`, `13S`,
          `13.2S`, `-13.4`. If not provided, `place_id` must be specified. Default
          is ''37.81021''.'
      place_id:
        description: Identifier of a place. If not provided, `lat` and `lon` must
          be specified. Default is None.
      units:
        description: 'Unit system to be used. Available values are:'
      lon:
        description: 'Longitude in the following format: `12E`, `12.3E`, `12.3`, `13W`,
          `13.2W`, `-13.4`. If not provided, `place_id` must be specified. Default
          is ''-122.42282''.'
get_all_motivational_quotes:
  name: get_all_motivational_quotes
  description: Fetch all motivational quotes with optional pagination support.
  parameters:
    type: object
    properties:
      skip:
        description: The number of items to skip before starting to collect the result
          set.
      limit:
        description: The number of quotes to return.
get_animes:
  name: get_animes
  description: Retrieves a list of animes based on specified search criteria and filters
    from the RapidAPI Anime API.
  parameters:
    type: object
    properties:
      year_greater:
        description: Find animes released after the specified year.
      media_type:
        description: Filter by media type (e.g., music, tv, ona, ova, movie, special).
      studio:
        description: Filter by studio name.
      year_less:
        description: Find animes released before the specified year.
      nsfw:
        description: Include NSFW content if set.
      status:
        description: Filter by anime status (e.g., currently_airing, finished_airing,
          not_yet_aired).
      limit:
        description: Limit the number of results.
      q:
        description: Search for animes by title in English or Japanese.
      genre:
        description: Filter by genre.
      sort:
        description: Specify sort order, True for ascending and False for descending.
      offset:
        description: Number of results to skip.
      season:
        description: Filter by season.
      fields:
        description: Specify the fields to return (e.g., id, title, main_picture,
          etc.).
      year_equal:
        description: Filter by animes released in the specified year.
      source:
        description: Filter by source material (e.g., manga, visual_novel, novel,
          etc.).
      order:
        description: Order results by a specific field.
search_in_area:
  name: search_in_area
  description: Search for businesses in a specified geographic area defined by a central
    coordinate point and zoom level.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude of the center coordinate point of the search area.
      zoom:
        description: Zoom level on which to conduct the search.
      query:
        description: Search query or keyword (e.g., 'Bars and pubs', 'Plumbers').
      lng:
        description: Longitude of the center coordinate point of the search area.
      x_user_agent:
        description: Device type for the search. Defaults to 'desktop'.
      region:
        description: Query region code. Defaults to 'us'.
      language:
        description: Language code for the results. Defaults to 'en'.
      subtypes:
        description: Comma-separated list of specific business subtypes (e.g., 'Plumber,Carpenter,Electrician').
      fields:
        description: Comma-separated list of business fields to include in the response.
      limit:
        description: Maximum number of businesses to return (1-500). Defaults to '20'.
pl_car_averages:
  name: pl_car_averages
  description: Fetches and returns Polish car averages for a given vehicle's year,
    make, and model.
  parameters:
    type: object
    properties:
      year:
        description: The year of the car.
      make:
        description: The make of the car.
      model:
        description: The model of the car.
industries_list_best_performing:
  name: industries_list_best_performing
  description: Retrieves a list of the best performing industries for a given region.
  parameters:
    type: object
    properties:
      regionid:
        description: The ID of the region for which to list best performing industries.
        type: integer
      industrytype:
        description: The time period for evaluating industry performance. One of 'today',
          '5d', '1m', or '3m'. Default is 'today'.
      pagesize:
        description: The number of results per page. Maximum is 20. Default is 20.
      pageindex:
        description: The index of the page to retrieve. Default is 1.
      direction:
        description: The order direction of the results. Use -1 for descending and
          1 for ascending. Default is -1.
listing_availability:
  name: listing_availability
  description: Retrieve listing availability and stay length rules for a specified
    month and year from the Airbnb API.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to retrieve listing availability.
        type: integer
      is_id:
        description: The unique identifier for the listing.
      month:
        description: The month for which to retrieve listing availability.
        type: integer
driver_standings:
  name: driver_standings
  description: Fetches and returns the driver standings for a given Formula 1 season.
  parameters:
    type: object
    properties:
      season_id:
        description: The ID of the F1 season for which to retrieve driver standings.
        type: integer
api_v1_addresses:
  name: api_v1_addresses
  description: Fetches address information using the provided postcode and house number
    from the RapidAPI Address Validation API.
  parameters:
    type: object
    properties:
      postcode:
        description: The postcode of the address.
      housenumber:
        description: The house number of the address.
        type: integer
      housenumbersuffix:
        description: The suffix of the house number. Defaults to 'B'.
listings_by_lat_lng:
  name: listings_by_lat_lng
  description: Retrieve Airbnb listings based on geographical coordinates, filtered
    by specified criteria.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude of the point from which to search for listings.
        type: integer
      lng:
