      header1:
        description: The first header to include in the request. Defaults to '1'.
      query2:
        description: The second query parameter to include in the request. Defaults
          to '2'.
get_date_and_time_by_timezone:
  name: get_date_and_time_by_timezone
  description: Gets the current date and time for a specified timezone using the Location
