######################################################
#                   MANDATORY FIELDS
######################################################
name: core/conversation

######################################################
#                   RESERVED FIELDS
######################################################
blocks:
  - name: generator
    type: ollama
    model_id_or_path: granite4:3b
    temperature: 0.0
    max_tokens: 2048
    num_ctx: 8192

# ConcurrentGenerationDataBuilder field
# max_workers = outer thread pool size. Batch size per worker is controlled by seed_batch_size on the task.
max_workers: 2

metadata:
  version: 1.0
