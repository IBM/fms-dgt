      range:
        description: The range of the chart positions to be retrieved.
sendsms:
  name: sendsms
  description: Sends an SMS message using the Rivet SMS service.
  parameters:
    type: object
    properties:
      senderid:
        description: The sender ID assigned by Rivet SMS. Obtain it from https://app.rivet.solutions/Management/ManageSenderID.
      clientid:
        description: The Rivet SMS API client ID. Obtain it from https://app.rivet.solutions/ApiDocument/ApiDocs#.
      mobilenumbers:
        description: The recipient mobile numbers in the format '971223344566'. Multiple
          recipients can be specified, separated by commas. Include the country code
          without preceding 00 or +.
      message:
        description: The content of the SMS message to be sent.
      apikey:
        description: The Rivet SMS API key. Obtain it from https://app.rivet.solutions/ApiDocument/ApiDocs#.
      content_type:
        description: The content type of the message. Defaults to 'application/json'.
      is_unicode:
        description: Indicates whether the message should be sent with Unicode encoding.
          Defaults to None.
      scheduletime:
        description: Specifies the scheduled time to send the message in the format
          'yyyy-MM-dd HH:MM'. Defaults to None.
      groupid:
        description: Valid group ID of the current user for group messages. Defaults
          to None.
      is_flash:
        description: Indicates whether the message is a flash message. Defaults to
          None.
statistics_esports:
  name: statistics_esports
  description: Fetches esports statistics for a given event using the RapidAPI service.
  parameters:
    type: object
    properties:
      event_id:
        description: The identifier for the esports event.
