  parameters:
    type: object
    properties:
      ticket:
        description: The unique identifier for the syntax check result to be retrieved.
stocks_get_financials:
  name: stocks_get_financials
  description: Fetches financial information related to a stock ticker or symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock exchange and ticker symbol in the format "exchange:symbol"
          (e.g., "NASDAQ:TSLA").
      columns:
        description: A comma-separated list of financial metrics to retrieve (e.g.,
          "ADR,ADX,average_volume").
      screenername:
        description: The screener name field value as returned by the /countries/list
          endpoint. Defaults to 'america'.
      lang:
        description: The language code for the returned data. Defaults to 'en'.
country_by_iso_code:
  name: country_by_iso_code
  description: Fetches information about a country using its 2-letter ISO code, localized
    to a specified language.
  parameters:
    type: object
    properties:
      iso_code:
        description: The 2-letter ISO country code.
      fields:
        description: A comma-delimited list of fields to include in the response.
          Defaults to None.
      lang:
        description: The 2-letter ISO language code for localizing the country name.
          Defaults to 'en'.
listofallcircuitswithinaraceinayear:
  name: listofallcircuitswithinaraceinayear
  description: Fetches a list of all circuits within a race for a given year from
