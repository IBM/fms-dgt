    5 days using AI technology.
  parameters:
    type: object
    properties:
      lon:
        description: Longitude in formats like '12E', '12.3E', or '-13.4'. This parameter
          is optional if `place_id` is provided.
      lat:
        description: Latitude in formats like '12N', '12.3N', or '-13.4'. This parameter
          is optional if `place_id` is provided.
      language:
        description: Language for the text summaries. Options are 'en' (English),
          'es' (Spanish), 'fr' (French), 'de' (German), 'pl' (Polish), 'cs' (Czech).
      place_id:
        description: Identifier of a place. If provided, it overrides `lat` and `lon`.
      units:
        description: Unit system to be used. Options are 'auto', 'metric', 'us', 'uk',
          'ca'. Default is 'auto'.
      timezone:
        description: Timezone for the date fields. Can be a tzinfo database string
          like 'Europe/Prague', 'UTC', or 'auto' to use the local timezone of the
          location. Default is 'auto'.
constructors:
