        description: The number to check.
        type: integer
list_all_bot_category_groups:
  name: list_all_bot_category_groups
  description: Get a list of category groups that are linked to user-owned bots (not
    locked bots).
  parameters:
    type: object
    properties:
      category_group:
        description: Category group slug of the category group in the bot category
          group.
      dir:
        description: Direction of the ordering. Default is 'asc'.
      limit:
        description: The number of records to return. Default is 20.
      order:
        description: The search field to order by. Default is 'id'.
      is_id:
        description: The ID of the bot category group.
      bot:
        description: Bot slug of the bot in the bot category group.
      category_group_id:
        description: The ID of the category group.
      bot_id:
        description: The ID of the bot category group.
      page:
        description: The page number of results to start from. Default is 1.
get_models:
  name: get_models
  description: Fetches all models from a given manufacturer using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      manufacturer:
        description: The name of the manufacturer for which to retrieve models.
stations_stationid:
  name: stations_stationid
  description: Fetch metadata about a specified weather station using the station
    ID.
  parameters:
    type: object
    properties:
      stationid:
        description: The ID of the weather station.
hotel_photos:
  name: hotel_photos
  description: Fetches a list of photos for given hotels based on their IDs from the
    RapidAPI Priceline provider.
  parameters:
    type: object
    properties:
      hotel_ids:
        description: Comma-separated string of PPN hotel IDs (Semi Opaque Only).
      image_size:
        description: The size of the images to be returned. Valid options are 'small'
          (60px), 'medium' (300 to 312px), or 'large' (500 to 800px). Defaults to
          'medium'.
vin_decoder:
  name: vin_decoder
  description: Decodes a given VIN (Vehicle Identification Number) for a vehicle manufactured
    in Europe to retrieve information such as car model, maker, year, engine, and
    other relevant details.
  parameters:
    type: object
    properties:
      vin:
        description: The VIN number to be decoded.
get_car_models:
  name: get_car_models
  description: Fetches all car models for a specified car maker using the InfoCars
    API.
  parameters:
    type: object
    properties:
      maker:
        description: The name of the car maker to fetch the models for.
get_ip_location:
  name: get_ip_location
  description: Retrieves the latitude and longitude coordinates of a given IP address
    using the ip-api.com API.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to locate.
is_valid_ip_address:
  name: is_valid_ip_address
  description: Checks if a string is a valid IP address (IPv4).
  parameters:
    type: object
    properties:
      ip:
        description: The string to check.
place_safeway_order:
  name: place_safeway_order
  description: Order specified items from a Safeway location.
  parameters:
    type: object
    properties:
      location:
        description: The location of the Safeway store, e.g., 'Palo Alto, CA'.
      items:
        description: List of items to order.
      quantity:
        description: Quantity of each item in the order list.
is_hotel_available:
  name: is_hotel_available
  description: Checks the availability of a hotel for a given date range.
  parameters:
    type: object
    properties:
      hotel:
        description: The name of the hotel.
      city:
        description: The city where the hotel is located.
      checkin:
        description: The check-in date in the format "YYYY-MM-DD".
      checkout:
        description: The check-out date in the format "YYYY-MM-DD".
assess_diabetes_risk:
  name: assess_diabetes_risk
  description: Assesses the risk of developing type 2 diabetes based on body mass
    index (BMI) and physical activity level.
  parameters:
    type: object
    properties:
      weight_lbs:
        description: Body weight in pounds.
        type: integer
      height_inches:
        description: Height in inches.
        type: integer
      activity:
        description: 'Physical activity level. Allowed values: "sedentary", "lightly
          active", "moderately active", or "very active".'
get_holidays_by_year:
  name: get_holidays_by_year
  description: Retrieves the list of public holidays for a given year and country
    using the Nager.Date API.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to retrieve the holidays.
        type: integer
      country_code:
        description: The two-letter ISO 3166-1 alpha-2 country code.
is_leap_year:
  name: is_leap_year
  description: Checks if a year is a leap year.
  parameters:
    type: object
    properties:
      year:
        description: The year to check.
        type: integer
simulate_query_database:
  name: simulate_query_database
  description: Simulates querying a database based on certain conditions.
  parameters:
    type: object
    properties:
      table:
        description: Name of the table to query.
      conditions:
        description: Conditions for the query, each condition is a dictionary.
search_pins:
  name: search_pins
  description: Search for Pinterest pins based on a given keyword using the specified
    RapidAPI key.
  parameters:
    type: object
    properties:
      keyword:
        description: The search term used to find relevant Pinterest pins.
headtoheadmatches:
  name: headtoheadmatches
  description: Fetches head-to-head match data for a specific E-Sports event using
    the provided custom ID.
  parameters:
    type: object
    properties:
      customid:
        description: The custom ID of the E-Sports event for which head-to-head match
          data is required.
is_anagram_phrase:
  name: is_anagram_phrase
  description: Checks if two phrases are anagrams of each other, ignoring whitespace
    and punctuation.
  parameters:
    type: object
    properties:
      phrase1:
        description: The first phrase.
      phrase2:
        description: The second phrase.
find_max_subarray_sum:
  name: find_max_subarray_sum
  description: Finds the maximum sum of a contiguous subarray within a list of integers.
  parameters:
    type: object
    properties:
      nums:
        description: The input list of integers.
email:
  name: email
  description: Retrieve detailed information about a person using their email address
    via the RapidAPI enrichment tool.
  parameters:
    type: object
    properties:
      email:
        description: The email address of the person to be enriched.
verify:
  name: verify
  description: Verifies a global phone number using the Veriphone API.
  parameters:
    type: object
    properties:
      phone:
        description: The phone number to verify.
      default_country:
        description: The default country in a 2-letter ISO format (e.g., 'US', 'RU').
          This is optional; the country will be inferred from the phone number prefix,
          this parameter, or the IP address (in that order).
getdefinition:
  name: getdefinition
  description: Retrieves the definition, pronunciation, and example usages of a given
    word using the Dictionary Data API.
  parameters:
    type: object
    properties:
      word:
        description: The word for which the definition, pronunciation, and example
          usages are retrieved.
remove_profanity:
  name: remove_profanity
  description: Removes profanity from the provided text using the PurgoMalum web service.
    Optionally, custom words can be added to the profanity list, and specific fill
    text or characters can be used to replace profanity.
  parameters:
    type: object
    properties:
      text:
        description: Input text to be processed for profanity.
      add:
        description: A comma-separated list of words to add to the profanity list.
          Accepts letters, numbers, underscores (_), and commas (,). Maximum 10 words
          or 200 characters. Defaults to None.
      fill_text:
        description: Text used to replace any words matching the profanity list. Accepts
          letters, numbers, underscores (_), tildes (~), exclamation points (!), dashes/hyphens
          (-), equal signs (=), pipes (|), single quotes ('), double quotes ("), asterisks
          (*), curly brackets ({ }), square brackets ([ ]), and parentheses (). Maximum
          length of 20 characters. Defaults to None.
      fill_char:
        description: Single character used to replace any words matching the profanity
          list, filling to the length of the word replaced. Accepts underscore (_),
          tilde (~), dash/hyphen (-), equal sign (=), pipe (|), and asterisk (*).
          Defaults to None.
purgequeue:
  name: purgequeue
  description: Clears the send message queue for a given phone ID using the Maytapi
    WhatsApp API.
  parameters:
    type: object
    properties:
      phone_id:
        description: The ID of the phone whose message queue is to be purged.
emailvalidation:
  name: emailvalidation
  description: Validates an email address using an API service.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be validated.
binary_addition:
  name: binary_addition
  description: Adds two binary numbers and returns the result as a binary string.
  parameters:
    type: object
    properties:
      a:
        description: The first binary number.
      b:
        description: The second binary number.
find_food_by_id:
  name: find_food_by_id
  description: Retrieves a single food item by its FDC ID using the provided RapidAPI
    key.
  parameters:
    type: object
    properties:
      fooid:
        description: The FDC ID of the food item.
        type: integer
feeds_auto_complete:
  name: feeds_auto_complete
  description: Fetches auto-complete suggestions for food names or ingredients from
    the Yummly API.
  parameters:
    type: object
    properties:
      q:
        description: The food name or ingredient to get auto-complete suggestions
          for.
keto_recipes_by_difficulty:
  name: keto_recipes_by_difficulty
  description: Fetches all keto recipes filtered by difficulty level.
  parameters:
    type: object
    properties:
      difficulty:
        description: The difficulty level of the recipes to retrieve (Easy, Medium,
          or Difficult).
market_undervalued_large_caps:
  name: market_undervalued_large_caps
  description: Fetches a list of potentially undervalued large cap stocks from the
    API.
  parameters:
    type: object
    properties:
      start:
        description: The starting index for the results. Defaults to 0.
getfscore:
  name: getfscore
  description: Fetches the Piotroski F-Score for a given stock ticker using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which the F-Score is to be retrieved.
get_random_quotes:
  name: get_random_quotes
  description: Fetches multiple random quotes from a specified category or from multiple
    categories if 'all' is specified.
  parameters:
    type: object
    properties:
      count:
        description: The number of random quotes to retrieve.
        type: integer
      category:
        description: The category from which to fetch quotes. Use 'all' to fetch from
          multiple categories.
ideal_weight:
  name: ideal_weight
  description: Calculate the ideal weight based on gender and height using four different
    well-known equations (Hamwi, Devine, Miller, Robinson).
  parameters:
    type: object
    properties:
      gender:
        description: The gender of the individual ('male' or 'female').
      height:
        description: The height of the individual in centimeters.
        type: integer
teams_list:
  name: teams_list
  description: Retrieve a list of cricket teams based on the match type using the
    Cricbuzz API.
  parameters:
    type: object
    properties:
      matchtype:
        description: 'The type of match to filter teams by. One of the following values:
          ''international'', ''league'', ''domestic'', or ''women''.'
v1_feed_recommended:
  name: v1_feed_recommended
  description: Fetches the recommended feed from the RapidAPI Tokapi mobile version.
  parameters:
    type: object
    properties:
      pull_type:
        description: The type of loading feed. Use 0 for initial loading, 2 to load
          more, and 8 to reload. Defaults to 0.
      region:
        description: The region code to fetch the feed for. Defaults to 'US'.
generate:
  name: generate
  description: Generate a face with given optional parameters for ethnicity, gender,
    and age.
  parameters:
    type: object
    properties:
      ethnicity:
        description: Ethnic phenotype for the face. Options include 'european', 'african',
          'west_asian', 'south_asian', 'east_asian', 'southeast_asian', and 'latin_american'.
          Defaults to 'european'.
      gender:
        description: Gender of the face. Options include 'male' and 'female'. Defaults
          to 'female'.
      age:
        description: Age group of the face. Options include '10s', '20s', '30s', '40s',
          '50s', and '60s'. Defaults to '20s'.
search_hashtag:
  name: search_hashtag
  description: Searches for a specific hashtag on Instagram using the RapidAPI service.
  parameters:
    type: object
    properties:
      tag:
        description: The hashtag to search for.
top_posts_by_username:
  name: top_posts_by_username
  description: Fetches the top posts by a specific Reddit username within a specified
    time frame.
  parameters:
    type: object
    properties:
      username:
        description: The Reddit username to fetch top posts for.
      time:
        description: The time period to consider for top posts. Allowed values are
          'hour', 'day', 'week', 'month', 'year', 'all'.
      cursor:
        description: A cursor for pagination to retrieve the next set of results.
age_calculator:
  name: age_calculator
  description: Calculates age based on the provided date and optional timezone.
  parameters:
    type: object
    properties:
      date:
        description: 'The date of birth in one of the following formats: YYYYMMDD,
          YYYY-MM-DD, MMDDYYYY, MM-DD-YYYY.'
      timezone:
        description: 'The timezone to be considered for age calculation. Default is
          ''US/Eastern''. Format example: ''US/Eastern'', ''US/Pacific'', ''Europe/London''.'
findplacesnearby:
  name: findplacesnearby
  description: Find nearby places based on the given location, language, radius, and
    type.
  parameters:
    type: object
    properties:
      location:
        description: The latitude/longitude around which to retrieve places.
      language:
        description: The language in which to return results. Defaults to 'en'.
      radius:
        description: The distance (in meters) within which to return results. Max
          = 10000 m. Defaults to 180.
map_image_get:
  name: map_image_get
  description: Fetches a static map image for a specified location with given parameters
    such as width, height, center, and zoom level.
  parameters:
    type: object
    properties:
      width:
        description: Width of the map image. Must be between 1 and 999.
        type: integer
      center:
        description: The center coordinates of the map (latitude,longitude).
      zoom:
        description: The zoom level of the map. Must be between 6 and 19.
        type: integer
      height:
        description: Height of the map image. Must be between 1 and 999.
        type: integer
      datum:
        description: 'The geodetic system to use. Defaults to ''wgs84''. Options are:'
      coord_unit:
        description: 'The unit of latitude and longitude in the output data. Defaults
          to ''degree''. Options are:'
query_for_ldu_boundary:
  name: query_for_ldu_boundary
  description: Query the boundaries for a given LDU (Local Delivery Unit) postal code
    in Canada using the VanitySoft Canada Postal Boundaries API.
  parameters:
    type: object
    properties:
      postal_ldu:
        description: The LDU postal code to query.
      resolution:
        description: The resolution of the boundary data. Defaults to 10.
query_for_hexagon_by_h3index:
  name: query_for_hexagon_by_h3index
  description: Queries a boundary for a given H3 index from the VanitySoft UK Boundaries
    API.
  parameters:
    type: object
    properties:
      h3index:
        description: The H3 index identifier for the hexagon to query.
        type: integer
loginuser:
  name: loginuser
  description: Logs in a user to the specified API endpoint using the provided username
    and password.
  parameters:
    type: object
    properties:
      password:
        description: The password for login in clear text.
      username:
        description: The username for login.
get_index_price_kline:
  name: get_index_price_kline
  description: Fetches the index price kline data for a specified symbol and category
    within a given time range.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol for which the kline data is to be fetched.
      category:
        description: The derivatives products category. Possible values are 'linear'
          and 'inverse', including inverse futures.
      interval:
        description: The interval for the kline data. Possible values are '1', '3',
          '5', '15', '30', '60', '120', '240', '360', '720', 'D', 'M', and 'W'.
      end:
        description: The end timestamp point for the query results, in milliseconds.
        type: integer
      start:
        description: The start timestamp point for the query results, in milliseconds.
        type: integer
      limit:
        description: The limit for the data size per page, with a maximum size of
          200. Defaults to None.
balance:
  name: balance
  description: Retrieves the balance sheet statements of a specified stock company.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol of the company (e.g., 'AAPL' for Apple Inc.).
      period:
        description: The reporting period for the balance sheet, which can be 'annual'
          or 'quarterly'.
integrate:
  name: integrate
  description: Calculate the area under a curve for a specified function between two
    x values.
  parameters:
    type: object
    properties:
      function:
        description: The function to integrate, represented as a string. For example,
          'x^3'
      start_x:
        description: The starting x-value to integrate over.
        type: integer
      end_x:
        description: The ending x-value to integrate over.
        type: integer
      method:
        description: The method of numerical integration to use. Choices are 'trapezoid'
          or 'simpson'.
find_minimum_rotated_sorted_array:
  name: find_minimum_rotated_sorted_array
  description: Finds the minimum element in a rotated sorted array.
  parameters:
    type: object
    properties:
      nums:
        description: The rotated sorted array.
verify_the_existence_of_email:
  name: verify_the_existence_of_email
  description: Verifies the existence of an email address using the Email Existence
