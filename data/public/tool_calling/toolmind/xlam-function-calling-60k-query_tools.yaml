      imageversion:
        description: The version of the image to be fetched.
        type: integer
ufc_287_pereira_vs_adesanya_2_april_08_2023:
  name: ufc_287_pereira_vs_adesanya_2_april_08_2023
  description: 'Fetches the details of UFC 287: Pereira vs. Adesanya 2 held on April
    08, 2023, including a range of information about each fighter.'
  parameters:
    type: object
    properties:
      limit:
        description: The number of results to retrieve. Defaults to None.
      offset:
        description: The number of results to skip. Defaults to None.
tickerdata:
  name: tickerdata
  description: Fetches historical ticker data for a given period and date range from
    the RapidAPI service.
  parameters:
    type: object
    properties:
      period:
        description: The period for which to fetch the ticker data (e.g., 'daily',
          'weekly').
      startdate:
        description: The start date for the data in YYYY-MM-DD format.
      tickername:
        description: The name of the ticker for which to fetch data.
      enddate:
        description: The end date for the data in YYYY-MM-DD format.
get_continent_by_id:
  name: get_continent_by_id
  description: Fetches and returns continent information based on a given ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the continent to fetch information for.
bin:
  name: bin
  description: Queries the BIN (Bank Identification Number) information using the
    Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      bin:
        description: The BIN (Bank Identification Number) to be checked.
protocols:
