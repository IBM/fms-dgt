real_time_user_search:
  name: real_time_user_search
  description: Perform a real-time search for social media influencers based on a
    given keyword.
  parameters:
    type: object
    properties:
      keyword:
        description: 'The search keyword. For example: ''amazon''.'
      skip:
        description: The number of records to skip in the search results. Useful for
          paginating results.
      limit:
        description: The maximum number of records to return. Default is 30, and the
          maximum allowed value is 30.
generate_a_face:
  name: generate_a_face
  description: Generates a face image using an AI service and returns the result as
    a JSON object or text. It utilizes the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      ai:
        description: The AI model identifier to be used for face generation.
v1_post_post_id_comments:
  name: v1_post_post_id_comments
  description: Fetch comments for a given post ID from the Tokapi mobile API.
  parameters:
    type: object
    properties:
      post_id:
        description: The ID of the post for which to fetch comments.
      count:
        description: The number of comments to retrieve. Defaults to 10.
      offset:
        description: The offset for fetching comments, used for pagination. Defaults
          to 0.
get_greet:
  name: get_greet
  description: Generates a greeting message based on the provided name and cringe
    level, using the RapidAPI greet generator.
  parameters:
    type: object
    properties:
      name:
        description: The name to be included in the greeting.
      cringelevel:
        description: The level of cringiness for the greeting.
balance_sheet:
  name: balance_sheet
  description: "Fetches the balance sheet of a specific company, including assets,\
    \ liabilities, and shareholders\u2019 equity, from an external API."
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol of the company.
      exchange:
        description: The stock exchange where the company is listed.
      country:
        description: The country where the company is located.
      start_date:
        description: The start date for the balance sheet data in 'YYYY-MM-DD' format.
      end_date:
        description: The end date for the balance sheet data in 'YYYY-MM-DD' format.
      period:
        description: The reporting period of the balance sheet data. Defaults to 'annual'.
get_item_by_id:
  name: get_item_by_id
  description: Fetches an RPG item by its ID using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the RPG item to retrieve.
user_likes_by_userid:
  name: user_likes_by_userid
  description: Fetches all likes of a user from Twitter using the provided user ID.
  parameters:
    type: object
    properties:
      userid:
        description: The userId of the Twitter user. This can be obtained by converting
          a username to a userId or by searching for a user and extracting the restId.
      cursor:
        description: A cursor value for pagination. Use this to navigate to the next
          or previous page of results.
      count:
        description: The number of results to return per request. Defaults to '20'.
search_challenge:
  name: search_challenge
  description: Searches for challenges on TikTok based on the given keywords.
  parameters:
    type: object
    properties:
      keywords:
        description: The keywords to search for TikTok challenges.
      cursor:
        description: The cursor for the next page of search results. Defaults to 0.
      count:
        description: The number of search results to return. Defaults to 5.
api_analyze:
  name: api_analyze
  description: Analyzes user data on TikTok, including engagement, hashtags, mentions,
    and recent videos.
  parameters:
    type: object
    properties:
      sec_user_id:
        description: The unique security user ID of the TikTok user to analyze.
email_qr_code:
  name: email_qr_code
  description: Creates and returns a static QR code encoded with the provided email
    address. The QR code can be customized with various design parameters such as
    background color, eye pattern, error correction level, size, data gradient colors,
    and data patterns. When scanned, the QR code will prompt the user to send an email
    to the specified address.
  parameters:
    type: object
    properties:
      address:
        description: The email address to encode in the QR code.
      background_color:
        description: The background color of the QR code. Defaults to '#FFFFFF'.
      eye_pattern:
        description: The pattern of the QR code eyes. Defaults to 'RECT_RECT'.
      error_correction:
        description: The error correction level of the QR code. Defaults to 'M'.
      size:
        description: The size of the QR code. Defaults to 'm'.
      data_gradient_start_color:
        description: The starting color for the data gradient. Defaults to '#000000'.
      data_gradient_style:
        description: The style of the data gradient. Defaults to 'None'.
      data_pattern:
        description: The pattern for the QR code data. Defaults to 'RECT'.
      eye_color_outer:
        description: The outer color of the QR code eyes. Defaults to '#000000'.
      data_gradient_end_color:
        description: The ending color for the data gradient. Defaults to '#000000'.
      eye_color_inner:
        description: The inner color of the QR code eyes. Defaults to '#000000'.
rsi_overbought:
  name: rsi_overbought
  description: Fetches a list of stocks that have the RSI (Relative Strength Index)
    Overbought signal using the BarPatterns RapidAPI.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve (default is 1).
        type: integer
user_login:
  name: user_login
  description: Logs in a user with the given username and password, and returns a
    JSON object containing the account's session key.
  parameters:
    type: object
    properties:
      username:
        description: 'Username for the user account. For US domestic users, this should
          be a 10-digit number. For international users, use the full E.164 format
          (e.g., US: 5555555555, E.164: +1155555555555).'
      password:
        description: Password associated with the username.
stateusaprice:
  name: stateusaprice
  description: Fetches gas prices for a given state in the United States using the
    Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      state:
        description: The two-letter abbreviation of the state for which to fetch gas
          prices.
flightstatistics:
  name: flightstatistics
  description: Fetches and returns statistics for a given flight number, with optional
    filtering by departure and arrival airports.
  parameters:
    type: object
    properties:
      flnr:
        description: The flight number to request statistics for.
      aptfrom:
        description: The IATA code of the departure airport. Defaults to None.
      aptto:
        description: The IATA code of the arrival airport. Defaults to None.
news_v2_list_trending:
  name: news_v2_list_trending
  description: Fetches a list of trending news from the Seeking Alpha API.
  parameters:
    type: object
    properties:
      size:
        description: The number of items per response, with a maximum of 40. Defaults
          to 20.
      since:
        description: Unix timestamp (Epoch timestamp) to filter data from this date
          onwards. Can be used together with the 'until' parameter to filter data
          by date range. Defaults to None.
      until:
        description: Unix timestamp (Epoch timestamp) to filter data up to this date.
          Can be used together with the 'since' parameter to filter data by date range.
          Defaults to None.
premium_daily:
  name: premium_daily
  description: Fetches the daily zip files of filed 10-Q and 10-K reports for a given
    date using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch the report in YYYY-MM-DD format.
webcams_list_orderby_order_sort:
  name: webcams_list_orderby_order_sort
  description: Fetches a list of webcams ordered and sorted based on the specified
    parameters.
  parameters:
    type: object
    properties:
      sort:
        description: The sorting direction for the results. Possible values are "asc"
          (ascending) or "desc" (descending).
      order:
        description: 'The criterion by which the results will be ordered. Possible
          values are:'
      lang:
        description: The language for localizing the results, if available. Default
          is "en".
      show:
        description: 'The content to be listed in the response. Default is "webcams:image,location".
          Possible values include:'
playerdetails:
  name: playerdetails
  description: Retrieves the details of an American Football player using their ID
    from the specified API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the player for which to retrieve the details.
        type: integer
get_hashtag:
  name: get_hashtag
  description: Fetches detailed information about a specific Instagram hashtag using
    the provided API key.
  parameters:
    type: object
    properties:
      tag:
        description: The name of the hashtag to search for.
random_crypto:
  name: random_crypto
  description: Generates a list of fake cryptocurrency assets using the Random Crypto
    API.
  parameters:
    type: object
    properties:
      size:
        description: Number of fake cryptocurrency assets to generate. Default is
          5.
videocategories:
  name: videocategories
  description: Fetches video categories from the YouTube API based on provided parameters.
  parameters:
    type: object
    properties:
      part:
        description: Specifies the videoCategory resource properties that the API
          response will include. Typically set to 'snippet'.
      is_id:
        description: A comma-separated list of video category IDs to retrieve. Default
          is None.
      regioncode:
        description: Instructs the API to return the list of video categories available
          in the specified country, given by an ISO 3166-1 alpha-2 country code. Default
          is 'US'.
      hl:
        description: Specifies the language that should be used for text values in
          the API response. Default is 'en_US'.
top_comments_by_username:
  name: top_comments_by_username
  description: Fetches the top comments by a specific Reddit username within a given
    time frame.
  parameters:
    type: object
    properties:
      time:
        description: The time frame for which to fetch top comments. Choices include
          'hour', 'day', 'week', 'month', 'year', or 'all'.
      username:
        description: The Reddit username for which to fetch the top comments.
      cursor:
        description: A cursor for pagination to fetch the next set of results. Defaults
          to None.
random_bank_by_id:
  name: random_bank_by_id
  description: Fetch a random fake bank record by its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the fake bank record to retrieve.
        type: integer
get_laws_for_one_state:
  name: get_laws_for_one_state
  description: Retrieves gun law documentation links for a specific U.S. state using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      statename:
        description: The name of the state for which to retrieve gun law documentation.
rarity_tools:
  name: rarity_tools
  description: Fetches collection items data from the Rarity Tools Collection Items
    Endpoint using the provided slug and RapidAPI key.
  parameters:
    type: object
    properties:
      slug:
        description: The unique identifier for the collection to fetch data for.
getlivemenustreaming:
  name: getlivemenustreaming
  description: Fetches live menu streaming data from the specified API.
  parameters:
    type: object
    properties:
      skinname:
        description: The name of the skin to use for the request. Defaults to 'betbiga'.
tournament_matches_by_date:
  name: tournament_matches_by_date
  description: Retrieves all matches for a specified tournament on a given date using
    the Tennis Live Data API.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve the matches, formatted as 'YYYY-MM-DD'.
      tournament_id:
        description: The ID of the tournament.
        type: integer
competitions_standings:
  name: competitions_standings
  description: Fetch the current standings for a specified competition using the Zeus
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the competition.
      year:
        description: The year for which standings are to be retrieved. Defaults to
          '2020'.
nhl_standings:
  name: nhl_standings
  description: Retrieves the NHL standings for a specified year and group.
  parameters:
    type: object
    properties:
      year:
        description: The year for which the NHL standings are to be retrieved.
      group:
        description: The group by which to filter the standings. Acceptable values
          are 'league', 'conference', and 'division'. Defaults to 'league' if not
          specified.
get_play_by_play:
  name: get_play_by_play
  description: Fetch the NHL game play-by-play data for a specified game.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the NHL game.
list_of_archive_events:
  name: list_of_archive_events
  description: Fetch a list of archived sports events using pagination.
  parameters:
    type: object
    properties:
      sport_id:
        description: The ID of the sport for which to fetch archived events.
        type: integer
      page_num:
        description: The page number to fetch in the paginated results.
        type: integer
      league_ids:
        description: The ID of the league to filter results by. Defaults to None.
stock_price:
  name: stock_price
  description: Fetches the current price and details for a given public stock using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      ticker:
        description: The ticker symbol of the stock for which to retrieve the price
          and details.
study_list_macquarie:
  name: study_list_macquarie
  description: Fetches kanji information based on a given list using the Kanjialive
    API.
  parameters:
    type: object
    properties:
      list:
        description: A string representing the specific chapters of Kanji to be queried
          (e.g., "12-22").
retrieve_group_results:
  name: retrieve_group_results
  description: Retrieves the up-to-date results for a specified group using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      group_id:
        description: The unique ID for the group which results are to be retrieved.
fetch_email_of_a_person:
  name: fetch_email_of_a_person
  description: Fetch the email address of a person based on their first name, last
    name, and domain using the Email Finder API.
  parameters:
    type: object
    properties:
      first_name:
        description: The first name of the person whose email is being fetched.
      domain:
        description: The domain associated with the email address.
      last_name:
        description: The last name of the person whose email is being fetched.
nearest_metro_station:
  name: nearest_metro_station
  description: Finds the nearest Delhi Metro station to the given longitude and latitude.
  parameters:
    type: object
    properties:
      long:
        description: The longitude coordinate.
      lat:
        description: The latitude coordinate.
games_by_category_or_tag:
  name: games_by_category_or_tag
  description: Fetches a list of games based on the given category or tag from the
    MMO Games API.
  parameters:
    type: object
    properties:
      category:
        description: The category or tag of the games to fetch (e.g., "mmorpg", "shooter",
          "pvp", "mmofps").
national_team_statistics:
  name: national_team_statistics
  description: Fetch the statistics of a national team player using their player ID.
  parameters:
    type: object
    properties:
      player_id:
        description: Unique identifier for the player.
        type: integer
symbols_get_peers:
  name: symbols_get_peers
  description: Fetches the peer symbols of a given stock symbol using the Seeking
    Alpha API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol to query for peers. Multiple symbols can be
          queried by separating them with a comma (e.g. 'aapl,tsla').
validate_card_number:
  name: validate_card_number
  description: Validate a credit card number and get the card type by using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      cardnumber:
        description: The credit card number to be validated.
historical_exchange_rates:
  name: historical_exchange_rates
  description: Fetch historical exchange rate data for a specific date using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve exchange rate data, formatted
          as 'YYYY-MM-DD'.
software_assets:
  name: software_assets
  description: Fetch details of SaaS/Software tools based on specified feature tags
    or software name.
  parameters:
    type: object
    properties:
      q:
        description: Query string representing the list of feature tags or the name
          of the software for which details are to be fetched.
fetch_track_details:
  name: fetch_track_details
  description: Fetches the details of a specific track using the provided track ID
    from the latest Spotify downloader API.
  parameters:
    type: object
    properties:
      track_id:
        description: The unique identifier of the track to fetch details for.
aliexpress_store_info:
  name: aliexpress_store_info
  description: Fetches detailed store information from AliExpress using the given
    seller ID and optional locale, region, and currency parameters.
  parameters:
    type: object
    properties:
      sellerid:
        description: The ID of the AliExpress seller whose store information is requested.
      locale:
        description: The locale to display the titles and other content in the selected
          language.
      region:
        description: The region to accurately get the shipping costs and other promo/deals
          for a specific geo-location.
      currency:
        description: The currency to display the product price in the selected currency.
get_litecoin_block_hash:
  name: get_litecoin_block_hash
  description: Fetches the hash of a Litecoin block by its index using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      i:
        description: The index of the Litecoin block.
        type: integer
gettraderpositions:
  name: gettraderpositions
  description: Gets the trader positions for a given portfolio ID using the Trader
    Wagon API.
  parameters:
    type: object
    properties:
      portfolioid:
        description: The portfolio ID of the trader.
        type: integer
game:
  name: game
  description: Fetch details of a specific baseball game using its game ID.
  parameters:
    type: object
    properties:
      gamepk:
        description: The unique identifier for the baseball game.
stock_insider_holders_stock:
  name: stock_insider_holders_stock
  description: Fetches insider holders' information for a given stock symbol using
    the mboum-finance API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to fetch insider holders' information.
market_trends:
  name: market_trends
  description: Fetches market trends data from the Joj Finance API.
  parameters:
    type: object
    properties:
      t:
        description: 'Tab name, specifying the category of market trends. One of the
          following:'
      gl:
        description: Geolocation for the data, default is 'US'.
      s:
        description: 'Subtab name for ''indexes'' tab to specify the region. One of
          the following:'
      hl:
        description: Language code, default is 'en'.
stock_v2_get_trading_information:
  name: stock_v2_get_trading_information
  description: Fetch trading information for a specific stock using its performance
    ID.
  parameters:
    type: object
    properties:
      performanceid:
        description: The performance ID of the stock, which can be obtained from the
          auto-complete, get-summary, or get-movers endpoints.
coin:
  name: coin
  description: Fetches the value of a specified cryptocurrency.
  parameters:
    type: object
    properties:
      coin:
        description: The cryptocurrency symbol (e.g., 'btc', 'eth') for which the
          value will be fetched. Default is 'btc'.
mailcheck:
  name: mailcheck
  description: Validates the given email address against specified domain(s) using
    an external API.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be validated.
      domain:
        description: The email address to be validated.
vivanews_detail:
  name: vivanews_detail
  description: Fetches and returns the detailed news information from Vivanews by
    the given ID using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the Vivanews article to fetch details for.
        type: integer
premier_league_standings:
  name: premier_league_standings
  description: Fetches the Premier League standings data for a given season using
    the RapidAPI Premier League Standings API.
  parameters:
    type: object
    properties:
      season:
        description: The season for which the standings are to be retrieved, specified
          as a string (e.g., '2022'). If not provided, the current season's standings
          will be fetched.
get_station_information:
  name: get_station_information
  description: Get information about a NOAA tide station using its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The station ID to retrieve information for.
get_user_data:
  name: get_user_data
  description: Fetches user data from the Discord API using a given user ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the user whose data is being fetched.
getmodalityvalues:
  name: getmodalityvalues
  description: Fetches modality values from the TCIA API based on the specified parameters.
  parameters:
    type: object
    properties:
      collection:
        description: A label used to name a set of images collected for a specific
          trial or other reason. Assigned during the process of curating the data.
      bodypartexamined:
        description: Entered on a per collection basis using relevant SNOMED terms.
      modality:
        description: DICOM definition for the imaging modality.
      format:
        description: Specifies the output type. Allowed values are CSV, HTML, XML,
          JSON.
go:
  name: go
  description: Fetches and parses an HTML page from a specified URL using the Web
    Scrapper API.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the HTML page to be fetched and parsed.
      s:
        description: An optional query parameter to specify a selector. Default is
          '.jsl10n'.
take_screenshot:
  name: take_screenshot
  description: Take a screenshot of a webpage with various customizable options and
    return the URL of the saved image.
  parameters:
    type: object
    properties:
      targeturl:
        description: The URL of the webpage to capture.
      islandscape:
        description: Specifies if the viewport should be in landscape mode. Default
          is None.
      proxycountry:
        description: The proxy country to route the request through. Default is None.
      isfullyloaded:
        description: Specifies whether to consider navigation finished based on no
          more than 0 network connections for at least 500 ms. Default is None.
      clickcount:
        description: Number of times to click on the selector. Default is 1.
      fullpage:
        description: Indicates if the screenshot should cover the entire page from
          header to footer. Default is None.
      clickselector:
        description: CSS selector for the element to click. The element will be scrolled
          into view before clicking. Default is None.
      hastouch:
        description: Specifies if the viewport supports touch events. Default is None.
      clickdelay:
        description: Delay (in milliseconds) before each click action. Default is
          500.
      clickbutton:
        description: Specifies the mouse button to use for the click action (e.g.,
          'left' or 'right'). Default is None.
      devicescalefactor:
        description: Device scaling factor to use. Default is 1.
      ismobile:
        description: Whether the meta viewport tag should be taken into account. Default
          is None.
      pagewidth:
        description: Width of the browser page in pixels. Default is 1024.
      pageheight:
        description: Height of the browser page in pixels. Default is 1024.
      removables:
        description: CSS selectors for HTML elements to be removed before taking the
          screenshot. Default is None.
searchdomain:
  name: searchdomain
  description: Fetches webpage data from the "pages-hosted-on-domain" API based on
    the provided filters and parameters.
  parameters:
    type: object
    properties:
      matchtype:
        description: The type of match to be used. Default is 'prefix'.
      collapse:
        description: The field to be collapsed. Default is 'urlkey'.
      url:
        description: The URL to search for. Default is 'httpsimage.com'.
      fl:
        description: The fields to include in the response. Default is 'timestamp:4,original,urlkey'.
      limit:
        description: The maximum number of results to return. Default is 100000.
        type: integer
      filter:
        description: The filter to apply to the results. Default is 'statuscode:200'.
scan_headers:
  name: scan_headers
  description: Scans the headers of a web page for the given domain using the Scan
    Web Headers API.
  parameters:
    type: object
    properties:
      domain:
        description: The domain of the web page to be scanned.
email_endpoint:
  name: email_endpoint
  description: Queries an email bounce detection API to check the deliverability status
    of an email address.
  parameters:
    type: object
    properties:
      email_string:
        description: The email address to be checked.
series:
  name: series
  description: Fetches details about a series and its episodes from the specified
    API.
  parameters:
    type: object
    properties:
      series_slug:
        description: The unique identifier slug for the series.
      is_id:
        description: The ID associated with the series.
global_result_single:
  name: global_result_single
  description: Fetches global SEO keyword research data using the RapidAPI Keyword
    Research service.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword for which to perform the research.
bodies:
  name: bodies
  description: Fetches a list of vehicle bodies based on various query parameters.
  parameters:
    type: object
    properties:
      make_model_trim_id:
        description: ID representing the make, model, and trim combination.
      direction:
        description: Sorting direction, either 'asc' or 'desc'. Default is 'asc'.
      year:
        description: Year of the vehicle.
      page:
        description: Pagination parameter to specify the page of results.
      verbose:
        description: Includes additional details like make, model, and trim when set
          to 'yes'. Default is 'yes'.
      json:
        description: JSON-encoded string for complex query conditions.
      make_id:
        description: ID of the vehicle make.
      trim:
        description: Specific trim of the vehicle.
      sort:
        description: Field by which to sort the results. Default is 'id'.
      make_model_id:
        description: ID representing the make and model combination.
      model:
        description: Model of the vehicle.
      make:
        description: Make of the vehicle.
      limit:
        description: Limit on the number of results returned.
      doors:
