search_text:
  name: search_text
  description: Search for verses from the Bible that match the given text using the
    Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      text:
        description: The text to search for within Bible verses.
order_by_descending:
  name: order_by_descending
  description: Fetches a list of resources from the Cat Breed Database API sorted
    in descending order based on the provided ordering parameter.
  parameters:
    type: object
    properties:
      ordering:
        description: The criterion by which to sort the list in descending order.
airplanes_ordered_by_ascending:
  name: airplanes_ordered_by_ascending
  description: Fetches a list of airplanes ordered by a specified attribute in ascending
    order.
  parameters:
    type: object
    properties:
      ordering:
        description: The attribute by which to order the airplanes (e.g., 'name',
          'model').
timezone_for_location:
  name: timezone_for_location
  description: Fetch the current time for a given location and area using the World
    Time API.
  parameters:
    type: object
    properties:
      location:
        description: The specific location for which to fetch the time (e.g., "London").
      area:
        description: The larger area or region that the location falls within (e.g.,
          "Europe").
daily_horoscope:
  name: daily_horoscope
  description: Fetches the daily horoscope for a given zodiac sign and day using the
    RapidAPI Horoscope Astrology service.
  parameters:
    type: object
    properties:
      sunsign:
        description: The zodiac sign for which to fetch the horoscope. Possible values
          include 'aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra',
          'scorpio', 'sagittarius', 'capricorn', 'aquarius', 'pisces'.
      day:
        description: The day for which to fetch the horoscope. Possible values include
          'Today', 'Yesterday', 'Tomorrow', 'Week', 'Month', 'Year'.
detalhes_empresa:
  name: detalhes_empresa
  description: Retrieves detailed information about a company using its CNPJ.
  parameters:
    type: object
    properties:
      cnpj:
        description: The CNPJ of the company.
estimated_salary:
  name: estimated_salary
  description: Fetch the estimated salary for a given job title within a specified
    radius around a particular location.
  parameters:
    type: object
    properties:
      location:
        description: The geographic location to search within for the salary estimation.
      job_title:
        description: The job title for which the salary estimation is to be fetched.
      radius:
        description: The radius in kilometers within which to search from the provided
          location. Default is 100 km.
whois_history_v1:
  name: whois_history_v1
  description: Fetches the WHOIS history for a specified domain.
  parameters:
    type: object
    properties:
      domainname:
        description: The domain for which historic WHOIS data is requested.
      createddateto:
        description: 'Search domains created before this date. Format: "YYYY-MM-DD".'
      createddatefrom:
        description: 'Search domains created after this date. Format: "YYYY-MM-DD".'
      outputformat:
        description: Response output format, either "XML" or "JSON". Defaults to "JSON".
      expireddateto:
        description: 'Search domains expired before this date. Format: "YYYY-MM-DD".'
      updateddateto:
        description: 'Search domains updated before this date. Format: "YYYY-MM-DD".'
      mode:
        description: Mode of operation; "preview" to return the number of domains
          (free) or "purchase" to return the actual domain list (limited to 10,000
          and costs 50 DRS credits). Defaults to "preview".
      updateddatefrom:
        description: 'Search domains updated after this date. Format: "YYYY-MM-DD".'
      expireddatefrom:
        description: 'Search domains expired after this date. Format: "YYYY-MM-DD".'
      sincedate:
        description: 'Search for activities detected since this date. Format: "YYYY-MM-DD".'
camelizer_get_prices:
  name: camelizer_get_prices
  description: Retrieves the latest prices, and the historical highest and lowest
    prices of a product from Amazon using its ASIN code.
  parameters:
    type: object
    properties:
      asin:
        description: The ASIN number of a product from Amazon, formatted as a string
          (e.g., 'B08QB93S6R').
      locale:
        description: The locale code to specify the Amazon region. Defaults to 'us'.
          Options include 'au', 'ca', 'fr', 'de', 'it', 'es', 'uk', 'us'.
get_current_count:
  name: get_current_count
  description: This function retrieves the current count from a specified API without
    increasing it. It allows customization through various parameters including `clabel`,
    `color`, and `idv`. The function makes a GET request to the API and returns the
    response in JSON format if possible, otherwise, it returns the response text.
  parameters:
    type: object
    properties:
      clabel:
        description: A label used to specify a category. Defaults to 'blue'.
      color:
        description: A color value for the request. Defaults to 'red'.
      idv:
        description: An identifier for the request. Defaults to 'sample'.
search_sex_offenders:
  name: search_sex_offenders
  description: Search for sex offenders using either GIS parameters or attribute parameters.
  parameters:
    type: object
    properties:
      lastname:
        description: The last name of the sex offender to search for.
      zipcode:
        description: The zipcode to search within.
      state:
        description: The state to search within. Default is 'California'.
      city:
        description: The city to search within.
      firstname:
        description: The first name of the sex offender to search for. Default is
          'David'.
      lat:
        description: The latitude for GIS search. Default is 37.
      radius:
        description: The search radius in miles for GIS search. Default is 1 mile.
      lng:
        description: The longitude for GIS search. Default is -122.
get_all_motivational_pictures:
  name: get_all_motivational_pictures
  description: Fetch all motivational pictures, with optional pagination support.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of pictures to retrieve. Defaults to None.
      skip:
        description: The number of pictures to skip before starting to retrieve. Defaults
          to None.
coins_get_fullsize_chart:
  name: coins_get_fullsize_chart
  description: Fetches the full-size chart data for a specific cryptocurrency pair.
  parameters:
    type: object
    properties:
      pair_id:
        description: The identifier of the cryptocurrency pair.
        type: integer
      pair_interval:
        description: The interval for the chart data in seconds.
      lang_id:
        description: The language ID for the data. Default is 1.
      time_utc_offset:
        description: The time offset in UTC seconds. For example, UTC+8 corresponds
          to 28800 seconds. Default is 28800.
ideas_list:
  name: ideas_list
  description: Fetches a list of ideas/posts with various filtering and sorting options.
  parameters:
    type: object
    properties:
      locale:
        description: The language code for the ideas/posts. Default is 'en'.
      category:
        description: Filter by category. Options are 'picked', 'newest', 'popular'.
      stock_country:
        description: The country code for stock-related ideas. Only applicable if
          the market is 'stock'. Default is 'us'.
      page:
        description: The page index for pagination. Default is 1.
        type: integer
      per_page:
        description: The number of items per page for pagination. Default is 20.
        type: integer
      market:
        description: The market type. Options are 'bond', 'futures', 'index', 'forex',
          'bitcoin', 'stock'.
      symbol:
        description: Filter ideas/posts related to the specified symbol (e.g., 'NASDAQ:AAPL').
      sort:
        description: Sorting option. Options are 'latest_popular', 'recent', 'picked_time'.
          Default is 'latest_popular'.
quote:
  name: quote
  description: Retrieve the latest quote for the specified financial instrument.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol of the financial instrument (e.g., 'AAPL', 'EUR/USD',
          'ETH/BTC').
      interval:
        description: Time interval between data points. Supported values are `1min`,
          `5min`, `15min`, `30min`, `45min`, `1h`, `2h`, `4h`, `1day`, `1week`, `1month`.
      outputsize:
        description: The number of data points to retrieve. Defaults to 30.
      format:
        description: The format of the response. Can be 'csv' or 'json'. Defaults
          to 'json'.
get_all_models_by_brand_and_family:
  name: get_all_models_by_brand_and_family
  description: Fetches all watch models by given brand and family from the Watch Database
    API.
  parameters:
    type: object
    properties:
      family:
        description: The family name of the watch models to retrieve.
      brandname:
        description: The brand name of the watch models to retrieve.
get_sample_businessprofile:
  name: get_sample_businessprofile
  description: Fetches fake-generated Business Profile sample data using a specified
    API.
  parameters:
    type: object
    properties:
      locale:
        description: The locale to set language and regional details of the generated
          profiles. Defaults to 'en'.
      count:
        description: The number of profiles to generate. The maximum count is 1000.
          Defaults to 1.
        type: integer
check_wordpress:
  name: check_wordpress
  description: Checks whether the specified URL is running WordPress using the provided
    User-Agent and RapidAPI key.
  parameters:
    type: object
    properties:
      user_agent:
        description: The User-Agent string to include in the request headers.
      url:
        description: The URL of the website to check for WordPress.
riddle_by_id:
  name: riddle_by_id
  description: Fetches a riddle by its ID from the Riddlie API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the riddle to fetch.
super_lig_standings:
  name: super_lig_standings
  description: Fetches the standings of the Super Lig for a specific season using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      season:
        description: 'The season for which standings are required. Example: ''2022''.
          If not provided, the current season''s standings will be fetched.'
get_ecoindex_analysis_list_version_ecoindexes_get:
  name: get_ecoindex_analysis_list_version_ecoindexes_get
  description: Fetches a list of ecoindex analysis based on the specified version
    and query filters. The results are ordered by ascending date.
  parameters:
    type: object
    properties:
      version:
        description: Engine version used to run the analysis (e.g., 'v0' or 'v1').
      size:
        description: Number of elements per page. Defaults to 50.
      host:
        description: Host name to filter the results by.
      date_from:
        description: 'Start date for filtering results (format: ''YYYY-MM-DD'').'
      page:
        description: Page number to retrieve. Defaults to 1.
      date_to:
        description: 'End date for filtering results (format: ''YYYY-MM-DD'').'
new_ios_apps:
  name: new_ios_apps
  description: Fetch a list of new iOS apps from the App Store using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      country:
        description: The country code for the App Store. Defaults to 'us'.
      category:
        description: The category code for the type of apps. Defaults to '6016'.
      lang:
        description: The language code for the App Store content. Defaults to 'en'.
      num:
        description: The number of results to return. Defaults to 100.
news_list_flash:
  name: news_list_flash
  description: Fetches a list of flash news articles using the Webull API.
  parameters:
    type: object
    properties:
      currentnewsid:
        description: For paging purposes, this is the ID of the last news returned
          by this endpoint. Pass 0 for the first query. Defaults to 0.
      pagesize:
        description: For paging purposes, this parameter specifies the maximum number
          of news articles to return. The maximum value is 20. Defaults to 20.
countries:
  name: countries
  description: List or search for countries of the world in different languages. This
    function allows filtering and specifying the fields to return for each country,
    such as ISO codes, currency details, and dial codes.
  parameters:
    type: object
    properties:
      currency:
        description: Filter by the currency name in the chosen language.
      dial_code:
        description: Filter by the country's dial code.
      currency_code:
        description: Filter by the 3-letter currency code (ISO).
      fields:
        description: Specify which fields to return for each country. Defaults to
          'currency,currency_num_code,currency_code,continent_code,currency,iso_a3,dial_code'.
      iso_a2:
        description: Filter by the 2-letter ISO country code.
      name:
        description: Search string for the country name, can be partial.
      limit:
        description: Limit the number of results returned. Defaults to 250.
      continent_code:
        description: Filter by the 2-letter region/continent code (e.g., 'eu', 'na',
          'sa', 'as', 'af', 'oc', 'an').
      iso_a3:
        description: Filter by the 3-letter ISO country code.
      currency_num_code:
        description: Filter by the 3-digit numeric currency code (ISO).
      lang:
        description: Language selection ISO 639-1 code. Overrides the Accept-Language
          header. Defaults to 'en'.
search_patent:
  name: search_patent
  description: Searches for patents using a keyword and data source, and returns a
    list of patents.
  parameters:
    type: object
    properties:
      q:
        description: Keyword used for searching patents.
      ds:
        description: Data source to search for patents.
symbols_faq:
  name: symbols_faq
  description: Fetch answers to common questions for a given ticker symbol.
  parameters:
    type: object
    properties:
      ticker_slug:
        description: The ticker symbol for which to fetch FAQ answers (e.g., 'NVDA').
breed_type:
  name: breed_type
  description: Fetches information about cat breeds based on the specified breed type.
  parameters:
    type: object
    properties:
      breedtype:
        description: The type of cat breed to search for.
searchoffers:
  name: searchoffers
  description: Gets all job offers from the given parameters.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search for job offers.
      posted:
        description: The time frame for when the job offers were posted (e.g., 'last
          24 hours', 'last 7 days').
      offset:
        description: The index offset for pagination of results.
        type: integer
      location:
        description: The location to search for job offers.
price_probability:
  name: price_probability
  description: Fetch the probabilistic outcome of a stock's price based on over 1000
    forecasts.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which the probabilistic outcome is to be
          fetched.
peers:
  name: peers
  description: Retrieves a list of company peers given a stock symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for the company.
morning_star:
  name: morning_star
  description: Fetches stocks that have the Morning Star signal from the RapidAPI
    service.
  parameters:
    type: object
    properties:
      page:
        description: The page number of results to retrieve. Defaults to 1.
hex_to_hsv:
  name: hex_to_hsv
  description: Converts a hex color code to an HSV color code using the Convexity
    API.
  parameters:
    type: object
    properties:
      hex:
        description: The hex color code to be converted.
shotmap:
  name: shotmap
  description: Fetches the shotmap data for a given event from the SofaSport API.
  parameters:
    type: object
    properties:
      event_id:
        description: The unique identifier for the event.
        type: integer
get_session_info:
  name: get_session_info
  description: Fetches session information using the provided session ID and RapidAPI
    key.
  parameters:
    type: object
    properties:
      session_id:
        description: The unique identifier for the session.
gettrendinglenses:
  name: gettrendinglenses
  description: Fetches the trending lenses from Snapchat using the RapidAPI service.
  parameters:
    type: object
    properties:
      cursor:
        description: A cursor for pagination. Defaults to None.
analysis_list_deprecated:
  name: analysis_list_deprecated
  description: Fetches a list of analyses for a specified financial symbol using the
    Seeking Alpha API.
  parameters:
    type: object
    properties:
      is_id:
        description: The symbol to query for data. Only one symbol is allowed at a
          time.
      size:
        description: The number of items per response. Defaults to 20.
      until:
        description: The value used to load the next page of data. This corresponds
          to the value of meta/page/minmaxPublishOn/min in the JSON response.
consulta_por_cnpj:
  name: consulta_por_cnpj
  description: Fetches data and information for a given CNPJ.
  parameters:
    type: object
    properties:
      cnpj:
        description: The CNPJ number to be queried.
stock_v2_get_price_fair_value:
  name: stock_v2_get_price_fair_value
  description: Fetches the price vs fair value data for a given stock.
  parameters:
    type: object
    properties:
      performanceid:
        description: The performance ID of the stock. This value can be obtained from
          endpoints such as /auto-complete, /get-summary, or /get-movers.
get_exchange_pairs:
  name: get_exchange_pairs
  description: Retrieves the top 100 exchange pairs for a given exchange ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the exchange for which to retrieve pairs.
        type: integer
air_quality_forecast:
  name: air_quality_forecast
  description: Returns an air quality forecast for a given location.
  parameters:
    type: object
    properties:
      lat:
        description: The latitude of the location for which the air quality forecast
          is to be retrieved.
        type: integer
      lon:
        description: The longitude of the location for which the air quality forecast
          is to be retrieved.
        type: integer
      hours:
        description: The number of hours for which the forecast is to be retrieved
          (default is 72).
        type: integer
rapidapigetforecasthourlybycoordinates:
  name: rapidapigetforecasthourlybycoordinates
  description: Gets hourly weather forecast information for given geographical coordinates
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      latitude:
        description: The latitude of the geographical location.
        type: integer
      longitude:
        description: The longitude of the geographical location.
        type: integer
product_fulfillment:
  name: product_fulfillment
  description: Fetches product fulfillment information from Target's API based on
    provided parameters.
  parameters:
    type: object
    properties:
      tcin:
        description: Target product ID.
      accept:
        description: Content types that are acceptable for the response (default is
          'application/json').
      cache_control:
        description: Cache control settings (default is 'no-cache').
      authority:
        description: Authority hosting the API (default is 'redsky.target.com').
      accept_language:
        description: List of acceptable languages for the response (default is 'en-US,en;q=0.9').
      zip:
        description: The zipcode of the user's search location (default is '94611').
      state:
        description: State code of the user's location (default is 'CA').
      longitude:
        description: User's longitude information (default is '-122.200').
      store_id:
        description: The ID of the Target store from which the fulfillment information
          is being retrieved (default is '3330').
      latitude:
        description: User's latitude information (default is '37.820').
extract:
  name: extract
  description: Extract and validate phone or cell numbers from the given text.
  parameters:
    type: object
    properties:
      text:
        description: The text containing phone or cell numbers to be extracted and
          validated.
      country:
        description: The country name or ISO2/ISO3 code to be used for identifying
          the number format. Defaults to None.
      country_auto:
        description: Flag to auto-detect the country if not provided. Accepts values
          0 (false), 1 (fast mode), and 2 (slow mode). Defaults to 0.
repost:
  name: repost
  description: Reposts an article to the Telegraph platform using the Telegraph API.
  parameters:
    type: object
    properties:
      article_url:
        description: URL of the article or blog post to be reposted.
      title:
        description: Title of the Telegraph post. Defaults to None.
      author_url:
        description: URL of the author. Defaults to None.
      author_name:
        description: Name of the author. Defaults to None.
get_product_details_all_countries:
  name: get_product_details_all_countries
  description: Fetches the details of a specific product from Amazon using its ASIN
    code, for a given language and country code.
  parameters:
    type: object
    properties:
      asin:
        description: The Amazon Standard Identification Number (ASIN) of the product.
      languagecode:
        description: The language code for the product details. Defaults to 'EN'.
      countrycode:
        description: The country code for the Amazon site to query. Defaults to 'US'.
search_translations:
  name: search_translations
  description: Fetch a list of translations from the translation memory ranked by
    quality and similarity.
  parameters:
    type: object
    properties:
      langpair:
        description: The language pair in the format `source|target`, using two ISO-639
          language codes.
      q:
        description: The text you wish to translate.
      onlyprivate:
        description: If set to '1', only private matches will be returned. Defaults
          to '0' (disabled).
      mt:
        description: Enables machine translation results. '1' (enabled) is the default,
          '0' disables it.
      de:
        description: A valid email address, recommended for high volume usage or use
          with CAT tools. Defaults to 'a@b.c'.
      key:
        description: API key to access private memories and customize API limits.
select_race_based_on_id:
  name: select_race_based_on_id
  description: Fetches the details of a specific race using its ID from the F1 race
    schedule API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the race to fetch details for.
list_target_languages:
  name: list_target_languages
  description: Retrieves a paginated list of target languages from the API.
  parameters:
    type: object
    properties:
      page:
        description: Return search results starting at a given page. Defaults to 1.
      per_page:
        description: Number of entries to be returned per page. Only values between
          1 and 100 (inclusive) are allowed. Defaults to 100.
extract_info:
  name: extract_info
  description: Retrieve detailed information about a book using its ID from the Project
    Gutenberg API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the book to retrieve information for.
get_the_next_dividend_payout_date:
  name: get_the_next_dividend_payout_date
  description: Fetches the next dividend payout date for a given stock ticker using
    the Sunday Finance API.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol to lookup for the next dividend payout
          date.
license_plate_to_vin:
  name: license_plate_to_vin
  description: Converts a vehicle's license plate number to its corresponding VIN
    (Vehicle Identification Number).
  parameters:
    type: object
    properties:
      state_code:
        description: The state code where the license plate is registered (e.g., 'CA'
          for California).
      license_plate:
        description: The license plate number of the vehicle.
getvideodetails:
  name: getvideodetails
  description: Retrieve video details from YouTube using a specified video ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the video to retrieve details for.
get_mark_price_kline:
  name: get_mark_price_kline
  description: Fetches the mark price kline data for a specified trading symbol within
    a given time range and interval.
  parameters:
    type: object
    properties:
      interval:
        description: The Kline interval. Possible values are '1', '3', '5', '15',
          '30', '60', '120', '240', '360', '720', 'D', 'M', 'W'.
      start:
        description: The start timestamp for the result in milliseconds.
        type: integer
      symbol:
        description: The trading symbol to query.
      category:
        description: The derivatives products category. Currently available categories
          include 'linear' and 'inverse' (inverse futures).
      end:
        description: The end timestamp for the result in milliseconds.
        type: integer
      limit:
        description: The limit for data size per page, with a maximum of 200. Defaults
          to 200 pieces of data per page.
getpowerplantbyradiusandgps:
  name: getpowerplantbyradiusandgps
  description: Fetches information about power plants within a specified radius from
    given GPS coordinates.
  parameters:
    type: object
    properties:
      latitude:
        description: The latitude coordinate to search around.
        type: integer
      longitude:
        description: The longitude coordinate to search around.
        type: integer
      page_number:
        description: The page number for paginated results. Defaults to None.
      radius_km:
        description: The radius in kilometers to search within. Defaults to 100 km
          if not provided.
qualifyingresults:
  name: qualifyingresults
  description: Fetches the qualifying results for a specific year and round of the
    Formula 1 season.
  parameters:
    type: object
    properties:
      year:
        description: The year of the Formula 1 season.
      round:
        description: The round of the Formula 1 season.
leaguemedia:
  name: leaguemedia
  description: Fetches media content for a specified football tournament, including
    images and videos.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The ID of the tournament for which you want to retrieve media.
        type: integer
clubs_list_by_competition:
  name: clubs_list_by_competition
  description: Fetches the list of clubs in a specific competition using the specified
    competition ID and domain.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the competition to fetch the list of clubs for. This
          value is returned from the .../search or .../competitions/list endpoints.
      domain:
        description: 'The domain to use for the request. It should be one of the following:
          ''com'', ''de'', ''be'', ''es'', ''it'', ''nl'', ''pl'', ''pt'', ''com.tr'',
          ''world''. Defaults to ''de''.'
seasonal_statistics_quarter_analysis:
  name: seasonal_statistics_quarter_analysis
  description: Fetches and returns the seasonal quarter analysis and statistics for
    a specific basketball team using the RapidAPI.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the team for which the analysis and statistics are
          to be retrieved.
        type: integer
categoryflag:
  name: categoryflag
  description: Fetches the flag image of a specific category in PNG format from the
    Motorsport API.
  parameters:
    type: object
    properties:
      flag:
        description: The name of the flag category to fetch.
schedule_date:
  name: schedule_date
  description: Fetches the baseball game schedule for a given date using the specified
    RapidAPI key.
  parameters:
    type: object
    properties:
      date:
        description: The date in the format 'YYYY-MM-DD' for which to fetch the baseball
          schedule. Defaults to '2021-07-30'.
get_stream_game_name:
  name: get_stream_game_name
  description: Fetch the current game name of a Twitch stream for a given user ID.
  parameters:
    type: object
    properties:
      userid:
        description: The Twitch user ID for which to fetch the current game name.
v1_airports:
  name: v1_airports
  description: Fetches information from the API Ninjas Airports API endpoint based
    on specified search criteria. At least one of the optional parameters must be
    provided.
  parameters:
    type: object
    properties:
      offset:
        description: Number of results to offset for pagination.
      max_elevation:
        description: Maximum airport elevation in feet.
      region:
        description: Administrative region such as state or province within a country
          (e.g., California).
      min_elevation:
        description: Minimum airport elevation in feet.
      city:
        description: Airport city (e.g., London).
      country:
        description: Minimum airport elevation in feet.
      timezone:
        description: Airport timezone (e.g., Europe/London).
      name:
        description: Airport name. This parameter supports partial matching (e.g.,
          Heathrow will match London Heathrow Airport). Defaults to 'London Heathrow'.
      icao:
        description: International Civil Aviation Organization (ICAO) 4-character
          airport code.
      iata:
        description: International Air Transport Association (IATA) 3-character airport
          code.
detailed_cocktail_recipe_by_id:
  name: detailed_cocktail_recipe_by_id
  description: Fetches a detailed cocktail recipe by its ID from the Cocktail DB API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the cocktail to fetch the recipe for.
tts:
  name: tts
  description: Converts given text to speech in the specified language and returns
    the result in .mp3 format using the RapidAPI service.
  parameters:
    type: object
    properties:
      text:
        description: The text to be converted to speech.
      lang:
        description: Language code for the speech conversion. Defaults to 'en'.
getfutureeventsbytopic:
  name: getfutureeventsbytopic
  description: Retrieve future Azure events related to a specified topic, paginated
    by the given page number.
  parameters:
    type: object
    properties:
      topic:
        description: The topic for which to retrieve future Azure events.
      page:
        description: The page number for the paginated list of events.
        type: integer
get_dns_records:
  name: get_dns_records
  description: Fetch DNS records for a given domain using the specified parameters.
  parameters:
    type: object
    properties:
      domain:
        description: The domain for which to fetch the DNS records.
      record_type:
        description: A comma-separated string specifying the types of DNS records
          to fetch. Possible values include 'a', 'ns', 'mx', 'txt', and 'cname'. Defaults
          to 'a,mx'.
      response_type_seperator:
        description: Specifies the delimiter to use when the response type is 'target'.
          Default is ',' (comma).
      response_type:
        description: Specifies the kind of data to return, such as 'ip', 'txt', or
          'target'. Default is 'target'.
v1_stars:
  name: v1_stars
  description: Fetches a list of stars matching specified parameters with a maximum
    of 30 results per request. To access more than 30 results, use the offset parameter
    to paginate through multiple API calls.
  parameters:
    type: object
    properties:
      min_distance_light_year:
        description: Minimum distance of the star from Earth in light years.
      min_apparent_magnitude:
        description: Minimum apparent magnitude (brightness) of the star.
      constellation:
        description: Identifier of the constellation the star belongs to.
      max_apparent_magnitude:
        description: Maximum apparent magnitude (brightness) of the star.
      offset:
        description: Number of results to skip for pagination.
      name:
        description: Name of the star. Note that many star names contain Greek characters.
          Default is 'vega'.
      max_absolute_magnitude:
        description: Maximum absolute magnitude (brightness) of the star.
      min_absolute_magnitude:
        description: Minimum absolute magnitude (brightness) of the star.
      max_distance_light_year:
        description: Maximum distance of the star from Earth in light years.
getprojectsbytopic:
  name: getprojectsbytopic
  description: Fetches artificial intelligence projects based on the specified topic
    and page number.
  parameters:
    type: object
    properties:
      topic:
        description: The topic to filter AI projects.
      page:
        description: The page number of the results to fetch.
        type: integer
get_anime_by_id:
  name: get_anime_by_id
  description: Retrieves detailed information about an anime given its unique identifier
    using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the anime.
        type: integer
getpercentage:
  name: getpercentage
  description: Calculates and returns the love compatibility percentage between two
    names using the Love Calculator API.
  parameters:
    type: object
    properties:
      sname:
        description: The second name to be used in the compatibility calculation.
      fname:
        description: The first name to be used in the compatibility calculation.
search_manga:
  name: search_manga
  description: Search for manga using the Mangaverse API based on a given text.
  parameters:
    type: object
    properties:
      text:
        description: The text to search for in manga titles and subtitles. Defaults
          to 'isekai'.
autocomplete_zipcodes_lite:
  name: autocomplete_zipcodes_lite
  description: Fetches autocomplete suggestions for USA zip codes using the provided
    RapidAPI key.
  parameters:
    type: object
    properties:
      zipcode:
        description: The zip code for which to fetch autocomplete suggestions.
video_info:
  name: video_info
  description: Fetches video information from YouTube using the provided video ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the YouTube video for which the information is to be
          fetched.
check_phone_number:
  name: check_phone_number
  description: Checks whether a given phone number is a valid WhatsApp number.
  parameters:
    type: object
    properties:
      phone:
        description: The WhatsApp phone number to be checked, including the country
          code.
        type: integer
v1_aggregation:
  name: v1_aggregation
  description: Aggregates news article counts based on specified search criteria and
    time intervals.
  parameters:
    type: object
    properties:
      q:
        description: The search query string, which must be URL-encoded.
      country:
        description: The country to narrow the search to, specified using ISO 3166-1
          alpha-2 codes. This parameter is experimental and recommended to be used
          with the `lang` parameter.
      topic:
        description: The topic to filter articles by. Accepted values include `news`,
          `sport`, `tech`, `world`, `finance`, `politics`, `business`, `economics`,
          `entertainment`, `beauty`, `travel`, `music`, `food`, `science`. This parameter
          is experimental.
      sources:
        description: 'Comma-separated string of news sources to filter the search.
          Example: `nytimes.com,cnn.com`.'
      agg_by:
        description: Aggregation interval for the results. Accepts `day` (default)
          or `hour`.
      to_rank:
        description: Upper boundary of the rank of news websites to filter the search.
      media:
        description: When set to `True`, includes `media` and `media_content` fields
          in the output which provide information about images associated with the
          articles.
      lang:
        description: The language to filter the search. Acceptable values include
          language codes like `en` for English, `es` for Spanish, etc.
      not_sources:
        description: 'Comma-separated string of sources to exclude from the search.
          Example: `nytimes.com,cnn.com`.'
      to:
        description: The end date and time to search until, in UTC. Various date formats
          are accepted.
      ranked_only:
        description: Limit the search to sources that are in the top 1 million online
          websites. Default is `True`.
      is_from:
        description: The start date and time to search from, in UTC. Various date
          formats are accepted. The default is set to one week ago at midnight UTC.
      search_in:
        description: Defines where to search the provided query (in `title`, `summary`,
          or both). Default is both.
      from_rank:
        description: Lower boundary of the rank of news websites to filter the search.
          Lower rank indicates higher popularity.
account_transaction_history:
  name: account_transaction_history
  description: Retrieves an array of all transactions associated with a specific address
    on the Optimism blockchain.
  parameters:
    type: object
    properties:
      address:
        description: The blockchain address to query for transaction history.
      network:
