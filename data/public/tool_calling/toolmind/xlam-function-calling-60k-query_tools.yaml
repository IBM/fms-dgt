  parameters:
    type: object
    properties:
      a:
        type: number
        description: First number.
      b:
        type: number
        description: Second number.
    required:
    - a
    - b
  output_parameters:
    type: object
    properties:
      result:
        type: number
        description: Sum of the two numbers.
divide:
  name: divide
  description: 'This tool belongs to the Math API, which provides various mathematical
    operations. Tool description: Divide one number by another.'
  parameters:
    type: object
    properties:
      a:
        type: number
        description: Numerator.
      b:
        type: number
        description: Denominator.
    required:
    - a
    - b
  output_parameters:
    type: object
    properties:
      result:
        type: number
        description: Quotient of the division.
add_to_watchlist:
  name: add_to_watchlist
  description: 'This tool belongs to the trading system, which allows users to trade
