bundesliga_standings:
  name: bundesliga_standings
  description: Fetches the Bundesliga standings for a given season using the provided
    RapidAPI key.
  parameters:
    type: object
    properties:
      season:
        description: The specific season to fetch standings for (e.g., '2022'). If
          not provided, the current season standings will be fetched.
leaguehometeamevents:
  name: leaguehometeamevents
  description: Retrieves the last 5 home events for a specific league and season using
    the Baseball API.
  parameters:
    type: object
    properties:
      seasonid:
        description: The ID of the season for which to retrieve the home team events.
        type: integer
      tournamentid:
        description: The unique ID of the tournament for which to retrieve the home
          team events.
        type: integer
matchschedules:
  name: matchschedules
  description: Fetches football match schedules for a specific date using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      month:
        description: The month (1-12) for which to retrieve the schedules.
        type: integer
      day:
        description: The day (1-31) for which to retrieve the schedules.
        type: integer
      year:
        description: The year (e.g., 2023) for which to retrieve the schedules.
        type: integer
i18nlanguages:
  name: i18nlanguages
  description: Fetches a list of application languages that the YouTube website supports
    via the RapidAPI YouTube v3.11 endpoint.
  parameters:
    type: object
    properties:
      part:
        description: Specifies the i18nLanguage resource properties that the API response
          will include. Set the parameter value to snippet.
      hl:
        description: Specifies the language that should be used for text values in
          the API response. Defaults to 'en_US'.
search_countries_by_idd:
  name: search_countries_by_idd
  description: Searches for countries using their International Direct Dialing (IDD)
    number.
  parameters:
    type: object
    properties:
      idd:
        description: International Direct Dialing number, starting with '+'.
      limit:
        description: The maximum number of records to return in a single page. Defaults
          to 10.
      offset:
        description: The page number from which the search should continue, zero-indexed.
          Defaults to 0.
      fields:
        description: Comma-separated list of fields to filter the response. Defaults
          to None.
get_range_of_verses:
  name: get_range_of_verses
  description: Fetches a collection of Ayahs/Verses from a specific chapter/surah
    of the Quran along with original Arabic text, translation, transliteration, and
    verse ID in JSON format using the RapidAPI service.
  parameters:
    type: object
    properties:
      chapterid:
        description: The ID of the chapter/surah to retrieve.
        type: integer
      range:
        description: The range of verses to fetch (e.g., "1-10").
address_autosuggest:
  name: address_autosuggest
  description: Fetches address suggestions based on a partial or complete address
    query using the Address Autosuggest API.
  parameters:
    type: object
    properties:
      query:
        description: The partial or complete text of the address to search for suggestions.
list_folder_contents:
  name: list_folder_contents
  description: Retrieves the contents of a specified Github repository folder using
    the Git Pager API.
  parameters:
    type: object
    properties:
      repo:
        description: The repository name in the format 'owner/repo'. Defaults to 'gina305/switch-code'.
      path:
        description: The filepath within the repository. Defaults to '/'.
      key:
        description: The access token for Github API authentication.
convert_hsl:
  name: convert_hsl
  description: Converts an HSL color code to other color codes such as Hex, RGB, and
    CMYK using the Convexity API.
  parameters:
    type: object
    properties:
      s:
        description: The saturation component of the HSL color code.
        type: integer
      h:
        description: The hue component of the HSL color code.
        type: integer
      l:
        description: The lightness component of the HSL color code.
        type: integer
qr_code_image:
  name: qr_code_image
  description: Generates a QR Code image of a specified size for a given URL.
  parameters:
    type: object
    properties:
      size:
        description: The size of the QR code image. Default is 5.
      url:
        description: The URL to be encoded in the QR code. Default is 'www.google.com'.
rgb_to_hsl:
  name: rgb_to_hsl
  description: Converts RGB color values to HSL color values using the RapidAPI service.
  parameters:
    type: object
    properties:
      r:
        description: Red component of the RGB color (0-255).
        type: integer
      g:
        description: Green component of the RGB color (0-255).
        type: integer
      b:
        description: Blue component of the RGB color (0-255).
        type: integer
v1_whois:
  name: v1_whois
  description: Fetches the WHOIS information for a given domain using the API Ninjas
    Whois API.
  parameters:
    type: object
    properties:
      domain:
        description: The domain to retrieve WHOIS information for.
retrieve_file:
  name: retrieve_file
  description: Retrieves a file from the server using the provided file path and API
    key.
  parameters:
    type: object
    properties:
      path:
        description: The path of the file to be retrieved. This path is typically
          obtained by replacing the /p/ path in the /merge and /edit endpoint responses
          with /f/ or /d/.
disposable_domain_and_suggest_domain:
  name: disposable_domain_and_suggest_domain
  description: Checks if the given domain is disposable and provides a suggested alternative
    domain.
  parameters:
    type: object
    properties:
      domain:
        description: The domain to be checked.
search_php:
  name: search_php
  description: Search for geocoding information using the specified Geokeo Forward
    Geocoding API.
  parameters:
    type: object
    properties:
      api:
        description: The API key for accessing the Geokeo Forward Geocoding service.
      q:
        description: The address or location query string to be geocoded.
mass_from_to_number:
  name: mass_from_to_number
  description: Converts a mass value from one unit to another using the RapidAPI unit
    conversion service.
  parameters:
    type: object
    properties:
      number:
        description: The numerical value of the mass to be converted.
        type: integer
      is_from:
        description: The unit of mass to convert from (e.g., 'kg', 'lb').
      to:
        description: The unit of mass to convert to (e.g., 'kg', 'lb').
get_5_year_historical_monthly_prices:
  name: get_5_year_historical_monthly_prices
  description: Fetch 5-year historical monthly stock prices for a given ticker symbol.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which historical data is to be fetched.
autocomplete:
  name: autocomplete
  description: Fetches autocomplete suggestions for places, locations, and addresses
    using the Waze API.
  parameters:
    type: object
    properties:
      q:
        description: Free-text geographic query.
      lang:
        description: The language of the results. Defaults to 'en'. Refer to https://wazeopedia.waze.com/wiki/USA/Countries_and_Languages
          for a list of supported languages.
      coordinates:
        description: Geographic coordinates (latitude, longitude) to bias the results.
          Defaults to '37.376754, -122.023350'. Recommended for getting accurate results.
get_ios_app:
  name: get_ios_app
  description: Fetches a specific iOS app's details using the app ID from the iOS
    Store API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the iOS app to fetch.
probability_of_consecutive_rolls:
  name: probability_of_consecutive_rolls
  description: Calculates the probability of rolling a specific value on a die consecutively
    for a given number of rolls.
  parameters:
    type: object
    properties:
      target_value:
        description: The desired value to be rolled.
        type: integer
      num_rolls:
        description: The number of consecutive rolls.
        type: integer
      num_sides:
        description: The number of sides on the die. Defaults to 6.
get_user_profile:
  name: get_user_profile
  description: Fetches the user profile from the 9GAG API using the provided username.
  parameters:
    type: object
    properties:
      username:
        description: The username of the user whose profile needs to be fetched.
get_pokemon_move_info:
  name: get_pokemon_move_info
  description: "Retrieves information about a Pok\xE9mon's move using the Pok\xE9\
    API."
  parameters:
    type: object
    properties:
      pokemon_name:
        description: "The name of the Pok\xE9mon."
      move_name:
        description: The name of the move to check. Defaults to "run".
count_bits:
  name: count_bits
  description: Counts the number of set bits (1's) in the binary representation of
    a number.
  parameters:
    type: object
    properties:
      num:
        description: The input number.
        type: integer
v1_weather:
  name: v1_weather
  description: Fetches weather information from the API Ninjas Weather API endpoint.
  parameters:
    type: object
    properties:
      country:
        description: The country name.
      lon:
        description: The longitude of the desired location. Must be supplied with
          the `lat` parameter.
      zip:
        description: The 5-digit zip code (United States only).
      state:
        description: The US state (United States only).
      city:
        description: The city name. Defaults to 'Seattle'.
      lat:
        description: The latitude of the desired location. Must be supplied with the
          `lon` parameter.
getstatus:
  name: getstatus
  description: Fetches the status of the current session for a given phone ID from
    the Maytapi WhatsApp API.
  parameters:
    type: object
    properties:
      phone_id:
        description: The unique identifier for the phone whose session status is to
          be queried.
ip_address:
  name: ip_address
  description: Fetch information about an IP address using the IP-to-Income RapidAPI.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to look up information for.
get_vehicule_info:
  name: get_vehicule_info
  description: Fetches vehicle information from the API PLAQUE IMMATRICULATION using
    provided parameters.
  parameters:
    type: object
    properties:
      token:
        description: The token for API authentication. Defaults to 'TokenDemoRapidapi'.
      host_name:
        description: The base URL of the API endpoint. Defaults to 'https://apiplaqueimmatriculation.com'.
      immatriculation:
        description: The vehicle registration number. Defaults to 'AA-123-BC'.
gettechdomains:
  name: gettechdomains
  description: Retrieve the domains that use a specific technology.
  parameters:
    type: object
    properties:
      tech:
        description: The name of the technology to search for.
student_property_to_rent:
  name: student_property_to_rent
  description: Fetch student rental properties based on various search criteria.
  parameters:
    type: object
    properties:
      identifier:
        description: A unique location identifier obtained from the auto-complete
          endpoint.
      sort_by:
        description: The criteria to sort the results by.
      page:
        description: The page number to retrieve results from.
      max_price:
        description: The maximum price filter for the properties.
      search_radius:
        description: The search radius in miles from the specified location. Defaults
          to '0.0'.
      min_price:
        description: The minimum price filter for the properties.
      max_bedroom:
        description: The maximum number of bedrooms filter.
      furnished_type:
        description: 'The type of furnishing (comma-separated values). Examples: ''Furnished,PartFurnished,Unfurnished''.'
      min_bedroom:
        description: The minimum number of bedrooms filter.
      has_garden:
        description: Filter to include properties with a garden.
      added_to_site:
        description: The date the property was added to the site.
      property_type:
        description: 'The type of property (comma-separated values). Examples: ''Bungalow,StudentHalls,Detached,SemiDetached,Terraced,Flat''.'
      keywords:
        description: 'Keywords to filter properties (comma-separated values). Examples:
          ''pool, garden''.'
      has_house_share:
        description: Filter to include properties that have house sharing options.
      has_include_let_agreed:
        description: Filter to include properties that are let agreed.
      has_parking:
        description: Filter to include properties with parking.
      do_not_show_house_share:
        description: Filter to exclude properties with house sharing options.
getforecastweather:
  name: getforecastweather
  description: Fetches weather forecast data for a specified city using the OpenWeatherMap
    API.
  parameters:
    type: object
    properties:
      q:
        description: The city name for which the weather forecast is requested.
      cnt:
        description: The number of timestamps to return in the response. Defaults
          to None.
      units:
        description: Units of measurement. Options are 'imperial' for Fahrenheit,
          'metric' for Celsius, and 'standard' for Kelvin. Defaults to 'standard'.
      lang:
        description: Language for the output. Translation applies to city name and
          description fields. Defaults to None.
location_search:
  name: location_search
  description: Search for Instagram locations based on a specific keyword using the
    provided RapidAPI key.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search Instagram locations for.
get_weather_updates:
  name: get_weather_updates
  description: Fetches weather updates for a given city using the RapidAPI Weather
    API.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city for which to retrieve weather information.
matchdetails:
  name: matchdetails
  description: Retrieve detailed information for a specific ice hockey match using
    the provided match ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the ice hockey match for which to retrieve details.
        type: integer
daily_match_list_scheduled:
  name: daily_match_list_scheduled
  description: Retrieves the list of scheduled football matches for a given date.
  parameters:
    type: object
    properties:
      date:
        description: The date of the matches in the format {dd/mm/yyyy}.
event_managers:
  name: event_managers
  description: Fetch team managers by event ID using the Sofasport API.
  parameters:
    type: object
    properties:
      event_id:
        description: The ID of the event for which to retrieve managers.
        type: integer
list_of_leagues:
  name: list_of_leagues
  description: Fetches a list of leagues for a given sport using the provided RapidAPI
    key.
  parameters:
    type: object
    properties:
      sport_id:
        description: The ID of the sport for which to fetch the leagues.
        type: integer
calculate_quarterly_dividend:
  name: calculate_quarterly_dividend
  description: Calculates the quarterly dividend per share based on the total dividend
    payout and the number of outstanding shares.
  parameters:
    type: object
    properties:
      total_dividend:
        description: The total dividend payout in USD.
        type: integer
      num_shares:
        description: The number of outstanding shares.
        type: integer
v1_verify:
  name: v1_verify
  description: Validates an email address using the QuickEmailVerification API.
  parameters:
    type: object
    properties:
      email:
        description: The email address to validate.
sentiment:
  name: sentiment
  description: Analyzes the sentiment of the given text using the VADER sentiment
    analysis tool through the RapidAPI platform.
  parameters:
    type: object
    properties:
      text:
        description: The input text whose sentiment needs to be analyzed.
translation:
  name: translation
  description: Translates the given text into the specified language using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      content_type:
        description: The type of content being translated (e.g., 'text').
      text:
        description: The text to be translated.
      language:
        description: The target language for the translation.
alerts_active_zone_zoneid:
  name: alerts_active_zone_zoneid
  description: Fetches a list of active weather alerts for a specified zone ID using
    the National Weather Service API.
  parameters:
    type: object
    properties:
      zoneid:
        description: 'A valid zone ID for which to fetch the active alerts. Example:
          ''ILZ081''.'
time_zone_api:
  name: time_zone_api
  description: Retrieves the current local time and UTC offset hour and minute for
    a specified location.
  parameters:
    type: object
    properties:
      q:
        description: Location query such as city name, coordinates, or IP address.
      format:
        description: Desired response format, default is None.
daily_forecast_5_days:
  name: daily_forecast_5_days
  description: Fetch a 5-day daily weather forecast for the specified geographic coordinates.
  parameters:
    type: object
    properties:
      longitude:
        description: The longitude of the location for which the forecast is to be
          retrieved.
      latitude:
        description: The latitude of the location for which the forecast is to be
          retrieved.
title_get_technical:
  name: title_get_technical
  description: Fetches technical information for a movie or TV show using its tconst
    identifier and RapidAPI key.
  parameters:
    type: object
    properties:
      tconst:
        description: The unique identifier for a title, typically starting with 'tt',
          obtained from endpoints like /title/auto-complete or /title/find.
theaters_list:
  name: theaters_list
  description: List theaters around a specified postal code or GEO location using
    the Flixster API.
  parameters:
    type: object
    properties:
      longitude:
        description: The GEO longitude to search for theaters.
      zipcode:
        description: The postal code to search for theaters. Default is '90002'.
      latitude:
        description: The GEO latitude to search for theaters.
      radius:
        description: The radius (in miles) around the specified location to search
          for theaters. Default is 50.
getstats:
  name: getstats
  description: Fetches the latest and historical coronavirus statistics data, including
    confirmed cases, deaths, and recovered cases, for a specified location.
  parameters:
    type: object
    properties:
      location:
        description: ISO 3166-2 location code (e.g., "FR" for France, "US" for the
          United States, "US-CA" for California state, or "global" for worldwide statistics).
health:
  name: health
  description: Fetches health-related news from Google News using the provided language
    region and API key.
  parameters:
    type: object
    properties:
      lr:
        description: Language region for the news, e.g., 'en-US'.
find_missing_number:
  name: find_missing_number
  description: Finds the missing number in a list of integers from 0 to n.
  parameters:
    type: object
    properties:
      nums:
        description: The list of integers.
product_data:
  name: product_data
  description: Fetches detailed information about a specific product from the Ecommerce
    Product API.
  parameters:
    type: object
    properties:
      product:
        description: The name of the product to retrieve information for.
      page:
        description: The page number for paginated results. Defaults to 1.
stock_net_share_purchase_activity:
  name: stock_net_share_purchase_activity
  description: Fetches net share purchase activity information for a particular stock
    symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to retrieve net share purchase activity
          information.
markets:
  name: markets
  description: Retrieves the market countries supported by the service, used by suppliers
    to set fares based on the market (or country of purchase). The names of the markets
    returned are localized based on the provided locale.
  parameters:
    type: object
    properties:
      locale:
        description: Locale of the request. The names of the returned markets are
          localized based on this parameter.
airport_search:
  name: airport_search
  description: Search for airports using the RapidAPI Flight Fare Search API.
  parameters:
    type: object
    properties:
      query:
        description: The search term to use for finding airports.
download_chains:
  name: download_chains
  description: Downloads a list of hotel chains using the provided API key and optional
    parameters.
  parameters:
    type: object
    properties:
      resume_key:
        description: An optional key to resume results from a given ID. Default is
          None.
      limit:
        description: The limit on the number of results to return. Default is 100.
airport_arrivals:
  name: airport_arrivals
  description: Fetch the flight arrivals for a specified airport on a given date,
    optionally filtered by carrier.
  parameters:
    type: object
    properties:
      airportcode:
        description: The IATA code of the airport.
      carriercode:
        description: The IATA code of the airline carrier. Defaults to None.
      date:
        description: The date for which to fetch the arrivals, in the format YYYY-MM-DD.
          Defaults to None.
gedetailedtinsiders:
  name: gedetailedtinsiders
  description: Fetch detailed insider trading information for a given stock ticker.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which to fetch insider trading details.
album_tracks:
  name: album_tracks
  description: Fetches the tracks of a specified album from the Spotify API using
    RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the album.
      offset:
        description: The starting point for the track list. Defaults to 0.
      limit:
        description: The maximum number of tracks to return. Defaults to 300.
bolivia_songs:
  name: bolivia_songs
  description: Fetches the Bolivia Songs chart information for a given range and date.
  parameters:
    type: object
    properties:
      range:
        description: The range of the chart to fetch.
      date:
        description: The date for which the chart information is required, in the
          format YYYY-MM-DD.
multi_search:
  name: multi_search
  description: Performs a multi-search on Genius based on the given query, returning
    paginated results.
  parameters:
    type: object
    properties:
      q:
        description: The search query string.
      per_page:
        description: The number of results to return per request. Defaults to 3.
      page:
        description: The number of results to return per request. Defaults to 3.
      text_format:
        description: The format for text bodies related to the document. Can be one
          or more of `dom`, `plain`, `markdown`, and `html`, separated by commas.
          Defaults to None.
profile_image:
  name: profile_image
  description: Generates a profile image URL based on the provided user name and retrieves
    the image information from the RapidAPI image service.
  parameters:
    type: object
    properties:
      name:
        description: The user's name or any other text to generate the profile image
          URL.
live_room_bio:
  name: live_room_bio
  description: Fetches the biography of a live room from the provided `name` using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      name:
        description: The name of the live room for which to fetch the biography.
getimage:
  name: getimage
  description: Generates an image of a specified address and returns it as a base64
    encoded string.
  parameters:
    type: object
    properties:
      output:
        description: The output format of the image. Default is 'image'.
      marker:
        description: Whether or not to display a marker on the image at the given
          address. 0 for no marker, 1 for marker. Default is 0.
        type: integer
      zoom:
        description: The level of image zoom. Default is 1. Range is 0-5.
        type: integer
      address:
        description: The address or location for which to generate the image. Default
          is 'Times Square'.
      width:
        description: The width of the image in pixels. Maximum is 1024. Default is
          1024.
        type: integer
      height:
        description: The height of the image in pixels. Maximum is 1024. Default is
          1024.
        type: integer
search_news:
  name: search_news
  description: Search for news articles using a specified keyword and language.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search for in news articles.
      language:
        description: 'The language of the news articles. Supported languages include:'
actors_get_interesting_jobs:
  name: actors_get_interesting_jobs
  description: Retrieves interesting jobs for a specified actor or actress using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      nconst:
        description: The unique identifier for the actor/actress, which should start
          with "nm" (e.g., "nm0001667"). This can typically be found using the /actors/list-born-today
          or /actors/list-most-popular-celebs endpoints.
get_range:
  name: get_range
  description: Helper function to format the range string.
  parameters:
    type: object
    properties:
      start:
        description: The start of the range.
        type: integer
      end:
        description: The end of the range.
        type: integer
monthly_mortgage_payment:
  name: monthly_mortgage_payment
  description: Calculates the monthly mortgage payment based on the loan amount, annual
    interest rate, and loan term.
  parameters:
    type: object
    properties:
      loan_amount:
        description: The total amount of the loan.
        type: number
      annual_interest_rate:
        description: The annual interest rate as a decimal (e.g., 0.05 for 5%).
        type: number
      loan_term_years:
        description: The loan term in years.
        type: integer
inn_general_director:
  name: inn_general_director
  description: Retrieves the general director information of a company based on its
    INN (tax identification number) using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      inn:
        description: The INN number of the company.
qrcode:
  name: qrcode
  description: Generate a QR code based on the provided data string using the QR Code
    Generator API.
  parameters:
    type: object
    properties:
      data:
        description: The input data to be converted into a QR code.
get_pokemon_data_by_name:
  name: get_pokemon_data_by_name
  description: Fetches data for a specified Pokemon using its name from the Pokemon
    Unite API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the Pokemon for which data is to be fetched.
v1_iplookup:
  name: v1_iplookup
  description: Performs an IP address lookup using the API Ninjas IP Lookup API.
  parameters:
    type: object
    properties:
      address:
        description: The IP address to query. Must be in the format A.B.C.D (e.g.,
          73.9.149.180).
get_game_lineup:
  name: get_game_lineup
  description: Fetches the full lineup for a specific game, along with its confirmation
    status or forecast.
  parameters:
    type: object
    properties:
      gameid:
        description: The unique identifier for the game.
teammedia:
  name: teammedia
  description: Retrieves media information for a specific rugby team using the Rugby
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the rugby team for which to retrieve the media.
        type: integer
get_supported_coins_handler:
  name: get_supported_coins_handler
  description: Fetches supported cryptocurrency coins from the RapidAPI Fan Crypto
    Coins endpoint.
  parameters:
    type: object
    properties:
      cursor:
        description: Pagination string for fetching the next set of coins. Defaults
          to None.
daily_match_list_live:
  name: daily_match_list_live
  description: "Fetches the list of daily live matches for a specific date within\
    \ a \xB17 days period."
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve the match list. Format should
          be {dd/MM/yyyy}.
url:
  name: url
  description: Fetches data from the Magic Eden API by bypassing with the provided
    URL and RapidAPI key.
  parameters:
    type: object
    properties:
      url:
        description: The full Magic Eden URL to be used in the request.
dribbble:
  name: dribbble
  description: Checks the availability of a given username on Dribbble using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      username:
        description: The username to check for availability on Dribbble.
search_music:
  name: search_music
  description: Searches for music based on the provided keywords using the TikTok
    API.
  parameters:
    type: object
    properties:
      keywords:
        description: The search terms to look for in the music database.
      count:
        description: The number of results to return, with a maximum of 30. Defaults
          to 5.
      cursor:
        description: The cursor for pagination to get the next set of results. Defaults
          to None.
search_users:
  name: search_users
  description: Search for users on TikTok based on the provided keyword.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search for users on TikTok.
generate_signature:
  name: generate_signature
  description: Generates a signature for a given TikTok API URL using the specified
    RapidAPI key.
  parameters:
    type: object
    properties:
      url:
        description: The TikTok API URL for which to generate the signature.
getlearningresourcesbytopic:
  name: getlearningresourcesbytopic
  description: Retrieves Power BI learning resources based on a specified topic and
    page number.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the learning resources to retrieve.
        type: integer
      topic:
        description: The topic for which to fetch learning resources.
get_verses_by_bookname:
  name: get_verses_by_bookname
  description: Fetches a range of verses from a specified book and chapter in the
    Bible using the RapidAPI service.
  parameters:
    type: object
    properties:
      chapterid:
        description: The ID of the chapter to extract verses from.
        type: integer
      bookname:
        description: The name of the book in the Bible.
      versestart:
        description: The starting verse number.
        type: integer
      verseend:
        description: The ending verse number.
        type: integer
search_quotes:
  name: search_quotes
  description: Search for quotes based on a query string, with options for filtering
    by tags and quote length.
  parameters:
    type: object
    properties:
      q:
        description: The search term for querying quotes.
      tags:
        description: Comma-separated tags for filtering the quotes (e.g., 'faith',
          'inspirational', 'humor'). Defaults to 'inspirational,motivational'.
      max_length:
        description: Maximum length of the quotes to return. Defaults to 4000.
      limit:
        description: The number of quote results to return. Defaults to 3.
      min_length:
        description: Minimum length of the quotes to return. Defaults to 0.
is_perfect_square:
  name: is_perfect_square
  description: Checks if a number is a perfect square.
  parameters:
    type: object
    properties:
      num:
        description: The number to check.
        type: integer
convert_cooking_measurements:
  name: convert_cooking_measurements
  description: Converts a quantity of a cooking ingredient from one measurement unit
    to another.
  parameters:
    type: object
    properties:
      quantity:
        description: The quantity of the item to convert.
        type: number
      from_unit:
        description: The unit of the input quantity (e.g., 'cup', 'gram').
      to_unit:
        description: The unit to which the quantity should be converted (e.g., 'ounce',
          'kilogram').
      item:
        description: The cooking ingredient being converted (e.g., 'flour', 'sugar').
latest_rates:
  name: latest_rates
  description: Fetches the latest exchange rates for a given base currency code using
    the Exchangerate API.
  parameters:
    type: object
    properties:
      base_code:
        description: The base currency code for which to fetch the latest exchange
          rates.
random_meme:
  name: random_meme
  description: Fetches random memes based on specified criteria from the Humor API.
  parameters:
    type: object
    properties:
      keywords:
        description: A comma-separated list of keywords to filter the memes. Default
          is 'rocket'.
      number:
        description: The number of results to retrieve, between 1 and 10. Default
          is 3.
        type: integer
      media_type:
        description: The type of the content. Can be either 'image' or 'video' or
          specific formats such as 'jpg', 'png', 'gif', or 'mp4'. Default is 'image'.
      keywords_in_image:
        description: Whether the keywords should be found in the meme's image. Default
          is None.
      min_rating:
        description: The minimum rating between 0 and 10 that the result should have.
          Default is 4.
        type: integer
full_info_with_url:
  name: full_info_with_url
  description: Fetches detailed information about a TikTok video, including author
    info, video statistics, and metadata, using the provided URL.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the TikTok video to fetch information for.
post_details:
  name: post_details
  description: Fetches the details of a Reddit post using the provided post ID and
    RapidAPI key.
  parameters:
    type: object
    properties:
      post_id:
        description: The ID of the Reddit post to retrieve details for.
music_posts:
  name: music_posts
  description: Fetches posts related to a specific music ID from the TikTok API.
  parameters:
    type: object
    properties:
      music_id:
        description: The ID of the music for which to fetch posts.
      count:
        description: Number of posts to fetch. Defaults to 10.
      offset:
        description: Number of posts to skip before starting to collect the posts.
          Defaults to 0.
      proxy:
        description: Proxy server to use for the request. Defaults to None.
get_highlight_by_id:
  name: get_highlight_by_id
  description: Fetches all images and videos of a specific Instagram highlight by
    its ID.
  parameters:
    type: object
    properties:
      highlightid:
        description: The ID of the Instagram highlight.
get_dna_sequence:
  name: get_dna_sequence
  description: Retrieves the DNA sequence for a given sequence ID from the NCBI Nucleotide
    database.
  parameters:
    type: object
    properties:
      sequence_id:
        description: The unique identifier for the DNA sequence.
      file_format:
        description: 'The format of the returned sequence. Allowed values: "fasta"
          (default) or "gb".'
      upstream_bases:
        description: The number of bases upstream of the sequence to include. Defaults
          to 0.
whole_foods_order:
  name: whole_foods_order
  description: Places an order at Whole Foods.
  parameters:
    type: object
    properties:
      store_location:
        description: The location of the Whole Foods store.
      item_list:
        description: A list of items to order.
      order_size:
        description: 'The size of the order. Allowed values: "small", "medium", or
          "large".'
note_duration:
  name: note_duration
  description: Calculates the duration between two musical notes based on their frequencies
    and the tempo.
  parameters:
    type: object
    properties:
      freq1:
        description: The frequency of the first note in Hz.
        type: integer
      freq2:
        description: The frequency of the second note in Hz.
        type: integer
      bpm:
        description: The tempo of the music in beats per minute. Defaults to 120.
is_armstrong_number:
  name: is_armstrong_number
  description: Checks if a number is an Armstrong number.
  parameters:
    type: object
    properties:
      num:
        description: The number to check.
        type: integer
get_app_reviews:
  name: get_app_reviews
  description: Fetches app reviews from the iOS store for a given app.
  parameters:
    type: object
    properties:
      sort:
        description: Controls sorting options in the iOS store. Valid values are 'helpful'
          or 'recent'.
      country:
        description: The country code for the iOS store to fetch reviews from.
      page:
        description: The page number of the reviews to fetch.
      appid:
        description: The ID of the app for which to fetch reviews.
label_template_brands:
  name: label_template_brands
  description: Returns the list of blank label sheet brands supported by Ecardify
    on the given date.
  parameters:
    type: object
    properties:
      format:
        description: The paper size format, which can be either "Letter" (8.5 inch
          by 11 inch) or "A4" (210 mm by 297 mm).
get_all_images_of_an_collection:
  name: get_all_images_of_an_collection
  description: Fetches all images from a specified collection using the Pulsar6 API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the collection to retrieve images from.
read_group:
  name: read_group
  description: Fetches information of a specific group from the IronWiFi API using
    the given group ID.
  parameters:
    type: object
    properties:
      group_id:
        description: The ID of the group to retrieve information for.
label_sizes:
  name: label_sizes
  description: Fetches a list of label sizes in the specified format from the RapidAPI
    service.
  parameters:
    type: object
    properties:
      format:
        description: The paper size format. Can be either "Letter" for 8.5 inch by
          11 inch, or "A4" for 210 mm by 297 mm.
      shape:
        description: The label shape. Defaults to 'square'.
      brand:
        description: The label manufacturer's name. Defaults to 'avery'. Possible
          values include "Avery", "Herma", "Onlinelabels", "Uline", "Megastar", and
          "Sheetlabels".
convert_url_to_image:
  name: convert_url_to_image
  description: Converts a URL to an image by making a GET request to the Cloudlayer.io
    API.
  parameters:
    type: object
    properties:
      url:
        description: The URL to be converted to an image.
      timeout:
        description: The request timeout in milliseconds. Defaults to None.
contacts:
  name: contacts
  description: Fetches the contacts list from a specified WhatsApp instance using
    the Maytapi API.
  parameters:
    type: object
    properties:
      phone_id:
        description: The unique identifier for the phone instance in the Maytapi WhatsApp
          service.
advanced_phone_number_lookup:
  name: advanced_phone_number_lookup
  description: Retrieves advanced technical information about a phone number, including
    validity, approximate location, timezone, carrier, line type, ported status, robocall/spam
    score, and more.
  parameters:
    type: object
    properties:
      dialcode:
        description: The phone number dial code to retrieve information for.
search_filters:
  name: search_filters
  description: Fetches the relevant job search filters and their estimated result
    counts based on the given query parameters. This is useful for refining search
    results or for analytics purposes.
  parameters:
    type: object
    properties:
      query:
        description: Free-form jobs search query. It is highly recommended to include
          job title and location as part of the query.
      language:
        description: Language of the results. Uses a 2-letter language code (e.g.,
          'en').
      country:
        description: Country/region from which to make the query. Uses a 2-letter
          country code (e.g., 'us').
      categories:
        description: Deprecated. Specifies job categories/industries as a comma-separated
          list of category values.
      company_types:
        description: Specifies company types as a comma-separated list of company
          type values.
      job_titles:
        description: Specifies job titles as a comma-separated list of job title values.
      job_requirements:
        description: Specifies job requirements as a comma-separated list (e.g., 'under_3_years_experience',
          'no_degree').
      radius:
        description: Distance (in km) within which to return jobs, measured from the
          location specified in the query.
      employers:
        description: Specifies employers as a comma-separated list of employer values.
      remote_jobs_only:
        description: Whether to return only remote jobs (default is False).
      employment_types:
        description: Specifies employment types as a comma-separated list (e.g., 'FULLTIME',
          'PARTTIME').
      date_posted:
        description: Specifies the posting date range for job results. Possible values
          include 'all', 'today', '3days', 'week', 'month'.
companies_id_people:
  name: companies_id_people
  description: Fetches and returns information about people associated with the company
    with the given identifier from the German company database using RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the company whose associated people's information
          is to be retrieved.
categorize_website:
  name: categorize_website
  description: Fetches and returns the top categories for a given website using the
    Website Categorization API.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the website to be categorized.
get_field_and_field_invite_id:
  name: get_field_and_field_invite_id
  description: Fetches the field and field invite IDs for a given document from the
    SignNow API.
  parameters:
    type: object
    properties:
      document_id:
        description: The ID of the document for which to retrieve field and field
          invite IDs.
nhl_schedules:
  name: nhl_schedules
  description: Retrieves NHL schedule data for a specified date.
  parameters:
    type: object
    properties:
      day:
        description: The day of the desired schedule in 'DD' format.
      month:
        description: The month of the desired schedule in 'MM' format.
      year:
        description: The year of the desired schedule in 'YYYY' format.
web_snapshot:
  name: web_snapshot
  description: Fetches a snapshot of a webpage as an image using the Pragmavant API.
  parameters:
    type: object
    properties:
      accept:
        description: The MIME type that is acceptable for the response.
      source:
        description: The URL of the webpage to capture.
mic_lookup:
  name: mic_lookup
  description: Performs a lookup of a Manufacturer Identification Code (MIC) to retrieve
    information about a boat manufacturing company using the Hull ID Boat HIN Decoder
    API.
  parameters:
    type: object
    properties:
      mic:
        description: The Manufacturer Identification Code (MIC) of the boat manufacturing
          company.
get_date_and_time_by_city:
  name: get_date_and_time_by_city
  description: Get the current date and time for a specified city.
  parameters:
    type: object
    properties:
      city:
        description: Name of the city to get the date and time for.
estimate_market_value:
  name: estimate_market_value
  description: Estimates the market value of a car given its VIN and optionally its
    mileage using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number of the car.
      mileage:
        description: The current mileage of the car. Defaults to 50,000 if not specified.
flame:
  name: flame
  description: Calculates the FLAMES relationship compatibility score for two given
    names using the Flames Love Calculator API.
  parameters:
    type: object
    properties:
      sname:
        description: The second name to be used in the compatibility calculation.
      fname:
        description: The first name to be used in the compatibility calculation.
search_jokes:
  name: search_jokes
  description: Search for jokes based on specified criteria.
  parameters:
    type: object
    properties:
      number:
        description: The number of results to retrieve between 1 and 10. Defaults
          to 3.
      exclude_tags:
        description: A comma-separated list of tags that the joke must not have. Defaults
          to 'nsfw'.
      max_length:
        description: The maximum number of characters in the joke. Defaults to 200.
      include_tags:
        description: A comma-separated list of tags that the joke must have. Defaults
          to 'one_liner'.
      keywords:
        description: A comma-separated list of keywords to search for in jokes. Defaults
          to 'rocket'.
      min_rating:
        description: The minimum rating between 0 and 10 that the result should have.
          Defaults to 7.
search_by_title:
  name: search_by_title
  description: Search for Movies or TV Shows by title, with optional filters for year,
    media type, and limit on the number of results.
  parameters:
    type: object
    properties:
      s:
        description: The title of the Movie or TV Show to search for.
      l:
        description: The maximum number of items to return. Accepts values from 1
          to 100. Defaults to None.
      y:
        description: The year to filter the search results (format YYYY). This will
          also include movies from the previous and next year. Defaults to None.
      m:
        description: Filter by media type, either 'movie' or 'tv show'. Leave empty
          for both. Defaults to None.
top_property_managers:
  name: top_property_managers
  description: Fetches and returns information about the largest property managers
    for a given location from the AirDNA API.
  parameters:
    type: object
    properties:
      location:
        description: The location to query for the top property managers.
search_countries_by_continent:
  name: search_countries_by_continent
  description: Search for countries by their continent using the specified query parameters.
  parameters:
    type: object
    properties:
      continent:
        description: The continent of the countries to search for. This search is
          case insensitive and requires an exact match.
      offset:
        description: The zero-indexed page number from which the search should continue.
          Defaults to 0.
      fields:
        description: A comma-separated list of fields to filter the response. Defaults
          to None.
      limit:
        description: The maximum number of records to return per page. Defaults to
          10.
getfeedversions:
  name: getfeedversions
  description: Retrieve a list of feed versions from the TransitFeeds API, optionally
    filtering the results based on the given parameters.
  parameters:
    type: object
    properties:
      feed:
        description: The feed ID to restrict results to. Defaults to 'sfmta/60'.
      page:
        description: The page of results to return. If None, the first page is returned.
getsearchresults:
  name: getsearchresults
  description: Fetches the results from a specific YouTube influencer search using
    the provided search ID.
  parameters:
    type: object
    properties:
      is_id:
        description: Unique identifier of the search.
laliga_standings:
  name: laliga_standings
  description: Fetches the standings for LaLiga for a given season.
  parameters:
    type: object
    properties:
      season:
        description: The season to retrieve the standings for, e.g., '2022'. Defaults
          to None.
get_company_historical_data:
  name: get_company_historical_data
  description: Fetches daily historical pricing data for a specified company over
    a given period of months.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol of the company to fetch historical data
          for.
      months:
        description: The number of months of historical data to retrieve.
analyze_social_group_dynamics:
  name: analyze_social_group_dynamics
  description: Analyzes the social dynamics within a group based on the personality
    traits and group size.
  parameters:
    type: object
    properties:
      total:
        description: The total group size.
        type: integer
      extroverts:
        description: The number of extroverted members in the group.
        type: integer
      introverts:
        description: The number of introverted members in the group.
        type: integer
find_next_greater_element:
  name: find_next_greater_element
  description: Finds the next greater element for each element in a list.
  parameters:
    type: object
    properties:
      nums:
        description: The list of numbers.
v1_music_music_id:
  name: v1_music_music_id
  description: Fetches music information by music ID using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      music_id:
        description: The ID of the music to fetch information for.
flag:
  name: flag
  description: Retrieves the flag image of a specified country using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      country:
        description: The country ISO code or the full name of the country in English.
user_feed:
  name: user_feed
  description: Fetches the Instagram feed for a user.
  parameters:
    type: object
    properties:
      userid:
        description: The ID of the Instagram user whose feed is to be retrieved.
        type: integer
      max_id:
        description: The ID used for pagination to fetch the next page of results.
          Defaults to '{}'.
get_channel_panels:
  name: get_channel_panels
  description: Fetches the channel panels for a specified Twitch channel using the
    Twitch API.
  parameters:
    type: object
    properties:
      channel:
        description: The name of the Twitch channel to retrieve panels for.
sticker_search:
  name: sticker_search
  description: Searches for animated stickers on Giphy using a search query and optional
    parameters.
  parameters:
    type: object
    properties:
      q:
        description: Search query term or phrase.
      limit:
        description: Number of results to return, with a maximum of 100. Defaults
          to 25.
      offset:
        description: Results offset, defaults to 0.
      rating:
        description: Limit results to those rated (y, g, pg, pg-13, or r).
top_artists_duo_group:
  name: top_artists_duo_group
  description: Fetches the YEAR-END Top Artists - Duo/Group chart information for
    a given year.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to retrieve the chart information in the format
          'YYYY'. Defaults to '2022' if not provided.
billboard_global_200:
  name: billboard_global_200
  description: Fetch Billboard Global 200 chart information for a specific date.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve the chart information, in the
          format 'YYYY-MM-DD'.
get_team_schedule:
  name: get_team_schedule
  description: Fetches the schedule for an NBA team.
  parameters:
    type: object
    properties:
      season:
        description: The season year in YYYY format. Defaults to '2023'. Only '2022'
          and '2023' are valid.
      teamid:
        description: The unique identifier for the team. Accepts values from 1 to
          30.
      teamabv:
        description: The team's abbreviation, such as 'CHI' for the Chicago Bulls,
          'BOS' for the Boston Celtics, or 'ATL' for the Atlanta Hawks. Defaults to
          'GS'.
getteams:
  name: getteams
  description: Fetches NHL team data for a given season with optional expanded information.
  parameters:
    type: object
    properties:
      season:
        description: The specific season to return team data for. Defaults to 20172018.
      expand:
        description: A parameter to expand the response with additional data, such
          as team rosters. Defaults to 'team.roster'.
search_for_recipes:
  name: search_for_recipes
  description: Search for recipes based on a keyword or full phrase using the BBC
    Good Food API.
  parameters:
    type: object
    properties:
      query:
        description: The search query string for recipes.
      page:
        description: The page number of results to retrieve, with a maximum of 30
          results per page. Defaults to None.
get_calendar_components:
  name: get_calendar_components
  description: Fetches the calendar components to build the Hebrew month calendar
    for a given month and year.
  parameters:
    type: object
    properties:
      month:
        description: The Hebrew month number.
        type: integer
      year:
        description: The year for the Hebrew calendar.
        type: integer
get_quote_by_year:
  name: get_quote_by_year
  description: Fetches quotes from movies or TV shows for a given year.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to retrieve quotes.
        type: integer
title_details:
  name: title_details
  description: Fetches the details of specified Netflix titles using the RapidAPI.
  parameters:
    type: object
    properties:
      ids:
        description: A comma-separated string of Netflix title IDs to fetch details
          for.
search_by_genre:
  name: search_by_genre
  description: Discover movies by genre using the RapidAPI.
  parameters:
    type: object
    properties:
      with_genres:
        description: The genre code to filter movies by. Defaults to '80'.
      page:
        description: The page number of results to retrieve. Defaults to 1.
        type: integer
v1_city:
  name: v1_city
  description: Fetches city data from the API Ninjas City API endpoint with various
    filtering criteria.
  parameters:
    type: object
    properties:
      max_lat:
        description: Maximum latitude coordinate.
      min_population:
        description: Minimum city population.
      min_lon:
        description: Minimum longitude coordinate.
      country:
        description: Country filter. Must be an ISO-3166 alpha-2 code (default is
          'US').
      max_population:
        description: Maximum city population.
      min_lat:
        description: Minimum latitude coordinate.
      name:
        description: Name of the city to search for (default is 'New York').
      max_lon:
        description: Maximum longitude coordinate.
      limit:
        description: Number of results to return. Must be between 1 and 30 (default
          is 1).
get_time_zones:
  name: get_time_zones
  description: Fetch a list of time zones based on certain search criteria.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the time zone to filter by. Defaults to None.
      keyword:
        description: The keyword to search for in the time zones. Defaults to 'asia'.
      page:
        description: The page number for pagination. Defaults to 1.
      perpage:
        description: The number of records per page for pagination. Defaults to 50.
get_district_capital_by_name:
  name: get_district_capital_by_name
  description: Retrieves the capital of a district in Ghana given the district name.
  parameters:
    type: object
    properties:
      name:
        description: The name of the district whose capital is to be retrieved.
search_user:
  name: search_user
  description: Searches for a Twitter user based on the provided query string using
    the Twitter Pack API.
  parameters:
    type: object
    properties:
      q:
        description: The query string to search for the Twitter user.
build_word_ladders:
  name: build_word_ladders
  description: Builds a word ladder between the given start word and end word using
    the specified dictionary.
  parameters:
    type: object
    properties:
      endword:
        description: The word that the word ladder must end with.
      startword:
        description: The word that the word ladder must start with.
      dictionary:
        description: The dictionary edition to use for building the word ladder. Defaults
          to the 2019 edition of Collins Dictionary if not specified.
get_all_servers:
  name: get_all_servers
  description: Fetches a list of Minecraft servers with an optional limit on the number
    of servers returned.
  parameters:
    type: object
    properties:
      limit:
        description: A string representing the maximum number of servers to return.
search_for_a_champion:
  name: search_for_a_champion
  description: Search for a League of Legends champion based on various criteria and
    return the champion data.
  parameters:
    type: object
    properties:
      releasedate:
        description: Release date of the champion.
      name:
        description: Name of the champion. Default is 'zed'.
      resource:
        description: Resource type of the champion.
      rp:
        description: Riot Points cost of the champion.
      blueessence:
        description: Blue Essence cost of the champion.
      attribute:
        description: Attribute of the champion.
players:
  name: players
  description: Fetches information about a PGA Tour player based on provided search
    parameters such as last name, first name, or player ID.
  parameters:
    type: object
    properties:
      lastname:
        description: The last name of the player. Default is 'Morikawa'.
      playerid:
        description: The ID of the player. Default is '50525'.
      firstname:
        description: The first name of the player. Default is 'Collin'.
blockit:
  name: blockit
  description: Detect if an IP address is associated with a proxy, Tor, hosting service,
    cloud service, or is a Bogon IP.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to be checked.
web_candles:
  name: web_candles
  description: Fetches candlestick data for a specific trading pair within a specified
    time range.
  parameters:
    type: object
    properties:
      time_bucket:
        description: The time bucket to use for the candle size, e.g., '1m', '5m',
          '1h'.
      pair_id:
        description: The primary key for the trading pair. For tests and demos, use
          id `1` which corresponds to the ETH/USDC pair on Uniswap v2.
        type: integer
      start:
        description: The start of the candle fetch period as an ISO 8601 formatted
          string. Defaults to '2020-05-18 00:00'.
      end:
        description: The end of the candle fetch period as an ISO 8601 formatted string.
          Defaults to '2020-05-19 00:00'.
get_6_timeseries_endpoint:
  name: get_6_timeseries_endpoint
  description: Fetches historical exchange rates for specified currencies over a given
    time period.
  parameters:
    type: object
    properties:
      end_date:
        description: The end date for the timeseries data in 'YYYY-MM-DD' format.
      start_date:
        description: The start date for the timeseries data in 'YYYY-MM-DD' format.
      base:
        description: The base currency code (default is 'usd').
      symbols:
        description: The target currency code(s) (default is 'eur').
feed_by_username:
  name: feed_by_username
  description: Fetches the current Instagram feed for a given username.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to fetch the feed.
      raw:
        description: If set to True or '1', returns the raw, unprocessed data feed.
          Defaults to None.
latest_exchange_rates:
  name: latest_exchange_rates
  description: Fetches the latest exchange rate data using the provided parameters.
  parameters:
    type: object
    properties:
      resolution:
        description: The frequency of updates for the exchange rates. Possible values
          are '1m' for minute, '1h' for hourly, and '1d' for daily updates.
      currencies:
        description: A comma-separated list of currency codes (e.g., 'USD,EUR,AUD,GBP')
          to get exchange rates for. If not provided, rates for all available currencies
          are returned.
      base:
        description: The base currency for the exchange rates. Defaults to 'USD'.
stock_get_total_revenue:
  name: stock_get_total_revenue
  description: Fetches the total revenue for a given stock symbol from the specified
    region using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: The region code to fetch the stock data from. Allowed values
          are 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB', 'S'.
          Defaults to None.
stock_get_histories:
  name: stock_get_histories
  description: Fetches historical stock market data for a given performance ID.
  parameters:
    type: object
    properties:
      performanceid:
        description: The PerformanceId field retrieved from the /market/auto-complete
          or /market/get-summary APIs.
options_stock:
  name: options_stock
  description: Fetch option data for a specific stock, ETF, or index.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol to retrieve option data for. Default is 'AAPL'.
      expiration:
        description: The expiration date for the options in UNIX timestamp format.
          Default is '1705622400'.
count_occurrences:
  name: count_occurrences
  description: Counts the occurrences of each element in a list and returns a dictionary
    with the counts.
  parameters:
    type: object
    properties:
      lst:
        description: The input list.
hashtag_info:
  name: hashtag_info
  description: Fetches information about a specific TikTok hashtag using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      hashtag:
        description: The TikTok hashtag for which to retrieve information.
getlatestbysecuritiescode:
  name: getlatestbysecuritiescode
  description: Fetches the latest securities report data for a given company based
    on its securities code.
  parameters:
    type: object
    properties:
      securities_code:
        description: The securities code representing the company.
        type: integer
get_cities:
  name: get_cities
  description: Fetches a list of cities from the 50k Radio Stations API, optionally
    filtered by country ID and keyword.
  parameters:
    type: object
    properties:
      country_id:
        description: Filter cities by country ID. Defaults to None.
      keyword:
        description: Filter cities by keyword. Defaults to 'Jakarta'.
get_joke_of_the_day_by_category:
  name: get_joke_of_the_day_by_category
  description: Fetches the joke of the day from a specified category using the World
    of Jokes API.
  parameters:
    type: object
    properties:
      category:
        description: The category of joke to be fetched.
random_joke:
  name: random_joke
  description: Fetches a random joke from the Humor API based on specified criteria.
  parameters:
    type: object
    properties:
      keywords:
        description: A comma-separated list of keywords to filter the jokes (default
          is 'rocket').
      include_tags:
        description: A comma-separated list of tags that the joke must have (default
          is 'one_liner').
      min_rating:
        description: The minimum rating of the joke between 0 and 10 (default is 7).
        type: integer
      max_length:
        description: The maximum length of the joke in characters (default is 200).
        type: integer
      exclude_tags:
        description: A comma-separated list of tags that the joke must not have (default
          is 'nsfw').
get_plus_one:
  name: get_plus_one
  description: This function takes an integer `number` and uses the RapidAPI service
    to get the number incremented by one.
  parameters:
    type: object
    properties:
      number:
        description: The integer to be incremented.
        type: integer
search_for_channels:
  name: search_for_channels
  description: Searches for YouTube channels based on the provided keyword and other
    optional parameters. Supports pagination for retrieving multiple pages of results.
  parameters:
    type: object
    properties:
      keyword:
        description: Keyword for the channel search. Default is 'Rick Astley'.
      lang:
        description: ISO-639 language code for localized results. Defaults to None.
      sortby:
        description: Criteria for sorting the results. Defaults to None.
      nexttoken:
        description: Token for fetching the next page of results. If not specified,
          the first page of results is returned. Defaults to None.
retrieve_owners:
  name: retrieve_owners
  description: Retrieve the list of owners for a given NFT including the quantity
    owned.
  parameters:
    type: object
    properties:
      asset_contract_address:
        description: The contract address of the NFT asset.
      token_id:
        description: The unique identifier of the NFT.
      limit:
        description: The maximum number of results to return. Defaults to '20'.
      cursor:
        description: An opaque value used for pagination to retrieve the next set
          of results. Defaults to None.
      order_by:
        description: The field by which to sort the results. Defaults to 'created_date'.
      order_direction:
        description: The direction to sort the results, either 'asc' for ascending
          or 'desc' for descending. Defaults to 'desc'.
salvagecheck:
  name: salvagecheck
  description: Checks if a given Vehicle Identification Number (VIN) has been listed
    in a salvage database.
  parameters:
    type: object
    properties:
      vin:
        description: A 17-character VIN from North America.
project_investment_growth:
  name: project_investment_growth
  description: Projects the growth of an investment over a specified number of years.
  parameters:
    type: object
    properties:
      principal:
        description: The initial investment amount.
        type: number
      annual_addition:
        description: The amount added to the investment annually.
        type: number
      years:
        description: The number of years to project the investment growth.
        type: integer
      return_rate:
        description: The annual return rate as a decimal (e.g., 0.07 for 7%).
        type: number
      inflation:
        description: A list of annual inflation rates as decimals.
      inflation_adjusted:
        description: Whether to adjust the final value for inflation. Defaults to
          True.
search_by_engine:
  name: search_by_engine
  description: Search for airplanes that have engines matching the given keyword.
  parameters:
    type: object
    properties:
      engine_icontains:
        description: Keyword to search for in the airplane engine descriptions.
games:
  name: games
  description: Returns a list of games from the Jet Set Radio API with optional parameters
    for limiting and sorting the results.
  parameters:
    type: object
    properties:
      limit:
        description: Limit the number of items returned in the response. Defaults
          to '5'.
      orderby:
        description: Order in which to sort the results. Possible values are 'asc'
          or 'desc'. The default value is 'asc'.
      sortby:
        description: Field by which to sort the results. Possible values are any field
          on the document, such as 'name' or 'stats'. Defaults to 'name'.
get_channels:
  name: get_channels
  description: Fetches the list of radio channels from the RapidAPI service based
    on various optional filters such as page number, genre ID, city ID, country ID,
    and keyword.
  parameters:
    type: object
    properties:
      page:
        description: The page number for pagination of results.
      genre_id:
        description: The ID of the genre to filter the channels.
      city_id:
        description: The ID of the city to filter the channels.
      country_id:
        description: The ID of the country to filter the channels.
      keyword:
        description: The keyword to search within channel names or descriptions. Default
          is 'He'.
stock_get_stock_historical_price_data:
  name: stock_get_stock_historical_price_data
  description: Fetch historical pricing data for a given stock symbol over a specified
    date range and interval.
  parameters:
    type: object
    properties:
      symbol:
        description: Ticker symbol for the stock (e.g., "AAPL" for Apple Inc.).
      start_date:
        description: The start date for fetching historical data in 'YYYY-MM-DD' format.
      time_interval:
        description: The time interval for the data; can be 'daily', 'weekly', or
          'monthly'.
      end_date:
        description: The end date for fetching historical data in 'YYYY-MM-DD' format.
      region:
        description: The region for the stock market. Default is 'US'.
get_movie_images_by_id:
  name: get_movie_images_by_id
  description: Fetches a complete list of images associated with a given movie ID
    from the Cinema API.
  parameters:
    type: object
    properties:
      is_id:
        description: The movie ID for which to retrieve images.
search_gifs:
  name: search_gifs
  description: Search for gifs based on a query using the Humor API.
  parameters:
    type: object
    properties:
      query:
        description: The search query to find matching gifs.
      number:
        description: The number of results to retrieve, between 1 and 10. Defaults
          to 3.
match_scorecard:
  name: match_scorecard
  description: Fetches the full scorecard (updated live) for a given match ID using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      match_id:
        description: The ID of the cricket match for which to retrieve the live scorecard.
        type: integer
top_headlines:
  name: top_headlines
  description: Fetch the latest news headlines or top stories for a specified country.
  parameters:
    type: object
    properties:
      country:
        description: The 2-letter country code for which to get the headlines. Defaults
          to 'US'. Refer to [ISO 3166-1 alpha-2](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2)
          for available codes.
      lang:
        description: The language code for the results, specified as a 2-letter language
          code. Defaults to 'en'. Refer to [ISO 639-1 alpha-2](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)
          for available codes.
wire_resistance:
  name: wire_resistance
  description: Calculates the resistance of a wire based on its length, cross-sectional
    area, and material resistivity.
  parameters:
    type: object
    properties:
      length_m:
        description: The length of the wire in meters.
        type: integer
      area_sq_m:
        description: The cross-sectional area of the wire in square meters.
        type: number
      material:
        description: 'The material of the wire. Allowed values: "copper" (default)
          or "aluminum".'
v1_hobbies:
  name: v1_hobbies
  description: Fetches a random hobby and a Wikipedia link detailing the hobby from
    the Hobbies by API Ninjas API.
  parameters:
    type: object
    properties:
      category:
        description: The category of hobbies to fetch. Possible values are 'general',
          'sports_and_outdoors',
get_user_metadata:
  name: get_user_metadata
  description: Fetches metadata for a specified user from the Waifu API.
  parameters:
    type: object
    properties:
      user_id:
        description: The unique identifier of the user whose metadata is to be fetched.
canvas_episodes_get_info:
  name: canvas_episodes_get_info
  description: Retrieves episode information and photo links from the Webtoon API.
  parameters:
    type: object
    properties:
      episodeno:
        description: The ID of the episode as returned from the `.../canvas/episodes/list`
          endpoint.
        type: integer
      titleno:
        description: The ID of the title as returned from the `.../canvas/titles/list`
          or `.../canvas/search` endpoint.
        type: integer
      language:
        description: The language code for the response. Default is 'en'. Accepted
          values are {'en', 'zh-hant', 'de', 'fr', 'es', 'th', 'id'}.
drawings_between_dates:
  name: drawings_between_dates
  description: Fetches all Fantasy 5 winning number sets between two specified dates.
  parameters:
    type: object
    properties:
      date1:
        description: The start date in the format MM-DD-YYYY.
      date2:
        description: The end date in the format MM-DD-YYYY.
binary_search:
  name: binary_search
  description: Performs binary search on a sorted list to find the index of a target
    value.
  parameters:
    type: object
    properties:
      arr:
        description: The sorted list of integers.
      target:
        description: The target value to search for.
        type: integer
typical_price:
  name: typical_price
  description: Fetches the Typical Price Indicator for a given market, exchange, symbol,
    and interval.
  parameters:
    type: object
    properties:
      market:
        description: The market type. Available options are 'spot', 'usdt-perpetual',
          and 'inverse-perpetual'.
      exchange:
        description: The exchange name.
      symbol:
        description: The symbol representing the security (e.g., "BTCUSD").
      interval:
        description: The interval for which the typical price is calculated (e.g.,
          '1m', '5m', '1h').
      backtracks:
        description: The number of intervals back to retrieve. Default is 1.
      length:
        description: The number of periods used in calculating the typical price.
          Default is 18.
      is_from:
        description: The start time in Unix timestamp format. Default is '1683895800'.
specific_transactions:
  name: specific_transactions
  description: Fetch detailed information about a specific cryptocurrency transaction
    using the provided hash and symbol.
  parameters:
    type: object
    properties:
      hash:
        description: The transaction hash used to uniquely identify the cryptocurrency
          transaction.
      symbol:
        description: The symbol of the cryptocurrency (e.g., BTC, ETH) for which the
          transaction information is to be retrieved.
get_coin_modifiers:
  name: get_coin_modifiers
  description: Fetches the modifiers of a coin's supply and their balance using the
    CoinRanking API.
  parameters:
    type: object
    properties:
      uuid:
        description: The UUID of the coin for which to request the modifiers.
      offset:
        description: Offset for pagination. Default is 0.
      limit:
        description: Limit for pagination. Default is 50. Must be in the range 0-100.
market_auto_complete:
  name: market_auto_complete
  description: Fetch auto-complete suggestions for stock market queries.
  parameters:
    type: object
    properties:
      query:
        description: The search query for which auto-complete suggestions are needed.
get_coin_exchanges:
  name: get_coin_exchanges
  description: Retrieve a list of exchanges where a specific coin can be traded.
  parameters:
    type: object
    properties:
      uuid:
        description: UUID of the coin for which to request exchanges.
      search:
        description: Value to search for within results, such as exchange names.
      orderby:
        description: Field to order the results by. Allowed values are "24hVolume"
          and "price". Defaults to "24hVolume".
      orderdirection:
        description: Order direction, either "asc" for ascending or "desc" for descending.
          Defaults to "desc".
      offset:
        description: Offset for pagination. Defaults to 0.
      limit:
        description: Limit for pagination. Defaults to 50. Should be within the range
          0-100.
      referencecurrencyuuid:
        description: UUID of the reference currency whose rate is used to calculate
          the volume. Defaults to "yhjMzLPhuIDl" (US Dollar).
get_individual_bitcoin_news_sources:
  name: get_individual_bitcoin_news_sources
  description: Fetches information for a specific Bitcoin news resource from RapidAPI.
  parameters:
    type: object
    properties:
      newspaperid:
        description: The unique identifier for the news resource.
metadata:
  name: metadata
  description: Fetches the metadata information for cryptocurrency markets from the
    specified API.
  parameters:
    type: object
    properties:
      asset_type:
        description: The type of the asset, e.g., 'spot' or 'futures'. Default is
          'spot'.
      market_venue:
        description: The trading venue where the asset is listed, e.g., 'BINANCE'.
          Default is 'BINANCE'.
      symbol:
        description: The symbol of the cryptocurrency, e.g., 'BTC'. Default is 'BTC'.
      base:
        description: The base currency for trading, e.g., 'USDT'. Default is 'USDT'.
      data_type:
        description: The type of data to fetch, e.g., 'metrics'. Default is 'metrics'.
company_info:
  name: company_info
  description: Retrieves real-time company information using the Finshorts API.
  parameters:
    type: object
    properties:
      q:
        description: The query string representing the company name or ticker symbol.
playlist_info:
  name: playlist_info
  description: Fetches information about a SoundCloud playlist using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      playlist_url:
        description: The URL of the SoundCloud playlist to fetch information for.
get_current_weather:
  name: get_current_weather
  description: Retrieves the current weather for a specified city using the Cloud
    Cast API.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city for which to retrieve the weather.
check_similarity:
  name: check_similarity
  description: Checks if two domains are similar using the Whois Lookup API.
  parameters:
    type: object
    properties:
      domain1:
        description: The first domain to compare.
      domain2:
        description: The second domain to compare.
get_quote_by_id:
  name: get_quote_by_id
  description: Fetches quote information by ID from the RapidAPI Quotes API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the quote to retrieve.
v1_salestax:
  name: v1_salestax
  description: This function fetches sales tax breakdowns for a specified location
    via the API Ninjas Sales Tax API. The breakdown includes state, county, city,
    and any additional special sales taxes, represented in decimal form (e.g., 0.1
    means 10% tax). You must specify either a ZIP code or a combination of city and
    state.
  parameters:
    type: object
    properties:
      state:
        description: The name of the state for which sales tax information is required.
      city:
        description: The name of the city for which sales tax information is required.
      zip_code:
        description: A valid US ZIP code for which sales tax information is required.
          Defaults to '90210'.
town:
  name: town
  description: Retrieves information about a specified town, such as province and
    block, using the Mzansi Loadshedding API.
  parameters:
    type: object
    properties:
      town:
        description: The name of the town for which information is being requested.
key_metrics:
  name: key_metrics
  description: Fetches either annual or quarterly key metrics for a single stock company.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock company.
      period:
        description: The period for which to fetch metrics, either 'annual' or 'quarterly'.
crimes_with_no_location:
  name: crimes_with_no_location
  description: Fetches a list of crimes from a specified police force on a given date
    and category, where the crimes have no specified location.
  parameters:
    type: object
    properties:
      date:
        description: The date of the crimes to retrieve in 'YYYY-MM' format.
      force:
        description: The identifier for the police force responsible for handling
          the crimes.
      category:
        description: The category of the crimes to retrieve.
rgb_to_cmyk:
  name: rgb_to_cmyk
  description: Converts an RGB color code to a CMYK color code using an external API.
  parameters:
    type: object
    properties:
      r:
        description: The red component of the RGB color code (0-255).
        type: integer
      g:
        description: The green component of the RGB color code (0-255).
        type: integer
      b:
        description: The blue component of the RGB color code (0-255).
        type: integer
generate_qr:
  name: generate_qr
  description: Generates a QR code for a given URL using the QR Code Wizard API.
  parameters:
    type: object
    properties:
      url:
        description: The URL to be encoded in the QR code.
geocoding:
  name: geocoding
  description: Performs geocoding to convert an address into a standardized, normalized
    address and rooftop latitude/longitude coordinates using the RapidAPI service.
  parameters:
    type: object
    properties:
      address:
        description: The physical address to be geocoded.
get_images_by_productid_siteid_zappos_1_6pm_2:
  name: get_images_by_productid_siteid_zappos_1_6pm_2
  description: Fetch images for a given product ID and site ID from the Zappos API.
  parameters:
    type: object
    properties:
      siteid:
        description: The site ID (1 for Zappos, 2 for 6pm).
        type: integer
      productid:
        description: The product ID for which images are to be fetched.
        type: integer
get_comments_from_product_id:
  name: get_comments_from_product_id
  description: Retrieve comments for a given product ID using the Hepsiburada API.
  parameters:
    type: object
    properties:
      product_id:
        description: Unique identifier of the product for which to retrieve comments.
product_categorization:
  name: product_categorization
  description: Categorizes a product based on its title and optional price using the
    Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      title:
        description: The title of the product to be categorized.
      price:
        description: The price of the product. Default is 200.
tmall_search_by_keyword:
  name: tmall_search_by_keyword
  description: Searches for products on Tmall by keyword.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the search results to retrieve.
        type: integer
      keyword:
        description: The keyword to search for products.
latest_price:
  name: latest_price
  description: Fetches the latest price for the given item ID and timestep from the
    OSRS Live Prices API.
  parameters:
    type: object
    properties:
      timestep:
        description: The timestep for which to retrieve the latest price.
      itemid:
        description: The ID of the item for which to fetch the latest price.
        type: integer
dev_to:
  name: dev_to
  description: Checks the availability of a given username on Dev.to using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The username to check for availability on Dev.to.
org:
  name: org
  description: Check if a .org domain with the given name is registered using the
    Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      name:
        description: The name of the domain to check.
video_post_comments:
  name: video_post_comments
  description: Fetches comments for a specified video post from the TikTok API.
  parameters:
    type: object
    properties:
      video_id:
        description: The ID of the video for which to fetch comments.
      fresh:
        description: Set to 1 to force the API to return fresh data (not cached).
          Defaults to 0.
      limit:
        description: Number of comments to return. Defaults to 50. Maximum is 150.
      max_cursor:
        description: Pagination cursor for navigating through pages of comments. Defaults
          to 0.
rentalizer:
  name: rentalizer
  description: Fetches rental property data for a given address from the AirDNA Rentalizer
    API.
  parameters:
    type: object
    properties:
      address:
        description: The address of the property for which rental data is required.
      bathrooms:
        description: The number of bathrooms in the property. Defaults to 2.
      accommodates:
        description: The number of people the property can accommodate. Defaults to
          '2'.
      bedrooms:
        description: The number of bedrooms in the property. Defaults to 2.
      currency:
        description: The preferred currency for financial data.
bcaa:
  name: bcaa
  description: Fetches Branched-Chain Amino Acids (BCAA) product details from Amazon
    API.
  parameters:
    type: object
    properties:
      product_name_brand:
        description: Name or brand of the BCAA product to look up. Default is None.
details:
  name: details
  description: Fetch product details from the price comparison API using various geographical
    and identification parameters.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier for the product. This can be a UPC, EAN, ISBN,
          GTIN, or Amazon ASIN.
      country:
        description: The country code for the query. Default is 'US'.
      longitude:
        description: The longitude for geographical querying. Default is '-122.49493'.
      latitude:
        description: The latitude for geographical querying. Default is '37.777805'.
smart_phones:
  name: smart_phones
  description: Fetches data of smart phones from the Amazon API using optional brand
    filtering.
  parameters:
    type: object
    properties:
      name_brand:
        description: The brand name to filter the smart phones. Defaults to None.
products_id:
  name: products_id
  description: Fetches product information from AliExpress using the given product
    ID and various optional filters.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the product on AliExpress.
        type: integer
      page:
        description: The page number for paginated results. Default is 1.
      currency:
        description: The currency code to use for the prices.
      sort:
        description: The sorting order for the search results.
      pricemax:
        description: The maximum price limit for filtering. Default is 100.
      country:
        description: The country code for filtering the products based on shipping.
      pricemin:
        description: The minimum price limit for filtering. Default is 20.
      issale:
        description: Filter to show only products on sale.
      locale:
        description: The locale code for the results.
      isfreeship:
        description: Filter to show only products with free shipping.
      isfavorite:
        description: Filter to show only favorite products.
check_email:
  name: check_email
  description: Validates an email address using the RapidAPI Email Checker and Validator
    service.
  parameters:
    type: object
    properties:
      email:
        description: The email address to validate.
etablissement_par_ridet:
  name: etablissement_par_ridet
  description: Fetches and returns information about an establishment in New Caledonia
    based on its Ridet number.
  parameters:
    type: object
    properties:
      ridet:
        description: The Ridet number of the establishment.
search_suggestions:
  name: search_suggestions
  description: Fetches search suggestions for a given query using the Cheap YouTube
    API through RapidAPI.
  parameters:
    type: object
    properties:
      q:
        description: The search query for which to fetch suggestions.
video_data:
  name: video_data
  description: Retrieves video data for a given video ID from YouTube using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      video_id:
        description: The ID of the YouTube video for which to retrieve data.
video_subtitles:
  name: video_subtitles
  description: Fetches the available subtitles for a given YouTube video using the
    specified RapidAPI key.
  parameters:
    type: object
    properties:
      video_id:
        description: The ID of the YouTube video for which subtitles are to be fetched.
get_host_list_version_hosts_get:
  name: get_host_list_version_hosts_get
  description: Fetch a list of hosts that ran an EcoIndex analysis, ordered by the
    number of requests made.
  parameters:
    type: object
    properties:
      version:
        description: Engine version used to run the analysis (v0 or v1).
      q:
        description: Filter for partial host name. Defaults to None.
      date_from:
        description: 'Start date for filtering elements (format: YYYY-MM-DD). Defaults
          to None.'
      size:
        description: Number of elements per page. Defaults to 50.
      date_to:
        description: 'End date for filtering elements (format: YYYY-MM-DD). Defaults
          to None.'
      page:
        description: Page number to retrieve. Defaults to 1.
getusers:
  name: getusers
  description: Fetches user information from the RapidAPI user-demo service, optionally
    filtered by email and name.
  parameters:
    type: object
    properties:
      email:
        description: Email address to filter the users.
      name:
        description: Name to filter the users.
get_screenshot_version_ecoindexes_id_screenshot_get:
  name: get_screenshot_version_ecoindexes_id_screenshot_get
  description: Returns the screenshot of the webpage analysis for a given version
    and analysis ID, if it exists.
  parameters:
    type: object
    properties:
      version:
        description: Engine version used to run the analysis (e.g., 'v0' or 'v1').
      is_id:
        description: Identifier of the analysis for which to retrieve the screenshot.
v1_facts:
  name: v1_facts
  description: Fetches random facts from the API Ninjas Facts API.
  parameters:
    type: object
    properties:
      limit:
        description: The number of facts to return, between 1 and 30. Default is 1.
states_search:
  name: states_search
  description: Searches for specific states by name and returns a list of states matching
    the search query. The search can be limited by country and sorted by specified
    criteria.
  parameters:
    type: object
    properties:
      q:
        description: The search query string representing the name of the state to
          search for.
      limit:
        description: The maximum number of state results to return. Defaults to '50'.
      sortorder:
        description: The order in which to sort results (e.g., 'asc' or 'desc'). Defaults
          to None.
      sortby:
        description: The field by which to sort results. Defaults to None.
      country_id:
        description: The ID of the country to filter results by. Defaults to None.
      country_code:
        description: The code of the country to filter results by. Defaults to None.
      country_name:
        description: The name of the country to filter results by. Defaults to None.
get_place_by_id:
  name: get_place_by_id
  description: Returns a single Place identified by an ID.
  parameters:
    type: object
    properties:
      is_id:
        description: ID of the Place.
      language:
        description: Specifies a language (ISO 639-1) to get the localized name of
          the place. If translation is not available, the "localizedName" property
          will be null. Defaults to None.
query_horses:
  name: query_horses
  description: Queries horses by name using the Horse Racing API and returns the results.
  parameters:
    type: object
    properties:
      name:
        description: The name of the horse to search for. Must be a minimum of 3 characters.
serie_a_standings:
  name: serie_a_standings
  description: Fetches the Serie A football standings for a given season using the
    provided RapidAPI key.
  parameters:
    type: object
    properties:
      season:
        description: The season year for which the standings are to be fetched (e.g.,
          '2022'). Defaults to None.
baseball_league_rankings:
  name: baseball_league_rankings
  description: Fetches and returns the baseball league standings for a given league
    ID.
  parameters:
    type: object
    properties:
      league_id:
        description: The ID of the baseball league for which rankings are to be fetched.
          League IDs can be retrieved from the Baseball Live Matches endpoint.
recent_unique_tournaments:
  name: recent_unique_tournaments
  description: Fetches the recent unique tournaments associated with a given team
    ID using the RapidAPI service.
  parameters:
    type: object
    properties:
      team_id:
        description: The ID of the team for which recent unique tournaments are to
          be retrieved.
        type: integer
basketball_search:
  name: basketball_search
  description: Search for basketball players, teams, and tournaments using the provided
    term.
  parameters:
    type: object
    properties:
      term:
        description: The search term used to look for players, teams, and tournaments.
main_endpoint:
  name: main_endpoint
  description: Fetch the lyrics of a specified song, optionally for a specified artist.
  parameters:
    type: object
    properties:
      song:
        description: The title of the song for which to fetch the lyrics.
      artist:
        description: The artist of the song. Defaults to 'Stellar'.
classify:
  name: classify
  description: Classifies input text using the IAB taxonomy via RapidAPI and returns
    the confidence score and IAB classification.
  parameters:
    type: object
    properties:
      text:
        description: The input text to be classified.
getgender:
  name: getgender
  description: Determines the gender of a given name using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      name:
        description: The name for which to determine the gender.
netherlands_songs:
  name: netherlands_songs
  description: Fetch the Netherlands Songs chart information from the Billboard API.
  parameters:
    type: object
    properties:
      range:
        description: The range of the chart to fetch.
      date:
        description: The date of the chart in the format 'YYYY-MM-DD'.
bet365_upcoming_events:
  name: bet365_upcoming_events
  description: Retrieves upcoming sports events from Bet365 based on the given parameters.
  parameters:
    type: object
    properties:
      sport_id:
        description: The ID of the sport to get upcoming events for.
        type: integer
      day:
        description: The specific day to get events for. Defaults to None.
      league_id:
        description: The ID of the league to filter events. Defaults to None.
      page:
        description: The page number for pagination. Defaults to None.
getfavouriteschamps:
  name: getfavouriteschamps
  description: Fetches the favorite champions data from the specified RapidAPI endpoint.
  parameters:
    type: object
    properties:
      skinname:
        description: The skin name to include in the query parameters. Defaults to
          'betbiga'.
product_category_list:
  name: product_category_list
  description: Fetches the list of Amazon product categories for a specified country
    or marketplace.
  parameters:
    type: object
    properties:
      country:
        description: Sets the marketplace country, language, and currency.
amazonproductreviews:
  name: amazonproductreviews
  description: Retrieves product reviews from Amazon using the provided API key, domain,
    and product ASIN.
  parameters:
    type: object
    properties:
      pagenum:
        description: The page number of reviews to retrieve. Each page contains 10
          reviews.
        type: integer
      domain:
        description: The Amazon domain to query reviews from (e.g., 'amazon.com',
          'amazon.in', 'amazon.co.uk').
      asin:
        description: The Amazon Standard Identification Number (ASIN) of the product
          to retrieve reviews for.
aliexpress_item_detail_simple:
  name: aliexpress_item_detail_simple
  description: Fetches and returns the details of a single item from AliExpress.
  parameters:
    type: object
    properties:
      itemid:
        description: The AliExpress product ID.
        type: integer
      locale:
        description: The locale to display the titles and other content in the selected
          language. Only supported values from AliExpress are accepted.
      currency:
        description: The currency to display the product price. Only supported values
          from AliExpress are accepted.
      region:
        description: The region to accurately get the shipping costs and other promotions
          for a specific geo-location. Only supported values from AliExpress are accepted.
google_maps_reviews:
  name: google_maps_reviews
  description: Fetches and returns JSON data of Google Maps reviews based on the specified
    parameters.
  parameters:
    type: object
    properties:
      data_id:
        description: Unique identifier representing the location or place on Google
          Maps for which reviews are fetched.
      next_page_token:
        description: Token to fetch the next page of results, if applicable. Default
          is None.
      sort_by:
        description: Criteria to sort the reviews by. Could be relevance, newest,
          etc. Default is None.
      topic_id:
        description: Identifier for a specific topic to filter reviews by. Default
          is None.
      hl:
        description: Language code to return the reviews in, formatted as language_country
          (e.g., 'en_us'). Default is 'en_us'.
suggest_region:
  name: suggest_region
  description: Fetches suggested regions based on a given location using the Airdna
    API.
  parameters:
    type: object
    properties:
      location:
        description: The location keyword to search for suggested regions.
wnba_standings:
  name: wnba_standings
  description: Fetches the WNBA team standings for a given year, with optional grouping.
  parameters:
    type: object
    properties:
      year:
        description: The year for which the standings are to be fetched.
      group:
        description: The group name for standings, either 'league' or 'conference'.
          Defaults to 'league'.
user_groups_list:
  name: user_groups_list
  description: Fetches a listing of all the public and private groups a user is a
    part of on the Steam Community platform.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the user on the Steam Community platform.
get_character_skills:
  name: get_character_skills
  description: Fetches the list of skills for a given character from the Lost Ark
    API.
  parameters:
    type: object
    properties:
      character_name:
        description: The name of the Lost Ark character whose skills are to be fetched.
list_users:
  name: list_users
  description: Fetches and returns a list of users associated with a specified account
    identifier from the RapidAPI service.
  parameters:
    type: object
    properties:
      aid:
        description: The account identifier for which the list of users is being fetched.
      page:
        description: The page offset for paginated results. Defaults to None.
companies_id_financials:
  name: companies_id_financials
  description: Retrieves the financial key figures (balance sheet total, revenue,
    profit, number of employees) for a company with the given identifier.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the company for which financial data is to
          be retrieved.
agents_get_profile:
  name: agents_get_profile
  description: Fetches the profile information for a real estate agent using their
    NRDS ID and advertiser ID.
  parameters:
    type: object
    properties:
      nrds_id:
        description: The NRDS ID of the agent, typically returned from the /agents/list
          endpoint.
      advertiser_id:
        description: The advertiser ID of the agent, typically returned from the /agents/list
          endpoint.
        type: integer
calculate_order_total:
  name: calculate_order_total
  description: Calculates the total cost of an order based on the items, quantities,
    and prices.
  parameters:
    type: object
    properties:
      items:
        description: A list of item names.
      quantities:
        description: A list of corresponding quantities for each item.
      prices:
        description: A list of corresponding prices for each item.
amenities:
  name: amenities
  description: Retrieves amenities IDs and descriptions from the Airbnb Listings API,
    returning up to 50 results starting from the specified offset.
  parameters:
    type: object
    properties:
      offset:
        description: The index to start retrieving the amenities from.
        type: integer
image_stable_prompter:
  name: image_stable_prompter
  description: Generates a prompt for stable diffusion using an image URL via the
    Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      url:
        description: The full path of the image URL to be processed. Defaults to None.
fedora_image_fedora_get:
  name: fedora_image_fedora_get
  description: Fetches data from the Fedora image API using the given URL and RapidAPI
    key.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the image to be fetched.
copyright_free_images_api:
  name: copyright_free_images_api
  description: Fetch copyright-free images from an API based on a search term.
  parameters:
    type: object
    properties:
      search:
        description: The search term to query for free images.
us_fl:
  name: us_fl
  description: Fetches current or historical gas price data for Florida.
  parameters:
    type: object
    properties:
      date:
        description: Date for which to fetch historical gas price data in the format
          'YYYY-MM-DD'. Defaults to None.
v1_airlines:
  name: v1_airlines
  description: Fetches airline information using the API Ninjas Airlines API given
    certain parameters.
  parameters:
    type: object
    properties:
      iata:
        description: International Air Transport Association (IATA) 2-character airline
          code. Defaults to None.
      name:
        description: Airline name. Supports partial matching (e.g., 'United' will
          match 'United Airlines'). Defaults to 'Singapore Airlines'.
      icao:
        description: International Civil Aviation Organization (ICAO) 3-character
          airline code. Defaults to None.
livetraffic:
  name: livetraffic
  description: Retrieves information about all aircraft within a 25-nautical mile
    radius of the specified latitude and longitude.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude of the center point (-90 to 90).
        type: integer
      lon:
        description: 'Longitude of the center point (-180 to 180). Note: Longitude
          in the US is typically negative.'
        type: integer
find_zip_codes_by_city_and_street:
  name: find_zip_codes_by_city_and_street
  description: Fetch zip codes for a given city and street using the Polish Zip Codes
    API.
  parameters:
    type: object
    properties:
      accept:
        description: Requested content type.
      city:
        description: Name of the city to search for zip codes.
      street:
        description: Name of the street to search for zip codes.
      x_traceid:
        description: A traceId that is copied to the API response header. Default
          is 'optional_abc123'.
v1_dogs:
  name: v1_dogs
  description: Fetch a list of dog breeds matching specified parameters from the API.
    Returns at most 20 results by default.
  parameters:
    type: object
    properties:
      offset:
        description: Number of results to offset for pagination. Defaults to None.
      energy:
        description: Energy level of the breed (0-5, where 0 indicates low energy
          and 5 indicates high energy). Defaults to None.
      protectiveness:
        description: Protectiveness level of the breed (0-5, where 0 indicates minimal
          alerting and 5 indicates maximum alerting). Defaults to None.
      max_weight:
        description: Maximum weight of the breed in pounds. Defaults to None.
      min_weight:
        description: Minimum weight of the breed in pounds. Defaults to None.
      trainability:
        description: Ease of training the breed (0-5, where 0 indicates very difficult
          and 5 indicates very easy). Defaults to None.
      shedding:
        description: Shedding level of the breed (0-5, where 0 indicates no shedding
          and 5 indicates maximum shedding). Defaults to None.
      name:
        description: Name of the dog breed. Defaults to 'golden retriever'.
      min_height:
        description: Minimum height of the breed in inches. Defaults to None.
      barking:
        description: Barking tendency of the breed (0-5, where 0 indicates minimal
          barking and 5 indicates maximum barking). Defaults to None.
      max_height:
        description: Maximum height of the breed in inches. Defaults to None.
      max_life_expectancy:
        description: Maximum life expectancy of the breed in years. Defaults to None.
      min_life_expectancy:
        description: Minimum life expectancy of the breed in years. Defaults to None.
get_companies_by_sic_code:
  name: get_companies_by_sic_code
  description: Retrieve a list of the top 100 companies related to a specified SIC
    code using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      sic_code:
        description: The Standard Industrial Classification (SIC) code used to lookup
          companies.
        type: integer
get_all_posts:
  name: get_all_posts
  description: Retrieves a paginated list of all posts from the API.
  parameters:
    type: object
    properties:
      per_page:
        description: The number of posts to retrieve per page. Defaults to 10.
      page:
        description: The number of posts to retrieve per page. Defaults to 10.
getmaxstreak:
  name: getmaxstreak
  description: Retrieve the maximum streak of a user on LeetCode using the specified
    RapidAPI key.
  parameters:
    type: object
    properties:
      username:
        description: The username of the LeetCode user whose maximum streak is being
          retrieved.
list_top_tracks:
  name: list_top_tracks
  description: Fetches the weekly or daily top tracks from Spotify for a specified
    region and date.
  parameters:
    type: object
    properties:
      region:
        description: The region code in ISO 3166 alpha-2 format (e.g., 'US'). Defaults
          to 'global'.
      date:
        description: The date in 'YYYY-MM-DD' format. Leave blank to get the latest
          chart.
artist_singles:
  name: artist_singles
  description: Fetches singles of an artist from the Spotify API using the provided
    artist ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The Spotify artist ID. Default is '2w9zwq3AktTeYYMuhMjju8'.
      offset:
        description: The index of the first single to return. Default is '0'.
      limit:
        description: The maximum number of singles to return. Default is '20'.
year_end_billboard_200_albums:
  name: year_end_billboard_200_albums
  description: Fetch the Year-End Billboard 200 Albums chart for a given year and
    range.
  parameters:
    type: object
    properties:
      year:
        description: The year to fetch the Year-End Billboard 200 Albums for.
        type: integer
      range:
        description: The range of results to return (default is '1-10'). If not specified,
          all results are returned.
eredivisie_standings:
  name: eredivisie_standings
  description: Fetches Eredivisie standings for a given season using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      season:
        description: The season for which to fetch the standings, e.g., '2022'. Defaults
          to None.
marks_men_points:
  name: marks_men_points
  description: Fetches the men's marks corresponding to a given points value using
    the Scoring Tables API.
  parameters:
    type: object
    properties:
      points:
        description: A point value between 1 and 1400 to retrieve men's marks.
        type: integer
v1_exercises:
  name: v1_exercises
  description: Fetch up to 10 exercises from the API Ninjas Exercises API that satisfy
    the given search parameters.
  parameters:
    type: object
    properties:
      offset:
        description: Number of results to offset for pagination. Default is 0.
      muscle:
        description: 'Muscle group targeted by the exercise. Possible values include:
          ''abdominals'', ''abductors'', ''adductors'', ''biceps'', ''calves'', ''chest'',
          ''forearms'', ''glutes'', ''hamstrings'', ''lats'', ''lower_back'', ''middle_back'',
          ''neck'', ''quadriceps'', ''traps'', ''triceps''. Default is ''biceps''.'
      difficulty:
        description: 'Difficulty level of the exercise. Possible values include: ''beginner'',
          ''intermediate'', ''expert''.'
      name:
        description: Name of the exercise. This value can be partial (e.g., 'press'
          will match 'Dumbbell Bench Press').
v2_auto_complete:
  name: v2_auto_complete
  description: Fetches auto-complete suggestions for a given text or phrase from the
    Trading View API.
  parameters:
    type: object
    properties:
      text:
        description: The term or phrase for which to get suggestions.
      start:
        description: The offset of records to ignore for pagination purposes. Default
          is '0'.
      search_type:
        description: The type of search to perform. Options include 'stock', 'futures',
          'forex', 'index', 'bond', 'economic', 'bitcoin', and 'crypto'. Multiple
          options can be separated by commas.
      lang:
        description: The language code for the results. Default is 'en'.
      exchange:
        description: The exchange value from the `/exchanges/list` endpoint value
          field.
bodyfat:
  name: bodyfat
  description: Calculates the body fat percentage based on age, gender, weight, and
    height using the provided Toolbench RapidAPI key.
  parameters:
    type: object
    properties:
      age:
        description: The age of the person in years.
        type: integer
      gender:
        description: The gender of the person. Possible values are 'male' or 'female'.
      weight:
        description: The weight of the person. Expected to be in kilograms if unit
          is 'metric', otherwise in pounds.
        type: integer
      height:
        description: The height of the person. Expected to be in centimeters if unit
          is 'metric', otherwise in inches.
        type: integer
      unit:
        description: The desired units of measurement to use. Possible values are
          'metric' (default) or 'imperial'.
fx:
  name: fx
  description: Converts a specified `amount` of currency from one type to another
    using the ForexGo API, with an optional historical date.
  parameters:
    type: object
    properties:
      amount:
        description: The amount of currency to be converted.
        type: integer
      is_from:
        description: The source currency code (e.g., 'USD', 'EUR').
      to:
        description: The target currency code to convert to.
      date:
        description: The date for historical conversion rates in ISO format (YYYY-MM-DDTHH:mm:ss.sssZ).
          Defaults to None for real-time rates.
stock_earnings:
  name: stock_earnings
  description: Retrieve earnings information for a particular stock symbol using the
    Yahoo Finance API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to retrieve earnings information.
stock_splits:
  name: stock_splits
  description: Fetch the list of all stock splits for a given stock symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to fetch stock splits.
      orderby:
        description: The order in which to sort the stock splits. Defaults to 'Ascending'.
test:
  name: test
  description: Retrieves data from the PMI Jateng API and returns the response as
    a JSON or text.
  parameters:
    type: object
    properties:
      iniya:
        description: An optional query string parameter to be sent with the request.
          Defaults to 9.
events:
  name: events
  description: Retrieves events from Linz, Austria using the specified page size and
    RapidAPI key.
  parameters:
    type: object
    properties:
      pagesize:
        description: The number of events to retrieve per page. Defaults to 150.
mini_chart:
  name: mini_chart
  description: Generates a TradingView mini chart image based on the specified parameters
    and returns the image data or error message.
  parameters:
    type: object
    properties:
      width:
        description: 'Width of the chart image. Must be within the valid range. Minimum:
          320. Default is 800.'
      format:
        description: Format of the chart image. Supported formats are 'png' and 'jpeg'.
          Default is 'png'.
      symbol:
        description: TradingView symbol for the chart. Examples include 'BINANCE:BTCUSDT'
          and 'BINANCE:BTCUSDTPERP'. Default is 'BINANCE:BTCUSDT'.
      interval:
        description: Time interval for the chart. Supported intervals are '1d', '1M',
          '3M', '1Y', '5Y', and 'all'. Default is '1M'.
      theme:
        description: Color theme of the chart. Supported themes are 'light' and 'dark'.
          Default is 'dark'.
      height:
        description: 'Height of the chart image. Must be within the valid range. Minimum:
          220. Default is 400.'
getpetbyid:
  name: getpetbyid
  description: Fetches the details of a pet using its ID from an online pet store
    API.
  parameters:
    type: object
    properties:
      petid:
        description: The ID of the pet to retrieve.
        type: integer
get_quotes_by_specific_author:
  name: get_quotes_by_specific_author
  description: Fetch quotes from a specified author using the World of Quotes API.
  parameters:
    type: object
    properties:
      author:
        description: Name of the author whose quotes are to be fetched.
      page:
        description: Page number for pagination. Defaults to 3.
      limit:
        description: Number of quotes to retrieve per request. Maximum is 20. Defaults
          to 20.
recitations_by_page_number:
  name: recitations_by_page_number
  description: Fetches a list of ayah recitations for a given Madani Mushaf page.
  parameters:
    type: object
    properties:
      recitation_id:
        description: The identifier for the specific recitation.
        type: integer
      page_number:
        description: The page number in the Madani Mushaf for which ayah recitations
          are to be fetched.
        type: integer
result:
  name: result
  description: This function retrieves the result of a sports event using the specified
    language and event ID, by querying the Sports Betting API.
  parameters:
    type: object
    properties:
      lang:
        description: Language code for the results (e.g., 'en' for English).
      evt:
        description: Event ID for which the result is to be fetched.
        type: integer
users:
  name: users
  description: Fetches user data from the RapidAPI service based on the specified
    quantity and gender.
  parameters:
    type: object
    properties:
      quantity:
        description: The number of users to retrieve.
        type: integer
      gender:
        description: The gender of users to retrieve. Valid values could include 'male',
          'female', etc.
stores_get_details:
  name: stores_get_details
  description: Fetch detailed information for a specific store location.
  parameters:
    type: object
    properties:
      location_id:
        description: The identifier for the store location, often obtained from the
          stores list endpoint.
        type: integer
currency_news:
  name: currency_news
  description: Fetch the latest news related to a specific currency, forex, or cryptocurrency
    pair.
  parameters:
    type: object
    properties:
      from_symbol:
        description: A 3-letter currency code or symbol (ISO 4217) representing the
          base currency (e.g., 'USD').
      to_symbol:
        description: A 3-letter currency code or symbol (ISO 4217) representing the
          target currency (e.g., 'EUR').
      language:
        description: The language of the news results, specified as a 2-letter language
          code (ISO 639-1). Default is 'en'.
news_search:
  name: news_search
  description: Search for news articles that match a given keyword.
  parameters:
    type: object
    properties:
      keyword:
        description: The term or phrase to search for in news articles.
      pageindex:
        description: The index of the page to retrieve. Default is 1.
      pagesize:
        description: The number of results per page. Maximum is 20. Default is 20.
take_image_screenshot:
  name: take_image_screenshot
  description: Takes a screenshot of a specified website using given dimensions.
  parameters:
    type: object
    properties:
      width:
        description: The width of the screenshot in pixels. Defaults to 1024.
      url:
        description: The URL of the website to be captured. Defaults to 'https://google.com'.
      height:
        description: The height of the screenshot in pixels. Defaults to 780.
test_app_deepfry_get:
  name: test_app_deepfry_get
  description: Sends a GET request to the deepfry endpoint of the RapidAPI Image Processing
    service with the specified URL and API key.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the image that you want to deepfry. Defaults to 'https://dagbot-is.the-be.st/logo.png'.
getresult:
  name: getresult
  description: Retrieves the result of a previously requested video rendering job
    using the given job ID.
  parameters:
    type: object
    properties:
      job_id:
        description: The ID of the previously requested rendering job.
drug_info:
  name: drug_info
  description: Fetches information about a specified drug using the RapidAPI Drug
    Info and Price History API.
  parameters:
    type: object
    properties:
      drug:
        description: The name of the drug to retrieve information for.
v1_covid19:
  name: v1_covid19
  description: Fetches COVID-19 data from the API Ninjas COVID-19 endpoint based on
    the provided parameters. Either `date` or `country` must be set.
  parameters:
    type: object
    properties:
      country:
        description: Country name (case insensitive).
      date:
        description: Date to retrieve single-day snapshot. Must be in the form of
          YYYY-MM-DD (e.g., 2022-01-01). Defaults to '2022-01-01'.
      county:
        description: County name for US states (case insensitive). For United States
          data only. Must be used in conjunction with `country` (United States) and
          `region` (e.g., California).
      region:
        description: Administrative region (also known as state or province in many
          countries) name (case insensitive). Must be used in conjunction with `country`.
          If not set, countries with data broken down by administrative regions will
          return separate data for each region.
birthday:
  name: birthday
  description: Fetches detailed information about a given birthday date using the
    DateClock API.
  parameters:
    type: object
    properties:
      date:
        description: The birthday date in 'YYYY-MM-DD' format.
getbarcode:
  name: getbarcode
  description: Retrieves price information based on a barcode from the South Africa
    Price Tracker API.
  parameters:
    type: object
    properties:
      barcode:
        description: The barcode of the product to look up.
getgeneration:
  name: getgeneration
  description: Fetches the generation status and generated images from the Dream Diffusion
    API.
  parameters:
    type: object
    properties:
      x_api_key:
        description: The API key required for authorization to access the generation
          data.
      generation_uuid:
        description: The unique identifier for the generation process.
billboard_hot_100:
  name: billboard_hot_100
  description: Fetch the Billboard Hot 100 chart data for a given date and range.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch the chart data in 'YYYY-MM-DD' format.
      range:
        description: The range of chart positions to return, specified in the format
          'start-end'. Default is '1-10'.
generate_pdf:
  name: generate_pdf
  description: Generates a PDF by capturing a screenshot of the provided website URL
    with specified dimensions using the Web Capture API.
  parameters:
    type: object
    properties:
      width:
        description: The width of the screenshot in pixels. Defaults to 1024.
      height:
        description: The height of the screenshot in pixels. Defaults to 780.
      url:
        description: The URL of the website to capture. Defaults to 'https://google.com'.
v1_search:
  name: v1_search
  description: Performs a customizable search through a news database with various
    filtering and sorting options.
  parameters:
    type: object
    properties:
      q:
        description: The search query string. This must be URL-encoded.
      not_sources:
        description: Comma-separated list of sources to exclude from the search results.
      lang:
        description: Language of the articles. Supported values include various language
          codes such as 'en', 'es', 'fr', etc. Defaults to 'en'.
      search_in:
        description: Scope of the search within articles. Options are 'title', 'summary',
          or both.
      sort_by:
        description: Criteria for sorting the search results. Options include 'relevancy',
          'date', and 'rank'. Defaults to 'relevancy'.
      sources:
        description: Comma-separated list of sources to exclude from the search results.
      to:
        description: Date until which to search for articles.
      country:
        description: Country to narrow the search. Supports ISO 3166-1 alpha-2 codes.
      media:
        description: Whether to include media information in the results. Defaults
          to 'True'.
      topic:
        description: Topic to restrict the search. Options include 'news', 'sport',
          'tech', etc.
      from_rank:
        description: Lower boundary of the source rank.
      to_rank:
        description: Upper boundary of the source rank.
      page_size:
        description: Number of articles to return per page. Maximum is 100.
      page:
        description: Page number for paginated results. Defaults to 1.
      ranked_only:
        description: Limit to top-ranked sources only. Defaults to 'True'.
      is_from:
        description: Date from which to start the search.
query_races:
  name: query_races
  description: Queries horse races based on various filter criteria.
  parameters:
    type: object
    properties:
      order_by_date:
        description: Results ordered by date of the race, either "asc" for ascending
          or "desc" for descending.
      date_to:
        description: Upper bound date for the races to be queried.
      class_to:
        description: Maximum race class.
      distance_to:
        description: Upper bound distance for the races to be queried.
      distance_from:
        description: Lower bound distance for the races to be queried.
      id_horse:
        description: Horse ID. If provided, the query searches for races where this
          horse has run.
      course:
        description: Racecourse name (e.g., Cheltenham, Ascot, Newmarket).
      class_from:
        description: Minimum race class.
      page:
        description: Page number for pagination.
      date_from:
        description: Lower bound date for the races to be queried.
      name:
        description: Minimum race class.
real_time_information:
  name: real_time_information
  description: Fetches real-time information from the BART API based on the provided
    command and origin station.
  parameters:
    type: object
    properties:
      cmd:
        description: Command parameter for the API request. Examples can be found
          at http://api.bart.gov/docs/overview/examples.aspx.
      orig:
        description: Specifies the station by its abbreviation. A list of station
          abbreviations can be found at http://api.bart.gov/docs/overview/abbrev.aspx.
          Use 'ALL' to get all current ETDs.
get_random_challange:
  name: get_random_challange
  description: Fetch a random challenge from the specified API, with an option to
    specify the type of challenge.
  parameters:
    type: object
    properties: {}
station_information:
  name: station_information
  description: Retrieves station information from the BART (Bay Area Rapid Transit)
    API.
  parameters:
    type: object
    properties:
      cmd:
        description: A command code that specifies the type of station information
          to retrieve. See examples at http://api.bart.gov/docs/overview/examples.aspx.
convert_hex:
  name: convert_hex
  description: Converts a hex color code to other color formats such as RGB, HSL,
    and CMYK using the Convexity API.
  parameters:
    type: object
    properties:
      hex:
        description: The hex color code to be converted.
getbookcoverurl:
  name: getbookcoverurl
  description: Fetches the URL of a book cover image using the provided language code
    and ISBN.
  parameters:
    type: object
    properties:
      languagecode:
        description: The language code in which the book cover information is required.
      isbn:
        description: The International Standard Book Number (ISBN) of the book.
getpeople:
  name: getpeople
  description: Fetches Power BI influencers data from the specified page using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve Power BI influencers from.
        type: integer
nft_news:
  name: nft_news
  description: Fetches up-to-date NFT news from the specified API.
  parameters:
    type: object
    properties:
      nftnews:
        description: A specific filter to narrow down NFT news. Default is None, meaning
          no specific filter.
random_company:
  name: random_company
  description: Generates a list of fake companies using the specified RapidAPI endpoint.
  parameters:
    type: object
    properties:
      size:
        description: The number of fake companies to generate. Defaults to 5.
behence:
  name: behence
  description: Check the availability of a given username on Behance using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The username to check for availability on Behance.
get_user_pins:
  name: get_user_pins
  description: Retrieves the Pinterest pins of a specified user.
  parameters:
    type: object
    properties:
      username:
        description: The Pinterest username whose pins are to be fetched.
get_tiktok_video_info:
  name: get_tiktok_video_info
  description: Fetches detailed information about a TikTok video, including options
    for HD quality and no watermark.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the TikTok video. It can be in the format of a TikTok
          ID or a direct TikTok video link.
get_hebrew_month:
  name: get_hebrew_month
  description: Fetches the Hebrew month for a given Gregorian date string using the
    Enoch Calendar API.
  parameters:
    type: object
    properties:
      datestring:
        description: The Gregorian date in 'YYYY-MM-DD' format for which to get the
          Hebrew month.
zones_type_zoneid_forecast:
  name: zones_type_zoneid_forecast
  description: Fetches the forecast data for a given zone type and zone ID using the
    National Weather Service API.
  parameters:
    type: object
    properties:
      zoneid:
        description: The ID of the zone for which to fetch the forecast.
retrieve_the_hardiness_zone:
  name: retrieve_the_hardiness_zone
  description: Fetch the USDA Plant Hardiness Zone for the given ZIP code using the
    Toolbench API.
  parameters:
    type: object
    properties:
      zipcode:
        description: The ZIP code for which to retrieve the hardiness zone.
ski_weather_api:
  name: ski_weather_api
  description: Fetches ski weather forecasts from the World Weather Online API for
    a specified location.
  parameters:
    type: object
    properties:
      q:
        description: The location query (e.g., city name, latitude/longitude).
      tp:
        description: Time period for the weather forecast (e.g., '3 hourly'). Default
          is None.
      lang:
        description: The language code for the weather forecast (default is 'en' for
          English).
      format:
        description: The response format, such as 'json' or 'xml'. Default is None.
      num_of_days:
        description: The number of days for the weather forecast, with a maximum of
          7 days. Default is 1.
racecards:
  name: racecards
  description: Fetches and returns the list of horse racing events for a given date
    from the Horse Racing API.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch the racecards, formatted as 'YYYY-MM-DD'.
          Defaults to '2020-03-12'.
get_1_obter_c_digo_do_chat_code_to_chat:
  name: get_1_obter_c_digo_do_chat_code_to_chat
  description: This function retrieves the chat code by querying the "compras-net"
    API using the provided UASG code and process number.
  parameters:
    type: object
    properties:
      co_uasg:
        description: Code of the UASG (Unified System of General Services Code) of
          the organization.
        type: integer
      numprp:
        description: Number of the process to be consulted.
        type: integer
getscreen:
  name: getscreen
  description: Fetches a screenshot of the screen in the current session for the given
    phone ID.
  parameters:
    type: object
    properties:
      phone_id:
        description: The unique identifier of the phone whose screen session is to
          be captured.
bmi:
  name: bmi
  description: Calculates the Body Mass Index (BMI) using an external API.
  parameters:
    type: object
    properties:
      heightincentrimetres:
        description: The height of the individual in centimeters.
        type: integer
      weightinkilograms:
        description: The weight of the individual in kilograms.
        type: integer
view_all_food_items:
  name: view_all_food_items
  description: Retrieves a comprehensive list of all available food items from the
    API with an optional limit on the number of items.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of food items to retrieve. Defaults to 10.
target_heart_rate:
  name: target_heart_rate
  description: Calculates the target heart rate range for cardiovascular exercise
    using the Karvonen method based on the user's age and fitness level.
  parameters:
    type: object
    properties:
      age:
        description: The age of the user in years.
        type: integer
      fitness_level:
        description: The fitness level of the user. Acceptable values are "beginner",
          "intermediate", and "advanced".
cities_get_information_deprecated:
  name: cities_get_information_deprecated
  description: Fetches information about a specific city based on its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the city to get information for.
      aqiindex:
        description: The AQI index to use (default is 'us'). Options are 'us' or 'cn'.
      timezone:
        description: The timezone to use (default is 'Asia/Singapore').
      lang:
        description: The language for the response (default is 'en_US').
calendars_get_economic_calendar:
  name: calendars_get_economic_calendar
  description: Fetch the economic calendar for a specified date range and set of countries.
  parameters:
    type: object
    properties:
      is_from:
        description: The start date in the format yyyy-MM-dd (e.g., '2022-08-21').
      to:
        description: The end date in the format yyyy-MM-dd (e.g., '2022-09-05').
      minimportance:
        description: The minimum importance level of events to fetch. Valid values
          are -1, 0, or 1.
      lang:
        description: The language code for the response. Default is 'en'.
      countries:
        description: A comma-separated list of country codes to include (e.g., 'US,EU,JP').
          Default includes multiple countries.
getdivision:
  name: getdivision
  description: Retrieve information about a specific NHL division by its ID via the
    NHL Stats and Live Data API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the division to retrieve information for.
        type: integer
vimeo:
  name: vimeo
  description: Checks if a given Vimeo username is available using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      username:
        description: The Vimeo username to check for availability.
get_watches_by_brand_family_model:
  name: get_watches_by_brand_family_model
  description: Fetches a list of watches based on brand name, family, and model using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      brandname:
        description: The brand name of the watch.
      model:
        description: The model name of the watch.
      family:
        description: The family category of the watch.
specifications_by_make_model:
  name: specifications_by_make_model
  description: Fetches the specifications of a motorcycle given its make and model
    using the Motorcycle Specs Database API.
  parameters:
    type: object
    properties:
      make:
        description: The manufacturer of the motorcycle.
      model:
        description: The model of the motorcycle.
ip_lookup:
  name: ip_lookup
  description: This function performs an IP lookup using the provided IP address and
    returns the geolocation details. It utilizes the IP Whois Geolocation API from
    RapidAPI.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address (IPv4 or IPv6) to look up.
carrier_endpoint:
  name: carrier_endpoint
  description: Retrieves carrier information for a given phone number using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      phonenumber:
        description: The phone number for which to look up carrier information.
get_player_details:
  name: get_player_details
  description: Retrieves player details based on the provided username and region.
  parameters:
    type: object
    properties:
      name:
        description: The username of the player. This is case sensitive.
      region:
        description: The region of the player.
uuid_to_name:
  name: uuid_to_name
  description: Convert a Minecraft UUID to a player name using the Toolbench API.
  parameters:
    type: object
    properties:
      uuid:
        description: The Minecraft UUID you want to convert to a player name.
custom_dice_rolls:
  name: custom_dice_rolls
  description: Roll any number of dice with a specified number of sides a specified
    number of times using the Dice Roll Simulator API.
  parameters:
    type: object
    properties:
      dice:
        description: The number of dice to roll. Defaults to 3.
      sides:
        description: The number of sides on each die. Defaults to 8.
      rolls:
        description: The number of times to roll the dice. Defaults to '2'.
schedules:
  name: schedules
  description: Fetch the golf schedule for the specified organization and year.
  parameters:
    type: object
    properties:
      orgid:
        description: Identifier for the golf organization. Choose '1' for PGA Tour
          or '2' for LIV Tour.
      year:
        description: The year for which the schedule is being requested.
get_analysis:
  name: get_analysis
  description: Fetches website traffic and key metrics for a given domain using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      domain:
        description: The domain to analyze, e.g., 'amazon.com'.
currency_time_series:
  name: currency_time_series
  description: Retrieve forex time series data for a specified period.
  parameters:
    type: object
    properties:
      period:
        description: 'The period for which the time series data should be returned.
          Valid periods include:'
      to_symbol:
        description: A 3-letter currency code representing the target currency (ISO
          4217).
      from_symbol:
        description: A 3-letter currency code representing the base currency (ISO
          4217).
      language:
        description: The language code (ISO 639-1) for the results. Default is 'en'.
hull_moving_average:
  name: hull_moving_average
  description: Calculates the Hull Moving Average (HMA) indicator for a given cryptocurrency
    market symbol using the Qvantana API.
  parameters:
    type: object
    properties:
      exchange:
        description: Name of the cryptocurrency exchange (e.g., 'binance').
      market:
        description: Type of the market (e.g., 'spot', 'usdt-perpetual').
      symbol:
        description: Trading symbol of the cryptocurrency (e.g., 'BTCUSD').
      interval:
        description: Time interval for the HMA calculation (e.g., '1d', '1h').
      is_from:
        description: Start time for fetching data in UNIX timestamp format, default
          is '1683895800'.
      backtracks:
        description: Number of periods to look back, default is 1.
      length:
        description: Length of the HMA, default is 9.
stock_quotes:
  name: stock_quotes
  description: Fetches real-time stock data for given stock symbols using the Holistic
    Finance Stock Data RapidAPI.
  parameters:
    type: object
    properties:
      symbols:
        description: A comma-separated string of stock symbols for which to fetch
          the stock data.
getevents:
  name: getevents
  description: Fetches Azure events from the specified page using the provided API
    key.
  parameters:
    type: object
    properties:
      page:
        description: The page number of events to retrieve.
        type: integer
get_coin_markets:
  name: get_coin_markets
  description: Retrieve markets on different exchanges that trade a specific coin.
  parameters:
    type: object
    properties:
      uuid:
        description: UUID of the coin you want to request markets for.
      offset:
        description: Offset for pagination. Default is 0.
      orderby:
        description: Index to sort results by. Default is '24hVolume'.
      limit:
        description: Limit on the number of results returned. Default is 50.
      search:
        description: Value to filter search results, e.g., exchange names, currency
          names, or currency symbols.
      referencecurrencyuuid:
        description: UUID of the reference currency used to calculate the volume.
          Defaults to the US Dollar.
      orderdirection:
        description: Order results in ascending ('asc') or descending ('desc') order.
          Default is 'desc'.
check:
  name: check
  description: Checks the details of a bank card BIN (Bank Identification Number)
    using the provided BIN number and RapidAPI key.
  parameters:
    type: object
    properties:
      binnum:
        description: The bank card BIN number to check.
        type: integer
newlyregistereddomains:
  name: newlyregistereddomains
  description: Fetch a list of newly registered domains from the WhoIs Lookup API,
    applying optional filters to the search.
  parameters:
    type: object
    properties:
      exclude:
        description: Keywords to exclude from the domain search. Defaults to None.
      date:
        description: The registration date of the domains to be searched in 'YYYY-MM-DD'
          format. Defaults to '2023-06-12'.
      page:
        description: The page number of the search results to retrieve. Defaults to
          1.
      keywords:
        description: Keywords that the searched domains must contain. Defaults to
          None.
house_prices_get_sales_history:
  name: house_prices_get_sales_history
  description: Retrieve the sales history for a given property using the Zoopla API.
  parameters:
    type: object
    properties:
      property_id:
        description: The identifier for the property for which to retrieve the sales
          history.
        type: integer
market_most_actives:
  name: market_most_actives
  description: Fetches the most active stocks ordered by intraday trade volume using
    the Yahoo Finance API.
  parameters:
    type: object
    properties:
      start:
        description: The start index for the request. Defaults to 0.
companies_profile:
  name: companies_profile
  description: Fetch the profile of a company from the Financial Modeling Prep API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol of the company.
      apikey:
        description: API key for the Financial Modeling Prep API.
stock_v2_get_competitors:
  name: stock_v2_get_competitors
  description: Fetches the competitors of a stock based on its performance ID.
  parameters:
    type: object
    properties:
      performanceid:
        description: The performance ID of the stock, typically retrieved from /auto-complete,
          /get-summary, or /get-movers endpoints.
getdirectdebitinitiationinstruction:
  name: getdirectdebitinitiationinstruction
  description: Retrieve a direct debit initiation instruction by UETR ID.
  parameters:
    type: object
    properties:
      uetr:
        description: An RFC4122 UID used as a unique Payment Instruction Identifier.
og:
  name: og
  description: Fetches all the OpenGraph and Meta tags from a given website URL using
    the provided API key.
  parameters:
    type: object
    properties:
      url:
        description: The website URL to fetch the OpenGraph and Meta tags from. Defaults
          to 'https://protomol.explorarc.com/'.
get_all_companies_paginated:
  name: get_all_companies_paginated
  description: Fetches a paginated list of all companies from the CAC database using
    the provided API key.
  parameters:
    type: object
    properties:
      page:
        description: The page number to fetch.
        type: integer
      limit:
        description: The number of companies to retrieve per page.
        type: integer
house_prices_estimate:
  name: house_prices_estimate
  description: Estimates house prices based on given criteria and returns a list of
    estimated prices.
  parameters:
    type: object
    properties:
      area:
        description: The area for which to estimate house prices, as defined by the
          auto-complete API.
      property_type:
        description: The type of property. Options are 'detached', 'flat', 'terraced',
          'semi_detached'.
      page_number:
        description: The page index for pagination. Default is 1.
      order_by:
        description: The attribute by which to order the results. Options are 'price_paid',
          'last_sold', 'address', 'estimated_value'. Default is 'address'.
      page_size:
        description: The number of items per response. Maximum is 40. Default is 40.
      ordering:
        description: The order direction of the results. Options are 'ascending',
          'descending'. Default is 'descending'.
      identifier:
        description: A specific identifier from the auto-complete API to refine the
          search.
draw_date_listing:
  name: draw_date_listing
  description: Fetches a listing of Thai lottery draw dates from the RapidAPI service.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the results to fetch. Defaults to 1.
locationsuggestions:
  name: locationsuggestions
  description: Fetches location suggestions using the Zillow API based on the provided
    location query.
  parameters:
    type: object
    properties:
      location:
        description: The location query string. This can be a state, county, neighborhood,
          city, street name, or zip code.
similar_hashtags:
  name: similar_hashtags
  description: Fetches related hashtags for a given keyword using the Hashtag API.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword for which related hashtags are to be fetched.
hsl_to_hex:
  name: hsl_to_hex
  description: Converts an HSL color code to its HEX color code using the Convexity
    RapidAPI service.
  parameters:
    type: object
    properties:
      s:
        description: The saturation component of the HSL color code.
        type: integer
      h:
        description: The hue component of the HSL color code.
        type: integer
      l:
        description: The lightness component of the HSL color code.
        type: integer
is_prime:
  name: is_prime
  description: Checks if a number is prime.
  parameters:
    type: object
    properties:
      num:
        description: The number to be checked.
        type: integer
countries_list:
  name: countries_list
  description: Returns a list of countries where Asos supports selling products.
  parameters:
    type: object
    properties:
      lang:
        description: The language code for the country names. Defaults to 'en-US'.
countries_detail:
  name: countries_detail
  description: Fetch detailed information of a country from the unofficial Shein API.
  parameters:
    type: object
    properties:
      region:
        description: The region code to fetch details for a specific country. Default
          is 'US'.
random_mlem:
  name: random_mlem
  description: Fetches one random mlem image in JSON format based on the given optional
    parameters.
  parameters:
    type: object
    properties:
      brightness:
        description: Image brightness, can be 'dark' or 'bright'.
      maxheight:
        description: Maximum height of the image.
      minwidth:
        description: Minimum width of the image.
      minheight:
        description: Minimum height of the image.
      tag:
        description: Tag to filter the mlem images.
      maxwidth:
        description: Maximum width of the image.
      orientation:
        description: Orientation of the image, can be 'square', 'landscape', or 'portrait'.
video_videoid:
  name: video_videoid
  description: Fetches video information and status from the video-builder API using
    the provided video ID and RapidAPI key.
  parameters:
    type: object
    properties:
      videoid:
        description: The unique identifier for the video.
        type: integer
detection_of_plates_and_faces:
  name: detection_of_plates_and_faces
  description: Detects and blurs license plates and faces in a given image to protect
    personal data.
  parameters:
    type: object
    properties:
      image:
        description: The URL or path to the image file where license plates and faces
          detection and blurring need to be applied.
search_for_any_category_or_star:
  name: search_for_any_category_or_star
  description: Search for images using a category keyword or pornstar name via the
    RapidAPI service.
  parameters:
    type: object
    properties:
      search:
        description: The category keyword or pornstar name to search for.
top_paid_ios_apps:
  name: top_paid_ios_apps
  description: Fetches a list of the top paid iOS apps from the App Store.
  parameters:
    type: object
    properties:
      lang:
        description: Language code for the results. Defaults to 'en'.
      category:
        description: Category ID to filter results by. Defaults to '6016'.
      country:
        description: Country code for the App Store to search in. Defaults to 'us'.
      num:
        description: Number of results to return. Defaults to 100. Maximum is 200.
        type: integer
get_vehicle_models:
  name: get_vehicle_models
  description: Fetches all supported vehicle models for a specified vehicle make using
    the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      make:
        description: The brand of the vehicle for which to fetch the models.
get_definitions:
  name: get_definitions
  description: Fetch the definitions of a specified word using the Dicolink API.
  parameters:
    type: object
    properties:
      mot:
        description: The word for which to fetch the definitions.
profile:
  name: profile
  description: Fetches and returns the profile information of a given Instagram user
    using the specified RapidAPI key.
  parameters:
    type: object
    properties:
      ig:
        description: The Instagram username for which the profile information is to
          be retrieved.
video_details:
  name: video_details
  description: Fetch details about a video from the Bing Video Search API, including
    related videos and other metadata.
  parameters:
    type: object
    properties:
      modules:
        description: A comma-separated list of modules to retrieve details for (e.g.,
          'RelatedVideos').
      is_id:
        description: The identifier of the video to retrieve details about.
tweet_favoriters:
  name: tweet_favoriters
  description: Fetches the list of users who have favorited a specific tweet.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the tweet for which to fetch favoriters.
      count:
        description: The number of results to return. Defaults to 20.
      cursor:
        description: The cursor for paginating through results. Defaults to None.
vin_decoder_basic:
  name: vin_decoder_basic
  description: Decodes basic information from a Vehicle Identification Number (VIN)
    using the RapidAPI VIN decoder service.
  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number (VIN) to be decoded. Must be
          17 characters long.
getpatient:
  name: getpatient
  description: Fetches patient objects filtered by specified query parameters from
    the API.
  parameters:
    type: object
    properties:
      format:
        description: Specifies the output type. Allowed values are CSV, HTML, XML,
          and JSON. Defaults to None.
      collection:
        description: A label used to name a set of images collected for a specific
          trial or other reason. Assigned during the data curation process. Defaults
          to None.
genericname:
  name: genericname
  description: This function retrieves the generic name of a given drug using the
    RapidAPI Drug Info and Price History API.
  parameters:
    type: object
    properties:
      drug:
        description: The brand name of the drug. Defaults to 'advil'.
earnings_history:
  name: earnings_history
  description: Fetches the earnings history of a given stock ticker using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which to fetch the earnings history.
estimates:
  name: estimates
  description: Retrieves estimates for a specified stock symbol using the Holistic
    Finance API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to retrieve estimates.
stock_get_stock_profile_data:
  name: stock_get_stock_profile_data
  description: Fetches the stock profile data for a specified ticker symbol and region.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: The region in which the stock is listed. Default is 'US'. Allowed
          values are 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB',
          'S'.
matchmanagers:
  name: matchmanagers
  description: Retrieve the managers for a specific Ice Hockey match using the match
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the match for which to retrieve managers.
        type: integer
fixtures_by_team_by_season:
  name: fixtures_by_team_by_season
  description: Retrieves fixtures and results for a given team within a specified
    season across all competitions they play in.
  parameters:
    type: object
    properties:
      season_id:
        description: The ID of the season to retrieve fixtures and results for.
        type: integer
      team_id:
        description: The ID of the team to retrieve fixtures and results for.
        type: integer
carbonfootprintfrommotorbike:
  name: carbonfootprintfrommotorbike
  description: Calculates the CO2 emissions in kilograms (Kg) from a motorbike travel
    based on the type of motorbike and the distance traveled.
  parameters:
    type: object
    properties:
      distance:
        description: The distance traveled in kilometers (KM).
collection:
  name: collection
  description: Fetches TLE (Two-Line Element) data from the TLE API based on the specified
    search query.
  parameters:
    type: object
    properties:
      search:
        description: The search term to query the API. Defaults to 'ISS'.
v1_planets:
  name: v1_planets
  description: Fetch a list of planets that match the specified parameters. The results
    are limited to a maximum of 30; use the `offset` parameter for pagination to access
    more results.
  parameters:
    type: object
    properties:
      max_period:
        description: Maximum orbital period of the planet in Earth days.
      max_temperature:
        description: Maximum average surface temperature of the planet in Kelvin.
      offset:
        description: Number of results to offset for pagination.
      max_distance_light_year:
        description: Maximum distance the planet is from Earth in light years.
      min_distance_light_year:
        description: Minimum distance the planet is from Earth in light years.
      max_mass:
        description: "Maximum mass of the planet in Jupiters (1 Jupiter = 1.898 \xD7\
          \ 10^27 kg)."
      max_semi_major_axis:
        description: Maximum semi-major axis of the planet in astronomical units (AU).
      min_mass:
        description: "Minimum mass of the planet in Jupiters (1 Jupiter = 1.898 \xD7\
          \ 10^27 kg)."
      min_semi_major_axis:
        description: Minimum semi-major axis of the planet in astronomical units (AU).
      name:
        description: Name of the planet. Defaults to 'Mars'.
      min_temperature:
        description: Minimum average surface temperature of the planet in Kelvin.
      max_radius:
        description: Maximum average radius of the planet in Jupiters (1 Jupiter =
          69911 km).
      min_radius:
        description: Minimum average radius of the planet in Jupiters (1 Jupiter =
          69911 km).
      min_period:
        description: Minimum orbital period of the planet in Earth days.
user_info:
  name: user_info
  description: Retrieve TikTok user information by username using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      username:
        description: The TikTok username of the user whose information is to be retrieved.
sign_info:
  name: sign_info
  description: Fetches and returns the sign information from the OnlyFans API using
    the provided user agent and RapidAPI key.
  parameters:
    type: object
    properties:
      useragent:
        description: The user agent string to be used in the API request.
user_metadata_information:
  name: user_metadata_information
  description: Fetch and return metadata information for a specified TikTok user,
    such as number of followers, followings, avatar URL, description, and more.
  parameters:
    type: object
    properties:
      username:
        description: The TikTok username to fetch metadata for (e.g., "amazon").
      fresh:
        description: If set to '1', forces the API to return fresh (non-cached) data.
          Defaults to '0'.
app_reviews:
  name: app_reviews
  description: Fetches app reviews from a specified app store using various filters.
  parameters:
    type: object
    properties:
      app_id:
        description: The app ID for which to get reviews.
      device:
        description: Only return reviews made on a specific device type. Allowed values
          are `PHONE`, `TABLET`, `CHROMEBOOK`. Default is `PHONE`.
      region:
        description: The country code to use, specified as a 2-letter code (ISO 3166-1
          alpha-2). Default is `us`.
      sort_by:
        description: How to sort the reviews in the results. Allowed values are `MOST_RELEVANT`,
          `NEWEST`, `RATING`. Default is `MOST_RELEVANT`.
      rating:
        description: Only return reviews with a certain star rating. Allowed values
          are `ANY`, `ONE_STAR`, `TWO_STARS`, `THREE_STARS`, `FOUR_STARS`, `FIVE_STARS`.
          Default is `ANY`.
      limit:
        description: Maximum number of reviews in the results. Default is 10.
      cursor:
        description: Specify a cursor from the previous request to get the next set
          of results.
      language:
        description: The language to use, specified as a 2-letter language code (ISO
          639-1 alpha-2). Default is `en`.
trending_tags_from_country:
  name: trending_tags_from_country
  description: Fetches trending tags from a specified country using the Hashtag5 API.
  parameters:
    type: object
    properties:
      country_name:
        description: The name of the country for which to fetch trending tags.
generate_avatar:
  name: generate_avatar
  description: Generates an avatar and returns it to the client based on the provided
    parameters.
  parameters:
    type: object
    properties:
      randomizer:
        description: Bypasses caching to return random images. Any value can be used
          (default is 'anything').
      name:
        description: The name for the avatar. Only the first character will be displayed
          (default is 'John').
      bg_color:
        description: HEX code for the background color of the avatar, without the
          '#' (default is 'FF2029').
      text_color:
        description: HEX code for the avatar's text color, without the '#' (default
          is '000000').
longest_common_prefix:
  name: longest_common_prefix
  description: Finds the longest common prefix among a list of strings.
  parameters:
    type: object
    properties:
      strs:
        description: The list of strings.
detail_info:
  name: detail_info
  description: Fetches detailed information of an application using its slug from
    the SuggestUse API.
  parameters:
    type: object
    properties:
      slug:
        description: The application's unique identifier used to fetch its details.
get_by_category:
  name: get_by_category
  description: Fetch a list of plants by their category from the house-plants API.
  parameters:
    type: object
    properties:
      category:
        description: The category of plants to fetch. Defaults to 'flower'.
search_philosopher_by_name:
  name: search_philosopher_by_name
  description: Searches for a philosopher by their name using the specified API key
    and returns the result.
  parameters:
    type: object
    properties:
      name:
        description: The name of the philosopher to search for. Defaults to 'Friedrich
          Nietzsche'.
short_ticker:
  name: short_ticker
  description: Fetches the latest and daily average prices for the specified cryptocurrency
    in the given market and against the provided fiat currencies.
  parameters:
    type: object
    properties:
      market:
        description: The market type, possible values include 'global' and 'local'.
      crypto:
        description: The cryptocurrency to get ticker information for, default is
          'ETH'.
      fiats:
        description: A comma-separated string of fiat currencies to return values
          for, default is 'USD,EUR'.
volume_from_to_number:
  name: volume_from_to_number
  description: Converts a given volume from one unit to another using the RapidAPI
    Unit Conversion API.
  parameters:
    type: object
    properties:
      to:
        description: The unit to convert the volume to.
      number:
        description: The numerical value of the volume to be converted.
        type: integer
      is_from:
        description: The unit of the volume to be converted from.
ministerio_espec_fico:
  name: ministerio_espec_fico
  description: Fetches information for a single ministry from the specified API.
  parameters:
    type: object
    properties:
      nombre:
        description: The name of the ministry to fetch data for.
search_by_url:
  name: search_by_url
  description: Fetches details about tracks, albums, and artists from a given Spotify
    URL using the MusicLinks API.
  parameters:
    type: object
    properties:
      spotify_url:
        description: The Spotify URL for which details are to be fetched.
search_a_place:
  name: search_a_place
  description: Search for a place using the Busy and Popular Times API, similar to
    how a location is searched on Google, returning the popular times graph if available.
  parameters:
    type: object
    properties:
      query:
        description: The search term for the location.
get_4_date_endpoint:
  name: get_4_date_endpoint
  description: Fetches the exchange rates for specified currencies on a given date.
  parameters:
    type: object
    properties:
      base:
        description: The base currency for which to get the exchange rates.
      symbols:
        description: A comma-separated string of target currencies to get exchange
          rates for.
      date:
        description: The date for which to fetch the exchange rates in 'YYYY-MM-DD'
          format. Defaults to '2023-02-01'.
reserve_hotel_room:
  name: reserve_hotel_room
  description: Reserves a hotel room with the specified details.
  parameters:
    type: object
    properties:
      room_type:
        description: The type of room to reserve.
      nightly_rate:
        description: The nightly rate for the room.
        type: number
      checkin_date:
        description: The check-in date in the format 'YYYY-MM-DD'.
      checkout_date:
        description: The check-out date in the format 'YYYY-MM-DD'.
      guest_id:
        description: The unique identifier for the guest.
      promo_code:
        description: A promotional code for a discount. Defaults to None.
iplookup:
  name: iplookup
  description: Perform an IP lookup using the RapidAPI IP Lookup service.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to lookup.
address_autocomplete:
  name: address_autocomplete
  description: Fetches address autocomplete predictions based on a given keyword and
    optional parameters such as geodetic system, coordinate unit, and API key.
  parameters:
    type: object
    properties:
      word:
        description: Address string for which the autocomplete predictions are sought.
          It must be between 2 to 50 characters.
      datum:
        description: Geodetic system of latitude and longitude. Default is 'wgs84'.
          Other option is 'tokyo' for Old Japan Geodetic System.
      coord_unit:
        description: The unit of latitude and longitude included in the output data.
          Default is 'degree'. Other option is 'millisec' for milliseconds.
local_weather_api:
  name: local_weather_api
  description: Fetches local weather data using the World Weather Online API.
  parameters:
    type: object
    properties:
      q:
        description: Location query (city name, town name, or geographic coordinates).
      tp:
        description: Time interval between weather updates (e.g., '1' for hourly updates).
          Defaults to None.
      aqi:
        description: Whether to include Air Quality Index data ('yes' or 'no'). Defaults
          to 'yes'.
      format:
        description: Response format (e.g., 'json' or 'xml'). Defaults to None.
      lang:
        description: Language for the output. Defaults to 'en'.
      alerts:
        description: Whether to include weather alerts ('yes' or 'no'). Defaults to
          'no'.
      num_of_days:
        description: Number of days for the weather forecast. Defaults to 3.
tirto_search:
  name: tirto_search
  description: Searches Tirto news data using the RapidAPI interface.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of search results to return.
      q:
        description: The query string to search for in Tirto news articles.
      page:
        description: The page number for paginated results.
update:
  name: update
  description: Updates data on a specified endpoint using the provided information
    and RapidAPI key.
  parameters:
    type: object
    properties:
      info3:
        description: The third piece of information to be sent as a query parameter.
      info1:
        description: The first piece of information to be sent as a query parameter.
      info2:
        description: The second piece of information to be sent as a query parameter.
get_user_dialog_string:
  name: get_user_dialog_string
  description: Fetches the dialog string for a given user from the Waifu API.
  parameters:
    type: object
    properties:
      user_id:
        description: A unique identifier for the user.
get_novel_by_id:
  name: get_novel_by_id
  description: Fetches a novel's details from the Anime, Manga, and Novels API using
    a given novel ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the novel to fetch.
lunch_ingredient:
  name: lunch_ingredient
  description: Retrieve a random lunch recipe that contains a specific ingredient
    using the Recipe Finder API.
  parameters:
    type: object
    properties:
      ingredient:
        description: The name of the ingredient to include in the lunch recipe.
telegram_channel_info:
  name: telegram_channel_info
  description: Fetch realtime information about a public Telegram Channel.
  parameters:
    type: object
    properties:
      channel:
        description: The @username of the Telegram channel.
walk_transit_and_bike_score:
  name: walk_transit_and_bike_score
  description: Retrieve the Walk, Transit, and Bike Score for a property using its
    Zillow property ID (zpid).
  parameters:
    type: object
    properties:
      zpid:
        description: The Zillow property ID of the property. Defaults to 20485700.
get_profile_data:
  name: get_profile_data
  description: Retrieves profile data from the LinkedIn Profile Data API using a given
    username.
  parameters:
    type: object
    properties:
      username:
        description: The LinkedIn username for which to retrieve profile data.
v1_music_posts_music_id:
  name: v1_music_posts_music_id
  description: Fetches posts associated with a specific music ID from the Tokapi API.
  parameters:
    type: object
    properties:
      music_id:
        description: Unique identifier for the music whose posts are to be fetched.
      offset:
        description: The starting point for the set of results to be fetched. Used
          for paginated responses. Defaults to 0.
      count:
        description: The number of results to return in the response. Defaults to
          20.
tweet_detail_conversation:
  name: tweet_detail_conversation
  description: Fetches the details and conversation of a tweet using the provided
    tweet ID and optional cursor.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the tweet for which details and conversation need to
