cagr:
  name: cagr
  description: Calculates the Compound Annual Growth Rate (CAGR) of an investment.
  parameters:
    type: object
    properties:
      start_value:
        description: The initial value of the investment.
        type: number
      end_value:
        description: The final value of the investment.
        type: number
      years:
        description: The number of years between the initial and final values.
        type: integer
calculate_angle:
  name: calculate_angle
  description: Calculates the angle between the hour and minute hands of a clock.
  parameters:
    type: object
    properties:
      hour:
        description: The hour value (1-12).
        type: integer
      minute:
        description: The minute value (0-59).
        type: integer
independent_albums:
  name: independent_albums
  description: Retrieves the Independent Albums chart for a specified week from the
    Billboard API.
  parameters:
    type: object
    properties:
      week:
        description: The week for which to retrieve the chart, in the format 'YYYY-MM-DD'.
          If not provided, defaults to the previous week. If the provided date is
          not a Saturday, it will default to the preceding Saturday of that week.
getcompanies:
  name: getcompanies
  description: Fetches AI companies from a given page through the RapidAPI service.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve companies from.
        type: integer
fibonacci:
  name: fibonacci
  description: Calculates the nth Fibonacci number.
  parameters:
    type: object
    properties:
      n:
        description: The position of the Fibonacci number.
        type: integer
find_files:
  name: find_files
  description: Finds all files with a specific extension in a directory and its subdirectories.
  parameters:
    type: object
    properties:
      directory:
        description: The directory to search in.
      extension:
        description: The file extension to search for.
get_products_in_category:
  name: get_products_in_category
  description: Fetches products from a specific category using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      category:
        description: The category from which to retrieve products.
      limit:
        description: The maximum number of products to return.
        type: integer
      skip:
        description: The number of products to skip in the results.
        type: integer
get_an_answer_to_your_question:
  name: get_an_answer_to_your_question
  description: Fetches an answer to an Islamic question using the Islam&AI bot from
    the provided API.
  parameters:
    type: object
    properties:
      question:
        description: The Islamic question to be answered.
find_missing_ranges:
  name: find_missing_ranges
  description: Finds the missing ranges between lower and upper in a sorted list of
    integers.
  parameters:
    type: object
    properties:
      nums:
        description: The sorted list of integers.
      lower:
        description: The lower bound.
        type: integer
      upper:
        description: The upper bound.
        type: integer
remove_duplicates:
  name: remove_duplicates
  description: Removes duplicate elements from a list while preserving the order.
  parameters:
    type: object
    properties:
      lst:
        description: The input list.
find_majority_element:
  name: find_majority_element
  description: "Finds the majority element in a list, which appears more than \u230A\
    n / 2\u230B times."
  parameters:
    type: object
    properties:
      nums:
        description: The input list of integers.
get_cci_by_number:
  name: get_cci_by_number
  description: Fetches the CCI (Control Correlation Identifier) and its definition
    based on a 6-digit CCI identification number using the specified RapidAPI key.
  parameters:
    type: object
    properties:
      cci:
        description: A 6-digit CCI identification number.
search_agents:
  name: search_agents
  description: Search for real estate agents based on various criteria such as location,
    price range, language, etc.
  parameters:
    type: object
    properties:
      location:
        description: The city or zip code to search for agents.
      page:
        description: The page number of the results to retrieve. Defaults to 1.
      price:
        description: The price range of properties the agent deals with, formatted
          as 'minPrice_maxPrice'. Defaults to None.
      agentname:
        description: The name of the agent to search for. Defaults to None.
      lang:
        description: The language spoken by the agent. Defaults to None.
      photo:
        description: Whether to only show agents with a photo. 1 for yes, 0 for no.
          Defaults to None.
      rating:
        description: The rating of the agent, between 1 and 5. Defaults to None.
get_holidays:
  name: get_holidays
  description: Retrieve the list of holidays for a specified country and year using
    the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      country:
        description: The name of the country for which to retrieve holidays. Fuzzy
          search is supported.
      year:
        description: The year for which to retrieve holidays. Defaults to 2023.
user_timeline:
  name: user_timeline
  description: Fetches the tweet timeline for a specified user ID.
  parameters:
    type: object
    properties:
      user_id:
        description: The unique identifier of the Twitter user whose timeline is to
          be fetched.
        type: integer
      cursor:
        description: Cursor for pagination to fetch the next set of results. Defaults
          to 'HBaEgNKVxpvYtS0AAA=='.
      count:
        description: Number of tweets to retrieve. Defaults to 10.
years:
  name: years
  description: Fetch data from a car API based on various search parameters related
    to years, makes, models, and trims.
  parameters:
    type: object
    properties:
      make_id:
        description: The unique identifier for the make.
      make:
        description: The name of the car make.
      year:
        description: The model year of the car.
      json:
        description: A JSON-encoded string containing additional query conditions.
      make_model_id:
        description: The unique identifier for the make and model.
      model:
        description: The model name of the car.
      trim:
        description: The trim level of the car.
get_car_versions:
  name: get_car_versions
  description: Get the different versions of a car model using the toolbench RapidAPI.
  parameters:
    type: object
    properties:
      model:
        description: The specific model of the car.
      maker:
        description: The manufacturer of the car.
us_ca:
  name: us_ca
  description: Fetches current or historical gas price data for California.
  parameters:
    type: object
    properties:
      date:
        description: Specific date for historical data in YYYY-MM-DD format. If not
          provided, the current gas price data is returned. Defaults to None.
get_exercises:
  name: get_exercises
  description: Fetch a list of exercises from the MuscleWiki API with optional filters.
  parameters:
    type: object
    properties:
      force:
        description: Filter exercises by the type of force (e.g., push, pull). Defaults
          to None.
      name:
        description: Filter exercises by exercise name. Defaults to None.
      muscle:
        description: Filter exercises by targeted muscle group. Defaults to None.
      category:
        description: Filter exercises by exercise category. Defaults to None.
      difficulty:
        description: Filter exercises by difficulty level. Defaults to None.
get_1_3_analyse:
  name: get_1_3_analyse
  description: Analyse a given period between start and end dates for a specified
    country and configuration.
  parameters:
    type: object
    properties:
      start_date:
        description: The start date in YYYY-MM-DD format.
      end_date:
        description: The end date in YYYY-MM-DD format.
      country_code:
        description: The ISO 3166-1 alpha-2 country code (2 letters).
      end_time:
        description: The end time in 24-hour format (e.g., '18:15'). Defaults to '18:15'.
      start_time:
        description: The start time in 24-hour format (e.g., '09:14'). Defaults to
          '09:14'.
      profile_id:
        description: An identifier for a specific profile configuration. Defaults
          to None.
      configuration:
        description: The name of the preset configuration to be used. Defaults to
          'Federal holidays'.
feriados_dos_estados:
  name: feriados_dos_estados
  description: Retrieves the holidays for a given Brazilian state and year.
  parameters:
    type: object
    properties:
      estado:
        description: Abbreviation of the Brazilian state in uppercase letters.
      ano:
        description: Year for which to retrieve the holidays.
get_1_3_add_working_hours:
  name: get_1_3_add_working_hours
  description: Adds a specified amount of working hours to a given start date and
    time for a specified country.
  parameters:
    type: object
    properties:
      start_date:
        description: The start date in the format 'YYYY-MM-DD'.
      country_code:
        description: The ISO country code (2 letters) specifying the country.
      start_time:
        description: The start time in 24-hour format with leading zeros (e.g., '08:00').
      increment_time:
        description: The amount of working time to add or remove from the start date
          and time in 'H:i' format (e.g., '1:00' for one hour, '30:15' for thirty
          hours and fifteen minutes, or '-0:45' for a negative increment). Defaults
          to '1815'.
      configuration:
        description: The name of the preset configuration to be used (e.g., 'Federal
          holidays'). Defaults to 'Federal holidays'.
      profile_id:
        description: Optional profile identifier. Defaults to None.
find_longest_palindromic_substring:
  name: find_longest_palindromic_substring
  description: Finds the longest palindromic substring in a string.
  parameters:
    type: object
    properties:
      s:
        description: The input string.
is_rotation:
  name: is_rotation
  description: Checks if one string is a rotation of another string.
  parameters:
    type: object
    properties:
      str1:
        description: The first string.
      str2:
        description: The second string.
find_first_non_repeating_char:
  name: find_first_non_repeating_char
  description: Finds the first non-repeating character in a string.
  parameters:
    type: object
    properties:
      s:
        description: The input string.
v1_dictionary:
  name: v1_dictionary
  description: Fetches the definition of a given word using the API Ninjas Dictionary
    API.
  parameters:
    type: object
    properties:
      word:
        description: The word to look up.
translate:
  name: translate
  description: Translates text from one language to another using the Bidirectional
    Text Language Translation API. Languages should be specified using two-character
    ISO codes. If the source language is not provided, it will be auto-detected.
  parameters:
    type: object
    properties:
      text:
        description: The source text to be translated.
      lang_to:
        description: The ISO code of the target language.
      lang_from:
        description: The ISO code of the source language. If not provided, the source
          language will be auto-detected.
dictionary_examples_temporarily_unavailable:
  name: dictionary_examples_temporarily_unavailable
  description: Fetch dictionary examples for a given query and language using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      q:
        description: The query string to search for dictionary examples.
      language:
        description: The language code for the dictionary examples.
today:
  name: today
  description: Fetches the treasure of the day from the Uncovered Treasure API.
  parameters:
    type: object
    properties:
      callback:
        description: Optional JSONP callback for the request. Defaults to None.
memre_api_v1_readiness:
  name: memre_api_v1_readiness
  description: Get the readiness status of a user for a specified item from the memre
    API.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the user whose readiness status is being queried.
      item_id:
        description: The ID of the item for which the readiness status is being queried.
topic_topic:
  name: topic_topic
  description: Fetches entries from a specific topic using the Uncovered Treasure
    API.
  parameters:
    type: object
    properties:
      topic:
        description: The topic for which to fetch entries.
      callback:
        description: The optional JSONP callback function name.
onyomi_reading:
  name: onyomi_reading
  description: Fetches Kanji information based on the provided Onyomi (O-N) reading
    using the KanjiaLive API.
  parameters:
    type: object
    properties:
      'on':
        description: The Onyomi reading of the Kanji, provided in Katakana or romaji.
solve_quadratic:
  name: solve_quadratic
  description: Computes the roots of a quadratic equation given its coefficients.
  parameters:
    type: object
    properties:
      a:
        description: The coefficient of the quadratic term (x^2).
        type: number
      b:
        description: The coefficient of the linear term (x).
        type: number
      c:
        description: The constant term.
        type: number
potential_energy:
  name: potential_energy
  description: Calculates the electrostatic potential energy given the charge and
    voltage.
  parameters:
    type: object
    properties:
      charge:
        description: The electric charge.
        type: number
      voltage:
        description: The electric potential difference (voltage).
        type: number
dice_roll_probability:
  name: dice_roll_probability
  description: Calculates the probability of rolling a specific sum with a given number
    of dice, each having a certain number of faces.
  parameters:
    type: object
    properties:
      target_sum:
        description: The target sum to calculate the probability for.
        type: integer
      num_dice:
        description: The number of dice being rolled.
        type: integer
      num_faces:
        description: The number of faces on each die. Defaults to 6.
getpopulationbycountrycode:
  name: getpopulationbycountrycode
  description: Fetches the population data of a specified country using its ISO 3166-1
    alpha-3 country code.
  parameters:
    type: object
    properties:
      countrycode:
        description: The ISO 3166-1 alpha-3 code representing the country.
getstatsbyyear:
  name: getstatsbyyear
  description: Retrieves Trinidad & Tobago Covid-19 statistics by year.
  parameters:
    type: object
    properties:
      is_id:
        description: The year for which the Covid-19 statistics are being requested.
          Must be between 2020 and the current year.
search_exact_phrase_api:
  name: search_exact_phrase_api
  description: Searches the King James Version (KJV) of the Bible for the exact phrase
    supplied and returns the result.
  parameters:
    type: object
    properties:
      phrase:
        description: The exact phrase to search for in the KJV Bible.
generate_document_cover_letter:
  name: generate_document_cover_letter
  description: Generates a cover letter document based on the provided job description
    and personal information using the AI Resume Generator API.
  parameters:
    type: object
    properties:
      jobdescription:
        description: Description of the job position. Default is "Example Co. is looking
          for a Full Stack Web Developer to maintain and improve our custom web application.
          The solutions will require both frontend and backend skills. Our web application
          runs on a LEMP stack. LEMP stack experience is a bonus, but not required."
      degree:
        description: Your degree. Default is "Information Systems".
      university:
        description: Name of the university where you obtained your degree. Default
          is "Michigan State University".
      skills:
        description: List of relevant skills. Default is "Networking, Web Development".
      jobtitle:
        description: Title of the job you are applying for. Default is "Full Stack
          Web Developer".
searchjobs:
  name: searchjobs
  description: Fetches a list of job postings from Indeed using the specified search
    parameters.
  parameters:
    type: object
    properties:
      location:
        description: The location to search for jobs, can be a specific city or state
          within the USA.
      keyword:
        description: The search keyword, which could be a job title, skill, or any
          relevant search term.
      offset:
        description: The offset for pagination. Each page contains up to 15 job postings,
          and the offset should be incremented by 10 to paginate through the results.
        type: integer
format_date:
  name: format_date
  description: Converts a date string from one format to another.
  parameters:
    type: object
    properties:
      date:
        description: The date string to convert.
      input_format:
        description: The format of the input date string.
      output_format:
        description: The desired format of the output date string.
merge_dictionaries:
  name: merge_dictionaries
  description: Merges two dictionaries into a single dictionary.
  parameters:
    type: object
    properties:
      dict1:
        description: The first dictionary.
      dict2:
        description: The second dictionary.
getnews:
  name: getnews
  description: Fetches news articles for Diablo 4 from the specified page number using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      page:
        description: The page number of news articles to fetch.
        type: integer
choice_endpoint:
  name: choice_endpoint
  description: Sends a GET request to the Rock-Paper-Scissors API with the user's
    choice and returns the API's response.
  parameters:
    type: object
    properties:
      choice:
        description: The user's selection, either "rock", "paper", or "scissors".
merge_sorted_lists:
  name: merge_sorted_lists
  description: Merges two sorted lists into a single sorted list.
  parameters:
    type: object
    properties:
      list1:
        description: The first sorted list.
      list2:
        description: The second sorted list.
models_by_make:
  name: models_by_make
  description: Fetch all motorcycle models by the given make name using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      make:
        description: The name of the motorcycle manufacturer (e.g., 'BMW').
role_account:
  name: role_account
  description: Check if a given domain has a role-based email account using the Fast
    Email Verifier API.
  parameters:
    type: object
    properties:
      domain:
        description: The domain name to check for role-based email accounts.
get_by_tvdb_id:
  name: get_by_tvdb_id
  description: Fetches TV Show information from the MDB List API using the given TVDB
    ID.
  parameters:
    type: object
    properties:
      tv:
        description: The TVDB ID of the TV Show to fetch information for.
        type: integer
title_title:
  name: title_title
  description: Fetches all poems from Poetry DB that match the specified title.
  parameters:
    type: object
    properties:
      title:
        description: The title of the poem, or part of the title, to search for in
          the Poetry DB.
linecount_linecount:
  name: linecount_linecount
  description: Fetches all poems from the Poetry DB with a specific number of lines.
  parameters:
    type: object
    properties:
      linecount:
        description: The number of lines in each poem to be fetched.
        type: integer
get_genres:
  name: get_genres
  description: Fetch a list of radio station genres using the provided keyword and
    RapidAPI key.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to filter genres. Defaults to 'music'.
get_types:
  name: get_types
  description: Fetches available types for a specified period from the horoscopes
    API.
  parameters:
    type: object
    properties:
      period:
        description: The time period for which to retrieve the available types (e.g.,
          daily, weekly, monthly).
search:
  name: search
  description: Search for a Skype user by their name using the Skype Graph API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the Skype user to search for.
getrandompassword:
  name: getrandompassword
  description: Generates a random password string of the specified length using the
    Random Chunk API on RapidAPI.
  parameters:
    type: object
    properties:
      length:
        description: The desired length of the generated password. Defaults to 10.
products_detail:
  name: products_detail
  description: Fetches detailed information of a product from the API.
  parameters:
    type: object
    properties:
      country:
        description: The country code obtained from the /regions/list endpoint.
      lang:
        description: The language code obtained from the /regions/list endpoint.
      productcode:
        description: The value of the articles/code JSON object returned in the /products/list
          endpoint.
getlearningresources:
  name: getlearningresources
  description: Fetches artificial intelligence learning resources from the specified
    page using the given RapidAPI key.
  parameters:
    type: object
    properties:
      page:
        description: The page number of learning resources to fetch.
        type: integer
onpage_seo_analyze:
  name: onpage_seo_analyze
  description: Analyzes on-page SEO for a given website using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      website:
        description: The URL of the website to be analyzed.
validate_email:
  name: validate_email
  description: Validates an email address using the Send Sleuth Email Validation API.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be validated. Defaults to 'email@gmail.com'.
email_validate_regex:
  name: email_validate_regex
  description: Validates an email address using the Email Validator API.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be validated.
get_emails:
  name: get_emails
  description: Retrieve emails from a given URL using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      url:
        description: The URL from which to extract email addresses.
get_articles:
  name: get_articles
  description: Fetches articles from the climate news feed with given parameters for
    limit, excluded source, and specific source.
  parameters:
    type: object
    properties:
      limit:
        description: Number of articles to fetch. Default is 50.
      exclude:
        description: Source to exclude from the results. Default is 'The Guardian'.
      source:
        description: Source to fetch articles from. Default is 'Nasa Climate'.
is_valid_sudoku:
  name: is_valid_sudoku
  description: Checks if a 9x9 Sudoku board is valid.
  parameters:
    type: object
    properties:
      board:
        description: The Sudoku board represented as a 2D list of strings.
compound_interest:
  name: compound_interest
  description: Calculates the compound interest of an investment.
  parameters:
    type: object
    properties:
      principal:
        description: The initial investment amount.
        type: number
      rate:
        description: The annual interest rate expressed as a decimal.
        type: number
      time:
        description: The time in years for which the investment is held.
        type: number
      n:
        description: The number of times interest is compounded per year. Defaults
          to 1.
find_peak_element:
  name: find_peak_element
  description: Finds a peak element in a list of integers.
  parameters:
    type: object
    properties:
      nums:
        description: The list of integers.
history:
  name: history
  description: Fetches historical messages from a specified channel using the PubNub
    API.
  parameters:
    type: object
    properties:
      callback:
        description: JSONP callback name.
      limit:
        description: The limit on the number of messages to return.
      subscribe_key:
        description: The subscription key for authenticating with the PubNub service.
      channel:
        description: The name of the channel to retrieve messages from.
get_birthday_draws:
  name: get_birthday_draws
  description: Fetches lottery draw results for a given birthday date (in 'mm-dd'
    format) and returns related statistics and potentially a lucky number.
  parameters:
    type: object
    properties:
      date:
        description: The birthday date in 'mm-dd' format for which to fetch the lottery
          draw results.
get_ip_zipcode:
  name: get_ip_zipcode
  description: Retrieves the ZIP code of a given IP address using the ip-api.com API.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to locate.
property_details:
  name: property_details
  description: Retrieves property details from Zillow using the provided property
    ID and RapidAPI key.
  parameters:
    type: object
    properties:
      zpid:
        description: The unique Zillow property ID for which details are being requested.
displacement:
  name: displacement
  description: Calculates the displacement of an object given its initial velocity,
    acceleration, and time.
  parameters:
    type: object
    properties:
      initial_velocity:
        description: The initial velocity of the object.
        type: number
      acceleration:
        description: The acceleration of the object.
        type: number
      time:
        description: The time elapsed.
        type: number
calculate_investment_return:
  name: calculate_investment_return
  description: Calculates the return on investment based on the initial deposit amount,
    annual interest rate, and investment period.
  parameters:
    type: object
    properties:
      initial_amount:
        description: The initial deposit amount.
        type: integer
      interest_rate:
        description: The annual interest rate provided by the bank.
        type: number
      num_years:
        description: The number of years the money is invested.
        type: integer
draw_cards:
  name: draw_cards
  description: Shuffles a standard deck of 52 cards and draws a specified number of
    cards from the top.
  parameters:
    type: object
    properties:
      num_draw:
        description: The number of cards to be drawn. Defaults to 1.
prime_factorization:
  name: prime_factorization
  description: Computes the prime factorization of a positive integer.
  parameters:
    type: object
    properties:
      number:
        description: The positive integer to factorize.
        type: integer
is_power_of_two:
  name: is_power_of_two
  description: Checks if a number is a power of two.
  parameters:
    type: object
    properties:
      num:
        description: The number to check.
        type: integer
shazam_songs_list_similarities:
  name: shazam_songs_list_similarities
  description: Fetches similar songs using the Shazam API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the song for which similar songs are to be fetched.
      locale:
        description: The language code for the results. Defaults to 'en-US'.
get_song_related:
  name: get_song_related
  description: Fetches related content for a song using the YouTube Music API.
  parameters:
    type: object
    properties:
      browse_id:
        description: The unique identifier for the song being queried.
get_artist_s_albums:
  name: get_artist_s_albums
  description: Fetches and returns basic details about the albums of an artist from
    a given Spotify URL.
  parameters:
    type: object
    properties:
