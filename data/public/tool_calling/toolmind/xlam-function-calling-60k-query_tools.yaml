  description: Fetch broadband information for a given property listing.
  parameters:
    type: object
    properties:
      listing_id:
        description: The ID of the property listing for which broadband information
          is to be retrieved. This value is typically obtained from the `/properties/list`
          endpoint.
        type: integer
get_all_advisories:
  name: get_all_advisories
  description: Fetches all advisories providing timely information about current security
    issues, vulnerabilities, and exploits from CISA.gov.
  parameters:
    type: object
    properties:
      info:
        description: Flag to include additional information in the advisories. Defaults
          to None.
      limit:
        description: The number of advisories to return. Defaults to 2.
get_daily_domains:
  name: get_daily_domains
  description: Fetches the daily list of domains containing the specified keyword
    that were registered in the past day.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword used to search for newly registered domains. The
          keyword should not contain any domain name.
fish_api_fish_name:
  name: fish_api_fish_name
  description: Fetch information for a specific fish from the Fish API.
