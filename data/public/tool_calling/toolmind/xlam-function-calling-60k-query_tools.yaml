      limit:
        description: The number of items per page.
        type: integer
      attribute_1046:
        description: Filter by style, multiple values separated by comma.
      pricemin:
        description: Minimum price filter.
      country:
        description: Country code; default is 'US'.
      attribute_10147:
        description: Filter by leather/non-leather, multiple values separated by comma.
      sort:
        description: Sorting option, one of 'pricedesc', 'priceasc', or 'freshness';
          default is 'freshness'.
      q:
        description: Search query for products by name (do not use with categoryId).
      base_colour:
        description: Filter by color, multiple values separated by comma.
      range:
        description: Filter by sale/new season, multiple values separated by comma.
      attribute_1047:
        description: Filter by product type, multiple values separated by comma.
      currency:
        description: Currency code obtained from countries/list API; default is 'USD'.
      attribute_10155:
        description: Filter by range, multiple values separated by comma.
      pricemax:
        description: Maximum price filter.
      sizeschema:
        description: Size schema identifier obtained from countries/list API; default
          is 'US'.
      brand:
        description: Filter by brand, multiple values separated by comma.
      size:
        description: Filter by size, multiple values separated by comma.
      lang:
        description: Language code; default is 'en-US'.
biggest_cities:
