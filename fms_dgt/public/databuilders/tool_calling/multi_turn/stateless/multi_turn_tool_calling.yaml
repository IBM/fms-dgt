######################################################
#                   MANDATORY FIELDS
######################################################
name: tool_calling/multi_turn/stateless

######################################################
#                   RESERVED FIELDS
######################################################
blocks:
  # Language model connector
  - name: generator
    type: ollama
    model_id_or_path: openai/gpt-oss-20b
    #
    # these parameters have strong influence on success rate in each iteration...
    n: 8
    temperature: 1.0
    #
    max_tokens: 4096
    batch_size: 256
    call_limit: 256
