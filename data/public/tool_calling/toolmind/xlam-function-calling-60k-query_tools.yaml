  parameters:
    type: object
    properties:
      aweme_id:
        description: The ID of the TikTok video.
        type: integer
      cursor:
        description: The cursor for pagination to get the next page of comments. Defaults
          to 0.
      count:
        description: The number of comments to fetch. Maximum is 30. Defaults to 20.
get_car_data:
  name: get_car_data
  description: Fetch specifications, pictures, and average pricing of a car based
