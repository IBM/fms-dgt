currencies:
  name: currencies
  description: Retrieves a list of currencies from the Booking.com API.
  parameters:
    type: object
    properties:
      language_code:
        description: The language code to use for the response. Defaults to 'en-us'.
searchcountries:
  name: searchcountries
  description: Search for countries based on a keyword, with support for pagination
    and sorting.
  parameters:
    type: object
    properties:
      keyword:
        description: The search keyword to find matching countries. The search is
          case insensitive.
      page:
        description: The page number for pagination.
        type: integer
      limit:
        description: The maximum number of results to return per page.
        type: integer
      sortby:
        description: The sorting criteria in the format `field:order`, e.g., `name:desc`,
          `alpha-2:asc`. Use `asc` for ascending order and `desc` for descending order.
autocomplete_places:
  name: autocomplete_places
  description: Returns a list of places that match a given prefix and specified filter
    properties, useful for creating "search as you type" inputs.
  parameters:
    type: object
    properties:
      limit:
        description: Maximum number of places to return. Used with `skip` to paginate
          results. Defaults to 10, maximum is 100.
      skip:
        description: Number of places to ignore before beginning to return results.
          Used with `limit` to paginate results. Defaults to 0.
      language:
        description: Specifies a language (ISO 639-1) for the localized name of the
          place. If unavailable, `localizedName` property will be null.
      country:
        description: Filters places by their country ID. Multiple values can be specified,
          separated by commas (e.g., 'US,CA,MX'). Defaults to 'US,CA'.
      admindivision1:
        description: Filters places by their adminDivision1 ID. Multiple values can
          be specified, separated by commas (e.g., 'US.CA,US.DE').
      accuracyradiuskm:
        description: Maximum radius in kilometers from the specified coordinates (`latitude`
          and `longitude`) to filter places. Defaults to 100km.
      latitude:
        description: Latitude to filter places by their location. Ignored if `longitude`
          is not specified.
      admindivision2:
        description: Filters places by their adminDivision2 ID. Multiple values can
          be specified, separated by commas.
      q:
        description: Query string to find places whose names start with this prefix.
          Defaults to 'Sea'.
      longitude:
        description: Longitude to filter places by their location. Ignored if `latitude`
          is not specified.
match_margins:
  name: match_margins
  description: Fetches the average match margin statistics for a given team using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the team for which to fetch the match margin statistics.
        type: integer
api_assetinfo:
  name: api_assetinfo
  description: Fetches information about a single asset using the given symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol representing the asset to fetch information for.
get_reference_numbers_of_a_specific_brand:
  name: get_reference_numbers_of_a_specific_brand
  description: Fetches the reference numbers for a specified brand using the WatchSignals
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier for the specific brand.
ufc_fight_night_rozenstruik_vs_almeida_may_13_2023:
  name: ufc_fight_night_rozenstruik_vs_almeida_may_13_2023
  description: 'Fetch details for UFC Fight Night: Rozenstruik vs. Almeida held on
    May 13, 2023.'
  parameters:
    type: object
    properties:
      offset:
        description: The number of records to skip before starting to return results.
      limit:
        description: The maximum number of records to return.
get_a_specific_item_by_id:
  name: get_a_specific_item_by_id
  description: Fetches a specific item from an API using its id.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the item to fetch.
get_all:
  name: get_all
  description: Retrieves a list of anime based on the specified search, sort, type,
    and genre criteria from the given API.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve.
      size:
        description: The number of items per page.
      types:
        description: Comma-separated list of anime types.
      genres:
        description: Comma-separated list of genres. Defaults to 'Fantasy,Drama'.
      sortby:
        description: The parameter to sort by, either 'ranking' or 'title'. Defaults
          to 'ranking'.
      sortorder:
        description: The sort order, either 'asc' or 'desc'. Defaults to 'asc'.
      search:
        description: The title or alternate title to search for. Search will ignore
          sorting. Defaults to 'Fullmetal'.
additional_title_details:
  name: additional_title_details
  description: Fetch additional details for a movie or TV show based on its IMDb ID.
  parameters:
    type: object
    properties:
      imdbid:
        description: The IMDb ID of the movie or TV show.
related:
  name: related
  description: Fetch related shows for a given show identifier using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      show_slug:
        description: The unique identifier or slug of the show for which related shows
          are to be fetched.
search_team:
  name: search_team
  description: Searches for a team using the provided team name and returns the response
    from the API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the team to search for.
qr_code_gen:
  name: qr_code_gen
  description: Generates a QR code for the given URL using the Simple Cheap QR Code
    Generator API.
  parameters:
    type: object
    properties:
      url:
        description: The URL for which to generate the QR code.
news_sentiment_data:
  name: news_sentiment_data
  description: Fetches news articles and their sentiment scores for a given stock
    ticker using the RapidAPI Stock Sentiment API.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which news articles and sentiment
          scores are to be retrieved.
eventgames:
  name: eventgames
  description: Fetches games associated with a specific E-Sports event using the event
    ID and RapidAPI key.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the E-Sports event for which to retrieve game details.
        type: integer
get_artist:
  name: get_artist
  description: Gets artist information from the Spotify Data API using the artist's
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The Spotify ID of the artist.
get_product_reviews_all_countries:
  name: get_product_reviews_all_countries
  description: Fetches product reviews for a specific product from different countries
    using the ASIN code.
  parameters:
    type: object
    properties:
      asin:
        description: The Amazon Standard Identification Number (ASIN) of the product.
      languagecode:
        description: The language code for the reviews. Defaults to 'EN'.
      countrycode:
        description: The country code for the reviews. Defaults to 'US'.
get_models_by_make_id:
  name: get_models_by_make_id
  description: Fetches a list of all car models for a given car make ID using the
    RapidAPI Car Specs API.
  parameters:
    type: object
    properties:
      makeid:
        description: The ID of the car make for which to retrieve the models.
        type: integer
url_analysis:
  name: url_analysis
  description: Analyzes the given URL using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      url:
        description: The URL to be analyzed.
newspaper_company_filter_for_news:
  name: newspaper_company_filter_for_news
  description: Fetches news articles from a specified newspaper company using RapidAPI.
  parameters:
    type: object
    properties:
      newspaperid:
        description: The ID of the newspaper company to filter news from.
v1_search_free:
  name: v1_search_free
  description: Search articles using the Newscatcher API.
  parameters:
    type: object
    properties:
      q:
        description: String to search for. Has to be URL-encoded.
      media:
        description: 'If set to ''True'', adds two more variables to the output: `media`
          and `media_content`. `media` contains the main image published with the
          article, and `media_content` is a comma-separated string of all images used
          in the article.'
      page:
        description: The number of the page to scroll through the results. Defaults
          to 1.
      ranked_only:
        description: Limits the search to sources within the top 1 million online
          websites. Defaults to 'True'. Set to 'False' to include unranked sources.
      page_size:
        description: Specifies the number of articles to return per page. Defaults
          to 50, with a maximum of 100.
      lang:
        description: Specifies the language of the search. Defaults to 'en'. Allowed
          values include 'af', 'ar', 'bg', 'bn', 'ca', 'cn', 'cs', 'cy', 'da', 'de',
          'el', 'en', 'es', 'et', 'fa', 'fi', 'fr', 'gu', 'he', 'hi', 'hr', 'hu',
          'id', 'it', 'ja', 'kn', 'ko', 'lt', 'lv', 'mk', 'ml', 'mr', 'ne', 'nl',
          'no', 'pa', 'pl', 'pt', 'ro', 'ru', 'sk', 'sl', 'so', 'sq', 'sv', 'sw',
          'ta', 'te', 'th', 'tl', 'tr', 'tw', 'uk', 'ur', 'vi'.
captcha_generator:
  name: captcha_generator
  description: Generates a CAPTCHA image with optional customizations and returns
    the resulting data.
  parameters:
    type: object
    properties:
      fontname:
        description: The font to be used for the CAPTCHA text. Supported font names
          are 'sora', 'noto-sans', and 'ubuntu'. Default is 'sora'.
      noise_number:
        description: The amount of noise to include in the CAPTCHA image. Default
          is 10.
      text:
        description: Custom text to be used as the CAPTCHA solution. If not provided,
          a random text solution will be generated.
nationalize:
  name: nationalize
  description: Fetches the nationality of the provided name using the Genderize-Nationalize
    API.
  parameters:
    type: object
    properties:
      name:
        description: The name for which to determine the nationality.
sentence:
  name: sentence
  description: Generates a single random sentence with options to specify various
    constraints on word lengths and counts using the Jibber Jabber API.
  parameters:
    type: object
    properties:
      minimumwordlength:
        description: Minimum length of each word in the sentence.
      numberofwords:
        description: Exact number of words in the sentence.
      maximumwordlength:
        description: Maximum length of each word in the sentence.
      wordlength:
        description: Minimum length of each word in the sentence.
      minimumnumberofwords:
        description: Minimum number of words in the sentence.
      maximumnumberofwords:
        description: Maximum number of words in the sentence.
get_search_suggestions:
  name: get_search_suggestions
  description: Fetches search suggestions for cryptocurrencies, exchanges, and markets
    based on a query.
  parameters:
    type: object
    properties:
      query:
        description: The search term to look for. Can be a currency name, symbol,
          exchange, or market.
      referencecurrencyuuid:
        description: UUID of the reference currency for price calculations. Defaults
          to 'yhjMzLPhuIDl' (US Dollar).
evaluate:
  name: evaluate
  description: Evaluates a mathematical expression using the given variables and their
    values through the RapidAPI service.
  parameters:
    type: object
    properties:
      variables:
        description: A comma-separated string listing the variables used in the expression.
      values:
        description: A comma-separated string listing the values corresponding to
          the variables.
      expression:
        description: The mathematical expression to be evaluated.
keyword_search_with_ranking:
  name: keyword_search_with_ranking
  description: Perform a keyword search at a specific coordinate (latitude/longitude)
    to find businesses and rank a specific business at that location. The ranking
    data can be determined by the business place ID or business name.
  parameters:
    type: object
    properties:
      query:
        description: The Google Place ID of the business or the business name to match
          in results. Use the `match_type` parameter to specify the choice.
      lng:
        description: The longitude value of the grid center coordinate point.
        type: integer
      match_value:
        description: The keyword or search query.
      lat:
        description: The latitude value of the grid center coordinate point.
        type: integer
      zoom:
        description: The Google Maps zoom level to use for the search on each grid
          point. Allowed values are 0-18. Default is 13.
      match_type:
        description: The type of match to perform for ranking. Allowed values are
          'place_id' or 'name'. Default is 'place_id'.
get_humidty:
  name: get_humidty
  description: Fetches the humidity data for a specified city using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city to get the humidity information for.
get_train_schedule:
  name: get_train_schedule
  description: Fetches the train schedule for a given train number using the IRCTC
    API.
  parameters:
    type: object
    properties:
      trainno:
        description: The train number for which the schedule is to be fetched.
bus_detours:
  name: bus_detours
  description: Fetches the bus detours from the SEPTA API based on the specified route
    number.
  parameters:
    type: object
    properties:
      req1:
        description: The route number for which to retrieve detour information. Defaults
          to 2.
listallcountries:
  name: listallcountries
  description: Retrieves a list of all countries from the API with optional pagination
    and sorting.
  parameters:
    type: object
    properties:
      page:
        description: Page number to retrieve. Defaults to 1.
      sortby:
        description: Sorting criteria in the format `field:order`, e.g., `name:asc`
          or `name:desc`. Defaults to 'name:asc'.
      limit:
        description: Maximum number of results per page. Defaults to 200.
usuarios:
  name: usuarios
  description: Fetches user data from the RapidAPI Pizza Allapala service.
  parameters:
    type: object
    properties:
      is_id:
        description: The user ID to fetch data for. Defaults to None.
footballersbyname:
  name: footballersbyname
  description: Returns a list of footballers that match the given name using the Premier
    League Stats API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the footballer to search for.
topic_headlines:
  name: topic_headlines
  description: Fetches the latest news headlines for a specified topic.
  parameters:
    type: object
    properties:
      topic:
        description: 'The topic for which to get news headlines. Available topics
          include:'
      lang:
        description: The language for the results, specified as a 2-letter language
          code (ISO 639-1 alpha-2). Default is 'en'.
      country:
        description: The country code for filtering the results (ISO 3166-1 alpha-2).
          Default is 'US'.
get_playlist_metadata:
  name: get_playlist_metadata
  description: Fetches full details of a Spotify playlist using RapidAPI.
  parameters:
    type: object
    properties:
      playlistid:
        description: The ID of the Spotify playlist.
      limit:
        description: The maximum number of items to return. Defaults to None.
      offset:
        description: The number of items to skip before starting to return results.
          Defaults to None.
recent_trades_list:
  name: recent_trades_list
  description: Fetches the recent trades for a given cryptocurrency symbol from the
    RapidAPI crypto markets service.
  parameters:
    type: object
    properties:
      symbol:
        description: The cryptocurrency symbol (e.g., 'BTC' for Bitcoin) for which
          recent trades are to be fetched.
      limit:
        description: The number of recent trades to retrieve. Default is 500; maximum
          is 1000.
specific_giveaway_details:
  name: specific_giveaway_details
  description: Fetch details from a specific giveaway using the giveaway ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the giveaway to fetch details for.
financial_income_statement:
  name: financial_income_statement
  description: Fetches the financial income statement for a given company ticker symbol,
    formatted by the specified style and frequency.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the company to retrieve financial information
          for.
      formstyle:
        description: The format style of the returned data. Defaults to 'dataframe'.
      freq:
        description: The frequency of the financial data, either 'A' for annual or
          'Q' for quarterly. Defaults to 'Q'.
get_related_video_with_keywords:
  name: get_related_video_with_keywords
  description: Fetches a list of related videos based on the provided keywords from
    the TikTok API.
  parameters:
    type: object
    properties:
      keywords:
        description: The search keywords to find related videos.
      count:
        description: The number of videos to return. Defaults to '10'.
      publish_time:
        description: Filter videos by their publish time. Defaults to 0.
      cursor:
        description: The cursor for pagination. Defaults to '0'.
      region:
        description: The region to filter videos. Refer to the TikTok region list
          for details. Defaults to 'US'.
      sort_type:
        description: Sort type for the videos. Defaults to 0.
group_profile:
  name: group_profile
  description: Fetches the profile information of a Steam community group using the
    provided group ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the Steam community group.
reviews_list_best:
  name: reviews_list_best
  description: Fetches the best reviews for a specific restaurant from the API.
  parameters:
    type: object
    properties:
      id_restaurant:
        description: The unique identifier of the restaurant.
        type: integer
      locale:
        description: The language code for the reviews. Defaults to 'en_US'.
get_sign_prediction_for_today_by_name:
  name: get_sign_prediction_for_today_by_name
  description: Fetches the zodiac sign prediction for today based on the provided
    sign name using the RapidAPI service.
  parameters:
    type: object
    properties:
      name:
        description: The name of the zodiac sign for which the prediction is requested.
aliexpress_item_search_2:
  name: aliexpress_item_search_2
  description: Searches for items on AliExpress with various filtering options and
    returns the results.
  parameters:
    type: object
    properties:
      endprice:
        description: Maximum price of the items to be searched.
      sort:
        description: Sorting option for the search results.
      brandid:
        description: Brand ID(s). Multiple IDs can be separated with a comma.
      page:
        description: Page number for pagination. Defaults to 1.
      attr:
        description: Attribute(s) for filtering results. Multiple values are separated
          with semicolons.
      startprice:
        description: Minimum price of the items to be searched.
      locale:
        description: Locale for displaying titles and other content in the selected
          language.
      switches:
        description: Additional filter switches. Multiple values can be separated
          with a comma.
      catid:
        description: Category ID(s). Multiple IDs can be separated with a comma.
      q:
        description: Search query. Defaults to 'iphone'.
      loc:
        description: Location for filtering the search results.
      currency:
        description: Currency for displaying the product prices.
      region:
        description: Region for getting accurate shipping costs and promotions.
product:
  name: product
  description: Fetch up-to-date information for a specific product from the IKEA API.
  parameters:
    type: object
    properties:
      countrycode:
        description: The country code where the product is available.
      productid:
        description: The unique identifier for the product.
      languagecode:
        description: The language code for the response. Default is 'en'.
      store:
        description: The specific store identifier.
leagues:
  name: leagues
  description: Retrieves a list of sports leagues using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      lang:
        description: Language code for the response (e.g., 'en' for English).
      sp:
        description: Sport identifier.
        type: integer
list_movies:
  name: list_movies
  description: List and search through all the available movies with various sorting,
    filtering, and ordering options.
  parameters:
    type: object
    properties:
      genre:
        description: Used to filter by a given genre (default is 'all'). See http://www.imdb.com/genre/
          for a full list.
      order_by:
        description: Orders the results by either 'asc' (Ascending) or 'desc' (Descending)
          order (default is 'desc').
      with_rt_ratings:
        description: If True, includes Rotten Tomatoes ratings in the results (default
          is None).
      sort_by:
        description: Sorts the results by the specified value, such as 'date_added'
          (default is 'date_added').
      page:
        description: The page number to retrieve, useful for pagination (default is
          1).
        type: integer
      query_term:
        description: 'Used for movie search, matching on: Movie Title, IMDB Code,
          Actor Name/IMDb, or Director Name/IMDb Code (default is ''0'').'
      quality:
        description: Used to filter by a given quality, such as '720p', '1080p', etc.
          (default is 'all').
      minimum_rating:
        description: Filters movies by a given minimum IMDb rating (default is 0).
        type: integer
      limit:
        description: The limit of results per page (default is 20).
        type: integer
trainers_win_rate:
  name: trainers_win_rate
  description: Fetches trainers' win rate statistics from the past specified number
    of days.
  parameters:
    type: object
    properties:
      last_days:
        description: The number of past days to consider for the statistics. Defaults
          to 7 days if not specified.
        type: integer
france_songs:
  name: france_songs
  description: Fetch the France Songs chart information for a given date and range.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve the chart, formatted as YYYY-MM-DD.
      range:
        description: The range of positions to retrieve from the chart (e.g., '1-10'
          for top 10 songs).
vin_decoder_standard:
  name: vin_decoder_standard
  description: Decodes the given Vehicle Identification Number (VIN) using the VIN
    Decoder API.
  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number to decode. It must be 17 characters
          long.
get_year_fact:
  name: get_year_fact
  description: Fetch a fact about a given year from the Numbers API.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to retrieve the fact.
      fragment:
        description: If 'True', returns the fact as a fragment that can be easily
          included as part of a larger sentence. Defaults to 'True'.
      json:
        description: If 'True', returns the result in JSON format instead of plaintext.
          Defaults to 'True'.
nearby_superchargers:
  name: nearby_superchargers
  description: Fetches nearby Tesla superchargers within a specified radius around
    given coordinates.
  parameters:
    type: object
    properties:
      lng:
        description: Longitude of the center point to search for superchargers.
        type: integer
      lat:
        description: Latitude of the center point to search for superchargers.
        type: integer
      radius:
        description: Radius in kilometers to search within, default is 20 km.
geogrid_seach_with_ranking:
  name: geogrid_seach_with_ranking
  description: Perform a full grid search and retrieve the ranking of a business at
    every coordinate point in the grid. The grid cells in the results are ordered
    left-to-right, then top-to-bottom. Additional ranking data for the business is
    provided based on either place ID or business name.
  parameters:
    type: object
    properties:
      match_value:
        description: The search query or keyword.
      query:
        description: The Google Place ID of the business or the business name to match
          in results. Use the `match_type` parameter to specify the choice.
      lng:
        description: Longitude value of the grid center coordinate point.
        type: integer
      lat:
        description: Latitude value of the grid center coordinate point.
        type: integer
      zoom:
        description: Google Maps zoom level to use for searching each grid point.
          Default is 13.
      match_type:
        description: The type of match to perform for ranking. Either 'place_id' or
          'name'. Default is 'place_id'.
      distance_unit:
        description: The unit of measurement for distance. Default is 'km'.
      width:
        description: The width of the grid in location points for non-square grid
          searches. Default is 5.
      height:
        description: The height of the grid in location points for non-square grid
          searches. Default is 5.
      grid_size:
        description: The size of the grid (e.g., 3x3, 5x5). Default is 5.
      distance:
        description: The distance between coordinate points on the same row/column
          in the grid. Default is 1.
dna2aminoacid:
  name: dna2aminoacid
  description: Transforms a DNA sequence into a sequence of Amino Acids using the
    RapidAPI dna2protein service.
  parameters:
    type: object
    properties:
      dna:
        description: The DNA sequence to be transformed into Amino Acids.
agent_s_active_listings:
  name: agent_s_active_listings
  description: Fetches the active listings for a given agent from Zillow's API.
  parameters:
    type: object
    properties:
      zuid:
        description: The Zillow unique identifier for the agent.
      page:
        description: The page number of the results to retrieve. Defaults to None.
getmanufacturervalues:
  name: getmanufacturervalues
  description: Returns a set of all manufacturer names filtered by the specified query
    parameters.
  parameters:
    type: object
    properties:
      format:
        description: Specifies the output type. Allowed values are 'CSV', 'HTML',
          'XML', 'JSON'.
      collection:
        description: A label used to name a set of images collected for a specific
          trial or other reason. Assigned during the data curation process.
      bodypartexamined:
        description: Standard DICOM definition (0018x0015) specifying the body part
          that was examined.
      modality:
        description: Standard DICOM definition (0008x0060) specifying the imaging
          modality.
detailed_cake_recipe_by_id:
  name: detailed_cake_recipe_by_id
  description: This function retrieves a detailed cake recipe based on a given recipe
    ID from the RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the cake recipe to retrieve.
mediterranean_ingredient:
  name: mediterranean_ingredient
  description: Retrieve a random Mediterranean recipe containing a specific ingredient.
  parameters:
    type: object
    properties:
      ingredient:
