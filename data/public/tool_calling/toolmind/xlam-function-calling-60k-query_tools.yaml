  parameters:
    type: object
    properties:
      title:
        description: The title of the anime for which to fetch quotes. Defaults to
          'Fairy Tail'.
      page:
        description: The page number for pagination. Defaults to '1'.
statessearchinradius:
  name: statessearchinradius
  description: Fetch the boundaries of U.S. states within a given radius from a specified
    central point (latitude and longitude) in GeoJSON format.
  parameters:
    type: object
    properties:
      latitude:
        description: Latitude of the central point around which to search for state
          boundaries.
        type: integer
      radius:
        description: Radius in miles around the central point within which to search.
          Minimum value is 1 mile, and maximum value is 50 miles.
        type: integer
      longitude:
        description: Longitude of the central point around which to search for state
          boundaries.
        type: integer
fur_color:
  name: fur_color
  description: Fetches a list of all dogs that have the specified fur color using
    the DogBreedDB API.
  parameters:
    type: object
    properties:
      furcolor_icontains:
        description: The fur color to search for in the dog breed database.
team_image:
  name: team_image
  description: Fetches the image of a soccer team using the given team ID and RapidAPI
    key.
  parameters:
    type: object
    properties:
      team_id:
        description: The unique identifier of the soccer team whose image is to be
          fetched.
        type: integer
get_imbuements_for_lich_shroud_death_protection:
  name: get_imbuements_for_lich_shroud_death_protection
  description: Fetches all imbuements for the Lich Shroud (Death Protection) from
    the Tibia items API.
  parameters:
    type: object
    properties:
      world:
        description: The name of the Tibia world for which to fetch the imbuements.
calendars_get_earning_calendar:
  name: calendars_get_earning_calendar
  description: Fetches the earnings calendar for a specified date range and stock
    exchange.
  parameters:
    type: object
    properties:
      is_from:
        description: The starting epoch timestamp in seconds (e.g., 1661187600).
        type: integer
      to:
        description: The ending epoch timestamp in seconds (e.g., 1661619600).
        type: integer
      lang:
        description: The language code for the response (default is 'en').
      screenername:
        description: The screener name value returned in the /countries/list endpoint
          (default is 'america').
job_details:
  name: job_details
  description: Fetch detailed information about a specific job using its Job Id. Optionally,
    include additional publisher details such as the website URL and favicon.
  parameters:
    type: object
    properties:
      job_id:
        description: The Job Id for which to fetch details. Multiple Job Ids can be
          provided separated by commas.
      extended_publisher_details:
        description: If set to True, includes additional publisher details such as
          the website URL and favicon. Defaults to None.
originals_episodes_get_info:
  name: originals_episodes_get_info
  description: Fetch information and photo links for a specific episode of a Webtoon
    Original.
  parameters:
    type: object
    properties:
      episodeno:
        description: The episode number. It corresponds to the `episodeNo` field returned
          by the `/originals/episodes/list` endpoint.
        type: integer
      titleno:
        description: The title number. It corresponds to the `titleNo` field returned
          by the `/originals/titles/list` or `/originals/titles/list-by-rank` endpoint.
        type: integer
      language:
        description: The language code for the response. Defaults to 'en'. Accepted
          values are 'en', 'zh-hant', 'de', 'fr', 'es', 'th', 'id'.
maxindex:
  name: maxindex
  description: Fetches the index of the highest value over a specified period (MAXINDEX)
    using the Twelve Data API.
  parameters:
    type: object
    properties:
      interval:
        description: 'Interval between two consecutive points in the time series.
          Supported values: `1min`, `5min`, `15min`, `30min`, `45min`, `1h`, `2h`,
          `4h`, `1day`, `1week`, `1month`.'
      symbol:
        description: Instrument symbol, which can be any equity, index, ETF, forex,
          or cryptocurrency (e.g., `AAPL`, `EUR/USD`, `ETH/BTC`).
      time_period:
        description: The number of data points to consider. Defaults to 9.
      series_type:
        description: 'Type of series data to retrieve. Supported values: `open`, `high`,
          `low`, `close`. Defaults to ''close''.'
      outputsize:
        description: The amount of data to retrieve. Default is 30 if no date parameters
          are set, otherwise it is set to maximum.
      format:
        description: 'The format to receive the data in. Supported values: `CSV`,
          `JSON`. Defaults to ''json''.'
us_dc:
  name: us_dc
  description: Fetches current or historical gas price data for Washington D.C.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch historical gas price data. Defaults
          to None.
comment_list:
  name: comment_list
  description: Fetches a list of comments for a specified TikTok video using the given
