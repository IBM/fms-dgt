calculate:
  name: calculate
  description: Calculate the result of a mathematical expression.
  parameters:
    type: object
    properties:
      expression:
        type: string
        description: The mathematical expression to calculate, such as '2 + 2'. The
          expression can contain numbers, operators (+, -, *, /), parentheses, and
          spaces.
    required:
    - expression
cancel_pending_order:
  name: cancel_pending_order
  description: Cancel a pending order. If the order is already processed or delivered,
    it cannot be cancelled. The agent needs to explain the cancellation detail and
    ask for explicit user confirmation (yes/no) to proceed. If the user confirms,
    the order status will be changed to 'cancelled' and the payment will be refunded.
    The refund will be added to the user's gift card balance immediately if the payment
    was made using a gift card, otherwise the refund would take 5-7 business days
    to process. The function returns the order details after the cancellation.
  parameters:
    type: object
    properties:
      order_id:
        type: string
        description: The order id, such as '#W0000000'. Be careful there is a '#'
          symbol at the beginning of the order id.
      reason:
        type: string
        enum:
        - no longer needed
        - ordered by mistake
        description: The reason for cancellation, which should be either 'no longer
          needed' or 'ordered by mistake'.
    required:
    - order_id
    - reason
exchange_delivered_order_items:
  name: exchange_delivered_order_items
  description: Exchange items in a delivered order to new items of the same product
    type. For a delivered order, return or exchange can be only done once by the agent.
    The agent needs to explain the exchange detail and ask for explicit user confirmation
    (yes/no) to proceed.
  parameters:
    type: object
    properties:
      order_id:
        type: string
        description: The order id, such as '#W0000000'. Be careful there is a '#'
          symbol at the beginning of the order id.
      item_ids:
        type: array
        items:
          type: string
        description: The item ids to be exchanged, each such as '1008292230'. There
          could be duplicate items in the list.
      new_item_ids:
        type: array
        items:
          type: string
        description: The item ids to be exchanged for, each such as '1008292230'.
          There could be duplicate items in the list. Each new item id should match
          the item id in the same position and be of the same product.
      payment_method_id:
        type: string
        description: The payment method id to pay or receive refund for the item price
          difference, such as 'gift_card_0000000' or 'credit_card_0000000'. These
          can be looked up from the user or order details.
    required:
    - order_id
    - item_ids
    - new_item_ids
    - payment_method_id
find_user_id_by_email:
  name: find_user_id_by_email
  description: Find user id by email. If the user is not found, the function will
    return an error message.
  parameters:
    type: object
    properties:
      email:
        type: string
        description: The email of the user, such as 'something@example.com'.
    required:
    - email
find_user_id_by_name_zip:
  name: find_user_id_by_name_zip
  description: Find user id by first name, last name, and zip code. If the user is
    not found, the function will return an error message. By default, find user id
    by email, and only call this function if the user is not found by email or cannot
    remember email.
  parameters:
    type: object
    properties:
      first_name:
        type: string
        description: The first name of the customer, such as 'John'.
      last_name:
        type: string
        description: The last name of the customer, such as 'Doe'.
      zip:
        type: string
        description: The zip code of the customer, such as '12345'.
    required:
    - first_name
    - last_name
    - zip
get_order_details:
  name: get_order_details
  description: Get the status and details of an order.
  parameters:
    type: object
    properties:
      order_id:
        type: string
        description: The order id, such as '#W0000000'. Be careful there is a '#'
          symbol at the beginning of the order id.
    required:
    - order_id
get_product_details:
  name: get_product_details
  description: Get the inventory details of a product.
  parameters:
    type: object
    properties:
      product_id:
        type: string
        description: The product id, such as '6086499569'. Be careful the product
          id is different from the item id.
    required:
    - product_id
get_user_details:
  name: get_user_details
  description: Get the details of an user.
  parameters:
    type: object
    properties:
      user_id:
        type: string
        description: The user id, such as 'sara_doe_496'.
    required:
    - user_id
list_all_product_types:
  name: list_all_product_types
  description: List the name and product id of all product types. Each product type
    has a variety of different items with unique item ids and options. There are only
    50 product types in the store.
  parameters:
    type: object
    properties: {}
modify_pending_order_address:
  name: modify_pending_order_address
  description: Modify the shipping address of a pending order. The agent needs to
    explain the modification detail and ask for explicit user confirmation (yes/no)
    to proceed.
  parameters:
    type: object
    properties:
      order_id:
        type: string
        description: The order id, such as '#W0000000'. Be careful there is a '#'
          symbol at the beginning of the order id.
      address1:
        type: string
        description: The first line of the address, such as '123 Main St'.
      address2:
        type: string
        description: The second line of the address, such as 'Apt 1' or ''.
      city:
        type: string
        description: The city, such as 'San Francisco'.
      state:
        type: string
        description: The province, such as 'CA'.
      country:
        type: string
        description: The country, such as 'USA'.
      zip:
        type: string
        description: The zip code, such as '12345'.
    required:
    - order_id
    - address1
    - address2
    - city
    - state
    - country
    - zip
modify_pending_order_items:
  name: modify_pending_order_items
  description: Modify items in a pending order to new items of the same product type.
    For a pending order, this function can only be called once. The agent needs to
    explain the exchange detail and ask for explicit user confirmation (yes/no) to
    proceed.
  parameters:
    type: object
    properties:
      order_id:
        type: string
        description: The order id, such as '#W0000000'. Be careful there is a '#'
          symbol at the beginning of the order id.
      item_ids:
        type: array
        items:
          type: string
        description: The item ids to be modified, each such as '1008292230'. There
          could be duplicate items in the list.
      new_item_ids:
        type: array
        items:
          type: string
        description: The item ids to be modified for, each such as '1008292230'. There
          could be duplicate items in the list. Each new item id should match the
          item id in the same position and be of the same product.
      payment_method_id:
        type: string
        description: The payment method id to pay or receive refund for the item price
          difference, such as 'gift_card_0000000' or 'credit_card_0000000'. These
          can be looked up from the user or order details.
    required:
    - order_id
    - item_ids
    - new_item_ids
    - payment_method_id
modify_pending_order_payment:
  name: modify_pending_order_payment
  description: Modify the payment method of a pending order. The agent needs to explain
    the modification detail and ask for explicit user confirmation (yes/no) to proceed.
  parameters:
    type: object
    properties:
      order_id:
        type: string
        description: The order id, such as '#W0000000'. Be careful there is a '#'
          symbol at the beginning of the order id.
      payment_method_id:
        type: string
        description: The payment method id to pay or receive refund for the item price
          difference, such as 'gift_card_0000000' or 'credit_card_0000000'. These
          can be looked up from the user or order details.
    required:
    - order_id
    - payment_method_id
modify_user_address:
  name: modify_user_address
  description: Modify the default address of an user. The agent needs to explain the
    modification detail and ask for explicit user confirmation (yes/no) to proceed.
  parameters:
    type: object
    properties:
      user_id:
        type: string
        description: The user id, such as 'sara_doe_496'.
      address1:
        type: string
        description: The first line of the address, such as '123 Main St'.
      address2:
        type: string
        description: The second line of the address, such as 'Apt 1' or ''.
      city:
        type: string
        description: The city, such as 'San Francisco'.
      state:
        type: string
        description: The province, such as 'CA'.
      country:
        type: string
        description: The country, such as 'USA'.
      zip:
        type: string
        description: The zip code, such as '12345'.
    required:
    - user_id
    - address1
    - address2
    - city
    - state
    - country
    - zip
return_delivered_order_items:
  name: return_delivered_order_items
  description: Return some items of a delivered order. The order status will be changed
    to 'return requested'. The agent needs to explain the return detail and ask for
    explicit user confirmation (yes/no) to proceed. The user will receive follow-up
    email for how and where to return the item.
  parameters:
    type: object
    properties:
      order_id:
        type: string
        description: The order id, such as '#W0000000'. Be careful there is a '#'
          symbol at the beginning of the order id.
      item_ids:
        type: array
        items:
          type: string
        description: The item ids to be returned, each such as '1008292230'. There
          could be duplicate items in the list.
      payment_method_id:
        type: string
        description: The payment method id to pay or receive refund for the item price
          difference, such as 'gift_card_0000000' or 'credit_card_0000000'. These
          can be looked up from the user or order details.
    required:
    - order_id
    - item_ids
    - payment_method_id
think:
  name: think
  description: Use this tool to think and perform reasoning before calling an API.
    It will not obtain new information or change the database, but just append the
    thought to the log.
  parameters:
    type: object
    properties:
      thought:
        type: string
        description: The step by step thought process.
    required:
    - thought
transfer_to_human_agents:
  name: transfer_to_human_agents
  description: Transfer the user to a human agent, with a summary of the user's issue.
    Only transfer if the user explicitly asks for a human agent, or if the user's
    issue cannot be resolved by the agent with the available tools.
  parameters:
    type: object
    properties:
      summary:
        type: string
        description: A summary of the user's issue.
    required:
    - summary
book_reservation:
  name: book_reservation
  description: Book a reservation.
  parameters:
    type: object
    properties:
      user_id:
        type: string
        description: The ID of the user to book the reservation, such as 'sara_doe_496'.
      origin:
        type: string
        description: The IATA code for the origin city, such as 'SFO'.
      destination:
        type: string
        description: The IATA code for the destination city, such as 'JFK'.
      flight_type:
        type: string
        enum:
        - one_way
        - round_trip
      cabin:
        type: string
        enum:
        - basic_economy
        - economy
        - business
      flights:
        type: array
        description: An array of objects containing details about each piece of flight.
        items:
          type: object
          properties:
            flight_number:
              type: string
              description: Flight number, such as 'HAT001'.
            date:
              type: string
              description: The date for the flight in the format 'YYYY-MM-DD', such
                as '2024-05-01'.
          required:
          - flight_number
          - date
      passengers:
        type: array
        description: An array of objects containing details about each passenger.
        items:
          type: object
          properties:
            first_name:
              type: string
              description: The first name of the passenger, such as 'Noah'.
            last_name:
              type: string
              description: The last name of the passenger, such as 'Brown'.
            dob:
              type: string
              description: The date of birth of the passenger in the format 'YYYY-MM-DD',
                such as '1990-01-01'.
          required:
          - first_name
          - last_name
          - dob
      payment_methods:
        type: array
        description: An array of objects containing details about each payment method.
        items:
          type: object
          properties:
            payment_id:
              type: string
              description: The payment id stored in user profile, such as 'credit_card_7815826',
                'gift_card_7815826', 'certificate_7815826'.
            amount:
              type: number
              description: The amount to be paid.
          required:
          - payment_id
          - amount
      total_baggages:
        type: integer
        description: The total number of baggage items included in the reservation.
      nonfree_baggages:
        type: integer
        description: The number of non-free baggage items included in the reservation.
      insurance:
        type: string
        enum:
        - 'yes'
        - 'no'
    required:
    - user_id
    - origin
    - destination
    - flight_type
    - cabin
    - flights
    - passengers
    - payment_methods
    - total_baggages
    - nonfree_baggages
    - insurance
cancel_reservation:
  name: cancel_reservation
  description: Cancel the whole reservation.
  parameters:
    type: object
    properties:
      reservation_id:
        type: string
        description: The reservation ID, such as 'ZFA04Y'.
    required:
    - reservation_id
get_reservation_details:
  name: get_reservation_details
  description: Get the details of a reservation.
  parameters:
    type: object
    properties:
      reservation_id:
        type: string
        description: The reservation id, such as '8JX2WO'.
    required:
    - reservation_id
list_all_airports:
  name: list_all_airports
  description: List all airports and their cities.
  parameters:
    type: object
    properties: {}
search_direct_flight:
  name: search_direct_flight
  description: Search direct flights between two cities on a specific date.
  parameters:
    type: object
    properties:
      origin:
        type: string
        description: The origin city airport in three letters, such as 'JFK'.
      destination:
        type: string
        description: The destination city airport in three letters, such as 'LAX'.
      date:
        type: string
        description: The date of the flight in the format 'YYYY-MM-DD', such as '2024-01-01'.
    required:
    - origin
    - destination
    - date
search_onestop_flight:
  name: search_onestop_flight
  description: Search direct flights between two cities on a specific date.
  parameters:
    type: object
    properties:
      origin:
        type: string
        description: The origin city airport in three letters, such as 'JFK'.
      destination:
        type: string
        description: The destination city airport in three letters, such as 'LAX'.
      date:
        type: string
        description: The date of the flight in the format 'YYYY-MM-DD', such as '2024-05-01'.
    required:
    - origin
    - destination
    - date
send_certificate:
  name: send_certificate
  description: Send a certificate to a user. Be careful!
  parameters:
    type: object
    properties:
      user_id:
        type: string
        description: The ID of the user to book the reservation, such as 'sara_doe_496'.
      amount:
        type: number
        description: Certificate amount to send.
    required:
    - user_id
    - amount
update_reservation_baggages:
  name: update_reservation_baggages
  description: Update the baggage information of a reservation.
  parameters:
    type: object
    properties:
      reservation_id:
        type: string
        description: The reservation ID, such as 'ZFA04Y'.
      total_baggages:
        type: integer
        description: The updated total number of baggage items included in the reservation.
      nonfree_baggages:
        type: integer
        description: The updated number of non-free baggage items included in the
          reservation.
      payment_id:
        type: string
        description: The payment id stored in user profile, such as 'credit_card_7815826',
          'gift_card_7815826', 'certificate_7815826'.
    required:
    - reservation_id
    - total_baggages
    - nonfree_baggages
    - payment_id
update_reservation_flights:
  name: update_reservation_flights
  description: Update the flight information of a reservation.
  parameters:
    type: object
    properties:
      reservation_id:
        type: string
        description: The reservation ID, such as 'ZFA04Y'.
      cabin:
        type: string
        enum:
        - basic_economy
        - economy
        - business
      flights:
        type: array
        description: An array of objects containing details about each piece of flight
          in the ENTIRE new reservation. Even if the a flight segment is not changed,
          it should still be included in the array.
        items:
          type: object
          properties:
            flight_number:
              type: string
              description: Flight number, such as 'HAT001'.
            date:
              type: string
              description: The date for the flight in the format 'YYYY-MM-DD', such
                as '2024-05-01'.
          required:
          - flight_number
          - date
      payment_id:
        type: string
        description: The payment id stored in user profile, such as 'credit_card_7815826',
          'gift_card_7815826', 'certificate_7815826'.
    required:
    - reservation_id
    - cabin
    - flights
    - payment_id
update_reservation_passengers:
  name: update_reservation_passengers
  description: Update the passenger information of a reservation.
  parameters:
    type: object
    properties:
      reservation_id:
        type: string
        description: The reservation ID, such as 'ZFA04Y'.
      passengers:
        type: array
        description: An array of objects containing details about each passenger.
        items:
          type: object
          properties:
            first_name:
              type: string
              description: The first name of the passenger, such as 'Noah'.
            last_name:
              type: string
              description: The last name of the passenger, such as 'Brown'.
            dob:
              type: string
              description: The date of birth of the passenger in the format 'YYYY-MM-DD',
                such as '1990-01-01'.
          required:
          - first_name
          - last_name
          - dob
    required:
    - reservation_id
    - passengers
