  parameters:
    type: object
    properties:
      name:
        description: The name of the district.
      country:
        description: The country associated with the district.
      city_id:
        description: The city ID associated with the district.
      district_id:
        description: The district ID.
      page:
        description: The page number for pagination purposes.
get_antonyms:
  name: get_antonyms
  description: Fetches antonyms for a given word using the Dicolink API.
  parameters:
    type: object
    properties:
      mot:
        description: The word for which to find antonyms.
      limite:
        description: The maximum number of antonyms to return. Defaults to 10.
title_cast_crew:
