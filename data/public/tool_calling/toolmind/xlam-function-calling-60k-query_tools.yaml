  description: Decodes the VIN (Vehicle Identification Number) and returns detailed
    information about the vehicle.
  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number (VIN) to decode. Must be 17
          characters long.
webcams_list_region_region_region:
  name: webcams_list_region_region_region
  description: Fetch a list of webcams for the specified region(s) with optional parameters
    for language and content detail.
  parameters:
    type: object
    properties:
      region:
        description: A comma-separated list of ISO 3166-1-alpha-2 country codes and
          region codes separated by a dot.
      lang:
        description: The language code to localize the results, if available. Default
          is 'en'.
      show:
        description: Specifies the content details to include in the response. Default
          is 'webcams:image,location'.
get_cities_by_filter:
  name: get_cities_by_filter
  description: Fetches cities information based on the provided filter ID using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The filter ID used to specify which cities to fetch information
          for.
by_city_name:
  name: by_city_name
  description: Fetch weather data from the RapidWeather API by city name.
  parameters:
    type: object
    properties:
      q:
        description: City name, state code, and country code divided by commas (e.g.,
          "London,UK").
      units:
        description: Units of measurement. Either "standard", "metric", or "imperial".
      lang:
        description: Language code to get the output in a specific language.
live_players_rankings:
  name: live_players_rankings
  description: Retrieves live tennis rankings for a given number of players, including
    position, points, and information about the last match played in the current active
    tournament.
  parameters:
    type: object
    properties:
      n_player:
        description: The number of players for which to retrieve the live rankings,
          with a maximum of 500.
nhl_summary:
  name: nhl_summary
  description: Fetch the game summary data for a specified NHL game using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      is_id:
        description: The game ID for which the summary data is requested.
middle_east:
  name: middle_east
  description: Retrieves a list of Middle Eastern cities sorted based on specified
    criteria.
  parameters:
    type: object
    properties:
      page:
        description: The page number for pagination. Default is '1'.
      sort:
        description: The sort order, either 'asc' for ascending or 'desc' for descending.
          Default is 'desc'.
      sort_by:
        description: The parameter by which to sort results, such as 'overall_score',
          'internet_speed', 'temperatureC', or 'cost_for_family_in_usd'. Default is
          'overall_score'.
      size:
        description: The number of entries per page. Default is '20'.
date_converter_timezone:
  name: date_converter_timezone
  description: Converts a given date to a specified timezone using the DateClock API
    and returns the response.
  parameters:
    type: object
    properties:
      format:
        description: Specifies the format of the output date. Defaults to None.
      date:
        description: The date to be converted. Defaults to '7 Days Ago'.
      tz:
        description: The target timezone for the date conversion. Defaults to 'UTC+8'.
coins_list:
  name: coins_list
  description: Fetches a list of available cryptocurrencies based on provided filters
    and sorting options.
  parameters:
    type: object
    properties:
      edition_currency_id:
        description: The unique identifier for the edition currency, returned in the
          `/get-meta-data` endpoint.
        type: integer
      total_volume_min:
        description: Minimum total volume for the cryptocurrency. Refer to `rangeFilters/total_volume/steps`
          for available values.
      chg_24h_min:
        description: Minimum 24-hour change value for the cryptocurrency. Refer to
          `rangeFilters/chg_24h/steps` for available values.
      lang_id:
        description: Language ID, with 1 being the default. Refer to `all_langs/lang_ID`
          in the `/get-meta-data` endpoint.
      total_volume_max:
        description: Maximum total volume for the cryptocurrency. Refer to `rangeFilters/total_volume/steps`
          for available values.
      chg_7d_max:
        description: Maximum 7-day change value for the cryptocurrency. Refer to `rangeFilters/chg_7d/steps`
          for available values.
      time_utc_offset:
        description: Time offset in seconds from UTC. Default is 28800 (UTC+8).
      chg_7d_min:
        description: Minimum 7-day change value for the cryptocurrency. Refer to `rangeFilters/chg_7d/steps`
          for available values.
      market_cap_max:
        description: Maximum market capitalization for the cryptocurrency. Refer to
          `rangeFilters/market_cap/steps` for available values.
      market_cap_min:
        description: Minimum market capitalization for the cryptocurrency. Refer to
          `rangeFilters/market_cap/steps` for available values.
      chg_24h_max:
        description: Maximum 24-hour change value for the cryptocurrency. Refer to
          `rangeFilters/chg_24h/steps` for available values.
      volume_24h_max:
        description: Maximum 24-hour trading volume for the cryptocurrency. Refer
          to `rangeFilters/volume_24h/steps` for available values.
      volume_24h_min:
        description: Minimum 24-hour trading volume for the cryptocurrency. Refer
          to `rangeFilters/volume_24h/steps` for available values.
      sort:
        description: Sorting criteria. Allowed values are `NAME_UP` (Name), `PERC1D_DN`
          (Chg 24h), `PERC7D_DN` (Chg 7D), `MARKETCAP_DN` (Market Cap), `VOLUME24_DN`
          (Vol 24h), `TOTAL_VOLUME_DN` (Total vol). Default is `PERC1D_DN`.
      page:
        description: Page number for pagination. Default is 1.
get_event_detail:
  name: get_event_detail
  description: Fetches detailed information about a specific event or match from the
    League of Legends Esports API using the provided match ID.
  parameters:
    type: object
    properties:
      matchid:
        description: The ID of the match or event for which details are to be fetched.
country_details:
  name: country_details
  description: Fetches the details for a specific country from the GeoDB API, including
    information on the number of regions.
  parameters:
    type: object
    properties:
      countryid:
        description: An ISO-3166 country code or WikiData id representing the country.
      asciimode:
        description: If set to True, display results using ASCII characters.
      languagecode:
        description: The language code to display the results in the specified language.
get_team_info:
  name: get_team_info
  description: Retrieves comprehensive information about a team, including player
    details, events, results, and more, using the VLR.gg team ID.
  parameters:
    type: object
    properties:
      teamid:
        description: The team ID from VLR.gg for which information is being retrieved.
address_inclusion:
  name: address_inclusion
  description: Determines whether the given geographical coordinates (latitude and
    longitude) fall within the range specified by an address code.
  parameters:
    type: object
    properties:
      code:
        description: Address code(s). Multiple codes can be specified, separated by
          a period.
      coord:
        description: Geographical coordinates in latitude and longitude format.
      datum:
        description: Geodetic system of the provided geographical coordinates. Defaults
          to 'wgs84'. Accepted values are 'wgs84' (World Geodetic System) and 'tokyo'
          (Old Japan Geodetic System).
downalods_hotels:
  name: downalods_hotels
  description: Downloads a list of hotels based on various filters and returns the
    response.
  parameters:
    type: object
    properties:
      active_mer:
        description: Show hotels with Priceline rates.
      latitude_range_end:
        description: Endpoint of the latitude range; requires `latitude` to have a
          value.
      active_smop:
        description: Show hotels with semi-opaque rates.
      active_vmer:
        description: Show hotels with vacation merchant rates.
      state_code:
        description: Filter by the state code of the hotel.
      longitude_range_end:
        description: Endpoint of the longitude range; requires `longitude` to have
          a value.
      active_bkg:
        description: Show hotels with Booking rates.
      latitude:
        description: Filter by the latitude of the hotel.
      hotelid_ppn:
        description: Filter by PPN hotel ID.
      longitude:
        description: Filter by the longitude of the hotel.
      property_type_ids:
        description: Filter by property type IDs. See the Property Type Filter Guide
          for more details.
      cityid_ppn:
        description: Filter by PPN city ID.
      hotel_address:
        description: Filter by the address of the hotel.
      resume_key:
        description: Resume results from the given ID.
      language:
        description: Language code in the format of 'xx-XX'. For example, en-US, es-ES,
          fr-FR, pt-BR.
      limit:
        description: Limits the number of results returned in the response.
      active_agd:
        description: Show hotels with Agoda rates.
      country_code:
        description: Filter by the country code of the hotel.
      changes_since:
        description: Filter hotels that have been updated on or after this date. Must
          be in ISO 8601 format (YYYY-MM-DDThh:mm:ss{UTC_Offset}).
street:
  name: street
  description: Fetch a unique history or touristic AI-generated text for any street
    around the world using the StreetNarrator API.
  parameters:
    type: object
    properties:
      street:
        description: The name or identifier of the street for which the AI-generated
          text is required.
      topics:
        description: Topics to focus on in the generated text, formatted as 'history:X,tourism:Y'
          where X and Y are weights. Defaults to 'history:1,tourism:1'.
      temperature:
        description: Degree of creativity of the AI's response. Defaults to '0'.
      style:
        description: The style of the output text. Possible values include 'audioguide'.
          Defaults to 'audioguide'.
      language:
        description: The language of the generated text. Defaults to 'en'.
basic_daily:
  name: basic_daily
  description: Fetch daily 10-Q and 10-K report zip files from the SEC financial statement
    dataset.
  parameters:
    type: object
    properties:
      date:
        description: The specific date for which to fetch the daily zip file, formatted
          as 'YYYY-MM-DD'.
reverse_php:
  name: reverse_php
  description: Performs reverse geocoding using the specified API, longitude, and
    latitude.
  parameters:
    type: object
    properties:
      api:
        description: Your API key for accessing the Geokeo reverse geocoding service.
      lng:
        description: The longitude coordinate for the reverse geocoding request.
      lat:
        description: The latitude coordinate for the reverse geocoding request.
ip_locator:
  name: ip_locator
  description: Fetches geolocation information for a given IP address using RapidAPI.
  parameters:
    type: object
    properties:
      ip_address:
        description: The IP address for which geolocation information is to be retrieved.
      format:
        description: The desired output format of the response. Supported formats
          are .csv, .xml, and .json.
indexes_intraday:
  name: indexes_intraday
  description: Fetches intraday time series data (Date, Open, High, Low, Close, Volume)
    for a specified index symbol within a given time interval.
  parameters:
    type: object
    properties:
      interval:
        description: Time interval in minutes, e.g., `1` for 1-minute intervals, `5`
          for 5-minute intervals.
        type: integer
      is_from:
        description: The start date and time for the query. Supported formats include
          YYYY-mm-dd HH:MM and YYYY-mm-dd, e.g., '2020-04-21 10:00' or '2020-04-21'.
      to:
        description: The end date and time for the query. Supported formats include
          YYYY-mm-dd HH:MM and YYYY-mm-dd, e.g., '2020-04-21 10:30' or '2020-04-22'.
      symbol:
        description: 'The symbol of the index to query. Examples include `^GSPC` (S&P
          500 index) or `SPX:INDEX` (S&P 500 index). Valid suffixes are:'
      adjust:
        description: Whether the price should be adjusted. Defaults to None.
getmentions:
  name: getmentions
  description: Fetches Twitter mentions for a given query using the specified parameters.
  parameters:
    type: object
    properties:
      query:
        description: The search query to find mentions for (e.g., brand name, competitor).
      period:
        description: The time period for mentions, in days. Defaults to None.
      page:
        description: The page number of results to retrieve. Defaults to 1.
v1_historicalfigures:
  name: v1_historicalfigures
  description: Retrieves a list of historical figures matching the given search parameters
    from the API Ninjas Historical Figures API.
  parameters:
    type: object
    properties:
      offset:
        description: The number of results to skip for pagination. Defaults to None.
      name:
        description: The name of the historical figure to search for. Partial names
          are also accepted (e.g., "julius" will match "Julius Caesar"). Defaults
          to 'julius caesar'.
drink_by_id:
  name: drink_by_id
  description: Fetches a specific drink recipe by its ID using the Ghana Food Recipe
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the drink recipe.
api_nutrition_data:
  name: api_nutrition_data
  description: Fetches nutritional analysis for a given unstructured food text input.
  parameters:
    type: object
    properties:
      ingr:
        description: The unstructured food text (usually an ingredient line) to be
          analyzed.
      nutrition_type:
        description: Specifies the context for the food item. Defaults to 'cooking'.
get_5_history:
  name: get_5_history
  description: Fetches historical stock data including open, high, low, close prices,
    and trading volume.
  parameters:
    type: object
    properties:
      startdate:
        description: The start date for fetching historical data in 'YYYY-MM-DD' format.
          Default is '2023-02-01'.
      keyword:
        description: The stock symbol for which to fetch historical data. Default
          is 'GOOG'.
validate_phonenumber:
  name: validate_phonenumber
  description: Validates a phone number using the WhatsApp Checker Pro API.
  parameters:
    type: object
    properties:
      phone:
        description: The phone number to be validated.
check_endpoint:
  name: check_endpoint
  description: Checks the abuse status and other details of the given IP address using
    the AbuseIPDB API.
  parameters:
    type: object
    properties:
      ipaddress:
        description: The IP address to be checked.
      maxageindays:
        description: The maximum age of the reports in days (default is None). If
          not specified, reports up to 30 days old are returned. Must be between 1
          and 365 if provided.
search_foods_using_keywords:
  name: search_foods_using_keywords
  description: Search for foods using the given keywords and optional filters such
    as brand owner, page size, and page number.
  parameters:
    type: object
    properties:
      query:
        description: The search term to query for foods.
      brandowner:
        description: The brand owner of the foods. Default is 'Kar Nut Products Company'.
      pagesize:
        description: The number of results per page. Default is '1'.
      pagenumber:
        description: The page number to retrieve. Default is '1'.
get_last_5_news:
  name: get_last_5_news
  description: Fetches the last 5 news articles from the financial section.
  parameters:
    type: object
    properties:
      content_type:
        description: The type of content to retrieve (e.g., 'application/json').
banks_by_country:
  name: banks_by_country
  description: Fetches a list of banks for a specified country using the given RapidAPI
    key.
  parameters:
    type: object
    properties:
      country_code:
        description: Two-letter ISO country code representing the country for which
          the bank list is to be retrieved.
get_airports_by_city:
  name: get_airports_by_city
  description: Retrieve a list of airports based on a specific city using the "Get
    Airports By City" API.
  parameters:
    type: object
    properties:
      city:
        description: Name of the city for which the airport details are to be retrieved.
search_location_by_name_or_zip_code:
  name: search_location_by_name_or_zip_code
  description: Search for a location by city name or zip code and retrieve forecast
    key information in the specified language.
  parameters:
    type: object
    properties:
      city:
        description: Name of the city to search for. Defaults to 'New York'.
      lang:
        description: Language for the response. Supported values are ['en', 'fr',
          'nl', 'es', 'pt', 'it', 'tr', 'gr', 'cz', 'pl', 'ru', 'cn']. Defaults to
          'en'.
      zipcode:
        description: Zip code of the city to search for. Defaults to None.
game_lookup:
  name: game_lookup
  description: Fetches detailed information for a specific game from the CheapShark
    API, including a list of all deals associated with the game.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the game to look up.
        type: integer
specific_skin:
  name: specific_skin
  description: Retrieves details such as name, price, icon, class, and weapon for
    a specific Counter-Strike skin in field-tested condition (prices in USD).
  parameters:
    type: object
    properties:
      skin_name:
        description: 'The name of the Counter-Strike skin, with underscores instead
          of spaces. Example: ''AK-47_Redline''.'
searchstation:
  name: searchstation
  description: Search for radio stations based on a provided keyword.
  parameters:
    type: object
    properties:
      keyword:
        description: The search keyword which could be a radio station name or a country
          name.
      order:
        description: The order in which to display the results. Use 'ASC' for ascending
          or 'DESC' for descending. Default is 'ASC'.
      page:
        description: The page number of the results to display. Default is 1.
      limit:
        description: The limit of items to display per page. Default is 10.
datum_conversion:
  name: datum_conversion
  description: Converts latitude and longitude from one geodetic system to another
    using the Navitime Geocoding API.
  parameters:
    type: object
    properties:
      coord:
        description: Latitude and longitude before conversion. Supports millisecond
          and degree notation.
      after_datum:
        description: The target geodetic system for conversion. Options are 'wgs84'
          for World Geodetic System (default) and 'tokyo' for Old Japan Geodetic System.
domain_detail:
  name: domain_detail
  description: Fetches the domain detail for a given domain ID using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      did:
        description: The domain ID for which the details are to be fetched.
        type: integer
convert_get_symbol:
  name: convert_get_symbol
  description: Converts a specified amount from one currency to another and retrieves
    the symbol of the converted value.
  parameters:
    type: object
    properties:
      amount:
        description: The amount of currency to convert. Defaults to '1'.
      to:
        description: The target currency code. Defaults to 'USD'.
      is_from:
        description: The source currency code. Defaults to 'EUR'.
top_paid_apps:
  name: top_paid_apps
  description: Fetch the top paid apps chart from Google Play, optionally filtering
    by category, region, and language. Results can be limited to a specified number
    of apps.
  parameters:
    type: object
    properties:
      limit:
        description: Limit the number of results. Allowed values are between 1 and
          200. Default is 50. Requests with a limit value between 101-200 will be
          charged double.
        type: integer
      category:
        description: Get the chart in a specific Google Play category (e.g., 'SOCIAL').
          Default is None.
      region:
        description: The country code to use, specified as a 2-letter ISO 3166-1 alpha-2
          country code. Default is 'us'.
      language:
        description: The language to use, specified as a 2-letter ISO 639-1 alpha-2
          language code. Default is 'en'.
nhl_score_board:
  name: nhl_score_board
  description: Fetches the NHL scoreboard data for the specified date using the NHL
    API.
  parameters:
    type: object
    properties:
      day:
        description: The day of the desired scoreboard data.
      year:
        description: The year of the desired scoreboard data.
      month:
        description: The month of the desired scoreboard data.
      limit:
        description: The maximum number of results to return. Defaults to '5'.
options_prices:
  name: options_prices
  description: Fetch current options data given the input parameters.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol of the asset to look for, e.g., 'AAPL' (Apple Inc),
          'MSFT' (Microsoft).
      min_strike:
        description: A lower bound for the strike price. Default is 50. If provided,
          the strike range [min_strike, max_strike] takes priority over the strike
          parameter.
      min_expiry:
        description: A lower bound for the expiration date in the format 'YYYY-MM-DD'.
          Default is '2021-05-21'. If provided, the expiry range [min_expiry, max_expiry]
          takes priority over the expiration parameter.
      max_expiry:
        description: An upper bound for the expiration date in the format 'YYYY-MM-DD'.
          Default is '2023-12-14'. If provided, the expiry range [min_expiry, max_expiry]
          takes priority over the expiration parameter.
      max_strike:
        description: An upper bound for the strike price. Default is 90. If provided,
          the strike range [min_strike, max_strike] takes priority over the strike
          parameter.
      strike:
        description: A lower bound for the strike price. Default is 50. If provided,
          the strike range [min_strike, max_strike] takes priority over the strike
          parameter.
      expiration:
        description: The expiration date of the option in the format 'YYYY-MM-DD'.
          Default is '2023-12-14'.
points_point:
  name: points_point
  description: Fetches forecast information for a given geographical point from the
    National Weather Service.
  parameters:
    type: object
    properties:
      point:
        description: Latitude and longitude in the format 'EPSG:4326 latitude, EPSG:4326
          longitude'.
generate_cc_number:
  name: generate_cc_number
  description: Generates a fake credit card number using the specified brand and API
    key.
  parameters:
    type: object
    properties:
      brand:
        description: The desired card brand (e.g., 'Visa', 'MasterCard'). Defaults
          to None.
echo_get:
  name: echo_get
  description: Make a HTTP GET request to the echo API with specified content type
    and code.
  parameters:
    type: object
    properties:
      content_type:
        description: The content type to include in the request.
      code:
        description: The response code you would like to get in the response. Defaults
          to '201'.
teamdetails:
  name: teamdetails
  description: Retrieves the details of a specific basketball team using the given
    team ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the team for which details are to be retrieved.
        type: integer
event_data:
  name: event_data
  description: Fetches event data for a given event ID using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      event_id:
        description: The unique identifier for the event.
        type: integer
kunyomi_reading:
  name: kunyomi_reading
  description: Searches for kanji characters using the provided kunyomi reading.
  parameters:
    type: object
    properties:
      kun:
        description: The kunyomi reading of the kanji character, specified in Hiragana
          or romaji.
get_profile_recent_activity_time:
  name: get_profile_recent_activity_time
  description: Retrieves the time of the latest activity on a given LinkedIn profile
    using the Fresh LinkedIn Profile Data API.
  parameters:
    type: object
    properties:
      linkedin_url:
        description: The URL of the LinkedIn profile to query.
is_a_coordinate_water:
  name: is_a_coordinate_water
  description: Determines if a given coordinate on Earth is water based on the provided
    longitude and latitude.
  parameters:
    type: object
    properties:
      longitude:
        description: The longitude of the coordinate to check.
        type: integer
      latitude:
        description: The latitude of the coordinate to check.
        type: integer
search_result:
  name: search_result
  description: Fetches location search results based on a search query and optional
    latitude and longitude parameters.
  parameters:
    type: object
    properties:
      q:
        description: The search query string.
      latitude:
        description: Latitude to refine the search query. Defaults to '24.562394'.
      longitude:
        description: Longitude to refine the search query. Defaults to '73.7124675'.
au_decode:
  name: au_decode
  description: Decodes an Australian VIN (Vehicle Identification Number) using the
    RapidAPI VIN Decoder service.
  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number to decode.
search_country:
  name: search_country
  description: Search for a country to see if they have an active pageant contest.
  parameters:
    type: object
    properties:
      search:
        description: The search string to query for active pageant contests in a country.
get_movie_reviews_by_id:
  name: get_movie_reviews_by_id
  description: Fetches a complete list of movie reviews associated with a given movie
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The movie ID for which reviews need to be fetched. The ID can
          be obtained from the Get Movie By ID endpoint.
fetch_information:
  name: fetch_information
  description: Fetches information based on IP, ASN, CIDR (IPv4 & IPv6), or organization
    name using the RapidAPI ASN Lookup service.
  parameters:
    type: object
    properties:
      ip:
        description: IP address to lookup. Defaults to None.
      asn:
        description: Autonomous System Number to lookup. Defaults to 'AS32934'.
      cidr:
        description: CIDR notation for IP address range to lookup. Defaults to None.
      orgname:
        description: Organization name to lookup. Defaults to None.
equity_intraday:
  name: equity_intraday
  description: Retrieve intraday time series data (Date, Open, High, Low, Close, Volume)
    for a specific symbol based on given parameters.
  parameters:
    type: object
    properties:
      interval:
        description: The time interval in minutes for the data points, such as `1`
          (1 min) or `5` (5 min).
        type: integer
      to:
        description: The end date and time of the query in formats like YYYY-mm-dd
          HH:MM or YYYY-mm-dd.
      is_from:
        description: The start date and time of the query in formats like YYYY-mm-dd
          HH:MM or YYYY-mm-dd.
      symbol:
        description: The stock symbol for the queried asset, e.g., `AAPL` for Apple
          Inc or `MSFT` for Microsoft.
      adjust:
        description: Indicates if the price data should be adjusted. Defaults to None.
captions_list:
  name: captions_list
  description: Returns a list of caption tracks associated with a specified YouTube
    video.
  parameters:
    type: object
    properties:
      part:
        description: The part parameter specifies a comma-separated list of one or
          more caption resource properties that the API response will include.
      videoid:
        description: The YouTube video ID for which the caption tracks are being requested.
get_trims_by_generation_id:
  name: get_trims_by_generation_id
  description: Returns a list of all trims (engine types) available for a given generation
    of a car model.
  parameters:
    type: object
    properties:
      generationid:
        description: The ID of the generation for which to retrieve trims.
        type: integer
getstatsbyday:
  name: getstatsbyday
  description: Fetches Trinidad & Tobago COVID-19 statistics for a specific day using
    the given year, month, and day identifiers.
  parameters:
    type: object
    properties:
      yearid:
        description: The year identifier in "YYYY" format.
      monthid:
        description: The month identifier in "MM" format (e.g., "01" for January).
      dayid:
        description: The day identifier in "DD" format (e.g., "01" for the 1st day
          of the month).
singleoffer:
  name: singleoffer
  description: Fetches information for a single offer from the Avito API.
  parameters:
    type: object
    properties:
      singleav:
        description: The identifier for the single offer to fetch information about.
get_region_details:
  name: get_region_details
  description: Fetch the details of a specific region within a given country using
    the RapidAPI GIS Engine.
  parameters:
    type: object
    properties:
      region_code:
        description: The code representing the specific region to look up.
      country_code:
        description: The code representing the country in which the region is located.
wnba_schedule:
  name: wnba_schedule
  description: Fetches the WNBA schedule data for a specified date using the provided
    API key.
  parameters:
    type: object
    properties:
      month:
        description: The month for which to retrieve the schedule, as a string.
      day:
        description: The day for which to retrieve the schedule, as a string.
      year:
        description: The year for which to retrieve the schedule, as a string.
get_detailed_response:
  name: get_detailed_response
  description: Fetches detailed information for a given movie from the Advanced Movie
    Search API using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      movie_id:
        description: The unique identifier for the movie whose details are to be fetched.
        type: integer
aroon:
  name: aroon
  description: Fetches the Aroon Indicator (AROON) for a given financial instrument
    symbol. The Aroon Indicator is used to identify trends, the beginning of a new
    trend, and its strength in price movements.
  parameters:
    type: object
    properties:
      symbol:
        description: The financial instrument symbol, which can be any equity, index,
          ETF, forex, or cryptocurrency (e.g., 'AAPL', 'EUR/USD', 'ETH/BTC').
      interval:
        description: The time interval between data points in the time series. Supported
          values include '1min', '5min', '15min', '30min', '45min', '1h', '2h', '4h',
          '1day', '1week', '1month'.
      format:
        description: The format of the returned data. Can be 'json' or 'csv'. Defaults
          to 'json'.
      time_period:
        description: The look-back period for the Aroon calculation. Defaults to 14.
      outputsize:
        description: The number of data points to return. Defaults to 30.
stock_get_dividend_yield:
  name: stock_get_dividend_yield
  description: Fetches the dividend yield for a given stock symbol from the specified
    region using the RapidAPI service.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: The region code for the stock market (default is 'US'). Allowed
          values are 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB',
          and 'S'.
website_url_qr_code:
  name: website_url_qr_code
  description: Generates a static QR code (standard or custom-designed) encoded with
    the specified URL and customization options using the Scanova QR Code API.
  parameters:
    type: object
    properties:
      error_correction:
        description: Specifies error correction level. Default is 'H'.
      eye_pattern:
        description: Specifies the eye pattern of the QR code. Default is 'RECT_RECT'.
      data_gradient_style:
        description: Specifies the gradient style for the data modules. Default is
          'None'.
      format:
        description: Specifies the format of the QR code image. Default is 'png'.
      size:
        description: Specifies the size of the QR code image. Default is 'm'.
      eye_color_outer:
        description: Specifies the outer color of the eye modules. Default is '#000000'.
      data_gradient_end_color:
        description: Specifies the end color of the gradient for data modules. Default
          is '#000000'.
      data_gradient_start_color:
        description: Specifies the start color of the gradient for data modules. Default
          is '#000000'.
      eye_color_inner:
        description: Specifies the inner color of the eye modules. Default is '#000000'.
      url:
        description: The URL to be encoded in the QR code. Default is 'https://scanova.io'.
      data_pattern:
        description: Specifies the data pattern of the QR code. Default is 'RECT'.
      background_color:
        description: Specifies the background color of the QR code. Default is '#FFFFFF'.
get_cast_by_id:
  name: get_cast_by_id
  description: Retrieves the full cast list for a given movie, including images and
    roles, using the Cinema API.
  parameters:
    type: object
    properties:
      is_id:
        description: The movie ID for which to retrieve the cast information.
reviews_list:
  name: reviews_list
  description: Fetches a list of reviews and feedback from users using the Yummly
    API.
  parameters:
    type: object
    properties:
      offset:
        description: The number of items to skip before starting to collect the result
          set.
        type: integer
      globalid:
        description: The value of the globalId field returned in the feeds/list and
          feeds/search API.
      limit:
        description: The maximum number of items to return.
        type: integer
getbookcoverimage:
  name: getbookcoverimage
  description: Fetches the book cover image for a given ISBN and language code from
    the RapidAPI service.
  parameters:
    type: object
    properties:
      isbn:
        description: The International Standard Book Number of the book.
      languagecode:
        description: The language code for the book.
following_by_pk:
  name: following_by_pk
  description: Fetches the Instagram following list for a given user by their primary
    key (PK).
  parameters:
    type: object
    properties:
      pk:
        description: The primary key of the Instagram user whose following list is
          to be fetched.
      corsenabled:
        description: Enables Cross-Origin Resource Sharing (CORS). Defaults to 'false'.
      nextmaxid:
        description: The maximum ID for pagination to fetch subsequent pages of the
          following list. Defaults to None.
leaguelogoimage:
  name: leaguelogoimage
  description: Fetch the logo image for a specific Rugby league in PNG format using
    the given tournament ID and RapidAPI key.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The unique tournament ID for which to retrieve the league logo
          image.
        type: integer
get_random_word:
  name: get_random_word
  description: Fetches a random word based on specified criteria from the Dicolink
    API.
  parameters:
    type: object
    properties:
      verbeconjugue:
        description: Whether to fetch a conjugated verb. Defaults to None.
      minlong:
        description: Minimum length of the word. Defaults to '5'.
      maxlong:
        description: Maximum length of the word. Defaults to '-1' for no maximum.
      avecdef:
        description: Whether to include the definition of the word. Defaults to None.
air_quality_measurements:
  name: air_quality_measurements
  description: Fetches current air quality measurements per hour for a given city
    using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      country:
        description: The country in which the city is located.
      city:
        description: The city for which the air quality measurements are to be fetched.
      lon:
        description: The longitude coordinate of the city. Defaults to '4.897070'.
      lat:
        description: The latitude coordinate of the city. Defaults to '52.377956'.
search_a_grocery:
  name: search_a_grocery
  description: Searches for grocery products based on a search query using RapidAPI.
  parameters:
    type: object
    properties:
      searchquery:
        description: The search term used to find grocery products.
get_place_by_geoname_id:
  name: get_place_by_geoname_id
  description: Fetches details about a place using its Geoname ID.
  parameters:
    type: object
    properties:
      geonameid:
        description: Unique identifier given by Geonames for the place.
        type: integer
      language:
        description: Specifies a language (ISO 639-1) to get the localized name of
          the place. Default is None. If translation is not available, "localizedName"
          property will be null.
listar_todos:
  name: listar_todos
  description: Fetch a list of all ministries and subsecretariats using the specified
    API.
  parameters:
    type: object
    properties:
      todos:
        description: The endpoint to retrieve the list of ministries and subsecretariats.
now:
  name: now
  description: Fetches the current time for a specified time zone using the RapidAPI
    date calculator service.
  parameters:
    type: object
    properties:
      tzname:
        description: The name of the time zone for which to fetch the current time.
          Defaults to 'UTC'.
get_7_latest:
  name: get_7_latest
  description: Gets the 7 latest updates for a specified stock keyword.
  parameters:
    type: object
    properties:
      keyword:
        description: The stock symbol or keyword to search for. Defaults to 'GOOG'.
get_2_stockdetails:
  name: get_2_stockdetails
  description: Fetch detailed information about a specific stock using the StockYAPI
    Exchange API.
  parameters:
    type: object
    properties:
      keyword:
        description: The stock ticker or keyword to search for. Default is 'GOOG'.
stock_v2_get_analysis_report:
  name: stock_v2_get_analysis_report
  description: Fetches detailed information about a stock based on the provided performance
    ID.
  parameters:
    type: object
    properties:
      performanceid:
        description: Value of the performance ID field, typically obtained from endpoints
          such as /auto-complete, /get-summary, or /get-movers.
offerinfo:
  name: offerinfo
  description: Fetches job offer data from the Google Jobs API using the provided
    job URL.
  parameters:
    type: object
    properties:
      joburl:
        description: The URL of the job offer to retrieve information for.
search_autocomplete:
  name: search_autocomplete
  description: Fetches product autocompletion suggestions based on a search keyword.
  parameters:
    type: object
    properties:
      q:
        description: The search keyword for which to get autocompletion suggestions.
search_for_joke:
  name: search_for_joke
  description: Fetch a joke based on the provided search text.
  parameters:
    type: object
    properties:
      q:
        description: The search query text to find jokes. Defaults to 'Did you hear
          about the butcher who backed'.
get_pregame_form:
  name: get_pregame_form
  description: Fetches pregame form information for a given game using the Viperscore
    API.
  parameters:
    type: object
    properties:
      gameid:
        description: The unique identifier of the game for which to fetch pregame
          form information.
mass_messages:
  name: mass_messages
  description: Retrieves the last 100 mass messages from the OnlyFans API.
  parameters:
    type: object
    properties:
      timezone:
        description: The timezone to use for the messages.
      useragent:
        description: The user agent string identifying the client's browser.
      auth_id:
        description: Authentication ID used for accessing the API.
      signstart:
        description: Start time for the signed request.
      signend:
        description: End time for the signed request.
      sess:
        description: Session identifier.
      xbc:
        description: Another session-related identifier.
      apptoken:
        description: Application token for API access.
search_nearby:
  name: search_nearby
  description: Search for businesses near specific geographic coordinates using various
    query parameters.
  parameters:
    type: object
    properties:
      query:
        description: The search query or keyword (e.g., 'Bars and pubs', 'Plumbers').
      lng:
        description: Longitude of the geographic coordinates to search nearby.
        type: integer
      lat:
        description: Latitude of the geographic coordinates to search nearby.
        type: integer
      x_user_agent:
        description: Device type for the search. Default is 'desktop'.
      language:
        description: Language of the results. Default is 'en'. For a list of supported
          language codes, see https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes.
      subtypes:
        description: Specific subtypes of businesses to search for, specified as a
          comma-separated list (e.g., 'Plumber,Carpenter,Electrician').
      fields:
        description: A comma-separated list of business fields to include in the response.
          By default, all fields are returned (e.g., 'business_id,type,phone_number,full_address').
      limit:
        description: Maximum number of businesses to return (1-500). Default is '20'.
      region:
        description: Region or country code to query Google Maps from. Default is
          'us'. For a list of supported region/country codes, see https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes.
au_car_averages:
  name: au_car_averages
  description: Fetches average car price information for a given car model, year,
    and make using the ToolBench RapidAPI service.
  parameters:
    type: object
    properties:
      model:
        description: The car model to query.
      year:
        description: The production year of the car to query.
      make:
        description: The car make to query.
ideas_get_replies:
  name: ideas_get_replies
  description: Fetch replies relating to an idea post and its comments from the trading-view
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID associated with the idea.
      uuid:
        description: The unique identifier for the idea, typically the value of the
          image_url field returned in the /ideas/list endpoint.
      lang:
        description: The language code for the response. Defaults to 'en'.
get_word_by_length_start_and_contain:
  name: get_word_by_length_start_and_contain
  description: 'Fetches a random word from an API that matches specific criteria:
    a given length, starting substring, and containing another substring.'
  parameters:
    type: object
    properties:
      start:
        description: The starting substring of the word.
      length:
        description: The length of the word.
        type: integer
      substring:
        description: The substring that the word must contain.
games_by_platform_category_sorted:
  name: games_by_platform_category_sorted
  description: Fetches and returns a list of games filtered by platform and category,
    and sorted based on a given parameter.
  parameters:
    type: object
    properties:
      sort_by:
        description: Criterion to sort the games by. Defaults to 'release-date'.
      platform:
        description: The platform to filter games by. Defaults to 'browser'.
      category:
        description: The category to filter games by. Defaults to 'mmorpg'.
check_text:
  name: check_text
  description: Submits text for analysis to determine if it was generated by a machine
    or a human using the AI Detection API.
  parameters:
    type: object
    properties:
      term:
        description: The text to be analyzed. Do not include any special characters.
get_entire_surah_chapter:
  name: get_entire_surah_chapter
  description: Fetches the entire Surah (chapter) of the Koran, including all verses
    and some additional information, based on the provided chapter ID.
  parameters:
    type: object
    properties:
      chapterid:
        description: The unique identifier for a Surah (chapter) in the Koran. Must
          be between 1 and 114, inclusive.
        type: integer
about:
  name: about
  description: Fetches metadata from the AresPass API and returns it in the specified
    format.
  parameters:
    type: object
    properties:
      outputformat:
        description: The format of the returned metadata. Allowed values are 'json',
          'xml', and 'yaml'. Default is 'xml'.
get_5_day_historical_daily_prices:
  name: get_5_day_historical_daily_prices
  description: Fetches 5 days of historical daily stock prices including adjusted
    Open, High, Low, Close prices, daily volume, dividend, and split information for
    a given ticker symbol.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which to retrieve historical data.
get_clips:
  name: get_clips
  description: Fetch the latest 50 clips of a specified Twitch channel.
  parameters:
    type: object
    properties:
      name:
        description: The name of the Twitch channel to fetch clips from.
net:
  name: net
  description: Checks if a .net domain name is registered using the RapidAPI 'check-username'
    service.
  parameters:
    type: object
    properties:
      name:
        description: The .net domain name to check for registration.
season_episodes:
  name: season_episodes
  description: Fetch episodes for a given season from the Netflix RapidAPI.
  parameters:
    type: object
    properties:
      ids:
        description: Season IDs (separated by commas) for which episodes are to be
          fetched.
      lang:
        description: Language code for the episodes. Defaults to 'en'.
      limit:
        description: The maximum number of episodes to return. Defaults to 25.
      offset:
        description: The offset for pagination. Defaults to 0.
user_by_id:
  name: user_by_id
  description: Retrieves user information from the Hacker News API given a user ID.
  parameters:
    type: object
    properties:
      is_id:
        description: Case-sensitive user ID.
aliexpress_item_search:
  name: aliexpress_item_search
  description: Searches for items on AliExpress based on various filters and criteria.
  parameters:
    type: object
    properties:
      brandid:
        description: The brand ID to filter items by. Defaults to None.
      catid:
        description: The category ID to filter items by. Defaults to None.
      q:
        description: The search query. Defaults to 'iphone'.
      page:
        description: The page number of the search results. Defaults to 1.
      loc:
        description: The location to filter items by. Defaults to None.
      locale:
        description: The locale to display titles and content in the selected language.
          Defaults to None.
      endprice:
        description: The upper price limit to filter items by. Defaults to None.
      sort:
        description: The sort order of the search results. Defaults to None.
      attr:
        description: The attributes to filter items by, separated by semicolons. Defaults
          to None.
      startprice:
        description: The lower price limit to filter items by. Defaults to None.
      region:
        description: The region to get accurate shipping costs and promotions. Defaults
          to None.
      currency:
        description: The currency to display the product prices in. Defaults to None.
team_streaks:
  name: team_streaks
  description: Fetches the streak data (winning, drawing, losing, etc.) of the two
    teams participating in a specific soccer match.
  parameters:
    type: object
    properties:
      matchid:
        description: The ID of the match for which streak data is to be retrieved.
        type: integer
goal_analysis_goal_minutes_in_between:
  name: goal_analysis_goal_minutes_in_between
  description: Retrieves goal statistics of the teams in specified minute intervals
    for a given soccer match.
  parameters:
    type: object
    properties:
      matchid:
        description: The ID of the soccer match for which goal statistics are requested.
        type: integer
jsrf_characters:
  name: jsrf_characters
  description: Fetches a list of JSRF (Jet Set Radio Future) characters based on given
    parameters.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of items to return in the response. Default
          is '5'.
      orderby:
        description: The order in which to sort items. Possible values are 'asc' (ascending)
          and 'desc' (descending). Default is 'asc'. This parameter has an effect
          only if `sortby` is also provided.
      sortby:
        description: The field by which to sort the items. Possible values include
          any field on the document such as 'name' or 'stats'. Default is 'name'.
pursuit:
  name: pursuit
  description: Performs a search for files using specified query parameters on FilePursuit
    and returns the search results.
  parameters:
    type: object
    properties:
      q:
        description: The search query.
      filetype:
        description: The file extension to filter results by. Only one file extension
          is accepted per query.
      sort:
        description: The sorting order of the results. Accepted values are 'sizeasc',
          'sizedesc', 'dateasc', 'datedesc', 'fileasc', and 'filedesc'. By default,
          'datedesc' is selected.
      start:
        description: The starting count for pagination.
color_to_picture:
  name: color_to_picture
  description: Creates a new image of a specified color using the given dimensions
    and color mode through the Color-to-Picture API.
  parameters:
    type: object
    properties:
      height:
        description: The height of the image in pixels. Default is '200'.
      color:
        description: The color of the image in hex format (e.g., 'ff0000'). Default
          is 'ff0000'.
      width:
        description: The width of the image in pixels. Default is '200'.
      mode:
        description: The mode of the image (e.g., 'L', 'RGB', 'RGBA'). Default is
          'RGB'.
player_stats_by_id_and_year:
  name: player_stats_by_id_and_year
  description: Retrieves official updated statistics for a given WTA (Women's Tennis
    Association) player for a specified year. The data is fetched from the Ultimate
    Tennis API.
  parameters:
    type: object
    properties:
      player_id:
        description: The unique identifier for the WTA player. The ID can be retrieved
          from the Official WTA Players Rankings endpoint.
      year:
        description: The year for which to retrieve the player's statistics (e.g.,
          2022, 2021).
flights_list_in_boundary:
  name: flights_list_in_boundary
  description: Fetches a list of flights within a specified geographical bounding
    box and returns flight information based on various optional filters.
  parameters:
    type: object
    properties:
      bl_lng:
        description: The bottom left longitude of the bounding box.
        type: integer
      tr_lat:
        description: The top right latitude of the bounding box.
        type: integer
      bl_lat:
        description: The bottom left latitude of the bounding box.
        type: integer
      tr_lng:
        description: The top right longitude of the bounding box.
        type: integer
      speed:
        description: Filter by speed. The format is min,max (e.g., "0,460").
      airline:
        description: Filter by the value of the 'ICAO' field returned in the airlines/list
          endpoint.
      altitude:
        description: Filter by altitude. The format is min,max (e.g., "0,48000").
      airport:
        description: Filter by the 'icao' field of the airport.
      reg:
        description: Filter by registration (e.g., "D-AIHV").
      limit:
        description: The maximum number of flights per response (default is 300; max
          is 300).
ec:
  name: ec
  description: Analyzes a given password based on a variety of parameters and returns
    the analysis.
  parameters:
    type: object
    properties:
      password:
        description: The password to be analyzed. It must be between 4 and 128 characters
          long.
      penalty:
        description: The penalty applied to each character that is part of a word,
          number sequence, alphabet sequence, etc. The penalty is a float number in
          the range [0, 1], with a default value of 0.25.
      outputformat:
        description: The format of the returned analysis. Allowed values are 'json',
          'xml', and 'yaml'. The default value is 'xml'.
      reqid:
        description: An identifier for this request. This string must match the regular
          expression `^(?i)[a-z0-9]{8,16}$`. If not provided, a randomly generated
          identifier will be assigned.
get_taboo_words_from_word:
  name: get_taboo_words_from_word
  description: Fetches a list of taboo words associated with the given word using
    a specified API.
  parameters:
    type: object
    properties:
      word:
        description: The word for which to retrieve taboo words.
      forbiddenwordlimit:
        description: The number of taboo words to return, defaults to 5 and has a
          maximum of 10.
regular_dice:
  name: regular_dice
  description: Roll a specified number of regular dice using the RapidAPI Dice Roll
    Simulator.
  parameters:
    type: object
    properties:
      dice:
        description: Number of dice to roll. Defaults to 3.
get_daily_influencer_posts_by_coin_ticker:
  name: get_daily_influencer_posts_by_coin_ticker
  description: Fetch daily social media posts from top influencers by a specific coin
    ticker.
  parameters:
    type: object
    properties:
      cointicker:
        description: The ticker symbol of the coin for which to retrieve influencer
          posts.
top_athletes:
  name: top_athletes
  description: Fetches the top athletes based on the provided parameters by making
    a request to the allscores API.
  parameters:
    type: object
    properties:
      langid:
        description: The language id to use in the request.
        type: integer
      timezone:
        description: The timezone name.
      limit:
        description: The number of athletes to return.
        type: integer
      sporttype:
        description: The sport type for which to fetch top athletes.
        type: integer
races:
  name: races
  description: Retrieves a list of races and session details for a specified F1 season.
  parameters:
    type: object
    properties:
      season_id:
        description: The ID of the F1 season for which to list races and session details.
        type: integer
airplanes_ordered_by_descending:
  name: airplanes_ordered_by_descending
  description: Fetches all airplanes ordered by a specified field in descending order
    from the AirplanesDB API.
  parameters:
    type: object
    properties:
      ordering:
        description: The field by which to order the airplanes in descending order.
data_by_id:
  name: data_by_id
  description: Fetches case data by ID from the MongoDB Wix API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the case to be fetched.
companies_balance_sheet_statements:
  name: companies_balance_sheet_statements
  description: Fetches the balance sheet statements of a company using the given symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol name of the company for which the balance sheet statements
          are to be fetched.
      apikey:
        description: The API key required for accessing the Financial Modeling Prep
          service.
getbycordsadv:
  name: getbycordsadv
  description: Fetch nearby electric vehicle charging stations based on given latitude
    and longitude coordinates.
  parameters:
    type: object
    properties:
      radius:
        description: Radius in miles within which to search for charging stations.
        type: integer
      lat:
        description: Latitude coordinate for the search center.
        type: integer
      lng:
        description: Longitude coordinate for the search center.
        type: integer
      access_param:
        description: Type of access for the charging stations (e.g., 'public', 'private').
          Defaults to 'public'.
      ev_connector_type_param:
        description: Type of EV connector (e.g., 'J1772'). Defaults to 'J1772'.
      ev_network_param:
        description: EV network providers to include in the search (e.g., 'Tesla,Tesla
          Destination'). Defaults to 'Tesla,Tesla Destination'.
      per_page:
        description: Number of results to return per page. Defaults to 10.
      page:
        description: Number of results to return per page. Defaults to 10.
      owner_type_param:
        description: Type of owner for the charging stations (e.g., 'all'). Defaults
          to 'all'.
latest_contracts_for_symbol:
  name: latest_contracts_for_symbol
  description: Retrieves the latest futures contracts for a given symbol for the next
    twelve months, with an optional parameter to specify a particular month.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol for which to retrieve futures contracts.
      month:
        description: The month for which to return the latest contract (default is
          7).
get_ohlc_history:
  name: get_ohlc_history
  description: Fetches the OHLC (Open, High, Low, Close) history data for a specified
    currency pair.
  parameters:
    type: object
    properties:
      symbol:
        description: The currency pair symbol for which to retrieve OHLC history.
get_number_by_country_id:
  name: get_number_by_country_id
  description: Fetches the list of currently available numbers for a given country
    ID.
  parameters:
    type: object
    properties:
      countryid:
        description: The ID of the country for which to fetch the available numbers.
manufacturing_year_detection:
  name: manufacturing_year_detection
  description: Detects the manufacturing year of the vehicle based on the provided
    VIN identifier using the Tesla VIN Identifier API.
  parameters:
    type: object
    properties:
      vin_identifier:
        description: The Vehicle Identification Number (VIN) of the vehicle to identify
          the manufacturing year for.
get_all_teas:
  name: get_all_teas
  description: Fetches all types of teas from the RapidAPI endpoint, optionally limited
    to a specified number.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of tea types to retrieve. Defaults to None.
fixtures_by_team:
  name: fixtures_by_team
  description: Fetches upcoming and in-play fixtures for a given rugby team.
  parameters:
    type: object
    properties:
      team_id:
        description: The ID of the rugby team for which to fetch fixtures.
        type: integer
equity_splits:
  name: equity_splits
  description: Fetches the splits history data for a given security from the Quotient
    API.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol of the asset to look for, e.g., `AAPL` (Apple Inc),
          `MSFT` (Microsoft Corporation).
      is_from:
        description: The query start date (supported format is YYYY-mm-dd), e.g.,
          `2019-01-01`.
      to:
        description: The query end date (supported format is YYYY-mm-dd), e.g., `2020-04-17`.
traveling_salesman:
  name: traveling_salesman
  description: Solves the Traveling Salesman Problem (TSP) using the specified profile
    and set of coordinates, leveraging the mymappi API.
  parameters:
    type: object
    properties:
      coordinates:
        description: The coordinates of the waypoints to visit, formatted as a string.
      apikey:
        description: The API key for accessing the mymappi service.
      profile:
        description: The transportation profile to use (e.g., driving, walking, cycling).
      overview:
        description: Specifies the level of detail in the returned route geometry.
          Default is 'simplified'.
      roundtrip:
        description: Determines whether the route should be a roundtrip. Default is
          None.
      destination:
        description: Specifies the destination waypoint. Default is 'any'.
      source:
        description: Specifies the source waypoint. Default is 'any'.
      geometries:
        description: The geometry format for the route. Default is 'polyline'.
      steps:
        description: Whether or not to include step-by-step directions. Default is
          None.
check_usernames_on_all_platforms:
  name: check_usernames_on_all_platforms
  description: Checks if the given username is available on various platforms using
    the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      username:
        description: The username to be checked for availability.
get_favorite_video_by_id:
  name: get_favorite_video_by_id
  description: Retrieve favorite videos by mix ID from the TikTok API.
  parameters:
    type: object
    properties:
      mixid:
        description: The ID of the mix for which to retrieve favorite videos.
        type: integer
      cursor:
        description: The cursor for pagination to get the next page of results. Defaults
          to 0.
      count:
        description: The number of videos to retrieve, with a maximum of 30. Defaults
          to 30.
get_top_tier_stays_filter:
  name: get_top_tier_stays_filter
  description: Gets top-tier stays filter from the Airbnb RapidAPI.
  parameters:
    type: object
    properties:
      languageid:
        description: Language identifier to get the response in the requested language.
          If not provided, defaults to None. To get a valid LanguageId, call the `getLanguages`
          API.
get_zip_info:
  name: get_zip_info
  description: Retrieve information about a given ZIP code using the Toolbench API.
  parameters:
    type: object
    properties:
      zipcode:
        description: The ZIP code for which the information is to be retrieved.
areas_id:
  name: areas_id
  description: Fetches area details from the Zeus API using a given area ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the area to fetch details for.
get_6_daily:
  name: get_6_daily
  description: Fetches daily stock data for a given keyword from a specified start
    date using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      startdate:
        description: The start date for the stock data in 'YYYY-MM-DD' format. Defaults
          to '2023-02-01'.
      keyword:
        description: The stock symbol or keyword to query. Defaults to 'GOOG'.
type_sustainability_get_product_involvement:
  name: type_sustainability_get_product_involvement
  description: Fetches product involvement information from the Sustainability tab
    for a given ETF or fund.
  parameters:
    type: object
    properties:
      securityid:
        description: The value of the securityId field returned in the API endpoint
          ../market/v2/get-returns.
search_by_coordinates_point:
  name: search_by_coordinates_point
  description: Search for EV charging stations near specific geographic coordinates.
  parameters:
    type: object
    properties:
      lng:
        description: Longitude of the geographic coordinates point to search nearby.
      lat:
        description: Latitude of the geographic coordinates point to search nearby.
      query:
        description: Keyword to filter the search results by a specific query, such
          as 'evgo', 'tesla', or 'chargepoint'.
      min_kw:
        description: Minimum power in kilowatts to filter the availability of connectors.
      max_kw:
        description: Maximum power in kilowatts to filter the availability of connectors.
      limit:
        description: Maximum number of results to return. Allowed values range from
          1 to 500.
      available:
        description: Filter to find EV charging stations with an available connector.
single_airplane:
  name: single_airplane
  description: Fetches details of a single airplane using its ID from the Airplane
    Database API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the airplane to retrieve details for.
        type: integer
v1_dadjokes:
  name: v1_dadjokes
  description: Fetch one or more random dad jokes from the API Ninjas Dad Jokes API
    endpoint.
  parameters:
    type: object
    properties:
      limit:
        description: The number of jokes to return. Must be a string representing
          a number between 1 and 10. Default is None.
comments_get:
  name: comments_get
  description: Fetch comments for a specific song from the database.
  parameters:
    type: object
    properties:
      artist_name:
        description: The name of the artist.
      lyric_title:
        description: The title of the song, track, or lyric.
      sm_lid:
        description: The song's lyric ID. If provided, this bypasses `artist_name`
          and `lyric_title`. Defaults to None.
      parent_id:
        description: When specified, the method will return any replies for the parent
          comment. Defaults to None.
      page:
        description: The starting page of comments. Defaults to '1'.
      page_size:
        description: The number of comments returned per page. Defaults to '25'.
      page_order:
        description: The field to order the comments by (e.g., 'date' or 'rating').
          Defaults to 'date'.
      page_sort:
        description: The order of sorting (ascending or descending, 'asc' or 'desc').
          Defaults to 'asc'.
xyz_map_tiles_for_ocean_conditions:
  name: xyz_map_tiles_for_ocean_conditions
  description: Fetches ocean condition tiles based on the specified variable and datetime
    using Wavebase API.
  parameters:
    type: object
    properties:
      variable:
        description: The ocean variable to fetch (e.g., 'VHM0' for wave significant
          height).
      datetime:
        description: The datetime for the desired observation, in the format 'YYYYMMDDHH'.
getquestionsbyexam:
  name: getquestionsbyexam
  description: Fetches exam questions for a specified exam using the Tech Exams API.
  parameters:
    type: object
    properties:
      exam:
        description: The exam identifier for which the questions are to be retrieved.
driving_directions:
  name: driving_directions
  description: Fetches driving directions and routes between specified source and
    destination coordinates using the Waze/Google API.
  parameters:
    type: object
    properties:
      source_coordinates:
        description: Geographic coordinates (latitude, longitude pair) of the starting
          point.
      destination_coordinates:
        description: Geographic coordinates (latitude, longitude pair) of the destination.
      return_route_coordinates:
        description: Whether to return the route coordinate pairs. Defaults to None.
      arrival_timestamp:
        description: Unix timestamp (seconds since epoch) of the desired arrival time.
          Defaults to None, which returns directions for the current time.
card:
  name: card
  description: Draw a card from a regular 52-card playing deck using the RapidAPI
    card draw simulator.
  parameters:
    type: object
    properties:
      suit:
        description: The suit of the card to draw (e.g., 'hearts', 'diamonds', 'clubs',
          'spades'). Default is 'all' to allow any suit.
      value:
        description: The value of the card to draw (e.g., 'A', '2', 'K'). Default
          is 'A'.
ecoweather:
  name: ecoweather
  description: Retrieve historical weather data for a specified location within a
    given date range.
  parameters:
    type: object
    properties:
      lon:
        description: Longitude of the geo-location in degrees.
        type: integer
      lat:
        description: Latitude of the geo-location in degrees.
        type: integer
      is_from:
        description: Start date in YYYY-MM-DD format.
      to:
        description: End date in YYYY-MM-DD format. Defaults to '2022-09-31'.
get_predictions_performance_statistics:
  name: get_predictions_performance_statistics
  description: Fetches the predictions performance statistics for a given query by
    making a request to the Daily Betting Tips API.
  parameters:
    type: object
    properties:
      q:
        description: The query string to filter the predictions by date. The date
          format should be "dd.MM.yyyy".
      connection:
        description: The connection type for the request. Defaults to 'keep-alive'.
      content_type:
        description: The content type for the request. Defaults to 'application/json'.
shorts_sequence:
  name: shorts_sequence
  description: Fetches a sequence of YouTube Shorts videos based on provided parameters.
  parameters:
    type: object
    properties:
      x_cachebypass:
        description: Cache bypass, the value must be '1'. Defaults to None.
      lang:
        description: Language code for localized results, e.g., 'en', 'gb', 'hi'.
          Defaults to None.
      geo:
        description: ISO 3166-2 country code of the region, e.g., 'US' (default),
          'UK', 'CA', 'IN'. Defaults to None.
      params:
        description: Sequence continuation parameter, either 'sequenceContiuation'
          from Shorts Info Endpoint's response for WHATTOWATCH or 'continuation' from
          the previous request's response. Defaults to a predefined sequence continuation
          value.
      is_id:
        description: If the params value is not available, a Shorts Video ID may be
          provided (not recommended). Defaults to None.
leagueshotactionsareasregularseason:
  name: leagueshotactionsareasregularseason
  description: Retrieve the shot actions areas for a specific basketball league tournament
    during the regular season.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The unique identifier for the tournament.
        type: integer
      seasonid:
        description: The unique identifier for the season.
        type: integer
runner_up:
  name: runner_up
  description: Fetches the runner-up team data for the given identifying parameter
    from the NCAA Final Four API.
  parameters:
    type: object
    properties:
      identifier:
        description: The identifier (e.g., year) to fetch the runner-up team data
          for.
zones_type_zoneid:
  name: zones_type_zoneid
  description: Fetches metadata for a specific zone using the National Weather Service
    API.
  parameters:
    type: object
    properties:
      zoneid:
        description: The ID of the specific zone.
titles_with_changed_episodes:
  name: titles_with_changed_episodes
  description: Retrieve a listing of titles that have changes to their episodes (new
    episodes, episode details changed, etc.) within a specified date range.
  parameters:
    type: object
    properties:
      end_date:
        description: The end date for the date range to include changes, in the format
          YYYYMMDD or YYYYMMDDHHMMSS. Hours are in 24-hour format and in Eastern Standard
          Time. Leading zeros must be used for single-digit values.
      start_date:
        description: The start date for the date range to include changes, in the
          format YYYYMMDD or YYYYMMDDHHMMSS. Hours are in 24-hour format and in Eastern
          Standard Time. Leading zeros must be used for single-digit values.
      page:
        description: The page of results to return. Defaults to 1.
      limit:
        description: The maximum number of results to return per page. Defaults to
          50.
send_a_word_to_check:
  name: send_a_word_to_check
  description: Sends a word to an API to check if it is vulgar and returns information
    about the word.
  parameters:
    type: object
    properties:
      content_type:
        description: The type of content to be specified in the query.
      word:
        description: The word to be checked for vulgarity.
top_posts_by_subreddit:
  name: top_posts_by_subreddit
  description: Fetches the top posts from a specific subreddit within a given time
    frame using the Reddit API.
  parameters:
    type: object
    properties:
      time:
        description: The time frame for fetching top posts. Options include `hour`,
          `day`, `week`, `month`, `year`, and `all`.
      subreddit:
        description: The subreddit name from which to fetch top posts, e.g., `memes`.
      cursor:
        description: A cursor for pagination to fetch additional posts. Defaults to
          None.
soundcloud:
  name: soundcloud
  description: Checks the availability of a given Soundcloud username using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      username:
        description: The Soundcloud username to check for availability.
youtube_video_details:
  name: youtube_video_details
  description: Fetches detailed information about a YouTube video using the provided
    video ID or URL.
  parameters:
    type: object
    properties:
      is_id:
        description: 'The video ID or video URL for a YouTube video. Examples include:'
leaguelastmatches:
  name: leaguelastmatches
  description: Retrieve the last matches of an American Football league for a given
    tournament and season.
  parameters:
    type: object
    properties:
      page:
        description: The zero-based page number for pagination.
        type: integer
      tournamentid:
        description: The unique tournament ID for which you want to retrieve the last
          matches.
        type: integer
      seasonid:
        description: The season ID for which you want to retrieve the last matches.
        type: integer
sport_translations:
  name: sport_translations
  description: Fetch sport translations for a given sport ID and language using the
    Pinaculo API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the sport for which translations are to be retrieved.
        type: integer
      lang:
        description: The language code in which translations should be fetched.
v1_convertcurrency:
  name: v1_convertcurrency
  description: Converts an amount of currency from one type to another using the API
    Ninjas Convert Currency API endpoint.
  parameters:
    type: object
    properties:
      amount:
        description: The amount of currency to convert.
        type: integer
      have:
        description: The currency you currently hold. Must be a 3-character currency
          code (e.g., 'USD').
      want:
        description: The currency to which you want to convert. Must be a 3-character
          currency code (e.g., 'EUR').
get_contacts:
  name: get_contacts
  description: Retrieves all contacts using the provided API key and returns the response
    in either JSON or CSV format.
  parameters:
    type: object
    properties:
      p:
        description: API Key from Sms77.io.
      json:
        description: Specifies whether to return the response in JSON format. If not
          provided, the response will be in CSV format.
reviews:
  name: reviews
  description: Fetches product reviews from the Otto data service using the provided
    parameters.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve.
      productid:
        description: The ID of the product to look up reviews for.
      sortby:
        description: The criteria to sort the reviews by. Defaults to 'newest'.
gettalks:
  name: gettalks
  description: Retrieve information about specific TED talks based on the provided
    parameters.
  parameters:
    type: object
    properties:
      is_id:
        description: ID of a desired specific talk.
      audio_lang:
        description: Return talks which their audio language is the provided language.
          The provided value should be the language slug according to the /audio_languages
          endpoint.
      speaker:
        description: Return talks which at least one of their speakers is the provided
          speaker. The provided value should be the speaker slug according to the
          /speakers endpoint.
      publish_date:
        description: Return talks which were published on TED.com only on the exact
          provided date.
      topic:
        description: Return talks which at least one of their topics is the provided
          topic. The provided value should be the topic slug according to the /topics
          endpoint.
      subtitle_lang:
        description: Return talks which have subtitles in the provided language. The
          provided value should be the language slug according to the /subtitle_languages
          endpoint.
      max_duration:
        description: Return talks which their duration in seconds is at most the provided
          value.
      to_publish_date:
        description: Return talks which were published on TED.com only before the
          provided date.
      from_publish_date:
        description: Return talks which were published on TED.com only after the provided
          date.
      min_duration:
        description: Return talks which their duration in seconds is at least the
          provided value.
      record_date:
        description: Return talks which were recorded only on the exact provided date.
      to_record_date:
        description: Return talks which were recorded only before the provided date.
      from_record_date:
        description: Return talks which were recorded only after the provided date.
get_a_specific_employee_by_employee_id:
  name: get_a_specific_employee_by_employee_id
  description: Fetches details of a specific employee by their unique employee ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique ID of the employee whose details are to be fetched.
        type: integer
get_latest_current_block:
  name: get_latest_current_block
  description: Retrieve the latest (current) block being mined on a specified blockchain.
  parameters:
    type: object
    properties:
      chain:
        description: The blockchain to get the latest block from. Defaults to None.
lookup_coordinates:
  name: lookup_coordinates
  description: Converts US latitude and longitude coordinates into local city information
    by querying the Reverse Geocode Locator API.
  parameters:
    type: object
    properties:
      lat:
        description: The latitude coordinate.
        type: integer
      long:
        description: The longitude coordinate.
session:
  name: session
  description: Fetches the session details for a given `session_id` from the Races
    endpoint on the F1 Live Motorsport Data API. This includes information such as
    drivers' times, session weather, speed traps, and session status and is updated
    throughout each session.
  parameters:
    type: object
    properties:
      session_id:
        description: The ID of the session for which details are being retrieved.
        type: integer
get_city_by_id:
  name: get_city_by_id
  description: Fetch details of a city by its ID using the RapidAPI Geography API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the city to be fetched.
companies_id_financials_exists:
  name: companies_id_financials_exists
  description: Checks if financial key figures for a company with the given identifier
    are available and returns the list of years for which these figures are available.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the company to check for financial data.
user_by_screen_name:
  name: user_by_screen_name
  description: Fetch user details from the Twitter API using a given screen name.
  parameters:
    type: object
    properties:
      username:
        description: The screen name of the Twitter user.
nearby_google:
  name: nearby_google
  description: Returns a JSON array of nearby places sorted by distance from the origin
    coordinates in ascending order.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude of the location to search nearby places.
        type: integer
      lng:
        description: Longitude of the location to search nearby places.
        type: integer
      radius:
        description: Search radius in meters. Default is 200. Maximum allowed is 50000.
top_free_ios_apps:
  name: top_free_ios_apps
  description: Retrieves a list of the top free iOS apps from the App Store using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      lang:
        description: The language code for the results (default is 'en').
      country:
        description: The country code for the results (default is 'us').
      num:
        description: The number of application results to return (default is 100,
          with a max of 200).
        type: integer
      category:
        description: The category ID to filter the applications (default is '6016').
players_photo:
  name: players_photo
  description: Retrieves the photo of a soccer player given the player's ID using
    the Soccerway API.
  parameters:
    type: object
    properties:
      player_id:
        description: The unique identifier of the soccer player.
        type: integer
post_likes:
  name: post_likes
  description: Gets the list of users who liked a specific Instagram post.
  parameters:
    type: object
    properties:
      mediaid:
        description: The unique identifier of the Instagram media (post) to retrieve
          likers for.
        type: integer
v1_timezone:
  name: v1_timezone
  description: Fetches the timezone name for the specified input location using the
    API Ninjas Timezone API.
  parameters:
    type: object
    properties:
      state:
        description: US state name or 2-letter abbreviation (for United States cities
          only).
      lon:
        description: Longitude of the desired location.
      city:
        description: City name. Defaults to 'London'.
      lat:
        description: Latitude of the desired location.
      country:
        description: Country name or 2-letter country code.
soil_history_data:
  name: soil_history_data
  description: Fetches historical soil data for a given location and date range using
    the Ambee API.
  parameters:
    type: object
    properties:
      lng:
        description: Longitude of the location.
        type: integer
      lat:
        description: Latitude of the location.
        type: integer
      startdate:
        description: The start date for the soil data in 'YYYY-MM-DD' format.
      enddate:
        description: The end date for the soil data in 'YYYY-MM-DD' format.
soil_data_by_lat_lng:
  name: soil_data_by_lat_lng
  description: Fetches the latest soil data readings for a specified latitude and
    longitude.
  parameters:
    type: object
    properties:
      lng:
        description: Longitude of the location.
        type: integer
      lat:
        description: Latitude of the location.
        type: integer
      pollutants:
        description: Specific pollutants to filter the data. Defaults to None.
      limit:
        description: Maximum number of records to retrieve. Defaults to None.
multiple_guids:
  name: multiple_guids
  description: Generate multiple GUIDs by querying an external API.
  parameters:
    type: object
    properties:
      number:
        description: The number of GUIDs to generate (must be between 0 and 1000).
production_years_by_model_id:
  name: production_years_by_model_id
  description: Retrieves the production years for a motorcycle model based on its
    model ID from the Motorcycle Specs Database API.
  parameters:
    type: object
    properties:
      modelid:
        description: The unique identifier of the motorcycle model.
matches_v2_get_commentary:
  name: matches_v2_get_commentary
  description: Fetches the commentary for a match using the provided match ID.
  parameters:
    type: object
    properties:
      eid:
        description: The match ID obtained from the .../matches/v2/list-by-league,
          .../matches/v2/list-by-date, .../matches/v2/list-live, or .../competitions/detail
          endpoints.
        type: integer
roll:
  name: roll
  description: Rolls a set of dice using an external API and returns the results.
  parameters:
    type: object
    properties:
      sides:
        description: The number of sides on the die.
        type: integer
      count:
        description: The number of times to roll each die. Defaults to 1.
      advantage:
        description: If set to True, rolls each die twice and takes the higher result.
          Defaults to None.
      modifier:
        description: A modifier to apply to the total of each die roll. Defaults to
          5.
staffs_list_by_club:
  name: staffs_list_by_club
  description: Retrieves a list of staff members for a specific club from the Transfermarket
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the club whose staff members are to be retrieved.
        type: integer
      domain:
        description: 'The domain specification for the API request. One of the following:
          com, de, be, es, it, nl, pl, pt, com.tr, world. Defaults to ''de''.'
v1_hashtag_posts_hashtag_id:
  name: v1_hashtag_posts_hashtag_id
  description: Fetches videos associated with a specific hashtag ID using the provided
    API key.
  parameters:
    type: object
    properties:
      hashtag_id:
        description: The ID of the hashtag to search for.
      count:
        description: The number of videos to retrieve. Defaults to 10.
      offset:
        description: The offset for pagination. Use the 'cursor' value from a previous
          response where 'hasMore' is 1 for the next set of results. Defaults to 0.
password_generation:
  name: password_generation
  description: Generates a set of 10 random passwords with the specified length using
    the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      length:
        description: The desired length of the passwords. Defaults to 10.
get_user_related_profiles_by_user_id:
  name: get_user_related_profiles_by_user_id
  description: Fetches related profiles for a given Instagram user ID using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      is_id:
        description: The Instagram user ID for which to fetch related profiles.
        type: integer
user_details:
  name: user_details
  description: Fetches the details of a specified Spotify user using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the Spotify user whose details are to be fetched.
stock_v2_get_financials:
  name: stock_v2_get_financials
  description: Fetches financial data for a given stock based on performance ID, report
    type, and interval.
  parameters:
    type: object
    properties:
      performanceid:
        description: Value of the performanceId field obtained from endpoints like
          /auto-complete, /get-summary, or /get-movers.
      reporttype:
        description: Type of report to retrieve. 'R' for Restated, 'A' for As originally
          reported. Defaults to 'A'.
      interval:
        description: Interval for the financial data. Choices are 'quarterly' or 'annual'.
          Defaults to 'annual'.
convert_planet_angle_to_planet_degree:
  name: convert_planet_angle_to_planet_degree
  description: Convert a planet angle to degree format using the Yawin Indian Astrology
    API.
  parameters:
    type: object
    properties:
      angle:
        description: The planet angle string to be converted (e.g., '67.34.0').
get_all_predictions:
  name: get_all_predictions
  description: Fetches all betting tips from the API with configurable parameters
    for connection, content type, sorting, and API key.
  parameters:
    type: object
    properties:
      connection:
        description: Specifies the connection type for the API request. Default is
          'keep-alive'.
      content_type:
        description: Sets the content type for the API request. Default is 'application/json'.
      sort:
        description: Criterion for sorting the betting tips. Default is '-id' for
          descending order.
teams:
  name: teams
  description: Fetches a list of teams that match the given parameters from the API.
  parameters:
    type: object
    properties:
      estimatebill:
        description: Flag indicating whether to return a cost estimate based on the
          provided parameters. Defaults to None.
      competitionstageid:
        description: The identifier of the competition stage in which teams compete.
          Use the 'Get Competitions' operation to find valid identifiers. Defaults
          to None.
      countryid:
        description: The identifier of the country from which the teams originate.
          Use the 'Get Countries' operation to find valid identifiers. Defaults to
          None.
      namelike:
        description: A full or partial name of a team (case-insensitive). Minimum
          length is 4 characters. Defaults to 'liverp'.
equity_related_indices:
  name: equity_related_indices
  description: Fetches and returns equity-related indices for a given stock slug.
  parameters:
    type: object
    properties:
      slug:
        description: The stock identifier used to fetch related indices.
      lang:
        description: The language code for the response. Defaults to 'en'.
get_items_by_query:
  name: get_items_by_query
  description: Fetch RPG item details based on provided query parameters such as rank,
    slot, rarity, name, and type from the RPG Items API.
  parameters:
    type: object
    properties:
      rank:
        description: The rank of the item (default is '1').
      slot:
        description: The inventory slot type of the item (default is 'chest').
      rarity:
        description: The rarity of the item (default is 'common').
      name:
        description: The name of the item (default is 'Linen Cloth Robe').
replies:
  name: replies
  description: Fetch replies for a given Instagram comment.
  parameters:
    type: object
    properties:
      after:
        description: The cursor value after which to fetch the replies. This can be
          obtained from the `edge_threaded_comments.page_info.end_cursor` field in
          the response from the comments endpoint.
      commentid:
        description: The unique identifier for the comment. This can be obtained from
          the `node.id` field in the response from the comments endpoint.
find_zip_codes_by_city_and_district:
  name: find_zip_codes_by_city_and_district
  description: Fetch the zip codes for a specified city and district in Poland.
  parameters:
    type: object
    properties:
      accept:
        description: Requested content type.
      city:
        description: The name of the city to search for zip codes.
      district:
        description: The district within the specified city to search for zip codes.
      x_traceid:
        description: A trace ID that is copied to the API response header. Default
          is 'optional_abc123'.
get_the_current_stock_by_exchange_code_and_stock_code:
  name: get_the_current_stock_by_exchange_code_and_stock_code
  description: Fetch the current stock data using the given exchange code and stock
    code from an API.
  parameters:
    type: object
    properties:
      stockcode:
        description: The stock code of the desired stock.
      exchangecode:
        description: The exchange code where the stock is listed.
exact_url:
  name: exact_url
  description: Retrieves backlinks for a specified domain using the Best Backlink
    Checker API.
  parameters:
    type: object
    properties:
      domain:
        description: The domain for which backlinks are to be retrieved.
standings:
  name: standings
  description: Fetches and returns the standings for a specified season and competition.
  parameters:
    type: object
    properties:
      season_id:
        description: The ID of the season for which the standings are to be fetched.
        type: integer
      comp_id:
        description: The ID of the competition for which the standings are to be fetched.
        type: integer
getproducts:
  name: getproducts
  description: Search for products by name and retrieves newly added items from various
    sources.
  parameters:
    type: object
    properties:
      query:
        description: The search query for the products.
      page:
        description: The page number to retrieve.
        type: integer
      country:
        description: The country code to filter the search results. Defaults to 'countryUS'.
      location:
        description: The location to filter the search results. Defaults to 'us'.
      lang:
        description: The language code to filter the search results. Defaults to 'en'.
      period:
        description: The period in days to filter newly added items. Defaults to None.
search_all_words_api:
  name: search_all_words_api
  description: Fetches King James Version (KJV) Bible verses containing all the supplied
    words from the Complete Study Bible API.
  parameters:
    type: object
    properties:
      words:
        description: Words to search for in the KJV Bible verses, separated by '%20'
          (URL encoded spaces).
download_states:
  name: download_states
  description: Downloads a list of states from the Priceline API using the provided
    parameters.
  parameters:
    type: object
    properties:
      limit:
        description: Limits the number of results returned by the API. Defaults to
          100.
      resume_key:
        description: A key to resume results from a specific ID. Defaults to None.
get_timetable:
  name: get_timetable
  description: Fetches the timetable for a given FlixBus station and date using the
    Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      station_id:
        description: ID of the FlixBus station.
      date:
        description: Date for which to fetch the timetable, in the format DD.MM.YYYY.
list_of_special_markets:
  name: list_of_special_markets
  description: Fetches a list of special markets for a given sport. This involves
    making an initial snapshot call followed by delta calls based on changes since
    a specified 'since' parameter. It can filter by whether odds are available, specific
    leagues, event types, and event IDs.
  parameters:
    type: object
    properties:
      sport_id:
        description: The ID of the sport for which to retrieve special markets.
        type: integer
      is_have_odds:
        description: If specified, filters results to only include matches with available
          odds (True) or matches that will get odds in the future (False).
      league_ids:
        description: The ID of the league to filter results.
      event_type:
        description: The type of event to filter results, either 'prematch' or 'live'.
      since:
        description: The UTC timestamp from which to return changed data.
      event_ids:
        description: The ID of the event(s) to filter results.
get_weekly_popular_books_by_genre:
  name: get_weekly_popular_books_by_genre
  description: Retrieve the most popular books from the past week based on a specified
    genre.
  parameters:
    type: object
    properties:
      genre:
        description: The genre of books to retrieve.
      number_results:
        description: The number of results to return. Defaults to 10.
annotation_versions:
  name: annotation_versions
  description: Gets the versions of an annotation from the Genius Song Lyrics API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the annotation.
      text_format:
        description: Format for text bodies related to the annotation. Options include
          `dom`, `plain`, `markdown`, and `html`. Defaults to `html`.
latest_observations:
  name: latest_observations
  description: Fetches the latest weather observations for a given location using
    the Foreca Weather API.
  parameters:
    type: object
    properties:
      location:
        description: The location for which to fetch the latest weather observations.
      lang:
        description: The language in which the results should be returned. Defaults
          to 'en'.
get_specific_pizza:
  name: get_specific_pizza
  description: Fetches a specific pizza by its ID from the RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the pizza to retrieve.
        type: integer
v1_jokes:
  name: v1_jokes
  description: Fetches a set number of jokes from the API Ninjas Jokes API endpoint.
  parameters:
    type: object
    properties:
      limit:
        description: The number of jokes to return, with a valid range of 1 to 30.
          Defaults to None, which returns a single joke.
syntax_status_syntax_ticket_get:
  name: syntax_status_syntax_ticket_get
  description: Fetch the result of a syntax check using a provided ticket from the
