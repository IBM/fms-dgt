  description: Fetches host language filters from the Airbnb API.
  parameters:
    type: object
    properties:
      languageid:
        description: The LanguageId for the desired response language. To obtain a
          LanguageId, call the getLanguages API and use the Id.
calculate_age:
  name: calculate_age
  description: Calculates the age based on the birthdate.
  parameters:
    type: object
    properties:
      birthdate:
        description: The birthdate in the format 'YYYY-MM-DD'.
permutation_count:
  name: permutation_count
  description: Calculates the number of permutations of k elements from a set of n
    elements.
  parameters:
    type: object
    properties:
      n:
        description: The total number of elements in the set.
        type: integer
      k:
        description: The number of elements to choose for the permutation.
        type: integer
transaction:
  name: transaction
  description: Fetches full data for a specific transaction on the Optimism blockchain.
  parameters:
    type: object
    properties:
      hash:
        description: The hash of the transaction to scan.
      network:
        description: The network to use (mainnet or testnet). Defaults to None.
artists_get_top_songs:
  name: artists_get_top_songs
  description: Fetches the top songs of a specified artist using the Shazam API.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the artist, which can be obtained from
          various Shazam API endpoints.
      l:
        description: The language code for the response. Defaults to 'en-US'.
auto_complete:
  name: auto_complete
  description: Fetches auto-complete suggestions for a given query using the Twitter
    API.
  parameters:
    type: object
    properties:
      query:
        description: The search query string for which to retrieve auto-complete suggestions.
properties_get_broadband:
