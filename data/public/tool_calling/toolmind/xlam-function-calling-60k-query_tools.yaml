    properties:
      namespace:
        description: The namespace to use for generating the UUIDv3. Allowed values
          are 'dns', 'url', 'oid', 'x500', and 'nil'.
      name:
        description: The name to use for generating the UUIDv3.
verify_the_captcha:
  name: verify_the_captcha
  description: Verifies the given CAPTCHA using the provided uuid and Toolbench RapidAPI
    key.
  parameters:
    type: object
    properties:
      captcha:
        description: The value of the CAPTCHA to be verified.
      uuid:
        description: The unique identifier for the CAPTCHA session.
check_if_text_contains_profanity:
  name: check_if_text_contains_profanity
  description: Check if a given text contains profanity using the Purgomalum API.
  parameters:
    type: object
    properties:
      text:
        description: The text to be checked for profanity.
count_vowels:
  name: count_vowels
  description: Counts the number of vowels in a given text.
  parameters:
    type: object
    properties:
      text:
        description: The input text.
actors_list_born_today:
  name: actors_list_born_today
  description: Fetches a list of actors and actresses born on a specific day and month
    from the Online Movie Database via the RapidAPI platform.
  parameters:
    type: object
    properties:
      month:
        description: The month of birth of the actors.
        type: integer
      day:
        description: The day of birth of the actors.
        type: integer
title_get_parental_guide:
  name: title_get_parental_guide
  description: Fetches parental guide information for a specific movie from the online
    movie database.
  parameters:
    type: object
    properties:
      tconst:
        description: The unique identifier for the movie. It should start with 'tt'
          and can be obtained from the `/title/auto-complete` or `/title/find` endpoints.
          For example, 'tt0944947'.
stock_get_key_statistics_data:
  name: stock_get_key_statistics_data
  description: Gets key statistics data for a given stock symbol and region using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol for the stock (e.g., 'AAPL' for Apple Inc.).
      region:
        description: The region for the stock market. Default is 'US'. Allowed values
          are 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB', 'S'.
gethistoricalscoresbyyear:
  name: gethistoricalscoresbyyear
  description: Fetches historical Environmental, Social, Governance and Overall scores
    for companies based on the given year.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to fetch the historical scores (must be less
          than or equal to 2020).
      content_type:
        description: The type of content to return. Default is None.
      sedol:
        description: The SEDOL identifier of the company. Default is None.
      isin:
        description: The ISIN identifier of the company. Default is None.
      companyname:
        description: The name of the company. Default is 'Apple Inc.'.
market_aggressive_small_caps:
  name: market_aggressive_small_caps
  description: Fetch data for aggressive small cap stocks with earnings growth rates
    greater than 25% using the mboum-finance API.
  parameters:
    type: object
    properties:
      start:
        description: The starting index for fetching the data. Defaults to 0.
search_api:
  name: search_api
  description: Searches for location information using the World Weather Online API.
  parameters:
    type: object
    properties:
      q:
        description: The query value for the location search.
      format:
        description: The format of the response. Defaults to None.
overview:
  name: overview
  description: Fetches summary statistics from the Papercliff API regarding the number
    of keywords found, and the number of articles and agencies reviewed.
  parameters:
    type: object
    properties:
      is_from:
        description: 'Narrows down the results to articles published after the provided
          date-time. The format should be `yyyy-MM-dd''T''HH:mm`. Example value: `2022-09-18T13:45`.
          Date-times older than a week do not affect the result.'
      to:
        description: 'Narrows down the results to articles published before the provided
          date-time. The format should be `yyyy-MM-dd''T''HH:mm`. Example value: `2022-09-18T15:30`.
          Date-times in the future do not affect the result.'
      terms:
        description: 'Narrows down the results to articles that contain all the provided
          keywords. The terms should consist of one to three words separated by a
          dash. Example value: `election-campaign`.'
locationsuggestions_v2:
  name: locationsuggestions_v2
  description: Fetches location suggestions from the Zillow API based on the given
    location query.
  parameters:
    type: object
    properties:
      location:
        description: The location query which can be a state, county, neighborhood,
          city, street name, or zip code.
activities:
  name: activities
  description: Fetches MET (Metabolic Equivalent of Task) values for various activities
    based on the given intensity level.
  parameters:
    type: object
    properties:
      intensitylevel:
        description: Level of intensity for the activity.
        type: integer
get_info_by_city:
  name: get_info_by_city
  description: Fetches geographic information for a specific city, state, and country
    using the Zippopotamus API.
  parameters:
    type: object
    properties:
      country:
        description: The country code (e.g., 'US' for the United States).
      state:
        description: The state or region code within the country.
      city:
        description: The name of the city.
numbers_translator:
  name: numbers_translator
  description: Converts a numerical text string into its spelled-out form using an
    external API.
  parameters:
    type: object
    properties:
      text:
        description: Numerical text to be converted. Defaults to '23879908709817834'.
get_all_scores:
  name: get_all_scores
  description: Retrieve a paginated list of all scores from the API.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve. Defaults to 1.
      per_page:
        description: The number of scores per page. Defaults to 3.
geteasyquestion:
  name: geteasyquestion
  description: Fetches the number of easy questions solved by a specified user from
    the LeetCode API.
  parameters:
    type: object
    properties:
      username:
        description: The LeetCode username of the user to fetch the information for.
social_media_caption:
  name: social_media_caption
  description: Generates catchy captions for social media based on the provided name
    and description.
  parameters:
    type: object
    properties:
      name:
        description: The name associated with the social media content.
      description:
        description: A brief description of the social media content.
generate_random_string:
  name: generate_random_string
  description: Generates a random string of specified length and character types.
  parameters:
    type: object
    properties:
      length:
        description: The length of the random string.
        type: integer
      uppercase:
        description: Include uppercase letters. Defaults to True.
      lowercase:
        description: Include lowercase letters. Defaults to True.
      digits:
        description: Include digits. Defaults to True.
      special_chars:
        description: Include special characters. Defaults to False.
find_duplicate_number:
  name: find_duplicate_number
  description: Finds the duplicate number in a list of integers.
  parameters:
    type: object
    properties:
      nums:
        description: The list of integers.
charts_chain:
  name: charts_chain
  description: Retrieves the historical Total Value Locked (TVL) data for a specified
    blockchain chain.
  parameters:
    type: object
    properties:
      chain:
        description: The slug identifier of the blockchain chain. This can be obtained
          from the /v1/tvl/chains endpoint or the chains property on /v1/tvl/protocols.
tsv:
  name: tsv
  description: Fetches a subset list of a dataset from the specified API along with
    its metadata.
  parameters:
    type: object
    properties:
      dataset:
        description: The identifier of the dataset to query.
      format:
        description: The output format of the data. Defaults to 'tsv'.
numerology:
  name: numerology
  description: Calculates the numerology information of a given name by making a request
    to the horoscope-astrology API using RapidAPI.
  parameters:
    type: object
    properties:
      n:
        description: The name for which numerology information is to be calculated.
states:
  name: states
  description: Fetches the list of states for a given country using the Referential
    DB API.
  parameters:
    type: object
    properties:
      countrycode:
        description: The ISO code of the country for which to get the states.
gera_vis_o_da_rua:
  name: gera_vis_o_da_rua
  description: Generates a street view image for a given CNPJ using the Toolbench
    API.
  parameters:
    type: object
    properties:
      cnpj:
        description: The CNPJ (Brazilian company identifier) for which the street
          view image is to be generated.
      fov:
        description: The field of view for the street view image. Default is None.
      height:
        description: The height of the street view image. Default is None.
      width:
        description: The width of the street view image. Default is None.
search_b:
  name: search_b
  description: Performs a search query using the SEO API on a secondary search engine.
  parameters:
    type: object
    properties:
      query:
        description: The search query string.
getzipcodebycity:
  name: getzipcodebycity
  description: Fetches the zip code information for a given city using the Zillow
    API.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city for which the zip code is to be fetched.
ticker_per_symbol:
  name: ticker_per_symbol
  description: Fetch ticker data for a specified cryptocurrency symbol in a given
    market.
  parameters:
    type: object
    properties:
      market:
        description: 'The market to retrieve data from. Possible values are: ''global''
          or ''local''.'
      symbol:
        description: The cryptocurrency symbol in the form of 'ETH<fiat>', where '<fiat>'
          is a valid ISO currency code (e.g., ETHUSD, ETHEUR).
account_balance:
  name: account_balance
  description: Fetch the Binance Coin (BNB) balance for a given address on the Binance
    Smart Chain.
  parameters:
    type: object
    properties:
      address:
        description: The address for which you want to fetch the BNB balance.
      network:
        description: The network to use, either 'mainnet' or 'testnet'. Defaults to
          None.
view_profile_picture:
  name: view_profile_picture
  description: Retrieve the full HD profile picture of a specified Instagram user
    by their username.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username of the user whose profile picture is to
          be retrieved.
stories_detail:
  name: stories_detail
  description: Fetches full story information based on the given internal ID.
  parameters:
    type: object
    properties:
      internalid:
        description: The internal ID of the story. This can be obtained from the /stories/list
          or /news/list or /news/list-by-region endpoints.
shares_float:
  name: shares_float
  description: Provides the current shares float for a given stock symbol using the
    Holistic Finance Stock Data API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to retrieve the shares float.
highlights:
  name: highlights
  description: Fetches the Instagram story highlights for a given username using the
    Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to fetch story highlights. Defaults
          to 'kimkardashian'.
get_reel_by_media_id:
  name: get_reel_by_media_id
  description: Retrieves reel information given a specific media ID from Instagram
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      media_id:
        description: The unique identifier for the Instagram media.
get_date_fact:
  name: get_date_fact
  description: Fetches a fact about a specific day of the year from the Numbers API.
  parameters:
    type: object
    properties:
      month:
        description: The 1-indexed month (e.g., '6' for June).
      day:
        description: The day of the month.
      fragment:
        description: Adds "?fragment=true" to return the fact as a sentence fragment.
          Defaults to 'True'.
      json:
        description: Specify "true" to return the result as JSON instead of plaintext.
          Defaults to 'True'.
memre_api_v1_study:
  name: memre_api_v1_study
  description: Retrieves learning items that a specific user should study using the
    Memre API.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the user for whom to retrieve learning items.
specifications_by_year_make_model:
  name: specifications_by_year_make_model
  description: Retrieves motorcycle specifications for a given make, model, and year
    from the Motorcycle Specs Database.
  parameters:
    type: object
    properties:
      make:
        description: The manufacturer of the motorcycle.
      model:
        description: The model of the motorcycle.
      year:
        description: The production year of the motorcycle.
single_contest:
  name: single_contest
  description: Fetch details of a single pageant contest by its ID from the PageantDB
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the pageant contest to fetch details for.
        type: integer
file_digest:
  name: file_digest
  description: Calculates the digest/checksum for a given file by making a request
    to the pragmavantapi via RapidAPI.
  parameters:
    type: object
    properties:
      source:
        description: The URL of the file for which the digest/checksum is to be calculated.
      cache_key:
        description: An optional cache key for quicker lookup. Defaults to None.
matchodds:
  name: matchodds
  description: Fetch the betting odds for a specific American Football match by providing
    the match ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the match for which to retrieve the betting odds.
        type: integer
yearly_cashflow_statements:
  name: yearly_cashflow_statements
  description: Fetch annual cash flow statements for a given stock symbol from the
    Freedom Finance API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to fetch annual cash flow statements.
get_realtime_rates:
  name: get_realtime_rates
  description: Gets the real-time price of a specified cryptocurrency coin using RapidAPI.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol of the cryptocurrency coin (e.g., 'BTC' for Bitcoin).
categories_list:
  name: categories_list
  description: Retrieves a list of categories from the ASOS API.
  parameters:
    type: object
    properties:
      lang:
        description: The language code, defaults to 'en-US'.
      country:
        description: The two-letter country code, defaults to 'US'.
company_details:
  name: company_details
  description: Fetch details of a company from Indeed's API.
  parameters:
    type: object
    properties:
      company_id:
        description: The unique identifier of the company to fetch details for.
      locality:
        description: The locality or country code for Indeed's subdomain. Default
          is 'us' if not provided.
registration_check:
  name: registration_check
  description: Checks vehicle registration information using the RapidAPI service.
  parameters:
    type: object
    properties:
      rego:
        description: The registration number of the vehicle to be checked.
get_new_releases:
  name: get_new_releases
  description: Fetch new album releases from Spotify for a specified country.
  parameters:
    type: object
    properties:
      country:
        description: 'A standardized country code (e.g., ''US'' for United States,
          ''CA'' for Canada). Full list of supported country codes includes: AD, AE,
          AG, AL, AM, AO, AR, AT, AU, AZ, BA, BB, BD, BE, BF, BG, BH, BI, BJ, BN,
          BO, BR, BS, BT, BW, BZ, CA, CD, CG, CH, CI, CL, CM, CO, CR, CV, CW, CY,
          CZ, DE, DJ, DK, DM, DO, DZ, EC, EE, EG, ES, ET, FI, FJ, FM, FR, GA, GB,
          GD, GE, GH, GM, GN, GQ, GR, GT, GW, GY, HK, HN, HR, HT, HU, ID, IE, IL,
          IN, IQ, IS, IT, JM, JO, JP, KE, KG, KH, KI, KM, KN, KR, KW, KZ, LA, LB,
          LC, LI, LK, LR, LS, LT, LU, LV, LY, MA, MC, MD, ME, MG, MH, MK, ML, MN,
          MO, MR, MT, MU, MV, MW, MX, MY, MZ, NA, NE, NG, NI, NL, NO, NP, NR, NZ,
          OM, PA, PE, PG, PH, PK, PL, PS, PT, PW, PY, QA, RO, RS, RW, SA, SB, SC,
          SE, SG, SI, SK, SL, SM, SN, SR, ST, SV, SZ, TD, TG, TH, TJ, TL, TN, TO,
          TR, TT, TV, TW, TZ, UA, UG, US, UY, UZ, VC, VE, VN, VU, WS, XK, ZA, ZM,
          ZW.'
      limit:
        description: Maximum number of album releases to return (default is 20; maximum
          allowed is 50).
      offset:
        description: The number of items to skip before starting to collect the result
          set (default is 0).
shazam_songs_get_details:
  name: shazam_songs_get_details
  description: Fetches song details from the Shazam API using a given song ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The value of the 'id' field returned by the /search endpoint
          on Shazam.
      locale:
        description: The language code (default is 'en-US').
get_radio_playlist:
  name: get_radio_playlist
  description: Fetches a radio playlist for a given artist or song using the Spotify
    API.
  parameters:
    type: object
    properties:
      uri:
        description: The URI of the artist or song for which to generate the radio
          playlist.
get_job_by_task_id:
  name: get_job_by_task_id
  description: Fetches the job and action job status associated with the given task
    ID from the MidJourney API.
  parameters:
    type: object
    properties:
      task_id:
        description: The unique identifier for the task. This ID will expire 24 hours
          after its creation.
gettraining:
  name: gettraining
  description: Fetches the training status based on the given training UUID and API
    keys.
  parameters:
    type: object
    properties:
      x_api_key:
        description: API key for the Dream Diffusion service.
      training_uuid:
        description: Unique identifier of the training whose status is being queried.
data_from_to_number:
  name: data_from_to_number
  description: Performs a data unit conversion from one unit to another using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      number:
        description: The numerical value to be converted.
        type: integer
      to:
        description: The unit to convert the number to.
      is_from:
        description: The unit of the numerical value being converted from.
search_content:
  name: search_content
  description: Searches for content based on a provided query using the RapidAPI content
    extractor.
  parameters:
    type: object
    properties:
      query:
        description: The search query string.
latest:
  name: latest
  description: Retrieves the latest status of a parcel using the provided parcel ID.
  parameters:
    type: object
    properties:
      colisid:
        description: The ID of the parcel to track.
get_u_54_athlete_ranking:
  name: get_u_54_athlete_ranking
  description: Fetches the under-54 athlete ranking for Taekwondo from the provided
    RapidAPI service.
  parameters:
    type: object
    properties:
      country:
        description: The country to filter the athlete rankings. Defaults to None.
user_followers_list:
  name: user_followers_list
  description: Fetches the list of followers for a TikTok user using the provided
    API parameters.
  parameters:
    type: object
    properties:
      fresh:
        description: If set to 1, forces the API to return fresh data instead of cached
          data. Defaults to 0.
      sec_uid:
        description: A secure user ID that can be obtained from the User Information
          endpoint. Using `sec_uid` makes the request faster than using `username`.
      max_cursor:
        description: Pagination cursor for fetching the next batch of followers.
      limit:
        description: Number of follower records to return. The default is 100, and
          the maximum is 100.
      username:
        description: TikTok username, such as 'amazon'. Using `sec_uid` instead of
          `username` will result in a faster request. Defaults to 'tiktok'.
rising_popular_posts:
  name: rising_popular_posts
  description: Fetches rising popular posts from a specified Reddit API endpoint.
  parameters:
    type: object
    properties:
      cursor:
        description: A string to paginate through results. Defaults to None.
matchmaking_matches:
  name: matchmaking_matches
  description: Fetch recent matchmaking matches with optional pagination and result
    limit.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of match results to return. Default is 50.
        type: integer
      page:
        description: The page number for pagination, each containing 50 results. Default
          is 0.
        type: integer
season_wins_leaderboard_mw_2:
  name: season_wins_leaderboard_mw_2
  description: Fetches season wins information for a specified number of players on
    the MW 2 leaderboard.
  parameters:
    type: object
    properties:
      limit:
        description: Number of players to fetch the leaderboard information for, ranging
          from 1 to 2000.
        type: integer
      season:
        description: The season for which to fetch the wins information. Defaults
          to 's1'.
get_game:
  name: get_game
  description: Returns game data for a given game ID using the specified RapidAPI
    key.
  parameters:
    type: object
    properties:
      gameid:
        description: The unique identifier of the game to retrieve data for.
trend_id:
  name: trend_id
  description: Fetches trending topics from Twitter based on a given "Where On Earth
    IDentifier" (WOEID) using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      woeid:
        description: The Yahoo! Where On Earth IDentifier (WOEID) for which to get
          trending topics.
        type: integer
retrieving_assets:
  name: retrieving_assets
  description: Retrieve a list of assets from the OpenSea API with various filter
    parameters.
  parameters:
    type: object
    properties:
      owner:
        description: The wallet address of the owner of the assets. Default is None.
      order_direction:
        description: The order of the results. Can be 'asc' or 'desc'. Default is
          'desc'.
      asset_contract_address:
        description: The contract address for the assets. Default is None.
      limit:
        description: The number of assets to return. Default is 20.
      collection_slug:
        description: The collection slug to filter assets. Default is None.
      cursor:
        description: A cursor to paginate results. Default is None.
      token_ids:
        description: Specific token IDs to filter assets. Default is None.
      asset_contract_addresses:
        description: Specific contract addresses to filter assets. Default is None.
      collection:
        description: The collection name to filter assets. Default is 'ongakucraft'.
      include_orders:
        description: Whether to include order information for the assets. Default
          is None.
      collection_editor:
        description: The editor of the collection to filter assets. Default is None.
get_article_by_sid:
  name: get_article_by_sid
  description: Retrieve the content of a news article based on the given article ID
    (`sid`).
  parameters:
    type: object
    properties:
      sid:
        description: The article ID for the news article to be retrieved.
        type: integer
articles:
  name: articles
  description: Fetches articles from a specified newspaper using the RapidAPI service.
  parameters:
    type: object
    properties:
      newspaper_id:
        description: The ID of the newspaper from which to fetch articles.
dashboard:
  name: dashboard
  description: Fetches the deployment and response dashboard for a specified survey
    using provided credentials and API keys.
  parameters:
    type: object
    properties:
      login_id:
        description: The login identifier for accessing the survey methods API.
      api_key:
        description: The API key associated with the user account.
      survey_code:
        description: The code identifying the specific survey whose dashboard is being
          fetched.
topic:
  name: topic
  description: Fetches topics from the Quotes Diffusion API with optional pagination
    and search functionality.
  parameters:
    type: object
    properties:
      page:
        description: Page number for pagination. Defaults to None.
      search:
        description: Custom search term to filter topics. Defaults to None.
getdetails:
  name: getdetails
  description: Fetch the details associated with a given Australian Business Number
    (ABN) from the katzion-test API.
  parameters:
    type: object
    properties:
      abn:
        description: The Australian Business Number to fetch details for.
race_detail_info:
  name: race_detail_info
  description: Fetch detailed race information and odds comparator using the Race
    ID and RapidAPI key.
  parameters:
    type: object
    properties:
      id_race:
        description: The unique identifier of the race to get details for.
get_scores_for_given_date:
  name: get_scores_for_given_date
  description: Fetches the list of football match scores for a given date using the
    specified API.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch the football scores, in the format
          %Y-%m-%d (e.g., '2022-12-01').
series_get_venues:
  name: series_get_venues
  description: Fetches the venues for a given cricket series using the Series ID.
  parameters:
    type: object
    properties:
      seriesid:
        description: The unique identifier for the series, obtainable from the `/series/list`
          or `/series/list-archives` endpoints.
        type: integer
player_statistics_seasons:
  name: player_statistics_seasons
  description: Fetch the season statistics for a given player using the SofaScores
    API.
  parameters:
    type: object
    properties:
      player_id:
        description: The unique identifier for the player whose statistics are to
          be fetched.
        type: integer
solat_time:
  name: solat_time
  description: Fetches and returns the prayer times for a given zone using the Waktu
    Solat API.
  parameters:
    type: object
    properties:
      code:
        description: The zone code to get the prayer times for. This code can be obtained
          from the /solat/list endpoint of the API.
get_company_domain:
  name: get_company_domain
  description: Retrieve the domain associated with a given company name using the
    Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      company_name:
        description: The name of the company whose domain is to be retrieved.
get_channel_points_context:
  name: get_channel_points_context
  description: Fetches the channel points context for a given Twitch channel using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      channel:
        description: The name of the Twitch channel for which to fetch the channel
          points context.
stock_get_net_income:
  name: stock_get_net_income
  description: Fetches the net income of a given stock symbol from the Yahoo Finance
    API.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: The region of the stock market. Defaults to 'US'. Allowed values
          are 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB', and
          'S'.
calendar_events:
  name: calendar_events
  description: Fetches the calendar events for a particular stock symbol using the
    Yahoo Finance API via RapidAPI.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol to fetch calendar events for.
get_voice:
  name: get_voice
  description: Generates a voice response from the given text using the Anime Voice
    Waifu AI via RapidAPI.
  parameters:
    type: object
    properties:
      text:
        description: The text to be converted into voice.
      speaker:
        description: The speaker's voice to use for conversion. Defaults to None.
fast_language_detection:
  name: fast_language_detection
  description: Detects the language of a given text using the RapidAPI Translate API.
  parameters:
    type: object
    properties:
      text:
        description: The text for which to detect the language.
tokens:
  name: tokens
  description: Retrieves a list of tokens and their contract information based on
    the specified blockchain network.
  parameters:
    type: object
    properties:
      network:
        description: The name of the blockchain network. Supported networks include
          arbitrum, aurora, avalanche, bsc, cronos, ethereum, fantom, harmony, heco,
          kcc, metis, moonriver, oasisemerald, optimism, polygon, and telos.
competitions_matches:
  name: competitions_matches
  description: Retrieves the current matches for a specified league and season using
    the Zeus API.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier for the league.
      year:
        description: The season year to retrieve matches for. Defaults to '2021'.
      round:
        description: The round number of the matches to retrieve. Defaults to '24'.
get_trend_keyword:
  name: get_trend_keyword
  description: Retrieve trending keywords for a specific date and geographic location
    using the given RapidAPI key.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve trending keywords. Defaults to
          '2023-05-18'.
      geo:
        description: The geographic location for which to retrieve trending keywords.
          Defaults to 'US'.
license_plate_lookup:
  name: license_plate_lookup
  description: Perform a license plate lookup using the provided license plate number
    and state code.
  parameters:
    type: object
    properties:
      license_plate:
        description: The license plate number to look up.
      state_code:
        description: The state code where the license plate is registered (e.g., 'TX'
          for Texas).
get_answer_to_question:
  name: get_answer_to_question
  description: Fetches the answer to a given question from the Question Answered API
    using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      questionasked:
        description: The question to be answered.
actors_get_all_images:
  name: actors_get_all_images
  description: Returns all images of a specific actor or actress based on their unique
    identifier (nconst).
  parameters:
    type: object
    properties:
      nconst:
        description: The unique identifier of the actor/actress. It typically starts
          with 'nm' followed by a series of numbers (e.g., 'nm0001667').
points_point_forecast:
  name: points_point_forecast
  description: Fetches weather forecast data for a specific geographic point using
    the National Weather Service API.
  parameters:
    type: object
    properties:
      point:
        description: Geographic coordinate in the format 'latitude,longitude' (EPSG:4326).
current_air_quality:
  name: current_air_quality
  description: Fetches the current air quality conditions for a given location specified
    by its longitude and latitude.
  parameters:
    type: object
    properties:
      lon:
        description: Longitude of the location for which to retrieve air quality data.
      lat:
        description: Latitude of the location for which to retrieve air quality data.
get_all_teams:
  name: get_all_teams
  description: Retrieves all NBA teams for the current season from the free-nba API,
    with optional pagination.
  parameters:
    type: object
    properties:
      page:
        description: The page number for pagination. Defaults to '0'.
get_episode_downloadable_audio:
  name: get_episode_downloadable_audio
  description: Fetches the full details of a given podcast episode. Provides a downloadable
    URL of the full audio if available.
  parameters:
    type: object
    properties:
      episodeid:
        description: The unique identifier for the podcast episode.
nitrous_endpoint:
  name: nitrous_endpoint
  description: Sends a GET request to the Nitrous Oxide API and returns the response
    data.
  parameters:
    type: object
    properties:
      nitrous:
        description: An optional query parameter to filter the results based on nitrous
          oxide levels.
chat:
  name: chat
  description: Communicates with the AI chatbot via RapidAPI and returns the chatbot's
    response.
  parameters:
    type: object
    properties:
      uid:
        description: User Identification for personalized response and response continuity.
      message:
        description: Message that the chatbot has to respond to.
count:
  name: count
  description: Count the number of steps in the delivery history of a package, useful
    for limiting network consumption or resources on an IoT.
  parameters:
    type: object
    properties:
      colisid:
        description: The identifier of the package.
checkthatphone:
  name: checkthatphone
  description: Validates a given United States phone number and optionally checks
    its details like carrier look-up, line type, portability status, geoIP, and timezone
    using an external API service.
  parameters:
    type: object
    properties:
      phone:
        description: The United States phone number to validate.
      ip:
        description: The IP address to associate with the request. Defaults to '172.95.90.55'.
get_deals:
  name: get_deals
  description: Fetch Amazon deals with optional filters for country, language, and
    category.
  parameters:
    type: object
    properties:
      countrycode:
        description: The country code to filter deals by. Defaults to 'US'.
      languagecode:
        description: The language code to filter deals by. Defaults to 'EN'.
      categoryid:
        description: The category ID to filter deals by. If not provided, deals from
          all categories are returned.
praise:
  name: praise
  description: Send a praise message for a person using HumorAPI.
  parameters:
    type: object
    properties:
      reason:
        description: The reason for the praise.
      name:
        description: The name of the person to be praised.
google_fake_autocomplete:
  name: google_fake_autocomplete
  description: Generate a fake Google autocomplete suggestion using three input texts.
  parameters:
    type: object
    properties:
      text1:
        description: The first text input for the autocomplete query.
      text3:
        description: The third text input for the autocomplete query.
      text2:
        description: The second text input for the autocomplete query.
check_user_exists:
  name: check_user_exists
  description: Checks if a user exists on the Waifu service by user ID using the Toolbench
    RapidAPI key.
  parameters:
    type: object
    properties:
      user_id:
        description: The unique identifier of the user to check.
get_hillshading_tile:
  name: get_hillshading_tile
  description: Fetches a hillshading raster tile as a PNG.
  parameters:
    type: object
    properties:
      x:
        description: The x coordinate of the tile.
        type: integer
      version:
        description: The version of the hillshading tile, either 'v1' or 'v2'.
      z:
        description: The zoom level of the tile.
        type: integer
      y:
        description: The y coordinate of the tile.
        type: integer
ott_providers:
  name: ott_providers
  description: Fetch information on OTT platforms supported in a given region.
  parameters:
    type: object
    properties:
      region:
        description: The region to get OTT platform information for. Use 'US' for
          USA and 'IN' for India.
getlatestbyedinetcode:
  name: getlatestbyedinetcode
  description: Fetch the latest securities report data for a company specified by
    its EDINET code using the RapidAPI service.
  parameters:
    type: object
    properties:
      edinet_code:
        description: The EDINET code of the company to fetch data for.
fixtures_by_date:
  name: fixtures_by_date
  description: Fetches cricket fixtures for a given date using the RapidAPI service.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch cricket fixtures, in the format 'YYYY-MM-DD'.
yearly_balance_sheets:
  name: yearly_balance_sheets
  description: Fetches the annual balance sheet statements for a given stock symbol
    using the Toolbench API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to fetch the annual balance sheet
          statements.
yh_historical:
  name: yh_historical
  description: Retrieves the historical data for a given stock ticker within specified
    date ranges.
  parameters:
    type: object
    properties:
      ticker:
        description: The ticker symbol of the stock.
      sdate:
        description: The start date for retrieving historical data in YYYY-MM-DD format.
      edate:
        description: The end date for retrieving historical data in YYYY-MM-DD format.
v1_category:
  name: v1_category
  description: Fetches a list of trending categories from the Tokapi Mobile API using
    specified query parameters.
  parameters:
    type: object
    properties:
      count:
        description: Number of categories to fetch. Defaults to 10.
        type: integer
      offset:
        description: Offset for pagination. Defaults to 0.
        type: integer
      region:
        description: Region code for filtering categories. Defaults to 'US'.
theme_detail:
  name: theme_detail
  description: Fetches the details of a theme using its ID from the specified API.
  parameters:
    type: object
    properties:
      dtid:
        description: The ID of the theme to be fetched.
        type: integer
veiculo_tipo:
  name: veiculo_tipo
  description: Fetches vehicle brands for the specified type of vehicle from the Veiculos
    API.
  parameters:
    type: object
    properties:
      veiculo_tipo:
        description: The type of vehicle for which to fetch brands. Possible values
          are "carros", "motos", and "caminhoes".
get_by_origin:
  name: get_by_origin
  description: Fetches plants by their origin using the specified RapidAPI key.
  parameters:
    type: object
    properties:
      origin:
        description: The origin of the plants to retrieve. Default is 'Asia'.
get_vessels_by_ship_name:
  name: get_vessels_by_ship_name
  description: Fetches vessel information based on the given ship name using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      name:
        description: The name of the ship for which to retrieve vessel information.
estimate_transaction_fee_v2:
  name: estimate_transaction_fee_v2
  description: Estimate the transaction fee for a given confirmation target on a specified
    blockchain.
  parameters:
    type: object
    properties:
      confirmationtarget:
        description: Number of blocks within which the transaction should be confirmed.
        type: integer
      blockchain:
        description: Name of the blockchain for which the transaction fee is being
          estimated.
      conservative:
        description: If set to True, enables conservative fee estimation mode for
          Bitcoin-like blockchains. If False, enables economical mode. This parameter
          has no effect on Ethereum-like blockchains. Default is None.
getpagespeed:
  name: getpagespeed
  description: Fetch the page or website loading speed for a given URL using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the page or website to check the loading speed.
nearest_stations:
  name: nearest_stations
  description: Return the nearest alternative fuel stations within a specified location
    or coordinates.
  parameters:
    type: object
    properties:
      format:
        description: The response format (json, xml, etc.).
      location:
        description: A free-form input describing the address of the location. Default
          is '433 Bryant St., San Francisco'.
      latitude:
        description: The latitude of the desired location.
      longitude:
        description: The longitude of the desired location.
      radius:
        description: The radius (in miles) around the search location to search for
          stations within.
      status:
        description: Return stations that match the given status. Options are 'all',
          'E', 'P'.
      access:
        description: The accessibility type of the stations. Options are 'all', 'public',
          'private'.
      fuel_type:
        description: The type of fuel provided by the stations. Options are 'all',
          'BD', 'CNG', 'E85', 'ELEC', 'HY', 'LNG', 'LPG'. Default is 'ELEC'.
      cards_accepted:
        description: Payment methods accepted by the stations.
      owner_type:
        description: Type of ownership of the stations. Options include 'all', 'FG',
          'LG', 'P', 'SG', 'T'.
      federal_agency_id:
        description: Filter stations by the federal agency owner IDs.
      ev_network:
        description: Electric charging stations belonging to specified networks.
      ev_charging_level:
        description: Levels of electric vehicle supply equipment. Options include
          'all', '1', '2', 'dc_fast'.
      state:
        description: Return only stations within the given state. Must be provided
          as a two-character state code.
      zip:
        description: Return only stations within the given ZIP code.
      limit:
        description: The maximum number of results to return. Default is '1'.
      offset:
        description: Offset the results found to paginate the results.
project_population:
  name: project_population
  description: Projects the population size after a specified number of years.
  parameters:
    type: object
    properties:
      current_pop:
        description: The current population size.
        type: integer
      num_years:
        description: The number of years into the future to make the projection.
        type: integer
      annual_growth:
        description: The annual population growth rate as a percentage. Defaults to
          1.2.
tag_news:
  name: tag_news
  description: Fetch the latest news stories for a given tag using the BizToc RapidAPI.
  parameters:
    type: object
    properties:
      tag:
        description: The tag for which to fetch the latest news stories.
tags_trending:
  name: tags_trending
  description: Retrieve a list of trending tags for a given `page_id`, sorted by popularity.
  parameters:
    type: object
    properties:
      page_id:
        description: The ID of the page for which to retrieve trending tags.
market_growth_technology_stocks:
  name: market_growth_technology_stocks
  description: Retrieves a list of technology stocks with revenue and earnings growth
    in excess of 25% from the mboum-finance API.
  parameters:
    type: object
    properties:
      start:
        description: The starting index for the list of stocks. Defaults to 0.
crypto_convert:
  name: crypto_convert
  description: Converts a specified amount from one cryptocurrency to another using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      is_from:
        description: The cryptocurrency to convert from (default is 'ETH').
      to:
        description: The cryptocurrency to convert to (default is 'BTC').
      amount:
        description: The amount of cryptocurrency to convert (default is '100').
emailverification:
  name: emailverification
  description: Verifies an email address using the Fast Email Verifier API.
  parameters:
    type: object
    properties:
      emailsimple:
        description: The email address to be verified. Defaults to 'mbavazijoshua@gmail.com'.
get_tracks:
  name: get_tracks
  description: Fetches track information from the Spotify API for the given track
    IDs.
  parameters:
    type: object
    properties:
      ids:
        description: A string of comma-separated track IDs to fetch information for.
symbols_press_releases:
  name: symbols_press_releases
  description: Fetches a list of press releases for a given stock symbol from Seeking
    Alpha's API.
  parameters:
    type: object
    properties:
      ticker_slug:
        description: The slug representing the stock ticker symbol.
      page_number:
        description: The page number of the press releases to fetch.
        type: integer
get_balance:
  name: get_balance
  description: Retrieves the account balance for the given API key using the Sms77.io
    API through RapidAPI.
  parameters:
    type: object
    properties:
      p:
        description: Your API key from Sms77.io.
market_capitalization:
  name: market_capitalization
  description: Fetches the market capitalization of a cryptocurrency in US Dollars.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the cryptocurrency.
download_stream:
  name: download_stream
  description: Downloads or streams video information from YouTube using the provided
    RapidAPI key.
  parameters:
    type: object
    properties:
      is_id:
        description: YouTube Video ID to stream or download information.
      cgeo:
        description: Country code in ISO 3166 format of the end user. Defaults to
          None.
rgb_to_hsv:
  name: rgb_to_hsv
  description: Converts an RGB color code to an HSV color code using the Convexity
    API.
  parameters:
    type: object
    properties:
      r:
        description: Red component of the RGB color (0-255).
        type: integer
      g:
        description: Green component of the RGB color (0-255).
        type: integer
      b:
        description: Blue component of the RGB color (0-255).
        type: integer
generate_qr_code:
  name: generate_qr_code
  description: Generates a QR code for the given URL using the RapidAPI service.
  parameters:
    type: object
    properties:
      url:
        description: The URL or text to encode in the QR code.
get_by_decade:
  name: get_by_decade
  description: Fetches world population data for a specified decade using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      decade:
        description: The decade for which to fetch population data. Defaults to 10.
game_matrix_gamepk:
  name: game_matrix_gamepk
  description: Fetch detailed game information for a specific baseball game using
    its game ID (gamepk).
  parameters:
    type: object
    properties:
      gamepk:
        description: The unique identifier for a specific baseball game.
format:
  name: format
  description: Retrieve and return data in the specified format from the IP Geo Location
    and IP Reputation API.
  parameters:
    type: object
    properties:
      format:
        description: The format to display data. Can be either "json" or "xml". Defaults
          to "json".
get_tides_for_a_station:
  name: get_tides_for_a_station
  description: Retrieves tide information for a specified station ID on a given date
    using the RapidAPI NOAA Tides service.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the tide station to get information for.
      date:
        description: The date for which to retrieve tide information in YYYYMMDD format.
          Defaults to '20220625'.
weather_statistics:
  name: weather_statistics
  description: Fetches the average weather statistics for a specified location for
    the next 30 days.
  parameters:
    type: object
    properties:
      units:
        description: 'Unit system to be used. Available values are:'
      place_id:
        description: Identifier of a place. If not provided, the location can be specified
          using `lat` and `lon`.
      lon:
        description: Longitude in the format 12E, 12.3E, 12.3, or 13W, 13.2W, -13.4.
          Defaults to '-122.42282'.
      lat:
        description: Latitude in the format 12N, 12.3N, 12.3, or 13S, 13.2S, -13.4.
          Defaults to '37.81021'.
hsl_to_rgb:
  name: hsl_to_rgb
  description: Converts HSL color values to RGB color values using an external API.
  parameters:
    type: object
    properties:
      s:
        description: Saturation component of the HSL color value (0-100).
        type: integer
      h:
        description: Hue component of the HSL color value (0-360).
        type: integer
      l:
        description: Lightness component of the HSL color value (0-100).
        type: integer
email_validate:
  name: email_validate
  description: Validate a single email address in real-time using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be validated.
gethomepage:
  name: gethomepage
  description: Fetch limited radio station data to display on the homepage.
  parameters:
    type: object
    properties:
      limit:
        description: The number of radio stations to retrieve. Default is 10.
competitions:
  name: competitions
  description: Fetches information about football competitions using the Premier League
    Upcoming Matches API.
  parameters:
    type: object
    properties:
      abbr:
        description: Abbreviation of the league (default is 'EN_PR').
      name:
        description: Name of the league (default is 'Premier League').
tournament_list:
  name: tournament_list
  description: Retrieves a list of all tennis tournaments to be played in a selected
    year, based on the specified category. It provides basic information about each
    tournament such as venue, surface, and winners.
  parameters:
    type: object
    properties:
      category:
        description: 'The category of tournaments to retrieve. Options include:'
      year:
        description: The year for which to retrieve the list of tournaments.
company_balance_sheet:
  name: company_balance_sheet
  description: Retrieves the balance sheet of a public company for a specified period.
  parameters:
    type: object
    properties:
      period:
        description: Period for which to get the company's balance sheet. Can be 'QUARTERLY'
          or 'ANNUAL'.
      symbol:
        description: Stock symbol (ticker) of the company, e.g., 'MSFT' or 'AAPL'.
      language:
        description: The language to use for the results, specified as a 2-letter
          language code according to ISO 639-1. Default is 'en'.
get_financial_time_series_daily:
  name: get_financial_time_series_daily
  description: Fetches synthetic financial time series data (Date, Price Return) for
    a specified symbol and asset class.
  parameters:
    type: object
    properties:
      symbol:
        description: The symbol identifying the financial instrument (e.g., '0001').
      asset_class:
        description: The category of the financial instrument (e.g., equity, bond,
          commodity, mixed).
      size:
        description: The size of the data set to return. Options are 'compact' for
          the most recent 252 data points, or 'full' for all available data. Defaults
          to 'full'.
v1getfundlatestprice:
  name: v1getfundlatestprice
  description: Fetches the latest price of a fund using its ISIN.
  parameters:
    type: object
    properties:
      isin:
        description: The International Securities Identification Number of the fund.
getbystock:
  name: getbystock
  description: Fetches earnings data for a given stock symbol using the RapidAPI service.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which earnings data is to be retrieved.
resort_view:
  name: resort_view
  description: Fetches and returns information about a specific resort using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the resort to fetch information for.
random_skin_from_weapon:
  name: random_skin_from_weapon
  description: Retrieves information for a random Counter-Strike skin from a specified
    weapon.
  parameters:
    type: object
    properties:
      weapon_name:
        description: The name of the weapon for which to retrieve a random skin.
user_likes:
  name: user_likes
  description: Fetches the liked tweets of a specified user from the Twitter API using
    RapidAPI.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the user for whom to fetch liked tweets.
      limit:
        description: The maximum number of liked tweets to return. Defaults to 40.
      cursor:
        description: The cursor for pagination to fetch the next set of results. Defaults
          to None.
list_user_followers:
  name: list_user_followers
  description: Fetches a list of a specified user's followers on Spotify using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      userid:
        description: The ID of the user whose followers are to be listed.
get_artists:
  name: get_artists
  description: Fetch artist data from the Spotify API using provided artist IDs.
  parameters:
    type: object
    properties:
      ids:
        description: A string containing comma-separated Spotify artist IDs.
get_search_keyword:
  name: get_search_keyword
  description: Search for a keyword using RapidAPI and return related hashtags and
    places.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search for on Instagram.
get_raids_by_level:
  name: get_raids_by_level
  description: Fetches all guardian raids for a specified level.
  parameters:
    type: object
    properties:
      level:
        description: The level of the guardian raids to retrieve information for.
gamesdata:
  name: gamesdata
  description: Fetches data for a specific game using its APP_ID from the Steam Games
    Data API.
  parameters:
    type: object
    properties:
      app_id:
        description: The unique identifier for the game whose data is to be fetched.
        type: integer
get_all_videos:
  name: get_all_videos
  description: Fetches all videos associated with a specific user on Likee using the
    provided user ID and optional pagination parameters.
  parameters:
    type: object
    properties:
      uid:
        description: The unique identifier of the user whose videos are to be fetched.
          Can be found using the Get User Info endpoint.
      pagesize:
        description: The number of videos per page. Defaults to '10'.
      count:
        description: The total number of videos to be fetched. Defaults to '4'.
      page:
        description: The page number to retrieve. Defaults to '1'.
generate_uuid:
  name: generate_uuid
  description: Generates one or more UUID v4 strings with optional formatting.
  parameters:
    type: object
    properties:
      timestamp_first:
        description: If set to True, the generated UUID will have the timestamp first.
      remove_dash:
        description: If set to True, the generated UUIDs will not contain dashes.
      count:
        description: The number of UUIDs to generate. Default is '5'.
ean13:
  name: ean13
  description: Generates an EAN13 barcode as a PNG or returns an error based on a
    given 12-13 length code. For a 12-digit code, the check digit is automatically
    calculated; for a 13-digit code, the check digit is verified.
  parameters:
    type: object
    properties:
      code:
        description: A 12 or 13 character string representing the barcode.
get_post_by_id:
  name: get_post_by_id
  description: Retrieves a post by its `post_id` using the FluentMe API.
  parameters:
    type: object
    properties:
      post_id:
        description: The unique identifier of the post to retrieve.
trends:
  name: trends
  description: Fetches the latest charts data from YouTube Music for a specified country.
    The charts include top songs, top videos, top artists, and top trending videos.
    For the US, it has an additional Genres section with some genre-specific charts.
  parameters:
    type: object
    properties:
      country:
        description: ISO 3166-1 alpha-2 country code to specify the region for which
          to fetch the trending charts.
form:
  name: form
  description: Retrieve the pregame team form data for a given event using the SofaSport
    API.
  parameters:
    type: object
    properties:
      event_id:
        description: The ID of the event for which to retrieve the team form.
        type: integer
get_5_day_forecast:
  name: get_5_day_forecast
  description: Fetches the 5-day weather forecast for a specified ski resort.
  parameters:
    type: object
    properties:
      resort:
        description: The name of the ski resort for which to fetch the forecast.
      units:
        description: The units for temperature and snow depth. Accepted values are
          'i' for imperial and 'm' for metric. Defaults to 'i'.
      el:
        description: The elevation level of the mountain for which to fetch the forecast.
          Accepted values are 'top', 'mid', and 'bot'. Defaults to 'top'.
by_zip_code:
  name: by_zip_code
  description: Searches for homeless shelters in a specified zip code using the Homeless
    Shelter API.
  parameters:
    type: object
    properties:
      zipcode:
        description: The zip code in which to search for homeless shelters.
retrieve_bids:
  name: retrieve_bids
  description: Retrieve bids for a specified contract address from the Blur API.
  parameters:
    type: object
    properties:
      contractaddress:
        description: The address of the contract for which to retrieve bids.
      is_from:
        description: The starting index from which to retrieve bids. Defaults to None.
      take:
        description: The number of bids to retrieve. Defaults to None.
realtime_weather_api:
  name: realtime_weather_api
  description: Fetches current weather information based on the provided query parameter.
  parameters:
    type: object
    properties:
      q:
        description: 'Query parameter used to specify the location for which weather
          data is required. It can be in various formats such as:'
location_info:
  name: location_info
  description: Retrieve metadata for a specified location using the Foreca Weather
    API.
  parameters:
    type: object
    properties:
      location:
        description: The location for which to retrieve metadata.
astronomy_api:
  name: astronomy_api
  description: Fetches astronomical data including sunrise, sunset, moonrise, moonset,
    moon phase, and illumination in JSON format based on the provided query parameters.
  parameters:
    type: object
    properties:
      q:
        description: 'The query parameter for retrieving data. It supports various
          formats such as:'
      dt:
        description: The date for which to retrieve the astronomical data. Defaults
          to None.
webcams_list_limit_limit_offset:
  name: webcams_list_limit_limit_offset
  description: Fetches a list of webcams with optional parameters for result slicing
    and localization.
  parameters:
    type: object
    properties:
      limit:
        description: Maximum number of webcams in the result list. The maximum allowable
          value is 50.
        type: integer
      offset:
        description: Offset for the first item in the result list. Defaults to 0.
      lang:
        description: Language to localize the results. Defaults to 'en'.
      show:
        description: Content fields to be listed in the response. Defaults to 'webcams:image,location'.
getmeaning:
  name: getmeaning
  description: Retrieves the meaning of a given word using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      word:
        description: The word for which to find the meaning.
business_search:
  name: business_search
  description: Search for Yelp businesses by keyword and location, with options for
    pagination, price range, domain, and sorting order.
  parameters:
    type: object
    properties:
      location:
        description: The location to search for businesses (e.g., "New York, NY, USA").
      query:
        description: The search keyword or query (e.g., "Plumbing", "Chinese restaurants").
      start:
        description: The number of results to skip, mainly used for pagination. Default
          is 0.
      price_range:
        description: Specific price ranges to search for, specified as a comma-delimited
          list (e.g., "$,$$", "$$")
      yelp_domain:
        description: The Yelp domain to use for the search. Default is 'yelp.com'.
          Supported domains include 'yelp.com', 'yelp.com.au', 'yelp.co.nz', and others.
      sort_by:
        description: The order to sort the search results by. Default is 'RECOMMENDED'.
          Allowed values are 'RECOMMENDED', 'HIGHEST_RATED', 'REVIEW_COUNT'.
industry_list:
  name: industry_list
  description: Gets a list of industries based on the provided alias from the specified
    API.
  parameters:
    type: object
    properties:
      alias:
        description: An alias used to specify which industry list to fetch.
availability:
  name: availability
  description: Checks if a given URL is archived and currently accessible in the Wayback
    Machine.
  parameters:
    type: object
    properties:
      url:
        description: The URL to check for availability in the Wayback Machine.
      timestamp:
        description: The timestamp to look up in Wayback. If not specified, the most
          recent available capture is returned. The format of the timestamp is 1-14
          digits (YYYYMMDDhhmmss). Defaults to '20090101'.
      callback:
        description: An optional callback to produce a JSONP response. Defaults to
          None.
get_product:
  name: get_product
  description: Fetches product details from the RapidAPI endpoint using the given
    product ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the product to fetch details for.
        type: integer
series_get_points_table:
  name: series_get_points_table
  description: Fetch the points table for a given series using the Cricbuzz API.
  parameters:
    type: object
    properties:
      seriesid:
        description: The unique identifier of the cricket series for which the points
          table is to be fetched.
        type: integer
top_ranking:
  name: top_ranking
  description: Fetches the top NFT collections from OpenSea based on specified criteria.
  parameters:
    type: object
    properties:
      sortby:
        description: Criteria to sort the NFT collections. Default is 'ONE_HOUR_VOLUME'.
      time:
        description: Time period for ranking the collections. Default is 'ONE_HOUR'.
      chain:
        description: Blockchain chain to filter the collections. Default is None.
      count:
        description: Number of collections to retrieve. Default is 100.
        type: integer
stock_v2_get_short_interest:
  name: stock_v2_get_short_interest
  description: Fetches the short interest data for a given stock identified by its
    performance ID from the Morning Star API.
  parameters:
    type: object
    properties:
      performanceid:
        description: The performance ID of the stock obtained from endpoints like
          /auto-complete, /get-summary, or /get-movers.
symbols_get_option_expirations:
  name: symbols_get_option_expirations
  description: Fetches the option expiration dates for a given symbol from the Seeking
    Alpha API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol to query for option expiration data.
symbols_suggested:
  name: symbols_suggested
  description: Fetch suggested tickers based on a given ticker slug.
  parameters:
    type: object
    properties:
      ticker_slug:
        description: The ticker slug to base the suggestions on.
list_of_hotel_types:
  name: list_of_hotel_types
  description: Returns hotel type names and their translations from the Booking.com
    API.
  parameters:
    type: object
    properties:
      hotel_type_id:
        description: The ID of the specific hotel type to query. Defaults to None.
country_location_api:
  name: country_location_api
  description: Retrieves location data for a specified country using the Country Location
    API.
  parameters:
    type: object
    properties:
      country:
        description: Name of the country for which to retrieve location data. Defaults
          to 'canada'.
searchzodiacbysign:
  name: searchzodiacbysign
  description: Fetches information about a zodiac sign from the Zodiac API.
  parameters:
    type: object
    properties:
      sign:
        description: The zodiac sign to search for. Ensure the first letter is capitalized.
searchfollowers:
  name: searchfollowers
  description: Search the followers of a specific Instagram user based on a query.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the Instagram user whose followers will be searched.
      query:
        description: The search query to filter the followers.
aliexpress_item_description:
  name: aliexpress_item_description
  description: Fetches the detailed description of an AliExpress item using its item
    ID.
  parameters:
    type: object
    properties:
      itemid:
        description: The ID of the AliExpress item.
        type: integer
      locale:
        description: The locale for displaying titles and content in the selected
          language. Defaults to None.
search_by_keyword:
  name: search_by_keyword
  description: Obtain a list of Ikea products information based on a keyword.
  parameters:
    type: object
    properties:
      countrycode:
        description: Country code to specify the location for the search.
      keyword:
        description: Keyword to search for Ikea products.
      filters:
        description: Filters for the search in the format 'parameterId=valueId,parameterId=valueId'.
          Defaults to None.
      languagecode:
        description: Language code for the search. Defaults to 'en'.
time:
  name: time
  description: Retrieves the current time token from the PubNub Network.
  parameters:
    type: object
    properties:
      callback:
        description: JSONP callback function name.
get_author_information_by_id:
  name: get_author_information_by_id
  description: Fetch a variety of information about an author using their ID.
  parameters:
    type: object
    properties:
      author_id:
        description: The unique identifier of the author.
v1_celebrity:
  name: v1_celebrity
  description: Fetches information about celebrities using the API Ninjas Celebrity
    API.
  parameters:
    type: object
    properties:
      name:
        description: Name of the celebrity you wish to search for. This field is case-insensitive.
          Default is 'Michael Jordan'.
      min_height:
        description: Minimum height of celebrities in meters (e.g. '1.65'). Default
          is None.
      min_net_worth:
        description: Minimum net worth of celebrities. Default is None.
      nationality:
        description: Nationality of celebrities, specified as an ISO 3166 Alpha-2
          country code (e.g. 'US'). Default is None.
      max_net_worth:
        description: Maximum net worth of celebrities. Default is None.
      max_height:
        description: Maximum height of celebrities in meters (e.g. '1.80'). Default
          is None.
get_specific_insult:
  name: get_specific_insult
  description: Fetches a specific insult using the provided insult ID and RapidAPI
    key.
  parameters:
    type: object
    properties:
      is_id:
        description: The UUID for the specific insult to be retrieved.
music_videos:
  name: music_videos
  description: Fetches videos associated with a specific music ID from the TikTok
    Scraper API.
  parameters:
    type: object
    properties:
      music_id:
        description: The unique identifier of the music for which to fetch videos.
      cursor:
        description: The pagination cursor for fetching the next set of results. Default
          is '0'.
get_company_ads_count:
  name: get_company_ads_count
  description: Fetch the number of ads a specific company has posted on LinkedIn using
    the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      company_id:
        description: The unique identifier of the company whose ad count is to be
          fetched.
random_post_by_id:
  name: random_post_by_id
  description: Retrieves a fake post by its ID from the specified API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the fake post to retrieve.
        type: integer
filter_and_query_naics_description:
  name: filter_and_query_naics_description
  description: This function queries an endpoint to search by freeform text or NAICS
    code and retrieves a list of NAICS codes, hashes, and descriptions.
  parameters:
    type: object
    properties:
      naics:
        description: A 6-digit NAICS code to filter the search. If this parameter
          is provided, the `q` parameter is optional.
      q:
        description: A freeform text to search for industries. This must be at least
          3 characters long. If this parameter is provided, the `naics` parameter
          is optional.
flights_list_by_airline:
  name: flights_list_by_airline
  description: Retrieve a list of flights operated by a specified airline using the
    RapidAPI Flight Radar service.
  parameters:
    type: object
    properties:
      airline:
        description: The ICAO code of the airline whose flights are to be listed.
          This value can be obtained from the 'icao' field returned by the /airlines/list
          or /flights/detail endpoints, or the 'operator' field from the /flights/search
          endpoint.
get_city_detail:
  name: get_city_detail
  description: Fetch detailed information about a city using its name via the RapidAPI
    service.
  parameters:
    type: object
    properties:
      name:
        description: The name of the city for which details are to be fetched.
superfund_search:
  name: superfund_search
  description: Search for Superfund sites based on provided latitude, longitude, and
    radius.
  parameters:
    type: object
    properties:
      radius:
        description: The radius within which to search for Superfund sites.
      lat:
        description: The latitude coordinate for the center of the search.
      lng:
        description: The longitude coordinate for the center of the search.
get_character_by_id:
  name: get_character_by_id
  description: Fetches an individual character by ID from the Riordanverse API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the character to fetch.
        type: integer
get_by_tmdb_id:
  name: get_by_tmdb_id
  description: Fetches movie or TV show information based on a given TMDb ID.
  parameters:
    type: object
    properties:
      tm:
        description: A valid TMDb ID for the movie or TV show.
        type: integer
      m:
        description: A valid TMDb ID for the movie or TV show.
        type: integer
get_stores:
  name: get_stores
  description: Fetches a list of stores from the "Get Promo Codes" API.
  parameters:
    type: object
    properties:
      page:
        description: The page number for pagination. Defaults to 1.
search_for_a_product:
  name: search_for_a_product
  description: Searches for a product by name using the RapidAPI service.
  parameters:
    type: object
    properties:
      q:
        description: The product name or search query.
get_comments_with_product_id:
  name: get_comments_with_product_id
  description: Retrieve comments for a given product ID from the specified API.
  parameters:
    type: object
    properties:
      product_id:
        description: The ID of the product for which to retrieve comments.
navigations_get_tabs:
  name: navigations_get_tabs
  description: Fetches navigation tabs for a given language, country, and currency
    using the unofficial SHEIN API.
  parameters:
    type: object
    properties:
      language:
        description: The 2-letter language code. Defaults to 'en'.
      country:
        description: The 2-letter country code. Defaults to 'US'.
      currency:
        description: The 3-letter currency code. Defaults to 'USD'.
earnings_trend:
  name: earnings_trend
  description: Retrieves the earnings trend for a given stock ticker using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which the earnings trend is to be
          retrieved.
symbols_get_profile:
  name: symbols_get_profile
  description: Fetch summary information for a stock quote, index, exchange, etc.,
    given an issue ID.
  parameters:
    type: object
    properties:
      issueid:
        description: The value of the issueId field obtained from previous endpoints
          such as .../auto-complete or .../symbols/translate.
        type: integer
stock_get_asset_allocation:
  name: stock_get_asset_allocation
  description: Fetches the asset allocation for a given stock ticker using the Webull
    API.
  parameters:
    type: object
    properties:
      tickerid:
        description: The unique identifier for the stock ticker.
        type: integer
transform_units_using_the_get_method:
  name: transform_units_using_the_get_method
  description: Converts units using the GET method of the Unit Converter API.
  parameters:
    type: object
    properties:
      to:
        description: The unit to which the value will be converted. Default is 'Square
          mile'.
      is_from:
        description: The unit from which the value will be converted. Default is 'Square
          kilometer'.
      value:
        description: The numerical value to be converted. Default is 1.
        type: integer
v1_cars:
  name: v1_cars
  description: Fetches car details from the API Ninjas Cars API endpoint based on
    given search criteria.
  parameters:
    type: object
    properties:
      model:
        description: Model of the vehicle. Default is 'corolla'.
      max_city_mpg:
        description: Maximum city fuel efficiency in miles per gallon.
      min_comb_mpg:
        description: Minimum combined (city + highway) fuel efficiency in miles per
          gallon.
      max_hwy_mpg:
        description: Maximum highway fuel efficiency in miles per gallon.
      fuel_type:
        description: Type of fuel used. Possible values include 'gas', 'diesel', 'electricity'.
      limit:
        description: Number of results to return. Must be between 1 and 30. Default
          value is None.
      drive:
        description: Drive transmission. Possible values include 'fwd' (front-wheel
          drive), 'rwd' (rear-wheel drive), 'awd' (all-wheel drive), '4wd' (four-wheel
          drive).
      max_comb_mpg:
        description: Maximum combined (city + highway) fuel efficiency in miles per
          gallon.
      make:
        description: Vehicle manufacturer.
      transmission:
        description: Type of transmission. Possible values include 'manual', 'automatic'.
      year:
        description: Vehicle model year.
      min_hwy_mpg:
        description: Minimum highway fuel efficiency in miles per gallon.
      min_city_mpg:
        description: Minimum city fuel efficiency in miles per gallon.
      cylinders:
        description: Number of cylinders. Possible values include 2, 3, 4, 5, 6, 8,
          10, 12, 16.
cleanhydrotocarbonfootprint:
  name: cleanhydrotocarbonfootprint
  description: Calculate the CO2 equivalent (CO2e) in kilograms from the consumption
    of clean hydro energy.
  parameters:
    type: object
    properties:
      energy:
        description: The source of the clean energy. Can be 'Solar', 'Wind', 'HydroElectric',
          'Biomass', 'Geothermal', 'Tidal' or 'OtherCleanEnergy'.
      consumption:
        description: The amount of energy consumed in kWh.
get_result_from_category:
  name: get_result_from_category
  description: Fetches a random result from a specified category, including a main
    phrase and taboo words. You can control the number of taboo words returned using
    the `forbiddenwordlimit` parameter.
  parameters:
    type: object
    properties:
      category:
        description: The category from which to fetch the result.
      forbiddenwordlimit:
        description: The number of taboo words to be returned, defaults to 5 and has
          a maximum of 10.
event:
  name: event
  description: Fetches the details of a single event using its ID from the Spectation
    Sports Events API.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the event to be fetched.
        type: integer
etsy:
  name: etsy
  description: Checks if a given username is available on Etsy using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The username to be checked for availability on Etsy.
medias:
  name: medias
  description: Retrieves media posts from a specified Instagram user using the Instagram
    RapidAPI.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the Instagram user whose media posts are to be retrieved.
      batch_size:
        description: The number of media posts to retrieve in a single batch, ranging
          from 1 to 50. Defaults to 20.
      next_cursor:
        description: The cursor for fetching the next set of media posts in pagination.
          Defaults to None.
texts:
  name: texts
  description: Fetches a specified quantity of texts from the API with given locale
    and character length.
  parameters:
    type: object
    properties:
      quantity:
        description: The number of text entries to retrieve.
        type: integer
      locale:
        description: The locale code for the desired language of the texts.
      characters:
        description: The length of each text entry in characters.
        type: integer
getprojects:
  name: getprojects
  description: Fetches artificial intelligence projects from the specified page using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the projects to retrieve.
        type: integer
skill_child:
  name: skill_child
  description: Fetches child skill data from an external API using provided identifiers.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the desired child skill data. Defaults
          to 'files/198956'.
get_breed_information:
  name: get_breed_information
  description: Fetch information about a specific cat breed from the Cat Breeds API.
  parameters:
    type: object
    properties:
      breed:
        description: The name of the cat breed to fetch information for.
articles_v2_list_trending:
  name: articles_v2_list_trending
  description: Fetches a list of trending articles from the Seeking Alpha API within
    a specified date range and limits the response size.
  parameters:
    type: object
    properties:
      since:
        description: Unix timestamp to filter articles from this date onwards. Use
          together with 'until' parameter to specify a date range.
      until:
        description: Unix timestamp to filter articles up to this date. Use together
          with 'since' parameter to specify a date range.
      size:
        description: Number of items per response (max 40). Defaults to 20.
get_channel_goals:
  name: get_channel_goals
  description: Fetches the goals for a specified Twitch channel using the provided
    RapidAPI key.
  parameters:
    type: object
    properties:
      channel:
        description: The name of the Twitch channel for which to retrieve goals.
get_list_of_top_level_domains:
  name: get_list_of_top_level_domains
  description: Retrieve an exhaustive list of generic and country code top-level domains
    (TLDs).
  parameters:
    type: object
    properties:
      tlds:
        description: A comma-separated string of specific TLDs to query. If not provided,
          all TLDs are retrieved.
getlistbysecuritiescode:
  name: getlistbysecuritiescode
  description: Fetches the securities report data for a specified company using its
    securities code.
  parameters:
    type: object
    properties:
      securities_code:
        description: The securities code of the company whose report data is to be
          fetched.
        type: integer
market_get_full:
  name: market_get_full
  description: Retrieves comprehensive information about specified stock tickers using
    the Bloomberg Finance API.
  parameters:
    type: object
    properties:
      is_id:
        description: A comma-separated string of ticker IDs corresponding to the desired
          stocks. These IDs are returned by the `/market/auto-complete` endpoint.
get_litecoin_block_by_hash_or_height:
  name: get_litecoin_block_by_hash_or_height
  description: Fetches detailed information about a Litecoin block by its hash or
    height.
  parameters:
    type: object
    properties:
      hash:
        description: The hash or height of the Litecoin block you want to retrieve
          details for.
quote_get_option_fundamentals:
  name: quote_get_option_fundamentals
  description: Fetch the option fundamentals for a given stock symbol using the specified
    RapidAPI key.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to retrieve option fundamentals.
ideas_detail:
  name: ideas_detail
  description: Fetches detailed information about an ideal post based on the given
    UUID.
  parameters:
    type: object
    properties:
      uuid:
        description: The UUID of the specific post. This value is obtained from the
          `image_url` field returned in the `/ideas/list` endpoint.
      lang:
        description: The language code for the response. Defaults to 'en'.
getesgnews:
  name: getesgnews
  description: Fetch ESG (Environmental, Social, and Governance) news articles from
    a specified API. The results include ESG-specific topics such as SASB, UN SDGs,
    Modern Slavery, and Gender Equality.
  parameters:
    type: object
    properties:
      content_type:
        description: The content type for the news search. Defaults to None.
      date:
        description: The date for the news search in DD/MM/YYYY format. Defaults to
          None.
      companyname:
        description: The name of the company to search for news articles. Defaults
          to 'Apple Inc.'.
      sedol:
        description: The SEDOL (Stock Exchange Daily Official List) number to use
          for the news search. Defaults to None.
      isin:
        description: The ISIN (International Securities Identification Number) to
          use for the news search. Defaults to None.
stock_v2_get_valuation:
  name: stock_v2_get_valuation
  description: Fetches the valuation data for a given stock using its performance
    ID.
  parameters:
    type: object
    properties:
      performanceid:
        description: The value of the performanceId field from endpoints like /auto-complete,
          /get-summary, or /get-movers. It specifies the stock for which to fetch
          the valuation data.
emailfinder:
  name: emailfinder
  description: Finds the most likely email address based on the provided domain name,
    first name, and last name using the Tomba RapidAPI.
  parameters:
    type: object
    properties:
      domain:
        description: The domain name to search for the email address (e.g., "stripe.com").
      first_name:
        description: The first name of the person.
      last_name:
        description: The last name of the person.
countpages:
  name: countpages
  description: Counts the number of website pages indexed by Google for a given URL
    using the specified RapidAPI service.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the website to check the number of indexed pages.
cards:
  name: cards
  description: This function draws multiple cards from a regular 52-card playing deck
    using the Card Draw Simulator API.
  parameters:
    type: object
    properties:
      value:
        description: The value of the card(s) to draw (e.g., 'A', '2', '3', ... 'K').
          Defaults to 'all'.
      suit:
        description: "The suit of the card(s) to draw (e.g., '\u2660', '\u2663', '\u2665\
          ', '\u2666'). Defaults to '\u2660'."
      back:
        description: Indicates whether to draw the back of the card. Defaults to 'false'.
      pulls:
        description: The number of cards to draw. Defaults to '10'.
interests:
  name: interests
  description: Fetches interests from the specified API using the given parameters.
  parameters:
    type: object
    properties:
      lang:
        description: The language code for the response (default is 'ta').
competitions_get_short_info:
  name: competitions_get_short_info
  description: Fetches short information about one or more competitions based on the
    provided IDs and domain from the TransferMarket API.
  parameters:
    type: object
    properties:
      ids:
        description: The IDs of the competitions to fetch information for. Multiple
          IDs should be separated by commas (e.g., 'L1,L2,L3,GB1,ES1,IT1').
      domain:
        description: The domain for the request, which can be one of 'com', 'de',
          'be', 'es', 'it', 'nl', 'pl', 'pt', 'com.tr', or 'world'. Defaults to 'de'.
business_units_get_web_links:
  name: business_units_get_web_links
  description: Fetches web links of a business unit using the TrustPilot API.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the business unit, obtained from the
          /business-units/search or /business-units/search-by-domain endpoint.
      locale:
        description: The locale code for the response. Defaults to 'en-US'.
upvote_riddle:
  name: upvote_riddle
  description: Registers an upvote for a riddle using the Riddlie API. This function
    sends a GET request to the Riddlie API to upvote a riddle identified by `is_id`.
    The upvote helps in better serving the riddles in the future.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the riddle to upvote.
full_data:
  name: full_data
  description: Fetches data from the RapidAPI based on the provided keyword, optional
    full data, and API key parameters.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search for in the API.
      fulldata:
        description: Optional parameter to specify the type of full data. Defaults
          to 'digital marketing'.
get_order:
  name: get_order
  description: Retrieves an order based on the given order ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the order to retrieve.
tangga_lagu:
  name: tangga_lagu
  description: Fetches the top tracks from the specified music chart.
  parameters:
    type: object
    properties:
      index:
        description: The starting index of the track list.
        type: integer
      num:
        description: The number of tracks to retrieve.
        type: integer
      lang:
        description: The language of the tracks.
      country:
        description: The country of the music chart.
      is_id:
        description: The unique identifier for the specific music chart.
        type: integer
artist_related:
  name: artist_related
  description: Fetches related artists information from the Spotify API using a given
    artist ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The Spotify artist ID for which to find related artists.
stock_get_annual_avg_div_yield:
  name: stock_get_annual_avg_div_yield
  description: Fetches the annual average dividend yield for a given stock symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: The region code for the stock market. Default is 'US'. Allowed
          values are 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB',
          'S'.
coins_search:
  name: coins_search
  description: Search for available cryptocurrencies that match a given string.
  parameters:
    type: object
    properties:
      string:
        description: A word or name to search for relevant cryptocurrencies.
      time_utc_offset:
        description: UTC offset value in seconds (default is 28800, representing UTC+8).
      lang_id:
        description: Language ID value, with a default of 1, corresponding to the
          all_langs/lang_ID returned from the get-meta-data endpoint.
earnings:
  name: earnings
  description: Fetches the player earnings for a given tournament ID and year.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to fetch earnings data.
      tournid:
        description: The ID of the tournament for which to fetch earnings data.
get_standings:
  name: get_standings
  description: Fetches the standings for a given tournament from the League of Legends
    Esports API.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The ID of the tournament for which standings are to be fetched.
email_format:
  name: email_format
  description: Validates the format of an email using the RapidAPI email-checkup service.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be validated.
commonports:
  name: commonports
  description: Fetches registered service names and transport protocol port numbers
    based on given parameters using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      port:
        description: The port number to query for (default is '53').
      protocol:
        description: The transport protocol to query for (default is 'tcp').
      service:
        description: The service name to query for (default is None).
get_all_brands:
  name: get_all_brands
  description: Fetches all available brands from the iHerb Product Data API for a
    given page number.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve brands from.
        type: integer
get_new_hashtags:
  name: get_new_hashtags
  description: Fetches 1000 newly generated Instagram hashtags based on the specified
    page number.
  parameters:
    type: object
    properties:
      page:
        description: The page number for the hashtag query, ranging from 0 to 9.
block:
  name: block
  description: Fetches detailed data from a specified block on the Optimism blockchain
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      block:
        description: The block identifier to retrieve data for.
      network:
        description: The network to query ('mainnet' or 'testnet'). Defaults to None.
token:
  name: token
  description: Generates an OAuth token from the RapidAPI 'OAuth Echo' endpoint.
  parameters:
    type: object
    properties:
      client_secret:
        description: The client's secret key. Defaults to None.
      client_id:
        description: The client's ID. Defaults to None.
subtitlelist:
  name: subtitlelist
  description: Fetches a list of subtitles for a given YouTube video.
  parameters:
    type: object
    properties:
      videoid:
        description: The unique identifier for the YouTube video.
      locale:
        description: The locale for the subtitles. Defaults to 'EN'.
get_lexical_field:
  name: get_lexical_field
  description: Retrieves the lexical field for a given word using the Dicolink API.
  parameters:
    type: object
    properties:
      mot:
        description: The word for which the lexical field is to be retrieved.
      limite:
        description: The limit on the number of results to be retrieved (default is
          '20').
iso:
  name: iso
  description: Retrieves the ISO codes for a given country using the Metropolis API.
  parameters:
    type: object
    properties:
      country:
        description: The name of the country for which to get the ISO codes.
aliexpress_item_detail_2:
  name: aliexpress_item_detail_2
  description: Fetch detailed information for a specific AliExpress item.
  parameters:
    type: object
    properties:
      itemid:
        description: The AliExpress product ID.
        type: integer
      currency:
        description: The currency in which to display the product price. Valid values
          are listed in the 'Currency List' at the 'Base' group endpoints.
      region:
        description: The region to accurately get shipping costs and other promotions
          specific to a geographic location. Valid values are listed in the 'Country
          List' at the 'Base' group endpoints.
      locale:
        description: The locale to display titles and other content in the selected
          language. Valid values are listed in the 'Locale List' at the 'Base' group
          endpoints.
bestbuyproductdata:
  name: bestbuyproductdata
  description: Fetches product data from Best Buy based on the search keyword and
    page number.
  parameters:
    type: object
    properties:
      keyword:
        description: The search term to look for products, e.g., "iphone", "ps5",
          "sony tv".
      page:
        description: The page number to retrieve, starting from 1.
        type: integer
hashtag_feed_video_posts_v2:
  name: hashtag_feed_video_posts_v2
  description: Fetches video posts related to a specific hashtag from a social media
    platform, providing metadata such as direct URLs, statistics, and more.
  parameters:
    type: object
    properties:
      name:
        description: Hashtag name to filter videos. Defaults to 'summer'.
      limit:
        description: Maximum number of records to return. Defaults to 20; the maximum
          is 20.
      max_cursor:
        description: Pagination cursor to fetch more videos. Use the value received
          from the previous request for continued pagination.
get_search_user:
  name: get_search_user
  description: Fetches the search result for a specific username from the TikTok User
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The username or ID to search for.
getlensitem:
  name: getlensitem
  description: Fetches lens item information from the Snapchat RapidAPI using the
    provided lens ID and API key.
  parameters:
    type: object
    properties:
      lens_id:
        description: The ID of the lens item to retrieve.
insult:
  name: insult
  description: Generate an insult for a person based on a given reason using the Humor
    API.
  parameters:
    type: object
    properties:
      reason:
        description: The reason for the insult.
      name:
        description: The name of the person to insult.
get_airport_details_by_code:
  name: get_airport_details_by_code
  description: Retrieves comprehensive information about an airport based on its IATA
    code using the "Get Airport Details By Code" API.
  parameters:
    type: object
    properties:
      code:
        description: The IATA code of the airport to retrieve details for.
game_odds_by_category_schedule:
  name: game_odds_by_category_schedule
  description: Fetches the schedule of game odds for a given sport and category from
    the sportsbook-odds API.
  parameters:
    type: object
    properties:
      category:
        description: The category of the odds. For example, 0 for moneylines, 1 for
          spreads, 2 for over/under, etc.
      sport:
        description: The sport for which to fetch the game odds schedule.
teamnearmatches:
  name: teamnearmatches
  description: Fetches the near matches for a specific baseball team using the team
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The team ID for which to retrieve the near matches.
        type: integer
dinner_ingredient:
  name: dinner_ingredient
  description: Retrieves a random dinner recipe containing the specified ingredient.
  parameters:
    type: object
    properties:
      ingredient:
        description: The ingredient which the recipe should include.
rates:
  name: rates
  description: Fetches live currency conversion rates based on the specified parameters.
  parameters:
    type: object
    properties:
      output:
        description: The output format of the response. Can be either 'JSON' or 'XML'.
          Default is 'JSON'.
      base:
        description: The base currency for conversion rates. Examples include 'USD',
          'GBP', or 'BTC'. Default is 'USD'.
stations:
  name: stations
  description: Retrieves a list of weather stations and their metadata, optionally
    filtered by parameters such as limit and states. If no parameters are provided,
    all stations are returned. The function only returns active stations.
  parameters:
    type: object
    properties:
      limit:
        description: Limit the number of results.
      states:
        description: Filter results by states (by abbreviation).
get_user_activity_pins:
  name: get_user_activity_pins
  description: Retrieve activity pins for a given Pinterest username using the Pinterest
    Scraper API.
  parameters:
    type: object
    properties:
      username:
        description: The Pinterest username for which to retrieve activity pins.
get_the_continents:
  name: get_the_continents
  description: Fetches a list of continents from the specified API endpoint.
  parameters:
    type: object
    properties:
      name:
        description: Optional continent name to filter the results.
      page:
        description: Optional page number for pagination. Defaults to '1'.
single_strain:
  name: single_strain
  description: Fetches detailed information for a single strain by its ID using the
    Weed Strain API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the strain for which details are to be fetched.
        type: integer
data_breach_checker_endpoint:
  name: data_breach_checker_endpoint
  description: Checks if the given email has been compromised in any known data breaches
    using the Data Breach Checker API.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be checked for data breaches.
city_data:
  name: city_data
  description: Fetches a list of cities using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      count:
        description: The number of cities to retrieve. Defaults to 10. Maximum value
          is 1000.
get_hsn_tsn:
  name: get_hsn_tsn
  description: Fetch HSN/TSN data for a specified car query from the HSN-TSN API.
  parameters:
    type: object
    properties:
      query:
        description: The search query for the car.
      year:
        description: The year of the car. Defaults to 2018.
web_chain_details:
  name: web_chain_details
  description: python
  parameters:
    type: object
    properties:
      chain_slug:
        description: The slug identifier for the blockchain (e.g., 'ethereum' for
          Ethereum mainnet).
v1_historicalevents:
  name: v1_historicalevents
  description: Fetches a list of up to 10 historical events that match the provided
    search parameters using API Ninjas Historical Events API.
  parameters:
    type: object
    properties:
      text:
        description: Query text to search events by. Use keywords or short phrases
          for best match results. Defaults to 'roman empire'.
      month:
        description: Integer representing the month (e.g., 3 for March). Defaults
          to None.
      day:
        description: Calendar day of the month. Defaults to None.
      year:
        description: 4-digit year (e.g., 1776). For BC/BCE years, use a negative integer
          (e.g., -351 for 351 BC). Defaults to None.
      offset:
        description: Number of results to offset (for pagination). Defaults to None.
get_hebrew_month_and_date:
  name: get_hebrew_month_and_date
  description: Fetches the Hebrew month, date, and holidays for a given Gregorian
    date.
  parameters:
    type: object
    properties:
      datestring:
        description: The Gregorian date in string format for which to get the Hebrew
          date and related information.
count_of_days:
  name: count_of_days
  description: Fetches the count of days in the current Hebrew year from a given date
    string or today's date.
  parameters:
    type: object
    properties:
      datestring:
        description: The date for which the number of days in the current Hebrew year
          is to be determined.
is_holyday:
  name: is_holyday
  description: Checks if a given date is a holyday according to the Enoch Calendar
    API and retrieves associated scriptures and Sabbath status.
  parameters:
    type: object
    properties:
      datestring:
        description: The date string to check for holyday status.
rate_by_id:
  name: rate_by_id
  description: Fetches the rate for a given cryptocurrency ID using the Crypto Exchanges
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the cryptocurrency to fetch the rate for.
account_transaction_count:
  name: account_transaction_count
  description: Retrieves the number of transactions performed by a specified address
    on the Binance Smart Chain.
  parameters:
    type: object
    properties:
      address:
        description: The blockchain address to be scanned.
      network:
        description: The network to use, either 'mainnet' or 'testnet'. Defaults to
          None.
type_portfolio_get_asset_allocation:
  name: type_portfolio_get_asset_allocation
  description: Retrieves the asset allocation for a specified security as displayed
    in the Portfolio tab.
  parameters:
    type: object
    properties:
      securityid:
        description: The security ID value returned from the market returns endpoint.
risk_free_rate:
  name: risk_free_rate
  description: Fetches the risk-free rate for a specific date, duration, and geography
    using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      duration:
        description: Duration for which the risk-free rate is to be fetched. Supported
          values are '3m' (default), '5y', and '10y'.
      geography:
        description: Geography for which the risk-free rate is to be fetched. Currently,
          only 'US' is supported. Default is 'US'.
      date:
        description: Specific date for which the risk-free rate is to be fetched in
          'YYYY-MM-DD' format. Default is '2023-05-10'.
carbonfootprintfrompublictransit:
  name: carbonfootprintfrompublictransit
  description: Calculates the CO2 emissions in kilograms from the use of public transportation
    based on the distance traveled and type of transit.
  parameters:
    type: object
    properties:
      distance:
        description: The distance traveled in kilometers.
get_schedule:
  name: get_schedule
  description: Retrieves the schedule for specified League of Legends leagues using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      leagueid:
        description: A string containing league IDs separated by '%2C' to filter schedules
          for multiple leagues.
getplatformlist:
  name: getplatformlist
  description: Fetches the list of platforms with their IDs and names from the API
    endpoint as JSON.
  parameters:
    type: object
    properties:
      page:
        description: Page number to retrieve the platform list from the API.
        type: integer
qr_code_image_generator:
  name: qr_code_image_generator
  description: Generates a QR code image for a given URL using the RapidAPI QR code
    generation service.
  parameters:
    type: object
    properties:
      url:
        description: The URL to be encoded in the QR code. Defaults to 'www.google.com'.
get_channel_links:
  name: get_channel_links
  description: Fetches the links associated with a specified channel from the Kick
    API using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      channel_name:
        description: The name of the channel to retrieve links for. Defaults to 'gmhikaru'.
models:
  name: models
  description: Search for car models based on various criteria such as year, make,
    model, make_id, and more. The results can be customized using different parameters
    to limit, sort, and filter the data.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of results to return.
      make_id:
        description: The ID of the car make to filter the results.
      year:
        description: The year to filter the car models.
      page:
        description: The page number for paginated results.
      sort:
        description: The field to sort the results by. Default is 'id'.
      make:
        description: The car make to filter the results.
      model:
        description: The car model to filter the results.
      direction:
        description: The direction for sorting ('asc' or 'desc'). Default is 'asc'.
      verbose:
        description: Whether to include detailed information like make, model, and
          trim. Default is 'yes'.
zipcode:
  name: zipcode
  description: Fetches location information based on a given ZIP code using the ToolBench
    RapidAPI.
  parameters:
    type: object
    properties:
      zipcode:
        description: The ZIP code for which to fetch location information.
ar_by_city_state:
  name: ar_by_city_state
  description: Fetches augmented reality (AR) data for a given city and state using
    the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city for which AR data is requested.
      state:
        description: The name of the state for which AR data is requested.
get_train_data_mrt_id_id_get:
  name: get_train_data_mrt_id_id_get
  description: Fetch train data using MRT ID from the RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The MRT ID to fetch the train data for.
airports_nonstop_routes_for_an_airport:
  name: airports_nonstop_routes_for_an_airport
  description: Fetches a list of nonstop routes for a specified airport using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      airportiatacode:
        description: The IATA code for the airport.
vehicle_attributes:
  name: vehicle_attributes
  description: Fetches all available options for a given vehicle attribute using the
    Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      attribute:
        description: The attribute options to be returned. Defaults to 'bodies.type'.
trims:
  name: trims
  description: Fetch car trim details from the RapidAPI endpoint with various filter
    options.
  parameters:
    type: object
    properties:
      make_id:
        description: Filter results by make ID.
      limit:
        description: Limit the number of results returned.
      direction:
        description: Order direction of the results, either 'asc' for ascending or
          'desc' for descending. Default is 'asc'.
      sort:
        description: The field to sort results by. Default is 'id'.
      year:
        description: Filter results by year.
      model:
        description: Filter results by model.
      page:
        description: Specify the page number for paginated results.
      trim:
        description: Filter results by trim.
      make_model_id:
        description: Filter results by make model ID.
      verbose:
        description: If 'yes', includes detailed information such as year, make, model,
          and trim in the returned data. Default is 'yes'.
      make:
        description: Filter results by make.
      json:
        description: An array of URL encoded JSON conditions for complex queries.
find_equilibrium_index:
  name: find_equilibrium_index
  description: Finds the equilibrium index of a list, where the sum of elements on
    the left is equal to the sum of elements on the right.
  parameters:
    type: object
    properties:
      arr:
        description: The input list of integers.
locations_v2_search_deprecated:
  name: locations_v2_search_deprecated
  description: Searches for related locations and suggestions based on the provided
    query, locale, and currency.
  parameters:
    type: object
    properties:
      query:
        description: Name of the country, city, district, place, etc., to search for.
      locale:
        description: The language code for the search results. Defaults to 'en_US'.
      currency:
        description: The currency code for the search results. Defaults to 'USD'.
advisory_information:
  name: advisory_information
  description: Fetches advisory information from the BART API based on command and
    optional origin station.
  parameters:
    type: object
    properties:
      cmd:
        description: Command to specify the type of advisory information.
      orig:
        description: Optional station filter using 4 character BART station abbreviations.
          Defaults to None.
get_device_asset_by_identifier_copy:
  name: get_device_asset_by_identifier_copy
  description: Fetches device asset information by identifier using the provided RapidAPI
    key.
  parameters:
    type: object
    properties:
      identifier:
        description: The unique identifier for the device asset.
swift_code:
  name: swift_code
  description: Fetches and returns the details of a specified SWIFT code using the
    Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      swift_code:
        description: The SWIFT code for which the details are to be retrieved.
playlist_extraction:
  name: playlist_extraction
  description: Retrieves information about songs in a playlist from YouTube, Spotify,
    or SoundCloud using the RapidAPI service.
  parameters:
    type: object
    properties:
      search:
        description: The search query for the playlist.
redeploy:
  name: redeploy
  description: Redeploys a Docker instance of the specified phone. This function can
    be used to reboot the instance if the phone is experiencing unexpected problems.
  parameters:
    type: object
    properties:
      phone_id:
        description: The unique identifier of the phone whose Docker instance is to
          be redeployed.
spac_price_targets:
  name: spac_price_targets
  description: Fetches the latest SPAC (Special Purpose Acquisition Company) price
    targets from analysts, filtered by a specific SPAC symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The SPAC symbol to filter the price targets by. Defaults to 'SOFI'.
get_the_market_calendar:
  name: get_the_market_calendar
  description: Fetches the market calendar for a given month and year using the Tradier
    API.
  parameters:
    type: object
    properties:
      month:
        description: The month for which to retrieve the market calendar. Defaults
          to '11'.
      year:
        description: The year for which to retrieve the market calendar. Defaults
          to '2013'.
wnba_team_info:
  name: wnba_team_info
  description: Retrieve information for a specific WNBA team using the RapidAPI service.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the WNBA team for which information is being requested.
v4_sports_sport_odds:
  name: v4_sports_sport_odds
  description: Fetches a list of live and upcoming games for a given sport, displaying
    bookmaker odds for the specified regions and markets.
  parameters:
    type: object
    properties:
      sport:
        description: The sport key for which to return games and odds. If `sport`
          is set to 'upcoming', it will return the next 8 upcoming games across all
          sports and any live games.
      regions:
        description: Comma-delimited list of regions to determine which bookmakers
          appear in the response. Each region will count as 1 request against the
          usage quota for each market.
      oddsformat:
        description: Format of the returned odds. Defaults to 'decimal'.
      markets:
        description: Comma-delimited list of odds markets to return. Defaults to 'h2h,spreads'.
          Note that each market counts as 1 request against the usage quota.
      dateformat:
        description: Format of the returned timestamps. Can be 'iso' (ISO8601) or
          'unix' timestamp (seconds since epoch). Defaults to 'iso'.
nhl_picks:
  name: nhl_picks
  description: Retrieves the NHL PickCenter data for a specified game using the NHL
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the NHL game for which PickCenter data is requested.
ufc_fight_night_song_vs_simon_april_28_2023:
  name: ufc_fight_night_song_vs_simon_april_28_2023
  description: 'Fetches fight details for UFC Fight Night: Song vs. Simon held on
    April 28, 2023.'
  parameters:
    type: object
    properties:
      offset:
        description: The number of records to skip before starting to collect the
          result set. Defaults to None.
      limit:
        description: The maximum number of records to return. Defaults to None.
baseball_match_statistics:
  name: baseball_match_statistics
  description: Fetches and returns statistics for a specified baseball match.
  parameters:
    type: object
    properties:
      match_id:
        description: The unique identifier for the baseball match to retrieve statistics
          for.
primeira_liga_standings:
  name: primeira_liga_standings
  description: Fetches the standings for the Primeira Liga for a specified season.
  parameters:
    type: object
    properties:
      season:
        description: The season for which the standings are to be fetched, e.g., '2022'.
          If not provided, the current season is assumed.
single_country:
  name: single_country
  description: Fetch all details of a country by its ID from the PageantDB API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the country to retrieve details for.
        type: integer
get_domaine:
  name: get_domaine
  description: Retrieves the details of a domain using an API, specific to domains
    registered in New Caledonia.
  parameters:
    type: object
    properties:
      ext:
        description: 'The domain extension, which can be one of the following:'
      nom:
        description: The domain name to look up.
get_company_jobs_count:
  name: get_company_jobs_count
  description: Retrieves the number of job openings a specified company has posted
    on LinkedIn.
  parameters:
    type: object
    properties:
      company_id:
        description: The unique identifier of the company whose job openings count
          is to be retrieved.
sources:
  name: sources
  description: Retrieves available news sources based on specified parameters such
    as country, language, and category.
  parameters:
    type: object
    properties:
      country:
        description: Find sources that display news in a specific country. Possible
          options include `us`, `gb`, `in`, `jp`, `ae`, `sa`, `au`, `ca`, `sg`.
      language:
        description: Find sources that display news in a specific language. Possible
          options include `en`, `ar`, `jp`, `in`, `es`, `fr`.
      category:
        description: Find sources that display news of a specific category. Possible
          options include `top`, `business`, `science`, `technology`, `sports`, `health`,
          `entertainment`.
methane_endpoint:
  name: methane_endpoint
  description: Fetches methane concentration data from the specified API endpoint
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      methane:
        description: Optional parameter to specify a particular methane concentration.
          Defaults to None.
getgames:
  name: getgames
  description: Retrieves Diablo 4 game data from the specified page using RapidAPI.
  parameters:
    type: object
    properties:
      page:
        description: The page number of game data to retrieve.
        type: integer
stock_get_stock_price:
  name: stock_get_stock_price
  description: Retrieve the current stock price for a given ticker symbol from the
    Yahoo! Finance API.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock. For example, "AAPL" is the ticker
          symbol for Apple Inc.
      region:
        description: The market region of the ticker symbol. Allowed values are 'US',
          'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB', 'S'. Defaults
          to 'US'.
get_by_climate:
  name: get_by_climate
  description: Fetches plants based on the given climate of their natural habitat.
  parameters:
    type: object
    properties:
      climate:
        description: The climate type to filter plants by. Defaults to 'Tropical'.
get_all_kfc_locations_by_state_and_city:
  name: get_all_kfc_locations_by_state_and_city
  description: Retrieve KFC locations for a given state and city with pagination support.
  parameters:
    type: object
    properties:
      state:
        description: The state where KFC locations are being queried.
      city:
        description: The city where KFC locations are being queried.
      page:
        description: The page number for the results, with each page containing 10
          results.
        type: integer
get_all_kfc_locations:
  name: get_all_kfc_locations
  description: Fetches a list of KFC locations from the KFC Locations API for a given
    page number.
  parameters:
    type: object
    properties:
      page:
        description: The page number of results to retrieve, with each page typically
          containing 10 results.
        type: integer
rulesets:
  name: rulesets
  description: Fetches the list of available rule sets for the specified language
    from the API.
  parameters:
    type: object
    properties:
      lang:
        description: A 2-letter ISO 639 language code specifying the language for
          which the available rule sets will be provided.
get_vessel_photo:
  name: get_vessel_photo
  description: Fetch the image of a vessel using its ship ID from the Vessel Data
    API.
  parameters:
    type: object
    properties:
      shipid:
        description: The ID of the ship for which to fetch the image.
stock_get_stock_quote_type_data:
  name: stock_get_stock_quote_type_data
  description: Fetch stock quote type data for a given stock symbol and region using
    the specified RapidAPI key.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol for the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: The region code for the stock market. Default is 'US'. Allowed
          values are 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB',
          'S'.
news_v2_list_by_symbol:
  name: news_v2_list_by_symbol
  description: Fetches the latest news articles associated with a given stock symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to retrieve news. This is typically
          obtained from the auto-complete or other relevant endpoints.
      page:
        description: The page number for paginated results. Defaults to 1.
      pagesize:
        description: The number of news articles to return per page. Defaults to 30.
minmax:
  name: minmax
  description: Retrieve the lowest and highest values over a specified period (MINMAX)
    for a given financial instrument.
  parameters:
    type: object
    properties:
      interval:
        description: 'Interval between two consecutive points in the time series.
          Supports: ''1min'', ''5min'', ''15min'', ''30min'', ''45min'', ''1h'', ''2h'',
          ''4h'', ''1day'', ''1week'', ''1month''.'
      symbol:
        description: Instrument symbol, which can be any equity, index, ETF, forex,
          or cryptocurrency (e.g., 'AAPL', 'EUR/USD', 'ETH/BTC').
      series_type:
        description: 'Type of series data. Supports: ''open'', ''high'', ''low'',
          ''close''. Default is ''close''.'
      outputsize:
        description: Number of data points to return. Default is 30.
      format:
        description: Desired format of the output. Can be 'CSV' or 'JSON'. Default
          is 'json'.
      time_period:
        description: Time period over which the minmax values are calculated. Default
          is 9.
latest_information_for_symbol:
  name: latest_information_for_symbol
  description: Fetch the latest ticker information for a given symbol from the Bybit
    API.
  parameters:
    type: object
    properties:
      symbol:
        description: The market symbol to retrieve information for.
get_individual_articles:
  name: get_individual_articles
  description: Retrieves individual articles from a specified newspaper using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      newspaperid:
        description: The unique identifier for the newspaper from which to retrieve
          the articles.
business_photos:
  name: business_photos
  description: Fetches photos of a business using its unique Business Id through the
    RapidAPI service.
  parameters:
    type: object
    properties:
      business_id:
        description: The unique identifier of the business. This can be a google_id,
          business_id, or google_place_id. Examples of valid IDs include `0x880fd393d427a591:0x8cba02d713a995ed`
          and `ChIJkaUn1JPTD4gR7ZWpE9cCuow`.
      limit:
        description: The maximum number of business photos to return. Acceptable values
          range from 1 to 10000. Defaults to 5.
      fields:
        description: 'A comma-separated list of photo fields to include in the response.
          By default, all fields are returned. Example: `type,photo_url`.'
      region:
        description: The region or country from which to query Google Maps. For a
          list of supported region/country codes, see https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes
          (Alpha-2 code). Defaults to 'us'.
sizes_all_countries:
  name: sizes_all_countries
  description: Gets the size information of countries in Africa based on the specified
    country name.
  parameters:
    type: object
    properties:
      country_name:
        description: The name of the country for which to get the size information.
          Use 'all' to get size information for all countries.
top_free_ipad_apps:
  name: top_free_ipad_apps
  description: Retrieve a list of the top free iPad apps from the App Store.
  parameters:
    type: object
    properties:
      country:
        description: The country code for the App Store. Default is 'us'.
      category:
        description: The category ID for the apps. Default is '6016'.
      lang:
        description: The language code for the results. Default is 'en'.
      num:
        description: The number of results to return. Default is 100.
getgamesbytopic:
  name: getgamesbytopic
  description: Fetches game information by topic and page from the Diablo 4 Smartable
    API.
  parameters:
    type: object
    properties:
      topic:
        description: The topic to search for within the Diablo 4 games.
      page:
        description: The page number of the results to retrieve.
        type: integer
instagram:
  name: instagram
  description: Checks the availability of a given Instagram username using RapidAPI.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username to be checked.
following_by_username:
  name: following_by_username
  description: Retrieve the list of users that the specified Instagram user is following,
    up to 1000 records.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to retrieve the following list.
      corsenabled:
        description: Whether CORS is enabled. Defaults to None.
      nextmaxid:
        description: The next maximum ID for pagination. Defaults to None.
playlist_posts:
  name: playlist_posts
  description: Fetch posts from TikTok for a specific user and playlist.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID or secret UID of the user.
      playlist_id:
        description: The ID of the playlist.
      offset:
        description: The offset for pagination. Defaults to 0.
trending_challenges:
  name: trending_challenges
  description: Fetches the trending challenges from the TikTok API.
  parameters:
    type: object
    properties:
      cursor:
        description: The position to start fetching results from. Defaults to 0.
      proxy:
        description: The proxy server to use for the request. Defaults to None.
      count:
        description: The number of results to return. Defaults to 10.
user_follower:
  name: user_follower
  description: Retrieves the followers of a specified TikTok user using the provided
    API key.
  parameters:
    type: object
    properties:
      user_id:
        description: The unique identifier of the TikTok user whose followers are
          to be retrieved.
      count:
        description: The number of followers to retrieve. Default is None.
      cursor:
        description: The cursor for pagination (to fetch the next set of followers).
          Default is None.
defaultroot:
  name: defaultroot
  description: Fetches cat facts from the MeowFacts API based on the provided parameters.
  parameters:
    type: object
    properties:
      count:
        description: The number of cat facts to return. If not specified, a default
          number of facts will be returned.
      factid:
        description: An optional ID to retrieve a specific cat fact. If not specified,
          random facts will be returned.
      lang:
        description: The locale in which to retrieve the cat facts. Defaults to 'eng'
          (English).
get_wisdom_quotes_by_page:
  name: get_wisdom_quotes_by_page
  description: Retrieves wisdom quotes from a specified page using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve quotes from.
community_post_details:
  name: community_post_details
  description: Fetches details of a community post from YouTube using RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: Community post ID. Default is 'UgkxCWeKPiIOLsnh_5a0MPHWCmYgbhifgwIZ'.
new_titles:
  name: new_titles
  description: Fetches a listing of new title IDs added to Watchmode within a specific
    date range.
  parameters:
    type: object
    properties:
      page:
        description: Specifies the page of results to return. Defaults to 1.
      types:
        description: 'Filters results to include specific types of titles. Acceptable
          values are: ''movie'', ''tv_series'', ''tv_special'', ''tv_miniseries'',
          ''short_film''. Multiple types can be passed as a comma-delimited string.
          Defaults to ''movie,tv_series''.'
      limit:
        description: Specifies the number of titles to return per page. The default
          and maximum is 250. Defaults to 50.
      end_date:
        description: Sets the end date to include changes from a specific date range.
          The format is YYYYMMDD (e.g., 20210101 for January 1st, 2021). If not specified,
          the API returns changes since the beginning of yesterday.
      start_date:
        description: Sets the start date to include changes from a specific date range.
          The format is YYYYMMDD (e.g., 20210101 for January 1st, 2021). If not specified,
          the API returns changes since the beginning of yesterday.
downloadminecraftjar:
  name: downloadminecraftjar
  description: Downloads the Minecraft .jar file for a specified version.
  parameters:
    type: object
    properties:
      minecraftversion:
        description: The version of Minecraft for which to download the .jar file.
ip_reputation:
  name: ip_reputation
  description: Fetch detailed information about a specified IPv4 or IPv6 address,
    including geolocation, ISP or hosting provider, and history of abuse or malicious
    activity.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to query for reputation information.
get_ip_information:
  name: get_ip_information
  description: Fetches information about a given IP address using the Toolbench API.
  parameters:
    type: object
    properties:
      query:
        description: The IP address to query information about.
      lang:
        description: The language of the response. Default is 'en'.
get_distance_by_city_state_country:
  name: get_distance_by_city_state_country
  description: Retrieves the latitude, longitude, and calculated distance in miles
    between two locations specified by city, state, and country.
  parameters:
    type: object
    properties:
      country1:
        description: The country of the first location.
      country2:
        description: The country of the second location.
      state2:
        description: The state of the second location.
      city2:
        description: The city of the second location.
      city1:
        description: The city of the first location.
      state1:
        description: The state of the first location.
list_of_room_facility_types:
  name: list_of_room_facility_types
  description: Fetches a list of room facility types from the Booking.com API based
    on given criteria.
  parameters:
    type: object
    properties:
      room_facility_type_id:
        description: ID of the specific room facility type to filter.
      facility_type_id:
        description: ID of the specific room facility type to filter.
stock_time_series:
  name: stock_time_series
  description: Fetches stock time series data and key news events for a specified
    period and symbol.
  parameters:
    type: object
    properties:
      period:
        description: 'The period for which to return time series and key events. Supported
          values are:'
      symbol:
        description: 'The stock symbol (ticker) to query. Examples include:'
      language:
        description: The language code for the results (default is 'en'). Refer to
          ISO 639-1 for available 2-letter language codes.
get_latest_price:
  name: get_latest_price
  description: Fetch the latest Thai oil price data from the specified API.
  parameters:
    type: object
    properties:
      info:
        description: Whether to include additional info in the API request. Defaults
          to None.
read_user:
  name: read_user
  description: Fetch user details from the IronWifi API using the provided user ID.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the user to be fetched.
get_case_by_id:
  name: get_case_by_id
  description: Fetch the case payload from the Yardillo API using the given case ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the case to fetch.
list_album_tracks:
  name: list_album_tracks
  description: Fetches a list of tracks for a given album from the Spotify API, with
    optional pagination support.
  parameters:
    type: object
    properties:
      albumid:
        description: The unique identifier for the album.
      limit:
        description: The maximum number of tracks to return per request. Defaults
          to None.
      offset:
        description: The number of tracks to skip before starting to collect the result
          set. Defaults to None.
find_by_title:
  name: find_by_title
  description: Fetches movie details based on the given title from the RapidAPI service.
  parameters:
    type: object
    properties:
      q:
        description: The title of the movie to search for.
tag_search:
  name: tag_search
  description: Fetches news articles based on the provided tag from the India Today
    API.
  parameters:
    type: object
    properties:
      tag:
        description: The tag or keyword to search for in the news articles.
kompas_search:
  name: kompas_search
  description: Performs a search on the Kompas news API using the provided parameters.
  parameters:
    type: object
    properties:
      limit:
        description: The number of search results to retrieve.
        type: integer
      page:
        description: The page number to retrieve in the paginated results.
        type: integer
      command:
        description: The search command or keyword.
title_get_sound_tracks:
  name: title_get_sound_tracks
  description: Fetches the sound tracks for a specific title from the online movie
    database.
  parameters:
    type: object
    properties:
      tconst:
        description: The title identifier, which should start with 'tt' (e.g., 'tt0944947'),
          typically obtained from the /title/auto-complete or /title/find endpoints.
hashtag:
  name: hashtag
  description: Fetch posts from Instagram using a specific hashtag.
  parameters:
    type: object
    properties:
      hashtag:
        description: The hashtag to search for.
      raw:
        description: Set to True to return the raw unprocessed data feed. Defaults
          to None.
get_airports:
  name: get_airports
  description: Retrieves data of airports based on various filtering parameters and
    sorting options from an external API. It returns data from over 28,000 airports
    in the database.
  parameters:
    type: object
    properties:
      lid:
        description: U.S. FAA Location Identifier (12,566 entries), or an empty string.
      sortby:
        description: 'Sort results by a property value. Possible values are: ''iata'',
          ''icao'', ''name'', ''city'', ''subd'', ''country'', ''tz'', ''lid'', and
          ''elevation''. Default is ''iata''.'
      name:
        description: Filter results by name. The value should be sent as comma-separated.
          For example, for 'Zabrat Airport', send 'Zabrat,Airport'. Default is 'Ishigaki,Airport'.
      limit:
        description: Limit to n results. Default is 50.
      elevationover:
        description: Filter airports with an MSL elevation, or highest point of the
          landing area in feet, over this value. Default is 50.
      country:
        description: ISO 3166-1 alpha-2 country code (plus XK for Kosovo). Default
          is 'JP'.
      city:
        description: Filter results by city. The value should be sent as comma-separated.
          For example, for 'Zakynthos Island', send 'Zakynthos,Island'. Default is
          'Ishigaki'.
      skip:
        description: Skip first n results. Default is 0.
      sortbyorder:
        description: Specify the sorting order. Possible values are 'asc' and 'desc'.
          Default is 'desc'.
      elevationunder:
        description: Filter airports with an MSL elevation, or highest point of the
          landing area in feet, under this value. Default is 2000.
      tz:
        description: Timezone expressed as a tz database name (IANA-compliant) or
          an empty string for Antarctica. Default is 'Asia/Tokyo'.
      icao:
        description: Filter results by ICAO code. Default is 'ROIG'.
      subd:
        description: Filter results by subdivision (e.g., state, province, region,
          etc.). The value should be sent as comma-separated. For example, for 'Newfoundland
          and Labrador', send 'Newfoundland,and,Labrador'. Default is 'Okinawa'.
      iata:
        description: Filter results by IATA code. Default is 'ISG'.
hijos:
  name: hijos
  description: Retrieves the list of children (hijos) from the Colegio Santa Ana API.
  parameters:
    type: object
    properties:
      authorization:
        description: The authorization token required for accessing the API.
v1_babynames:
  name: v1_babynames
  description: Fetches a list of baby names from the API Ninjas Baby Names API endpoint.
  parameters:
    type: object
    properties:
      popular_only:
        description: Whether to only return popular (top 10%) of names. Must be either
          'true' or 'false'. Defaults to 'true' if not set.
      gender:
        description: 'The gender for the baby names. Must be one of the following:
          ''boy'', ''girl'', or ''neutral''.'
mensajes:
  name: mensajes
  description: This function fetches messages from the Colegio Santa Ana API.
  parameters:
    type: object
    properties:
      authorization:
        description: The authorization token required for the API request.
sign:
  name: sign
  description: Fetch horoscope information for a given astrological sign using the
    Horoscope Astrology API.
  parameters:
    type: object
    properties:
      s:
        description: The astrological sign to fetch information for. Valid options
          include 'aries', 'taurus', 'gemini', 'cancer', 'leo', 'virgo', 'libra',
          'scorpio', 'sagittarius', 'capricorn', 'aquarius', and 'pisces'.
tsv2:
  name: tsv2
  description: Fetches values from a specified data subset within a dataset using
    the ODAM RapidAPI.
  parameters:
    type: object
    properties:
      subset:
        description: Identifier for the data subset.
      dataset:
        description: Identifier for the dataset.
      limit:
        description: Limits the number of lines in the output table. Defaults to 10.
          A value of 0 means no limit.
      debug:
        description: Debug status. When set to a non-zero value, debug mode is enabled.
          Defaults to 0.
      format:
        description: Output format. Defaults to 'tsv'.
ayah_recitations:
  name: ayah_recitations
  description: Fetches the list of recitations for a specific Ayah by its key and
    recitation ID.
  parameters:
    type: object
    properties:
      recitation_id:
        description: The ID of the recitation.
        type: integer
      ayah_key:
        description: The key of the Ayah, which is a combination of the Surah number
          and Ayah number (e.g., '1:1' for the first Ayah of the first Surah).
tennis_match_statistics:
  name: tennis_match_statistics
  description: Fetches and returns statistics about a given tennis match identified
    by `match_id`.
  parameters:
    type: object
    properties:
      match_id:
        description: The unique identifier for the tennis match.
timeline:
  name: timeline
  description: Fetches the 100 most recent articles and their keywords using the Papercliff
    RapidAPI.
  parameters:
    type: object
    properties:
      is_from:
        description: 'Narrows down the results to articles published after the provided
          date-time in UTC. The format should be `yyyy-MM-dd''T''HH:mm`. Example value:
          `2022-09-18T13:45`. Date-times older than a week do not affect the result.'
      terms:
        description: 'Narrows down the results to articles that contain all the provided
          keywords. The terms should consist of one to three words separated by a
          dash. Example value: `election-campaign`.'
      offset:
        description: Omits a number of articles from the result.
      to:
        description: 'Narrows down the results to articles published before the provided
          date-time in UTC. The format should be `yyyy-MM-dd''T''HH:mm`. Example value:
          `2022-09-18T15:30`. Date-times of the future do not affect the result.'
get_expired_certs:
  name: get_expired_certs
  description: Fetches expired SSL/TLS certificates for a given firmware.
  parameters:
    type: object
    properties:
      firmware_hash:
        description: SHA2 hash of the device firmware.
price_forecasts:
  name: price_forecasts
  description: Fetches an AI-generated price forecast for a given stock symbol over
    the next 3 months using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which the price forecast is to be generated.
get_5_latest_endpoint:
  name: get_5_latest_endpoint
  description: Fetch the latest exchange rates for the specified currencies.
  parameters:
    type: object
    properties:
      symbols:
        description: Comma-separated list of currency codes to fetch rates for.
      base:
        description: The base currency code against which exchange rates are calculated.
inverted_hammer:
  name: inverted_hammer
  description: Fetches a list of stocks that have an Inverted Hammer signal from the
    specified page using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve. Default is 1.
v1_exchangerate:
  name: v1_exchangerate
  description: Retrieves the exchange rate for a given currency pair using the API
    Ninjas Exchange Rate API.
  parameters:
    type: object
    properties:
      pair:
        description: Currency pair to query. Must be in the form of (currency1)_(currency2)
          (e.g., USD_EUR).
custom_die:
  name: custom_die
  description: Simulates rolling a custom die with a specified number of sides using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      sides:
        description: The number of sides on the custom die. Default is 8.
get_all_imbuements_items:
  name: get_all_imbuements_items
  description: Fetch all imbuement items for a specified Tibia game world using the
    RapidAPI endpoint.
  parameters:
    type: object
    properties:
      world:
        description: The name of the Tibia game world for which to fetch imbuement
          items.
attribute_overviews:
  name: attribute_overviews
  description: Fetches attribute overviews for a given player using the SofaScores
    API.
  parameters:
    type: object
    properties:
      player_id:
        description: The unique identifier for the player whose attribute overviews
          are to be retrieved.
        type: integer
schedule_by_date:
  name: schedule_by_date
  description: Fetches the event schedule for a given date and sport ID using the
    specified API key.
  parameters:
    type: object
    properties:
      date:
        description: The date for which the event schedule is requested, in 'YYYY-MM-DD'
          format.
      sport_id:
        description: The ID of the sport for which the schedule is requested.
        type: integer
transfers_list:
  name: transfers_list
  description: Fetches a list of football player transfers based on various filter
    criteria.
  parameters:
    type: object
    properties:
      competitionid:
        description: The ID of the competition. Should be obtained from the /search
          or /competitions/list endpoints. Do not use together with clubid.
      positiongroup:
        description: The position group of the players. Possible values are 'Abwehr',
          'Mittelfeld', 'Sturm'.
      limit:
        description: The number of items per response for paging purposes. Defaults
          to 30.
      maxvalue:
        description: 'The maximum market value of players. Example: 151000000.'
      positionid:
        description: The position ID of the players. Possible values range from 1
          to 14, each representing a specific player position.
      clubid:
        description: The ID of the club. Should be obtained from the /search or /clubs/list-by-competition
          endpoints. Do not use together with competitionid.
      minvalue:
        description: 'The minimum market value of players. Example: 9000000.'
      offset:
        description: The offset for paging purposes. Defaults to 0.
      domain:
        description: The domain for the request. Possible values are 'com', 'de',
          'be', 'es', 'it', 'nl', 'pl', 'pt', 'com.tr', and 'world'. Defaults to 'de'.
analysis:
  name: analysis
  description: Analyzes the content from a given URL using the SEO Fast Audit API.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the website to be analyzed.
get_profile_series:
  name: get_profile_series
  description: Fetches time series snapshots of a profile from the OutSystems Community
    API.
  parameters:
    type: object
    properties:
      profile_id:
        description: The unique identifier of the profile for which the time series
          snapshots are to be fetched.
v1_vinlookup:
  name: v1_vinlookup
  description: Retrieves key vehicle information including manufacturer, country of
    origin, and model year for a given VIN using the API Ninjas VIN Lookup API.
  parameters:
    type: object
    properties:
      vin:
        description: A valid Vehicle Identification Number (VIN), which must be a
          17-character string.
get_wagons_mrt_train_no_wagons_get:
  name: get_wagons_mrt_train_no_wagons_get
  description: Fetches the number of wagons for a given MRT train using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      train_no:
        description: The unique identifier for the MRT train.
players_185_225_233_110_30015:
  name: players_185_225_233_110_30015
  description: Retrieves the list of players currently online from the specified V
    Rising game server.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address of the game server.
      port:
        description: The port number of the game server.
played:
  name: played
  description: Fetches the most recently played CS:GO matches from the RapidAPI service.
  parameters:
    type: object
    properties:
      content_type:
        description: The content type for the request. Default is 'application/json'.
      limit:
        description: The number of matches to retrieve. Default is 10.
        type: integer
      page:
        description: The page number of the results to retrieve. Default is 1.
        type: integer
paragraph:
  name: paragraph
  description: Returns a paragraph composed of random sentences based on specified
    parameters.
  parameters:
    type: object
    properties:
      minimumnumberofwords:
        description: The minimum number of words in the paragraph.
      wordlength:
        description: The average length of each word in the paragraph.
      maximumnumberofwords:
        description: The maximum number of words in the paragraph.
      numberofsentences:
        description: The exact number of sentences in the paragraph.
      minimumnumberofsentences:
        description: The minimum number of sentences in the paragraph.
      maximumwordlength:
        description: The maximum length of each word in the paragraph.
      maximumnumberofsentences:
        description: The maximum number of sentences in the paragraph.
      numberofwords:
        description: The minimum number of words in the paragraph.
      minimumwordlength:
        description: The minimum length of each word in the paragraph.
youtube_topviews_artist_nationality:
  name: youtube_topviews_artist_nationality
  description: Fetches the top viewed music video by artists of the given nationality
    from YouTube.
  parameters:
    type: object
    properties:
      nationality:
        description: The nationality of the artist.
get_home_page_overview:
  name: get_home_page_overview
  description: Fetches trending information displayed on the Spotify home page as
    an incognito visitor.
  parameters:
    type: object
    properties:
      region:
        description: Region code (ISO 3166 alpha-2) for localized results. Defaults
          to `None`, which will fallback to `US` if unsupported.
get_playlist:
  name: get_playlist
  description: Fetches playlist details from the Spotify Data API using the provided
    playlist ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the playlist to fetch.
type_parent_get_recent_investment_rating_change:
  name: type_parent_get_recent_investment_rating_change
  description: Fetches the recent investment rating change as displayed in the Parent
    tab for a given security.
  parameters:
    type: object
    properties:
      securityid:
        description: The security ID used to query the investment rating change.
top_news:
  name: top_news
  description: Fetches the current top news based on the specified region and language.
  parameters:
    type: object
    properties:
      region:
        description: The region for which to fetch the top news. Defaults to 'US'.
      hl:
        description: The language code for the news. Defaults to 'en'.
peer_metrics_average:
  name: peer_metrics_average
  description: Fetches the average of company peer metrics for trailing twelve months
    (TTM) data via RapidAPI.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol of the company for which to retrieve peer metrics.
by_source_new:
  name: by_source_new
  description: Fetch the most recent 50 news items from a specific source using the
    Moka News API.
  parameters:
    type: object
    properties:
      source:
        description: The news source from which to retrieve the news items, taken
          from the available sources list.
latest_news:
  name: latest_news
  description: Fetch the latest news articles using the Currents News API.
  parameters:
    type: object
    properties:
      language:
        description: The language code of the news articles to fetch. Default is None,
          which fetches news articles in English.
by_category:
  name: by_category
  description: Fetches the recent 50 news articles by category using the specified
    RapidAPI key.
  parameters:
    type: object
    properties:
      cat:
        description: The category of the news to fetch, e.g., 'Sport', 'World', etc.
reversegeocode:
  name: reversegeocode
  description: Obtain the human-readable address for a given geographical location.
  parameters:
    type: object
    properties:
      location:
        description: The latitude and longitude coordinates (comma-separated) for
          which to obtain the address.
      language:
        description: The language in which to return results. Defaults to 'en'.
search_by_centre_zip_and_radius:
  name: search_by_centre_zip_and_radius
  description: Performs a radius search to find locations within a specified radius
    of a given ZIP code using the RapidAPI service.
  parameters:
    type: object
    properties:
      zip:
        description: The ZIP code around which to search for locations.
      radius:
        description: The radius (in miles) within which to search for locations around
          the given ZIP code.
        type: integer
get_the_timezones:
  name: get_the_timezones
  description: Fetches the list of timezones from the specified RapidAPI service.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the results to retrieve. Defaults to '1'.
      name:
        description: The name filter to apply to the timezones. Defaults to None.
income_by_zipcode:
  name: income_by_zipcode
  description: Fetches income data for a given zipcode using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      zip:
        description: Zipcode for which the income data is to be retrieved.
facilities_lookup:
  name: facilities_lookup
  description: Fetches a list of facilities in Tanzania based on provided query parameters
    such as facility type, region, limit, and city.
  parameters:
    type: object
    properties:
      region:
        description: The region where the facility is located.
      limit:
        description: The number of facilities to query. Default is '10'.
      city:
        description: The city where the facility is located. Default is 'Dar es Salaam'.
latest_vessel_position:
  name: latest_vessel_position
  description: Fetches the latest position of a vessel based on its MMSI using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      mmsi:
        description: The Maritime Mobile Service Identity (MMSI) of the vessel.
get_posts_from_category:
  name: get_posts_from_category
  description: Fetch posts from a specified category using the 9gag API. Optionally,
    provide a counter and after parameter for pagination in subsequent requests.
  parameters:
    type: object
    properties:
      category:
        description: The category of posts to fetch.
      counter:
        description: Leave blank for the first request. For subsequent requests, provide
          the counter received from the previous request. Defaults to None.
      after:
        description: Leave blank for the first request. For subsequent requests, provide
          the after parameter received from the previous request. Defaults to None.
search_exchange:
  name: search_exchange
  description: Search for exchanges based on a query string or category.
  parameters:
    type: object
    properties:
      q:
        description: A query string to search for specific exchanges. Defaults to
          'B'.
      category:
        description: The category to filter the exchanges, for example, 'Cryptocurrency'.
          Defaults to 'Cryptocurrency'.
v1_airquality:
  name: v1_airquality
  description: Fetches air quality data from the API Ninjas Air Quality API based
    on provided location parameters.
  parameters:
    type: object
    properties:
      zip:
        description: ZIP code of the desired location.
      country:
        description: Name of the country.
      city:
        description: Name of the city. Defaults to 'Seattle'.
      lon:
        description: Longitude of the desired location. Must be used in conjunction
          with `lat`.
      state:
        description: US state (United States only).
      lat:
        description: Latitude of the desired location. Must be used in conjunction
          with `lon`.
coins_get_analysis:
  name: coins_get_analysis
  description: Fetches expert analysis opinion for a specific cryptocurrency pair
    from the Investing Cryptocurrency Markets API.
  parameters:
    type: object
    properties:
      pair_id:
        description: The identifier for the cryptocurrency pair. This value can be
          obtained from endpoints like coins/list, coins/search, and coins/list-pairs.
        type: integer
      time_utc_offset:
        description: The UTC offset in seconds, e.g., UTC+8 hours is 28800 seconds.
          Default is 28800 (UTC+8).
      lang_id:
        description: The language identifier, as returned from the get-meta-data endpoint.
          Default is 1.
      page:
        description: The page number for pagination. Default is 1.
minus_di:
  name: minus_di
  description: Fetches the Minus Directional Indicator (MINUS_DI) for a given financial
    instrument.
  parameters:
    type: object
    properties:
      symbol:
        description: The instrument symbol, which can be any equity, index, ETF, forex,
          or cryptocurrency (e.g., 'AAPL', 'EUR/USD', 'ETH/BTC').
      interval:
        description: 'The interval between two consecutive points in the time series
          data. Supported intervals are: ''1min'', ''5min'', ''15min'', ''30min'',
          ''45min'', ''1h'', ''2h'', ''4h'', ''1day'', ''1week'', ''1month''.'
      outputsize:
        description: The number of data points to return. Defaults to 30 if no date
          parameters are set, otherwise set to maximum.
      time_period:
        description: The number of periods to consider in the calculation. Defaults
          to 9.
      format:
        description: The format of the data returned. Can be 'CSV' or 'JSON'. Defaults
          to 'json'.
yearly_income_statements:
  name: yearly_income_statements
  description: Fetches the annual income statements for a given stock symbol using
    the specified RapidAPI key.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which the annual income statements are to
          be fetched.
get_countries:
  name: get_countries
  description: Fetches a list of countries from the 50k Radio Stations API, optionally
    filtering by a keyword.
  parameters:
    type: object
    properties:
      keyword:
        description: Optional parameter to filter countries by a specific keyword.
          Default is 'Indonesia'.
postcodes_postcode:
  name: postcodes_postcode
  description: Fetches addresses for a given UK postcode using the RapidAPI UK Postcode
    API.
  parameters:
    type: object
    properties:
      postcode:
        description: The UK postcode to look up addresses for.
timezone:
  name: timezone
  description: Fetches the timezone information for a given geographical location.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude of the location.
        type: integer
      lon:
        description: Longitude of the location.
        type: integer
      c:
        description: If set to 1, returns a compact JSON response. Default is 1.
      s:
        description: If set to 1, returns a simple answer, ignoring points with multiple
          timezones. Default is 0.
get_ip_data:
  name: get_ip_data
  description: Fetch location-related data for a given IP address using the APIIP.net
    service.
  parameters:
    type: object
    properties:
      callback:
        description: JSONP callback function name as per the APIIP.net documentation.
          Default is 'FUNCTION_NAME'.
      ip:
        description: 'IPv4 or IPv6 address, or a comma-separated list of such addresses
          (limit: 50). Default is ''67.250.186.196''.'
      language:
        description: 2-letter language code to customize the response language. Default
          is 'es'.
      fields:
        description: Comma-separated list of response fields to retrieve specific
          data according to the APIIP.net documentation. Default is 'city,capital'.
      output:
        description: Format of the API response, either 'json' or 'xml'. Default is
          'xml'.
get_place_by_ip:
  name: get_place_by_ip
  description: Retrieve the place information for a given IP address.
  parameters:
    type: object
    properties:
      is_id:
        description: The IP address (IPv4 and IPv6 are supported) to look up.
      language:
        description: Specifies the language (ISO 639-1) to get the
partenaire_par_id:
  name: partenaire_par_id
  description: Fetches a partner's details by their ID from the designated API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the partner to be fetched, as provided by the API.
emoji:
  name: emoji
  description: Fetches the emoji associated with a given name using the Emoji API.
  parameters:
    type: object
    properties:
      name:
        description: The name for which the emoji is to be fetched.
mediainfo:
  name: mediainfo
  description: Fetch media information from Instagram using the provided short code.
  parameters:
    type: object
    properties:
      short_code:
        description: The short code of the Instagram media post.
get_geolocation_data:
  name: get_geolocation_data
  description: Fetches geolocation data for a given IP address using the SHW Geolocation
    API.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to fetch geolocation data for.
timezone_by_id:
  name: timezone_by_id
  description: Fetches information for a given time zone using the RapidAPI service.
  parameters:
    type: object
    properties:
      timezone:
        description: The time zone to look up.
      fields:
        description: A comma-separated list of fields to include in the response.
          Defaults to 'offset,daylights_offset,daylights,daylights_code,timezone'.
      lang:
        description: The language code for the response, following ISO 639-1 standard.
          Defaults to 'de'.
zipcode_by_city:
  name: zipcode_by_city
  description: Retrieves the zip code(s) of a given city using the GeoSource API.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city for which to retrieve zip code(s). The city
          must be in the supported countries list (44 countries).
product_details:
  name: product_details
  description: Returns detailed product information from the Target API including
    variants, ratings, reviews, images, videos, price, promotion, and child products.
  parameters:
    type: object
    properties:
      tcin:
        description: Target product ID which is obtained from the product search API.
      store_id:
        description: The ID of the store from which the product details data is being
          retrieved. This field is required and cannot be empty.
      zip:
        description: User's zip code. Defaults to '94611'.
      state:
        description: State code of the user's location. Defaults to 'CA'.
      latitude:
        description: User's latitude information. Defaults to '37.820'.
      longitude:
        description: User's longitude information. Defaults to '-122.200'.
forex_quotes:
  name: forex_quotes
  description: Fetches the real-time price of a forex currency pair.
  parameters:
    type: object
    properties:
      target:
        description: The target currency code (e.g., 'USD').
      source:
        description: The source currency code (e.g., 'EUR').
stock_v2_get_profile:
  name: stock_v2_get_profile
  description: Retrieves the company profile information for a given performance ID
    using the RapidAPI Morning Star service.
  parameters:
    type: object
    properties:
      performanceid:
        description: The performance ID of the stock, obtained from endpoints such
          as /auto-complete, /get-summary, or /get-movers.
get_job_details:
  name: get_job_details
  description: Fetch detailed job information from a given job URL, optionally including
    skills, using the ToolBench RapidAPI service.
  parameters:
    type: object
    properties:
      job_url:
        description: The URL to the job posting.
      include_skills:
        description: Flag to include skills in the fetched details. Defaults to 'false'.
          Including skills will cost 1 more credit.
weather_report:
  name: weather_report
  description: Fetches the weather report of a specified city using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      cityname:
        description: Name of the city for which the weather report is to be fetched.
get_2_year_historical_quarterly_prices:
  name: get_2_year_historical_quarterly_prices
  description: Retrieves 2-year historical quarterly prices for a given stock ticker.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which to retrieve historical prices.
product_reviews:
  name: product_reviews
  description: Fetches and paginates through product reviews on Amazon for a given
    product.
  parameters:
    type: object
    properties:
      asin:
        description: Product ASIN for which to get reviews.
      query:
        description: Search query to filter reviews.
      sort_by:
        description: Sort order for reviews. Default is `TOP_REVIEWS`. Allowed values
          are `TOP_REVIEWS`, `MOST_RECENT`.
      verified_purchases_only:
        description: Only return reviews by reviewers who made a verified purchase.
      page_size:
        description: Number of reviews to return per page. Allowed values range from
          `1` to `20`. Default is `10`.
      page:
        description: Page number of results to return. Default is `1`.
      star_rating:
        description: Filter reviews by star rating. Default is `ALL`. Allowed values
          are `ALL`, `5_STARS`, `4_STARS`, `3_STARS`, `2_STARS`, `1_STARS`, `POSITIVE`,
          `CRITICAL`.
      images_or_videos_only:
        description: Only return reviews containing images and/or videos.
      country:
        description: Marketplace country, language, and currency. Default is `US`.
          Allowed values are `US`, `AU`, `BR`, `CA`, `CN`, `FR`, `DE`, `IN`, `IT`,
          `MX`, `NL`, `SG`, `ES`, `TR`, `AE`, `GB`, `JP`.
user_videos:
  name: user_videos
  description: Retrieves videos for a specified TikTok user using their `secUid` and
    `user_id`. Optionally, a cursor can be provided for pagination.
  parameters:
    type: object
    properties:
      secuid:
        description: The secUid of the TikTok user.
      user_id:
        description: The unique identifier of the TikTok user.
      cursor:
        description: Cursor for pagination to get the subsequent set of videos. Defaults
          to None.
routing:
  name: routing
  description: Calculates a route based on specified waypoints and options using the
    Map Toolkit API.
  parameters:
    type: object
    properties:
      points:
        description: Waypoints defined as latitude and longitude pairs in the format
          `{lat},{lng}|{lat},{lng}...`. At least 2 points are required.
      finish_instruction:
        description: Adds a finish instruction at the end of the route. Default is
          None.
      language:
        description: Language for the given instructions in ISO 639-1 code format.
          Default is `en`.
      voice_instructions:
        description: Enables voice instructions for text-to-speech engines. Default
          is None.
      filename:
        description: The name of the file if the output `format` is `gpx` or `kml`.
          Default is None.
      format:
        description: The format of the output. Default is `json`.
      weighting:
        description: Weighting option for bike routes. Default is `networks`.
      routetype:
        description: The type of route to calculate. Default is `bike`.
performance_stats_for_past_predictions:
  name: performance_stats_for_past_predictions
  description: Returns the accuracy statistics of past predictions over various time
    frames and allows optional filtering by federation and market.
  parameters:
    type: object
    properties:
      federation:
        description: Filter statistics by a specific federation. Defaults to None.
      market:
        description: Filter statistics based on the prediction market. Defaults to
          'classic'.
list_of_room_types:
  name: list_of_room_types
  description: Returns data related to room types from the Booking.com API. This function
    optionally takes a room type ID and an API key to fetch specific room type details.
  parameters:
    type: object
    properties:
      room_type_id:
        description: The ID of the room type to be retrieved. Defaults to None.
get_team_receiving_data:
  name: get_team_receiving_data
  description: Fetches receiving data for NFL teams for a given side (offense or defense)
    and year.
  parameters:
    type: object
    properties:
      side:
        description: Specifies whether to fetch data for offensive or defensive teams.
          Must be either "offense" or "defense".
      year:
        description: The year for which to fetch the data. Must be between 1920 and
          the current year.
        type: integer
retrieve_user:
  name: retrieve_user
  description: Retrieves details of a user based on the provided user ID from the
    rapidapi service.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the user whose details are to be retrieved.
zappos_product_detail_by_product_id:
  name: zappos_product_detail_by_product_id
  description: Fetches real-time product information from Zappos by product ID.
  parameters:
    type: object
    properties:
      product_id:
        description: The ID of the product to be fetched.
        type: integer
products:
  name: products
  description: Search for makeup products based on various filters and criteria.
  parameters:
    type: object
    properties:
      price_less_than:
        description: Filter products with a price less than the given value.
      product_type:
        description: Filter products by the specified type (e.g., foundation, mascara).
      product_tags:
        description: Filter products based on specific tags.
      brand:
        description: The brand of the products to filter by, default is 'colourpop'.
      rating_less_than:
        description: Filter products with a rating less than the given value.
      product_category:
        description: Sub-category of makeup products (e.g., 'lipstick'), default is
          'lipstick'.
      price_greater_than:
        description: Filter products with a price greater than the given value.
      rating_greater_than:
        description: Filter products with a rating greater than the given value.
get_weather:
  name: get_weather
  description: Fetch weather information including current, hourly, and daily data
    for a specific location.
  parameters:
    type: object
    properties:
      version:
        description: The version of the API to be used.
      lng:
        description: Geographical coordinate of the location (longitude).
        type: integer
      lat:
        description: Geographical coordinate of the location (latitude).
        type: integer
      unit:
        description: Unit of temperature ('F' for Fahrenheit, 'C' for Celsius, or
          default 'K' for Kelvin). Defaults to None.
get_railway_period_for_utc_date:
  name: get_railway_period_for_utc_date
  description: Fetch the railway period for a given UTC date provided in milliseconds.
  parameters:
    type: object
    properties:
      millis:
        description: The UTC date in milliseconds since the Unix epoch.
        type: integer
rental_amenities:
  name: rental_amenities
  description: Fetches rental amenities information for a given location using the
    AirDNA API.
  parameters:
    type: object
    properties:
      location:
        description: The location for which to fetch rental amenities information.
      currency:
        description: The currency code for the rental pricing. Defaults to None.
ublacklist_txt:
  name: ublacklist_txt
  description: Fetches the ublacklist.txt data for a specified game using the StopModReposts
    API.
  parameters:
    type: object
    properties:
      game:
        description: The name of the game to fetch the blacklist for. Defaults to
          'minecraft'.
txt:
  name: txt
  description: Fetches a plain text blocklist of sites for a specified game using
    the StopModReposts API.
  parameters:
    type: object
    properties:
      game:
        description: The name of the game for which to fetch the blocklist. Defaults
          to 'minecraft'.
brazil_songs:
  name: brazil_songs
  description: Fetches the Brazil Songs chart information for a given date and range.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch the chart data, in the format 'YYYY-MM-DD'.
      range:
        description: The range of chart data to retrieve.
eps_revisions:
  name: eps_revisions
  description: "Fetches analysts\u2019 revisions of a company's future quarterly and\
    \ annual earnings per share (EPS) from the last week and month."
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol of the company.
      exchange:
        description: Filter by exchange name or mic code. Defaults to None.
      country:
        description: Filter by country name or alpha code. Defaults to None.
balansheet_financials:
  name: balansheet_financials
  description: Fetches and returns the financial data for a given company symbol using
    the specified RapidAPI key.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock ticker symbol of the company for which financial data
          is requested.
user_stories_by_username:
  name: user_stories_by_username
  description: Fetch all stories of an Instagram account given its username.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to retrieve stories.
recommendation_trends:
  name: recommendation_trends
  description: Fetches recommendation trends for a given stock symbol using the Yahoo
    Finance API on RapidAPI.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock ticker symbol for which to retrieve recommendation
          trends.
get_10_year_historical_quarterly_prices:
  name: get_10_year_historical_quarterly_prices
  description: Fetch the 10-year historical quarterly prices for a given stock ticker.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which the historical data is to be
          fetched.
coins_get_news:
  name: coins_get_news
  description: Fetches news related to a specific cryptocurrency pair.
  parameters:
    type: object
    properties:
      pair_id:
        description: The ID of the cryptocurrency pair.
        type: integer
      lang_id:
        description: The language ID for the news articles. Defaults to 1.
      page:
        description: The page number for paginated results. Defaults to 1.
      time_utc_offset:
        description: 'The UTC offset in seconds. Example: UTC+8 would be 28800 seconds.
          Defaults to 28800.'
get_video_urls:
  name: get_video_urls
  description: Retrieves video or shorts URLs from YouTube using a provided video
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The YouTube video ID for which the URLs are to be fetched.
get_latest_quote:
  name: get_latest_quote
  description: Fetch the latest real-time quote for a given trading symbol.
  parameters:
    type: object
    properties:
      tradingsymbol:
        description: The trading symbol for which to fetch the latest quote. Check
          the list of all supported trading symbols at [https://stockseyes.com/group/all](https://stockseyes.com/group/all).
web_exchanges:
  name: web_exchanges
  description: Retrieve and sort exchanges based on specified criteria.
  parameters:
    type: object
    properties:
      sort:
        description: The sorting criteria for the output. Defaults to 'usd_volume_30d',
          which sorts the exchanges based on their monthly volume.
      direction:
        description: The sort order. Can be 'asc' for ascending or 'desc' for descending.
          Defaults to 'desc'.
      filter_zero_volume:
        description: If set to True, excludes exchanges with no volume in the last
          30 days. Defaults to None.
      chain_slug:
        description: The blockchain slug (e.g., 'ethereum' for Ethereum mainnet).
          If provided, the function lists exchanges only for this chain. Defaults
          to None.
staticmaps:
  name: staticmaps
  description: Generates a static map image URL based on the given parameters.
  parameters:
    type: object
    properties:
      size:
        description: Size of the map. Format is usually `{width}x{height}`.
      center:
        description: Center coordinates of the map. Format is `{latitude},{longitude}`.
      zoom:
        description: Zoom level of the map.
        type: integer
      bounds:
        description: Bounding box to define the map area instead of `center` and `zoom`.
          Format is `{north},{east},{south},{west}`.
      geojson:
        description: GeoJSON geometry to include on the map. Format is `{attribute}:{value}[|{attribute}:{value}
          ...]`.
      maptype:
        description: Type of the map, defining its appearance. Default is 'toursprung-terrain'.
      path:
        description: Path to include on the map. Format is `{attribute}:{value}[|{attribute}:{value}
          ...]`.
      delta_zoom:
        description: Zoom level adjustment if zoom is calculated automatically.
      kml:
        description: KML data to include on the map. Format is `{kml}?{attribute}={value}[&{attribute}={value}
          ...]`.
      format:
        description: File format of the map image. Default is 'png'.
      marker:
        description: Marker to include on the map. Format is `{attribute}:{value}[|{attribute}:{value}
          ...]`.
      factor:
        description: Image scaling factor.
get_a_specific_remote_job_by_id:
  name: get_a_specific_remote_job_by_id
  description: Fetch detailed information about a specific remote job using its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the job to fetch details for.
options:
  name: options
  description: Fetches stock and options trading data for the given ticker symbol
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      ticker:
        description: The ticker symbol for the U.S. trading stock or ETF.
      x_rapidapi_proxy_secret:
        description: The RapidAPI proxy secret for authentication. Defaults to 'a755b180-f5a9-11e9-9f69-7bf51e845926'.
api_v2_minimal_exchange_amount:
  name: api_v2_minimal_exchange_amount
  description: Fetch the minimal payment amount required to perform a cryptocurrency
    exchange using the ChangeNow API v2.
  parameters:
    type: object
    properties:
      flow:
        description: Type of exchange flow. Options are 'standard' or 'fixed-rate'.
          Default is 'standard'.
      tocurrency:
        description: Ticker of the currency to receive.
      fromcurrency:
        description: Ticker of the currency to exchange.
      fromnetwork:
        description: Network of the currency to exchange.
      tonetwork:
        description: Network of the currency to receive.
stock_get_dividends_splits:
  name: stock_get_dividends_splits
  description: Fetches stock dividends and splits data for a given ticker ID using
    the Webull API.
  parameters:
    type: object
    properties:
      tickerid:
        description: The ticker ID of the stock for which to fetch dividends and splits
          data. This is the value of the tickerId field returned from endpoints such
          as /stock/search, /market/get-common-ranking, /market/get-top-active, and
          /market/get-top-gainers.
        type: integer
cnpj:
  name: cnpj
  description: "Fetch company data by CNPJ (Cadastro Nacional da Pessoa Jur\xEDdica)\
    \ using the RapidAPI service."
  parameters:
    type: object
    properties:
      cnpj:
        description: The CNPJ number of the company to fetch data for.
all_strains_descending:
  name: all_strains_descending
  description: Fetches a list of all weed strains ordered in a specified descending
    order from the RapidAPI Weed Strain API.
  parameters:
    type: object
    properties:
      ordering:
        description: The attribute by which to order the strains in descending order
          (e.g., 'name', 'thc', etc.).
key_statistics:
  name: key_statistics
  description: Fetches key statistics for a given stock ticker using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol to retrieve key statistics for.
news_list:
  name: news_list
  description: Fetch a list of the latest news articles based on the given performance
    ID.
  parameters:
    type: object
    properties:
      performanceid:
        description: The ID used to filter news articles, obtained from endpoints
          like auto-complete, get-summary, or get-movers.
executives:
  name: executives
  description: Fetches information about the current composition of executives for
    a given stock symbol using the Holistic Finance Stock Data API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to retrieve executive information.
business_reviews:
  name: business_reviews
  description: Fetches and paginates business reviews by Business ID.
  parameters:
    type: object
    properties:
      business_id:
        description: 'Unique Business ID. Accepts google_id, business_id, and google_place_id.
          Examples of valid ids: `0x880fd393d427a591:0x8cba02d713a995ed`, `ChIJkaUn1JPTD4gR7ZWpE9cCuow`.'
      language:
        description: Language code for the results. For a list of supported language
          codes see https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes. Default
          is 'en'.
      fields:
        description: A comma-separated list of review fields to include in the response.
          Default is None, which returns all fields.
      sort_by:
        description: Sort order for the reviews, allowed values are `most_relevant`,
          `newest`, `highest_ranking`, `lowest_ranking`. Default is 'most_relevant'.
      region:
        description: Region or country code to query Google Maps from, see https://en.wikipedia.org/wiki/List_of_ISO_3166-1_alpha-2
          (Alpha-2 code). Default is 'us'.
      limit:
        description: Maximum number of business reviews to return (1-150). Default
          is 5.
      offset:
        description: Number of business reviews to skip for pagination. Default is
          None.
      query:
        description: Filter reviews matching a text query. Default is None.
active_listings:
  name: active_listings
  description: Fetches active rental listings from the AirDNA API for a specified
    location and time period.
  parameters:
    type: object
    properties:
      location:
        description: The location code for which to retrieve active rental listings.
      start_year:
        description: The starting year for the time period.
        type: integer
      start_month:
        description: The starting month for the time period.
        type: integer
      number_of_months:
        description: The number of months from the start date for which to retrieve
          data.
        type: integer
real_time_hashtag_search:
  name: real_time_hashtag_search
  description: Searches for live hashtags on social media based on a given keyword.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search for related hashtags.
tweets_by_userid:
  name: tweets_by_userid
  description: Fetches the most recent tweets of a specified user, with optional pagination
    and count control.
  parameters:
    type: object
    properties:
      userid:
        description: The userId of the user whose tweets are to be fetched.
      cursor:
        description: Cursor for pagination. Use to navigate to the next page of tweets.
          Default is None.
      count:
        description: Number of tweets to fetch. Default is '20'.
movies_id:
  name: movies_id
  description: Fetch metadata for a specified movie from a given platform and region
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      platform:
        description: Retrieve sources from the specified platform.
      is_id:
        description: The ID of the movie. You can also use a TMDb ID.
        type: integer
      region:
        description: Retrieve the sources' deep link from this region.
get_user_id:
  name: get_user_id
  description: Fetches the user ID for a given Twitch channel using the Twitch API.
  parameters:
    type: object
    properties:
      channel:
        description: The Twitch channel name for which to fetch the user ID.
exact_url_non_english:
  name: exact_url_non_english
  description: Retrieves the backlinks of a specific non-English URL using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      domain:
        description: The domain of the non-English URL for which to retrieve backlinks.
v1_animals:
  name: v1_animals
  description: Queries the API Ninjas Animals API endpoint to return up to 10 results
    matching the input animal name.
  parameters:
    type: object
    properties:
      name:
        description: The common name of the animal to search. This parameter supports
          partial matches (e.g., "fox" will match "gray fox" and "red fox").
billboard_global_excl_us:
  name: billboard_global_excl_us
  description: Fetches the Billboard Global Excl. US chart for a specified date using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve the Billboard Global Excl. US
          chart, formatted as 'YYYY-MM-DD'. Available data starts from September 19,
          2020.
artist_featuring:
  name: artist_featuring
  description: Fetches the featuring tracks for a given artist using the Spotify API.
  parameters:
    type: object
    properties:
      is_id:
        description: The Spotify artist ID.
rental_availability:
  name: rental_availability
  description: Fetches the availability information for a specific rental property
    using the given rental ID.
  parameters:
    type: object
    properties:
      rentalid:
        description: The unique identifier of the rental property obtained from the
          Rental Search API in the Vacation Rentals collection.
results_by_date:
  name: results_by_date
  description: Fetches cricket match results for a specified date using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve cricket match results, in YYYY-MM-DD
          format.
get_team_roster:
  name: get_team_roster
  description: Fetches the current or historical roster of an NBA team.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the team, ranging from 1 to 30.
      statstoget:
        description: Specifies whether to fetch 'totals' or 'averages'. Defaults to
          'averages'.
      archivedate:
        description: A specific date in the format YYYYMMDD to fetch historical data.
          Historical data is available from 20230505 onwards.
      teamabv:
        description: The abbreviation of the team, e.g., CHI, BOS, ATL. Defaults to
          'SAC'.
get_district_capital_by_id:
  name: get_district_capital_by_id
  description: Gets the capital of a district in Ghana by district ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the district.
        type: integer
recommend:
  name: recommend
  description: Fetches a recommendation for a given experiment ID using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      experiment_id:
        description: The ID of the experiment for which to fetch recommendations.
        type: integer
get_random_joke_by_category:
  name: get_random_joke_by_category
  description: Fetches a random joke from a specified category using the World of
    Jokes API.
  parameters:
    type: object
    properties:
      category:
        description: The category of joke to fetch, based on the categories available
          in the jokes API.
validate_cpf_number:
  name: validate_cpf_number
  description: Validates a given CPF number using the RapidAPI CPF Validator service.
  parameters:
    type: object
    properties:
      n:
        description: The CPF number to be validated.
domainstatus:
  name: domainstatus
  description: Retrieves the domain status to determine if it is a webmail or disposable
    email provider.
  parameters:
    type: object
    properties:
      email:
        description: The email address to check against the domain status.
      domain:
        description: The domain to check for its status.
custom_dice:
  name: custom_dice
  description: Roll a specified number of dice with a specified number of sides using
    the RapidAPI Dice Roll Simulator.
  parameters:
    type: object
    properties:
      dice:
        description: The number of dice to roll. Defaults to 3.
      sides:
        description: The number of sides on each die. Defaults to 8.
leaguetotalstandings:
  name: leaguetotalstandings
  description: Fetches the total standings for a specific E-Sports league given the
    season ID and tournament ID.
  parameters:
    type: object
    properties:
      seasonid:
        description: The season ID for which to retrieve the league's total standings.
        type: integer
      tournamentid:
        description: The unique tournament ID for which to retrieve the league's total
          standings.
        type: integer
getlistings:
  name: getlistings
  description: Retrieve a list of condominiums and townhouses in specified cities
    of Southwest Florida and the East Coast.
  parameters:
    type: object
    properties:
      sort:
        description: Defines how the listings should be sorted. Supported values are
          'RELEVANCE' (best match), 'NEWEST' (newest first), 'PRICE_LOW' (cheapest
          first), and 'PRICE_HIGH' (most expensive first). Default is 'RELEVANCE'.
      offset:
        description: For pagination. Specifies the starting point in the collection
          of listings. For example, to get the first set of items, set offset to 0.
          Default is 0.
        type: integer
      price_max:
        description: The maximum price in US dollars for the condos and townhouses.
          Default is 250,000.
        type: integer
      city:
        description: The name of the city to search within. Supported cities include
          Cape Coral, Fort Myers, West Palm Beach, Lake Worth, Lantana, Boynton Beach,
          Delray Beach, Boca Raton, Pompano Beach, Fort Lauderdale, Naples, Tampa,
          and Saint Petersburg. Default is 'Cape Coral'.
      limit:
        description: The maximum number of items to return. Default is 50.
        type: integer
historical_rates:
  name: historical_rates
  description: Gets historical currency exchange rates for a given date and base currency.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to request the exchange rates, formatted as
          'YYYY-MM-DD'. Defaults to '2020-01-01'.
      base:
        description: The base currency code for the exchange rates. Defaults to 'eur'.
trending:
  name: trending
  description: Fetches the trending videos for a specified geographical location.
  parameters:
    type: object
    properties:
      geo:
        description: ISO 3166-2 country code of the region for which trending data
          is requested (e.g., 'US', 'UK', 'CA', 'IN').
      x_cachebypass:
        description: Cache bypass value, should be '1' if provided. Defaults to None.
      lang:
        description: Locale or language for the request (e.g., 'en', 'gb', 'hi').
          Defaults to 'en'.
geocodingsearch:
  name: geocodingsearch
  description: Performs a forward geocoding search using a free-form query string
    and optional parameters to specify query filters and output format.
  parameters:
    type: object
    properties:
      q:
        description: Free-form query string for the geocoding search.
      countrycodes:
        description: Two-letter country code as defined in ISO 3166-1 alpha2 to restrict
          search to a specific country.
      json_callback:
        description: Name of JSON callback function for JSONP calls; use this when
          the format is set to JSON.
      polygon_text:
        description: Include a textual representation of the polygon geometry in the
          output.
      namedetails:
        description: Include detailed naming information in the output.
      limit:
        description: Limit the number of search results.
      viewbox:
        description: Specify a bounding box for the search area in the format 'x1,y1,x2,y2',
          where x is longitude and y is latitude.
      format:
        description: Output format of the response (e.g., JSON).
      polygon_geojson:
        description: Include GeoJSON representation of the polygon geometry in the
          output.
      bounded:
        description: Use '1' to restrict the search area to the specified viewbox.
      polygon_svg:
        description: Include SVG representation of the polygon geometry in the output.
      polygon_kml:
        description: Include KML representation of the polygon geometry in the output.
      polygon_threshold:
        description: Simplification threshold for the polygon geometry.
      accept_language:
        description: Set the query and response language using two-letter language
          codes (e.g., 'en' or 'es') or a combination of language and region code
          (e.g., 'en-GB' or 'es-AR'). Default is 'en'.
      addressdetails:
        description: Include detailed address information in the output.
get_vector_tile:
  name: get_vector_tile
  description: Fetches vector tiles based on the OpenMapTiles schema using the provided
    x, y, and z coordinates.
  parameters:
    type: object
    properties:
      x:
        description: The X coordinate of the tile.
        type: integer
      y:
        description: The Y coordinate of the tile.
        type: integer
      z:
        description: The zoom level of the tile.
        type: integer
falling_three_methods:
  name: falling_three_methods
  description: Fetches a list of stocks having the Falling Three Methods signal from
    the RapidAPI BarPatterns service.
  parameters:
    type: object
    properties:
      page:
        description: The page number of results to retrieve. Defaults to 1.
peer_ratio_averages:
  name: peer_ratio_averages
  description: Fetches and returns an average of company peer ratios for trailing
    twelve months (TTM) data for a given company symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol of the company for which to fetch peer ratio
          averages.
consulta_receita_federal:
  name: consulta_receita_federal
  description: Fetch data from the Receita Federal using a given tax ID.
  parameters:
    type: object
    properties:
      taxid:
        description: The tax ID to search for in the Receita Federal database.
      maxage:
        description: The maximum age of the data to be fetched. Defaults to 30.
search_social_links:
  name: search_social_links
  description: Search for social profile links based on a given query or keywords.
  parameters:
    type: object
    properties:
      query:
        description: The search query or keywords to find social profile links.
      social_networks:
        description: A comma-delimited list of social networks to search for.
asset:
  name: asset
  description: Fetches the UUID and details for all assets, with optional query parameters
    to filter the results.
  parameters:
    type: object
    properties:
      status:
        description: The status of the assets to return. Can be 'ACTIVE' or 'INACTIVE'.
          Defaults to 'ACTIVE'.
      symbol:
        description: The ticker symbol of the assets to return (e.g., 'BTC'). Defaults
          to None.
mensajes_2:
  name: mensajes_2
  description: Fetches messages for student number 2 using the provided RapidAPI key
    and authorization details.
  parameters:
    type: object
    properties:
      authorization:
        description: The authorization token required for API access.
      authoriza:
        description: An additional authorization token. Defaults to None.
exclusiveness_callerid:
  name: exclusiveness_callerid
  description: This function checks the exclusiveness status associated with the given
    `callerid` by making a request to the "most-exclusive-api" on RapidAPI.
  parameters:
    type: object
    properties:
      callerid:
        description: A unique string identifying the requester. It should be alphanumeric
          with allowed characters [a-zA-Z0-9_-] and have a maximum length of 32 characters.
get_the_latest_remote_jobs:
  name: get_the_latest_remote_jobs
  description: Fetches the latest 20 remote job listings from a specified company
    and/or category using the RapidAPI.
  parameters:
    type: object
    properties:
      company:
        description: The company name to filter job listings (default is 'shopify').
      category:
        description: The job category to filter job listings (default is None).
generate_document_resume:
  name: generate_document_resume
  description: Generates a resume document using the provided degree, skills, and
    university information.
  parameters:
    type: object
    properties:
      degree:
        description: The degree to be included in the resume. Defaults to 'Information
          Systems'.
      skills:
        description: The skills to be included in the resume. Defaults to 'Networking,
          Web Development'.
      university:
        description: The university to be included in the resume. Defaults to 'Michigan
          State University'.
movies_get_dvds:
  name: movies_get_dvds
  description: Fetches a list of DVDs based on the specified type of movie using the
    Flixster API.
  parameters:
    type: object
    properties:
      typemovie:
        description: 'The type of movie to filter DVDs by. Can be one of the following:
          ''NEW_RELEASE'' or ''COMING_SOON''. Default is ''NEW_RELEASE''.'
tirto_detail:
  name: tirto_detail
  description: Fetch detailed information about a specific Tirto news article using
    its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the Tirto news article to fetch details for.
        type: integer
user_friends_list:
  name: user_friends_list
  description: Retrieve a full listing of in-game, online, and offline friends of
    a user from the Steam community using RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: The user's Steam ID for whom the friends list is to be retrieved.
random_skin_from_class:
  name: random_skin_from_class
  description: Fetches information about a random Counter-Strike skin from a specified
    class using the CS Skin API.
  parameters:
    type: object
    properties:
      class_name:
        description: The class of Counter-Strike skin to retrieve, e.g., "Rifle".
lists_details:
  name: lists_details
  description: Fetches and returns the public information of a Twitter List based
    on the given list ID.
  parameters:
    type: object
    properties:
      list_id:
        description: The ID of the Twitter List whose details are to be fetched.
highlight_items:
  name: highlight_items
  description: Fetches highlight items for a given highlight ID from a private Instagram
    API using RapidAPI.
  parameters:
    type: object
    properties:
      highlightid:
        description: The ID of the highlight to fetch information for. Default is
          'highlight:18064021144190483'.
channel_details:
  name: channel_details
  description: Fetches all available details about a given YouTube channel ID using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      channelid:
        description: The unique identifier for the YouTube channel.
titles_series_seriesid:
  name: titles_series_seriesid
  description: Fetches information about a TV series using its IMDb ID from the Movies
    Database API.
  parameters:
    type: object
    properties:
      seriesid:
        description: The IMDb ID of the TV series.
rocr:
  name: rocr
  description: Calculates the Rate of Change Ratio (ROCR) for a given financial instrument
    over a specified time period.
  parameters:
    type: object
    properties:
      interval:
        description: 'Interval between two consecutive points in the time series.
          Supported values include: `1min`, `5min`, `15min`, `30min`, `45min`, `1h`,
          `2h`, `4h`, `1day`, `1week`, `1month`.'
      symbol:
        description: Instrument symbol, which can be any equity, index, ETF, forex,
          or cryptocurrency (e.g., `AAPL`, `EUR/USD`, `ETH/BTC`).
      format:
        description: The format of the output, which can either be `csv` or `json`.
          Default is `json`.
      time_period:
        description: Number of periods to go back for calculating the ROCR. Default
          is 9.
      series_type:
        description: 'The type of price series to use in the calculation. Supported
          values include: `open`, `high`, `low`, `close`. Default is `close`.'
      outputsize:
        description: Number of data points to retrieve. Default is 30.
stock_get_daily_low:
  name: stock_get_daily_low
  description: Fetches the daily low stock price for a given symbol from the specified
    region using the RapidAPI service.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: The region code where the stock is listed. Defaults to 'US'.
          Valid options include 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT',
          'ES', 'GB', 'S'.
get_single_user:
  name: get_single_user
  description: Retrieves individual user data for a provided user ID from the RapidAPI
    service.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the user for which to retrieve data.
postcodes:
  name: postcodes
  description: This function fetches information about a given Japanese postcode using
    the PostcodeJP API.
  parameters:
    type: object
    properties:
      postcode:
        description: The postcode for which information is to be fetched.
search_place_id_api:
  name: search_place_id_api
  description: Fetches details for a given place from the Complete Study Bible API
    using the provided Place Unique ID.
  parameters:
    type: object
    properties:
      place_unique_id:
        description: The unique identifier for the place to be searched in the API.
retrieve_data:
  name: retrieve_data
  description: Retrieve data from the Cameroon news API with optional query parameters.
  parameters:
    type: object
    properties:
      rank:
        description: The ranking criteria for the news data. Default is None.
      page:
        description: The page number to retrieve for the data. Default is None.
      search:
        description: A search key to filter the news data. Default is None.
getbookbyid:
  name: getbookbyid
  description: Retrieve details of a specific book using its unique ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the book to retrieve.
get_related_questions:
  name: get_related_questions
  description: Fetches related questions from Google SERP "People Also Ask" boxes
    based on a provided query.
  parameters:
    type: object
    properties:
      query:
        description: The search query for which to find related questions.
      location:
        description: Specify the proxy location for the search. Defaults to 'us'.
          Supported countries include 'US', 'CA', 'IE', 'GB', 'FR', 'DE', 'SE', 'IN',
          'JP', 'KR', 'SG', 'AU', 'BR'.
      max_results:
        description: The maximum number of related questions to fetch. Defaults to
          10.
text_to_image:
  name: text_to_image
  description: Generate an image based on the input text using the specified style
    through the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      text:
        description: The text to convert into an image.
      style:
        description: The preset style for the image. Defaults to 'enhance'.
quotes_get_mashup:
  name: quotes_get_mashup
  description: Fetch additional information for a specific market quote.
  parameters:
    type: object
    properties:
      symbol:
        description: The market quote symbol for which the information is to be fetched.
          Only one symbol is allowed.
get_username_by_user_id:
  name: get_username_by_user_id
  description: Fetches the Instagram username associated with a given user ID using
    the specified RapidAPI key.
  parameters:
    type: object
    properties:
      is_id:
        description: The Instagram user ID.
        type: integer
v1:
  name: v1
  description: Retrieves filtered observations from the Version 1 endpoint based on
    specified time and filters.
  parameters:
    type: object
    properties:
      time:
        description: 'Select one of the following timeframes:'
      filter1:
        description: Can be a specific user, type, or tag (e.g., url, domain, ip,
          sha256, md5 for type, and phishing, ransomware, CobaltStrike for tag). Default
          is 'phishing'.
      filter2:
        description: Can be a specific user, type, or tag (e.g., url, domain, ip,
          sha256, md5 for type, and phishing, ransomware, CobaltStrike for tag). Default
          is 'url'.
red_colour_qr_code_generator:
  name: red_colour_qr_code_generator
  description: Generates a red-colored QR code for the given URL using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      url:
        description: The URL to encode in the QR code. Defaults to 'grayhat.in'.
dad_jokes_search:
  name: dad_jokes_search
  description: Searches for dad jokes containing the given keyword using the RapidAPI
    Dad Jokes API.
  parameters:
    type: object
    properties:
      text:
        description: The keyword to search for in the jokes. Default is 'dad'.
products_search:
  name: products_search
  description: Search for products by a specified keyword and optional filters, with
    support for pagination and sorting.
  parameters:
    type: object
    properties:
      keyword:
        description: The term or phrase to search for related products.
      filters:
        description: Filters to apply to the product search results. Multiple filters
          can be specified using the format `key~value`. For example, 'colorList~White&masterClID~180'.
      curpage:
        description: The current page number for paginated results. Default is 1.
      itemsperpage:
        description: The number of items to display per page. Default is 48.
      sortby:
        description: The field by which to sort the results. Default is 0.
data_country:
  name: data_country
  description: Fetch data related to sports odds based on the provided parameters.
  parameters:
    type: object
    properties:
      package:
        description: The package to use in the query string.
      typeodds:
        description: The type of odds (e.g., 'line', 'live').
      sportid:
        description: The ID of the sport (e.g., 1, 2, 3) or 0 for all sports.
        type: integer
      langodds:
        description: The language for the odds (e.g., 'en', 'ru', 'fr').
      typeparams:
        description: The type of parameters (e.g., 'sports', 'countries', 'tournaments').
get_live_games:
  name: get_live_games
  description: Fetches the list of all live games for a given sport along with their
    current status and score using the ViperScore API.
  parameters:
    type: object
    properties:
      sport:
        description: The type of sport for which to retrieve live games (e.g., 'football',
          'basketball').
drivers:
  name: drivers
  description: Fetches a list of all drivers for a given season using the F1 Live
    Motorsport Data API.
  parameters:
    type: object
    properties:
      season_id:
        description: The ID of the season for which to list the drivers.
        type: integer
get_post_comments:
  name: get_post_comments
  description: Fetch comments for a given Twitter post using its post ID.
  parameters:
    type: object
    properties:
      pid:
        description: The post ID for which to retrieve comments.
      count:
        description: The number of comments to retrieve.
      cursor:
        description: Cursor for pagination to retrieve the next set of comments. Defaults
          to None.
user_feed_video_posts_v2:
  name: user_feed_video_posts_v2
  description: Fetches user feed video posts from TikTok using version 2 of the API.
  parameters:
    type: object
    properties:
      limit:
        description: Limit the number of records returned. Defaults to 30, with a
          maximum of 30.
      max_cursor:
        description: Pagination cursor for getting additional videos. Use the value
          of `max_cursor` from the previous request response to fetch more videos.
      username:
        description: The username of the TikTok influencer. For example, `'charlidamelio'`.
          Defaults to `'tiktok'`.
      sec_uid:
        description: 'The secondary unique ID for faster request processing. It can
          be obtained from the User Information endpoint. For example: `''MS4wLjABAAAAv7iSuuXDJGDvJkmH_vz1qkDZYo1apxgzaxdBSeIuPiM''`.'
search_searchterm:
  name: search_searchterm
  description: Search for a term using the Uncovered Treasure API and return the results.
  parameters:
    type: object
    properties:
      searchterm:
        description: The term to search for, e.g., "God's plan".
      callback:
        description: An optional JSONP callback parameter for the API request.
get_regions:
  name: get_regions
  description: Retrieves a list of regions based on provided search criteria.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search for regions. Defaults to 'asia'.
      perpage:
        description: The number of regions to return per page. Defaults to 50.
        type: integer
      is_id:
        description: The ID of the region to search for. Defaults to None.
      page:
        description: The number of regions to return per page. Defaults to 50.
        type: integer
get_chapter:
  name: get_chapter
  description: Fetches and returns a specific chapter from the Bible given the book
    name and various optional parameters.
  parameters:
    type: object
    properties:
      book_name:
        description: The name of the book from the Bible (e.g., 'Genesis', 'Job').
      uppercase_mode:
        description: If True, the text will be returned in uppercase. Defaults to
          None.
      text_mode:
        description: The mode of text to return. Defaults to 'vowels'.
      chapter:
        description: The specific chapter number to fetch. Defaults to 1.
channel:
  name: channel
  description: Fetches videos from a YouTube channel using the provided parameters.
  parameters:
    type: object
    properties:
      next:
        description: Pagination (continuation) parameter to get the next set of channel
          videos. Defaults to a specific continuation token.
      filter:
        description: 'Filter for live streams. Available options are:'
      is_id:
        description: Channel ID. Defaults to 'UCiTGKA9W0G0TL8Hm7Uf_u9A'.
      sort:
        description: 'Sort parameter. Available options are:'
object_detection:
  name: object_detection
  description: Detects various objects in an image through the Google Lens API, providing
    bounding boxes, labels/types, and confidence scores.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the image to perform object detection on.
autocomplete_zipcodes_zip4:
  name: autocomplete_zipcodes_zip4
  description: Fetches autocomplete suggestions for USA Zip+4 zip codes using the
    provided zipcode and API key.
  parameters:
    type: object
    properties:
      zipcode:
        description: The base ZIP code for which to fetch autocomplete suggestions.
get_cities_in_a_country:
  name: get_cities_in_a_country
  description: Fetches a list of cities in a specified country filtered by population
    range, with options for pagination.
  parameters:
    type: object
    properties:
      country_iso2:
        description: The ISO 3166-1 alpha-2 code of the country.
      page_size:
        description: The number of cities to return per page. Default is 20.
      population_min:
        description: The minimum population of the cities to include. Default is 0.
      next_token:
        description: Token for pagination to fetch the next set of cities. Default
          is None.
      population_max:
        description: The maximum population of the cities to include. Default is 100,000,000.
group_breed_data_by_property:
  name: group_breed_data_by_property
  description: Groups cat breed data based on a specified property and its value.
  parameters:
    type: object
    properties:
      property:
        description: The property by which to group the cat breed data.
      property_value:
        description: The value of the property to group the cat breed data.
get_mempool_v2:
  name: get_mempool_v2
  description: Retrieve a list of transaction IDs currently in the mempool of the
    specified blockchain node, representing unconfirmed transactions not yet included
    in any block.
  parameters:
    type: object
    properties:
      blockchain:
        description: The name of the blockchain.
      pagesize:
        description: The number of transactions to return per call. Default and maximum
          is 1000.
      page:
        description: Specifies the page of returned transactions, starting from 1.
          If out of range, the closest possible page is returned. Default is 1.
consulta_empresa:
  name: consulta_empresa
  description: Fetches company information based on the given CNPJ ID using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      is_id:
        description: The first 8 digits of the CNPJ used to identify the company.
getcompetitionsid:
  name: getcompetitionsid
  description: Fetches competition details by unique identifier from the list of televised
    football matches in Spain.
  parameters:
    type: object
    properties:
      is_id:
        description: Unique identifier of the competition to be fetched.
        type: integer
science:
  name: science
  description: Fetches science news from Google News using the provided language region
    and RapidAPI key.
  parameters:
    type: object
    properties:
      lr:
        description: The language region code (e.g., 'en-US') to filter the news articles.
get_all_kfc_locations_by_state:
  name: get_all_kfc_locations_by_state
  description: Fetches all KFC locations in a specified state using the given RapidAPI
    key and returns the results.
  parameters:
    type: object
    properties:
      page:
        description: The page number for paginated results.
        type: integer
      state:
        description: The two-letter state code for which to fetch KFC locations.
alerts_parameters:
  name: alerts_parameters
  description: Fetches a list of weather alerts from the National Weather Service
    API, with optional filtering parameters.
  parameters:
    type: object
    properties:
      start:
        description: Start time in ISO8601 format.
      end:
        description: End time in ISO8601 format.
      status:
        description: Event status (e.g., alert, update, cancel).
      zone_type:
        description: Zone type (e.g., land, marine).
      active:
        description: Active alerts indicator (1 for active, 0 for inactive).
      point:
        description: Geographic point in "latitude,longitude" format.
      state:
        description: State or marine code.
      zone:
        description: Zone ID for forecast or county.
      urgency:
        description: Urgency of the alert (e.g., expected, immediate).
      region:
        description: Region code.
      certainty:
        description: Certainty of the event (e.g., likely, observed).
      severity:
        description: Severity of the event (e.g., minor, moderate, severe).
      limit:
        description: Limit the number of results (integer).
profile_info:
  name: profile_info
  description: Retrieves profile information from Instagram using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which profile information is to be
          retrieved. Defaults to 'kimkardashian'.
fetchamatch:
  name: fetchamatch
  description: Fetches match details from the specified screening and customer IDs
    using the provided API credentials.
  parameters:
    type: object
    properties:
      authorization:
        description: Authorization token for the API.
      content_type:
        description: The content type for the request.
      customer_a_id:
        description: The customer ID for whom the match is being fetched.
      match_1_id:
        description: The ID of the match to fetch details for.
      screening_a_id:
        description: The ID of the screening in which the match was found.
dark_cloud_cover:
  name: dark_cloud_cover
  description: This function retrieves a list of stocks showing the Dark Cloud Cover
    pattern signal from the specified page using the RapidAPI service.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve. Defaults to 1.
bullish_harami:
  name: bullish_harami
  description: Fetches a list of stocks exhibiting the Bullish Harami candlestick
    pattern from the API.
  parameters:
    type: object
    properties:
      page:
        description: The page number of results to retrieve. Default is 1.
getmatchesbycity:
  name: getmatchesbycity
  description: Fetches all the cricket matches held in a specified city using the
    IPL API.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city to filter the cricket matches by.
searchcnit:
  name: searchcnit
  description: Fetches information related to a French vehicle identification number
    (CNIT) using the specified license plate and function.
  parameters:
    type: object
    properties:
      plate:
        description: The vehicle license plate number to search for. Defaults to '021A13'.
      function:
        description: The specific API function to call. Defaults to 'getktypefornumplatefrancemineplate'.
house_prices_get_points_of_interest:
  name: house_prices_get_points_of_interest
  description: Fetches the nearest points of interest for a given property using the
    Zoopla API.
  parameters:
    type: object
    properties:
      property_id:
        description: The ID of the property for which to retrieve points of interest.
          This is usually obtained from the `/house-prices/estimate` endpoint.
        type: integer
consumer_phone_search:
  name: consumer_phone_search
  description: Search for people in the Data Axle database based on the provided criteria.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of results to return.
      packages:
        description: The data packages or filters to apply to the search.
      query:
        description: The phone number to search for. Defaults to '(206) 555-1212'.
veiculo_tipo_id_marca:
  name: veiculo_tipo_id_marca
  description: Retrieves a listing of vehicles for a given brand from an API.
  parameters:
    type: object
    properties:
      veiculo_tipo:
        description: The type of vehicle (e.g., "carros", "motos").
      id_marca:
        description: The ID of the vehicle brand.
leaguepowerrankingrounds:
  name: leaguepowerrankingrounds
  description: Fetches the power ranking rounds for the specified tournament and season
    in a football league.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The unique ID of the tournament for which to retrieve the power
          ranking rounds.
        type: integer
      seasonid:
        description: The season ID for which to retrieve the power ranking rounds.
        type: integer
author:
  name: author
  description: Fetches author information from the quotes-diffusion API based on the
    given parameters.
  parameters:
    type: object
    properties:
      page:
        description: Page number for pagination purposes.
      search:
        description: Term to search for specific authors.
token_id:
  name: token_id
  description: Fetches the information of a Token by its address using the Uniswap
    V2 API.
  parameters:
    type: object
    properties:
      is_id:
        description: The address or ID of the Token to fetch information for.
geocode_v1_json:
  name: geocode_v1_json
  description: Fetches geocoding information from the OpenCage Geocoder API.
  parameters:
    type: object
    properties:
      q:
        description: A query string that can be either specific coordinates ("latitude,longitude")
          or an address.
      key:
        description: The API key obtained from registering at https://geocoder.opencagedata.com/.
      language:
        description: An IETF language tag (e.g., 'es' for Spanish or 'pt-BR' for Brazilian
          Portuguese). Defaults to 'en'.
getchapter:
  name: getchapter
  description: Fetches a specific chapter from a specified book of the Bible using
    the Ajith Holy Bible API.
  parameters:
    type: object
    properties:
      book:
        description: The name of the book from the Bible.
      chapter:
        description: The chapter number from the specified book.
        type: integer
listing_status:
  name: listing_status
  description: Retrieve the availability status of a listing for a given month and
    year.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the listing.
      year:
        description: The year for which the status is to be retrieved.
        type: integer
      month:
        description: The month for which the status is to be retrieved.
        type: integer
webcams_list_category_category_category:
  name: webcams_list_category_category_category
  description: Fetch a list of webcams based on specified categories.
  parameters:
    type: object
    properties:
      category:
        description: Comma-separated list of category names for which webcams are
          to be fetched. At least one category is required.
      lang:
        description: Language code to localize the results, if available. Defaults
          to 'en'.
      show:
        description: Specifies the content to be listed in the response. Possible
          values include 'webcams', 'categories', 'continents', 'countries', 'regions',
          'properties'. Defaults to 'webcams:image,location'.
get_locations:
  name: get_locations
  description: Fetches geographical locations within a specified radius of the given
    longitude and latitude coordinates, optionally filtered by type.
  parameters:
    type: object
    properties:
      lon:
        description: Longitude coordinate of the center point.
        type: integer
      lat:
        description: Latitude coordinate of the center point.
        type: integer
      radius:
        description: Radius in miles from the center point within which to search
          for locations. Defaults to 3.
global_search_by_query:
  name: global_search_by_query
  description: Performs a global search on Instagram based on the given query.
  parameters:
    type: object
    properties:
      query:
        description: The search term to be used in the Instagram search.
news_list_top:
  name: news_list_top
  description: Fetches the top news articles with optional pagination support.
  parameters:
    type: object
    properties:
      pagesize:
        description: Number of news articles to fetch per request, with a maximum
          of 20. Defaults to 20.
      currentnewsid:
        description: ID of the last news article returned in the previous request,
          used for pagination. Pass 0 for the initial request. Defaults to 0.
stock_company_overview:
  name: stock_company_overview
  description: Retrieve the overview details of a public company or stock, supporting
    multiple stock types such as stock, index, mutual fund, and futures.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol (ticker) for which to obtain the overview. Examples
          include 'MSFT:NASDAQ', 'MSFT', '^DJI', 'VTSAX'.
      language:
        description: The 2-letter language code indicating the language for the results,
          as per ISO 639-1. Defaults to 'en'.
linearregintercept:
  name: linearregintercept
  description: Calculates the linear regression intercept for the specified symbol
    and interval using the specified parameters and the Twelve Data API.
  parameters:
    type: object
    properties:
      symbol:
        description: The instrument symbol (e.g., equity, index, ETF, forex, or cryptocurrency)
          to calculate the intercept for.
      interval:
        description: The interval between two consecutive data points in the time
          series (e.g., `1min`, `5min`, `15min`, etc.).
      series_type:
        description: The type of series to consider (e.g., `open`, `high`, `low`,
          `close`). Default is `close`.
      time_period:
        description: The period of time over which to calculate the intercept. Default
          is 9.
      format:
        description: The format of the returned data (`csv` or `json`). Default is
          `json`.
      outputsize:
        description: The number of data points to retrieve. Default is 30.
channel_videos:
  name: channel_videos
  description: Fetches videos from a specified YouTube channel using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      channelid:
        description: The ID of the YouTube channel from which to retrieve videos.
      part:
        description: The part parameter specifies a comma-separated list of one or
          more search resource properties that the API response will include.
      maxresults:
        description: The maximum number of results to return. Defaults to '50'.
      pagetoken:
        description: The token that identifies a specific page in the result set.
      order:
        description: The order parameter specifies the order in which the API response
          should list the search results. Defaults to 'date'.
seasonal_market_statistics_points:
  name: seasonal_market_statistics_points
  description: Fetches the seasonal market points statistics for a specified basketball
    team.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the basketball team.
        type: integer
teams_affiliates_teamids:
  name: teams_affiliates_teamids
  description: Query baseball team affiliates by team ID using the RapidAPI service.
  parameters:
    type: object
    properties:
      teamids:
        description: A comma-separated string of team IDs to query. Default is '145'.
get_all_latest_nba_articles:
  name: get_all_latest_nba_articles
  description: Fetches the latest NBA articles with optional filters for source, team,
    player, and limit.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of articles to retrieve. Default is `None`.
      player:
        description: The player's name for which to filter articles, use a dash to
          separate names (e.g., 'kevin-durant'). Default is `None`.
      team:
        description: The team name for which to filter articles (e.g., 'lakers').
          Default is `None`.
      source:
        description: The source of the articles (e.g., 'bleacher-report', 'nba', 'espn').
          Default is `None`.
youtube_topviews_year:
  name: youtube_topviews_year
  description: Retrieves the top-viewed YouTube videos for a specified year or for
    all time.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to retrieve the top-viewed YouTube videos.
          Use an empty string to retrieve all-time top views.
get_data_entity_uid:
  name: get_data_entity_uid
  description: Fetches an entity record from the OFAC service using a unique identifier
    (UID).
  parameters:
    type: object
    properties:
      uid:
        description: The unique identifier of the entity to retrieve.
        type: integer
free_ofac_api:
  name: free_ofac_api
  description: This function performs an OFAC (Office of Foreign Assets Control) scan
    request using the Free OFAC Scan API and returns a response indicating whether
    a target is found.
  parameters:
    type: object
    properties:
      street_address:
        description: Street address of the individual or business entity. Defaults
          to '79 ul. Sadovnicheskaya'.
      business_name:
        description: Name of the business entity. Defaults to 'SME Bank'.
      first_name:
        description: First name(s) of the individual. Defaults to 'Gener'.
      last_name:
        description: Last name(s) of the individual. Defaults to 'Garcia Molina'.
gstin:
  name: gstin
  description: Retrieve details about a GSTIN (GST number), including the latest return
    filing list, GST compliance classification, and HSN/SAC details.
  parameters:
    type: object
    properties:
      gstin:
        description: The GSTIN (GST number) to retrieve details for.
      content_type:
        description: The content type for the request. Defaults to 'application/json'.
v1_sentiment:
  name: v1_sentiment
  description: Performs sentiment analysis on the provided block of text using the
    API Ninjas sentiment analysis service.
  parameters:
    type: object
    properties:
      text:
        description: The input text for sentiment analysis, with a maximum length
          of 2000 characters.
findbypincode:
  name: findbypincode
  description: Fetches information for a given Indian pincode using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      pincode:
        description: The pincode for which information needs to be fetched.
        type: integer
ip_geolocation:
  name: ip_geolocation
  description: This function retrieves geolocation information for a given IP address
    using the Toolbench API.
  parameters:
    type: object
    properties:
      ip_address:
        description: The IP address for which to retrieve geolocation data.
directions_between_2_locations:
  name: directions_between_2_locations
  description: Fetches route information between two geographical locations, including
    distance, duration, and steps.
  parameters:
    type: object
    properties:
      end_lat:
        description: Latitude of the ending location.
        type: integer
      end_lon:
        description: Longitude of the ending location.
        type: integer
      start_lat:
        description: Latitude of the starting location.
        type: integer
      start_lon:
        description: Longitude of the starting location.
        type: integer
      distance_unit:
        description: Unit of distance measurement. Valid options are 'km' (default)
          and 'mi'.
v1_urllookup:
  name: v1_urllookup
  description: Queries the API Ninjas URL Lookup endpoint to retrieve information
    about a given URL.
  parameters:
    type: object
    properties:
      url:
        description: The valid URL to check. It supports schemes (e.g. http://example.com)
          as well as schemeless (e.g. example.com) formats.
reverse_geocoding:
  name: reverse_geocoding
  description: Performs reverse geocoding to obtain the name of a location (e.g.,
    city name or area name) based on geographical coordinates (latitude and longitude).
  parameters:
    type: object
    properties:
      lat:
        description: Latitude of the geographical coordinates.
        type: integer
      lon:
        description: Longitude of the geographical coordinates.
        type: integer
      limit:
        description: Maximum number of location names to return in the API response.
          Defaults to 5.
get_a_list_of_suburbs:
  name: get_a_list_of_suburbs
  description: Fetches all matching suburbs for the provided postcode, including state,
