    financial instrument.
  parameters:
    type: object
    properties:
      exchange:
        description: The exchange on which the symbol is traded.
      symbol:
        description: The symbol for which the VWAP is to be calculated.
      interval:
        description: The interval for the VWAP calculation (e.g., "1m", "5m", "1h").
      market:
        description: The type of market. Available options are 'spot', 'usdt-perpetual',
          'inverse-perpetual'.
      backtracks:
        description: The number of periods to include in the calculation for historical
          data. Defaults to 1.
