      dir:
        description: The direction of the ordering. Default is 'asc'.
      input:
        description: The input to the bot by the client for partial search.
      page:
        description: The page number of results to start from. Default is 1.
      output:
        description: The output from the bot in response to the client input for partial
          search.
      is_id:
        description: The ID of the conversation turn.
      order:
        description: The search field to order by. Default is 'id'.
have_a_chat_with_our_bot:
  name: have_a_chat_with_our_bot
  description: Initiates a conversation with the Islam&AI Bot, utilizing chat history
    and an API key for authentication.
  parameters:
    type: object
    properties:
      question:
        description: The question to pose to the Islam&AI Bot.
      chathistory:
        description: The chat history to be included in the conversation. Defaults
          to a predefined string about a dua.
get_property_type_filters:
  name: get_property_type_filters
  description: Retrieves property type filters from the Airbnb API.
  parameters:
    type: object
    properties:
      languageid:
        description: The language ID for the requested response. To get the language
          ID, call the `getLanguages` API.
autocomplete_search:
  name: autocomplete_search
  description: Search for titles and/or people by name or partial name, useful for
    building an autocomplete feature. The results include a `result_type` field indicating
    whether the result is a title or a person, along with an `image_url` for movie
    posters or headshots.
  parameters:
    type: object
    properties:
      search_value:
        description: The phrase to search for, which can be a full title or person
          name, or a partial phrase. For example, searching for "The sha" will find
          the movie "The Shawshank Redemption".
      search_type:
        description: Determines the type of search results. 1 includes titles and
          people (default), 2 includes titles only, 3 includes movies only, 4 includes
          TV shows only, and 5 includes people only.
top_artists_male:
  name: top_artists_male
  description: Fetches the YEAR-END Top Artists - Male chart information from the
    Billboard API.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to retrieve the chart information in 'YYYY'
          format. Defaults to '2022' if not provided.
list_top_artists:
  name: list_top_artists
  description: Fetches the top artists from Spotify based on the specified criteria.
  parameters:
    type: object
    properties:
      date:
        description: Date for the chart in `YYYY-MM-DD` format. Leave blank to get
          the latest chart.
      region:
        description: Region code in ISO 3166 alpha-2 format (e.g., `US`). Defaults
          to `global`.
timezones:
  name: timezones
  description: Fetch a list of the world's time zones with various filtering options.
  parameters:
    type: object
    properties:
      offset:
        description: Filter on non-daylight savings offset in hours.
      name:
        description: Filter as "contains" on timezone name in the chosen language.
      code:
        description: Filter on 3-letter non-daylight savings timezone code (not unique).
      timezone:
        description: Filter on timezone name in English.
      daylights_offset:
        description: Filter on daylight savings offset in hours.
      lang:
        description: Language selection ISO 639-1 two-letter code. Overrides the Accept-Language
          header. Default is 'de'.
      daylights_code:
        description: Filter on daylight savings letter code (not unique).
      fields:
        description: Select fields to return in the result. Default is 'offset,daylights_offset,daylights,daylights_code,timezone'.
      daylights:
        description: Filter on daylight savings/non-daylight savings time zones (`true`
          or `false`).
fetchlatestnav:
  name: fetchlatestnav
  description: Fetch the latest Net Asset Value (NAV) for mutual fund(s) based on
    various filtering parameters.
  parameters:
    type: object
    properties:
      mutualfundfamily:
        description: Defines the mutual fund family.
      schemecode:
        description: Defines the scheme code. Supports multiple comma-separated scheme
          codes.
      schemename:
        description: Defines the scheme name.
      schemetype:
        description: Defines the scheme type.
      additional:
        description: Additional information for fetching NAV.
      schemecategory:
        description: Defines the scheme category.
domain_check:
  name: domain_check
  description: Checks the availability status of one or multiple domains using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      domains:
        description: Comma-separated list of domains to check.
      domain:
        description: A specific domain name to check in addition to the list. Defaults
          to None.
get_appointments:
  name: get_appointments
  description: Retrieves all appointments for a given date and clinic name from the
    API.
  parameters:
    type: object
    properties:
      date:
        description: The date for which the appointments are requested in the format
          'YYYY-MM-DD'.
      clinicname:
        description: The name of the clinic for which the appointments are requested.
equity_earnings:
  name: equity_earnings
  description: Returns earnings (EPS, quarterly) history data for a given security
    within a specified date range.
  parameters:
    type: object
    properties:
      to:
        description: The query end date (supported format is YYYY-mm-dd), e.g., '2020-04-17'.
      is_from:
        description: The query start date (supported format is YYYY-mm-dd), e.g.,
          '2019-01-01'.
      symbol:
        description: The symbol of the asset to look for, e.g., 'AAPL' (Apple Inc),
          'T' (AT&T Inc).
streams_symbol:
  name: streams_symbol
  description: Fetches the most recent messages for a specified stock symbol from
    the StockTwits API.
  parameters:
    type: object
    properties:
      is_id:
        description: Ticker symbol, Stock ID, or RIC code of the symbol.
      since:
        description: Returns results with an ID greater than (more recent than) the
          specified ID.
      max:
        description: Returns results with an ID less than (older than) or equal to
          the specified ID.
      limit:
        description: The number of messages to retrieve, with a default of 20. The
          maximum allowed value is 30.
      callback:
        description: Custom callback function name for the request.
      filter:
        description: Filter messages by links, charts, videos, or top.
dns_lookup:
  name: dns_lookup
  description: Fetches DNS data for a given domain using the specified record type.
  parameters:
    type: object
    properties:
      domain:
        description: The domain to search for DNS records.
      rtype:
        description: 'The type of DNS record to fetch. Available records: A, PTR,
          MX, CNAME, TXT, NS.'
teams_detail:
  name: teams_detail
  description: Fetch detailed information about a specific team using its team ID.
  parameters:
    type: object
    properties:
      teamid:
        description: The unique identifier of the team for which details are needed.
          This ID can be obtained from various endpoints like /teams/search, /matches/detail,
          etc.
        type: integer
constructor_standings:
  name: constructor_standings
  description: Fetches the constructor standings for a given Formula 1 season.
  parameters:
    type: object
    properties:
      season_id:
        description: The ID of the Formula 1 season for which to get the constructor
          standings.
        type: integer
v1_profanityfilter:
  name: v1_profanityfilter
  description: Filters profanity from the given text using the API Ninjas Profanity
    Filter API. Returns the censored version of the text with bad words replaced by
    asterisks, and indicates whether the text contains profanity.
  parameters:
    type: object
    properties:
      text:
        description: The input text to be filtered. Maximum 1000 characters.
retrieve_trait_offers:
  name: retrieve_trait_offers
  description: Retrieve trait offers for a specified collection from the OpenSea API.
  parameters:
    type: object
    properties:
      slug:
        description: The slug identifier for the collection on OpenSea.
      value:
        description: The value of the trait to filter by. Defaults to 'classy_1'.
gettopsportmenu:
  name: gettopsportmenu
  description: Fetches the top sport menu from the specified sportsbook API using
    provided skin name and RapidAPI key.
  parameters:
    type: object
    properties:
      skinname:
        description: The skin name for the sportsbook. Defaults to 'betbiga'.
playerimage:
  name: playerimage
  description: Fetches the PNG image of an American Football player using their player
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the American Football player for which the image is
          to be retrieved.
        type: integer
dns:
  name: dns
  description: Fetches DNS records for a given domain using the RapidAPI domain checker
    service.
  parameters:
    type: object
    properties:
      domain:
        description: The domain for which DNS records are to be retrieved.
unfurl:
  name: unfurl
  description: Fetches and previews metadata for a given URL using the Unfurl API.
  parameters:
    type: object
    properties:
      url:
        description: The URL to be unfurled.
creditcards:
  name: creditcards
  description: Fetches a specified number of credit card details in a given locale
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      quantity:
        description: The number of credit card details to retrieve.
        type: integer
      locale:
        description: The locale to use for generating credit card details (e.g., 'en_US').
get_reply_comment_by_id:
  name: get_reply_comment_by_id
  description: Fetch a list of reply comments from TikTok for a given comment and
    video ID.
  parameters:
    type: object
    properties:
      cid:
        description: The ID of the comment for which to fetch reply comments.
        type: integer
      aweme_id:
        description: The ID of the TikTok video associated with the comment.
        type: integer
      count:
        description: The number of reply comments to retrieve, with a maximum value
          of 30. Default is 5.
      cursor:
        description: The cursor position for paginating through the comments. Default
          is 0.
patreon:
  name: patreon
  description: Check the availability of a given username on Patreon using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The username to be checked on Patreon.
get_from_yts:
  name: get_from_yts
  description: Fetches torrent data from YTS for a given search topic using RapidAPI.
  parameters:
    type: object
    properties:
      searchtopic:
        description: The topic or keyword to search for on YTS.
addresses:
  name: addresses
  description: Fetches a specified quantity of addresses for a given locale using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      quantity:
        description: The number of addresses to fetch.
        type: integer
      locale:
        description: The locale code for the desired address format (e.g., 'en_US').
getstandardmaptile:
  name: getstandardmaptile
  description: Fetch a standard map tile with labels in the local language from OpenStreetMap.
  parameters:
    type: object
    properties:
      y:
        description: Y-number of the tile.
        type: integer
      x:
        description: X-number of the tile.
        type: integer
      z:
        description: Zoom level (from 0 to 19).
        type: integer
teams_get_tournaments:
  name: teams_get_tournaments
  description: Retrieve the tournaments attended by a specific team.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the team for which to retrieve tournament information.
        type: integer
leaguetotalteamevents:
  name: leaguetotalteamevents
  description: Retrieve the total team events for a specific basketball league in
    a given tournament and season.
  parameters:
    type: object
    properties:
      seasonid:
        description: The season ID for which you want to retrieve the league's total
          team events.
        type: integer
      tournamentid:
        description: The unique tournament ID for which you want to retrieve the league's
          total team events.
        type: integer
matches_get_leanback:
  name: matches_get_leanback
  description: Fetches leanback information for a given cricket match using the match
    ID.
  parameters:
    type: object
    properties:
      matchid:
        description: "The match ID obtained from endpoints such as \u2026/matches/list,\
          \ \u2026/schedules/list, \u2026/series/get-matches, \u2026/teams/get-schedules,\
          \ \u2026/teams/get-results, or \u2026/venues/get-matches."
        type: integer
getportfolioinfo:
  name: getportfolioinfo
  description: Retrieves portfolio information for a given portfolio ID from the Trader
    Wagon API.
  parameters:
    type: object
    properties:
      portfolioid:
        description: The portfolio ID of the trader.
        type: integer
get_last_5_economic_calendar_news:
  name: get_last_5_economic_calendar_news
  description: Fetches the last 5 economic calendar news items, both actual and processed
    information.
  parameters:
    type: object
    properties:
      content_type:
        description: Type of content to be specified in the request header.
crypto_exchanges:
  name: crypto_exchanges
  description: Fetches the list of cryptocurrency exchanges available at Twelve Data
    API.
  parameters:
    type: object
    properties:
      format:
        description: The desired response format. Acceptable values are 'json' (default)
          and 'csv'.
financial_cash_statement:
  name: financial_cash_statement
  description: Fetches financial cash statement data for the given ticker symbol over
    the past 10 years.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol to retrieve financial statements for.
      formstyle:
        description: The format in which to return the data. Default is 'dataframe'.
      freq:
        description: The frequency of the data. Use 'A' for annual or 'Q' for quarterly.
          Default is 'Q'.
stock_v2_key_stats_get_overview:
  name: stock_v2_key_stats_get_overview
  description: Fetch key statistics overview for a given stock performance ID.
  parameters:
    type: object
    properties:
      performanceid:
        description: The performance ID of the stock, which can be obtained from the
          /auto-complete, /get-summary, or /get-movers endpoints.
my_images_by_id:
  name: my_images_by_id
  description: Fetches generated images' information filtered by a unique ID.
  parameters:
    type: object
    properties:
      uniqueid:
        description: The unique ID used to filter the generated images.
get_1_3_add_working_days:
  name: get_1_3_add_working_days
  description: Add or remove a specified number of working days to a given start date
    based on the specified country's working days and holidays.
  parameters:
    type: object
    properties:
      country_code:
        description: The ISO country code (2 letters). For available countries and
          configurations, see https://api.workingdays.org/api-countries.
      start_date:
        description: The start date in YYYY-MM-DD format.
      increment:
        description: The number of working days to add or remove from the start date.
          Can be a positive or negative integer but not zero.
        type: integer
      include_start:
        description: Whether to include the start date in the count. Defaults to True
          if not specified. Set to False ("false" or "0") to start the count from
          the next working day (or previous working day if increment is negative).
      configuration:
        description: The name of the preset configuration to be used. Defaults to
          'Federal holidays'. For available configurations, see https://api.workingdays.org/api-countries.php.
      profile_id:
        description: Custom profile ID if applicable.
retrieving_a_collection:
  name: retrieving_a_collection
  description: Retrieve detailed information about a specific collection on OpenSea,
    including real-time statistics such as floor price.
  parameters:
    type: object
    properties:
      collection_slug:
        description: The unique identifier for the collection on OpenSea.
originals_genres_list:
  name: originals_genres_list
  description: Retrieves a list of genres in the originals category from the Webtoon
    API.
  parameters:
    type: object
    properties:
      language:
        description: 'The language of the genre names to be retrieved. Must be one
          of the following: ''en'', ''zh-hant'', ''de'', ''fr'', ''es'', ''th'', ''id''.
          Default is ''en''.'
market_data:
  name: market_data
  description: Retrieves a list of daily stock metrics for a given ticker symbol,
    such as opening, closing, highest, and lowest prices.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which to retrieve market data.
v2_user_affiliates:
  name: v2_user_affiliates
  description: Fetches the user affiliates data from the Twitter API v2 endpoint using
    given parameters.
  parameters:
    type: object
    properties:
      is_id:
        description: User ID for which to fetch affiliates data.
        type: integer
      count:
        description: Number of results to return. Default is 20.
      cursor:
        description: Cursor for pagination of results. Default is None.
commune_par_nom:
  name: commune_par_nom
  description: Fetch one or more communes by their name, with exact or partial matching.
  parameters:
    type: object
    properties:
      nom:
        description: The name of the commune to search for. Defaults to 'poum'.
gettodaysforecast:
  name: gettodaysforecast
  description: Fetches today's surf forecast for a given spot using the Simple Surf
    Forecast API.
  parameters:
    type: object
    properties:
      spotid:
        description: The unique identifier for the surf spot.
replace:
  name: replace
  description: Sends a request to the CleanTalk API to process and replace certain
    elements in the given text.
  parameters:
    type: object
    properties:
      text:
        description: The text to be processed by the CleanTalk API.
data:
  name: data
  description: Fetches details of an Indonesian national identity card such as day,
    month, year, gender, and location using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: The Indonesian national identity card number to validate and
          fetch details for.
links_finder:
  name: links_finder
  description: Fetches relevant links based on a given query using the ExplorArc's
    Link Finder API.
  parameters:
    type: object
    properties:
      query:
        description: The search query to find relevant links. Defaults to 'roadmap'.
youtube_keyword_search:
  name: youtube_keyword_search
  description: Performs a YouTube keyword search using the provided search query and
    optional parameters such as country code and language code. It sends a GET request
    to the YouTube keyword search API and returns the response in JSON format if possible,
    otherwise returns the raw response text.
  parameters:
    type: object
    properties:
      q:
        description: The search query.
      gl:
        description: The country code in Alpha-2 format. Default is 'us'.
      hl:
        description: The search language code in ISO 639-1 format. Default is 'en'.
get_event_logs_filtered_by_topic:
  name: get_event_logs_filtered_by_topic
  description: Fetch event logs filtered by topics for a given blockchain network
    and address.
  parameters:
    type: object
    properties:
      chainid:
        description: The ID of the blockchain network from which to fetch logs.
        type: integer
      address:
        description: The address to fetch logs from.
      topics:
        description: The topics to filter the logs by.
      endblock:
        description: The block number to stop fetching logs. Defaults to None.
      startblock:
        description: The block number to start fetching logs. Defaults to None.
v1_inflation:
  name: v1_inflation
  description: Fetches current monthly and annual inflation percentages from the API
    Ninjas Inflation API endpoint.
  parameters:
    type: object
    properties: {}
bus_trolley_routes:
  name: bus_trolley_routes
  description: Fetches and returns the bus or trolley route stops information using
    the SEPTA API.
  parameters:
    type: object
    properties:
      req1:
        description: The route number to fetch stops information for.
searchplayer:
  name: searchplayer
  description: Searches for player data using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      player_input:
        description: The name or keyword to search for a player. Defaults to None.
us_az:
  name: us_az
  description: Fetches current or historical gas price data for Arizona.
  parameters:
    type: object
    properties:
      date:
        description: The date for historical gas price data in the format 'YYYY-MM-DD'.
          Defaults to None.
tour_rankings:
  name: tour_rankings
  description: Fetches the player rankings for a specific golf tour and season.
  parameters:
    type: object
    properties:
      tour_id:
        description: The identifier for the particular golf tour.
        type: integer
      season:
        description: The year representing the season of the golf tour.
        type: integer
get_web_detection:
  name: get_web_detection
  description: Detects web information for a given image using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      image:
        description: The URL of the image to be analyzed.
nsfw_image_classification:
  name: nsfw_image_classification
  description: Classifies whether the image content at the given URL is inappropriate
    or not using the NSFW Image Classification API.
  parameters:
    type: object
    properties:
      link:
        description: The URL of the image to be analyzed.
get_label_detection:
  name: get_label_detection
  description: This function interacts with the RapidAPI Label Detection service to
    get label information for a given image URL.
  parameters:
    type: object
    properties:
      image:
        description: The URL of the image to be analyzed.
get_person_by_id:
  name: get_person_by_id
  description: Fetches the information of a person from the system using their `person_id`.
  parameters:
    type: object
    properties:
      person_id:
        description: The unique identifier of the person whose information is to be
          retrieved.
ilod_status_ilod_ticket_get:
  name: ilod_status_ilod_ticket_get
  description: Fetches the result of an ILOD (Industry Level of Development) check
    using a given ticket.
  parameters:
    type: object
    properties:
      ticket:
        description: The ticket identifier for the ILOD check.
random_credit_card_by_id:
  name: random_credit_card_by_id
  description: Retrieve fake credit card details by ID using the RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID used to retrieve the fake credit card details.
        type: integer
strongs_number_detail_api:
  name: strongs_number_detail_api
  description: Fetches detailed information for one or more Strong's Numbers from
    the Complete Study Bible API.
  parameters:
    type: object
    properties:
      comma_separated_strongs_numbers:
        description: A comma-separated list of Strong's Numbers (up to 3 at a time).
get_detect:
  name: get_detect
  description: Detects and prevents XSS (Cross-Site Scripting) attacks in the input
    data by querying an external API.
  parameters:
    type: object
    properties:
      data:
        description: The input data to be checked for XSS.
triage_virtual:
  name: triage_virtual
  description: Determines if a patient should be attended via virtual consultation
    or in-person consultation based on their ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the patient.
teamlastevents:
  name: teamlastevents
  description: Fetches the last events for a specific team using the MMA RapidAPI.
  parameters:
    type: object
    properties:
      page:
        description: Zero-based page number to paginate through the events.
        type: integer
      is_id:
        description: The ID of the team for which the last events are to be retrieved.
        type: integer
news_from_individual_source:
  name: news_from_individual_source
  description: Fetches the latest news articles from a specified F1 news source using
    the RapidAPI.
  parameters:
    type: object
    properties:
      sourceid:
        description: Identifier of the F1 news source (e.g., skyf1, BBCF1, WTF1, autosport).
getcity:
  name: getcity
  description: Retrieves a list of cities for a given ISO code using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      iso:
        description: The ISO code representing the country.
steps:
  name: steps
  description: Fetches a random selection of WikiHow steps.
  parameters:
    type: object
    properties:
      count:
        description: The number of step strings to retrieve (maximum 100).
        type: integer
seasonal_goal_analysis_goal_minutes:
  name: seasonal_goal_analysis_goal_minutes
  description: Analyzes the goal statistics of the teams in a specified match, broken
    down into specific minute intervals (e.g., 0-10, 11-20, etc.). The data is retrieved
    from the Soccer Match List or Fixture API endpoints within a -+7 days period from
    the match date.
  parameters:
    type: object
    properties:
      matchid:
        description: The ID of the match for which to retrieve goal statistics.
        type: integer
pair_strength:
  name: pair_strength
  description: Fetches the combined strength of currency pairs for a given timeframe
    from the Currency Quake API.
  parameters:
    type: object
    properties:
      timeframe:
        description: The timeframe for which to retrieve the currency pair strength
          (e.g., 'h1', 'h4', 'd1', 'w1').
get_geocoding_with_videos:
  name: get_geocoding_with_videos
  description: Fetches detailed place information and related YouTube videos based
    on the provided geographic coordinates.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude in decimal degrees (WGS84).
        type: integer
      lng:
        description: Longitude in decimal degrees (WGS84).
        type: integer
      version:
        description: API version to be used for the request.
      lang:
        description: Preferred language of the content. Defaults to 'en'.
get_block_hash_v2:
  name: get_block_hash_v2
  description: Gets the block hash by its height for a given blockchain using the
    Toolbench API.
  parameters:
    type: object
    properties:
      blockheight:
        description: The height or index of the block for which the hash is to be
          retrieved.
        type: integer
      blockchain:
        description: The name of the blockchain from which to retrieve the block hash.
gender_from_name:
  name: gender_from_name
  description: Infers the gender of a person given their name using the RapidAPI service.
  parameters:
    type: object
    properties:
      name:
        description: The name of the person whose gender is to be inferred.
star:
  name: star
  description: Fetches full information about a star given its ID from the Stars API
    using RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the star to fetch information about.
time_zone_time:
  name: time_zone_time
  description: Fetches the current time for a given time-zone ID in ISO-8601 format
