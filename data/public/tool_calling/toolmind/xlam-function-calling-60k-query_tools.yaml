  parameters:
    type: object
    properties:
      authorization:
        description: The authorization token required to access the API.
update_market_status:
  name: update_market_status
  description: 'This tool belongs to the trading system, which allows users to trade
    stocks, manage their account, and view stock information. Tool description: Update
