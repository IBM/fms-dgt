  parameters:
    type: object
    properties:
      order_type:
        type: string
        description: Type of the order (Buy/Sell).
      symbol:
        type: string
        description: Symbol of the stock to trade.
      price:
        type: number
        description: Price at which to place the order.
      amount:
        type: integer
        description: Number of shares to trade.
    required:
    - order_type
