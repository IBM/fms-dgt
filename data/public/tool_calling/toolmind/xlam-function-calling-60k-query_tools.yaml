      search:
        description: A substring to search within character names. Defaults to None.
      skip:
        description: The number of characters to skip from the start. Defaults to
          None.
lists_tweets:
  name: lists_tweets
  description: Fetches a list of tweets from a specified Twitter list using the RapidAPI
