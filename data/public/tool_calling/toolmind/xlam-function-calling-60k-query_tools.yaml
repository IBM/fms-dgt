  parameters:
    type: object
    properties:
      req1:
        description: The stop ID for which the schedule is being requested.
        type: integer
      req2:
        description: The route number. Defaults to 17.
      req3:
        description: '''i'' for inbound or ''o'' for outbound. Defaults to ''i''.'
      req6:
        description: The number of results to return. Defaults to 7.
trip_details:
