search_places:
  name: search_places
  description: Fetches a list of places (either countries, cities, or administrative
    divisions) that match a query and can be filtered by various properties.
  parameters:
    type: object
    properties:
      language:
        description: Specifies the language (ISO 639-1) to get the localized name
          of the place. If translation is unavailable, the "localizedName" property
          will be null.
      skip:
        description: Number of places to ignore before beginning to return results.
          Used with `limit` to paginate results. Defaults to 0.
        type: integer
      country:
        description: Filters places by their country `id`. Multiple values can be
          specified, separated by commas (e.g., 'US,CA'). Default is 'US,CA'.
      limit:
        description: Maximum number of places to return. Used with `skip` to paginate
          results. Default is 10, maximum is 100.
        type: integer
      admindivision1:
        description: Filters places by their adminDivision1 `id`. Multiple values
          can be specified, separated by commas (e.g., 'US.CA,US.DE').
      admindivision2:
        description: Filters places by their adminDivision2 `id`. Multiple values
          can be specified, separated by commas.
      accuracyradiuskm:
        description: Maximum radius (in kilometers) from the point specified by `latitude`
          and `longitude` to filter places located within the area. Default is 100
          km.
        type: integer
      latitude:
        description: Latitude coordinate to filter places by location. Ignored if
          `longitude` is not specified.
        type: integer
      q:
        description: Query string to find places with a similar name. Default is 'New
          York'.
      longitude:
        description: Longitude coordinate to filter places by location. Ignored if
          `latitude` is not specified.
        type: integer
minutely:
  name: minutely
  description: Fetches minute-by-minute precipitation forecast for the next 60 minutes,
    updated in real-time using AI nowcasting models.
  parameters:
    type: object
    properties:
      place_id:
        description: Identifier of a place. Used to specify the location. If not provided,
          use `lat` and `lon`. Defaults to None.
      timezone:
        description: Timezone for the date fields. If not specified, local timezone
          of the forecast location will be used. Formats like 'Europe/Prague' or 'UTC'
          can be used, or 'auto' to use local timezone. Defaults to 'auto'.
      lat:
        description: Latitude of the location. Specify in formats like '12N', '12.3N',
          '12.3', or '-13.4'. Defaults to '37.81021'.
      language:
        description: Language for text summaries. Available languages are 'en' (default),
          'es', 'fr', 'de', 'pl', 'cs'. Defaults to 'en'.
      units:
        description: Unit system to be used. Values can be 'auto' (default), 'metric',
          'us', 'uk', 'ca'. Defaults to 'auto'.
      lon:
        description: Longitude of the location. Specify in formats like '12E', '12.3E',
          '12.3', or '-13.4'. Defaults to '-122.42282'.
