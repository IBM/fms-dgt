          to be retrieved.
        type: integer
coins_get_markets:
  name: coins_get_markets
  description: Fetches market information for a specific cryptocurrency pair in a
    specified currency.
  parameters:
    type: object
    properties:
      cur2:
        description: The ID of the currency to get market information for. This value
          is returned from the /get-meta-data endpoint.
        type: integer
      pair_id:
        description: The ID of the cryptocurrency pair. This value is obtained from
          endpoints like coins/list, coins/search, or coins/list-pairs.
        type: integer
      time_utc_offset:
        description: The UTC offset in seconds. For example, UTC+8 corresponds to
          28800 seconds. Defaults to 28800.
      lang_id:
        description: The ID of the language. This value is returned from the /get-meta-data
          endpoint. Defaults to 1.
transfers_list_records:
  name: transfers_list_records
  description: Fetches transfer records and player information for a given competition,
    position group, or club.
  parameters:
    type: object
    properties:
      competitionid:
        description: The ID of the competition. Should not be used together with `clubid`.
      positiongroup:
        description: Filter for position group such as 'Abwehr', 'Mittelfeld', or
          'Sturm'. Defaults to None.
      clubid:
        description: The ID of the club. Should not be used together with `competitionid`.
          Defaults to None.
      offset:
        description: The number of records to skip for pagination. Defaults to 0.
      limit:
        description: The maximum number of records to return per response. Defaults
          to 30.
      positionid:
        description: Filter for specific positions such as 1 for Goalkeeper, 2 for
          Sweeper, etc. Defaults to None.
      domain:
        description: The domain of the API, such as 'com', 'de', 'be', 'es', 'it',
          'nl', 'pl', 'pt', 'com.tr', or 'world'. Defaults to 'de'.
getverseofachapter:
  name: getverseofachapter
  description: Fetches a specific verse from a chapter in a given book of the Bible.
  parameters:
    type: object
    properties:
      book:
        description: The name of the book in the Bible.
      chapter:
        description: The chapter number in the book.
        type: integer
      verse:
        description: The verse number in the chapter.
        type: integer
getclimatescorebygps:
  name: getclimatescorebygps
  description: Fetches the climate score for a given GPS position based on specific
    disaster and activity types.
  parameters:
    type: object
    properties:
      latitude:
        description: The latitude coordinate of the location.
        type: integer
      longitude:
        description: The longitude coordinate of the location.
        type: integer
      disaster_type_number:
        description: The disaster type identifier.
        type: integer
      activity_type_number:
        description: The activity type identifier.
        type: integer
stock_get_press_releases:
  name: stock_get_press_releases
  description: Retrieves press releases for a given stock ticker.
  parameters:
    type: object
    properties:
      tickerid:
        description: The value of the tickerId field returned by other endpoints,
          such as .../stock/search or .../market/get-common-ranking.
        type: integer
      lastannouncementid:
        description: For paging purposes, the last announcement ID returned by this
          endpoint. Leave empty for the first query.
      limit:
        description: The number of items per response. Default is 20.
get_scrabble_score:
  name: get_scrabble_score
  description: Fetches the Scrabble score for a given word using the Dicolink API.
  parameters:
    type: object
    properties:
      mot:
        description: The word for which the Scrabble score is to be retrieved.
coins_get_brief_chart:
  name: coins_get_brief_chart
  description: Fetches and returns a brief information chart for a specific cryptocurrency
    pair.
  parameters:
    type: object
    properties:
      pair_id:
        description: The ID of the cryptocurrency pair, typically obtained from endpoints
          like coins/list, coins/search, or coins/list-pairs.
        type: integer
      lang_id:
        description: The language ID for the response, usually obtained from the get-meta-data
          endpoint. Default is 1.
      range:
        description: The time range for the chart. Allowed values are 'd' for day,
          'w' for week, '1m' for one month, '1y' for one year, '5y' for five years,
          and 'max' for the maximum available range. Default is 'p'.
      time_utc_offset:
        description: The UTC offset in seconds. For example, utc+8 translates to 8
          * 60 * 60 = 28800 seconds. Default is 28800.
getbodypartvalues:
  name: getbodypartvalues
  description: Gets a set of all body part names filtered by optional query parameters.
  parameters:
    type: object
    properties:
      format:
        description: Specifies the output type. Allowed values are CSV, HTML, XML,
          or JSON. Default is None.
      collection:
        description: A label used to name a set of images collected for a specific
          trial or other reason. Assigned during the process of curating the data.
          Default is None.
      bodypartexamined:
        description: A standard DICOM definition for the body part examined (0018x0015).
          Default is None.
      modality:
        description: A standard DICOM definition for the imaging modality used (0008x0060).
          Default is None.
recordcount:
  name: recordcount
  description: Retrieve a specified number of records from the CrossRef database using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      rows:
        description: The number of records to retrieve.
        type: integer
by_location:
  name: by_location
  description: Searches for homeless shelters based on provided geographical coordinates
    and radius.
  parameters:
    type: object
    properties:
      lat:
        description: The latitude of the location to search nearby shelters.
      radius:
        description: The search radius in miles (maximum 10 miles).
      lng:
        description: The longitude of the location to search nearby shelters.
three_hourly:
  name: three_hourly
  description: Fetches a three-hourly weather forecast for a given location up to
    14 days, with optional historical data and various configurable parameters.
  parameters:
    type: object
    properties:
      location:
        description: The location for which to fetch the weather forecast.
      history:
        description: Whether to include 24 hours of past data. Defaults to None.
      tz:
        description: Time zone in the response, specified using IANA time zone database
          names. Defaults to 'Europe/London'.
      dataset:
        description: The variable set to use in the response. Defaults to 'full'.
      tempunit:
        description: The temperature unit in the response (e.g., 'C' for Celsius).
          Defaults to 'C'.
      alt:
        description: The altitude in meters. Defaults to 0.
      periods:
        description: The number of time steps in the response, with a default of 8
          and a maximum of 12. Defaults to 8.
      windunit:
        description: The wind speed unit in the response (e.g., 'MS' for meters per
          second). Defaults to 'MS'.
prematch_event:
  name: prematch_event
  description: Fetches pre-match event data from a sports betting API.
  parameters:
    type: object
    properties:
      lang:
        description: The language code for the API response.
      evt:
        description: The event ID to fetch information for.
        type: integer
get_price_info_for_word_count:
  name: get_price_info_for_word_count
  description: Returns price information for translating a given number of words between
    specified languages and topic using the TextKing API.
  parameters:
    type: object
    properties:
      words:
        description: The number of words to translate.
        type: integer
      source_language:
        description: ISO 639 language code of the source language.
      target_language:
        description: ISO 639 language code of the target language.
      topic:
        description: A topic UUID for the translation context.
restaurants_v2_auto_complete:
  name: restaurants_v2_auto_complete
  description: Fetches restaurant suggestions based on a given term or phrase.
  parameters:
    type: object
    properties:
      text:
        description: Term or phrase to get restaurant suggestions (e.g., city, district,
          country name).
      longitude:
        description: Longitude of the user's location for sorting purposes. Defaults
          to None.
      latitude:
        description: Latitude of the user's location for sorting purposes. Defaults
          to None.
services:
  name: services
  description: Fetch a list of professional sellers for a specified service category
    from the Fiverr Pro Services API.
  parameters:
    type: object
    properties:
      category_name:
        description: The name of the service category to fetch professional sellers
          for.
      page:
        description: The page number of results to return. Default is 10.
bsa:
  name: bsa
  description: Calculates the Body Surface Area (BSA) based on weight and height using
    an external API.
  parameters:
    type: object
    properties:
      weightinkilograms:
        description: The weight of the individual in kilograms.
        type: integer
      heightincentrimetres:
        description: The height of the individual in centimeters.
        type: integer
get_vehicule_info2:
  name: get_vehicule_info2
  description: Fetch vehicle information using the PLAQUE IMMATRICULATION API.
  parameters:
    type: object
    properties:
      immatriculation:
        description: The vehicle registration number to query. Defaults to 'AA-123-BC'.
      token:
        description: The API token for authentication. Defaults to 'TokenDemoRapidapi'.
      host_name:
        description: The API host name. Defaults to 'https://apiplaqueimmatriculation.com'.
get_user_tagged_media_by_user_id:
  name: get_user_tagged_media_by_user_id
  description: Fetches the media in which an Instagram user is tagged by user ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The Instagram user ID whose tagged media is to be fetched.
        type: integer
      count:
        description: The number of media items to fetch.
        type: integer
      end_cursor:
        description: The cursor for pagination to fetch the next set of results. Defaults
          to None.
tweet_retweeters:
  name: tweet_retweeters
  description: Fetches the retweeters of a specific tweet using the Twitter API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the tweet for which retweeters are to be fetched.
      count:
        description: The number of retweeters to fetch. Defaults to 20.
      cursor:
        description: The cursor parameter for paginating results.
telegram_group_info:
  name: telegram_group_info
  description: Retrieves real-time information about a public Telegram group such
    as title, photo, description, members, and online members.
  parameters:
    type: object
    properties:
      group:
        description: The @username of the Telegram group for which information is
          being requested.
places_list_by_radius_nearby_search:
  name: places_list_by_radius_nearby_search
  description: Fetches objects closest to a selected point filtered by optional parameters.
  parameters:
    type: object
    properties:
      lang:
        description: Language code (2 characters, ISO639-1). Available values include
          'en' (English) and 'ru' (Russian).
      radius:
        description: Maximum distance from the selected point in meters.
        type: integer
      lon:
        description: Longitude of the selected point.
        type: integer
      lat:
        description: Latitude of the selected point.
        type: integer
      src_attr:
        description: Source of the object attributes, multiple sources can be separated
          by commas. Defaults to None. Available values include 'osm', 'wikidata',
          'snow', 'cultura.ru', 'rosnedra', 'user'.
      format:
        description: The output format. Defaults to GeoJSON. Values can be 'json',
          'geojson', or 'count'.
      kinds:
        description: Object category, multiple categories can be separated by commas.
          Defaults to None. See object category hierarchy at 'https://dev.opentripmap.com/doc/en/'.
      src_geom:
        description: Source of the object geometry. Defaults to None. Available values
          include 'osm', 'wikidata', 'snow', 'cultura.ru', 'rosnedra'.
      rate:
        description: Minimum rating of the object popularity. Defaults to None. Available
          values are '1', '2', '3', '1h', '2h', '3h'.
      limit:
        description: Maximum number of returned objects. Defaults to None, with a
          maximum limit of 500.
      name:
        description: Text string to search at the beginning of the object name (minimum
          3 characters). Defaults to None.
leagues_v2_get_table:
  name: leagues_v2_get_table
  description: Fetches the league table data for a specified category and competition
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      ccd:
        description: The Ccd field value obtained from the .../leagues/v2/list endpoint.
      category:
        description: 'The category of the sport. One of the following: ''soccer'',
          ''cricket'', ''basketball'', ''tennis'', ''hockey''.'
      scd:
        description: The Scd field value obtained from the .../leagues/v2/list endpoint.
stopwords:
  name: stopwords
  description: Retrieves stopwords for specified languages and categories from the
    RapidAPI service.
  parameters:
    type: object
    properties:
      langs:
        description: Comma-separated list of language ISO codes.
      details:
        description: Flag indicating whether to include details for each stopword.
      categories:
        description: Comma-separated list of categories. Use /categories to get category
          IDs.
get_specific_ayah_verse:
  name: get_specific_ayah_verse
  description: Fetches a specific Ayah (verse) from a given chapter in the Quran,
    with details in JSON format.
  parameters:
    type: object
    properties:
      chapterid:
        description: The chapter (Surah) number to fetch the verse from. Must be between
          1 and 114.
        type: integer
      verseid:
        description: The verse (Ayah) number to fetch within the specified chapter.
          Must be a valid verse number within the chapter.
        type: integer
products_types_typeid_locations:
  name: products_types_typeid_locations
  description: Fetches a list of locations that have issued products for a given product
    type.
  parameters:
    type: object
    properties:
      typeid:
        description: The ID of a valid product type.
get_all_match_play_today_by_competitions:
  name: get_all_match_play_today_by_competitions
  description: Retrieve all matches that are scheduled to be played today for a given
    competition by its ID.
  parameters:
    type: object
    properties:
      competition_id:
        description: The ID of the competition for which to retrieve today's matches.
        type: integer
maclookup:
  name: maclookup
  description: Looks up the manufacturer information for a given MAC address using
    the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      mac_number:
        description: The MAC address for which to find the manufacturer. Supported
          formats include 'xx-xx-xx-xx-xx-xx', 'xx:xx:xx:xx:xx:xx', 'xxxx.xxxx.xxxx',
          and 'xxxxxxxxxxxx'.
get_game_statistics:
  name: get_game_statistics
  description: Fetches statistics for a given game using the ViperScore RapidAPI.
  parameters:
    type: object
    properties:
      gameid:
        description: The unique identifier of the game for which the statistics are
          to be fetched.
get_campaign_from_url:
  name: get_campaign_from_url
  description: Fetches campaign data from the Fomo API based on a specified campaign
    ID and optional URL.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the campaign.
      url:
        description: The URL to be included in the query. Defaults to 'gogofodo.com'.
companies:
  name: companies
  description: Fetch a specified quantity of companies for a given locale from the
    RapidAPI endpoint.
  parameters:
    type: object
    properties:
      quantity:
        description: The number of companies to retrieve.
        type: integer
      locale:
        description: The locale code for the data, e.g., 'en_US'.
detik_search:
  name: detik_search
  description: Search for news articles on detik.com using specified parameters.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the results to retrieve.
        type: integer
      limit:
        description: The number of results to return per page.
        type: integer
      keyword:
        description: The keyword to search for in news articles.
packages_v2_track:
  name: packages_v2_track
  description: Retrieves tracking information for a specific package using the TrackingMore
    API.
  parameters:
    type: object
    properties:
      trackingnumber:
        description: The tracking number of the package.
loading_speed_data:
  name: loading_speed_data
  description: Retrieves the loading speed data of a specified website using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      website:
        description: The URL of the website for which the loading speed data is being
          requested.
billboard_u_s_afrobeats_songs:
  name: billboard_u_s_afrobeats_songs
  description: Fetch the BILLBOARD U.S. AFROBEATS SONGS chart information for a given
    date and range.
  parameters:
    type: object
    properties:
      date:
        description: The date in the format 'YYYY-MM-DD' for which the chart information
          is to be fetched.
      range:
        description: The range of songs to be included in the chart, with a maximum
          range of 1-50.
get_imbuements_for_vampirism_life_steal:
  name: get_imbuements_for_vampirism_life_steal
  description: Fetches all imbuements for the Vampirism (Life steal) type in the specified
    world.
  parameters:
    type: object
    properties:
      world:
        description: The name of the world for which to retrieve imbuement information.
highway_type:
  name: highway_type
  description: Determines the type of road nearest to a given geographic coordinate
    (latitude and longitude).
  parameters:
    type: object
    properties:
      lat:
        description: The latitude of the geographic coordinate.
        type: integer
      lon:
        description: The longitude of the geographic coordinate.
        type: integer
      apikey:
        description: The API key for accessing the service.
get_info_from_vin:
  name: get_info_from_vin
  description: Retrieves vehicle information from a VIN (Vehicle Identification Number)
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number to decode.
rent_zestimate_and_comparable_properties:
  name: rent_zestimate_and_comparable_properties
  description: Returns a property's rent zestimate and its comparable properties in
    the same area.
  parameters:
    type: object
    properties:
      address:
        description: The address of the property for which the rent zestimate is being
          requested.
      bedrooms:
        description: Filter for number of bedrooms. Multiple values can be separated
          by commas (e.g., '0,1,2,3,4plus').
      pets:
        description: Filter for pets. Possible values are 'any', 'dogs', 'cats'. Multiple
          values can be separated by commas.
      amenities:
        description: Filter for amenities such as 'cooling', 'heating', 'parking'.
          Multiple values can be separated by commas.
      laundry:
        description: Filter for laundry type. Possible values are 'any', 'inUnit',
          'shared'. Multiple values can be separated by commas.
      propertytypes:
        description: Filter for property types such as 'apartment', 'house', 'townhouse',
          'condo'. Multiple values can be separated by commas.
      activetypes:
        description: Filter for active rental types. Possible values are 'any', 'active',
          'inactive'.
      deactivateddays:
        description: Filter for inactive rentals within a specific number of days
          such as '30', '15', '7'.
      activateddays:
        description: Filter for inactive rentals within a specific number of days
          such as '30', '15', '7'.
      distanceinmiles:
        description: Filter for distance in miles. Possible values are 'any', '1',
          '2', '3', '4', '5'.
list_podcast_episodes:
  name: list_podcast_episodes
  description: Gets a list of episodes for a given podcast show from the Spotify Scraper
    API.
  parameters:
    type: object
    properties:
      showid:
        description: The unique identifier of the podcast show.
      limit:
        description: The maximum number of items returned per request. Defaults to
          `100`.
      offset:
        description: The number of items to skip before starting to collect the result
          set. Defaults to `0`.
airqualityhealthindex:
  name: airqualityhealthindex
  description: Calculate the official air quality health index (AQHI) based on key
    air pollutant concentrations.
  parameters:
    type: object
    properties:
      o3:
        description: The ground-level ozone (O3) concentration in parts per billion
          (ppb).
      no2:
        description: The nitrogen dioxide (NO2) concentration in parts per billion
          (ppb).
      pm:
        description: "The fine particulate matter (PM2.5) concentration in micrograms\
          \ per cubic meter (\xB5g/m\xB3)."
symbol:
  name: symbol
  description: Fetches stock data for a given ticker symbol from the RapidAPI service.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock to retrieve data for.
get_country_by_fifa_code:
  name: get_country_by_fifa_code
  description: Gets information about a country using its FIFA assigned country code
    from the Geography API.
  parameters:
    type: object
    properties:
      fifacode:
        description: The FIFA assigned country code.
      fields:
        description: A comma-separated list of fields to filter the response. Defaults
          to None.
fetch_business_data:
  name: fetch_business_data
  description: Fetches business-related information associated with a given WhatsApp
    business account phone number using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      phone:
        description: The phone number of the WhatsApp business account for which data
          is being requested.
        type: integer
get_stream_mature_content_status:
  name: get_stream_mature_content_status
  description: Fetches the mature content status of a Twitch stream for a given user.
  parameters:
    type: object
    properties:
      userid:
        description: The Twitch username or ID of the user whose stream status is
          to be checked.
get_user_followers:
  name: get_user_followers
  description: Fetches the followers of a specified Twitter user using the RapidAPI
    Twitter API.
  parameters:
    type: object
    properties:
      user:
        description: The ID of the Twitter user whose followers are to be fetched.
      count:
        description: The number of followers to retrieve.
      cursor:
        description: The cursor for pagination. Defaults to None.
filter_cook_time_in_minutes:
  name: filter_cook_time_in_minutes
  description: Fetches keto recipes within a specified range of cooking times using
