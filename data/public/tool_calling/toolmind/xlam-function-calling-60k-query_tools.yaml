  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number to decode.
get_posts_from_page:
  name: get_posts_from_page
  description: Fetches posts from a specified category on a 9gag page.
  parameters:
    type: object
    properties:
      category:
        description: The category of posts to fetch, as supported by the /get_pages
          endpoint.
      counter:
        description: Counter for pagination; leave blank for the first request. For
          subsequent requests, provide the counter value from the previous response.
      after:
        description: Pagination parameter to fetch posts after a certain point; leave
          blank for the first request. For subsequent requests, provide the after
          value from the previous response.
pressure_from_to_number:
  name: pressure_from_to_number
  description: This function converts a given pressure value from one unit to another
