    properties:
      job_id:
        description: The JOB ID generated from the "Paraphrase" endpoint.
price_by_symbol:
  name: price_by_symbol
  description: Fetches the live price of a stock by its symbol.
  parameters:
    type: object
    properties:
      input:
        description: The stock symbol to query.
ultimateoscillator:
  name: ultimateoscillator
  description: Fetches the Ultimate Oscillator (UO) indicator data for a given cryptocurrency
    symbol from the Qvantana API.
  parameters:
    type: object
    properties:
      exchange:
        description: The exchange to retrieve data from.
      interval:
        description: The interval time frame for the data (e.g., '1h', '1d').
      market:
        description: The type of market to query (e.g., 'spot', 'usdt-perpetual',
          'inverse-perpetual').
      symbol:
        description: The cryptocurrency symbol to retrieve the indicator for.
      is_from:
        description: The starting time for the data retrieval in Unix timestamp format.
          Defaults to '1683895800'.
      shortperiod:
        description: The short time period used for the Ultimate Oscillator. Defaults
          to 7.
      mediumperiod:
        description: The medium time period used for the Ultimate Oscillator. Defaults
          to 14.
      longperiod:
        description: The long time period used for the Ultimate Oscillator. Defaults
          to 28.
      backtracks:
        description: The number of past periods to include in the analysis. Defaults
          to 1.
v1_motorcycles:
  name: v1_motorcycles
  description: Fetches motorcycle data from the Motorcycles API, returning up to 30
    results that match the given parameters.
  parameters:
    type: object
    properties:
      model:
        description: Name of the motorcycle model. Supports partial matching (default
          is 'Ninja').
      offset:
        description: Number of results to offset for pagination. Default is None.
      make:
        description: Name of the manufacturer/brand. Supports partial matching (default
          is 'Kawasaki').
      year:
        description: Release year of the motorcycle model in YYYY format. Default
          is None.
us:
  name: us
  description: Fetches randomized Bingo numbers divided into groups from the US game
    specification via the RapidAPI service.
  parameters:
    type: object
    properties:
      cards:
        description: The number of Bingo cards to generate. Defaults to '2'.
regular_dice_rolls:
  name: regular_dice_rolls
  description: This function simulates rolling a specified number of dice for a specified
    number of times using the Dice Roll Simulator API.
  parameters:
    type: object
    properties:
      rolls:
        description: The number of times to roll the dice. Default is 2.
      dice:
        description: The number of dice to roll each time. Default is 3.
download:
  name: download
  description: Downloads a barcode of the specified type with the given data and optional
    size using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      data:
        description: The data to encode in the barcode.
      size:
        description: The size of the barcode. Default is 5.
get_addresses:
  name: get_addresses
  description: Fetches addresses from the address-monitor API with specified query
    parameters.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of addresses to fetch. Defaults to '100'.
      offset:
        description: The number of addresses to skip before starting to fetch. Defaults
          to '0'.
      network:
        description: The network type for which addresses are to be fetched (e.g.,
          'BSC_TESTNET'). Defaults to 'BSC_TESTNET'.
get_crime_rates_by_zip:
  name: get_crime_rates_by_zip
  description: Retrieve crime statistics for a given ZIP code using the Crime Data
    by Zipcode API.
  parameters:
    type: object
    properties:
      zip:
        description: ZIP code to retrieve crime data for.
        type: integer
codepoint:
  name: codepoint
  description: Fetch detailed information about a Unicode codepoint using the Codepoints
    API.
  parameters:
    type: object
    properties:
      codepoint:
        description: The hex number representing the Unicode codepoint.
hashtags:
  name: hashtags
  description: Generates hashtags from a given text using the specified content type
    and optional RapidAPI key.
  parameters:
    type: object
    properties:
      content_type:
        description: The type of content for which hashtags are to be generated.
      text:
        description: The text from which hashtags will be extracted.
getproductbyname:
  name: getproductbyname
  description: Fetches product information for a specific brand from the products
    database via the Cartify API.
  parameters:
    type: object
    properties:
      brand:
        description: The name of the brand to filter products by.
product_id:
  name: product_id
  description: Fetch Aliexpress product data using the given product ID.
  parameters:
    type: object
    properties:
      product_id:
        description: The ID of the product on Aliexpress to fetch data for.
query:
  name: query
  description: Queries information about an IP address using the NetDetective API.
  parameters:
    type: object
    properties:
      ipaddress:
        description: The IP address to use for the query. Defaults to None, which
          uses the IP address of the connecting client.
get_match:
  name: get_match
  description: Calculates the match percentage between two names using the Love Calculator
    API.
  parameters:
    type: object
    properties:
      fname:
        description: The first name for the love match calculation.
      sname:
        description: The second name for the love match calculation.
user_tweets_replies_by_screen_name:
  name: user_tweets_replies_by_screen_name
  description: Fetches the tweets and replies of a specified user by their screen
    name using the Twitter API.
  parameters:
    type: object
    properties:
      username:
        description: The screen name of the user whose tweets and replies are to be
          fetched.
      cursor:
        description: The cursor for pagination, if any. Defaults to None.
      limit:
        description: The maximum number of tweets and replies to fetch. Defaults to
          '40'.
drivers_standings:
  name: drivers_standings
  description: Retrieve F1 drivers' standings data for a specified year.
  parameters:
    type: object
    properties:
      year:
        description: The championship year for which to retrieve drivers' standings.
          Defaults to 2020.
get_a_specific_game:
  name: get_a_specific_game
  description: Retrieves information for a specific game using the Free NBA API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the game to retrieve.
basketball_match_statistics:
  name: basketball_match_statistics
  description: Fetches statistics for a given basketball match using the RapidAPI
    sports live scores service.
  parameters:
    type: object
    properties:
      match_id:
        description: The identifier for the basketball match. Match IDs can be retrieved
          from the Basketball Live Matches endpoint.
media_info:
  name: media_info
  description: Retrieves information about a media item from the Instagram API.
  parameters:
    type: object
    properties:
      media_id:
        description: The ID of the media item to retrieve information for, used as
          a query parameter.
      mediaid:
        description: The ID of the media item to retrieve information for, included
          in the URL path.
get_profile_info:
  name: get_profile_info
  description: Fetches the profile information from Pinterest for a given username
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The Pinterest username for which the profile information is to
          be retrieved.
user_by_rest_id:
  name: user_by_rest_id
  description: Fetches user details from the RapidAPI Twitter endpoint using the provided
    user ID.
  parameters:
    type: object
    properties:
      user_id:
        description: The Twitter user ID for which to fetch details.
properties_get_facilities:
  name: properties_get_facilities
  description: Fetches the facilities of a property given its hotel ID.
  parameters:
    type: object
    properties:
      hotel_ids:
        description: The value of the hotel_id field from the properties/list API.
        type: integer
      languagecode:
        description: The language code for the response. Default is 'en-us'. Possible
          values include en, en-us, ar, bg, ca, cs, da, de, el, es, es-ar, et, fi,
          fr, he, hr, hu, id, is, it, ja, ko, lt, lv, ms, nl, no, pl, pt, pt-br, ro,
          ru, sk, sl, sr, sv, th, tl, tr, uk, vi, zh, zh-tw.
converter:
  name: converter
  description: Performs currency conversion between multiple currencies using the
    given parameters.
  parameters:
    type: object
    properties:
      target:
        description: The currency code to convert to. This should be a valid three-letter
          currency code. Multiple target currencies can be specified, separated by
          a comma.
      source:
        description: The currency code to convert from. This should be a valid three-letter
          currency code, e.g., USD or EUR.
      amount:
        description: The amount to convert from the source currency to the target
          currency. Defaults to 1 if not provided.
communes_par_code_commune:
  name: communes_par_code_commune
  description: Fetch details of a commune using its code via the RapidAPI.
  parameters:
    type: object
    properties:
      code_com:
        description: The code of the commune to retrieve details for.
taobao_search_by_keyword:
  name: taobao_search_by_keyword
  description: Search for products on Taobao using a specified keyword and return
    the search results.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve from the search results.
        type: integer
      keyword:
        description: The search keyword to use for querying products.
qr_endpoint:
  name: qr_endpoint
  description: Generates a QR code for the given URL using the RapidAPI QR code service.
  parameters:
    type: object
    properties:
      url:
        description: The website URL to encode in the QR code. Defaults to 'www.google.com'.
chat_gpt_detector:
  name: chat_gpt_detector
  description: Detects whether the given text was generated by an AI model using the
    provided RapidAPI key.
  parameters:
    type: object
    properties:
      text:
        description: The text to be analyzed for AI-generated content.
stores:
  name: stores
  description: Fetches a list of all IKEA stores in a specified country.
  parameters:
    type: object
    properties:
      countrycode:
        description: The two-letter country code representing the country for which
          to fetch the list of stores.
single_dog_breed:
  name: single_dog_breed
  description: Fetches details of a single dog breed from the DogBreedDB API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the dog breed to fetch details for.
        type: integer
search_title:
  name: search_title
  description: Searches for books by a given title using the Open Library API.
  parameters:
    type: object
    properties:
      title:
        description: The title of the book to search for.
api_whois:
  name: api_whois
  description: Fetch WHOIS data for a given IP address, host, or URL using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to query WHOIS information for. Defaults to '8.8.8.8'.
      host:
        description: The host name to query WHOIS information for. Defaults to 'google.com'.
      url:
        description: The URL to query WHOIS information for. Defaults to 'http://google.com'.
stagecompetitorstandings:
  name: stagecompetitorstandings
  description: Retrieve the competitor standings for a specific Motorsport stage using
    the given stage ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the stage for which to retrieve competitor's standings.
        type: integer
get_specific_dog_breed:
  name: get_specific_dog_breed
  description: Fetch detailed information about a specific dog breed.
  parameters:
    type: object
    properties:
      slug:
        description: The identifier for the specific dog breed.
people_id:
  name: people_id
  description: Fetches and returns information about a person from the TVmaze API
    using the given person ID and RapidAPI key.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the person to retrieve information for from the TVmaze
          API.
        type: integer
v1_mortgagecalculator:
  name: v1_mortgagecalculator
  description: Calculates mortgage-related information using the API Ninjas Mortgage
    Calculator API endpoint.
  parameters:
    type: object
    properties:
      interest_rate:
        description: Annual interest rate (in %). For example, a 3.5% interest rate
          would be 3.5. Cannot exceed 10000.
        type: integer
      downpayment:
        description: Downpayment on the home or asset. Cannot exceed home_value.
      home_value:
        description: Total value of the home or asset. Must be greater than downpayment.
      monthly_hoa:
        description: Monthly homeowner association fees.
      annual_property_tax:
        description: Annual property tax owed.
      duration_years:
        description: Duration of the loan in years. Must be between 1 and 10000. If
          not set, default value is 30 years.
      loan_amount:
        description: Principal loan amount. Default is 200000.
      annual_home_insurance:
        description: Annual homeowner's insurance bill.
type_get_strategy:
  name: type_get_strategy
  description: Fetches the strategy for a given security ID and type from the Morningstar
    API.
  parameters:
    type: object
    properties:
      securityid:
        description: The security ID used to query the API.
market:
  name: market
  description: Fetches market data from Brave New Coin API based on specified asset
    IDs.
  parameters:
    type: object
    properties:
      quoteassetid:
        description: UUID of the quote asset to filter the market results. Only returns
          markets which include this asset on the quote side, e.g., USD = 'e77b9824-126a-418e-a69c-a2e682578e94'.
      baseassetid:
        description: UUID of the base asset to filter the market results. Only returns
          markets which include this asset on the base side, e.g., BTC = 'f1ff77b6-3ab4-4719-9ded-2fc7e71cff1f'.
bridges:
  name: bridges
  description: Fetch data about cross-chain bridges using the Bridges API from DeFi
    Watch.
  parameters:
    type: object
    properties:
      take:
        description: The number of bridges to retrieve.
      skip:
        description: The number of bridges to skip from the start.
      is_from:
        description: The name of the blockchain from which you want to send.
      to:
        description: The name of the blockchain to which you want to send.
bus_trolley_locations:
  name: bus_trolley_locations
  description: Retrieves the current bus and trolley locations for a specified route.
  parameters:
    type: object
    properties:
      route:
        description: The route identifier for which to retrieve bus and trolley locations.
register_device_information:
  name: register_device_information
  description: Registers a device by sending its information to a specified endpoint.
  parameters:
    type: object
    properties:
      aid:
        description: App identifier for the device.
        type: integer
      version:
        description: Version code of the app. Defaults to '250304'.
      os:
        description: Operating system version of the device. Defaults to '7.1.2'.
github:
  name: github
  description: Checks if a given GitHub username is available using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The GitHub username to check.
recitations_by_chapter_number:
  name: recitations_by_chapter_number
  description: Fetches a list of ayah recitations for a specific Surah (chapter) based
    on the given chapter number and recitation ID.
  parameters:
    type: object
    properties:
      chapter_number:
        description: The chapter (Surah) number for which to fetch the ayah recitations.
        type: integer
      recitation_id:
        description: The recitation ID to specify the reciter.
        type: integer
get_2_convert_endpoint:
  name: get_2_convert_endpoint
  description: Returns the converted amount and the exchange rate used for the conversion
    in JSON format by querying the currency exchange rate API.
  parameters:
    type: object
    properties:
      amount:
        description: The amount of currency to be converted.
        type: integer
      is_from:
        description: The source currency symbol.
      to:
        description: The target currency symbol.
      date:
        description: The date for the historical exchange rate. Defaults to None.
busca_por_simbolo:
  name: busca_por_simbolo
  description: Fetches data for a given stock symbol using the Alpha Vantage API.
  parameters:
    type: object
    properties:
      function:
        description: The type of function to be called in the API (e.g., 'TIME_SERIES_DAILY').
      apikey:
        description: The API key for accessing Alpha Vantage API.
      outputsize:
        description: The size of the data output (e.g., 'compact' or 'full').
      symbol:
        description: The stock symbol for which data is to be fetched.
get_specific_country:
  name: get_specific_country
  description: Fetches fuel prices for a specific country from the RapidAPI endpoint.
  parameters:
    type: object
    properties:
      country:
        description: The name of the country for which to fetch fuel prices.
info:
  name: info
  description: Fetches detailed information about a YouTube video, including audio
    and video streams, using the provided URL.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the YouTube video to retrieve information for.
get_2_mensagens_do_chat_chat_message:
  name: get_2_mensagens_do_chat_chat_message
  description: Fetches chat messages from the "compras-net" API based on the given
    chat code.
  parameters:
    type: object
    properties:
      cod:
        description: The chat code to fetch messages for.
        type: integer
getgroups:
  name: getgroups
  description: Fetches the WhatsApp groups associated with the provided phone ID using
    the Maytapi API.
  parameters:
    type: object
    properties:
      phone_id:
        description: The ID of the phone whose WhatsApp groups are to be fetched.
basic_phone_number_validation:
  name: basic_phone_number_validation
  description: Validates and formats a phone number using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      dialcode:
        description: The phone number to be validated and formatted.
      country_code:
        description: The ISO 3166-1 alpha-2 country code. Defaults to 'US'.
list_transactions:
  name: list_transactions
  description: Retrieve a pageable list of transactions for a specified time period
    from a project.
  parameters:
    type: object
    properties:
      is_from:
        description: The start date of the period to retrieve transactions for, in
          Unix timestamp format.
        type: integer
      to:
        description: The end date of the period to retrieve transactions for, in Unix
          timestamp format.
      projectid:
        description: The ID of the project to retrieve transactions from.
      pagesize:
        description: The number of transactions to retrieve per page. Maximum value
          is 500.
        type: integer
      page:
        description: The page number to retrieve.
        type: integer
ema:
  name: ema
  description: Fetch the Exponential Moving Average (EMA) for a given financial instrument.
  parameters:
    type: object
    properties:
      symbol:
        description: The financial instrument's symbol. Examples include 'AAPL' for
          Apple Inc., 'EUR/USD' for Euro to US Dollar, 'ETH/BTC' for Ethereum to Bitcoin,
          etc.
      interval:
        description: The time interval between successive data points. Supported intervals
          include '1min', '5min', '15min', '30min', '45min', '1h', '2h', '4h', '1day',
          '1week', and '1month'.
      series_type:
        description: The type of series to use in the calculations. Supported values
          are 'open', 'high', 'low', and 'close'. Defaults to 'close'.
      format:
        description: The format of the response data. Supported values are 'JSON'
          and 'CSV'. Defaults to 'JSON'.
      outputsize:
        description: The number of data points to return. Defaults to 30 when no date
          parameter is set, otherwise is set to the maximum available.
      time_period:
        description: The number of periods to use in the calculation of the EMA. Defaults
          to 9.
stock_get_statistics:
  name: stock_get_statistics
  description: Retrieve statistical information for a given stock.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the stock. Use the market/auto-complete API to get
          the correct values.
      template:
        description: Specifies the type of statistical template to use. Options include
          'COMMODITY', 'CURRENCY', 'INDEX', 'INDEXFUTURE', 'RATE', and 'STOCK'. Defaults
          to 'STOCK'.
list_accounts:
  name: list_accounts
  description: Fetches a list of accounts from the API, optionally paginated by a
    specified page number.
  parameters:
    type: object
    properties:
      page:
        description: The page number for paginated results. Defaults to None.
titles_id_main_actors:
  name: titles_id_main_actors
  description: Fetches the main actors of a title given its IMDb ID.
  parameters:
    type: object
    properties:
      is_id:
        description: IMDb ID of the title (e.g., 'tt0000002').
get_weak_certs:
  name: get_weak_certs
  description: Fetches weak certificates for a given firmware hash from the IoT Security
    API.
  parameters:
    type: object
    properties:
      firmware_hash:
        description: SHA2 hash of the device firmware.
get_2_thumbnail_ready:
  name: get_2_thumbnail_ready
  description: Generate a thumbnail of a specified size from a given URL by polling
    an API.
  parameters:
    type: object
    properties:
      size:
        description: 'The size of the thumbnail to generate. Options are:'
      url:
        description: The URL from which to generate the thumbnail.
rsi_oversold:
  name: rsi_oversold
  description: Fetches a list of stocks that have an RSI oversold signal from the
    specified API endpoint.
  parameters:
    type: object
    properties:
      page:
        description: The page number for pagination. Defaults to 1.
live_events:
  name: live_events
  description: Retrieves a list of ongoing live events from the specified endpoint,
    optionally filtered by city, genre, and location.
  parameters:
    type: object
    properties:
      city:
        description: The city to filter the events by. Defaults to 'Firenze'.
      genre:
        description: The genre to filter the events by. Defaults to 'festival'.
      location:
        description: The location to filter the events by. Defaults to 'PIAZZA SANTA
          MARIA NOVELLA'.
url_metrics:
  name: url_metrics
  description: Fetches and returns various metrics for a given target URL, such as
    Domain Authority Score, Page Authority Score, Spam Score, and Total Backlinks,
    using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      target:
        description: The target URL, page, or domain for which to fetch the metrics.
validate_cnpj:
  name: validate_cnpj
  description: Validate a CNPJ number using the Toolbench RapidAPI service, ignoring
    certain characters such as ., -, and /.
  parameters:
    type: object
    properties:
      n:
        description: The CNPJ number to be validated.
full_grid_search:
  name: full_grid_search
  description: Performs a full grid search and retrieves the ranking of a specific
    business at each coordinate point within the grid. The grid cells in the results
    are ordered from left to right and then top to bottom.
  parameters:
    type: object
    properties:
      radius:
        description: The distance between coordinate points in the grid. The measurement
          units are specified by the `radius_units` parameter.
      lat:
        description: The latitude value for the grid center coordinate point.
      grid_size:
        description: The size of the grid (e.g., 3x3, 5x5, 7x7). Allowed values are
          odd integers between 3 and 15.
      place_id:
        description: The Google Place ID of the business to rank.
      query:
        description: The search query or keyword.
      lng:
        description: The longitude value for the grid center coordinate point.
      x_user_agent:
        description: The device type for the search. Default is `desktop`.
      zoom:
        description: The Google Maps zoom level for the search at each grid point.
          Default is '13'.
      radius_units:
        description: The units for the `radius` parameter (e.g., 'km' for kilometers,
          'mi' for miles). Default is `km`.
consulta_estabelecimento:
  name: consulta_estabelecimento
  description: Queries the CNPJ for unified information from Receita Federal, Simples
    Nacional, and Cadastro de Contribuintes.
  parameters:
    type: object
    properties:
      cnpj:
        description: The CNPJ number to be queried.
      maxage:
        description: Maximum age of the cached data in days. Defaults to 30.
      simpleshistory:
        description: Whether to include historical data from Simples Nacional. Defaults
          to None.
      registrations:
        description: UFs separated by commas to include information from Cadastro
          de Contribuintes. Use 'BR' to consider all. Defaults to 'BR'.
      simples:
        description: Whether to include current data from Simples Nacional. Defaults
          to None.
genderize:
  name: genderize
  description: Determines the likely gender of a given name using the Genderize API.
  parameters:
    type: object
    properties:
      name:
        description: The name to analyze for gender determination.
bin_iin_lookup:
  name: bin_iin_lookup
  description: Lookup and retrieve issuer card information using the BIN (Bank Identification
    Number).
  parameters:
    type: object
    properties:
      bin:
        description: The first 6 digits of the credit or debit card used to identify
          the card issuer.
        type: integer
find_places:
  name: find_places
  description: Searches for places by name to obtain a place_id for use with Weather
    Forecast Endpoints and retrieves detailed geographical information (e.g., country,
    region, elevation, timezone) for a given location.
  parameters:
    type: object
    properties:
      text:
        description: Name of the place to search.
      language:
        description: 'Language in which the place names will be returned. Available
          options include:'
get_session_messages:
  name: get_session_messages
  description: Retrieve the message history for a specific character within a given
    session.
  parameters:
    type: object
    properties:
      character_id:
        description: Unique identifier for the character whose message history is
          being retrieved.
      session_id:
        description: Identifier for the session. Defaults to 'e5f6g7h8'.
      page:
        description: Page number for pagination of the message history. Defaults to
          '1'.
      page_size:
        description: Number of messages per page for pagination. Defaults to '40'.
prematchform:
  name: prematchform
  description: Fetch pre-match form information for a specific cricket match using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the cricket match for which to get pre-match form information.
        type: integer
ligue_1_standings:
  name: ligue_1_standings
  description: Fetches the Ligue 1 standings for a given season using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      season:
        description: The season for which to fetch the standings (e.g., '2022'). Defaults
          to None.
daily_match_list_results:
  name: daily_match_list_results
  description: Retrieves the list of daily football match results for a specified
    date.
  parameters:
    type: object
    properties:
      date:
        description: "The date of the matches in the format {dd/mm/yyyy}. Match list\
          \ data can be retrieved for only \xB1 7 days from the specified date."
gs1code128:
  name: gs1code128
  description: Generates a GS1-128 barcode based on provided data and company prefix,
    with optional lot and quantity information.
  parameters:
    type: object
    properties:
      data:
        description: The input data to encode into the barcode.
      company_prefix:
        description: The company prefix required for generating the barcode.
      lot:
        description: The lot number to include in the barcode. Defaults to 'AB123'.
      qty:
        description: The quantity to include in the barcode. Defaults to '100'.
google_maps_data_id:
  name: google_maps_data_id
  description: Fetches the JSON results of the data ID for a specific place using
    the Google Maps API via RapidAPI.
  parameters:
    type: object
    properties:
      query:
        description: The query string used to search for the place.
      gl:
        description: The geographical location from which to execute the query. Defaults
          to 'us'.
free_access:
  name: free_access
  description: Grant access to a unique URL for the Walnut Trading Dashboard using
    the provided API key.
  parameters:
    type: object
    properties:
      get_dash_url:
        description: The URL parameter required to get access to the dashboard.
get_the_yield:
  name: get_the_yield
  description: Fetches the yield information for a given stock ticker using the SundayFinance
    API.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which to retrieve the yield information.
open_interest:
  name: open_interest
  description: Fetch the total amount of unsettled contracts for a given symbol and
    period from the Bybit API.
  parameters:
    type: object
    properties:
      symbol:
        description: The trading symbol for which to retrieve open interest data.
      period:
        description: The data recording period, which can be one of '5min', '15min',
          '30min', '1h', '4h', or '1d'.
      limit:
        description: The maximum number of data points to return. The default is 50,
          with a maximum allowable value of 200.
getweatherforecast:
  name: getweatherforecast
  description: Fetches the weather forecast for a given location over a specified
    number of days.
  parameters:
    type: object
    properties:
      location:
        description: The name of the city or location for which to retrieve the weather
          forecast.
      days:
        description: The number of days of forecast data to retrieve. Defaults to
          3. The range of days is from 1 to 16.
politician_goverlytics_id:
  name: politician_goverlytics_id
  description: Retrieves information about a politician by their 'goverlytics_id'
    from the Goverlytics API.
  parameters:
    type: object
    properties:
      goverlytics_id:
        description: The unique identifier for a politician in the Goverlytics system.
get_news_from_one_news_source:
  name: get_news_from_one_news_source
  description: Fetches news articles from a specified news source and page number
    using the Sri Lanka News API.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve news articles from. Different news
          sources may have varying numbers of articles per page.
        type: integer
      source:
        description: The news source to retrieve articles from. Possible values include
          'Lankadeepa.lk', 'Deshaya.lk', 'Ada.lk', 'BBCSinhala.com', 'Mawbima.lk'.
get_jokes_by_specific_category:
  name: get_jokes_by_specific_category
  description: Fetches a collection of jokes from a specific category with pagination
    and sorting options.
  parameters:
    type: object
    properties:
      limit:
        description: Number of jokes to retrieve per page.
        type: integer
      page:
        description: Page number to retrieve.
        type: integer
      category:
        description: The category of jokes to fetch.
      sortby:
        description: Sorting criteria in the format `field:order`, e.g., `score:desc`
          for descending order by score.
canvas_genres_list:
  name: canvas_genres_list
  description: Fetches a list of genres in the canvas category from the Webtoon API.
  parameters:
    type: object
    properties:
      language:
        description: The language in which to return the genres. Acceptable values
          are 'en', 'zh-hant', 'de', 'fr', 'es', 'th', and 'id'. Default is 'en'.
asoy:
  name: asoy
  description: Fetches JSON results for All States, One Year (ASOY) for the specified
    US Presidential Election year.
  parameters:
    type: object
    properties:
      year:
        description: The election year to retrieve results for (e.g., 2008).
        type: integer
list_of_hotel_chains:
  name: list_of_hotel_chains
  description: Fetches a list of hotel chains from the Booking.com API.
  parameters:
    type: object
    properties:
      name:
        description: Hotel chain name to filter results by.
      chain_id:
        description: Chain ID to filter results by.
politicians:
  name: politicians
  description: Fetches a list of politicians' data based on given filters.
  parameters:
    type: object
    properties:
      offset:
        description: The starting point in the list of results. Defaults to None.
      limit:
        description: The maximum number of results to return. Defaults to None.
      active:
        description: Filter for active politicians. Defaults to None.
      province:
        description: Filter politicians by province. Defaults to None.
      municipality:
        description: Filter politicians by municipality. Defaults to None.
      level_of_government:
        description: Filter politicians by level of government (e.g., federal, provincial,
          municipal). Defaults to None.
latest_articles:
  name: latest_articles
  description: Fetches the latest cryptocurrency news articles from the web, including
    sentiment analysis and keyword extraction.
  parameters:
    type: object
    properties:
      subject:
        description: The subject of the news articles (e.g., bitcoin, altcoin, ethereum,
          nft, blockchain, defi).
      top_n_keywords:
        description: The number of keywords to extract from each article (default
          is 10).
      max_articles:
        description: The maximum number of articles to retrieve in response (default
          is 10).
      last_n_hours:
        description: The time window in hours for the latest news articles (default
          is 48 hours).
get_all_coins_prices:
  name: get_all_coins_prices
  description: Fetches the current price and rate change information for a specified
    cryptocurrency identifier.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the cryptocurrency for which to fetch price
          and rate change information.
trending_with_pagination:
  name: trending_with_pagination
  description: Fetches trending NFT collections from OpenSea with pagination support.
  parameters:
    type: object
    properties:
      limit:
        description: The number of collections to fetch. Default is 50.
      offset:
        description: The number of collections to skip before starting to fetch. Default
          is 0.
section_list:
  name: section_list
  description: Returns a list of sections from the RapidAPI sports score service.
  parameters:
    type: object
    properties:
      page:
        description: Page number to retrieve. Defaults to 1.
origin:
  name: origin
  description: Fetches a list of all dog breeds from a given country of origin using
    the Dog Breed Database API.
  parameters:
    type: object
    properties:
      origin:
        description: The country of origin to filter the dog breeds.
get_u_58_athlete_ranking:
  name: get_u_58_athlete_ranking
  description: Fetches the Under-58kg athlete ranking for Taekwondo from the RapidAPI
    Taekwondo API.
  parameters:
    type: object
    properties:
      country:
        description: The name of the country to filter the athlete rankings by. If
          not provided, rankings from all countries are returned.
consulta_dados_societ_rios:
  name: consulta_dados_societ_rios
  description: Fetches the data of a partner (socio) associated with the given socioeconomic
    ID (id_socio).
  parameters:
    type: object
    properties:
      id_socio:
        description: The socioeconomic ID of the partner to be queried.
public_holidays:
  name: public_holidays
  description: Fetches the public holidays for a given year and country.
  parameters:
    type: object
    properties:
      countrycode:
        description: The code of the country for which to fetch public holidays (e.g.,
          'US' for the United States).
      year:
        description: The year for which to fetch public holidays.
v1_holidays:
  name: v1_holidays
  description: Fetches holidays for a given year and country using the API Ninjas
    Holidays endpoint.
  parameters:
    type: object
    properties:
      year:
        description: 'Calendar year between 2010 and 2030 (inclusive). Note: not all
          countries are guaranteed to have data going back to 2010.'
        type: integer
      country:
        description: Country name or ISO 3166-2 country code (preferred).
igtv:
  name: igtv
  description: Fetch IGTV channel details for a given Instagram username.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username to fetch IGTV details for. Defaults to
          'kimkardashian'.
      nextmaxid:
        description: Pagination identifier for fetching next set of results.
venue_search:
  name: venue_search
  description: Searches for venues based on latitude, longitude, and optional radius
    using the Wiman API.
  parameters:
    type: object
    properties:
      latitude:
        description: The latitude of the location to search.
      longitude:
        description: The longitude of the location to search.
      radius:
        description: The search radius in kilometers. Defaults to 1.
gera_comprovante_rfb:
  name: gera_comprovante_rfb
  description: Generates a certificate from Receita Federal in PDF format.
  parameters:
    type: object
    properties:
      taxid:
        description: The tax identification number to be used for generating the certificate.
      pages:
        description: A comma-separated string specifying which pages to include in
          the certificate. Default is 'REGISTRATION,MEMBERS'.
simple_qr_code:
  name: simple_qr_code
  description: Generates a simple QR code for the given link with optional color customization
    using the RapidAPI Toolbench service.
  parameters:
    type: object
    properties:
      link:
        description: The URL that the QR code will direct to.
      color:
        description: The color of the QR code in hexadecimal format. Default is None,
          which results in the default color (#000).
locations_v3_search:
  name: locations_v3_search
  description: Search for related locations and suggestions based on the provided
    query string using the RapidAPI 'locations/v3/search' endpoint.
  parameters:
    type: object
    properties:
      q:
        description: The query string representing names of countries, cities, districts,
          places, etc.
      langid:
        description: The language identifier. Default is 1033.
      siteid:
        description: The site identifier. Default is 300000001.
      locale:
        description: The locale code. Default is 'en_US'.
get_fare:
  name: get_fare
  description: Retrieves the fare details for a specified train number and route using
    the IRCTC RapidAPI service.
  parameters:
    type: object
    properties:
      trainno:
        description: The train number for which the fare is to be retrieved.
        type: integer
      tostationcode:
        description: The station code of the destination.
      fromstationcode:
        description: The station code of the starting station.
hotel_details:
  name: hotel_details
  description: Fetches detailed information about a specified hotel from the Priceline
    API.
  parameters:
    type: object
    properties:
      hotel_id:
        description: The PPN Hotel ID identifying the desired property.
      airport_limit:
        description: Limit the number of nearby airports included in the response.
      check_in:
        description: Check-in date in 'YYYY-MM-DD' or 'MM/DD/YYYY' format.
      promo:
        description: Flag to include promotional data. Default is False.
      photos:
        description: Flag to include photo data. Default is False.
      videos:
        description: Flag to include video data. Default is False.
      guest_score_breakdown:
        description: Flag to include guest score breakdown data. Default is False.
      reviews:
        description: Flag to include hotel review data. Default is False.
      city_limit:
        description: Limit the number of cities included in the response.
      sid:
        description: Session ID. Default is 'iSiX639'.
      important_info:
        description: Flag to include extra details about the hotel. Default is False.
      recent:
        description: Flag to include recent sales data. Default is False.
      poi_limit:
        description: Limit the number of points of interest included in the response.
      plugins:
        description: Flag to include plugin information. Default is False.
      image_size:
        description: The size of the images returned. Options are 'small', 'medium',
          or 'large'.
      id_lookup:
        description: Flag to search non-PPN Hotel IDs. Default is False.
      check_out:
        description: Check-out date in 'YYYY-MM-DD' or 'MM/DD/YYYY' format.
      currency:
        description: The currency format for the results, in ISO 4217 format.
      nearby:
        description: Flag to include nearby location data such as city, airport, and
          points of interest. Default is False.
get_music:
  name: get_music
  description: Fetches music data from the TikTok API using the given music ID.
  parameters:
    type: object
    properties:
      music_id:
        description: The identifier for the music track to fetch from TikTok.
love_quote:
  name: love_quote
  description: Fetches and returns love quotes from the olato-quotes API.
  parameters:
    type: object
    properties:
      quotes:
        description: Specific quotes to search for. Defaults to 'random quotes'.
prediction:
  name: prediction
  description: Predict the next periods of a time series using given dates and values.
  parameters:
    type: object
    properties:
      periods:
        description: Number of future periods to predict.
        type: integer
      values:
        description: Historical values of the time series data in a comma-separated
          string.
      dates:
        description: Corresponding dates of the historical values in a comma-separated
          string.
get_sessions:
  name: get_sessions
  description: Fetch a list of chat sessions and their corresponding `session_id`
    for a given character.
  parameters:
    type: object
    properties:
      character_id:
        description: The unique identifier of the character whose sessions are being
          retrieved.
      page_size:
        description: The number of sessions to retrieve per page. Defaults to 25.
      page:
        description: The page number to retrieve. Defaults to 1.
get_a_conversation_turn:
  name: get_a_conversation_turn
  description: Fetch a specific conversation turn by its ID and return its details.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the conversation turn to fetch.
        type: integer
search_related_sites:
  name: search_related_sites
  description: Finds sites related to a specified URL using the Advanced SERP Operators
    API.
  parameters:
    type: object
    properties:
      website:
        description: The URL of the website for which to find related sites.
      location:
        description: The proxy location for the search. Supported countries are 'US',
          'CA', 'IE', 'GB', 'FR', 'DE', 'SE', 'IN', 'JP', 'KR', 'SG', 'AU', 'BR'.
          Defaults to 'us'.
      max_results:
        description: The maximum number of related sites to return. Defaults to 10.
songs_v2_get_details:
  name: songs_v2_get_details
  description: Gets detailed information about a specific song using the given song
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the song to retrieve details for.
      l:
        description: The language code for the response (default is 'en-US').
kompas_detail:
  name: kompas_detail
  description: Fetches detailed information from the Kompas news API using a specified
    GUID.
  parameters:
    type: object
    properties:
      guid:
        description: The unique identifier for the news article to fetch details for.
v1_nutrition:
  name: v1_nutrition
  description: Fetches the nutrition information for a given food query using the
    API Ninjas Nutrition API.
  parameters:
    type: object
    properties:
      query:
        description: The food query for which to extract nutrition information (e.g.,
          "bacon and 3 eggs").
get_beverage_by_there_id:
  name: get_beverage_by_there_id
  description: Retrieves beverage details by the given beverage ID from the RapidAPI
    Beverages and Desserts API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the beverage to retrieve.
pastry_ingredient:
  name: pastry_ingredient
  description: Retrieves a random pastry recipe that contains a specific ingredient
    using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      ingredient:
        description: The specific ingredient to include in the pastry recipe.
fetch_by_region:
  name: fetch_by_region
  description: Fetches records by region from the Magical Taske API.
  parameters:
    type: object
    properties:
      region:
        description: The region for which to fetch records.
      limit:
        description: The maximum number of records to return.
        type: integer
artist_overview:
  name: artist_overview
  description: Fetches the overview of an artist from the Spotify API.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the artist.
video_search_api:
  name: video_search_api
  description: Performs a search on the Petey Vid index using specified parameters
    and the Petey Vid Video Search API.
  parameters:
    type: object
    properties:
      q:
        description: The query string for the search (e.g., keywords or phrases).
      dur:
        description: The duration filter for the search (e.g., 'short', 'medium',
          'long'). Defaults to None.
      sort:
        description: The sort order for the search results (e.g., 'relevance', 'date').
          Defaults to None.
      media:
        description: The media filter for the search results, typically indicating
          media type (default is 'Y'). Defaults to 'Y'.
get_count_and_increase_by_one:
  name: get_count_and_increase_by_one
  description: Sends a GET request to the specified counter API, optionally including
    parameters for ID, label, and color,
  parameters:
    type: object
    properties:
      is_id:
        description: An ID to include in the request query. Default is None.
      clabel:
        description: A label to include in the request query. Default is 'blue'.
      color:
        description: A color to include in the request query. Default is 'red'.
tsv6:
  name: tsv6
  description: Fetches the variable list within the specified category of a merged
    data subset along with the metadata.
  parameters:
    type: object
    properties:
      dataset:
        description: The dataset identifier.
      category:
        description: The category to filter the data.
      subset:
        description: The data subset identifier.
      format:
        description: The desired output format. Default is 'tsv'.
artists_get_summary:
  name: artists_get_summary
  description: Fetches summary information related to an artist from the Shazam API.
  parameters:
    type: object
    properties:
      is_id:
        description: The value of 'artist->adamid' field returned in various Shazam
          API endpoints such as /search or /songs/get-details.
      l:
        description: The language code for the response. Defaults to 'en-US'.
retrieve_audio_file:
  name: retrieve_audio_file
  description: Retrieve an audio file in MP3 format from a previously submitted text-to-speech
    conversion.
  parameters:
    type: object
    properties:
      transactionid:
        description: The transaction ID for the previously submitted text-to-speech
          conversion.
motivation_quote:
  name: motivation_quote
  description: Fetches a motivational quote from the Olato Quotes API.
  parameters:
    type: object
    properties:
      quotes:
        description: Type of quotes to fetch. Default is 'random quotes'.
getmusic:
  name: getmusic
  description: Fetches all TikTok videos that are using a specific music track along
    with information about the original music.
  parameters:
    type: object
    properties:
      getmusic:
        description: The identifier or name of the music track to search for on TikTok.
v1_sticker:
  name: v1_sticker
  description: Fetches information related to specific stickers given their IDs from
    the RapidAPI service.
  parameters:
    type: object
    properties:
      sticker_ids:
        description: Comma-separated string of sticker IDs to fetch information for.
hashtagmedias:
  name: hashtagmedias
  description: Fetches media related to a specific hashtag from the Instagram API
    using RapidAPI.
  parameters:
    type: object
    properties:
      hash_tag:
        description: The hashtag to query for media.
      next_cursor:
        description: A cursor for pagination to fetch the next set of results. Defaults
          to None.
success_quote:
  name: success_quote
  description: Fetches a success quote from the RapidAPI Olato Quotes service.
  parameters:
    type: object
    properties:
      quotes:
        description: A specific quote to search for. Defaults to 'random quotes'.
categorytournaments:
  name: categorytournaments
  description: Fetches the list of all basketball leagues belonging to a specific
    category using the category ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The category ID for which you want to retrieve all leagues.
        type: integer
get_champions:
  name: get_champions
  description: Fetches a list of all champions from the League of Legends API, optionally
    in a specified language.
  parameters:
    type: object
    properties:
      lang:
        description: The language in which to retrieve the champion information. Defaults
          to None, which retrieves information in English.
get_charades_word:
  name: get_charades_word
  description: Fetch a random charades word with the specified difficulty level using
    the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      difficulty:
        description: The difficulty level of the charades word (e.g., 'easy', 'medium',
          'hard'). If not provided, a random difficulty level will be used.
playstationdeals:
  name: playstationdeals
  description: Fetches PlayStation deals based on the specified count, using the provided
    RapidAPI key.
  parameters:
    type: object
    properties:
      count:
        description: The number of games to fetch from the deals list. The minimum
          value is 0, and the maximum value depends on the total number of games available.
        type: integer
forex_intraday:
  name: forex_intraday
  description: Fetches intraday time series data (Date, Open, High, Low, Close, Volume)
    for a given currency pair.
  parameters:
    type: object
    properties:
      interval:
        description: Time interval for the data points, e.g., `1` for 1-minute interval,
          `5` for 5-minute interval.
        type: integer
      symbol:
        description: The symbol of the currency pair to query, e.g., `EUR/USD`, `EUR-USD`,
          or `EURUSD`.
      to:
        description: The query end date and time in the format `YYYY-mm-dd HH:MM`
          or just `YYYY-mm-dd`.
      is_from:
        description: The query start date and time in the format `YYYY-mm-dd HH:MM`
          or just `YYYY-mm-dd`.
time_series_endpoint:
  name: time_series_endpoint
  description: Retrieve historical exchange rates for specified date range and currency
    conversions.
  parameters:
    type: object
    properties:
      start_date:
        description: The start date for the time series data in `YYYY-MM-DD` format.
      end_date:
        description: The end date for the time series data in `YYYY-MM-DD` format.
      is_from:
        description: Three-letter currency code of the base currency to convert from.
          Defaults to 'USD'.
      to:
        description: A comma-separated list of target currency codes to convert to.
          Defaults to 'EUR,GBP'.
category:
  name: category
  description: Retrieves information about a specific category from the VOD app API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the category to retrieve information for.
get_brands:
  name: get_brands
  description: Fetches cigar brands from the RapidAPI endpoint, allowing for pagination
    and optional search filtering.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve for pagination.
        type: integer
      search:
        description: A search term to filter cigar brands. Defaults to 'Dominican'.
get_user_info_by_user_id:
  name: get_user_info_by_user_id
  description: Fetch Instagram user information by user ID using the RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The Instagram user ID for which the information is to be fetched.
        type: integer
user_tweets:
  name: user_tweets
  description: Fetches a user's tweets using the Twttr RapidAPI.
  parameters:
    type: object
    properties:
      twttr_proxy:
        description: Optional proxy to use for the Twitter API request.
      twttr_session:
        description: Optional session identifier for the Twitter API request.
      cursor:
        description: Optional cursor for paginated results.
      user_id:
        description: The Twitter user ID for which to fetch tweets.
      username:
        description: The Twitter username for which to fetch tweets (default is 'elonmusk').
get_amazon_search_results:
  name: get_amazon_search_results
  description: Fetches Amazon search results for a given query using the Toolbench
    RapidAPI Key.
  parameters:
    type: object
    properties:
      searchquery:
        description: The search term to query on Amazon.
get_product_detail:
  name: get_product_detail
  description: Fetches product details from the Tokopedia API using the provided action
    and slug.
  parameters:
    type: object
    properties:
      act:
        description: The action to be performed by the API.
      slug:
        description: The unique identifier for the product.
      pretty:
        description: If set to True, formats the API response to be more readable.
          Defaults to None.
getphonedetails:
  name: getphonedetails
  description: Fetches all specifications and photos for a given phone based on its
    ID.
  parameters:
    type: object
    properties:
      phoneid:
        description: The unique identifier of the phone.
        type: integer
getproductbycategory:
  name: getproductbycategory
  description: Retrieves products from a given category using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      category:
        description: The category of the product to search for.
search_product:
  name: search_product
  description: This function searches for a product using the Tokopedia API based
    on the given query and act parameters.
  parameters:
    type: object
    properties:
      query:
        description: The search query string for the product to be searched.
      act:
        description: The action parameter to specify the type of search.
trending_videos:
  name: trending_videos
  description: Fetches a list of trending YouTube videos based on the given parameters.
  parameters:
    type: object
    properties:
      country:
        description: The country code for which to retrieve trending videos. Defaults
          to 'us'.
      lang:
        description: The language code for the video titles and descriptions. Defaults
          to 'en'.
      section:
        description: The section of trending videos to retrieve. Possible values are
          "Now", "Music", "Movies", "Gaming". Defaults to 'Now'.
concerts:
  name: concerts
  description: Fetches concert information using the Spotify API through RapidAPI,
    filtered by the specified geographical location.
  parameters:
    type: object
    properties:
      gl:
        description: The geographical location filter to apply when fetching concert
          information.
piercing_line:
  name: piercing_line
  description: Returns a list of stocks that have a Piercing Line signal from the
    BarPatterns API.
  parameters:
    type: object
    properties:
      page:
        description: The page number for paginated results. Defaults to 1.
        type: integer
get_referral_domains:
  name: get_referral_domains
  description: Retrieves a list of referral domains for a given domain using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      domain:
        description: The domain to retrieve referral domains for.
co2_emission:
  name: co2_emission
  description: Fetches the carbon emissions in grams per Kilo-Watt-Hour for electricity
    in Germany based on the given date. Allows retrieving both the latest and historical
    data back to the year 2017.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve carbon emission data. Accepted
          formats include 'YYYY-MM-DD', 'MM/DD/YYYY', or Unix Timestamp (in milliseconds).
          Defaults to '2022-08-20'.
match_play_by_play:
  name: match_play_by_play
  description: Fetches and returns detailed play-by-play information for a specific
    football match.
  parameters:
    type: object
    properties:
      matchid:
        description: The ID of the football match for which the play-by-play information
          is to be retrieved.
        type: integer
obd2_code:
  name: obd2_code
  description: Retrieve the human-readable version of a requested OBD2 code using
    the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      code:
        description: The OBD2 code to be translated into human-readable format.
main:
  name: main
  description: Makes a GET request to the NeuroNet NLP API with the given text and
    returns the observation.
  parameters:
    type: object
    properties:
      text:
        description: The input text to be processed by the NeuroNet NLP API.
extract_entities:
  name: extract_entities
  description: Extracts named entities from the provided text using the specified
    model and RapidAPI key.
  parameters:
    type: object
    properties:
      text:
        description: The text from which to extract named entities.
      model:
        description: The model to use for named entity recognition. Defaults to None.
get_manga_by_id:
  name: get_manga_by_id
  description: Fetches Manga information by its ID from the Anime, Manga, and Novels
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the Manga to fetch information for.
        type: integer
get_quotes_by_specific_category:
  name: get_quotes_by_specific_category
  description: Fetch a collection of quotes from a specific category using the World
    of Quotes API. It supports pagination and allows customizing the number of quotes
    returned per page.
  parameters:
    type: object
    properties:
      category:
        description: The category of quotes to fetch.
      page:
        description: The page number for pagination. Defaults to 2.
      limit:
        description: The maximum number of quotes to fetch per page. Defaults to 20.
fetch_by_type:
  name: fetch_by_type
  description: Fetches records from the RapidAPI endpoint based on the specified type
    and limit.
  parameters:
    type: object
    properties:
      limit:
        description: The number of records to fetch.
        type: integer
obtain_a_new_datacenter_proxy:
  name: obtain_a_new_datacenter_proxy
  description: Obtain a new datacenter proxy using the provided API key. The proxy
    will only allow connections from a specified IP address or a list of countries.
  parameters:
    type: object
    properties:
      whitelist_ip:
        description: The IP address to whitelist for using the proxy. Allows an additional
          IP address besides the one making the API call.
      countries:
        description: A comma-separated list of country codes from which the proxy
          should be obtained. If not specified, the country is selected randomly.
markets_equities_groups:
  name: markets_equities_groups
  description: Fetches equities groups such as global-equity and countries-equity
    from the Seeking Alpha API based on the given category.
  parameters:
    type: object
    properties:
      category:
        description: The category of equities to fetch. For example, 'global-equity'
          or 'countries-equity'.
all_crypto:
  name: all_crypto
  description: Fetches a datatable of cryptocurrency information from the RapidAPI
    endpoint.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the data to retrieve. Defaults to '1'.
      lang:
        description: The language code for the data. Defaults to 'en'.
cashflow:
  name: cashflow
  description: Fetches either annual or quarterly cash flow statements for a given
    stock symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol of the company (e.g., 'AAPL' for Apple Inc.).
      period:
        description: The reporting period for the cash flow statement. Typically 'annual'
          or 'quarterly'.
full_stock_price:
  name: full_stock_price
  description: Fetches the current stock price for a given symbol using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol to query.
followers_by_username:
  name: followers_by_username
  description: Fetches the followers list for a given Instagram username using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to fetch the followers.
      nextmaxid:
        description: The ID to fetch the next page of results (used for pagination).
          Defaults to None.
      corsenabled:
        description: A flag to enable CORS. Defaults to None.
music_info:
  name: music_info
  description: Retrieve music information using a given music ID from the TikTok API.
  parameters:
    type: object
    properties:
      music_id:
        description: The ID of the music track to retrieve information for.
get_all_data_on_an_establishment_by_restaurant:
  name: get_all_data_on_an_establishment_by_restaurant
  description: Fetches all data on an establishment by restaurant name using the Wyre
    Data API.
  parameters:
    type: object
    properties:
      restaurant:
        description: The name or identifier of the restaurant.
address:
  name: address
  description: Fetch address information such as postal code or latitude/longitude
    based on specified search parameters.
  parameters:
    type: object
    properties:
      coord_unit:
        description: The unit of latitude and longitude in the output data. Options
          are 'degree' (default) or 'millisec'.
      datum:
        description: Geodetic system of latitude and longitude. Options are 'wgs84'
          (default) or 'tokyo'.
      kana_row:
        description: Filter addresses by consonants. Addresses beginning with the
          specified consonant will be returned. Available only when 'code' is specified.
      limit:
        description: Specifies the maximum number of response data to return. Minimum
          value is 1, maximum is 100, default is 10.
        type: integer
      level_from:
        description: Filters addresses to include only those up to a specified lowest
          address level (1-7).
      level_to:
        description: Filters addresses to include only those up to a specified highest
          address level (1-7).
      word:
        description: Search keyword. Cannot be used in combination with 'code'. Either
          'word' or 'code' must be specified.
      code:
        description: Address code. Cannot be used in combination with 'word'. Either
          'word' or 'code' must be specified.
      sort:
        description: Order in which to sort addresses. Options are 'lexical', 'level_asc',
          or 'code_asc' (default).
      offset:
        description: Skips the first number of data. Minimum value is 0, maximum is
          2000, default is 0.
        type: integer
      address_filter:
        description: Address filter for getting a specific address code. Prefixing
          the address code with a '-' excludes the relevant address from the response.
          Available only when 'word' is specified.
ip:
  name: ip
  description: Fetches data for the provided IP address using the IP Geo Location
    and IP Reputation API.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address for which data is to be fetched. Defaults to '8.8.8.8'.
a_chapter_by_its_slug:
  name: a_chapter_by_its_slug
  description: Fetches information for a specified chapter of a webtoon from a given
    provider.
  parameters:
    type: object
    properties:
      slug:
        description: The slug identifier for the chapter. See /chapters for the chapter
          list.
      provider:
        description: The slug identifier for the webtoon provider. See /providers
          for the provider list.
      webtoon:
        description: The slug identifier for the webtoon. See /webtoons for the webtoon
          list.
market_get_movers:
  name: market_get_movers
  description: Fetches a list of recent market movers based on specified criteria
    such as rank type, exchange, and sector or CUSIP.
  parameters:
    type: object
    properties:
      ranktype:
        description: 'The type of ranking for the market movers. Possible values are:
          ''MostActives'', ''PctChgGainers'', ''PctChgLosers'', ''NetGainers'', ''NetLosers'',
          ''52WkHigh'', ''52WkLow''.'
      exchange:
        description: 'The exchange from which to get the market movers. Possible values
          are: ''US'', ''USN'', ''USQ'', ''USA''.'
      sectorcusip:
        description: The sector or CUSIP identifier to filter the market movers. Defaults
          to 'ALL'.
locations:
  name: locations
  description: Retrieves hierarchical geographical locations related to flights for
    a given locale.
  parameters:
    type: object
    properties:
      locale:
        description: Locale code for the desired geographical information. Example
          values can be retrieved from the `Locales` endpoint.
route_information:
  name: route_information
  description: Fetch route information from the BART API using the given command.
  parameters:
    type: object
    properties:
      cmd:
        description: The command to send to the BART API. Possible commands can be
          found at http://api.bart.gov/docs/overview/examples.aspx.
hotel_reviews:
  name: hotel_reviews
  description: Fetches a list of hotel reviews based on the provided parameters using
    the Priceline API.
  parameters:
    type: object
    properties:
      hotel_id:
        description: The PPN Hotel ID identifying the desired property.
      languages:
        description: Comma-separated language codes to filter the reviews by language.
          Defaults to 'en,fr'.
      order_by:
        description: Comma-separated sorting order metrics. Valid options include
          creation_date, average_rating, or verified_guest followed by .asc or .desc.
      offset:
        description: The number of reviews to skip before starting to return results.
          Used in conjunction with `limit`. Defaults to None.
      limit:
        description: Limits the number of reviews returned. Defaults to 100.
      only_verified_guests:
        description: If set to True, only includes reviews from verified guests. Defaults
          to None.
stays_auto_complete:
  name: stays_auto_complete
  description: Fetches auto-complete suggestions for stays based on a given location.
  parameters:
    type: object
    properties:
      location:
        description: The location for which to get auto-complete suggestions.
      language_code:
        description: The language code for the results. Defaults to 'en-us'.
child_comments:
  name: child_comments
  description: python
  parameters:
    type: object
    properties:
      commentid:
        description: The ID of the parent comment.
        type: integer
      mediaid:
        description: The ID of the media the comment belongs to.
        type: integer
      max_id:
        description: The max_id parameter for pagination in the API request. Default
          is None.
      min_id:
        description: The min_id parameter for pagination in the API request. Default
          is '{}'.
recent_exchange_rates:
  name: recent_exchange_rates
  description: Retrieve the latest exchange rate data between currencies.
  parameters:
    type: object
    properties:
      is_from:
        description: Three-letter currency code of the currency to convert from. Defaults
          to 'USD'.
      to:
        description: Comma-separated list of currency codes to convert 'is_from' currency
          into. Defaults to 'EUR,GBP'.
search_restaurants_by_local_authority:
  name: search_restaurants_by_local_authority
  description: Fetches all restaurants within a specified local authority using the
    Wyre Data API.
  parameters:
    type: object
    properties:
      localauthority:
        description: The name of the local authority to search for restaurants in.
matches_v2_list_by_league:
  name: matches_v2_list_by_league
  description: Fetches and returns a list of matches for a specific league and category
    from the LiveScore API.
  parameters:
    type: object
    properties:
      category:
        description: 'The category of the sport. One of the following: ''soccer'',
          ''cricket'', ''basketball'', ''tennis'', ''hockey''.'
      ccd:
        description: The CCD value that is responded in .../leagues/v2/list or .../matches/v2/list-by-date
          endpoints.
      scd:
        description: The SCD value that is responded in .../leagues/v2/list or .../matches/v2/list-by-date
          endpoints. Default is 'group-b'.
      timezone:
        description: 'The timezone offset. One of the following: -11, -10, -9.5, -9,
          -8.5, -8, -7, -6, -5, -4.5, -4, -3.5, -3, -2.5, -2, -1, 0, 1, 2, 3, 3.5,
          4, 4.5, 5, 5.5, 5.75, 6, 6.5, 6.75, 7, 7.5, 8, 8.5, 8.75, 9, 9.5, 9.75,
          10, 10.5, 11, 11.5, 12, 12.5, 12.75, 13, 13.75, 14. Default is -7.'
staffs_get_short_info:
  name: staffs_get_short_info
  description: Fetch short information for one or more staff members given their IDs.
  parameters:
    type: object
    properties:
      ids:
        description: 'Comma-separated list of staff IDs. Example: `60805,39208,17455`.'
      domain:
        description: 'Specifies the domain. One of the following: `com`, `de`, `be`,
          `es`, `it`, `nl`, `pl`, `pt`, `com.tr`, `world`. Defaults to `de`.'
stats_performance:
  name: stats_performance
  description: Fetches performance statistics of the AI prediction module for football
    matches.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch the performance statistics, formatted
          as 'YYYY-MM-DD'. Defaults to '2022-08-13'.
search_return_flights:
  name: search_return_flights
  description: Retrieve all return flights for a given contract/return bundle from
    FlightDepartures using the getFlightReturns endpoint.
  parameters:
    type: object
    properties:
      sid:
        description: Session ID. A random string to identify the session, e.g., 'j10k11l12m13n14'.
      ppn_bundle:
        description: A unique ID used to identify a specific return rate bundle provided
          by FlightDepartures.
      convert_currency:
        description: The requested currency for the results, in ISO 4217 format. Defaults
          to None.
get_train_live_status:
  name: get_train_live_status
  description: Get the current live status of a train using its train number and the
    journey start day.
  parameters:
    type: object
    properties:
      trainno:
        description: The train number whose live status is to be fetched.
      startday:
        description: The start day of the journey, represented as a string ranging
          from '0' to '4'. Defaults to '1'.
getthelistofcountriesregistered:
  name: getthelistofcountriesregistered
  description: Fetches a list of countries registered on the ecombr.com marketplace
    using the provided API credentials and parameters.
  parameters:
    type: object
    properties:
      action:
        description: The specific action to be executed by the API.
      content_type:
        description: The content type of the API request.
      cache_control:
        description: The cache control settings for the API request.
      secret:
        description: The secret key for authenticating the API request.
      token:
        description: The token for validating the API request.
      e_mail:
        description: The email associated with the API account.
provider:
  name: provider
  description: Fetches data from a specified provider using the RapidAPI service.
  parameters:
    type: object
    properties:
      provider:
        description: The name of the data provider.
      amount:
        description: The quantity of data to fetch from the provider.
        type: integer
getting_data:
  name: getting_data
  description: This function retrieves supermarket sales data from three different
    cities using the provided RapidAPI keys.
  parameters:
    type: object
    properties:
      x_rapidapi_key:
        description: The RapidAPI key for accessing the `data_visualisation_` API.
          Defaults to 'demo'.
stickers_trending:
  name: stickers_trending
  description: Fetches trending stickers or creators from the Mojitok sticker store
    API.
  parameters:
    type: object
    properties:
      include:
        description: Specifies whether to include 'STICKER_PACK' or 'CREATOR' information
          in the response. Defaults to 'STICKER_PACK'.
email_id:
  name: email_id
  description: Validates an email address using the Toolbench API and returns the
    validation result.
  parameters:
    type: object
    properties:
      email:
        description: The email address to validate.
get_all_users_paged_by_hundreds:
  name: get_all_users_paged_by_hundreds
  description: Fetches a list of users from a specified page, with each page containing
    up to one hundred users, using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve the users from.
        type: integer
songs:
  name: songs
  description: Fetches K-POP songs information based on the given search criteria.
  parameters:
    type: object
    properties:
      q:
        description: Query string to search for specific songs.
      by:
        description: 'Attribute to base the search on. This can be one of the following:'
      limit:
        description: Limit the number of results returned. Defaults to None, which
          returns all available results.
      offset:
        description: Offset from where to start returning results. Defaults to None,
          which starts from the beginning.
get_wisdom_quotes_by_topic:
  name: get_wisdom_quotes_by_topic
  description: Fetches wisdom quotes related to a specific topic using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      topic:
        description: The topic to retrieve wisdom quotes about.
cinemas:
  name: cinemas
  description: Fetches a list of cinemas based on the specified brand using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      brand:
        description: The brand of the cinema to filter the results. Default is 'hoyts'.
feeds_search:
  name: feeds_search
  description: Search for recipes by name and optional filters.
  parameters:
    type: object
    properties:
      start:
        description: The offset of items to be ignored in the response for paging.
        type: integer
      maxresult:
        description: The number of items returned per response.
        type: integer
      fibtgmax:
        description: Maximum amount of fiber (in grams).
      camax:
        description: Maximum amount of calcium (in milligrams).
      cholemax:
        description: Maximum amount of cholesterol (in milligrams).
      allowedattribute:
        description: A comma-separated list of allowed attributes (typically dietary
          restrictions).
      sweetmax:
        description: Maximum sweetness level (e.g., 0 to 1).
      kmax:
        description: Maximum amount of potassium (in milligrams).
      namax:
        description: Maximum amount of sodium (in milligrams).
      q:
        description: Query string to search for specific food or ingredient.
      enerc_kcalmax:
        description: Maximum amount of calories (in kcal).
      femax:
        description: Maximum amount of iron (in milligrams).
      fat_kcalmax:
        description: Maximum amount of calories from fat (in kcal).
      maxtotaltimeinseconds:
        description: Maximum total time to prepare the dish (in seconds).
      piquantmax:
        description: Maximum piquant (spiciness) level (e.g., 0 to 1).
      vita_iumax:
        description: Maximum amount of vitamin A (in IU).
      vitcmax:
        description: Maximum amount of vitamin C (in milligrams).
      meatymax:
        description: Maximum meatiness level (e.g., 0 to 1).
      fasatmax:
        description: Maximum amount of saturated fat (in grams).
      sweetmin:
        description: Minimum sweetness level (e.g., 0 to 1).
      piquantmin:
        description: Minimum piquant (spiciness) level (e.g., 0 to 1).
      fatmax:
        description: Maximum amount of total fat (in grams).
      sourmin:
        description: Minimum sourness level (e.g., 0 to 1).
      meatymin:
        description: Minimum meatiness level (e.g., 0 to 1).
      sourmax:
        description: Maximum sourness level (e.g., 0 to 1).
      chocdfmax:
        description: Maximum amount of carbohydrates (in grams).
      saltymin:
        description: Minimum saltiness level (e.g., 0 to 1).
      sugarmax:
        description: Maximum amount of sugar (in grams).
      procntmax:
        description: Maximum amount of protein (in grams).
      saltymax:
        description: Maximum saltiness level (e.g., 0 to 1).
movies_get_opening:
  name: movies_get_opening
  description: Fetches the list of opening movies for a given country using the Flixster
    API.
  parameters:
    type: object
    properties:
      countryid:
        description: The country code for which to fetch opening movies. Defaults
          to 'usa'. Examples include 'afg', 'alb', 'dza', etc.
get_latest_article_list:
  name: get_latest_article_list
  description: Fetches a list of the latest news articles for a specified language
    from the Malaysia Kini API.
  parameters:
    type: object
    properties:
      language:
        description: The language code for which to fetch the latest news articles.
          Supported languages include English ('en'), Malay ('my'), and Chinese ('zh').
get_followers_by_username:
  name: get_followers_by_username
  description: Retrieves the information of 12 followers for a given Instagram username
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to fetch followers information.
get_user_follower_list:
  name: get_user_follower_list
  description: Fetches the follower list for a specified user from the TikTok API.
  parameters:
    type: object
    properties:
      user_id:
        description: The ID of the user whose followers are to be fetched.
      count:
        description: The number of followers to retrieve, with a maximum of 200. Defaults
          to '50'.
      time:
        description: A timestamp indicating the starting point for the followers list.
          If there are more followers to retrieve, this value should be updated. Defaults
          to '0'.
post_count:
  name: post_count
  description: Fetches the total post count for a given hashtag using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      tag:
        description: The hashtag for which the post count is to be fetched.
tiktok_url_shortener:
  name: tiktok_url_shortener
  description: This function shortens a TikTok URL using the ScrapTik API and allows
    for optional specification of device and proxy.
  parameters:
    type: object
    properties:
      url:
        description: The TikTok URL to shorten.
      device:
        description: The type of device for the request. Defaults to None.
      tok_proxy:
        description: The proxy to use for the request. Defaults to None.
locations_v2_list:
  name: locations_v2_list
  description: Fetch a list of locations from the specified Google place ID and additional
    geolocation parameters using the RapidAPI service.
  parameters:
    type: object
    properties:
      google_place_id:
        description: The Google Place ID representing a specific location.
      geo_text:
        description: The text description of the geographical location. Defaults to
          'Roma, Metropolitan City of Rome, Italy'.
      geo_ref:
        description: A boolean flag for additional geolocation referencing. Defaults
          to None.
      geo_type:
        description: The type of geographical entity (e.g., 'locality'). Defaults
          to 'locality'.
stays_properties_detail_photos:
  name: stays_properties_detail_photos
  description: Fetch detailed photos of a specific property from the stays/properties/detail/photos
    endpoint using the Booking.com RapidAPI.
  parameters:
    type: object
    properties:
      language_code:
        description: The language code to use for the response. Default is 'en-us'.
      id_detail:
        description: The ID of the property to fetch detail photos for. Default is
          'cr/la-buena-vida-cabinas'.
airportstatistics:
  name: airportstatistics
  description: Returns detailed airport statistics for a specified airport based on
    provided identifiers.
  parameters:
    type: object
    properties:
      ident:
        description: The ident of the airport, as returned by /airport/search.
      localid:
        description: Local identifiers of the airport, available mostly for the US
          & CA (FAA-ID). Max length is 6.
      iata:
        description: The IATA code of the airport, must have a length of 3.
      icao:
        description: The ICAO code of the airport, must have a length of 4.
webcams_list_country_country_country:
  name: webcams_list_country_country_country
  description: Fetches a list of webcams for the specified country or countries.
  parameters:
    type: object
    properties:
      country:
        description: Comma-separated ISO 3166-1-alpha-2 codes representing the country
          or countries of interest.
      lang:
        description: The language to localize the results to, if available. Default
          is 'en'.
      show:
        description: Content to be listed in the response. Default is 'webcams:image,location'.
get_3_month_historical_daily_prices:
  name: get_3_month_historical_daily_prices
  description: Fetches 3 months of historical daily stock prices for the given ticker.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol to fetch historical prices for.
items:
  name: items
  description: Fetches item details from the Codester API using the specified item
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The item ID for which details are to be fetched.
get_artist_albums:
  name: get_artist_albums
  description: Fetches albums for a given artist from one of the specified groups
    using the Spotify Data API.
  parameters:
    type: object
    properties:
      is_id:
        description: ID of the artist whose albums are to be retrieved.
      group:
        description: Category of albums to fetch. One of "album", "single", "appears_on",
          or "compilation".
      limit:
        description: Maximum number of results to return. Default is 20, with a maximum
          limit of 50.
      offset:
        description: The index of the first result to return. Default is None.
business_delta:
  name: business_delta
  description: Calculates the number of business days between two given dates using
    the DaysAPI.
  parameters:
    type: object
    properties:
      second_date:
        description: The second date in the range. Defaults to '2021-09-16'.
      first_date:
        description: The first date in the range. Defaults to '2021-09-08'.
advanced_search:
  name: advanced_search
  description: Performs an advanced search for movie news articles using various filters
    such as sentiment, date range, type of content, and pagination options.
  parameters:
    type: object
    properties:
      q:
        description: The search query term.
      sentiment:
        description: Filter by sentiment of the articles. Defaults to 'positive'.
      maxdate:
        description: The maximum date for filtering articles in 'MM/DD/YYYY' format.
          Defaults to '05/08/2023'.
      mindate:
        description: The minimum date for filtering articles in 'MM/DD/YYYY' format.
          Defaults to '01/01/2023'.
      offset:
        description: The number of articles to skip (used for pagination). Defaults
          to 0.
      limit:
        description: The maximum number of articles to return. Defaults to 10.
market_get_chart:
  name: market_get_chart
  description: Fetches chart data from the specified market endpoint using given parameters.
  parameters:
    type: object
    properties:
      interval:
        description: 'One of the following intervals for the chart data: ''d1'', ''d3'',
          ''ytd'', ''m1'', ''m3'', ''m6'', ''y1'', ''y5''.'
      is_id:
        description: The id of the market instrument, typically obtained from the
          market auto-complete endpoint.
google_images:
  name: google_images
  description: Fetches JSON data of image results from Google Images based on a query
    and various optional parameters.
  parameters:
    type: object
    properties:
      query:
        description: The search query for the images.
      gl:
        description: The country to use for the search. Defaults to 'us'.
      hl:
        description: The language to use for the search. Defaults to 'en_us'.
      duration:
        description: The time duration for the search (e.g., 'd' for day, 'w' for
          week).
      chips:
        description: Additional search filters.
      lr:
        description: The language restriction for the search.
      ijn:
        description: Index of the search results page. Defaults to '0'.
      html:
        description: If True, returns HTML content.
      uule:
        description: Encoded location parameters.
      device:
        description: The device to use for the search (e.g., 'desktop', 'mobile').
          Defaults to 'desktop'.
      safe:
        description: Safe search setting.
      nfpr:
        description: Filter option for non-personal results.
      tbs:
        description: Additional search parameters.
consulta_cadastro_de_contribuintes:
  name: consulta_cadastro_de_contribuintes
  description: Retrieves taxpayer registration details from the Centralized Taxpayer
    Registry.
  parameters:
    type: object
    properties:
      taxid:
        description: The taxpayer identification number.
      maxage:
        description: The maximum age of the data in days. Defaults to 30.
      states:
        description: Comma-separated states for including taxpayer registry information.
          Use 'BR' for all states. Defaults to 'BR'.
specific_publication_articles:
  name: specific_publication_articles
  description: Fetches news articles from a specific publication using the provided
    newspaper ID.
  parameters:
    type: object
    properties:
      newspaperid:
        description: The ID of the newspaper to fetch articles from.
records:
  name: records
  description: Fetches records data from the Goverlytics API based on various optional
    filtering criteria.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of records to return. Defaults to None.
      offset:
        description: The starting point in the list of records to return. Defaults
          to None.
      substring:
        description: A substring to search for within the records. Defaults to None.
      speaker_id:
        description: An ID representing a specific speaker. Defaults to None.
      topic:
        description: The topic to filter records by. Defaults to None.
      speaker_party:
        description: The party affiliation of the speaker to filter by. Defaults to
          None.
      level_of_government:
        description: The level of government to filter records by. Defaults to None.
      region:
        description: The region to filter records by. Defaults to None.
article_page:
  name: article_page
  description: Fetches a page of articles based on the provided page ID, with an optional
    limit on the number of articles returned and a specified RapidAPI key.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the page to fetch articles from.
        type: integer
      limit:
        description: The maximum number of articles to retrieve. Defaults to 10.
get_a_specific_champion_s_base_stats:
  name: get_a_specific_champion_s_base_stats
  description: Fetches the base stats of a specified League of Legends champion using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      name:
        description: The name of the champion whose base stats are to be retrieved.
filter_group_giveaways:
  name: filter_group_giveaways
  description: Filters and groups giveaways based on the provided platform and type,
    using the provided API key to make the request.
  parameters:
    type: object
    properties:
      platform:
        description: The platform for which to filter the giveaways (e.g., 'pc', 'ps4',
          'xbox').
live_giveaways_by_type:
  name: live_giveaways_by_type
  description: Retrieve live giveaways from the GamerPower API based on the specified
    type.
  parameters:
    type: object
    properties: {}
get_countrywise_city_data:
  name: get_countrywise_city_data
  description: Fetches a list of cities for a given country using an API, based on
    provided parameters.
  parameters:
    type: object
    properties:
      iso3:
        description: A 3-character ISO3 country code. Default is 'IND'.
      country:
        description: The country name. Default is 'IND'.
      count:
        description: The maximum number of results to return. Default is 2.
        type: integer
      iso2:
        description: A 2-character ISO2 country code. Default is 'IN'.
search_roman_god_by_name:
  name: search_roman_god_by_name
  description: Searches for a Roman God by name to get a description about them.
  parameters:
    type: object
    properties:
      god:
        description: The name of the Roman God to search for.
poor_backlinks:
  name: poor_backlinks
  description: Fetch poor quality backlinks for a given domain using the Best Backlink
    Checker API.
  parameters:
    type: object
    properties:
      domain:
        description: The domain for which to fetch the poor quality backlinks.
get_country_population:
  name: get_country_population
  description: Fetch the population data for a given country using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      country:
        description: The name of the country for which to fetch the population data.
title_title_abs:
  name: title_title_abs
  description: Retrieves all poems with a specific title using the Thundercomb Poetry
    DB API.
  parameters:
    type: object
    properties:
      title:
        description: The exact title of the poem.
get_wind_speed:
  name: get_wind_speed
  description: Fetches the current wind speed for a specified city using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city for which to retrieve wind speed information.
gethardquestion:
  name: gethardquestion
  description: Fetches the number of hard questions solved by a specified user on
    LeetCode using the RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The LeetCode username of the user whose hard question count is
          to be retrieved.
capture_screenshot:
  name: capture_screenshot
  description: Captures a screenshot of the specified website and returns the observation
    JSON or text from the API response.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the website to capture a screenshot of.
hosts_txt:
  name: hosts_txt
  description: Fetches the hosts file for a specific game using the StopModReposts
    Blocklist API.
  parameters:
    type: object
    properties:
      game:
        description: The name of the game for which to fetch the hosts file. Defaults
          to 'minecraft'.
pitstopdataforarace:
  name: pitstopdataforarace
  description: Retrieves pit stop data for a specific Formula 1 race using the provided
    year and round.
  parameters:
    type: object
    properties:
      year:
        description: The season year of the Formula 1 race.
      round:
        description: The round number of the Formula 1 race.
continents:
  name: continents
  description: Fetches and returns a list of continents of the world localized to
    the requested language, with various filtering options.
  parameters:
    type: object
    properties:
      fields:
        description: Specifies the fields to return for each continent. Options include
          'iso_a2', 'iso_a3', 'continent_code', 'dial_code', 'currency_code', 'currency_num_code',
          'currency'.
      continent_code:
        description: Filters the results based on the 2-letter continent code.
      lang:
        description: Two-letter ISO 639-2 language code to localize the continent
          names.
      name:
        description: Filter results to contain the given continent name in the chosen
          language.
pagesblanches:
  name: pagesblanches
  description: This function retrieves data from the Pages Blanches API for extracting
    email and phone information based on the given parameters.
  parameters:
    type: object
    properties:
      pbpage:
        description: The page number of the search results to retrieve.
        type: integer
      pbkeyword:
        description: The search keyword or term for the Pages Blanches query.
      pblocation:
        description: The location to filter the search results.
coins_list_pairs:
  name: coins_list_pairs
  description: Fetches a list of available cryptocurrency pairs from the RapidAPI
    endpoint.
  parameters:
    type: object
    properties:
      lang_id:
        description: The language ID returned in the /get-meta-data endpoint. Defaults
          to 1.
      time_utc_offset:
        description: UTC offset value in seconds. For example, UTC+8 is represented
          as 28800. Defaults to 28800.
categories:
  name: categories
  description: Fetch a list of all categories available in a specified country.
  parameters:
    type: object
    properties:
      countrycode:
        description: The country code where the categories should be obtained.
      languagecode:
        description: The language code for localization (default is 'en').
get_location_infomation_by_zipcode:
  name: get_location_infomation_by_zipcode
  description: Fetches the location information for a given ZIP code using the Redfin
    API.
  parameters:
    type: object
    properties:
      zipcode:
        description: The ZIP code for which to fetch the location information.
by_state_city:
  name: by_state_city
  description: Searches for homeless shelters in a specified state and city using
    the provided API key.
  parameters:
    type: object
    properties:
      state:
        description: Full state name (e.g., 'Washington') or abbreviation (e.g., 'WA').
      city:
        description: City name (e.g., 'Bellevue').
fresh_potential_gems:
  name: fresh_potential_gems
  description: Fetches a list of recently added cryptocurrency coins from the Crypto
    Gem Finder API.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of recently added coins to fetch. Defaults
          to '10'.
      page:
        description: The page number to fetch results from. Defaults to '1'.
google_videos:
  name: google_videos
  description: Fetches the JSON data of video results from the Google Search API based
    on the given search parameters.
  parameters:
    type: object
    properties:
      query:
        description: The search query string.
      uule:
        description: Encoded location parameter.
      duration:
        description: Video duration filter.
      safe:
        description: Safe search setting.
      hl:
        description: Language of the search results (default is 'en_us').
      num:
        description: Number of results to return (default is '10').
      lr:
        description: Language restriction for the search.
      device:
        description: Device type (default is 'desktop').
      tbs:
        description: Restrict results based on time.
      nfpr:
        description: Enables or disables personal results (default is '0').
      gl:
        description: Country restrict for the search (default is 'us').
      page:
        description: Page number for the search results (default is '0').
rental_ratings:
  name: rental_ratings
  description: Fetches rental ratings for a specified location using the AirDNA API.
  parameters:
    type: object
    properties:
      location:
        description: The location for which rental ratings are to be fetched.
      currency:
        description: The currency code for the rental ratings. Defaults to None.
classification:
  name: classification
  description: "Gets the K\xF6ppen climate classification code for the given longitude\
    \ and latitude coordinates."
  parameters:
    type: object
    properties:
      lon:
        description: The longitude coordinate.
      lat:
        description: The latitude coordinate.
search_for_a_word_in_quran:
  name: search_for_a_word_in_quran
  description: Search for a given keyword in the English translation of the Quran
    and return the verses containing the keyword and total matches in JSON format.
  parameters:
    type: object
    properties:
      searchterm:
        description: The keyword or phrase to search for in the Quran.
lines_line:
  name: lines_line
  description: Fetches all poems from Poetry DB that contain a specific line or part
    of the line.
  parameters:
    type: object
    properties:
      line:
        description: The line or part of a line to search for in the poems.
get_word_by_start_and_contain:
  name: get_word_by_start_and_contain
  description: This function retrieves a random word from the Random Word API that
    starts with the specified `start` string and contains the specified `substring`.
  parameters:
    type: object
    properties:
      substring:
        description: The substring that the word must contain.
      start:
        description: The starting string of the word.
current:
  name: current
  description: Fetches the current weather conditions based on the specified parameters.
  parameters:
    type: object
    properties:
      language:
        description: 'The language for text summaries. Available options are:'
      units:
        description: 'The unit system for measurements. Available options are:'
      place_id:
        description: Identifier of a place. If specified, it overrides lat and lon.
      lon:
        description: Longitude coordinate. Default is '-122.42282'.
      timezone:
        description: Timezone for date fields. Default is 'auto', which uses the local
          timezone of the location.
      lat:
        description: Latitude coordinate. Default is '37.81021'.
rapidapigethourlyforecastbylocationname:
  name: rapidapigethourlyforecastbylocationname
  description: Fetches the hourly weather forecast for a given location using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      locationname:
        description: The name of the location for which to retrieve the hourly weather
          forecast.
feeds_list:
  name: feeds_list
  description: Fetches a list of feeds from the Yummly API based on the given parameters
    for pagination and optional category tag.
  parameters:
    type: object
    properties:
      start:
        description: The offset of items to be skipped in the response for paging.
        type: integer
      limit:
        description: The number of items to be returned per response.
        type: integer
      tag:
        description: The value representing a specific category/tag to filter the
          feeds list. Defaults to None.
ip_lookup_api:
  name: ip_lookup_api
  description: Fetches detailed information for a given IP address using the WeatherAPI.
  parameters:
    type: object
    properties:
      q:
        description: The IP address to look up. Can also be 'auto:ip' to auto-detect
          the IP address.
fetch_company_details:
  name: fetch_company_details
  description: Fetch company details by company name using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      query:
        description: The company name to search for.
query_for_city_boundary_by_city_name:
  name: query_for_city_boundary_by_city_name
  description: Queries the boundary information for a given city name from a specified
    API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the city for which the boundary information is to
          be queried.
query_by_fsa_code:
  name: query_by_fsa_code
  description: Fetches geographical boundary information for a given Canadian Forward
    Sortation Area (FSA) code using the VanitySoft API.
  parameters:
    type: object
    properties:
      postal_fsa:
        description: A Canadian Forward Sortation Area (FSA) code, e.g., "T6H" or
          "A0A".
planet_vector_tiles:
  name: planet_vector_tiles
  description: Retrieves global planet vector tiles in Protocolbuffer Binary Format
    (PBF) from the specified map service.
  parameters:
    type: object
    properties:
      y:
        description: The y coordinate (tile row) of the map tile.
      x:
        description: The x coordinate (tile column) of the map tile.
      z:
        description: The zoom level of the map tile.
reverse:
  name: reverse
  description: Performs reverse geocoding to obtain location details from longitude
    and latitude coordinates.
  parameters:
    type: object
    properties:
      lon:
        description: The longitude of the location to be reverse geocoded.
      lat:
        description: The latitude of the location to be reverse geocoded.
      polygon:
        description: If specified, includes polygon details in the response.
      language:
        description: Language for the response data. Must be a valid ISO 639-1 language
          code.
getrandomsolution:
  name: getrandomsolution
  description: Fetches a JSON data consisting of a random optimal solution for a given
    cube position.
  parameters:
    type: object
    properties:
      position:
        description: The cube position for which to retrieve the random optimal solution.
tsv4:
  name: tsv4
  description: Retrieves the entry list of a specified subset from a dataset using
    the odem API.
  parameters:
    type: object
    properties:
      subset:
        description: The identifier of the data subset to retrieve.
      dataset:
        description: The identifier of the dataset to query.
      format:
        description: The output format for the response. Defaults to 'tsv'.
stock_balance_sheet:
  name: stock_balance_sheet
  description: Retrieves the balance sheet data for a specified stock symbol using
    the Yahoo Finance API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to retrieve the balance sheet data.
spac_sec_filings:
  name: spac_sec_filings
  description: Fetches the latest SPAC SEC filings, optionally filtered by a given
    SPAC symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: The SPAC symbol to filter the SEC filings by. Defaults to 'ITAC'.
profile_igtv:
  name: profile_igtv
  description: Fetches the IGTV channel profile information for a given Instagram
    username using the RapidAPI Instagram Scraper.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username to fetch the IGTV profile for. Default
          is 'kimkardashian'.
      nextmaxid:
        description: The next max ID for pagination, if any. Default is None.
download_video_or_reel:
  name: download_video_or_reel
  description: Downloads Facebook video or reel links in HD and SD formats.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the Facebook video or reel to be downloaded.
jokes_random:
  name: jokes_random
  description: Retrieves a random Chuck Norris joke in JSON format from the specified
    API.
  parameters:
    type: object
    properties:
      category:
        description: Specifies the category of the random joke. Defaults to None.
stock_sec_filings:
  name: stock_sec_filings
  description: Fetch the SEC filings for a given stock symbol from the Yahoo Finance
    API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to fetch SEC filings.
get_profile_by_slug:
  name: get_profile_by_slug
  description: Fetch a specific coin profile by its slug, optionally including various
    additional details.
  parameters:
    type: object
    properties:
      slug:
        description: The slug identifier for the cryptocurrency.
      explorers:
        description: If True, includes the list of blockchain explorers for the coin.
          Defaults to None.
      community:
        description: If True, includes community metrics related to the coin. Defaults
          to None.
      repo:
        description: If True, includes source code repository stats related to the
          coin. Defaults to None.
      contracts:
        description: If True, includes smart contract and audit details related to
          the coin. Defaults to None.
      news:
        description: If True, includes the latest 5 news stories related to the coin.
          Defaults to None.
      flags:
        description: If True, includes red flags associated with the coin. Defaults
          to None.
      exchanges:
        description: If True, includes the list of exchanges where the coin is traded.
          Defaults to None.
      links:
        description: If True, includes links to social media profiles and project
          websites. Defaults to None.
      tags:
        description: If True, includes tags related to the coin. Defaults to None.
get_taxi_fares:
  name: get_taxi_fares
  description: Calculate taxi fares between two geographical points using the RapidAPI
    taxi fare calculator.
  parameters:
    type: object
    properties:
      arr_lat:
        description: Latitude of the arrival point.
        type: integer
      arr_lng:
        description: Longitude of the arrival point.
        type: integer
      dep_lat:
        description: Latitude of the departure point.
        type: integer
      dep_lng:
        description: Longitude of the departure point.
        type: integer
interior_colors:
  name: interior_colors
  description: Fetches interior color details for a car based on various query parameters.
  parameters:
    type: object
    properties:
      model:
        description: The model of the car.
      name:
        description: The name of the color.
      trim:
        description: The trim level of the car.
      page:
        description: The page number for pagination.
      direction:
        description: The sorting direction, either 'asc' or 'desc'. Default is 'asc'.
      limit:
        description: The maximum number of results to return.
      make_model_trim_id:
        description: The unique ID for make, model, and trim combination.
      year:
        description: The year of the car.
      rgb:
        description: The RGB value of the color.
      sort:
        description: The field to sort by. Default is 'id'.
      verbose:
        description: If 'yes', includes detailed information about make, model, and
          trim. Default is 'yes'.
      json:
        description: A URL encoded JSON array of conditions to filter results.
      make_id:
        description: The ID of the car make.
      make:
        description: The make of the car.
      make_model_id:
        description: The ID for make and model combination.
calculate_grid_coordinate_points:
  name: calculate_grid_coordinate_points
  description: Calculate all grid coordinate points based on a center geocoordinate
    point and distance arguments.
  parameters:
    type: object
    properties:
      radius:
        description: The distance between coordinate points (on the same row/column
          in the grid). The units of the radius are determined by the `radius_units`
          parameter. Allowed values are 0.1-100. Default is 1.
      lng:
        description: Grid center coordinate point longitude value.
      grid_size:
        description: The size of the grid (e.g., 3x3, 5x5, 7x7, etc). Allowed values
          are 3, 5, 7, 9, 11, 13, 15.
      lat:
        description: Grid center coordinate point latitude value.
      radius_units:
        description: Distance measurement units for the radius parameter. Allowed
          values are 'km' for kilometers and 'mi' for miles. Default is 'km'.
sha_text_hash:
  name: sha_text_hash
  description: Hashes the input text using a specified SHA algorithm and returns the
    resulting hash.
  parameters:
    type: object
    properties:
      datastring:
        description: The input text to be hashed.
      mode:
        description: The SHA algorithm to use. Valid values are 1, 256, 384, or 512.
        type: integer
get_lottery_result_by_date:
  name: get_lottery_result_by_date
  description: Fetches the lottery results for the given date using the RapidAPI service.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve the lottery results, formatted
          as 'YYYY-MM-DD'.
get_names:
  name: get_names
  description: Fetch a random list of Indian names based on specified criteria.
  parameters:
    type: object
    properties:
      first:
        description: If True, include first names in the result. Defaults to None.
      gender:
        description: Specify the gender for names ('male' or 'female'). Defaults to
          'male'.
      last:
        description: If True, include last names in the result. Defaults to None.
      number:
        description: The number of names to fetch. Defaults to 5.
image_convert:
  name: image_convert
  description: Convert an image to a specified format and resize it.
  parameters:
    type: object
    properties:
      accept:
        description: The content type to accept in the response (default is 'image/png').
      format:
        description: The format to convert the image to (default is 'jpeg').
      source:
        description: The URL of the source image to be converted.
      height:
        description: The desired height of the converted image (default is 300 pixels).
        type: integer
      width:
        description: The desired width of the converted image (default is 300 pixels).
        type: integer
getcountriesbycontinent:
  name: getcountriesbycontinent
  description: Fetch data about countries in a specified continent from the RapidAPI
    world population service.
  parameters:
    type: object
    properties:
      continent:
        description: The name of the continent for which to fetch countries' data.
      rank:
        description: 'Order in which to rank countries. Can take two values:'
domain_data:
  name: domain_data
  description: Retrieves domain information for a given website using the Website
    Analyze and SEO Audit Pro API.
  parameters:
    type: object
    properties:
      website:
        description: The URL of the website for which to retrieve domain information.
image_generation_endpoint:
  name: image_generation_endpoint
  description: Generates an image using the Bruzu API with the specified width, height,
    and background image URL. The API key for the Toolbench RapidAPI is also required
    to authenticate the request.
  parameters:
    type: object
    properties:
      width:
        description: The width of the generated image. Defaults to 500.
      backgroundimage:
        description: The URL of the background image. Defaults to 'https://source.unsplash.com/500x500/'.
      height:
        description: The height of the generated image. Defaults to 500.
get_streamer_info:
  name: get_streamer_info
  description: Retrieves information about a Twitch streamer using the provided channel
    name.
  parameters:
    type: object
    properties:
      channel:
        description: The name of the Twitch channel for which information is being
          retrieved.
movies_get_upcoming:
  name: movies_get_upcoming
  description: Fetches a list of upcoming movies based on the specified parameters.
  parameters:
    type: object
    properties:
      limit:
        description: The number of items to return, with a maximum of 100. Defaults
          to 100.
      countryid:
        description: The country identifier to filter the upcoming movies list. Defaults
          to 'usa'. Example values include 'afg', 'alb', 'dza', etc.
basic_search:
  name: basic_search
  description: Performs a basic search for movie news articles using the `/news/basic/search`
    endpoint.
  parameters:
    type: object
    properties:
      q:
        description: The query term for the search, typically a keyword related to
          movie news.
      limit:
        description: The maximum number of results to return. Default is 10.
      offset:
        description: The number of results to skip before returning results. Default
          is 0.
strain_type:
  name: strain_type
  description: Fetches a list of results based on the specified strain type from the
    Weed Strain API.
  parameters:
    type: object
    properties:
      straintype:
        description: The type of strain to search for (e.g., Indica, Sativa, Hybrid).
analyze:
  name: analyze
  description: Analyzes the page speed of a given URL using the specified strategy
    and category.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the page to be analyzed.
      strategy:
        description: The strategy to use, either 'desktop' or 'mobile'. Default is
          None.
      category:
        description: The category for which to analyze, options include 'accessibility',
          'best-practices', 'performance', 'seo', and 'pwa'. Default is 'performance'.
fetchdividends:
  name: fetchdividends
  description: Fetches the dividends data for a given ISIN using the RapidAPI service.
  parameters:
    type: object
    properties:
      isin:
        description: The International Securities Identification Number (ISIN) for
          which to fetch dividends data.
getgamelevel:
  name: getgamelevel
  description: Fetches a game level from the Roomtek Music Trivia API.
  parameters:
    type: object
    properties:
      level:
        description: The level to fetch. Defaults to None.
      output:
        description: The output format type, either 'xml' or 'json'. Defaults to None.
get_all_details:
  name: get_all_details
  description: Fetches all details of a YouTube video, stream, or shorts including
    captions, audio-only files, video-only files, and stream URL if available.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique ID of the YouTube video/stream/shorts.
salad_ingredient:
  name: salad_ingredient
  description: Fetches a random salad recipe that includes the specified ingredient
    from the API.
  parameters:
    type: object
    properties:
      ingredient:
        description: The ingredient to be included in the salad recipe search.
get_airline_details:
  name: get_airline_details
  description: Fetch details for an airline based on its IATA code.
  parameters:
    type: object
    properties:
      code:
        description: The IATA code of the airline for which details are to be fetched.
validate:
  name: validate
  description: Validates a given phone number from any country using the RapidAPI
    phone number validation service.
  parameters:
    type: object
    properties:
      number:
        description: The phone number to validate.
      country:
        description: The ISO 3166-1 alpha-2 country code in capital letters. This
          is optional if `number` is in E.164 format. Defaults to 'UY'.
list_of_countries:
  name: list_of_countries
  description: Fetches information about countries where Booking.com offers hotels.
  parameters:
    type: object
    properties:
      country:
        description: The country code for filtering the results. Defaults to None.
v1_randomword:
  name: v1_randomword
  description: Fetches a random word from the API Ninjas Random Word API.
  parameters:
    type: object
    properties: {}
advance:
  name: advance
  description: This function makes a GET request to the cleantalk1.p.rapidapi.com
    service with specified parameters and returns the response.
  parameters:
    type: object
    properties:
      fill_char:
        description: A character to fill within the text.
      text:
        description: The text to be processed.
      add:
        description: Additional text or parameters to be included.
coins_get_overview:
  name: coins_get_overview
  description: Fetches overview information of a specific cryptocurrency pair from
    the RapidAPI cryptocurrency market service.
  parameters:
    type: object
    properties:
      pair_id:
        description: The identifier for the cryptocurrency pair, obtained from endpoints
          like coins/list, coins/search, etc.
        type: integer
      time_utc_offset:
        description: UTC offset in seconds. Defaults to 28800 (UTC+8).
      lang_id:
        description: Language identifier for the response, typically obtained from
          /get-meta-data endpoint. Defaults to 1.
get_php:
  name: get_php
  description: Fetch terminology extraction from a given text in a specified language
    using RapidAPI.
  parameters:
    type: object
    properties:
      text:
        description: The text from which to extract terminology.
      lang:
        description: 'The language code for the text. Currently supported languages:
          en, fr, it.'
get_synthesize:
  name: get_synthesize
  description: Synthesizes the provided text using the Speakeasy API and returns the
    corresponding audio URL or response.
  parameters:
    type: object
    properties:
      text:
        description: The text to be synthesized into speech.
random_credit_card:
  name: random_credit_card
  description: Generates a list of fake credit card details.
  parameters:
    type: object
    properties:
      size:
        description: The number of fake credit card details to generate. Defaults
          to 5.
getcountrybyip:
  name: getcountrybyip
  description: Retrieves the country information for a given IP address using the
    Country by IP API. Both IPv4 and IPv6 are supported.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address for which to retrieve the country information.
pitstop_summary:
  name: pitstop_summary
  description: Retrieves the pitstop summary for a specific race given the year and
    location.
  parameters:
    type: object
    properties:
      year:
        description: The year of the race.
        type: integer
      location:
        description: The location of the race.
entreprise_par_rid:
  name: entreprise_par_rid
  description: Fetches and returns company information from New Caledonia using the
    provided RID.
  parameters:
    type: object
    properties:
      rid:
        description: The RID of the company to look up.
flag_riddle:
  name: flag_riddle
  description: Flags a riddle for further review using the specified criteria.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the riddle to be flagged.
      flag:
        description: The type of flag to be applied to the riddle (default is 0).
retrievepornstar:
  name: retrievepornstar
  description: Retrieve information about a specific pornstar based on the given criteria.
  parameters:
    type: object
    properties:
      is_id:
        description: A unique identifier for the pornstar.
      ethnicity:
        description: The ethnicity of the pornstar.
      min_weight:
        description: The minimum weight of the pornstar.
      max_cup_size:
        description: The maximum cup size of the pornstar.
      nationality:
        description: The nationality of the pornstar.
      min_waist:
        description: The minimum waist size of the pornstar.
      hair:
        description: The hair color of the pornstar.
      max_age:
        description: The maximum age of the pornstar.
      min_age:
        description: The minimum age of the pornstar.
      min_cup_size:
        description: The minimum cup size of the pornstar.
      date_of_birth:
        description: The birth date of the pornstar.
      eyes:
        description: The eye color of the pornstar.
      max_waist:
        description: The maximum waist size of the pornstar.
      name:
        description: The name of the pornstar.
      tattoos:
        description: Whether the pornstar has tattoos.
      max_weight:
        description: The maximum weight of the pornstar.
api_v1_beyblades:
  name: api_v1_beyblades
  description: Fetches a list of Beyblades from the API with optional offset and limit
    parameters.
  parameters:
    type: object
    properties:
      offset:
        description: The number of Beyblades to skip.
      limit:
        description: The maximum number of Beyblades to retrieve.
cci:
  name: cci
  description: Fetches the Commodity Channel Index (CCI) for a given symbol at a specified
    interval from the Twelve Data API.
  parameters:
    type: object
    properties:
      symbol:
        description: The instrument symbol, which can be any equity, index, ETF, forex,
          or cryptocurrency (e.g., `AAPL`, `EUR/USD`, `ETH/BTC`).
      interval:
        description: The interval between two consecutive points in the time series.
          Supported intervals are `1min`, `5min`, `15min`, `30min`, `45min`, `1h`,
          `2h`, `4h`, `1day`, `1week`, and `1month`.
      outputsize:
        description: The number of data points to retrieve. The default is `30`.
      time_period:
        description: The time period for calculating the CCI. The default is `20`.
      format:
        description: The format of the returned data. Accepted values are `csv` or
          `json`. The default is `json`.
keywords:
  name: keywords
  description: Fetches keywords from a given text using the AI Writer API.
  parameters:
    type: object
    properties:
      content_type:
        description: The content type of the text (e.g. 'application/json').
      text:
        description: The text from which to extract keywords.
v1_riddles:
  name: v1_riddles
  description: Retrieves random riddles from the API Ninjas Riddles API endpoint.
  parameters:
    type: object
    properties:
      limit:
        description: The number of riddles to return. Must be between 1 and 20. Defaults
          to None.
get_anime_detail:
  name: get_anime_detail
  description: Fetches detailed information about a specific anime using its ID via
    the RapidAPI service.
  parameters:
    type: object
    properties:
      is_id:
        description: The MyAnimeList ID of the anime.
      fields:
        description: Comma-separated list of specific fields to retrieve data for.
          Available fields include '*', 'id', 'title', 'main_picture', 'start_date',
          'end_data', 'synopsis', 'mean', 'rank', 'popularity', 'num_list_users',
          'num_scoring_users', 'status', 'genres', 'num_episodes', 'source', 'studios',
          'volume', 'chapter', 'light_novel', 'media_type', 'mal_id', 'broadcast',
          'statistics', 'related_manga', 'related_anime', 'season', 'year', 'title_english',
          'title_japanese', and 'synonyms'. Defaults to None.
get_countries_by_sport:
  name: get_countries_by_sport
  description: Fetches and returns a list of countries that support the specified
    sport.
  parameters:
    type: object
    properties:
      sport:
        description: The name or ID of the sport for which to retrieve supporting
          countries.
similar:
  name: similar
  description: Fetches information about companies related to the provided website
    link.
  parameters:
    type: object
    properties:
      link:
        description: The website link to identify related companies. For example,
          'ibm.com'.
      page:
        description: Page number of search results. Default is '0'.
v1_passwordgenerator:
  name: v1_passwordgenerator
  description: Generates a random password string adhering to the specified parameters
    using the API Ninjas Password Generator API.
  parameters:
    type: object
    properties:
      exclude_special_chars:
        description: Whether to exclude special characters (e.g., `!@#$%^&*()`). Defaults
          to None, meaning special characters are included.
      exclude_numbers:
        description: Whether to exclude numbers from the password. Defaults to None,
          meaning numbers are included.
      length:
        description: The length of the generated password. Defaults to 16 if not specified.
get_team_passing_data:
  name: get_team_passing_data
  description: Fetches passing data for NFL teams for a specified year and side (offense
    or defense).
  parameters:
    type: object
    properties:
      year:
        description: The year for which the data is to be fetched. Should be between
          1920 and the current year.
        type: integer
      side:
        description: The year for which the data is to be fetched. Should be between
          1920 and the current year.
retreive_collections:
  name: retreive_collections
  description: Retrieves information about collections, including real-time statistics
    such as floor price.
  parameters:
    type: object
    properties:
      filters:
        description: A JSON string representing the filters to apply when retrieving
          collections. Default is '{"sort":"VOLUME_ONE_DAY","order":"DESC"}'.
location:
  name: location
  description: Retrieves location data utilizing the Location API provided by RapidAPI,
    which supports Google search locations.
  parameters:
    type: object
    properties:
      location_name:
        description: The name of the location to search for.
      country_code:
        description: The country code for the search location, default is 'GB'.
kda_calculator:
  name: kda_calculator
  description: Calculates the Kill/Death/Assist (KDA) ratio for a player by making
    a request to an external API.
  parameters:
    type: object
    properties:
      deaths:
        description: The number of deaths.
        type: integer
      assists:
        description: The number of assists.
        type: integer
      kills:
        description: The number of kills.
        type: integer
evaluate_expression:
  name: evaluate_expression
  description: Evaluates a mathematical expression using an external API and returns
    the result.
  parameters:
    type: object
    properties:
      expression:
        description: The mathematical expression to be evaluated.
schools_list:
  name: schools_list
  description: Fetches a list of schools around a specified geographical location.
  parameters:
    type: object
    properties:
      lat:
        description: The latitude of the geographical location.
        type: integer
      lon:
        description: The longitude of the geographical location.
properties_get_running_costs:
  name: properties_get_running_costs
  description: Fetch the running costs associated with a given property listing from
    Zoopla API.
  parameters:
    type: object
    properties:
      listing_id:
        description: The ID of the property listing returned from the /properties/list
          endpoint.
        type: integer
      category:
        description: The category of the property. Either 'residential' or 'commercial'.
          Default is 'residential'.
      section:
        description: The section of the property. Either 'for-sale' or 'to-rent'.
          Default is 'to-rent'.
time_zone_converter:
  name: time_zone_converter
  description: Converts a given datetime from one time zone to another, taking into
    account Daylight Saving Time (DST).
  parameters:
    type: object
    properties:
      datetime:
        description: The date and time in ISO 8601 format.
      from_tzname:
        description: The source time zone name. Defaults to 'UTC'.
      to_tzname:
        description: The target time zone name. Defaults to 'UTC'.
images_search:
  name: images_search
  description: Searches for images using the Bing Search API, based on the provided
    keyword and optional parameters for size and page number.
  parameters:
    type: object
    properties:
      keyword:
        description: The search term to find related images.
      size:
        description: The size of the images to be retrieved. Default is '30'.
      page:
        description: The page number of the search results to retrieve. Default is
          '0'.
search_shops:
  name: search_shops
  description: Search for shops using a specified keyword.
  parameters:
    type: object
    properties:
      keyword:
        description: The keyword to search for shops.
      lan:
        description: The language of the website to search (default is None). For
          instance, "en" for English or "cn" for Chinese.
      page:
        description: The page number of search results (default is 1).
      pagesize:
        description: The number of results per page (default is 10).
navigations_get_node_content:
  name: navigations_get_node_content
  description: Fetches the content of a node in a navigation hierarchy.
  parameters:
    type: object
    properties:
      is_id:
        description: The 'id' field value returned from the /navigations/get-root
          endpoint.
        type: integer
      cat_id:
        description: The 'cat_id' field value returned from the /navigations/get-tabs
          endpoint.
        type: integer
      language:
        description: The 2-letter language code (default is 'en').
      currency:
        description: The 3-letter currency code (default is 'USD').
      country:
        description: The 2-letter country code (default is 'US').
get_price_by_styleids_and_siteid_zappos_1_6pm_2:
  name: get_price_by_styleids_and_siteid_zappos_1_6pm_2
  description: Fetch the price information for specific style IDs and site ID from
    the Zappos API.
  parameters:
    type: object
    properties:
      siteid:
        description: The site ID for which the price information is requested.
        type: integer
      styleids:
        description: The style IDs for which the price information is requested.
        type: integer
emailverifications:
  name: emailverifications
  description: Verifies a list of email addresses using the Fast Email Verifier API.
  parameters:
    type: object
    properties:
      emailsimple:
        description: Comma-separated list of email addresses to verify. Default is
          'mbavazijoshua@gmail.com,apisolution@gmail.com'.
wikipedia:
  name: wikipedia
  description: This function checks if a given username exists on Wikipedia using
    the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The username to check on Wikipedia.
seasonal_statistics_goals:
  name: seasonal_statistics_goals
  description: Fetches the goal statistics of a specified team in the tournament.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the team for which to retrieve goal statistics.
        type: integer
teams_get_results:
  name: teams_get_results
  description: Retrieve match results for a given team ID from the Unofficial Cricbuzz
    API.
  parameters:
    type: object
    properties:
      teamid:
        description: The unique identifier for the team whose match results are to
          be retrieved.
        type: integer
nhl_team_players:
  name: nhl_team_players
  description: Fetches the roster information for a specific NHL team using the RapidAPI
    endpoint.
  parameters:
    type: object
    properties:
      teamid:
        description: The unique identifier for the NHL team whose roster information
          is to be fetched.
bp_par_localite:
  name: bp_par_localite
  description: Fetches postal boxes by locality in New Caledonia using the provided
    RapidAPI key.
  parameters:
    type: object
    properties:
      localite:
        description: The locality for which to fetch postal boxes. Defaults to 'poum'.
crypto_info:
  name: crypto_info
  description: Fetches detailed information about a cryptocurrency by its slug name.
  parameters:
    type: object
    properties:
      slug:
        description: The unique identifier (slug) for the cryptocurrency.
      lang:
        description: The language code for the response. Defaults to 'en'.
ln:
  name: ln
  description: Returns the natural logarithm (LN) transforms of all data points for
    a given financial instrument using the Twelve Data API.
  parameters:
    type: object
    properties:
      symbol:
        description: The financial instrument symbol, which can be an equity, index,
          ETF, forex, or cryptocurrency (e.g., `AAPL`, `EUR/USD`, `ETH/BTC`, etc.).
      interval:
        description: 'The interval between two consecutive points in the time series.
          Supported intervals: `1min`, `5min`, `15min`, `30min`, `45min`, `1h`, `2h`,
          `4h`, `1day`, `1week`, `1month`.'
      outputsize:
        description: The number of data points to retrieve. The default value is `30`
          when no date parameters are set; otherwise, it is set to the maximum available.
      format:
        description: The output format of the data. Supported values are `CSV` and
          `JSON`. The default value is `JSON`.
      series_type:
        description: The type of data series to retrieve. Supported values are `open`,
          `high`, `low`, and `close`. The default value is `close`.
matchvotes:
  name: matchvotes
  description: Fetches the votes for a specific baseball match using the given match
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the match for which to fetch votes.
        type: integer
consulta_simples_nacional:
  name: consulta_simples_nacional
  description: Queries the Simples Nacional system for information related to a given
    tax ID.
  parameters:
    type: object
    properties:
      taxid:
        description: The tax ID (CNPJ) to be queried.
      maxage:
        description: The maximum age of the data (in days) to be retrieved. Defaults
          to 30.
      history:
        description: Whether to include historical data in the query. Defaults to
          None.
comments:
  name: comments
  description: Retrieves comments for a specified YouTube video using the YouTube
    V3 API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the YouTube video for which to retrieve comments.
      x_cachebypass:
        description: Cache bypass flag; value should be '1' to bypass cache. Defaults
          to None.
      sort_by:
        description: The sorting order of comments. Available options are 'newest'
          or 'top' (default is 'top'). Defaults to None.
      token:
        description: The pagination token for retrieving next set of comments. Defaults
          to None.
generar_fhir_id_qr:
  name: generar_fhir_id_qr
  description: Converts a given FHIR ID into a QR code.
  parameters:
    type: object
    properties:
      fhir_id:
        description: The FHIR ID to be converted into a QR code.
province:
  name: province
  description: Fetches the average price of gas in a specific province in Canada using
    the Canadian Gas Prices API.
  parameters:
    type: object
    properties:
      province:
        description: A valid province name in Canada. Options include Ontario, Quebec,
          Alberta, British Columbia, Manitoba, New Brunswick, Newfoundland and Labrador,
          Nova Scotia, Prince Edward Island, Saskatchewan.
raceresult:
  name: raceresult
  description: Fetches the result for a specific Formula 1 race in a given season.
  parameters:
    type: object
    properties:
      round:
        description: The round number or name of the race in the F1 season.
      year:
        description: The year of the F1 season.
getgamecontent:
  name: getgamecontent
  description: Fetches the content of a specific NHL game using its game ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the game. The first 4 digits identify the season of
          the game (e.g., 2017 for the 2017-2018 season). The next 2 digits indicate
          the type of game (01 = preseason, 02 = regular season, 03 = playoffs, 04
          = all-star). The final 4 digits identify the specific game number. For regular
          season and preseason games, this ranges from 0001 to the number of games
          played. For playoff games, the 2nd digit of the specific number gives the
          round of the playoffs, the 3rd digit specifies the matchup, and the 4th
          digit specifies the game (out of 7).
        type: integer
get_user_media_by_user_id:
  name: get_user_media_by_user_id
  description: Fetches Instagram user media based on the provided user ID using the
    specified RapidAPI key.
  parameters:
    type: object
    properties:
      count:
        description: The number of media posts to retrieve.
        type: integer
      is_id:
        description: The Instagram user ID for which to fetch media.
        type: integer
      end_cursor:
        description: The cursor for pagination to fetch the next set of media posts.
          Defaults to None.
innings_cricket:
  name: innings_cricket
  description: Fetch innings data for a cricket event given the event ID.
  parameters:
    type: object
    properties:
      event_id:
        description: The unique identifier of the cricket event.
        type: integer
inplay:
  name: inplay
  description: Fetches the in-play sports betting data from the RapidAPI service.
  parameters:
    type: object
