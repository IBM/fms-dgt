  description: Returns a list of products for a given product type ID by making a
    request to the National Weather Service API.
  parameters:
    type: object
    properties:
      typeid:
        description: An ID representing a valid product type.
place_details_google:
  name: place_details_google
  description: Fetches contact and opening hours information for a place using its
