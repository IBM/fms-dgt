repos:
  # addlicense: ensures all first-party Python files carry the copyright header
  - repo: https://github.com/google/addlicense
    rev: v1.2.0
    hooks:
      - id: addlicense
        args:
          - "-f"
          - ".addlicense-header.txt"
        exclude: |
          (?x)^(
            fms_dgt/core/blocks/llm/vllm/vllm_serve\.py|
            fms_dgt/core/blocks/validators/rouge\.py
          )$
        types: [python]

  # isort: sorts imports
  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort

  # Black: formats Python code consistently
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black

  # Ruff: lints and fixes minor issues
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        args: [--exit-non-zero-on-fix, --fix, --config=pyproject.toml]

  # Prettier: formats non-Python files
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
