        description: UTC iso8601 formatted datetime of the credentials.
      creds_uuid:
        description: GUID representing the unique user identifier.
      creds_checksum:
        description: Checksum of the credentials for validation.
      socket_id:
        description: Socket in which the item is located.
      catalog_item_id:
        description: Identifier of the catalog item to fetch details for.
      format:
        description: Format of the request, can be either 'rest' or 'restx'.
search_books:
  name: search_books
  description: Search for books by title or author
  parameters:
    type: object
    properties:
      keyword:
        type: string
        description: The keyword to search for in book titles or authors
    required:
    - keyword
shows_id_episodes:
  name: shows_id_episodes
  description: Retrieve a list of episodes for a specific show from the given platform.
  parameters:
    type: object
    properties:
      platform:
        description: The platform from which to retrieve the episodes (e.g., 'ios',
          'android', 'androidtv', 'web').
      is_id:
        description: The ID of the show.
        type: integer
      offset:
        description: The number of records to skip in the results. Default is 0.
      region:
        description: The region to filter the episodes by (e.g., 'US', 'FR'). Default
          is 'US'.
      limit:
        description: The number of records to return per request, with a maximum of
          100. Default is 25.
      sort:
        description: The order to sort the records by. Use 'regular' for default order
          or 'reverse' for most recent episodes first. Default is 'regular'.
      season:
        description: The specific season for which to retrieve episodes. If not specified,
          episodes from all seasons will be retrieved. Default is 1.
get_advisories_by_vendor:
  name: get_advisories_by_vendor
  description: Fetch advisories from CISA.gov for a specified vendor and provide information
    on current security issues, vulnerabilities, and exploits.
  parameters:
    type: object
    properties:
      vendorid:
        description: The vendor ID for which to fetch advisories.
      limit:
        description: The maximum number of advisories to retrieve. Defaults to 2.
      info:
        description: Additional information flag. If set, includes more details in
          the response.
stories_list:
  name: stories_list
  description: Retrieves a list of stories related to a specific sticker using the
    BB Finance API.
  parameters:
    type: object
    properties:
      template:
        description: 'The category of the sticker, which can be one of the following:
          COMMODITY, CURRENCY, INDEX, INDEXFUTURE, RATE, or STOCK.'
      is_id:
        description: The value of the 'id' field returned by the /market/auto-complete
          endpoint.
verse_verse:
  name: verse_verse
  description: Fetches a biblical verse from the Uncovered Treasure API.
  parameters:
    type: object
    properties:
      verse:
        description: A commonly used English name with chapter number and optionally
          verse number (e.g., "1 Corinthians 1", "1 Corinthians 1:5", "James 3").
          Ranged searches are not supported.
      callback:
        description: An optional JSONP callback function name for the API response.
          Default is None.
periodic_table:
  name: periodic_table
  description: python
  parameters:
    type: object
    properties:
      all:
        description: If provided, specifies the type of information to retrieve about
          all elements in the periodic table. Defaults to None.
planet_list:
  name: planet_list
  description: Fetches the list of planets surrounding a given star using the provided
    API key.
  parameters:
    type: object
    properties:
      starid:
        description: The ID of the star for which to fetch the planets. Defaults to
          '4'.
leagueseasoninfo:
  name: leagueseasoninfo
  description: Fetches the season information of a specific Football league from the
    provided API.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The unique ID of the tournament to retrieve the season information
          from.
        type: integer
      seasonid:
        description: The unique ID of the season to retrieve the season information
          from.
        type: integer
getspecialcompetitionview:
  name: getspecialcompetitionview
  description: Fetches the special competition view data from the RapidAPI service.
  parameters:
    type: object
    properties:
      referer:
        description: The referer URL to include in the request headers. Default is
          'https://www.mozzartbet.com.co/es'.
      host:
        description: The host to include in the request headers. Default is 'www.mozzartbet.com.co'.
tax_rate:
  name: tax_rate
  description: Retrieve the tax rate for a given zip code using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      zipcode:
        description: The zip code for which to retrieve the tax rate.
upcoming:
  name: upcoming
  description: Fetches upcoming CS:GO matches data from the specified API endpoint.
  parameters:
    type: object
    properties:
      content_type:
        description: The content type for the request, default is 'application/json'.
      page:
        description: The page number to retrieve, default is 1.
        type: integer
      limit:
        description: The number of matches to retrieve per page, default is 10.
        type: integer
visa_requirements:
  name: visa_requirements
  description: Fetches visa requirements for a given passport and destination using
    the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      passport:
        description: The passport country code.
      destination:
        description: The destination country code.
reverse_search_by_image:
  name: reverse_search_by_image
  description: Perform a reverse image search using a specified image URL and return
    the search results.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the image to search by.
      number:
        description: The maximum number of search results to return. Defaults to 10.
search_image:
  name: search_image
  description: Performs an image search using the Google Search JSON API and returns
    a JSON response containing information about images that match the search query.
  parameters:
    type: object
    properties:
      q:
        description: The search query for finding images.
      num:
        description: Number of search results to return. Valid values are between
          1 and 20, inclusive. Default is 10.
      lr:
        description: Restricts the search to documents written in a particular language.
          Default is 'lang_en'.
      start:
        description: The index of the first result to return. Default is 0.
      gl:
        description: A two-letter country code that boosts search results whose country
          of origin matches the parameter value. Default is 'US'.
g_olocaliser_les_partenaires:
  name: g_olocaliser_les_partenaires
  description: Fetch all partners or partners within a specified radius around a given
    point.
  parameters:
    type: object
    properties:
      nearbydistance:
        description: Radius of the search area in meters. Default is '2000'.
      nearbylon:
        description: Longitude of the center of the search area. Default is '166.448744'.
      nearbylat:
        description: Latitude of the center of the search area. Default is '-22.302828'.
downloadmovie:
  name: downloadmovie
  description: Downloads a movie in the specified format using the given parameters.
  parameters:
    type: object
    properties:
      is_id:
        description: Unique identifier for the movie.
      format:
        description: Format to download the movie in. Supported formats are 'mp4',
          'webm', or 'flv'.
      hq:
        description: If set to True, downloads a higher-quality version of the movie.
          This is only valid for 'mp4' format.
schoolname:
  name: schoolname
  description: Fetches all data from a specific school by its name using the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      name:
        description: The name of the school for which data is to be fetched.
get_quote_of_the_day:
  name: get_quote_of_the_day
  description: Fetches the quote of the day from the World of Quotes API. The quote
    can optionally be filtered by a specific author or category.
  parameters:
    type: object
    properties:
      author:
        description: The author of the quote. Defaults to None.
      category:
        description: The category of the quote, e.g., 'inspirational'. Defaults to
          'inspirational'.
i18nregions:
  name: i18nregions
  description: Fetches a list of content regions supported by the YouTube website.
  parameters:
    type: object
    properties:
      part:
        description: Specifies the i18nRegion resource properties that the API response
          will include. Should be set to 'snippet'.
      hl:
        description: Specifies the language that should be used for text values in
          the API response. Defaults to 'en_US'.
get_details_by_asn_number:
  name: get_details_by_asn_number
  description: Fetch details related to a given Autonomous System Number (ASN) such
    as IP ranges, country, organization, and CIDR.
  parameters:
    type: object
    properties:
      asn_number:
        description: The ASN number for which details need to be retrieved.
        type: integer
tema:
  name: tema
  description: Calculates the Triple Exponential Moving Average (TEMA) for a given
    financial instrument.
  parameters:
    type: object
    properties:
      interval:
        description: 'Interval between two consecutive points in the time series.
          Supports: `1min`, `5min`, `15min`, `30min`, `45min`, `1h`, `2h`, `4h`, `1day`,
          `1week`, `1month`.'
      symbol:
        description: Instrument symbol, can be any equity, index, ETF, forex, or cryptocurrency
          (e.g., `AAPL`, `EUR/USD`, `ETH/BTC`).
      format:
        description: Format of the returned data, either `csv` or `json`. Defaults
          to `json`.
      outputsize:
        description: Number of data points in the result. Default is `30`.
      time_period:
        description: Time period over which the TEMA is calculated. Default is `9`.
      series_type:
        description: 'Type of price data to analyze. Supports: `open`, `high`, `low`,
          `close`. Default is `close`.'
financial_balance_sheet:
  name: financial_balance_sheet
  description: Fetches the balance sheet data of a company identified by the given
    ticker symbol.
  parameters:
    type: object
    properties:
      symbol:
        description: Ticker symbol of the company to retrieve the financial balance
          sheet for.
      formstyle:
        description: Format style of the returned data ('dataframe' or other formats).
          Defaults to 'dataframe'.
      freq:
        description: Frequency of the data ('Q' for quarterly or 'A' for annual).
          Defaults to 'Q'.
fight:
  name: fight
  description: Fetches details of a single fight by its ID using the Spectation Sports
    Events API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the fight to fetch details for.
        type: integer
shopify_store_products:
  name: shopify_store_products
  description: Retrieve all products from a Shopify store using the specified API.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve products from.
        type: integer
      url:
        description: The base URL of the Shopify store.
get_a_specific_item:
  name: get_a_specific_item
  description: Fetches a specific item from the Lost Ark API using the provided item
    name.
  parameters:
    type: object
    properties:
      name:
        description: The name of the item to retrieve from the Lost Ark API.
get_campaign_lead_from_id:
  name: get_campaign_lead_from_id
  description: Retrieve lead information from a campaign using its ID via the Fomo
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the campaign to retrieve the lead information from.
schedule:
  name: schedule
  description: Fetches the schedule information for a given station using the flixbus
    API.
  parameters:
    type: object
    properties:
      station_id:
        description: The ID of the station for which to retrieve the schedule.
        type: integer
posts:
  name: posts
  description: Fetches posts of a creator from the Patreon API using the given parameters.
  parameters:
    type: object
    properties:
      creator_id:
        description: The ID of the creator whose posts are to be fetched.
        type: integer
      cursor:
        description: The cursor for pagination to the next page of results. Defaults
          to None.
      amount:
        description: The number of posts to return. Defaults to 10. Maximum is 500.
get_global_stats:
  name: get_global_stats
  description: Fetches global statistics available on CoinRanking using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      referencecurrencyuuid:
        description: UUID of the reference currency in which all the prices are calculated.
          Defaults to US Dollar UUID 'yhjMzLPhuIDl'.
get_nft_owner:
  name: get_nft_owner
  description: Fetches the owner of a specific ERC-721 NFT using the provided chain
    ID, NFT contract address, and NFT ID.
  parameters:
    type: object
    properties:
      chainid:
        description: The chain ID of the blockchain network on which the NFT resides.
        type: integer
      nftaddress:
        description: The address of the NFT contract.
      nftid:
        description: The unique identifier of the specific NFT.
get_individual_bank:
  name: get_individual_bank
  description: Fetches exchange rates from a specified central bank using a given
    bank ID and API key.
  parameters:
    type: object
    properties:
      bankid:
        description: The identifier for the desired central bank (e.g., 'dkk' for
          Denmark National Bank, 'pln' for National Bank Of Poland, 'eur' for European
          Central Bank, 'usd' for USD base rate by the European Central Bank, 'sek'
          for Swedish Central Bank).
get_brandlist_by_siteid_zappos_1_6pm_2:
  name: get_brandlist_by_siteid_zappos_1_6pm_2
  description: Retrieve the brand list from the Zappos or 6pm websites by site ID
    using the RapidAPI.
  parameters:
    type: object
    properties:
      siteid:
        description: The site ID to fetch the brand list from (1 for Zappos, 2 for
          6pm).
        type: integer
coins_get_historical_data:
  name: coins_get_historical_data
  description: Fetch historical data for a specific cryptocurrency pair from a given
    date range.
  parameters:
    type: object
    properties:
      date_from:
        description: Start date in ddmmyyyy format.
      date_to:
        description: End date in ddmmyyyy format.
      pair_id:
        description: ID of the cryptocurrency pair.
        type: integer
      lang_id:
        description: Language ID as returned by the get-meta-data endpoint. Default
          is 1.
      time_utc_offset:
        description: Time offset from UTC in seconds. Default is 28800 (UTC+8).
      interval:
        description: Interval of the data points. Allowed values are 'day', 'week',
          or 'month'. Default is 'day'.
movies_get_popularity:
  name: movies_get_popularity
  description: Fetches popular movies based on location parameters such as zipcode,
    radius, longitude, and latitude, using the Flixster API.
  parameters:
    type: object
    properties:
      zipcode:
        description: The postal code of the area to search in. Defaults to '90002'.
      radius:
        description: The radius (in miles) around the given zipcode to include in
          the search. Defaults to 50.
      longitude:
        description: The geographical longitude to search movies around. Defaults
          to None.
      latitude:
        description: The geographical latitude to search movies around. Defaults to
          None.
jokes:
  name: jokes
  description: Fetches jokes from the Jokester API, optionally filtered by category.
  parameters:
    type: object
    properties:
      category:
        description: Category to filter jokes by. Defaults to None.
get_movie_id_by_title:
  name: get_movie_id_by_title
  description: Retrieves the ID of a movie or actor by its title using the Cinema
    API.
  parameters:
    type: object
    properties:
      category:
        description: Category of the search, either 'movies' or 'actors'.
      title:
        description: The title of the movie or the name of the actor to search for.
cities_in_a_state:
  name: cities_in_a_state
  description: Fetches the list of cities in a given state.
  parameters:
    type: object
    properties:
      statecode:
        description: The code of the state for which the cities are to be fetched.
      countrycode:
        description: The code of the country where the state is located.
us_license_plate_to_vin:
  name: us_license_plate_to_vin
  description: Converts a U.S. state license plate number to a Vehicle Identification
    Number (VIN).
  parameters:
    type: object
    properties:
      state_code:
        description: A two-letter U.S. state code where the license plate is registered.
          Examples include 'CA' for California, 'NY' for New York, etc.
      license_plate:
        description: The license plate number for which to find the VIN.
codes:
  name: codes
  description: This function searches for information based on the provided code using
    the Postali API.
  parameters:
    type: object
    properties:
      code:
        description: The code to be searched.
show_character:
  name: show_character
  description: Fetch details about a character and their traits from the Marvel vs.
    Capcom 2 API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the character to retrieve information about.
fetch_latest:
  name: fetch_latest
  description: Fetch the latest updated manga from the server based on specified genres
    and page number.
  parameters:
    type: object
    properties:
      genres:
        description: A comma-separated list of genres to filter the manga by (e.g.,
          'Harem,Fantasy'). Defaults to 'Harem,Fantasy'.
      page:
        description: The page number to fetch, starting from '1'. Defaults to '1'.
list_comments:
  name: list_comments
  description: Fetches comments for the specified TikTok post using the given parameters.
  parameters:
    type: object
    properties:
      aweme_id:
        description: The ID of the TikTok post for which to retrieve comments.
      count:
        description: The number of comments to retrieve. Defaults to 10.
      cursor:
        description: The position from where to start retrieving comments. Defaults
          to 0.
      proxy:
        description: The proxy server to use for the request. Defaults to None.
v1_latest_headlines:
  name: v1_latest_headlines
  description: Fetches the latest 100 headlines based on specified language, topic,
    and/or country, and optionally includes media information.
  parameters:
    type: object
    properties:
      lang:
        description: Specifies the language of the search. Allowed values include
          'af', 'ar', 'bg', 'bn', 'ca', 'cn', 'cs', 'cy', 'da', 'de', 'el', 'en',
          'es', 'et', 'fa', 'fi', 'fr', 'gu', 'he', 'hi', 'hr', 'hu', 'id', 'it',
          'ja', 'kn', 'ko', 'lt', 'lv', 'mk', 'ml', 'mr', 'ne', 'nl', 'no', 'pa',
          'pl', 'pt', 'ro', 'ru', 'sk', 'sl', 'so', 'sq', 'sv', 'sw', 'ta', 'te',
          'th', 'tl', 'tr', 'tw', 'uk', 'ur', 'vi'. Defaults to 'en'.
      topic:
        description: The topic to which you want to restrict the articles. Accepted
          values are 'news', 'sport', 'tech', 'world', 'finance', 'politics', 'business',
          'economics', 'entertainment', 'beauty', 'travel', 'music', 'food', 'science'.
          This parameter is experimental and not all articles may have a topic assigned.
      country:
        description: The country to which you want to narrow your search, specified
          using ISO 3166-1 alpha-2 codes. This parameter is experimental and is best
          used in conjunction with the 'lang' parameter.
      media:
        description: If set to 'True', adds additional media information to the output,
          including the main image and a comma-separated string of all images used
          in an article. Defaults to 'True'.
teams_get_transfers:
  name: teams_get_transfers
  description: Fetches the transfer details for a specific team using the provided
    team ID.
  parameters:
    type: object
    properties:
      teamid:
        description: The ID of the team for which transfer details are to be fetched.
        type: integer
single_cat_breed:
  name: single_cat_breed
  description: Fetches details of a single cat breed using the provided breed ID from
    the Cat Breed Database API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the cat breed to fetch details for.
        type: integer
profile_stories:
  name: profile_stories
  description: Fetch the Instagram stories for a specific profile using the provided
    RapidAPI key.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to fetch stories. Defaults to
          'kimkardashian'.
alerts:
  name: alerts
  description: Fetches severe weather alerts for a specified location using GPS coordinates
    or place ID.
  parameters:
    type: object
    properties:
      place_id:
        description: Identifier of a place obtained from the 'Location' endpoints.
          If provided, it takes precedence over lat and lon.
      lat:
        description: Latitude of the location, with defaults to '45.74846'. This can
          be in formats like 12N, 12.3N, -13.4. Ignored if place_id is provided.
      lon:
        description: Longitude of the location, with defaults to '4.84671'. This can
          be in formats like 12E, 12.3E, -13.4. Ignored if place_id is provided.
      language:
        description: 'Language of text summaries. Supported languages are:'
      timezone:
        description: Timezone for date fields in the response. Default is 'auto',
          which uses the local timezone of the location. Format follows the tzinfo
          database (e.g., 'Europe/Prague', 'UTC').
address_reverse_geocoding:
  name: address_reverse_geocoding
  description: Reverse geocoding to obtain address information for given coordinates.
  parameters:
    type: object
    properties:
      coord:
        description: Latitude and longitude coordinates in a comma-separated format.
      datum:
        description: Geodetic system of the latitude and longitude coordinates.
      coord_unit:
        description: Unit of the latitude and longitude coordinates.
vehicle_market_value_by_vin:
  name: vehicle_market_value_by_vin
  description: Fetches the market value of a vehicle based on its VIN (Vehicle Identification
    Number) using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      vin:
        description: The vehicle identification number to query.
      mileage:
        description: The current mileage of the vehicle. If not specified, the average
          mileage is used. Default is None.
      period:
        description: Number of days to look back for sales data, with a maximum value
          of 365 days. Default is None.
stock_quote_price:
  name: stock_quote_price
  description: Fetches the real-time stock price for a given stock symbol using the
    Financial Modeling Prep API.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which to fetch the real-time price.
      apikey:
        description: The API key for authenticating with the Financial Modeling Prep
          API. Default is 'rapidapi'.
stock_get_stat:
  name: stock_get_stat
  description: Retrieves stock statistics for a given ticker ID from the Webull API.
  parameters:
    type: object
    properties:
      tickerid:
        description: The value of the ticker ID to fetch statistics for. This ID can
          be obtained from other endpoints such as /stock/search or /market/get-common-ranking.
        type: integer
search_by_name:
  name: search_by_name
  description: Searches for a movie by its title using the provided query string.
  parameters:
    type: object
    properties:
      query:
        description: The movie title or keyword to search for.
      page:
        description: The page number of results to retrieve. Defaults to 1.
top_paid_ipad_apps:
  name: top_paid_ipad_apps
  description: Gets a list of the top paid iPad apps from the specified category and
    country.
  parameters:
    type: object
    properties:
      category:
        description: The App Store category for which to fetch the top paid iPad apps.
          Defaults to '6016'.
      country:
        description: The country code for which to fetch the top paid iPad apps. Defaults
          to 'us'.
      lang:
        description: The language code for the response. Defaults to 'en'.
      num:
        description: The number of results to return. Defaults to 100.
crimes_at_location:
  name: crimes_at_location
  description: Retrieves the crimes that occurred at the specified location on a given
    date.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to retrieve crime data in 'YYYY-MM-DD' format.
      lat:
        description: The latitude of the location.
      lng:
        description: The longitude of the location.
market_get_price_chart:
  name: market_get_price_chart
  description: Fetches data to draw a price chart based on the given interval and
    market ID.
  parameters:
    type: object
    properties:
      interval:
        description: 'The time interval for the price chart. Options include: ''d1'',
          ''d3'', ''ytd'', ''m1'', ''m3'', ''m6'', ''y1'', ''y5''.'
      is_id:
        description: The ID value obtained from the '/market/auto-complete' endpoint.
streams_investor_relations:
  name: streams_investor_relations
  description: Fetches the most recent messages posted by verified Investor Relations
    customers from the StockTwits API.
  parameters:
    type: object
    properties:
      since:
        description: Returns results with an ID greater than (more recent than) the
          specified ID.
      max:
        description: Returns results with an ID less than (older than) or equal to
          the specified ID.
      limit:
        description: The number of results to return, default and max limit is 30.
          This limit must be a number under 30. Defaults to '20'.
      callback:
        description: Defines your own callback function name for JSONP support, add
          this parameter as the value. Defaults to None.
getmaptilewithenglishlabels:
  name: getmaptilewithenglishlabels
  description: Retrieves a raster map tile with English labels from the MapTiles API.
  parameters:
    type: object
    properties:
      x:
        description: X-coordinate of the tile.
        type: integer
      z:
        description: Zoom level (ranging from 0 to 19).
        type: integer
      y:
        description: Y-coordinate of the tile.
        type: integer
chapters_list_paginated:
  name: chapters_list_paginated
  description: Fetches a paginated list of chapters for a specific webtoon from a
    specified provider.
  parameters:
    type: object
    properties:
      provider:
        description: The slug identifying the webtoon provider. Refer to /providers
          for the list of providers.
      webtoon:
        description: The slug identifying the webtoon. Refer to /webtoons for the
          list of webtoons.
      limit:
        description: The number of results to return per page, between 1 and 20.
        type: integer
      page:
        description: The page number to fetch.
        type: integer
tournamentrnkingsummary:
  name: tournamentrnkingsummary
  description: Fetches the ranking summary for a specified tournament from the MMA
    API.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The unique identifier for the tournament whose ranking summary
          is to be retrieved.
        type: integer
player_events:
  name: player_events
  description: Fetch events for a specified player by their player ID.
  parameters:
    type: object
    properties:
      player_id:
        description: The ID of the player for whom to fetch events.
        type: integer
      page:
        description: The page number of events to fetch.
        type: integer
      course_events:
        description: Additional event details or filters to be applied.
search_airport:
  name: search_airport
  description: Searches for an airport based on the provided query using the TripAdvisor
    API.
  parameters:
    type: object
    properties:
      query:
        description: Name of the location where the airport is situated.
titles_id:
  name: titles_id
  description: Fetches movie title details from the Movies Database API using the
    given IMDb ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The IMDb ID of the movie title (e.g., 'tt0000002').
      info:
        description: 'The type of information to retrieve (default: base-info). Options
          include ''base_info'', ''mini_info'', ''image'', etc.'
new_arrivals:
  name: new_arrivals
  description: Fetch the latest arrivals from different platforms for a specified
    region.
  parameters:
    type: object
    properties:
      region:
        description: The region code to fetch the latest arrivals from. Use 'IN' for
          India and 'US' for the USA. Currently, only these two regions are supported.
      page:
        description: The page number for paginated results. Defaults to 1.
actors_random:
  name: actors_random
  description: Fetches a random list of actors from the Movies Database RapidAPI.
  parameters:
    type: object
    properties:
      limit:
        description: The number of random actors to retrieve. Defaults to None, and
          the API will use its default value if not specified.
artist_details_single:
  name: artist_details_single
  description: Fetch details of a single Spotify artist using the artist's ID.
  parameters:
    type: object
    properties:
      artist_id:
        description: The Spotify ID of the artist whose details are to be fetched.
temp_upload_urls:
  name: temp_upload_urls
  description: Generates temporary upload URLs for a given video on a specific account
    using the provided source name.
  parameters:
    type: object
    properties:
      source_name:
        description: The name of the source.
      video_id:
        description: The unique identifier for the video.
      account_id:
        description: The unique identifier for the account.
get_1_autocomplete:
  name: get_1_autocomplete
  description: Fetch autocomplete suggestions for a given stock ticker or company
    name using the RapidAPI Stock Exchange service.
  parameters:
    type: object
    properties:
      keyword:
        description: The stock ticker or company name to search for. Defaults to 'GOOG'.
getmaptilewithspanishlabels:
  name: getmaptilewithspanishlabels
  description: Downloads a raster map tile with Spanish labels from MapTiles API.
  parameters:
    type: object
    properties:
      z:
        description: Zoom level, ranging from 0 to 19.
        type: integer
      x:
        description: X-coordinate of the tile.
        type: integer
      y:
        description: Y-coordinate of the tile.
        type: integer
get_a_specific_quote:
  name: get_a_specific_quote
  description: Fetches a specific quote using the provided quote ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the quote to fetch.
get_movies_by_year:
  name: get_movies_by_year
  description: Fetches a list of movies released in a specified year from the IMDb
    API.
  parameters:
    type: object
    properties:
      movie_year:
        description: The year to filter movies by. Defaults to None.
get_movies_by_name:
  name: get_movies_by_name
  description: python
  parameters:
    type: object
    properties:
      movie_name:
        description: The name of the movie to search for. Defaults to None.
companies_id_jobs:
  name: companies_id_jobs
  description: Retrieves the latest job postings for a given company identifier since
    a specified timestamp.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the company.
      since:
        description: A timestamp to filter job postings. Defaults to '2017-01-01'.
      size:
        description: The maximum number of job postings to return. Defaults to 100.
vehicles_models:
  name: vehicles_models
  description: Fetches a list of vehicle models for a specified vehicle make using
    the Carbonsutra API.
  parameters:
    type: object
    properties:
      vehicle_make:
        description: The make of the vehicle to retrieve models for.
get_specific_dessert:
  name: get_specific_dessert
  description: Fetch a specific dessert's details using its ID from the Pizza and
    Desserts API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the dessert to fetch.
        type: integer
search_keto_recipe:
  name: search_keto_recipe
  description: Search for keto recipes based on a given search term using the Keto
    Diet API.
  parameters:
    type: object
    properties:
      search:
        description: The search term to find keto recipes.
get_word_by_length:
  name: get_word_by_length
  description: Fetches a random word of the specified length using the Random Word
    API.
  parameters:
    type: object
    properties:
      length:
        description: The desired length of the random word.
        type: integer
get_exchange_rate:
  name: get_exchange_rate
  description: Fetches the exchange rate between two currency codes using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      to:
        description: The target currency code for which you want to get the exchange
          rate.
      is_from:
        description: The base currency code from which you are converting.
alerts_and_jams:
  name: alerts_and_jams
  description: Fetch real-time alerts and traffic jams from Waze in a specified geographic
    rectangular area.
  parameters:
    type: object
    properties:
      top_right:
        description: Latitude, longitude pair defining the top-right corner of the
          geographic area.
      bottom_left:
        description: Latitude, longitude pair defining the bottom-left corner of the
          geographic area.
      max_alerts:
        description: Maximum number of alerts to fetch. Defaults to 20. Set to 0 to
          avoid fetching alerts.
      max_jams:
        description: Maximum number of traffic jams to fetch. Defaults to 20. Set
          to 0 to avoid fetching traffic jams.
bet365_prematch_odds:
  name: bet365_prematch_odds
  description: Fetches prematch odds from the Bet365 API using the provided fixture
    ID.
  parameters:
    type: object
    properties:
      fi:
        description: Fixture ID for which to fetch the prematch odds.
        type: integer
matchstatistics:
  name: matchstatistics
  description: Returns statistics for a specific ice hockey match, including player
    statistics and other relevant data.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the match for which you want to retrieve statistics.
        type: integer
local_osm_v1_z_x_y_png:
  name: local_osm_v1_z_x_y_png
  description: Downloads an OpenStreetMap standard tile image for specified coordinates
    and zoom level.
  parameters:
    type: object
    properties:
      y:
        description: y tile number.
        type: integer
      z:
        description: Zoom factor between 0 and 19.
        type: integer
      x:
        description: x tile number.
        type: integer
tokens_all_market_cap:
  name: tokens_all_market_cap
  description: Fetches market capitalization data for tokens with optional filtering.
  parameters:
    type: object
    properties:
      sortfield:
        description: The specific field to sort by.
      sorttype:
        description: The type of sorting to apply (e.g., 'asc' for ascending, 'desc'
          for descending).
      stableonly:
        description: Whether to return only stablecoins.
      skip:
        description: The number of records to skip for pagination.
      searchterms:
        description: Specific search terms to filter tokens.
      take:
        description: The number of records to take for pagination.
      chains:
        description: Comma-separated list of specific blockchains to filter the tokens
          by.
movie_details:
  name: movie_details
  description: Returns detailed information about a specific movie from the YTS API,
    including optional data such as cast information and images.
  parameters:
    type: object
    properties:
      movie_id:
        description: The YTS ID of the movie. Defaults to 10.
      imdb_id:
        description: The IMDB ID of the movie in YTS. Defaults to 10.
      with_cast:
        description: If set to True, includes additional information about the movie's
          cast in the response. Defaults to None.
      with_images:
        description: If set to True, includes URLs of related images in the response.
          Defaults to None.
list_all_countries:
  name: list_all_countries
  description: Fetches information about a country using its ISO 3166-1 alpha-2 code
    from the World Bank API via RapidAPI.
  parameters:
    type: object
    properties:
      iso2code:
        description: ISO 3166-1 alpha-2 code of the country for which information
          is to be fetched.
city_list:
  name: city_list
  description: Fetches a list of valid cities for a given province using the Canadian
    Gas Prices API.
  parameters:
    type: object
    properties:
      province:
        description: The name of the province for which to fetch the list of cities.
get_beers_by_single_country:
  name: get_beers_by_single_country
  description: Fetches the details of a beer from a specified country using the given
    beer identifier.
  parameters:
    type: object
    properties:
      beerid:
        description: The identifier of the beer to fetch details for.
more_from_author:
  name: more_from_author
  description: Fetches more recipes from a specified author using the Worldwide Recipes
    API.
  parameters:
    type: object
    properties:
      profile_display_name:
        description: The display name of the author's profile to retrieve recipes
          from.
      canonical_term:
        description: The search term or keyword related to the author's recipes.
food_api:
  name: food_api
  description: Fetches food information based on the given name.
  parameters:
    type: object
    properties:
      name:
        description: The name of the food item for which information is being retrieved.
      lang:
        description: The language code for the search query. Defaults to 'pl'. Supported
          languages are "en", "ru", "pl", "bg", "de", "es", "ua", and "by".
business_units_search_by_domain:
  name: business_units_search_by_domain
  description: Searches for a business unit by its domain name using the Unofficial
    Trust Pilot API.
  parameters:
    type: object
    properties:
      name:
        description: The domain name to search for.
get_gas_price:
  name: get_gas_price
  description: Retrieves the best estimate for the gas price to use in a transaction
    on a specified blockchain network.
  parameters:
    type: object
    properties:
      chainid:
        description: The ID of the blockchain network to retrieve the gas price estimate
          for.
        type: integer
airport_info:
  name: airport_info
  description: Fetches and returns detailed information about an airport using its
    IATA code from the Airports Info API.
  parameters:
    type: object
    properties:
      iata:
        description: The IATA code of the airport for which information is being requested.
company_income_statement:
  name: company_income_statement
  description: Fetch the income statement of a public company for a given period and
    in a specified language.
  parameters:
    type: object
    properties:
      symbol:
        description: 'The stock symbol (ticker) of the company for which to fetch
          the income statement. Examples: ''MSFT:NASDAQ'', ''MSFT'', ''AAPL''.'
      period:
        description: The period for which to retrieve the income statement. Options
          are 'QUARTERLY' or 'ANNUAL'.
      language:
        description: The language to use for the results, specified as a two-letter
          language code as per ISO 639-1. Default is 'en'.
streams_user:
  name: streams_user
  description: Fetches and returns the most recent messages for a specified user from
    the StockTwits API.
  parameters:
    type: object
    properties:
      is_id:
        description: User ID or username of the stream's user you want to show.
      since:
        description: Returns results with an ID greater than (more recent than) the
          specified ID.
      max:
        description: Returns results with an ID less than (older than) or equal to
          the specified ID.
      limit:
        description: The number of messages to return. This limit must be a number
          under 30. Default and max limit is 30.
      callback:
        description: Define your own callback function name, add this parameter as
          the value.
      filter:
        description: Filter messages by links, charts, or videos.
ultosc:
  name: ultosc
  description: Fetches the Ultimate Oscillator (ULTOSC) data for a given financial
    instrument using the Twelve Data API. The Ultimate Oscillator takes into account
    three different time periods to enhance the quality of overbought and oversold
    signals.
  parameters:
    type: object
    properties:
      symbol:
        description: Instrument symbol, can be any equity, index, ETF, forex, or cryptocurrency
          (e.g., 'AAPL', 'EUR/USD', 'ETH/BTC').
      interval:
        description: Interval between two consecutive points in the time series. Supported
          values are '1min', '5min', '15min', '30min', '45min', '1h', '2h', '4h',
          '1day', '1week', and '1month'.
      time_period_1:
        description: First time period for the oscillator calculation. Defaults to
          7.
      time_period_2:
        description: Second time period for the oscillator calculation. Defaults to
          14.
      format:
        description: Output format, either 'CSV' or 'JSON'. Defaults to 'json'.
      time_period_3:
        description: Third time period for the oscillator calculation. Defaults to
          28.
      outputsize:
        description: Number of data points to return. Defaults to 30.
application_details_by_id:
  name: application_details_by_id
  description: Retrieves application details from the RapidAPI by application ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The application ID to fetch details for.
      country:
        description: The country code to filter results. Defaults to 'us'.
      lang:
        description: The language code to filter results. Defaults to 'en'.
canvas_titles_get_recommend:
  name: canvas_titles_get_recommend
  description: Retrieves similar comic recommendations from the Webtoon API.
  parameters:
    type: object
    properties:
      titleno:
        description: The value of the `titleNo` field returned from the `/canvas/titles/list`,
          `/canvas/search`, or `/canvas/home` endpoint.
        type: integer
      language:
        description: 'The language code for the response. One of the following: ''en'',
          ''zh-hant'', ''de'', ''fr'', ''es'', ''th'', ''id''. Defaults to ''en''.'
get_videos_by_channel:
  name: get_videos_by_channel
  description: Fetches the last 30 videos from a specified YouTube channel using the
    Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      cid:
        description: The channel ID of the YouTube channel.
provider2_live_match_id:
  name: provider2_live_match_id
  description: Fetches live match details from the provider2 API for a given match
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The match ID for which to fetch the live details.
validate_a_token:
  name: validate_a_token
  description: Validates a token or a link ID to check if it is valid.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier for either a token or a link.
      t:
        description: The actual token or link to validate.
domain_name:
  name: domain_name
  description: Retrieves WHOIS details for the given domain name using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      domain_name:
        description: The domain name for which to retrieve the WHOIS details.
getpeoplebytopic:
  name: getpeoplebytopic
  description: Fetches Azure influencers by topic from the specified page using the
    RapidAPI key.
  parameters:
    type: object
    properties:
      topic:
        description: The topic to search for Azure influencers.
      page:
        description: The page number of search results to retrieve.
        type: integer
domainsearch:
  name: domainsearch
  description: Searches for email addresses associated with a given domain, optionally
    filtered by department and paginated by page number.
  parameters:
    type: object
    properties:
      domain:
        description: Domain name from which you want to find the email addresses.
          For example, 'stripe.com'.
      department:
        description: Get only email addresses for people working in the selected department.
          Default is 'pr'.
      page:
        description: Specifies the number of email addresses to skip by page number.
          Default is 1.
get_trivia_fact:
  name: get_trivia_fact
  description: Fetches a trivia fact about a given number from the Numbers API.
  parameters:
    type: object
    properties:
      number:
        description: The number for which to retrieve the trivia fact.
      fragment:
        description: Whether to return the fact as a sentence fragment. Defaults to
          'True'.
      notfound:
        description: Determines the behavior when a fact is not found for the specified
          number. Options are 'default', 'floor', or 'ceil'. Defaults to 'floor'.
      json:
        description: Whether to return the result as JSON. Defaults to 'True'.
tokenize:
  name: tokenize
  description: Tokenizes a given value by making a request to the Tokenizer API endpoint.
    The value must adhere to specific character restrictions and size limits.
  parameters:
    type: object
    properties:
      value:
        description: 'The text to be tokenized. The value must be 1KB or smaller and
          must not include any of the following characters: forward slash (/), backslash
          (\), number sign (#), question mark (?), or control characters ranging from
          U+0000 to U+001F (including horizontal tab, linefeed, and carriage return),
          and from U+007F to U+009F.'
brands_detail:
  name: brands_detail
  description: Fetch detailed information about a brand using the provided brand ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the brand to fetch details for. This value should be
          obtained from the brands `id` field returned in the `/search` endpoint or
          the `brandId` field returned in the `/products/list` or `/products/detail`
          endpoints.
        type: integer
ideal_body_weight:
  name: ideal_body_weight
  description: Calculates the ideal body weight based on height, body frame size,
    gender, and optional formula.
  parameters:
    type: object
    properties:
      body_frame:
        description: 'The body frame size of the person. It can be one of the following
          values: "small", "medium", or "large".'
      height:
        description: The height in centimeters (cm) of the person.
        type: integer
      gender:
        description: The gender of the person. It can be either "male" or "female".
      formula:
        description: The formula for ideal weight estimation. It can be either "hamwi"
          (default) or "devine".
bmi_imperial:
  name: bmi_imperial
  description: Calculates the Body Mass Index (BMI) based on the provided height and
    weight parameters in imperial units (inches and pounds).
  parameters:
    type: object
    properties:
      height:
        description: The height in inches.
        type: integer
      weight:
        description: The weight in pounds.
        type: integer
daily_water_intake:
  name: daily_water_intake
  description: Calculates the daily recommended water intake based on factors such
    as weight, activity level, and climate.
  parameters:
    type: object
    properties:
      weight:
        description: The weight of the individual in kilograms (kg).
        type: integer
      activity_level:
        description: 'The activity level of the individual. Acceptable values are:'
      climate:
        description: 'The climate in which the individual is located. Acceptable values
          are:'
      unit:
        description: The unit of measurement for the water intake. Default is 'liters',
          specify 'ounces' to get the result in ounces.
aircraft_scatter_data:
  name: aircraft_scatter_data
  description: Fetch aircraft data above 10,000 feet within 1000 kilometers from the
    specified latitude and longitude.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude coordinate for the center point of the search radius.
        type: integer
      lon:
        description: Longitude coordinate for the center point of the search radius.
        type: integer
treeequivalent:
  name: treeequivalent
  description: Calculate the number of trees required to create a given weight of
    paper.
  parameters:
    type: object
    properties:
      weight:
        description: The weight of the paper.
      unit:
        description: The unit of measurement for the weight (e.g., 'kg' or 'lb').
get_verses:
  name: get_verses
  description: Fetches a specific verse or a range of verses from the Bible in one
    of 8 text formats based on the given parameters.
  parameters:
    type: object
    properties:
      text_mode:
        description: The text format to return the verse in.
      book_name:
        description: The name of the book of the Bible.
      uppercase_mode:
        description: Whether to return the verse in uppercase. Defaults to None.
      verse_num2:
        description: The ending verse number. Defaults to 5.
      verse_num1:
        description: The starting verse number. Defaults to 1.
      chapter:
        description: The chapter number of the book. Defaults to 1.
v1_loremipsum:
  name: v1_loremipsum
  description: Fetches lorem ipsum placeholder text from the API Ninjas Lorem Ipsum
    API.
  parameters:
    type: object
    properties:
      max_length:
        description: Maximum character length for the returned text.
      start_with_lorem_ipsum:
        description: Whether to begin the text with "Lorem ipsum". Accepts 'true'
          or 'false'. Defaults to 'true' if unset.
      random:
        description: Whether to randomly generate paragraphs. Accepts 'true' or 'false'.
          Defaults to 'true' if unset.
      paragraphs:
        description: Number of paragraphs to generate. Defaults to 1 if unset.
user_by_username:
  name: user_by_username
  description: Fetches user data from Instagram using a given username via the Toolbench
    RapidAPI.
  parameters:
    type: object
    properties:
      username:
        description: The Instagram username for which to fetch user data.
get_highlight_item:
  name: get_highlight_item
  description: Fetch the highlight item from Instagram using the toolbench RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: The Instagram ID for which to fetch the highlight items.
video_comment_replies:
  name: video_comment_replies
  description: Fetches the replies to a specific comment on a TikTok video using the
    provided API key.
  parameters:
    type: object
    properties:
      comment_id:
        description: The ID of the comment for which to retrieve replies.
      video_id:
        description: The ID of the video containing the comment.
      cursor:
        description: Cursor for pagination to fetch additional replies. Defaults to
          None.
review_filters_list:
  name: review_filters_list
  description: Fetch supported options metadata for filtering hotel reviews.
  parameters:
    type: object
    properties:
      hotel_id:
        description: The unique identifier of the hotel from the properties list API.
        type: integer
      languagecode:
        description: The language code for the response. Default is 'en-us'.
      filter_language:
        description: Comma-separated values of languages for filtering reviews. Default
          is 'en,nl'.
      filter_customer_type:
        description: Comma-separated values of customer types to filter by. Default
          is 'couple,family_with_children'.
      user_sort:
        description: Sorting preference for results. Default is 'sort_most_relevant'.
get_user_playlists:
  name: get_user_playlists
  description: Retrieve a list of playlists for a given user from the YouTube Music
    API.
  parameters:
    type: object
    properties:
      params:
        description: Pagination or filter parameters to customize the playlists retrieval.
      user_id:
        description: The unique identifier of the user whose playlists are to be retrieved.
qr_code_image_copy:
  name: qr_code_image_copy
  description: Generates a QR code image from the given URL using the QR Code API.
  parameters:
    type: object
    properties:
      url:
        description: The URL to be encoded as a QR code.
stock_get_yearly_high:
  name: stock_get_yearly_high
  description: Fetch the yearly high stock price for a given ticker symbol from the
    specified region using the RapidAPI service.
  parameters:
    type: object
    properties:
      symbol:
        description: The ticker symbol of the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: The region in which the stock is listed. Defaults to 'US'. Valid
          options include 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES',
          'GB', and 'S'.
get_a_random_color:
  name: get_a_random_color
  description: Fetches a random color or a specified number of random colors from
    the sRGB color space using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      quantity:
        description: The number of colors to return. The maximum is 50. Defaults to
          2. Values greater than 50 will default to 50, and values less than 1 will
          result in an empty array.
playlist:
  name: playlist
  description: Fetch details and videos of a YouTube playlist using the provided playlist
    ID and optional parameters.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the YouTube playlist.
      x_cachebypass:
        description: The cache bypass value. Default is None.
      token:
        description: Pagination token for retrieving additional results. Default is
          None.
teamlastmatches:
  name: teamlastmatches
  description: Fetch the last matches for a specified cricket team using the RapidAPI
    cricket API.
  parameters:
    type: object
    properties:
      page:
        description: The page number (starting from 0) of the last matches you want
          to retrieve.
        type: integer
      is_id:
        description: The ID of the cricket team for which you want to retrieve the
          last matches.
        type: integer
domain_reputation:
  name: domain_reputation
  description: Evaluate the reputation of a given domain using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      domainname:
        description: The domain name to be evaluated.
      outputformat:
        description: The response output format. Acceptable values are 'XML' or 'JSON'.
          Defaults to 'JSON'.
      mode:
        description: The mode for the API check. Acceptable values are 'fast' (some
          heavy tests and data collectors will be disabled) or 'full' (all data and
          tests will be processed). Defaults to 'fast'.
order_by_ascending:
  name: order_by_ascending
  description: Fetches a list of all cats sorted in ascending order by a specified
    attribute.
  parameters:
    type: object
    properties:
      ordering:
        description: The attribute by which to order the list of cats, e.g., 'name'.
name_to_uuid:
  name: name_to_uuid
  description: Convert a Minecraft username to a UUID using the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      name:
        description: The Minecraft username to be converted to a UUID.
advance_profile:
  name: advance_profile
  description: Retrieves an advanced profile from Instagram, optionally with email
    or phone if available.
  parameters:
    type: object
    properties:
      ig:
        description: The Instagram handle of the user whose profile is to be retrieved.
      response_type:
        description: Specifies the type of response desired.
      corsenabled:
        description: Specifies if CORS is enabled. Default is 'false'.
tweet_details:
  name: tweet_details
  description: Fetch details and comments for a specific tweet using its tweet ID.
  parameters:
    type: object
    properties:
      tweetid:
        description: The ID of the tweet for which details and comments are to be
          fetched.
      cursor:
        description: A cursor for paginating through comments. Use the value obtained
          from the previous response to fetch the next page. Defaults to None.
      count:
        description: The number of comments to fetch. Defaults to '20'.
trending_gifs:
  name: trending_gifs
  description: Fetch currently trending GIFs from Giphy.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of results to return. Defaults to 25 if not
          specified.
      rating:
        description: Restricts results to the specified rating (y, g, pg, pg-13, or
          r).
user_post_videos:
  name: user_post_videos
  description: Fetches the post videos of a TikTok user using the specified parameters.
  parameters:
    type: object
    properties:
      count:
        description: The number of videos to fetch, with a maximum limit of 35. Default
          is '10'.
      unique_id:
        description: The unique identifier of the TikTok user. Default is '@tiktok'.
      cursor:
        description: The cursor position for pagination. Default is '0'.
      user_id:
        description: The user ID of the TikTok user. Default is '107955'.
list_replies_by_comment:
  name: list_replies_by_comment
  description: Fetches replies to a specific comment on a given TikTok video using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      aweme_id:
        description: The ID of the TikTok video.
      comment_id:
        description: The ID of the comment for which replies are being retrieved.
      count:
        description: The number of replies to retrieve. Defaults to 10.
      cursor:
        description: The starting point for pagination. Defaults to 0.
      proxy:
        description: Proxy server to use for the request. Defaults to None.
get_channel_description:
  name: get_channel_description
  description: Fetches the channel description from the Twitch API using the provided
    user ID.
  parameters:
    type: object
    properties:
      userid:
        description: The ID of the user whose channel description is to be fetched.
titles_id_aka:
  name: titles_id_aka
  description: Fetches alternative titles for an IMDb title using its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: IMDb ID of the title (e.g., 'tt0000002').
view_user_list:
  name: view_user_list
  description: Retrieves the list of favorite libraries for a given user based on
    their user ID.
  parameters:
    type: object
    properties:
      userid:
        description: The unique identifier of the user.
get_the_forecast:
  name: get_the_forecast
  description: Fetches the weather forecast for the specified city using the RapidAPI
    Cloud Cast service.
  parameters:
    type: object
    properties:
      city:
        description: The name of the city for which to retrieve the weather forecast.
inbox:
  name: inbox
  description: Fetches the inbox messages for a given temporary email address using
    the Toolbench RapidAPI.
  parameters:
    type: object
    properties:
      email:
        description: The temporary email address for which to fetch the inbox messages.
get_tamil_calendar_date:
  name: get_tamil_calendar_date
  description: Fetches the Tamil calendar date corresponding to the given English
    calendar date using the Yawin Indian Astrology API.
  parameters:
    type: object
    properties:
      date:
        description: The English calendar date in the format 'YYYY-MM-DD'.
get_user_favorite_videos:
  name: get_user_favorite_videos
  description: Fetches a list of favorite videos for a given user from the TikTok
    video feature summary API.
  parameters:
    type: object
    properties:
      cursor:
        description: Position in the list to start fetching the videos from. Defaults
          to '0'.
      user_id:
        description: The user ID for which to fetch favorite videos. Defaults to '6741307595983946754'.
      unique_id:
        description: The unique identifier for the user, can be either a username
          or handle (e.g., 'voyagel' or '@voyagel'). Defaults to 'voyagel'.
      count:
        description: The number of favorite videos to fetch. Defaults to '10'.
get_channel_broadcaster_type:
  name: get_channel_broadcaster_type
  description: Fetch the broadcaster type of a Twitch channel using the given user
    ID.
  parameters:
    type: object
    properties:
      userid:
        description: The user ID of the Twitch channel to get the broadcaster type
          for.
detailed_food_recipe_by_id:
  name: detailed_food_recipe_by_id
  description: Fetches a detailed food recipe using the given recipe ID from The Vegan
    Recipes DB API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the food recipe to fetch.
recipes_by_author:
  name: recipes_by_author
  description: Fetches recipes by a given author profile from the Worldwide Recipes
    API.
  parameters:
    type: object
    properties:
      profile_name:
        description: The name of the author's profile to fetch recipes for.
      q:
        description: An optional query string to filter recipes.
      start:
        description: 'The starting index for pagination (e.g., Page 1 = start: 0,
          Page 2 = start: 20).'
get_from_1337_x:
  name: get_from_1337_x
  description: Fetches torrent data for a given search topic from the 1337x website
    using the RapidAPI service.
  parameters:
    type: object
    properties:
      searchtopic:
        description: The topic or keywords to search for torrents on 1337x.
album_metadata:
  name: album_metadata
  description: Fetches metadata for a specified album from the Spotify API using RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: The Spotify album ID. Defaults to '3IBcauSj5M2A6lTeffJzdv'.
titles_id_crew:
  name: titles_id_crew
  description: Fetches the crew details of a movie or a TV show from the Movies Database
    API using the provided IMDb ID.
  parameters:
    type: object
    properties:
      is_id:
        description: IMDb ID of the title (e.g., 'tt0000002').
titles_random:
  name: titles_random
  description: Fetches a random list of movie titles from the Movies Database API
    based on the provided query parameters.
  parameters:
    type: object
    properties:
      startyear:
        description: The starting year range filter (e.g., 2020).
      genre:
        description: The genre filter (e.g., 'Drama').
      titletype:
        description: The type of title to filter by (e.g., 'movie').
      sort:
        description: Sorting order (e.g., 'year.incr' or 'year.decr').
      limit:
        description: The number of titles per page (default is 10, maximum is 10).
      info:
        description: Type of information to include (default is 'mini-info'; options
          include 'base_info', 'mini_info', 'image', etc.).
      endyear:
        description: The ending year range filter (e.g., 2020).
      year:
        description: The starting year range filter (e.g., 2020).
      list:
        description: The selected list type (e.g., 'most_pop_movies', 'most_pop_series',
          'top_rated_series_250', etc.).
top_grossing_games:
  name: top_grossing_games
  description: Fetches the top-grossing games chart from the Google Play Store, with
    support for filtering by category, language, and region.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of results to return. Allowed values are between
          1 and 200. Default is 50. Note that requests with a limit value between
          101-200 will be charged double (2 requests).
      language:
        description: The language to use, specified as a 2-letter language code according
          to ISO 639-1. Default is 'en'.
      category:
        description: The specific Google Play category to filter the chart by (e.g.,
          'GAME_RACING'). Default is None.
      region:
        description: The 2-letter country code according to ISO 3166-1 to specify
          the region. Default is 'us'.
list_of_markets:
  name: list_of_markets
  description: Fetches a list of markets based on the provided parameters. Initially,
    a snapshot call should be issued followed by delta calls to capture changes since
    the given `since` value. This function utilizes an API to return market data based
    on the various filters specified in the parameters.
  parameters:
    type: object
    properties:
      sport_id:
        description: The ID of the sport for which markets data is requested.
        type: integer
      league_ids:
        description: The ID of the league to filter the markets. Defaults to None.
      event_type:
        description: The type of event, either 'prematch' or 'live'. Defaults to None.
      event_ids:
        description: The ID of the event to filter the markets. Defaults to None.
      is_have_odds:
        description: Indicates if only matches with open odds or future odds should
          be returned (True or False). Defaults to None.
      since:
        description: The UTC timestamp since when to fetch changes. Calls return changes
          since the provided `since` value. Defaults to None.
u_k_songs:
  name: u_k_songs
  description: Fetches the U.K. Songs chart information for a specific date and range
    from the Billboard API.
  parameters:
    type: object
    properties:
      date:
        description: The date for which the chart information is requested, in the
          format 'YYYY-MM-DD'.
      range:
        description: The range of the chart data to fetch.
get_category:
  name: get_category
  description: Fetches categories from the Airbnb API, optionally in a specified language.
  parameters:
    type: object
    properties:
      languageid:
        description: The ID of the language in which the response should be returned.
          To obtain the language ID, use the `getLanguages` API.
recommendations:
  name: recommendations
  description: Fetches analyst recommendations for a given stock symbol, optionally
    filtered by exchange and country.
  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol to get recommendations for.
      exchange:
        description: Filter recommendations by exchange name or mic code.
      country:
        description: Filter recommendations by country name or alpha code.
pet_pet:
  name: pet_pet
  description: Generates a 'Pet Pet' meme GIF from a given image URL using the Memeados
    API.
  parameters:
    type: object
    properties:
      image:
        description: The URL of the image to be used for generating the meme.
explore_competitions:
  name: explore_competitions
  description: Fetches a list of soccer competitions for a given area.
  parameters:
    type: object
    properties:
      area_id:
        description: The ID of the area to retrieve competitions for.
        type: integer
get_a_random_quote_from_a_specific_book:
  name: get_a_random_quote_from_a_specific_book
  description: Fetches a random quote from a specific self-help book using its book
    ID.
  parameters:
    type: object
    properties:
      book_id:
        description: The identifier for the specific book from which to fetch a random
          quote.
community_post_comments:
  name: community_post_comments
  description: Retrieves comments for a YouTube community post using the specified
    cursor token.
  parameters:
    type: object
    properties:
      cursor:
        description: A token used for pagination to fetch the next set of comments
          from the Community Post Details endpoint.
leagueplayersstatistics:
  name: leagueplayersstatistics
  description: Fetches player statistics for a specific Football league and season
    based on the given parameters.
  parameters:
    type: object
    properties:
      limit:
        description: Number of players to include per page.
        type: integer
      page:
        description: One-based page number.
        type: integer
      seasonid:
        description: ID of the season to retrieve player statistics for.
        type: integer
      tournamentid:
        description: Unique ID of the tournament to retrieve player statistics for.
        type: integer
      minapps:
        description: If set to True, only includes players with a minimum number of
          appearances.
      order:
        description: Sorting order of the response properties. Default is '-rating'.
          Prefix with '-' for descending order, leave as is for ascending.
      filters:
        description: Filters to apply, such as player position, match type, appearances,
          age, preferred foot, team, and nationality. See the noisy docstring for
          detailed filter options.
      accumulation:
        description: Type of accumulation. Choices are 'total', 'perGame', or 'per90'.
          Default is 'total'.
      group:
        description: Statistic group to retrieve. Choices are 'summary', 'attack',
          'defence', 'passing', 'goalkeeper'. Default is 'summary'.
      fields:
        description: Specific fields to include, up to 6. Only used when not specifying
          a group. Field options include 'successfulDribblesPercentage', 'goals',
          'blockedShots', etc.
team_list:
  name: team_list
  description: Fetches and returns a list of sports teams from the SportScore API.
  parameters:
    type: object
    properties:
      page:
        description: Page number for pagination. Defaults to 1.
get_an_answer:
  name: get_an_answer
  description: Fetches an answer based on the given query parameters from a specific
    API endpoint.
  parameters:
    type: object
    properties:
      page:
        description: The page number to fetch. Default is '1'.
      limit:
        description: The number of items per page. Default is '10'.
      status:
        description: The status of the dialogue (e.g., 'approved' or 'analyzing').
          Default is 'approved'.
      answer:
        description: The pre-defined response for the initial speech of the dialogue.
          Default is 'Hi, how are you?'.
      is_id:
        description: The unique identifier of the dialogue. Default is '5ec47b3d8958430d6a6d5898'.
      speech:
        description: The initial speech input for which an answer is sought. Default
          is 'Hi'.
      user:
        description: The unique identifier of the user who created the dialogue. Default
          is '5ec479048958430d6a6d5895'.
postalcode:
  name: postalcode
  description: Fetches location information for a given US postal code using the Toolbench
    API service.
  parameters:
    type: object
    properties:
      postal_code:
        description: The postal code or zip code for which to fetch location information.
matchincidents:
  name: matchincidents
  description: Fetches incidents for a specific Rugby match using the provided RapidAPI
    key.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the Rugby match for which to fetch incidents.
        type: integer
search_torrents:
  name: search_torrents
  description: Search for torrents based on given keywords using the RapidAPI service.
  parameters:
    type: object
    properties:
      keywords:
        description: Keywords to search for torrents.
      quantity:
        description: Number of torrent results to return. Maximum value is 40.
        type: integer
      page:
        description: Page number for paginated results. Defaults to 1.
get_movies_by_cast_name:
  name: get_movies_by_cast_name
