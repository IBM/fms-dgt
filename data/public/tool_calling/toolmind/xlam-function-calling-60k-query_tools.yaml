  parameters:
    type: object
    properties:
      round:
        description: The round number/name of the race within the year.
      year:
        description: The year of the race season.
downloadminecraftjson:
  name: downloadminecraftjson
  description: Downloads the Minecraft JSON configuration file for a specified version.
  parameters:
    type: object
    properties:
      minecraftversion:
        description: The version of Minecraft for which to download the JSON configuration
          file.
navigations_get_root:
  name: navigations_get_root
  description: Fetches the root categories related to a specified tab from the navigations
    endpoint.
  parameters:
    type: object
    properties:
      channeltype:
        description: The value of the 'id' field returned in the /navigations/get-tabs
          endpoint.
        type: integer
      currency:
        description: The 3-letter currency code. Defaults to 'USD'.
      country:
        description: The 2-letter country code. Defaults to 'US'.
      language:
        description: The 2-letter language code. Defaults to 'en'.
get_cards:
  name: get_cards
  description: Fetches a list of Hearthstone cards from the API.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve. Defaults to '1'.
      pagesize:
        description: The number of cards to retrieve per page. Defaults to '1'.
recent_match_list:
  name: recent_match_list
  description: Fetches the list of the last 20 matches between two teams for a given
    match ID.
  parameters:
    type: object
    properties:
      matchid:
        description: The unique identifier for the match.
        type: integer
check_1_param:
  name: check_1_param
  description: This function checks the validity of a given VAT number using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      vat:
        description: The VAT number to be checked, including the country code.
search_company_by_name:
  name: search_company_by_name
  description: Search for company information by name using the RapidAPI service.
  parameters:
    type: object
    properties:
      page:
        description: The page number for paginated results.
        type: integer
      limit:
        description: The maximum number of results per page.
        type: integer
      companyname:
        description: The name of the company to search for.
get_mp3:
  name: get_mp3
  description: Converts a YouTube video to an MP3 file, with optional cutting based
    on start and end times.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier for the YouTube video.
      cut:
        description: If provided, will cut the MP3 file based on the sstart and send
          parameters. Defaults to None.
      sstart:
        description: The starting point for cutting the MP3. The format must be HH:MM:SS.
          Defaults to None.
      send:
        description: The ending point for cutting the MP3. The format must be HH:MM:SS.
          Defaults to None.
filter_china_news_by_newspaper_company:
  name: filter_china_news_by_newspaper_company
  description: Fetches news articles from a specified Chinese newspaper company using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      newspaperid:
        description: The ID of the newspaper company from which to fetch news articles.
sticker_translate:
  name: sticker_translate
  description: Translates a given term or phrase into a sticker using the Giphy API.
  parameters:
    type: object
    properties:
      s:
        description: The term or phrase to translate into a sticker.
shipping_id:
  name: shipping_id
  description: Fetches shipping information from the AliExpress Unofficial API for
    a given shipping ID and optional parameters such as count, locale, country, and
    currency.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the shipping information to fetch.
        type: integer
      count:
        description: The count of shipping records to fetch. Defaults to 1.
      locale:
        description: Locale for the shipping information. Defaults to None.
      country:
        description: Country for the shipping information. Defaults to None.
      currency:
        description: Currency for the shipping information. Defaults to None.
tournament_standings:
  name: tournament_standings
  description: Fetches and returns the team rankings for a specified tournament.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The ID of the tournament for which to retrieve standings.
        type: integer
camelizer_get_price_chart:
  name: camelizer_get_price_chart
  description: Fetches a price history chart of a specified product from Amazon using
    the Camelizer API.
  parameters:
    type: object
    properties:
      asin:
        description: 'The ASIN (Amazon Standard Identification Number) of a product
          from Amazon. Example: ''B08QB93S6R''.'
      lang:
        description: 'The language for the chart. One of the following: ''en'', ''fr'',
          ''de'', ''it'', ''es''. Default is ''en''.'
      tp:
        description: 'The time period for the price history. One of the following:
          ''1m'', ''3m'', ''6m'', ''1y'', ''all''. Default is ''3m''.'
      w:
        description: The width of the chart in pixels. Default is 720.
      h:
        description: The height of the chart in pixels. Default is 480.
      country:
        description: 'The country-specific Amazon site. One of the following: ''au'',
          ''ca'', ''fr'', ''de'', ''it'', ''es'', ''uk'', ''us''. Default is ''us''.'
location_information:
  name: location_information
  description: Fetch Instagram location information using a location ID.
  parameters:
    type: object
    properties:
      locationid:
        description: The Instagram location ID to retrieve information for.
feeds:
  name: feeds
  description: Fetch recent TikTok feeds for a given user.
  parameters:
    type: object
    properties:
      schematype:
        description: The type of schema to use for the query.
      username:
        description: The TikTok username for which to fetch recent feeds.
get_a_language:
  name: get_a_language
  description: Retrieve information about a programming language using Judge0 API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the programming language to retrieve information for.
v1_convert:
  name: v1_convert
  description: Converts a sum of money from one currency to another using the specified
    conversion type and RapidAPI key.
  parameters:
    type: object
    properties:
      to:
        description: The currency ID to convert to.
        type: integer
      sum:
        description: The sum of money to convert.
        type: integer
      is_from:
        description: The currency ID to convert from.
        type: integer
list_by_equipment:
  name: list_by_equipment
  description: Fetch a list of exercises by the type of equipment.
  parameters:
    type: object
    properties: {}
south_africa_songs:
  name: south_africa_songs
  description: Fetch the South Africa Songs chart information for a specific date
