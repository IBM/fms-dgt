  parameters:
    type: object
    properties:
      is_id:
        description: The Google Place ID of the location to retrieve details for.
cities_v2_get_information:
  name: cities_v2_get_information
  description: Fetches information about a specific city using its identifier.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the city as returned by the `/v2/auto-complete` endpoint.
      x_units_temperature:
        description: Unit for temperature. One of 'fahrenheit' or 'celsius'. Defaults
          to 'celsius'.
      x_aqi_index:
        description: AQI (Air Quality Index) standard. One of 'us' or 'cn'. Defaults
          to 'us'.
      x_user_timezone:
        description: User's timezone. Defaults to 'Asia/Singapore'.
      x_user_lang:
        description: User's language. Defaults to 'en-US'.
      x_units_pressure:
        description: Unit for pressure. One of 'hg' or 'mbar'. Defaults to 'mbar'.
      x_units_distance:
        description: Unit for distance. One of 'miles' or 'kilometer'. Defaults to
          'kilometer'.
get_coupons_endpoint:
  name: get_coupons_endpoint
  description: Fetches daily AI-analyzed betting coupons with a high win rate from
    the specified endpoint.
  parameters:
    type: object
    properties:
      content_type:
        description: The content type for the request header. Defaults to 'application/json'.
      connection:
        description: The connection type for the request header. Defaults to 'keep-alive'.
      sort:
        description: The sorting order for the betting coupons; use '-id' for ascending
          order. Defaults to '-id'.
get_job_status:
  name: get_job_status
  description: Fetch the status and results of a job from the Large Text-to-Speech
    service using RapidAPI.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique identifier of the job whose status and result need
          to be fetched.
result_statistics_goals:
  name: result_statistics_goals
  description: Fetches the goal statistics for a given handball match within a 7-day
