  parameters:
    type: object
    properties:
      symbol:
        description: The stock symbol for which the upgrade and downgrade history
          is to be fetched.
      is_from:
        description: The starting date for the history in the format 'YYYY-MM-DD'.
lyrics_get:
  name: lyrics_get
  description: Fetches lyrics and related data for a specific song using the SongMeanings
    API.
  parameters:
    type: object
    properties:
      sm_lid:
        description: SongMeanings Lyric ID. When specified, this parameter will bypass
          any other lyric identification parameters.
      lyric_title:
        description: The title of the song or track.
      artist_name:
        description: The name of the artist.
      format:
        description: The desired output format (either 'xml' or 'json').
      spotify_id:
        description: The Spotify ID of the song. If specified, a match will attempt
          to be made via this ID. The API will also require `lyric_title` and `artist_name`
          as backup attempts if this parameter is used. Defaults to None.
      count:
        description: Used to track and report any offline cached views of lyrics.
          Defaults to None.
disciplina_2:
  name: disciplina_2
  description: Retrieves disciplinary information for a specific student using the
