  parameters:
    type: object
    properties:
      symbol:
        description: The instrument symbol, which can be an equity, index, ETF, forex,
          or cryptocurrency (e.g., `AAPL`, `EUR/USD`, `ETH/BTC`).
      interval:
        description: The interval between two consecutive points in the time series.
          Supported values include `1min`, `5min`, `15min`, `30min`, `45min`, `1h`,
          `2h`, `4h`, `1day`, `1week`, `1month`.
      fast_dma_type:
        description: The type of moving average used for smoothing. Supported values
          are `SMA`, `EMA`, `WMA`, `DEMA`, `TEMA`, `TRIMA`, `KAMA`, `MAMA`, `T3MA`.
          Defaults to `SMA`.
      series_type:
        description: The type of series data. Supported values are `open`, `high`,
          `low`, `close`. Defaults to `close`.
      fast_d_period:
        description: The period for the fast D moving average. Defaults to 3.
        type: integer
      outputsize:
        description: The number of data points to return. Defaults to 30.
        type: integer
      fast_k_period:
        description: The period for the fast K moving average. Defaults to 3.
        type: integer
      format:
        description: The output format of the API response. Supported values are `json`
          and `csv`. Defaults to `json`.
      time_period:
        description: The period for the RSI calculation. Defaults to 14.
        type: integer
get_book_information_by_book_id:
