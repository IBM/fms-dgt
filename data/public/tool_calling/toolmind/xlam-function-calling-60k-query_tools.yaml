    detailed detections at the paragraph, sentence, and word levels.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the image from which to extract text.
      language:
        description: The language of the results, specified as a 2-letter ISO 639-1
          code (e.g., 'en' for English). Defaults to 'en'.
time_zones:
  name: time_zones
  description: Retrieve all known time-zones.
  parameters:
    type: object
    properties:
      offset:
        description: The zero-based offset index into the results.
      hateoasmode:
        description: Whether to include HATEOAS-style links in the results.
      limit:
        description: The maximum number of results to retrieve.
leaguelogo:
  name: leaguelogo
  description: Retrieves the logo image for an American Football league, given its
    unique tournament ID. The image is returned in PNG format.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The unique tournament ID of the league whose logo is to be retrieved.
        type: integer
tournamentdetailsbyid:
  name: tournamentdetailsbyid
  description: Retrieves tournament details using a unique tournament ID.
  parameters:
    type: object
    properties:
      uniquetournamentid:
        description: The unique identifier for the tournament.
        type: integer
title_seasons:
