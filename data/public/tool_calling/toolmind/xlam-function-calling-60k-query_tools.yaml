  description: Calculates the Rate of Change Percentage (ROCP) for a given financial
    instrument over a specified time period.
  parameters:
    type: object
    properties:
      interval:
        description: Interval between two consecutive points in the time series. Supports
          `1min`, `5min`, `15min`, `30min`, `45min`, `1h`, `2h`, `4h`, `1day`, `1week`,
          `1month`.
      symbol:
        description: Financial instrument symbol, can be any equity, index, ETF, forex,
          or cryptocurrency (e.g., `AAPL`, `EUR/USD`, `ETH/BTC`).
      outputsize:
        description: Number of data points to be retrieved. Default is `30` if no
          date parameters are set.
      time_period:
        description: Number of intervals used to calculate the ROCP. Default is `9`.
      format:
        description: Format of the output data. Can be `csv` or `json`. Default is
          `json`.
      series_type:
        description: The type of price series to use. Supports `open`, `high`, `low`,
          or `close`. Default is `close`.
get_playlist_album_metadata:
  name: get_playlist_album_metadata
  description: Fetches full metadata of a playlist or album from SoundCloud.
  parameters:
    type: object
    properties:
      playlist:
        description: The URL or ID of the playlist or album to fetch metadata for.
get_token_forwarding_wallets:
  name: get_token_forwarding_wallets
  description: Fetches a list of token forwarding wallets from the RapidAPI Token
    Forwarding service.
  parameters:
    type: object
    properties:
      is_id:
        description: Identifier for the token forwarding wallet. Defaults to 'dfe02338-43ae-453f-bd51-6f0ea98e4df9'.
      limit:
        description: Maximum number of records to return. Defaults to 100.
        type: integer
      offset:
        description: Number of records to skip from the beginning. Defaults to 0.
        type: integer
analyze_v2:
  name: analyze_v2
  description: Analyzes the page speed and generates a detailed report for the given
    URL using the specified parameters.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the webpage to be analyzed.
      category:
        description: The category of analysis to be performed. Options include 'accessibility',
          'best-practices', 'performance', 'seo', and 'pwa'. Defaults to 'performance'.
      strategy:
        description: The strategy for analysis. Options include 'desktop' and 'mobile'.
          Defaults to None.
historical_weather_record:
  name: historical_weather_record
  description: Fetches historical weather records for a specified location within
    a given time range.
  parameters:
    type: object
    properties:
      location:
        description: The address or latitude, longitude of the location. Addresses
          can be full or partial (city, state, zip code). If using coordinates, the
          format should be latitude,longitude (decimal degrees).
      enddatetime:
        description: The end date and time for the data request in ISO format (yyyy-MM-ddTHH:mm:ss)
          using the location's time zone.
      startdatetime:
        description: The start date and time for the data request in ISO format (yyyy-MM-ddTHH:mm:ss)
          using the location's time zone.
      aggregatehours:
        description: The interval between weather history data points in the output.
          Supported values are 1 (hourly) or 24 (daily).
        type: integer
      unitgroup:
        description: The unit system for the output data. Supported values are 'us',
          'uk', or 'metric'.
      contenttype:
        description: The format of the output data. Supported values are 'json' or
          'csv'. Default is 'csv'.
      dayendtime:
        description: 'Filters the output to records within the specified end time
          of the day (format: HH:mm:ss). Default is ''17:00:00''.'
      daystarttime:
        description: 'Filters the output to records within the specified start time
          of the day (format: HH:mm:ss). Default is ''08:00:00''.'
      shortcolumnnames:
        description: If True, returns shorter, abbreviated column names. If False,
          returns descriptive column names. Useful for programmatic use.
products_search_by_barcode:
  name: products_search_by_barcode
  description: Searches for product details using a given barcode GTIN code.
  parameters:
    type: object
    properties:
      gtincodes:
        description: The scanned GTIN code(s) of the product(s) to search for.
      country:
        description: The country code where the search is being performed. Defaults
          to 'us'.
      lang:
        description: The language code for the search results. Defaults to 'en'.
get_player_info:
  name: get_player_info
  description: Fetches and returns information about a Valorant esports player using
    the RapidAPI service.
  parameters:
    type: object
    properties:
      playerid:
        description: The unique identifier of the player.
cinemas_id_showtimes:
  name: cinemas_id_showtimes
  description: Fetches the showtimes for a specified cinema and optionally filters
    by a given film.
  parameters:
    type: object
    properties:
      is_id:
        description: The cinema identifier.
      filmid:
        description: The film identifier to filter showtimes. Defaults to None.
author_author:
  name: author_author
  description: Fetches all poems from Poetry DB written by a specific poet.
  parameters:
    type: object
    properties:
      author:
        description: The poet's name or a part of the poet's name.
get_by_imdb_id:
  name: get_by_imdb_id
  description: Fetch movie or TV show information by IMDb ID using the specified RapidAPI
    key.
  parameters:
    type: object
    properties:
      i:
        description: A valid IMDb ID for the movie or TV show.
sticker_roulette:
  name: sticker_roulette
  description: Fetches a randomly selected sticker from Giphy's sticker collection.
    Optionally, it allows the selection to be limited to a specific tag. The function
    interacts with the Giphy API to retrieve the sticker.
  parameters:
    type: object
    properties:
      tag:
        description: The tag to limit the scope of the sticker search. Should be URL
          encoded and can include phrases separated by hyphens.
product_offers:
  name: product_offers
  description: Fetches a list of offers for a specific product on Amazon based on
    the given ASIN.
  parameters:
    type: object
    properties:
      asin:
        description: Product ASIN to get offers for. Supports batching up to 10 ASINs
          in a single request, separated by a comma (e.g., 'B08PPDJWC8,B07ZPKBL9V,B08BHXG144').
      delivery:
        description: '[EXPERIMENTAL] Find products with specific delivery options,
          specified as a comma-delimited list. Valid values: ''PRIME_ELIGIBLE'', ''FREE_DELIVERY''.
          Default is None.'
      limit:
        description: Maximum number of offers to return. Default is 100.
      product_condition:
        description: 'Filter products by condition, specified as a comma-delimited
          list. Valid values: ''NEW'', ''USED_LIKE_NEW'', ''USED_VERY_GOOD'', ''USED_GOOD'',
          ''USED_ACCEPTABLE''. Default is None.'
      country:
        description: 'Sets the marketplace country, language, and currency. Allowed
          values: ''US'', ''AU'', ''BR'', ''CA'', ''CN'', ''FR'', ''DE'', ''IN'',
          ''IT'', ''MX'', ''NL'', ''SG'', ''ES'', ''TR'', ''AE'', ''GB'', ''JP''.
          Default is ''US''.'
all:
  name: all
  description: Returns the complete history of a package from dispatch to the latest
    status.
  parameters:
    type: object
    properties:
      colisid:
        description: The ID of the package to be tracked.
traditionalhydrotocarbonfootprint:
  name: traditionalhydrotocarbonfootprint
  description: Calculates the CO2 equivalent (CO2e) emissions from the use of traditional
    hydroelectric power based on consumption and location.
  parameters:
    type: object
    properties:
      consumption:
        description: The KWH usage of hydroelectric power.
      location:
        description: The country or continent providing the hydroelectric power. Can
          be one of "USA", "Canada", "UK", "Europe", "Africa", "LatinAmerica", "MiddleEast",
          or "OtherCountry".
locations_search:
  name: locations_search
  description: Searches for locations based on a given term or phrase using the SeLoger
    API.
  parameters:
    type: object
    properties:
      searchterm:
        description: The term or phrase to search for locations.
ip_address_lookup:
  name: ip_address_lookup
  description: Retrieves geolocation data for a given IP address using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      ip:
        description: The IP address to look up.
currency_options:
  name: currency_options
  description: Fetches currency options data for a specified stock using the Investing
    Financial Stocks API.
  parameters:
    type: object
    properties:
      slug:
        description: The stock identifier slug to specify the stock for which currency
          options are to be retrieved.
get_reel_by_shortcode:
  name: get_reel_by_shortcode
  description: Fetch information about an Instagram reel using its shortcode.
  parameters:
    type: object
    properties:
      shortcode:
        description: The unique identifier for the Instagram reel.
responses_from_a_question:
  name: responses_from_a_question
  description: Fetch all responses for a given question using the Moodring API.
  parameters:
    type: object
    properties:
      questionid:
        description: The ID of the question to retrieve responses for.
get_states:
  name: get_states
  description: Fetches a list of states based on various search parameters.
  parameters:
    type: object
    properties:
      keyword:
        description: A keyword to search for states. Defaults to 'asia'.
      perpage:
        description: The number of results to return per page. Defaults to 50.
      city_id:
        description: A city ID to find associated states. Defaults to None.
      is_id:
        description: A specific state ID to search for. Defaults to None.
      page:
        description: The number of results to return per page. Defaults to 50.
vin_decoder_lite:
  name: vin_decoder_lite
  description: This function decodes a given Vehicle Identification Number (VIN) using
    the RapidAPI VIN Decoder Lite service and returns the decoded information.
  parameters:
    type: object
    properties:
      vin:
        description: The Vehicle Identification Number (VIN) to be decoded. It must
          be 17 characters long.
searchcontent:
  name: searchcontent
  description: The function searches for videos, playlists, and channels on YouTube
    using the specified query and RapidAPI key.
  parameters:
    type: object
    properties:
      q:
        description: The search query for finding content on YouTube. Defaults to
          None.
retrieving_a_contract:
  name: retrieving_a_contract
  description: Fetches detailed information about an asset contract from the OpenSea
    API.
  parameters:
    type: object
    properties:
      asset_contract_address:
        description: The address of the asset contract to retrieve information for.
exchange_range:
  name: exchange_range
  description: Retrieves the minimum and maximum payment amounts required to make
    an exchange for a specified pair of assets.
  parameters:
    type: object
    properties:
      from_to:
        description: Underscore separated pair of asset tickers (e.g., 'btc_usd').
      api_key:
        description: Your specific API key for the service. Defaults to 'your_api_key'.
search_books_by_name:
  name: search_books_by_name
  description: Search for books by name using the provided RapidAPI key.
  parameters:
    type: object
    properties:
      book_name:
        description: The name of the book to search for, with spaces replaced by '+'.
get_tournaments_for_league:
  name: get_tournaments_for_league
  description: Fetches all tournaments associated with a specified League of Legends
    league ID using the RapidAPI service.
  parameters:
    type: object
    properties:
      leagueid:
        description: The ID of the league for which to retrieve tournaments. Defaults
          to '101097443346691685'.
v_card_qr_code:
  name: v_card_qr_code
  description: Creates a static QR code for a vCard with specified customization options
    and returns the response from the API.
  parameters:
    type: object
    properties:
      uname:
        description: The username for the vCard.
      error_correction:
        description: The error correction level for the QR code. Defaults to 'M'.
      data_gradient_start_color:
        description: The start color for the data gradient. Defaults to '#000000'.
      eye_color_inner:
        description: The inner color of the QR code eyes. Defaults to '#000000'.
      data_gradient_style:
        description: The style of the data gradient. Defaults to 'None'.
      data_gradient_end_color:
        description: The end color for the data gradient. Defaults to '#000000'.
      background_color:
        description: The background color of the QR code. Defaults to '#FFFFFF'.
      eye_color_outer:
        description: The outer color of the QR code eyes. Defaults to '#000000'.
      eye_pattern:
        description: The pattern of the QR code eyes. Defaults to 'RECT_RECT'.
      size:
        description: The size of the QR code. Defaults to 'm'.
      data_pattern:
        description: The pattern of the QR code data. Defaults to 'RECT'.
keyword_search_at_coordinate_point:
  name: keyword_search_at_coordinate_point
  description: Fetch search results for a given query at a specified geographic coordinate
    point using the RapidAPI Local Rank Tracker service.
  parameters:
    type: object
    properties:
      lat:
        description: Latitude of the coordinate point.
      lng:
        description: Longitude of the coordinate point.
      query:
        description: The search query or keyword.
      x_user_agent:
        description: Device type for the search. Default is None.
      zoom:
        description: Google Maps zoom level, ranging from 0 to 18. Default is '13'.
cars_get_images:
  name: cars_get_images
  description: Fetches images of a car model for a specified model year.
  parameters:
    type: object
    properties:
      modelyearid:
        description: The ID of the car model year for which images are to be fetched.
        type: integer
keyword_search:
  name: keyword_search
  description: Retrieves search results for a given keyword from the Otto e-commerce
    site using the RapidAPI Axesso service.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the search results to retrieve.
        type: integer
      keyword:
        description: The search term to look for in the Otto database.
      sortby:
        description: The sorting criteria for the search results (default is 'topseller').
getgamelist:
  name: getgamelist
  description: Fetches a list of games from the EvoSiss Game Database API, returning
    their IDs and series names in JSON format.
  parameters:
    type: object
    properties:
      page:
        description: The page number to retrieve from the game list.
        type: integer
bodyfat_imperial:
  name: bodyfat_imperial
  description: Calculates the body fat percentage based on the provided height, gender,
    weight, and age using imperial units.
  parameters:
    type: object
    properties:
      height:
        description: The height of the person in inches.
        type: integer
      gender:
        description: The gender of the person. Must be either 'male' or 'female'.
      weight:
        description: The weight of the person in pounds.
        type: integer
      age:
        description: The age of the person in years.
        type: integer
leagueawaystandings:
  name: leagueawaystandings
  description: Retrieve the league's away standings for a given tournament and season.
  parameters:
    type: object
    properties:
      tournamentid:
        description: The unique ID of the tournament for which you want to retrieve
          the away standings.
        type: integer
      seasonid:
        description: The ID of the season for which you want to retrieve the away
          standings.
        type: integer
wnba_play_by_play:
  name: wnba_play_by_play
  description: Retrieves the WNBA game play-by-play data for a specific game using
    the provided game ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the game for which play-by-play data is to be retrieved.
leaderboards:
  name: leaderboards
  description: Fetch the most recent leaderboard for a given tournament ID, year,
    and optional round ID.
  parameters:
    type: object
    properties:
      orgid:
        description: Identifier for the organizing body. Choose '1' for PGA Tour or
          '2' for LIV Tour.
      tournid:
        description: The tournament ID for which the leaderboard is to be fetched.
      year:
        description: The year of the tournament.
      roundid:
        description: The round ID to filter the leaderboard by a specific round. Defaults
          to None.
food_info:
  name: food_info
  description: Retrieves information about a specific food item from the food database
    using its food ID.
  parameters:
    type: object
    properties:
      foodid:
        description: The unique identifier for the food item.
autocomplete_localities:
  name: autocomplete_localities
  description: Sends a GET request to the RapidAPI Autocomplete India service to fetch
    autocomplete suggestions for a given locality.
  parameters:
    type: object
    properties:
      locality:
        description: The locality name to get autocomplete suggestions for.
extract_sitemap_xml_as_json:
  name: extract_sitemap_xml_as_json
  description: Fetches and parses a sitemap.xml file from the given URL and returns
    its content in JSON format.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the sitemap.xml file to be fetched and parsed.
      meta:
        description: If True, includes meta information for each URL in the sitemap.
          Defaults to None.
      breadcrumbs:
        description: If True, includes breadcrumb information for each URL in the
          sitemap. Defaults to None.
      categories:
        description: If True, includes category information for each URL in the sitemap.
          Defaults to None.
get_chapter_by_bookname:
  name: get_chapter_by_bookname
  description: Retrieves a specific chapter from a book in the Bible using the specified
    book name and chapter ID.
  parameters:
    type: object
    properties:
      bookname:
        description: The name of the book in the Bible.
      chapterid:
        description: The chapter number to retrieve from the specified book.
        type: integer
scraper:
  name: scraper
  description: Fetches the text content of a specified HTML selector from the given
    URL using the Toolbench RapidAPI service.
  parameters:
    type: object
    properties:
      url:
        description: The URL of the webpage to scrape.
      selector:
        description: The CSS selector to locate the HTML element to extract text from.
getproductsku:
  name: getproductsku
  description: Fetches price information for a product identified by its SKU from
    the RapidAPI price tracker service.
  parameters:
    type: object
    properties:
      product_sku:
        description: The SKU (Stock Keeping Unit) of the product to retrieve price
          information for.
get_all_food:
  name: get_all_food
  description: Fetches a list of Ghanaian foods including ingredients and a short
    description from the specified API endpoint.
  parameters:
    type: object
    properties:
      page:
        description: The page number to request data from. Default is '?page=2'.
getchanneldetails:
  name: getchanneldetails
  description: Fetch detailed information and insights about a specific YouTube channel
    using its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The unique ID of the YouTube channel to fetch details for.
getcountrycode:
  name: getcountrycode
  description: Retrieves all available country codes using the specified API.
  parameters:
    type: object
    properties:
      getcountrycodes:
        description: A flag to specify whether to retrieve country codes. Defaults
          to 'true'.
sticker_trending:
  name: sticker_trending
  description: Fetches the latest trending stickers from Giphy using the specified
    parameters.
  parameters:
    type: object
    properties:
      s:
        description: The term or phrase to translate into a sticker.
      limit:
        description: The number of results to return, with a maximum of 100. Defaults
          to 25.
      offset:
        description: The results offset, defaults to 0.
      fmt:
        description: The format in which to return results, either 'html' or 'json'.
      rating:
        description: The content rating to limit results to, one of 'y', 'g', 'pg',
          'pg-13', or 'r'.
v1_caloriesburned:
  name: v1_caloriesburned
  description: Fetches the number of calories burned for a given activity using the
    API Ninjas Calories Burned API.
  parameters:
    type: object
    properties:
      activity:
        description: The name of the activity. Partial values are allowed (e.g., 'ski'
          will match both 'water skiing' and 'downhill skiing').
      weight:
        description: Weight of the user in pounds (must be between 50 and 500). Defaults
          to None.
      duration:
        description: Duration of the activity in minutes (must be 1 or greater). Defaults
          to None.
player_data:
  name: player_data
  description: Fetches player data from the sports API using the provided player ID.
  parameters:
    type: object
    properties:
      player_id:
        description: The ID of the player whose data is to be fetched.
        type: integer
get_workout_plan:
  name: get_workout_plan
  description: Fetches a workout plan based on specified criteria including time duration,
    target muscle, location, and available equipment.
  parameters:
    type: object
    properties:
      time:
        description: The duration of the workout.
      equipment:
        description: The type of equipment available.
      muscle:
        description: The target muscle group for the workout.
      location:
        description: The location for the workout (e.g., gym, home).
esg:
  name: esg
  description: Retrieves the Environmental, Social, and Governance (ESG) score for
    a given company symbol using the Yahoo Finance API.
  parameters:
    type: object
    properties:
      symb:
        description: The stock symbol of the company for which the ESG score is requested.
hot_trending_songs_powered_by_twitter:
  name: hot_trending_songs_powered_by_twitter
  description: Fetch the HOT TRENDING SONGS POWERED BY TWITTER chart information for
    a specific date and range using the Toolbench RapidAPI key.
  parameters:
    type: object
    properties:
      date:
        description: The date for which to fetch the chart information, formatted
          as 'YYYY-MM-DD'.
      range:
        description: The range of the chart, with a maximum value between 1-20.
year_end_hot_100_songs:
  name: year_end_hot_100_songs
  description: Fetches the Year-End Hot 100 Songs chart for a given year from the
    Billboard API.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to retrieve the Year-End Hot 100 Songs chart.
        type: integer
      range:
        description: The range of chart positions to retrieve, default is '1-10'.
          If not specified, returns all results.
teamtournaments:
  name: teamtournaments
  description: Retrieves the unique tournaments in which an Ice Hockey team has participated.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the team for which tournaments will be retrieved.
        type: integer
get_dm_conversations:
  name: get_dm_conversations
  description: Fetches direct message conversations and messages from the Twitter
    API using the provided session and optional parameters.
  parameters:
    type: object
    properties:
      twttr_session:
        description: The session token for authenticating with the Twitter API.
      twttr_proxy:
        description: Optional proxy URL to route the request through.
      cursor:
        description: Optional cursor token to paginate through the result set.
house_prices_get_market_activity:
  name: house_prices_get_market_activity
  description: Fetches the market activity for a specified area using the Zoopla API.
  parameters:
    type: object
    properties:
      area:
        description: The value of suggestions/value JSON object returned from the
          .../auto-complete endpoint. This value must be used exactly as returned
          by the endpoint.
      identifier:
        description: The value of suggestions/identifier JSON object returned from
          the .../auto-complete endpoint. This value must also be used exactly as
          returned by the endpoint. Defaults to 'west-sussex/crawley/greenwich-close'.
get_a_conversation:
  name: get_a_conversation
  description: Fetch details of a specific conversation using its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the conversation to retrieve.
        type: integer
get_subcontrol_by_control:
  name: get_subcontrol_by_control
  description: Fetches all subcontrols or CCIs associated with a specified control.
  parameters:
    type: object
    properties:
      control:
        description: The identifier of the control (e.g., "AC-1") for which subcontrols
          or CCIs are to be fetched.
about_channel:
  name: about_channel
  description: Fetches detailed information about a YouTube channel using its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the YouTube channel for which information is being
          fetched.
last_menstrual_period_lmp:
  name: last_menstrual_period_lmp
  description: Calculates the estimated due date based on the user's last menstrual
    period (LMP).
  parameters:
    type: object
    properties:
      cycle_length:
        description: The average length of the user's menstrual cycle in days.
      last_period_date:
        description: The date of the user's last menstrual period in the format 'YYYY-MM-DD'.
weight_category:
  name: weight_category
  description: Retrieve the weight category of an individual based on their BMI.
  parameters:
    type: object
    properties:
      bmi:
        description: Body Mass Index value for which to determine the weight category.
        type: integer
gethospitalsbyname:
  name: gethospitalsbyname
  description: Fetches a list of U.S. hospitals that match the given name using the
    RapidAPI service.
  parameters:
    type: object
    properties:
      name:
        description: The name or partial name of the hospital to search for.
billboard_global_200_year_end:
  name: billboard_global_200_year_end
  description: Fetch the YEAR-END Billboard Global 200 chart information for a given
    year.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to fetch the chart data, in the format 'YYYY'.
          Defaults to '2022'.
forex_history_data_deprecated:
  name: forex_history_data_deprecated
  description: Fetches historical forex data for a given currency pair using the RapidAPI
    service.
  parameters:
    type: object
    properties:
      pair_id:
        description: The identifier for the currency pair whose historical data is
          to be fetched.
get_sign_hexagram:
  name: get_sign_hexagram
  description: Fetches detailed information for a specified sign hexagram category
    using the Sign Hexagram API.
  parameters:
    type: object
    properties:
      category:
        description: The ID of the category for which to retrieve the hexagram information.
messages_from_telegram_channel:
  name: messages_from_telegram_channel
  description: Fetches the last 10 messages or a specific message from a given public
    Telegram channel.
  parameters:
    type: object
    properties:
      channel:
        description: The @username of the public Telegram channel.
      idmessage:
        description: The ID of a specific message to retrieve. If not provided, the
          function will return the last 10 messages.
transactions:
  name: transactions
  description: python
  parameters:
    type: object
    properties:
      zipcode:
        description: The zipcode for which the transaction data is to be retrieved.
      page:
        description: The page number for pagination. Defaults to '1'.
eventdetails:
  name: eventdetails
  description: Fetch information about a Mixed Martial Arts (MMA) event based on its
    ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the event to get information about.
        type: integer
qualifying_results:
  name: qualifying_results
  description: Retrieve the qualifying results for a specific Formula 1 race based
    on the given year and location.
  parameters:
    type: object
    properties:
      year:
        description: The year of the race.
        type: integer
      location:
        description: The location of the race.
get_6_month_historical_daily_prices:
  name: get_6_month_historical_daily_prices
  description: Retrieves 6 months of historical daily stock prices for the given ticker,
    including adjusted Open, High, Low, and Close prices, as well as Daily Volume,
    Dividend, and Split information.
  parameters:
    type: object
    properties:
      ticker:
        description: The stock ticker symbol for which to retrieve the historical
          prices.
stock_get_financial_data:
  name: stock_get_financial_data
  description: Fetches financial data for a given stock symbol from the Yahoo Finance
    API.
  parameters:
    type: object
    properties:
      symbol:
        description: Ticker symbol for the stock (e.g., "AAPL" for Apple Inc.).
      region:
        description: Region code where the stock is listed. Defaults to 'US'. Allowed
          values are 'US', 'BR', 'AU', 'CA', 'FR', 'DE', 'HK', 'IN', 'IT', 'ES', 'GB',
          'S'.
history_prices:
  name: history_prices
  description: Fetches historical stock prices including Date, Open, High, Low, Close,
    Adj Close, and Volume for a given stock symbol over a specified range.
  parameters:
    type: object
    properties:
      range:
        description: The time period for which to fetch stock prices. Choices are
          ['1y', '5y', 'max']. Defaults to '1y'.
      symbol:
        description: The ticker symbol of the company. Defaults to 'TSLA'.
get_a_specific_team:
  name: get_a_specific_team
  description: Retrieves details of a specific basketball team from the Free-NBA API
    using the provided team ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the team to retrieve.
fights:
  name: fights
  description: Fetches fights for either upcoming or previous events from the Spectation
    Sports Events API.
  parameters:
    type: object
    properties:
      outcome:
        description: The outcome of the fights to filter by. Defaults to None.
      sport:
        description: The type of sport to filter the fights by. Defaults to None.
      category:
        description: The category or weight division of the fights. Defaults to None.
      event:
        description: The ID of the event to fetch fights for. Defaults to None.
      page:
        description: The page number of results to retrieve. Defaults to 1.
      fighter:
        description: The ID of the fighter to fetch fights for. Defaults to None.
estimate:
  name: estimate
  description: Estimates the video view performance of a YouTube channel using the
    given channel type and channel name.
  parameters:
    type: object
    properties:
      channeltype:
        description: The type of the channel (e.g., 'youtube').
      channelname:
        description: The username of the channel to look up for the performance estimation.
matchstreakodds:
  name: matchstreakodds
  description: Fetch odds data related to streaks for a specific football match using
    its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the match for which the streaks odds data is to be
          retrieved.
        type: integer
get_fonts:
  name: get_fonts
  description: Fetch fonts for vector tiles using a specified range and font stack
    from the Mapilion API.
  parameters:
    type: object
    properties:
      range:
        description: The range of font unicode characters to fetch.
      fontstack:
        description: The font stack to be used for the tiles.
reversegeocoding:
  name: reversegeocoding
  description: Perform reverse geocoding to find an address or place by latitude and
    longitude.
  parameters:
    type: object
    properties:
      lon:
        description: Longitude of the location.
        type: integer
      lat:
        description: Latitude of the location.
        type: integer
      json_callback:
        description: JSON callback function name for cross-domain requests.
      polygon_geojson:
        description: Include a GeoJSON polygon for the results.
      limit:
        description: Limit the number of returned results.
      accept_language:
        description: Response language in two-letter codes (e.g., 'en', 'es'). Default
          is 'en'.
      polygon_kml:
        description: Include KML polygon in the results.
      zoom:
        description: Level of detail required for the address details.
      polygon_svg:
        description: Include SVG polygon in the results.
      addressdetails:
        description: Include full address breakdown in the results.
      namedetails:
        description: Include a list of alternative names in the results.
      polygon_threshold:
        description: Simplify the returned polygons to a threshold level.
      format:
        description: Format of the response (e.g., 'json', 'xml').
      polygon_text:
        description: Include a WKT polygon in the results.
municipio_por_c_digo_postal:
  name: municipio_por_c_digo_postal
  description: Fetches the municipality corresponding to a given postal code using
    the provided RapidAPI key.
  parameters:
    type: object
    properties:
      codigo_postal:
        description: The postal code for which the municipality is to be retrieved.
get_by_trakt_tv_id:
  name: get_by_trakt_tv_id
  description: Fetches movie or TV show information from the RapidAPI MDB List service
    based on a given Trakt.tv ID.
  parameters:
    type: object
    properties:
      t:
        description: A valid Trakt.tv ID representing the movie or TV show.
      m:
        description: The media type, either 'movie' or 'show'. Defaults to 'movie'
          if not specified.
fetch_chapters:
  name: fetch_chapters
  description: Fetches the list of chapters for a given manga ID from the Mangaverse
    API.
  parameters:
    type: object
    properties:
      is_id:
        description: The ID of the manga for which chapters need to be fetched. Defaults
          to '6486b7547ae7cb74845df856'.
welcome:
  name: welcome
  description: Fetches NFT-related data from the specified API using optional parameters.
  parameters:
    type: object
    properties:
      nft:
        description: An optional string parameter to specify the NFT data to fetch.
          Defaults to None.
stations_v2_get_measurements:
  name: stations_v2_get_measurements
  description: Retrieve measurements from a specific station by its ID.
  parameters:
    type: object
    properties:
      is_id:
        description: The station ID retrieved from the /v2/auto-complete endpoint.
      x_user_timezone:
        description: The user's timezone. Default is 'Asia/Singapore'.
      x_units_temperature:
        description: The unit for temperature, either 'fahrenheit' or 'celsius'. Default
          is 'celsius'.
      x_user_lang:
        description: The user's language. Default is 'en-US'.
      x_units_pressure:
        description: The unit for pressure, either 'hg' or 'mbar'. Default is 'mbar'.
      x_units_distance:
        description: The unit for distance, either 'miles' or 'kilometer'. Default
          is 'kilometer'.
      x_aqi_index:
        description: The AQI index standard, either 'us' or 'cn'. Default is 'us'.
get_response:
  name: get_response
  description: Generates an automatic custom response based on the type and brand
    of a business and a given review.
  parameters:
    type: object
    properties:
      business_type:
        description: The type of the business (e.g., "Restaurant").
      business_brand:
        description: The brand of the business (e.g., "Fuzi").
      avis:
        description: "The review text (e.g., \"Merci pour votre accueil, c'\xE9tait\
          \ parfait\")."
get_ico_calendar:
  name: get_ico_calendar
  description: Fetches the ICO (Initial Coin Offering) calendar based on the given
    parameters.
  parameters:
    type: object
    properties:
      category:
        description: 'Comma-separated list of categories to filter the ICOs. For example:
          "_ico_cat_gaming,_ico_cat_ecomm,_ico_cat_finance,_ico_cat_healthcare".'
      time_utc_offset:
        description: UTC offset in seconds. For instance, UTC+8 is represented as
          8 * 60 * 60 = 28800.
      tabname:
        description: The status of the ICOs to retrieve. Options are 'upcoming', 'completed',
          or 'ongoing'. Default is 'ongoing'.
      sort:
        description: The sorting criterion. Options are 'related_days', 'name', 'funds_raised',
          or 'completed'. Default is 'related_days'.
      lang_id:
        description: Language ID for the response. Default is 1.
nearest_airport_from_postal_code:
  name: nearest_airport_from_postal_code
  description: Retrieves the nearest airport to a given postal code within a specified
    country.
  parameters:
    type: object
    properties:
      postal_code:
        description: The postal code for which to find the nearest airport.
      country_code:
        description: The two-digit country code corresponding to the postal code.
bulkgenerateguids:
  name: bulkgenerateguids
  description: Generates a bulk of GUIDs (Globally Unique Identifiers) using the GUID
    Generator API.
  parameters:
    type: object
    properties:
      batch_size:
        description: The number of GUIDs to generate. Must be between 1 and 10,000.
          Defaults to 20 if not specified.
income_statement:
  name: income_statement
  description: Fetches the company income statement in JSON format from the FMP Cloud
    API.
  parameters:
    type: object
    properties:
      stock:
        description: The stock ticker symbol for the company.
      apikey:
        description: The API key for accessing the FMP Cloud API. Obtainable from
          https://fmpcloud.io/register.
      period:
        description: The reporting period for the income statement. It can be either
          'annual' or 'quarter'. Defaults to 'quarter'.
get_economic_calendar_news_over_a_period_of_time:
  name: get_economic_calendar_news_over_a_period_of_time
  description: Fetches economic calendar news within a specified time period.
  parameters:
    type: object
    properties:
      content_type:
        description: The content type for the response. Default is 'application/json'.
      time_start:
        description: The start date and time for the news fetch period in ISO 8601
          format. Default is '2022-12-20 17:34:58+00:00'.
      time_finish:
        description: The end date and time for the news fetch period in ISO 8601 format.
          Default is '2023-02-13 19:34:58+00:00'.
city_details:
  name: city_details
  description: Fetch detailed information about a specific city, including location
    coordinates, population, and elevation above sea level (if available).
  parameters:
    type: object
    properties:
      cityid:
        description: The city identifier, which can be either the native ID or the
          wikiDataId.
      languagecode:
        description: The code for the language in which the results should be displayed.
          Defaults to None.
      asciimode:
        description: Whether to display results using ASCII characters. Defaults to
          None.
getstatsbymonth:
  name: getstatsbymonth
  description: Fetch Trinidad & Tobago Covid-19 statistics by month using the provided
    API.
  parameters:
    type: object
    properties:
      yearid:
        description: The year for which the statistics are needed, formatted as a
          four-digit string (e.g., "2022").
      monthid:
        description: The month for which the statistics are needed, formatted as a
          two-digit string (e.g., "01" for January).
titles_with_changed_sources:
  name: titles_with_changed_sources
  description: Fetches a listing of titles that have changed their streaming sources
    within a specified date range.
  parameters:
    type: object
    properties:
      start_date:
        description: Start date to include changes from a specific date range. Format
          is YYYYMMDD (e.g., 20210101 for January 1st, 2021), or YYYYMMDDHHMMSS for
          more granular results (e.g., 20210101123459 for January 1st, 2021 12:24pm
          and 59 seconds). Hours are in 24-hour format and in Eastern Standard Time.
          Defaults to None.
      limit:
        description: Number of titles to return per page. Default is 50, maximum is
          250.
      end_date:
        description: End date to include changes from a specific date range. Format
          is YYYYMMDD (e.g., 20210101 for January 1st, 2021), or YYYYMMDDHHMMSS for
          more granular results (e.g., 20210101123459 for January 1st, 2021 12:24pm
          and 59 seconds). Hours are in 24-hour format and in Eastern Standard Time.
          Defaults to None.
      regions:
        description: 2-character region code (e.g., US) for the country to get titles
          with changed sources from. Defaults to 'US,CA'.
      types:
        description: 'Filter result to include only certain types of titles. Pass
          a single type or multiple types comma delimited. Possible values: ''movie'',
          ''tv_series'', ''tv_special'', ''tv_miniseries'', ''short_film''. Defaults
          to ''movie,tv_series''.'
      page:
        description: Page of results to return. Defaults to 1.
stock_get_financials:
  name: stock_get_financials
  description: Fetches financial information for a given stock.
  parameters:
    type: object
    properties:
      is_id:
        description: The identifier of the stock. Use the market/auto-complete API
          to get the correct values.
get_individual_news_from_source:
  name: get_individual_news_from_source
  description: Fetch LGBTQ+ related news from a specific newspaper using the newspaper's
    ID.
  parameters:
    type: object
    properties:
      newspaperid:
        description: The unique identifier of the newspaper from which to retrieve
          news.
qnas_list:
  name: qnas_list
  description: Fetches a list of questions and answers related to a specific product
    from the RapidAPI Kohls service.
  parameters:
    type: object
    properties:
      productid:
        description: The identifier of the product for which to list questions and
          answers.
      sort:
        description: The sorting order of the results. Default is 'SubmissionTime:desc'.
          Options include 'LastApprovedAnswerSubmissionTime:desc', 'LastApprovedAnswerSubmissionTime:asc',
          'SubmissionTime:desc', and 'SubmissionTime:asc'.
      offset:
        description: The offset for paging through the results. Default is 0.
      limit:
        description: The maximum number of results to return. Default is 6.
autocomplete_cities:
  name: autocomplete_cities
  description: Fetches autocomplete suggestions for USA cities from the RapidAPI service.
  parameters:
    type: object
    properties:
      city:
        description: The name or partial name of the city to autocomplete.
fetch_movies:
  name: fetch_movies
  description: Fetch a list of movies from 2000 to 2019 based on the selected genre
    and year using the specified RapidAPI key.
  parameters:
    type: object
    properties:
      year:
        description: The year for which to fetch movies. Should be between 2000 and
          2019.
      genre:
        description: The genre of the movies to fetch.
get_movies_by_director:
  name: get_movies_by_director
  description: Gets a list of movies by a specified director using the IMDb API.
  parameters:
    type: object
    properties:
      movie_director:
        description: The name of the director. If not provided, an empty query will
          be sent.
get_coin_price:
  name: get_coin_price
  description: Fetches the price of a specified cryptocurrency at a specific time.
  parameters:
    type: object
    properties:
      uuid:
        description: UUID of the cryptocurrency for which the price is needed.
      timestamp:
        description: Epoch timestamp in seconds for the specific price time. Defaults
          to the latest price if not provided.
      referencecurrencyuuid:
        description: UUID of the reference currency in which the price is shown. Defaults
          to US Dollar ('yhjMzLPhuIDl').
feeds_by_secuid:
  name: feeds_by_secuid
  description: Fetches feeds from TikTok using a given secUid.
  parameters:
    type: object
    properties:
      schematype:
        description: The schema type for the feeds request.
      username:
        description: The username of the TikTok account.
      secuid:
        description: The security UID of the TikTok account.
offers:
  name: offers
  description: This function retrieves a list of offers for a product identified by
    the `is_id` parameter from a price comparison API. Latitude, longitude, country,
    and the API key can be optionally provided to refine the search.
  parameters:
    type: object
    properties:
      is_id:
        description: 'An identifier for the product, which can be any of the following:
          UPC, EAN, ISBN, GTIN, or Amazon ASIN.'
      latitude:
        description: The latitude for the location filter. Defaults to '37.777805'.
      longitude:
        description: The longitude for the location filter. Defaults to '-122.49493'.
      country:
        description: The country code for the location filter. Defaults to 'US'.
zappos_search_product:
  name: zappos_search_product
  description: Searches for products on Zappos using the given keyword and various
    optional parameters for sorting and pagination.
  parameters:
    type: object
    properties:
      keyword:
        description: The search term to use for finding products on Zappos.
      sort:
        description: The sorting criteria for the search results. Possible values
          are 'best_seller', 'relevance', 'low_to_high', 'high_to_low', 'customer_rating',
          'new_arrivals', and 'brand_name'. Defaults to 'new_arrivals'.
      page:
        description: The page number for pagination of search results. Defaults to
          1.
get_product_s_offers:
  name: get_product_s_offers
  description: Fetches the offers for a given product from the Amazon Data Scraper
    API.
  parameters:
    type: object
    properties:
      productid:
        description: The unique identifier for the product whose offers you want to
          retrieve.
royal_matches:
  name: royal_matches
  description: Fetch recent royal matches from the Trackmania API.
  parameters:
    type: object
    properties:
      page:
        description: The page number of the results to fetch, where each page contains
          a defined number of results. The default is `0`.
        type: integer
      limit:
        description: The maximum number of results to return. The default is `50`.
        type: integer
top_players_by_royal:
  name: top_players_by_royal
  description: Fetch the top players by their royal rank from the Trackmania API.
  parameters:
    type: object
    properties:
      page:
        description: The result page, each containing 50 results. Default page is
          `0`.
      limit:
        description: The number of results to return. Default limit is `50`.
getprofile:
  name: getprofile
  description: Retrieve the profile information of a specified Snapchat user using
    the RapidAPI.
  parameters:
    type: object
    properties:
      username:
        description: The Snapchat username of the profile to retrieve.
feed_hot:
  name: feed_hot
  description: Fetches hot feed data from the specified API.
  parameters:
    type: object
    properties:
      kapi_proxy:
        description: Proxy for the kapi endpoint. Default is None.
      country:
        description: Country code for the feed. Default is 'ma'.
      count:
        description: Number of items to fetch. Default is '30'.
      language:
        description: Language code for the feed. Default is 'en'.
      pcursor:
        description: Cursor for pagination. Default is None.
artists:
  name: artists
  description: Returns a list of music artists who contributed to JSR/JSRF.
  parameters:
    type: object
    properties:
      limit:
        description: The maximum number of items to return. Default is '5'.
      sortby:
        description: The field to sort the items by. Possible values include any field
          on the document (e.g., 'name', 'stats'). Default is 'name'.
      orderby:
        description: The order to sort the items in. Possible values are 'asc' (ascending)
          and 'desc' (descending). Default is 'asc'.
tanggal:
  name: tanggal
  description: Converts a given Gregorian date to its Hijri equivalent using the Masehi-ke-Hijriyah
    API.
  parameters:
    type: object
    properties:
      tanggal:
        description: The Gregorian date to be converted to Hijri.
minecraft:
  name: minecraft
  description: Check if a given Minecraft username is available using the Toolbench
    RapidAPI service.
  parameters:
    type: object
    properties:
      username:
        description: The Minecraft username to be checked for availability.
get_fuel_economy_information:
  name: get_fuel_economy_information
  description: Fetches fuel economy information for a specified vehicle from the official
    U.S. government source.
  parameters:
    type: object
    properties:
      model:
        description: The vehicle model. Use the /models endpoint to get supported
          models for the specified make.
      make:
        description: The vehicle make. Use the /makes endpoint to get supported makes.
      year:
        description: Model year. Currently supports model years from 1985 to 2023.
          Defaults to '2023'.
todas_as_moedas:
  name: todas_as_moedas
  description: Gets the latest exchange rate information for all currencies in a specified
    format.
  parameters:
    type: object
    properties:
      format:
        description: Format of the response which can be 'json', 'jsonp', or 'xml'.
get_tile_json:
  name: get_tile_json
  description: Returns the tile JSON for the given style type from the Mapilion Vector
    and Raster Map Tiles API.
  parameters:
    type: object
    properties: {}
fetch_details_of_multiple_records:
  name: fetch_details_of_multiple_records
  description: Fetches details of multiple records given their IDs using the Magical
    Taske API.
  parameters:
    type: object
    properties:
      is_id:
        description: A comma-separated string of record IDs for which to fetch details.
          Maximum 10 IDs allowed, no spaces between commas.
map:
  name: map
  description: Fetches a map image in WMTS format based on the given parameters.
  parameters:
    type: object
    properties:
      tilerow:
        description: The WMTS tile row number (latitude direction).
        type: integer
      tilematrix:
        description: The tile matrix, specified in the format `[EPSG code]:[Scale
          value]`.
      tilecol:
        description: The WMTS tile column number (longitude direction).
        type: integer
      rotationangle:
        description: Angle to rotate the map image. Valid range is 0 to 359, default
          is 0.
      mapstyle:
        description: Design of the map. Format is `[design]_[annotation size]`, default
          is `std_pc`.
      landmarkicon:
        description: Display of landmark icons. `on` for display, `off` for hide,
          default is `off`.
      resolution:
        description: Resolution of the map image. Values can be `1`, `2`, or `4`,
          default is `1`.
      contour:
        description: Display of contour lines. `on` for display, `off` for hide, default
          is `on`.
      bldgname:
        description: Display of building names. `on` for display, `off` for hide,
          default is `off`.
      logo:
        description: Display of brand logos. `on` for display, `off` for hide, default
          is `off`.
      target:
        description: Display contents of the map. Values can be `1` for background
          only, `2` for annotations only, `3` for both, default is `3`.
      format:
        description: Output image format. Values can be `image/png` or `image/jpeg`,
          default is `image/png`.
query_for_city_boundary_by_name:
  name: query_for_city_boundary_by_name
  description: Queries the city boundary information by the given city name using
    the Boundaries API.
  parameters:
    type: object
    properties:
      name:
        description: The name of the city for which to query boundary information.
get_status:
  name: get_status
  description: Retrieve the delivery status report for a given message ID using the
    provided API key.
  parameters:
    type: object
    properties:
      msg_id:
        description: The unique identifier of the SMS message. This can be obtained
          by setting the parameter `JSON`, `return_msg_id` or `details` to `1` when
          sending the SMS via the API. It can also be retrieved from the message journal
          in the user area.
        type: integer
      p:
        description: The API Key for authentication.
validatetest:
  name: validatetest
  description: Validate any phone number from any country using the given RapidAPI
    key.
  parameters:
    type: object
    properties:
      number:
        description: 'Phone number to be validated. This can be provided in two formats:'
      country:
        description: ISO 3166-1 alpha-2 code of the country in capital letters. This
          is optional if the number parameter starts with the + symbol. Defaults to
          None.
get_webhooks:
  name: get_webhooks
  description: Retrieves all existing webhooks using the provided API key and optional
    RapidAPI key.
  parameters:
    type: object
    properties:
      p:
        description: API key from Sms77.io.
settag:
  name: settag
  description: Sets a new tag for the SMS receive service using the provided RapidAPI
    key.
  parameters:
    type: object
    properties:
      tag:
        description: The value of the new tag, with a maximum length of 16 characters.
getchannelplaylists:
  name: getchannelplaylists
  description: Retrieve a comprehensive list of playlists associated with a specific
    YouTube channel.
  parameters:
    type: object
    properties:
      is_id:
        description: The YouTube channel ID for which to retrieve playlists.
download_cities:
  name: download_cities
  description: Downloads a list of cities from the Priceline API.
  parameters:
    type: object
    properties:
      limit:
        description: Limits the number of results returned. Defaults to 500.
      resume_key:
        description: Key to resume the results from a given ID. Defaults to None.
webcams_list_exclude_webcamid_webcamid:
  name: webcams_list_exclude_webcamid_webcamid
  description: This function retrieves a list of webcams excluding the specified webcam
    IDs.
  parameters:
    type: object
    properties:
      webcamid:
        description: Comma-separated list of webcam IDs to exclude from the result.
          At least one webcam ID must be provided.
      lang:
        description: Language code to localize the results, if available. Defaults
          to 'en'.
      show:
