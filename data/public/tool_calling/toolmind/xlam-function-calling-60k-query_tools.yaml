    type: object
    properties:
      email:
        description: The email address to verify.
email_verifier:
  name: email_verifier
  description: Verifies the validity of an email address using the Toolbench RapidAPI
    service.
  parameters:
    type: object
    properties:
      email:
        description: The email address to be verified.
check_for_disposable_emails:
  name: check_for_disposable_emails
