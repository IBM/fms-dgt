    - price
    - amount
  output_parameters:
    type: object
    properties:
      order_id:
        type: integer
        description: ID of the newly placed order.
      order_type:
        type: string
        description: Type of the order (Buy/Sell).
      status:
        type: string
        description: Initial status of the order.
      price:
        type: number
        description: Price at which the order was placed.
      amount:
        type: integer
        description: Number of shares in the order.
absolute_value:
  name: absolute_value
  description: 'This tool belongs to the Math API, which provides various mathematical
