      matchid:
        description: The identifier for the match to fetch live scores.
generate_a_qr_code_image:
  name: generate_a_qr_code_image
  description: Generate a QR Code image using the Qrickit API.
  parameters:
    type: object
    properties:
      d:
        description: Data for the QR Code (e.g., URL, text, vCard data, iCal data,
          etc.).
      logotext:
        description: Header text, typically 15 to 35 characters maximum, displayed
          at the top of the QR Code.
      t:
        description: Header text, typically 15 to 35 characters maximum, displayed
          at the top of the QR Code.
      fgdcolor:
        description: QR Code color in HTML Hex format (e.g., 'FFFFFF' for white, '000000'
          for black). Default is black ('000000').
      qrsize:
        description: Size of the QR Code image in pixels. Default is 150. Minimum
          is 80, maximum is 1480.
      lang:
        description: Set to 'jp' if the footer text contains Japanese characters,
          otherwise leave blank.
      e:
        description: Header text, typically 15 to 35 characters maximum, displayed
          at the top of the QR Code.
      addtext:
        description: Footer text, typically 15 to 60 characters maximum, displayed
          at the bottom of the QR Code.
      txtcolor:
        description: Footer text color in HTML Hex format (e.g., 'FFFFFF' for white,
          '000000' for black). Default is black ('000000').
      bgdcolor:
        description: Background color in HTML Hex format (e.g., 'FFFFFF' for white,
          '000000' for black). Default is white ('FFFFFF').
photo_from_given_number:
