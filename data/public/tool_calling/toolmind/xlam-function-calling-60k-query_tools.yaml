  parameters:
    type: object
    properties:
      current_time_str:
        type: string
        description: Current time in HH:MM AM/PM format.
    required:
    - current_time_str
  output_parameters:
    type: object
    properties:
      status:
        type: string
        description: 'Status of the market. [Enum]: ["Open", "Closed"]'
add:
  name: add
  description: 'This tool belongs to the Math API, which provides various mathematical
